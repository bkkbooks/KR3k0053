body:
  text: 古儷府卷一明王志慶編天文部總載唐劉允濟天賦臣聞混成發粹大道含元興於物祖首自胚渾分泰階而立極光耀魄以司尊懸兩明而必照列五緯而無言驅馭隂陽裁成風雨叶乾位而凝化建坤儀而作輔錯落九垓岧嶤八柱燦黃道而開域闢紫宫而為宇橫斗樞以旋運廓星漢之昭回總三統之遷易乘五運之遞來察文明而降祥瑞觀草昧而動雲雷託璇樞之妙術應玉管之浮灰柔克斯髙聽卑逾廣覆燾千容苞含萬象載光道德聿符刑賞既霆震而霜威亦春生而夏長其功不測其變惟神大哉其施曠乎其仁周八紘而化育籠四海而陶鈞雖感通而下濟終輔翼而無親登大寶於上皇發神圖於下帝憑理亂而倚伏候昏明而開閉遘堯舜以降禎休遇辛癸而呈祲沴歷成敗而無爽在興亡而必契闕天賦其為道也或比之以張弓其入夢也或方之於潄乳憫鄒衍則嚴霜夏降應陳實則繁星夜聚孔階逺而難登樂霧披而已覩雖覆繖之可嫓豈鍊石之能補美夫有功不伐無逺不蓋德冠三才名參四大日朝上而疑璧河夜橫而如帶破鏡飛乎其所長劍倚乎其外違之則風雨差錯順之則隂陽交泰王起披霧見青天賦狀煙消於羃羃始露澄潭凝塵洗之濛濛自開朗鏡陋決雲而觀劍小披沙而見金有美人兮青陽是仰藻鏡斯臨自然比天於霄漢卷霧於沉隂亦何必觀樂廣之容始欽重器信衛瓘之説方獲明心者哉闕錬石補天賦觀夫圓則九重功惟百鍊眷無親而克敬當有道而可見言柔與剛崇髙是將運有徒於晝夜比為炭於隂陽織女停梭受支機於河漢荆人抱璞嗟韞玉於穹蒼後魏張淵觀象賦荆軻慕丹則白虹貫日而不徹衛生畫䇿則太白食昴而摛朗魯陽指麾而曜靈為之回駕嚴陵來遊而客氣著於乾象隂精乘箕則大飇暮鼓西南入畢則淫雨滂沱譬猶晉鐘之應銅山風雲之從斑螭唐楊炯渾天賦部之以三門張之以八紀其周天也三百六十五度其去地也九萬一千餘里日居而月諸天行而地止載之以氣浮之以水生之育之長之畜之亭之毒之蓋之覆之天聰明也聖人得之天垂象也聖人則之其道也不言而信其神也不怒而威驗之以衡軸考之以樞機三十五官一作宫有羣生之繫命一十二次當下土之封畿中衡外衡每不召而自至黃道赤道亦殊塗而同歸表裏見伏聖人於是乎發揮分至啓閉聖人於是乎範圍可以窮理而盡性可以極深而研幾天有北斗杓攜龍角魁枕參首天有北辰衆星環拱天帝威神尊之以曜魄配之以勾陳有四輔之上相有三公之近臣華蓋巖巖俯臨於帝坐離宫奕奕旁絶於天津列長垣之百堵啓閶闔之重闉文昌拜於大將天理囚於貴人見晉天文志泰階平而君臣穆招搖指而天下春東宫則析木之津夀星之野箕為傲客房為駟馬天王對於攝提皇極臨於宦者左角右角兩曜之所巡行隂間陽間五星之所取舍後宫掌於蕃一作燕息太子承於冢社宗人宗正內外敦敘於家邦市樓市垣貨殖畢陳於天下北宫則靈龜潛匿螣蛇伏藏匏瓜宛然而獨處織女終朝而七襄登漸臺而顧步御輦道而徜徉聞雷霆之隱隱聽枹鼓之硠硠南斗主爵祿東壁主文章須女主布帛牽牛主關梁羽林之軍所以除暴亂壘壁之陳所以備非常西宫則天潢一作漢咸池五車三柱奎為封豕參為白虎胃為天倉婁為重聚旄頭之北宰制其邊陲天畢之隂蓄泄其雲雨大陵積尸之肅殺參旗九斿之部伍樵蘇之地出入於園苑萬億之資填積於倉庾南宫則黃龍賦象朱鳥成形五帝之坐三光之庭傷成于鉞誅成于鑕福成於井德成於衡執法者廷尉之曹大夫之象少微者儲君之位處士之星天弧直而狼顧軍市曉而雞鳴三川之郊鶉火通其耀七澤之國翼軫寓其精南河北河象闕於是乎增峻左轄右轄邊荒於是乎自寧乃有金之散氣水之精液法清渭之橫橋像昆明之刻石嵗時占其水旱滄溟應其潮汐織女之室漢家之使可尋飲牛之津海畔之人易覿日也者衆陽之長人君之尊天雞曉唱靈烏晝踆扶桑臨於大海若木照於崑崙太平太蒙所以司出入南至北至所以節寒溫龍山銜燭不能議其光景夸父棄䇿無以方其駿奔月也者羣隂之紀上天之使異姓之王后妃之事方諸對而明水洽重暈匝而邊風駛裁盈蚌蛤則邊騎先侵適鬪麒麟則暗虎潛值五星者木為重華火為熒惑鎮居戊己斯為土德太白主西辰星主北俯察人事仰觀天則比參右肩之黃如奎大星之黑五材以之致用七政於焉不忒同舍而有四方分天而利中國赤角犯我城黃角天之爭五星同色天下偃兵趨前舍為贏退後舍為縮贏則侯王不寧縮則軍旅不復或向而或背或遲而或速金火犯之而甚憂嵗鎮居之而有福觀衆星之部署歷七曜之驅馳定天下之文所以通其變見天下之賾所以象其宜然後播之以風雨成之以霜霰或吐霧而蒸雲或擊雷而奔電一旬而太平感膚寸而天下遍白日為之晝昏恆星為之不見爾乃重明合璧五緯連珠青氣夜朗黃雲晝扶握天鏡授河圖若曰賜之以福此明王聖帝之休符至如怪雲祓氣冬雷夏雪日暈長虹星芒伏鱉隂有餘而地動陽不足而天裂若曰懼之以災此昏主亂君之妖孽李光朝新渾儀賦琢璿為衡範金為蓋其狀則小其用則大南極北極正其端隅上規下矩正其外內繚繞黃道環回紫宫斗居其北日起其東别度數於分寸之內點星象於毫釐之中處動而能靜妙同乎造化之意寂無以為有用擬於隂陽之功有象必見惟幽是通乃知近能則逺合下正則上同因之以言寶厯遂乃授乎人時以通天下之志以斷天下之疑闕新渾儀賦則天工協謀鳬氏畢至煽洪爐以效役鎔珍金以為器管之應一十二律罔極為期天之列二十八宿各分爾位然仰觀俯察以參以稽森羅乎象緯窮極乎端倪視朔於初時必書於雲物履端於始嵗如得乎攝提候月既殊於蓂草測景方異乎土圭侔漢律之黍纍不失同舜年之風雨不迷盧肇海潮賦張衡考動以鑄儀淳風述時而建式宋顔延之請立渾天儀表張衡創物蔡雍造論戎夏相襲世重其術臣昔奉使入關值大軍旋斾渾儀在路肆觀竒祕絶代異寶旋及王府考諸前志誠應夙聞尚書璇璣玉衡以齊七政崔瑗所謂數術窮天地制作侔造化經志所云圖憲所本故體度不渝精測尚矣則七晷運變無匪康時九代貞觀不絶司厯晉郭璞釋天地圖贊祭地肆瘞郊天致禋氣升太一精淪九泉至敬不文明德惟鮮宋何承天天贊軒轅改物以經天人容成造厯大撓創辰龍集有次星紀乃分玉海太元瑩天元咫步日月紀數斗振天而進日違天而退又太元告地坎而天嚴月遄而日湛注月行日十三度故疾日行日一度故遲宋有善言星期必退齊無穢德彗或可禳天似蓋笠地法覆槃兩耀合璧萬芒旋蟻四七是經錯若棊峙焯彼軒象內治既飭三能協明夔進皋陟雨幄雲油長我稷黍嵗雖守心當庤先具一兵不試稚舞耋嬉芒匿角伏常謹我師赤道帶天之中以分列宿之度黃道斜運於外以明日月之行唐一行銅儀玉儀之遊銅渾之轉義取璣衡智起渾蓋神橅巧械視古無比治厯不難於算平朔而難於定氣差制儀不難於規赤道而難於步黃道揚泉物理論儒家立渾天以追天形從車輪焉周髀立蓋天言天氣循邊而行從磨石焉隋志劉焯閎制莫存漢武時洛下閎鮮于妄人嘗為渾天衡造有器績小有異蕃乃事同陸績王蕃皆吳人蓋及宣夜三説並驅平昕安穹四天騰沸至當不一理惟一揆豈容天體七種殊説晉成公綏天地賦若乃懸象成文列宿有章三辰燭曜五緯重光衆星回而環極招搖運而指方白虎時據於參昴青龍垂尾於氐房玄龜匿首於女虛朱雀奮翼於星張帝皇正坐於紫宫輔臣列位於文昌垣屏絡繹而珠連三台差池而雁行軒轅華布而曲列攝提鼎峙而相望天文部日唐王捧圭日賦及夫春景初動寒威始歇煦百川以氷開暖千林而花發行乎赤道應其朱眀煎緑潭而水沸爛青雲而火生於斯之時誠可畏也既而暑退涼進煙歸霧返懸淨影以悠揚度斜暉而晼晚送秋景之已末屬冬隂之方盛融晴雪而曭朗曝晨霜而溫映於斯之時誠可愛也故能明以成象髙以臨空有形必鑒無幽不通在七政雖擅其長照萬物不競其功抱三足之靈鳥挂五彩之輕虹魯陽揮戈而三舍漢皇握鏡而再中曜凝霜而輕白帶飛霞而淡紅闕二黃人守日賦宵依愕夢伴程昱以少留晝遇揮戈感魯陽而俱返闕慶雲抱日賦不曜青以干吕能叶慶以扶日縹眇蜿蜒遊龍相逐而不如斐亹葳㽔彩霓舒狀而難匹始流形於孤嶽終垂象於九圍麗碧霄以增媚捧金烏而徐飛燦玉葉以繁布抱金輪而半出灼爍兮乍似漢祖隱居橫紫氣曈曨兮又若楚王乘舟捧萍實豈錦江之所能擬諒秦鏡之所非匹既而五彩不散三足增輝英英而浮光並射杲杲而合璧相依韋展日月如合璧賦珥作如虹之氣波為旁達之華映彼仙娥有似夫佩而比德吐兹王字更疑乎瑜不掩瑕闕日月如合璧賦不縮不盈自契於三年之閏無偏無黨何憂乎十月之交豈止合彩呈姿和光效異陵珠星而掩縟逗洛水而增媚東西並耀疑夾鏡於長空升降相沿異藏珍於厚地闕登天壇山望海日初出賦望若木之初出疑查上於天河想隂火之潛然見焰燒於滄海湧上扶桑謂蟠桃之有蕊照出仙島疑燭龍之映山李程日五色賦時也寰宇廓清景氣澄霽浴咸池于天末拂若木於海裔非煙捧於圓象蔚矣錦章餘霞散於重輪煥然綺麗固知疇人有秩天紀無失必觀象以察變不廢時而亂日合璧方而孰可抱珥比而奚匹泛草際而瑞露相鮮動川上而榮光亂出信比象而可久故成文之不一足使陽烏迷莫黑之容白駒驚受彩之質名翬矯翼如威鳯兮鳴朝陽時藿傾心狀靈芝兮耀中圃湛賁日五色賦馴翬對而沮色儀鳯臨而委質光浮石壁謂媧皇之補天影人詞林疑江淹之夢筆祥光旁燭偏宜連畛之瓜瑞彩下臨更並建社之土闕黃雲捧日賦與抱珥而偶方守人而匹呈彼瑞暾曜於天門闕黃雲捧日賦入房焉可以擬議干吕何足以為懷梁李鏡逺日詩始臨東嶽觀俄升若木枝萍實詎儔彩合扇且慙規北林耿初耀員忩鑒早曦照庭餘雪盡映簷滴溜垂徘徊匝花樹煜爚滿春池栁隂才歷歷簾影復離離曾泉豈停舍桑榆忽在斯回戈安得中長繩不可羈沖情愛景落清宴惜光馳溫暉徒已荷深心竊自知唐太宗賦秋日懸清光賜房玄齡詩秋露凝髙掌朝光上翠微參差麗雙闕照耀滿重闈仙馭隨輪轉靈烏帶影飛臨波無定彩入隙有圓暉還當葵藿志傾葉自相依虞世南詠日午奉和詩髙天淨秋色長漢轉曦車玉樹隂初正桐圭影未斜翠蓋飛圓影明鏡發輕花再中良表瑞共仰璧暉賖董思恭日詩滄海十枝暉玄圃重輪慶舜華發晨檻菱彩翻朝鏡忽遇驚風飄自有浮雲映更也人皆仰無待揮戈正李嶠日詩旦出扶桑路遙升若木枝雲間五色滿霞際九光披東陸蒼龍駕南郊赤羽馳傾心比葵藿朝夕奉堯曦石殷士日華川上動詩曙霞攢旭日浮景㺯晴川杲曜曽潭上悠揚極浦前岸髙時擁媚波逺漸澄鮮萍實空隨浪珠胎不照淵早暄依曲渚微動觸輕漣詎假咸池望幽情得古篇獨孤鉉日南長至詩玉厯頒新律凝隂發一陽輪輝猶惜短圭影此偏長晷度經南斗流星盡北堂乍疑周户耀可愛逗林光積雪銷微煦初萌動早芒更升臺上望雲物已昭彰柴宿初日照華清宫詩靈山初煦澤逺近見離宫影動參差裏光分縹眇中鮮飇收晚翠佳氣滿晴空林潤溫泉入樓深復道通璇題生炯晃珠綴引蔥曨鳯輦何時幸朝朝此望同唐常衮中書門下賀日當蝕不蝕表臣聞日之所躔行有虛道至之所會蝕亦無災况聖以合天德以禔福是有幽贊宜於感通伏惟陛下協用五紀順用三極厯象日月統和隂陽乃者疇人推䇿合朔於辰非正陽之所忌於大明而何損猶能懼而勤政實以應天齋於穆清益用恭默精誠所達玄運相符圜尺之影始生於海上膚寸之雲忽遍於天下霈然而起豈止終朝莫測應龍之外潛復踆烏之次伐鼓用幣悉罷於有司潤物蕃生普歡於在野及乎睿宿更益清光同道相避則聞昭子之對當交而變果徴劉邵之言古今殊祥中外所慶天文部月宋謝莊月賦陳王初喪應劉端憂多暇緑苔生閣芳塵凝榭悄焉疚懷不怡中夜乃清蘭路肅桂苑騰吹寒山弭蓋秋坂臨濬壑而怨遙登崇岫而傷逺於時斜漢左界北陸南躔白露曖空素月流天沈吟齊章殷勤陳篇抽毫進牘以命仲宣仲宣跪而稱曰臣東鄙幽介長自丘樊昧道懵學孤奉明恩臣聞沈潛既義髙明既經日以陽德月以隂靈擅扶光于東沼嗣若英於西冥引玄兔於帝臺集素娥於后庭朒朓警闕朏魄示沖順辰通爥從星澤風增華台室揚彩軒宫委照而吳業昌淪精而漢道融若夫氣霽地表雲斂天末洞庭始波木葉微脫菊散芳於山椒鴈流哀於江瀨升清質之悠悠降澄暉之藹藹列宿掩縟長河韜映柔祗雪凝圓靈水鏡連觀霜縞周除氷淨君王乃厭晨歡樂宵宴收妙舞弛清縣去燭房即月殿芳酒登鳴琴薦若乃涼夜自凄風篁成韻親懿莫從羇孤遞進聆臯禽之夕聞聽朔管之秋引於是絃桐練響音容選和徘徊房露惆悵陽阿聲林虛籟淪池滅波情紆軫其何託訴皓月而長歌歌曰美人邁兮音塵闕隔千里兮共明月臨風歎兮將焉歇川路長兮不可越歌響未終餘景就畢滿堂變容廽遑如失又稱歌曰月既沒兮露欲晞嵗方晏兮無與歸佳期可以還微霜霑人衣陳王曰善乃命執事獻夀羞璧敬佩玉音復之無斁周祇月賦弱不廢照清不激汙唐王泠然初月賦散微華於粉壁集輕照於蘭叢若乃斷山風入中天氣清雲徹暮景霞開晚晴望頺陽之西落見微月之孤生出煙郊而漫漫映江浦之亭亭凝碧臺以光淨度青樓以色明雖豫情之斯得停搴攬而不盈鄭遙初月賦銜破鏡而飛斜抱彎弓而勢却蓂稀葉少桂短花新楊諫月映清淮流賦蟾蜍下沉對蠙珠而增美璇源圓折混金波而更清皓鶴奪彩玉砂迷明趙蕃月中桂樹賦沓沓低枝拂孤輪而挺秀依依密樹侵滿魄而含芳同蟾蜍之片影似濯瑶池異珊瑚之幽藂徒生滄海埃􅝙初歇關山正秋空泬寥而逾淨色冉弱而彌幽謂扇花薄如圭玷浮望玉露之初垂遙疑滴瀝聼金風之乍起逺若颼飀弱質中植纎條外扶亂彩時搖起飛飛之驚鵲澄波靡隔掩歷歷之髙榆是故邈彼輕霄呈兹永夕紛敷逺瑩偃蹇旁射夾餘霞而暫丹經斜漢而彌白臨紫極而天香不散指北斗而仙花可摘楊真𢎞月中桂樹賦籠玄兔以不動映素娥而如在太陽讓美收若木之餘暉列宿懷慙掩白榆而沉彩潘炎月重輪賦時屬髙秋瑞彰元后光泛皎潔之斜漢色映闌干之北斗金波耀景非懸闞澤之名璧彩揚輝不入士衡之手理殊吳夢符炳漢謡淨桂花於日道環水鏡於丹霄臺榭氷潔郊原霜縞梁元帝望江中月影詩澄江涵浩月水影若浮天風來如可泛流急不成圓秦鏡斷復接和璧碎還聯裂紈依岸草斜桂逐行船即此清江上無俟百枝然庾肩吾望月詩桂殿月偏來留光引上才圓隨漢東蚌暈逐淮南灰渡河光不濕移輪轍詎開此夜臨清景還承終宴杯陳張正見薄帷鑒明月詩長河上桂月澄彩照髙樓分簾疑碎璧隔慢似垂鈎忩外光恆滿帷中影暫流豈及西園夜長隨飛蓋遊周王褒詠月贈人詩月色當秋夜斜暉映薄帷上弦如半璧初魄似蛾眉渡雲光忽駛中天影更遲髙陽懷許掾對此憶相思庾信舟中望月詩二首舟子夜離家開舲望月華山明疑有雪岸白不關沙天漢看珠蚌星橋視桂花灰飛重暈闕蓂落獨輪斜夜光流未曙金波影尚賖照人非七子含風異九華蓂新半璧上桂滿獨輪斜乘舟聊可望無假逐靈槎唐李嶠月詩桂生三五夕蓂開二八時分輝度鵲鏡流彩入蛾眉皎潔凌踈牖朦朧鑒薄帷願陪北堂宴長賦西園詩杜甫月詩二首天上秋期近人間月影清入河蟾不沒搗藥兔長生只益丹心苦能添白髮明干戈知滿地休照國西營四更山吐月殘夜水明樓塵匣元開鏡風簾自上鈎兔應疑鶴髮蟾亦戀貂裘斟酌姮娥寡天寒奈九秋劉禹錫和崔舍人八月十五日夜玩月詩暮景中秋爽隂靈既望圓騰精浮碧海分照接虞泉逈見孤輪出髙從倚蓋旋二儀含皎潔萬象共澄鮮整御當西陸舒光麗上玄從星變風雨順日助陶甄逺近同時望晶瑩此夜偏運行調玉燭潔白應金天曲沼疑瑶鏡通衢若象筵逢人盡氷雪遇景即神仙引素吞銀漢凝清洗緑煙臯禽驚露下鄰杵思風前水是還珠浦山成種玉田劔沉三尺影燈罷九枝燃象外形無迹寰中影有遷稍當雲闕正未映斗城懸靜對揮宸翰間臨擘彩箋境同牛渚上宿在鳯池邊興掩尋安道詞勝命仲宣從今紙貴後不復詠陳篇李羣玉中秋越臺看月詩海雨洗塵埃月從空碧來水光籠草樹練影挂樓臺皓耀迷鯨目晶瑩失蚌胎宵分憑檻望應合見蓬萊李商隱西掖玩月詩昨夜玉輪明傳聞近太清涼波衝碧瓦曉暈落金莖露索秦宫井風絃漢殿筝幾時綿竹頌擬薦子虛名駱賔王秋月詩雲披玉繩淨桂滿鏡光圓裛露朱花冷凌霜紈扇寒漏彩含踈薄浮波漾急瀾西園徒自賞南飛終未安盧照鄰江中望月詩江水向涔陽澄澄寫月光鏡圓珠溜徹弦滿箭波長沉鈎搖兔影浮桂動舟芳延照相思夕千里共霑裳李嶠秋山望月酬李騎曹詩色帶銀河滿光含玉露開白雲籠影度虛暈抱輪廽谷邃涼隂靜山空夜響哀葉季良月照氷池詩霽夕雲初斂棲娥月未虧圓光生碧海素色滿瑶池天逈輪空見波凝影詎窺浮霜玉比彩照像鏡同規皎潔寒偏淨徘徊夜轉宜誰憐幽境在長與賞心隨朱華海上生明月詩皎皎秋中月團團海上生影開金鏡滿輪抱玉壺清漸出三山上將凌一漢橫素娥嘗藥去烏鵲繞枝驚照水光偏白浮雲色最明此時堯砌下蓂莢正敷榮蔣防秋月懸清輝詩秋月沿霄漢亭亭委素輝山明桂花發池滿夜珠歸入牖人偏攬臨枝鵲正飛影連平野淨輪度曉雲微晶晃浮輕露徘徊映薄帷此時千里道延望獨依依李羣玉望月寄人詩浮雲卷盡月朣朧直出滄溟上碧空盈手水光寒不濕流天素彩靜無風酒花蕩漾金樽裏棹影飄颻玉浪中川路正長難可越美人千里思何窮天文部星晉成公綏星賦玄龜匿首於女虛朱鳥奮翼於井鬼垣屏珠連三台雁行軒轅華布而曲分攝提鼎峙而直掃梁陸雲公星賦漢武帝夜遊昆明之池顧謂司馬遷相如曰星之明麗矣考之歌頌求之經史龍屋著於虢童天漢表於周士既妖謡之體陋嗟怨刺之蚩鄙每鬱悒而未攄思命篇於二子於是司馬遷對曰臣代典天官緒繇南正檢之圖籍傳之視聽臣聞連珠合璧曜靈之所起也春鳥秋虛厯數之所紀也應黃鍾而正位建玉衡以辨方五緯麗而周道四野分而畫疆至如下方爽德上玄告變或守位而易所或凌光而掩炫故夫應若轉環信如合契俾明鏡與元龜冝敕身而炯戒唐郤昂老人星賦玄武宵中偵西陸以凝質白藏氣杪直南郊以散精夫有開必先無福不應若政事中律則嘉祥叶證五緯分影而交朗九月騰華而吐孕此乃王澤𢎞天瑞作恆星轉曜而同煥布景搖輝而相薄初升穹昊月午而孤燭猶燃末映踈林夜久而圓珠未落騂芒下射滅草莽之螢飛紫焰旁融掩榆關之流火楊炯老人星賦南極之庭老人之星煜煜爚爚煌煌熒熒秋分之旦見乎丙春分之夕入乎丁配神山之呼萬嵗符水德之兆千齡晃如金粟粲若銀燭比秋草之一螢狀荆山之片玉渾渾熊熊懸紫貝於河宫曄曄暐暐曜明珠於漢水其光也如丹其大也如李稽元命之攸述按星經之所紀見則化平主昌明則天下多士崔淙五星同色賦且玉燭常明霜天若鏡鄰月魄而璀璨落天津而隱映朝臨日道助我后夙興之勤思暮入天樞表聖皇夜寐之勤政林益五星同色賦同色已傳於堯厯聚井更弭於漢兵夏方慶天晴景星見賦時也雲斂遙素天澄逺青纎塵不起微露斯零掩映孤月乘陵衆星回燭北辰似將朝乎帝座傍窺南極疑欲覲乎天庭激髙風以熠熠耿斜漢之熒熒青赤以辨其方合散以通其變連二氣而初吐混三光而乍見否泰之運式孚天地之心可見陶拱天晴景星見賦於時玄穹正清白日初匿爛景星之效質絢佳氣以競色起青方者縈瑞彩以蔥瓏發赤位者統祥光而翕赩比懷珠而其狀匪異等抱珥而其儀不忒懿吐黃以爭光矧聚三而表德莫不熒煌於碧漢焜耀於青霄照下土而乍朗掩繁星而自昭或半虧其形類蟾魄而當晦朔或中虛其狀疑金環之在泬寥佐朗月而其色惟盛臨安邦而其美不朽豈比夫漢代稱竒空聞乎再中之日堯年紀異徒傳乎入昴之星而已乎李子蘭天晴景星見賦晴空寥寥列星炫炫紛乎二氣始若煙而非煙炯彼羣星初乍隱而乍見並我質之惟黃總彼氣而成絢霏微類干吕之雲輝赫如繞樞之電星氣合會光華動搖二氣之色交至三星之狀孔昭曭朗惟明疑沐其雲露光芒振曜若擊夫天飇明麗太極遐映青昊呈貺遙對乎三台效祥何慚於五老克表王德信由玄造唐敬括夀星見詩玄象今何應時和政亦平祥為一人夀色映九霄明皎潔垂銀漢光芒近斗城含規同月滿表瑞得天清甘露盈條降祥煙向日生無如此嘉祉率土荷秋成北齊邢邵賀老人星表冥貺未已靈應猶臻以某夜老人星見逹旦揚光經旬未滅雖三星共色五老同遊擬之於此故無與匹唐李商隱為滎陽公賀老人星表聖惟合德神實效祥必垂有爛之文以表無疆之祚中賀臣聞玄象示人昊穹凝命曜為經而宿為紀則曰常名斗挹酒而牛服箱或標虛號未若候時而出有道則彰居五福之先在三辰之列伏惟陛下昭明老契遊吟莊寰式是中秋呈兹上瑞况見於午位又屬寅時仰考玄符乃有深意自南曜彩將𢎞解愠之風近曉流光欲助無私之日皇心載裕靈鑒孔昭凡居率土之濵皆慶後天之夀臣誤蒙重寄實逺清光送玄燕於梁間傷時自切數白榆於天上厥路無由又武三思表荐人君之夀既稽元命之圖表天下之安又見西京之志澄霞助月非唯石氏之占散翼垂芒何獨斗樞之説又令狐楚表色侔蒸栗光掩連珠彰爾寶圖類堯年之河出延長聖厯齊漢代之山呼天文部雲晉楊又雲賦縹眇翩綿鬱若升煙蹇槃縈以詰屈兮若虬龍之蟠蜿嶷岐岐以嶽立兮狀有似乎列仙東西絡繹南北油裔隨風徘徊流行暗藹豁兮仰披杳兮四會凝寒氷於朱夏飛素雪於玄冥灑膏液於天漢騰鴻泉於泰清乾坤以之交泰品物以之流形陸機浮雲賦若層臺髙觀重樓疊閣或如鐘首之鬱律乍似塞門之寥廓金柯分玉葉散緑翹明巖英煥鸞翔鳯翥鴻驚鶴奮鯨鯢泝波鮫鰐衝遁朱絲亂紀羅袿失領飛仙凌虛隨風遊騁有若芙蓉羣披蕣華揔會車渠繞理瑪瑙縟文集輕浮之衆彩厠五雲之藻氣繞蓬萊而結體薄崑崙而增輝秬鬯揚芒嘉榖垂穎又白雲賦鳥殊類而比栖獸異迹而同處蛟引翳而並潛龍攀鴻而雙舉麟舞角以軒罷鷙企翮而延佇長城曲蜿采閣相扶聳瑶臺之嶻嶭搆瓊闥之離婁雄虹矯而垂天翠鳥軒而扶日唐張何早秋望海上五色雲賦嗤碭嶺之光淺恥汾川之色輕李惲五色卿雲賦叶千年之休裕垂五色之氤氲蕭索離披狀虹輝之貫日徘徊搖曵疑鼎氣之歊汾散作霞彩聚成錦文匪騰華於觸石信呈瑞於明君闕五色卿雲賦光浮碧落奪虹彩於太虛影下清潭照錦色於曲浦韋執中白雲無心賦觸石蒼野揚埃白泉不恆厥所有開必先搖揚縈空滅煙光於逺嶠輪囷委地雜波景於遙川闕白雲無心賦或假勢於重嶺或隔閡於孤山挺竒峯於天末亘橫陳於巖間順細雨以低舉隨輕風而往還哂魚鱗之覆地輕鵬翼以垂天唐于季子雲詩瑞雲千里映祥暉四望新隨風亂鳥足泛水結魚鱗布葉疑臨夏開花詎待春願得承嘉景無令掩桂輪駱賔王秋雲詩南陸銅渾改西郊玉葉輕泛斗瑶光暗臨陽瑞色明蓋隂連鳯闕陳影翼龍城誰知時不遇空傷留滯情錢起賦得歸雲送友人歸華山詩秀色橫千里歸雲積幾重欲依毛女岫初卷少姨峰蓋影隨征馬衣香拂卧龍祗應函谷上真氣日溶溶林藻青雲干吕詩應節偏干吕亭亭在紫氛綴雲初度影捧日已成文結蓋祥光逈為樓翠色分還同起封上更似出橫汾作瑞來藩國呈形表聖君徘徊如有託誰道比間雲裴澄春雲詩漠漠復溶溶乘春任所從映林初展葉觸石未成峰旭日消寒翠晴煙點淨容霏微將似滅深淺又如重薄彩臨溪散輕隂帶雨濃空餘負樵者嶺上自相逢陸暢山出雲詩靈山蓄雲彩紛郁出清晨望樹繁花白看峯小雪新映松張蓋影依澗布魚鱗髙似從龍處低如觸石頻濃光藏半岫淺色類飄塵玉葉開天際遙憐占早春李紳詩杳靄祥雲起飄揚翠嶺新瑩峯開石秀吐葉間松春林靜翻空少山明度嶺頻回崖時掩鶴幽澗或隨人姑射朝凝雪陽臺晚伴神悠悠九霄上應坐玉京賔張勝之詩片雲初出岫孤迥色難親蓋小辭山近根輕觸石新飄颻經緑野明麗照晴春拂樹疑舒葉臨流似結鱗從龍方有感捧日豈無因看取為霖去恩霑雨露均于尹躬華山慶雲見詩聖主祠名嶽髙峰發慶雲金柯初繚繞玉葉漸氛氲氣色含珠日光明吐翠氛依稀來鶴態髣佛列仙羣萬樹流光影千潭寫錦文蒼生欣有望祥瑞在吾君唐崔融為涇州刺史賀慶雲見表伏惟陛下早朝晏罷憂勞庶政逺無不肅邇無不懷神感潛通至誠上格涼秋中月滯雨移旬天心合而喜氣生陽德動而愁隂歇文章郁郁惠日照而成彩花花逢逢晴雲搖而不散雖復紫雲來漢皇殿白雲入殷帝房較其優劣孰以為喻臣運奉休明榮霑刺舉千年多幸已逢河水之清百辟相歡重偶叢雲之曲許敬宗賀慶雲表金枝玉葉若臨軒帝之營蕭索氤氲復入唐臣之詠駢枝合穎匹此為輕絳雪玄霜曽何足喻常衮賀天慶節慶雲見表從風蕭索抱日縈回色涵流渚之虹影雜繞樞之電李嶠為百官賀日抱戴慶雲見表祥光入於九重異氣懸於三象雖復鼎來汾水黃雲冠於北山劔在豐城紫氣沖於南斗無以方斯影響韓愈賀慶雲表五彩五色光華不可遍觀非煙非雲容狀詎能詳述抱日增麗浮空不收既變化而無窮亦卷舒而莫定斯為上瑞實應太平魏曹植吹雲贊天地變化是生神物吹雲吐潤浮氣蓊鬱宋孝武慶雲贊非煙非雲曳紫流光懸華曜藻奄鬱臺堂天文部風楚宋玉風賦夫風生於地起於青蘋之末侵淫溪谷盛怒於土囊之口緣太山之阿舞於松柏之下飄忽淜滂激揚熛怒耾耾雷聲廽穴錯忤蹶石伐木梢殺林莾至其將衰也被麗披離衝孔動楗眴煥粲爛離散轉移故其清涼雄風則飄舉升降乘陵髙城入於深宫邸華葉而振氣徘徊於桂椒之間翺翔於激水之上將擊芙蓉之精獵蕙草離秦蘅槩新夷被荑楊廽穴衝陵蕭條衆芳然後倘佯中庭北上玉堂躋於羅惟經於洞房晉陸沖風賦配無形於大象化萬品於絪緼釋凝潤於黃壤降霈澤於蒼元生無常域潛無定栖擢昧聚發尋虛散歸肆六合以騁邁括毫毛而徘徊引沈性於未萌挫發形於已就宣剛柔之流化導四氣之靈候若乃祝融司節炎精赫奕斂朱脣而長嘯承音響而來薄猥熻熠以盈扉冽纒綿以結幕九域蕩搖區宇揮霍晉湛方生風賦啓慘冬之潛蟄達青春之勾萌因嚴霜以厲威順和澤以開榮故君德喻其靡草風人假以為名及其猛勢將奮屯雲結隂洪氣鬱怫殷雷發音勃然鼓作拂髙陵深天無澄景嶺無停林六鷁為之退飛萬竅為之哀吟亦有飄泠之氣不疾不徐飀飀微扇亹亹清舒王喬以之控鶴列子以之乘虛若乃春惠始和重褐初釋遨步蘭臯遊盼平陌響詠空嶺朗吟竹柏穆開林以流惠竦神襟以清滌軒濠梁之逸興暢方外之冥適齊謝眺擬風賦開翠帷之影藹響行佩之輕鳴揚淮南之妙舞發齊后之妍聲下鴻池而蓮散上雀臺而雲生子雲寂寞叔夜髙張煙霞潤色荃荑結芳出幽澗而泉冽入山户而松涼眇神王於丘壑獨起逺於孤觴斯則幽人之風也闕風賦惟兹風之興寂獨玄妙而無形託萬物以成象隨八卦而立名大則宇宙普洽小則纎毫必經翕翕習習清清泠泠排春樹而如動帶秋蓬而似輕所以炎清順夏徑厲隨冬入金縢而彰聖道通蘭臺而表雌雄飄玉蘂於濃草零圭葉於衰桐候吳範於帷內御列子於空中爾乃下振方輿上飛圓蓋懷壯士之適秦悅髙皇之還沛乍靃靡於衆卉時颼飀於藂籟若乃乘陵髙迥出入幽微搖寶叉於雲髻動環珮於羅衣飄遊絲以隂映舞輕雪以零飛銅烏迎而回翼胡馬聼而思歸乍來復往有聲無象驚塵則白日晝昏卷霧則珠星夜朗蕭瑟長松之下嘹唳髙樓之上送夕鼓而傳音掃晨鐘而成響出幽巷而搖拂擊華堂而清敞浸淫遷延散漫聯綿送清聲於琴上落細粉於忩前乍卷通天之霧時飄覆水之煙勃起則大木斯拔暫息則洪波寂然或動或靜時來歘失聆之兮有聞察之兮無質形乃虛無體兼散逸雖含毫而搦管豈神仙之能述闕風不鳴條賦中林靜拂豈喧許子之瓢圓葉孤翻似動班姬之扇契彼無言靜入桃蹊之上示諸有德潛來草偃之餘暗起軍營之栁取象於銜枚潛飄清廟之松同和於土鼓唐陳章風不鳴條賦嫩葉隨轉柔荑共舒揚絲光於空際惹絮影於春餘夏方慶風過簫賦爾其斷續清空蕭寥永夜歷虛無而輕飇自逺拂松竹而幽韻相借微聞闕下伴金奏之發天庭迥徹雲中疑笙簫之隨羽駕梁沈約詠風詩樓上試朝粧風花下砌傍入鏡光飄粉翻衫好染香度舞飛長袖傳歌共繞梁欲因吹少女還將拂大王庾肩吾詠風詩宋地鷁飛初湘川燕起餘拂煙聊動竹吹薤欲成書蒼崦桐尚在合浦樹應踈陽鳥一轉翅千里定非虛唐董思恭詠風詩蕭蕭度閶闔習習下庭闈花蝶自飄舞蘭蕙生光輝相烏正舉翼退鷁已驚飛方從列子御更逐白雲歸王勃詠風詩肅肅涼景生助吾林壑清驅煙尋澗户卷霧出山楹去來固無迹動息如有情日落山水靜為君起松聲李嶠詠風詩落日正沉沉微風生北林帶花疑鳯舞向竹似龍吟月動臨秋扇松清入夜琴若至蘭臺下還拂楚王襟駱賔王秋風詩紫陌炎氛歇青蘋晚吹浮亂竹搖踈影縈池織細流飄香曵舞袖帶粉泛粧樓不忿君恩絶紈扇曲中秋陳通方春風扇微和詩習習和風扇悠悠淑氣微陽升知候改律應喜春歸池栁晴初拆林鶯暖欲飛川原浮彩翠臺館動光輝泛豔搖丹闕揚芳入粉闈發生當有分枯朽幸因依盧肇風不鳴條詩習習和風至過條不自鳴暗通青律起逺望白蘋生拂樹花仍落經林鳥自驚幾牽蘿蔓動潛惹栁絲輕入谷迷松響開忩失竹聲薰絃方在御萬國仰皇情黃頗詩五緯起祥飇無聲瑞聖朝稍開含露蘂才轉惹煙條密葉應潛變低枝幾暗搖林間鶯欲囀花下蝶微飄初偃緣堤草徐扶逐水苖太平無一事天外奏虞韶公乘億春風扇微和詩麗日催遲景和風扇早春暖浮丹鳯闕韶媚黑龍津淡蕩迎仙仗霏微送畫輪緑搖宫栁散紅待禁花新舞席潛廽雪歌筵暗起塵幸當陽律候解愠及佳辰玉海黃帝風經調長祥和天之喜風也折揚奮厲天之怒風也魏相奏曰日冬夏至則八風之序立萬物之性成應廣莫而修刑則眀庶而施惠待閶闔而藏庶物候不周而謹邊偹天文部雨晉潘尼苦雨賦氣觸石而蒸結兮雲膚合而仰浮雨紛射而下注兮潦波湧而橫流豈信宿之云多乃踰月而成霖瞻中塘之浩汗聼長霤之涔涔始濛瀎而徐墜終滂沛而難禁悲列宿之匿景悼太陽之幽沈雲暫披而驟合雨乍息而亟零旦漎漎以達暮夜淋淋以極明黿鼉遊於門闥蛙蝦戲乎中庭懼二源之并合畏黔首之為魚處者含瘁於窮巷行者歎息於長衢陸雲愁霖賦興介石之膚寸墜崩雲而洪沈谷風扇而悠逺苦雨播而成淫天泱漭以懷慘民嚬蹙而愁霖於是天地發揮隂陽交激萬物混而同波玄黃浩而無質雷憑虛以振庭電凌牖而曜室霤鼎沸以駿奔潦風馳而競疾豈南山之暴隮將溟海之暫溢宋傅亮喜雨賦惟二儀之順動數有積而時偏墊襄陵於唐籍戚雲漢於周篇匪叔葉之或遘在盛王其固然伊元嘉之初載肇休明於此年懿玉燭之方熙愠積陽之獨愆涸涼泉於井谷委嘉穎於中田嗟吾皇之翼翼悵臨朝而輟娛踵沖謙於禹湯協至誠於在余且東作之未晏庶雨露之夙濡遵懸子之徙㕓尤魯侯之焚巫祗桑林之六禱修季宰之再雩誠在幽其必貫感何逺而不孚聆晨鸛於髙垤候宵畢於天隅發曾雲於觸石晦重陽於八區春霆殷以逺響興雨霈而載塗灑豐浸於中疇覃餘潤於嘉蔬殷嗇人於災畝衍將繁於中衢嗣良頌於多稌兆嘉夢於維魚梁張纘秋雨賦甘泉集而溟溟油雲興而漠漠溫飇革於早暮炎涼改於今昨乍斜簷而上階或從風而灑幕周小庭而密下泫髙枝而踈落渌池泛淡員波鯈爍低昻弱篠葳㽔叢薄唐明皇喜雨賦仰重華之齊政步文命之彛倫何天道之云逺亦明徴之在人迄中夏而自春遘愆陽而為亢雲重結而復解雨才滴而還障山祠植圭而不答田畯倚耒而怊悵京兆來奏音官撰曲將土龍而矯首請神巫而頓足彼有憑而可舉子何抑而未許恐嵗凶之及人寧天譴於吾身乃潔齋壇墠五精是祠暴立炎赫三日為期上帝臨吾衷誠不欺重泉蒸潤觸石吐滋平雲黯而鋪幕密雨森其散絲無雷無電不震不昡匪疾匪徐乍合乍散泛草泊樹垂珠點露過闕入樓含煙雜霧或噴薄而攢集或淋漓而灌注亂積水之圓文拂微風之斜度寰海浹而康樂畎畝欣而相顧絲管合兮夜將曉芙蓉開兮日未暮原夫雨之為德也無小大之異情無髙卑之不平無華朽之偏潤無臭薰之隔榮喜夫雨之今應也起一言而不舍經纍辰而廣㵼納清隂之浮涼同皓氣之飄灑感作霖於殷命諷其滂於周雅家尚知乎禮節國有望於豐霸小陽臺之神人却大宛之走馬觀雲行而雨施吾何事乎天下張説奉和聖製喜雨賦退象龍之禮禱斥持鷺之貌舞屛翳慙其廢職祝融悔其遷怒山泱漭而出雲天雱𩃱而下雨速一言而感應尅三日而周溥氣滃靄以黭黮聲颯灑以蕭條璀如銀漢之屑落散似珠泉之噴澆街㕓漫其潢潦臯壤萋其緑苖舒四溟之清潤卷六合之煩囂咸澡骨於神液共歡心於聖朝借如五月有梅雨之名三春有榖雨之氣越人以泥牛待沃胡土以賣龍求費出員嶠而石香入成都而酒味彼偏方與小節非大人之所貴復有送地祇於鬱島迎海后於葛川疾雷碎其山裂走電曄其海燃天子作愁霖之賦詞人綴苦雨之篇墻屋壞於倒井黍稷沈於下田乃凶祲之不令曷休徴之有焉請言瑞雨之可喜也協氣交泰嘉生是賴湛覃而不溺衍溢而無害東漸出日之表西被無雷之外南窮火鼠之譯北盡燭龍之會天文則雲漢昭回王澤則江河滂霈雖欲談天而窺管孰知堯德之為大韓休奉和聖製喜雨賦天垂貫斗之雲神召離星之月有淹淒淒南山朝隮林鳴隂鳥澗隱晴霓九光之霞冠於雲日五色之氣映於巖溪始攢團而未下終颯灑而俱齊若乃拂珠箔含綺疏微霧氣於金掌糅香煙於玉除下碧雲而隂合滴銅池而響餘君王乃倚雲閣憑雨殿臨清署奏繁薦欣大德之在生知上靈之有眷徐安貞奉和聖製喜雨賦拂瑶席兮列神座藉白茅兮推聖心却華蓋而特立當赫曦之正臨如泰嶽之朝下似陽臺之暮歸林籞增飾城池共色八水青田千門紫極洗原隰於龍鱗拂甍標於鳯翼伊萬物之同潤况油油之黍稷匝寰海而為期指咸林而一息賈登奉和聖製喜雨賦其始至也歷亂希微霧雜煙霏其少進也湛覃凌厲泉飛飇逝驚碎滴於瑶池噴懸流於錦砌傳聲竹樹之末濯色菱荷之際沈瑱賀雨賦濯上林之靃靡漲昆明之瀾汗驟繁響於闕庭浮清風於樓觀玄澤優而霽止晴光炳兮澄渙奔餘潦於回塘挂晴虹於霄漢阡陌條暢而增綺黍稷芬榮而若換盧照鄰秋霖賦覽萬物兮竊獨悲此秋霖風橫天而瑟瑟雲覆海而沉沉居人對之憂不解行客見之思已深若乃千升埋煙百㕓涵潦青苔被壁緑萍生道於時巷無馬迹林無鳥聲野隂霾而自晦山幽曖而不明長塗未半茫茫漫漫莫不埋輪據鞍銜悽茹歎借如尼父去魯圍陳畏匡將飢不爨欲濟無梁問長沮與桀溺逢漢隂與楚狂長風櫛而雨沐永悽悽以遑遑及夫屈平既放登髙一望湛湛江水悠悠千里泣故國之長秋一作楸見玄雲之四起嗟夫子卿北海伏波南川金河别雁銅柱辭鳶關山天骨霜露凋年眺窮隂兮斷地看積水兮連天别有東國儒生西都才客屋漏鉛槧家虛甔石茒棟淋淋蓬門寂寂蕪碧草於園徑聚緑塵於庖甓玉為粒兮桂為薪堂有琴兮室無人抗髙情以出俗馳精義以入神論甚一作有能鳴之雁書成已泣之麟覩皇天之淫溢孰不隅坐而含嚬已矣哉若夫繡轂銀鞍金杯玉盤坐卧珠璧左右羅紈流酒為海積肉為巒視襄陵而昏墊曾不輟乎此歡豈知乎堯舜之臞瘠而孔墨之艱難梁庾肩吾從駕喜雨詩西嶽浮樽挂東皇事浴蘭赦詔還京兆歸神出灌壇濕風含酒氣隂雲助麥寒典農欣受職治粟喜當官復此隨車雨民人知可安周庾信和李司録喜雨詩純陽實久亢雲漢乃昭回臨河沉璧玉夾道畫龍媒離光初繞電震氣始乘雷海童還碣石神女向陽臺雲逐魚鱗起渠隨龍骨開崩沙雜水去卧樹擁槎來嘉禾雙合頴熟稻再含胎屬此欣膏露逢君摛掞才愧乏瓊將玖無酬美且偲梁劉孝威和太子春林晚雨詩雲樹交為密雨日共成虹雷舒長男氣枝搖少女風葉珠垂滴水簷繩下溜空蝶濡飛不揚花沾色更紅明離信養德能事畢春宫誰堪偶鳯吹惟有浮丘公劉孝威望雨詩清隂蕩暄濁飛雨入階廊瞻空亂無緒望霤耿成行交枝含曉潤雜葉帶新光浮芥離還聚沿漚滅復張浴禽飄落毳風荇散餘香瓊鈎挂綃幕象簟列華床侍童拂羽扇厨人奉濫漿寄言楚臺客雄風詎獨涼隋王胄雨晴詩初晴物候涼反景照山莊殘虹低飲澗新溜上侵塘風度蟬聲逺雲開鴈路長唐虞世南幽山雨後應令詩肅城臨上苑黃山邇桂宫雨歇連峯翠煙開竟野通排虛翔戲鳥跨水落長虹日下林全暗雲收嶺半空水泉鳴石澗地籟響巖風虞世南發營逢雨應詔詩豫遊欣勝地皇澤乃先天油雲隂御道膏雨潤公田隴麥霑如翠山花濕更燃稼穡良所重方復悅豐年李嶠雨詩西北雲膚起東南雨足來靈童出海見神女向山回斜影風前合圓文水上開十旬無破塊九土信康哉李嶠晚秋喜雨詩積陽纒首夏隆旱屆徂秋炎威振皇服歊景暴神州氣滌朝川朗光澄夕照浮草木委林甸禾黍悴原疇國懼流金眚人深懸磬憂紫宸兢履薄丹扆念推溝望肅壇場祀寃申囹圄囚御車遷玉殿薦菲撤瓊羞濟窘邦儲發蠲窮井賦優服間雲驥屏冗術土龍修睿感通三極天誠貫六幽夏祈良未擬商禱詎為儔穴蟻貞符應山蛇毒影收騰雲八際滿飛雨四溟周聚靄籠仙闕連霏繞畫樓旱陂仍積水涸沼更通流晚穗萎還結寒苗瘁復抽九農歡嵗阜萬宇慶時休野洽如坻詠途喧擊壤謳幸聞東李道欣奉北場遊張九齡和崔尚書喜雨詩積陽雖有悔經月未為災上念人天重先祈雲漢回仁心及草木號令起風雷照爛隂霞上交紛瑞雨來三農被黍稷四逺屏氛埃池溜因添滿林芳為灑開聼中聲滴瀝望處影徘徊惠澤成農嵗昌言發上才無論驗石鼓不是御雲臺直賴皇恩浹崇朝遍九垓蘇味道單于川對雨詩飛雨欲迎旬浮甘已送春還從濯枝後來應洗兵辰氣合龍祠外聲過鯨海濵伐邢知有屬已見靜邊塵溫庭筠春初對暮雨詩淅瀝生叢篠涳濛泫網軒暝姿看逺樹春意入塵根點細飄風急聲輕入夜繁雀喧爭槿樹人靜出蔬園瓦濕光先起房深影易昏不應江上草相與滯王孫溫庭筠秋雨詩雲雨鳥行滅池涼龍氣腥斜飄看碁簟踈灑望山亭細響鳴林葉圓文破沼萍秋隂杳無際平野但𡨕𡨕薛能春雨詩電濶照潺潺驚流往復還逺聲如有洞迷色似無山利物乾坤內隨風竹樹間靜思來朔漠愁望滿紫關迸濕消塵慮斜飄觸病顔誰知草茒徑沾此尚虛間魏知古奉和春日途中喜雨詩皇遊向洛城時雨應天行麗日登巖送隂雲出野迎濯枝林杏發潤葉渚蒲生絲入綸言喜花依錦字明微臣忝東觀載筆佇西成杜甫春夜雨詩好雨知時節當春乃發生隨風潛入夜潤物細無聲野徑雲俱黑江船火獨明曉看紅濕處花重錦官城盧綸客舍苦雨即事寄錢起郎士元員外詩積雨暮凄凄羇人狀鳥栖響空宫樹接覆水野雲低穴蟻多隨草巢蜂半墜泥繞池墻蘚合擁溜瓦松齊舊浦平如海新溝曲似溪壞欄留衆蝶欹棟上羣雞莠盛終無實槎枯遂有荑緑萍藏廢井黃葉隱危隄閭里觀將絶朝昏望亦迷不知霄漢裏何路可相携韓愈雨中寄張博士籍侯主簿喜詩放朝還不報夜半踏泥歸雨慣曽無節雷頻自失威見墻生菌遍憂麥作蛾飛嵗晚偏蕭索誰當救晉飢姚合酬王疇協律夏中苦雨見寄詩銀漢波瀾溢經旬雨不休細聼宜隔牖逺望憶髙樓風急飄還斷雲低落更稠走童驚掣電飢鳥啄浮漚絲網張空際珠繩落瓦溝青蛙多入户潢潦欲勝舟雷怒疑山破池渾似土流灰人漫禳猒水馬恣沉浮廣陌應翻浪貧家恐作湫陽精藏不耀隂氣盛難收逺色重林暮繁聲四壁愁望晴思見日防冷欲披裘枕膩眠還懶車羸出轉憂琴書涼簟靜燈燭夜忩幽樹暗蟬吟咽巢傾燕語愁薄煙凝竈額荒草覆墻頭天上那能問龍邊本不求下床先杖屐汲井抵瓢甌逺思成涯涘佳期念阻修殷勤寄新什清韻益難酬魏曹植告咎文上帝有命風伯雨師夫風以動氣雨以潤時隂陽協和庶物以滋元陽害苖暴風傷條伊周是遇在湯是遭桑林既禱慶雲克舉偃禾之復姬公走楚况我皇德承天統民禮敬川嶽祇肅百神享兹元吉釐福日新至若炎旱赫羲飇風扇發嘉卉以萎良木以拔何谷宜填何山應伐何靈宜論何神宜謁於是五靈振竦皇祇赫怒招搖警怯攙搶奮斧河伯典澤屏翳司風右呵飛亷顧叱豐隆息飇遏暴元敕華嵩慶雲是興效厥年豐遂乃沈隂坱北甘澤微微雨我公田爰及余私黍稷盈疇芳草依依靈禾重穗生彼邦畿年登嵗豐民無餒飢宋孝武帝祈晴文幽明失序就隂則滯連雨霖淫注而不替潤既違時澤而非惠幸輟霖而吐景權停雲而斂翳照鸞輅於大郊光龍旗於田際耒耜得施黍稷獲藝增髙廪於嘉年登十千於兹嵗唐李商隱為舍人絳郡公鄭州禱雨文旱魃為虐應龍不興困杲日於詩人苦密雲於易象生物斯瘁民食攸囏叨此分憂俯慙無政爰求其侣虔禱隂靈減哺表勤褰帷引咎伏乞下通滎播上導天潢合為膏澤之原用息藴隆之患其於效信敢或逡巡暴露託詞焦勞結慮泉間候氣樹杪占風惟望玉女之披衣敢駭商羊之鼓舞又賽舜廟文憑離掣電跨巽揚風布沾渥於九臯起焦枯於一瞬又賽荔浦縣城隍神文無煩管輅之占不待欒巴之噀又賽白石神文果能愛我大田貺余膏澤不俟于公之折獄無煩洛令之曝身折集作雪又賽古欖神文神能感氣蜧泉傳祥鸛垤使宋生抒賦始悅於雄風髙士讀書忽驚於暴雨化太甚旱為大有年又祭全義縣伏波廟文雲興柱礎電繞墻藩何煩玉女之投壺方聞天笑不待樵人之取箭已見風回唐崔融為百官賀雨請復膳表臣聞太平之代天地合而流津至德之時隂陽和而布澤所以三農滋植百物阜安伏惟陛下寶命絪緼玄期肹蠁包渾元而建極宅造化而開陛德教布濩仁聲洋溢增髙益厚已修中嶽之儀順時班令更緝正陽之禮近以少愆甘澍親發至誠懷宋景之一言採殷湯之六事德音才降靈心允協捧瑶緘而風起迎寶字而星流雲不崇朝復三千之藥草雨必以夜通百億之江河遍髙下而同霑在公私而並及陳留雨榖譬此非多櫟陽雨金方斯未重邦國延有年之慶黎元罷望嵗之憂臣等伏願陛下凝神保和頤情養夀復鮮魚之舊膳進鶴鼎之常羞使芝英有駐液之期蓮蒲知送涼之地則光天之下率土之濵莫不欣戴李嶠賀雨表郊原吐潤品彚含蘇麥壟纎莖已擢兩岐之秀黍田香粒方滋合穎之苖凡在羣生不勝幸甚然後知御雲臺而占繇幸洛陽而録囚蓋其渺小曽何髣佛栁宗元為王京兆賀雨表衆靈受職薈蔚且隮於南山百谷仰榮滂霈遂沾於東作睿謨朝降膏澤夕周知天人之已交識隂陽之不測然則周王徒勤於方社殷帝虛美於桑林豈若無災而早圖未禱而先應化超前聖道貫重玄遍野同歡傾都相慶蘇頲賀雨狀德音朝降才出於巖廊膏澤晚飛已周於城闕麥宜早秀日助晴光禾欲潤成嵗知秋穫惟皇建極天且弗違用爾作霖臣復何補既叶夢魚之吉預占鳴鶴之期梁簡文帝謝敕示苦旱詩啓九年之水不傷堯政七載之旱無纍湯朝嵗功則公田已修農勤則我庾惟億今者亢陽已來為日未久將恐督郵不黜失在汝南之守暴胔未收無傷河南之尹而載勞興居仰發歌咏無愛圭璧有事山川菲飲食矣加之以撤膳焉中夜不寐加之以申旦焉此唐虞之所闕如軒頊之所不逮魏應璩與岑文瑜書沙礫銷鑠草木焦卷處涼臺而有鬱蒸之煩浴寒水而有灼爛之慘宇宙雖廣無隂以憩雲漢之詩何以過此土龍矯首於玄寺泥人鶴立於闕里修之歷旬靜無徴效明勸教之術非致雨之備也知恤下民躬自暴露拜起靈壇勤亦至矣昔夏禹之解陽紆殷湯之禱桑林言未發而水旋流辭未卒而澤滂沛今者雲既積而復散雨垂落而復收得無賢聖殊品優劣異姿割髮宜及膚翦爪宜侵肌乎周征殷而年豐衛伐邢而致雨善否之應甚於影響未可以為不然也宋播芳大全謝雨青詞敢謂叢霄之應曽無浹日之淹月離畢以示期山出雲而效職風霆下擊澗壑交流井汲如初家享一瓢之樂粟儲可繼士寬半菽之憂天文部雪宋謝惠連雪賦嵗將暮時既昏寒風積愁雲繁梁王不悅遊於兔園乃置旨酒命賔友召鄒生延枚叟相如末至居客之右俄而微霰零密雪下王乃歌北風於衛詩詠南山於周雅授簡於司馬大夫曰抽子祕思騁子妍辭侔色揣稱為寡人賦之相如於是避席而起逡巡而揖曰臣聞雪宫建於東國雪山峙於西域岐昌發詠於來思姬滿申歌於黃竹曹風以麻衣比色楚謡以幽蘭儷曲盈尺則呈瑞於豐年袤丈則表沴於隂德雪之時義逺矣哉請言其始若乃玄律窮嚴氣升焦溪涸湯谷凝火井滅溫泉氷沸潭無涌炎風不興比户墐扉裸壤垂繒於是河海生雲朔漠飛沙連氛纍靄掩日韜霞霰淅瀝而先集雪紛糅而遂多其為狀也散漫交錯氤氲蕭索藹藹浮浮瀌瀌奕奕聯翩飛灑徘徊委積始緣甍而冒棟終開簾而入隙初便娟於墀廡末縈盈於帷席既因方而為圭亦遇圓而成璧眄隰則萬頃同縞瞻山則千巖俱白於是臺如重璧逵似連璐庭列瑶階林挺瓊樹皓鶴奪鮮白鷴失素紈袖慙冶玉顔掩嫮若乃積素未虧白日朝鮮爛兮若燭龍銜耀照崑山爾其流滴垂氷緣霤承隅粲兮若馮夷剖蚌列明珠至夫繽紛繁鶩之貌皓汗皎潔之儀回散縈積之勢飛聚凝曜之竒固展轉而無窮嗟難得而備知若乃申娛玩之無已夜幽靜而多懷風觸楹而轉響月承幌而通暉酌湘吳之醇酎御狐狢之兼衣對庭鵾之雙舞瞻雲鴈之孤飛折園中之萱草摘階上之芳薇踐霜雪之交積憐枝葉之相違馳遙思於千里願接手而同歸鄒陽聞之悶然心服有懷妍唱敬接末曲於是乃作而賦積雪之歌歌曰攜佳人兮披重幄援綺衾兮坐芳褥燎薰爐兮炳明燭酌桂酒兮揚清曲又續而為白雪之歌歌曰曲既揚兮酒既陳朱顔酡兮思自親願低帷以昵枕念解佩而褫紳怨年嵗之易暮傷後會之無因君寧見階上之白雪豈鮮耀於陽春歌卒王乃尋繹吟玩撫覽扼腕顧謂枚叔起而為亂亂曰白羽雖白質以輕兮白玉雖白空守貞兮未若兹雪因時興滅玄隂凝不昧其潔太陽耀不固其節節豈我名潔既我貞憑雲升降從風飄零值物賦象任地頒形素因遇立汚隨染成縱心浩然何慮何營唐李子卿聚雪為小山賦皓月旁射兮清虛上騰間階之下兮聚雪崚嶒歎此雪兮具知其有興有滅故為山也庶期乎不騫不崩始也散而從風類元氣之無象今也結而為阜若胚渾之初凝五嶺髙標三峰逺跖昔則心往斯焉目擊千里之勢存乎袤丈萬仞之容見乎盈尺皓曜起乎岑嶂曈曨生乎樹石峽裏則秋月長懸封中則曉雲猶白夫其以近則逺以逺則親玉林不夜瑤草先春照寒景而逾潔拂朝霞而更親嶺上􅀈襂作緱氏之仙鶴巖中綽約寫姑射之神人樵傍壑而踈隱徑臨崖而絶鄰至若霽日生暖融風變朔危容半頽儻遇嵇康之醉片影初墜謂入郤詵之幄因降髙而就卑遂散雕而為朴沍寒始徑猶可持而斫見晛則消不可繫而握因知夫色不久鮮物無常堅始則有於無有今乃然於自然觀陵谷之推易信人世之徂遷亦何必怪桑田之變海都邑之成川梁任昉和謝朏花雪詩土膏候年動禎雪表辰暮散花似浮玉飛英若揔素東序皆白珩西雍盡翔鷺山經陋密榮騷人貶瓊樹何遜詠雪詩凝階夜似月拂樹曉疑春蕭散忽如盡徘徊已復新陳徐陵詠雪詩瓊林玄圃葉桂樹日南花豈若天庭瑞輕雪帶風斜三農喜盈尺六出舞崇華明朝闕門外應見海神車張正見玄都觀春雪詩同雲遙映嶺瑞雪近浮空拂鶴伊川上飄花桂苑中影麗重輪月飛隨團扇風唐太宗校獵義成喜逢大雪率題九韻以示羣臣詩北風勇士馬東日華組練觸地銀麞出連山縞鹿見月兔落高矰星狼下飛箭既欣盈尺兆復憶磻溪便唐太宗喜雪詩碧昏朝合霧丹卷暝韜霞結葉繁雲色凝瓊遍雪花光樓皎若粉映幕集疑沙泛栁飛飛絮粧梅片片花照璧臺圓月飄珠箔穿露瑤潔短長階玉叢髙下樹映桐圭纍白縈峰蓮抱素斷續氣將沉徘徊嵗云暮懷珍愧隱德表瑞佇豐年蕊間飛禁苑鶴處舞伊川倘詠幽蘭曲同歌黃竹篇又許敬宗奉和詩嵰州表奇貺閟竹應遐巡何如御京洛流霰下天津忽若瓊林曙俄同李徑春姑峰映仙質郢路雜歌塵伏檻觀花瑞稱觴慶冬積飄河共瀉銀委樹還重璧連山分掩翠綿霄逺韜碧千里遍浮空五軔咸淪迹機前暉裂素池上侔凌波騰華承玉宇凝照混金娥是日松筠性欣奏柏梁歌李適奉和遊禁苑幸臨渭亭遇雪應制詩長樂喜春歸披香瑞雪飛花從銀閣度絮繞玉窗飛寫曜銜天藻呈祥拂御衣上林紛可望無處不光輝張説奉和野次喜雪應制詩寒更玉漏催曉色幄前開泱漭雲隂積氛氲風雪回山如銀作甕宫見璧為臺欲驗豐年象飄颻仙藻來駱賔王雪詩龍雲玉葉上鶴雪瑞華新影亂銅烏吹光銷玉馬津含輝朗素篆隱迹奉祥輪幽蘭不可儷徒自繞陽春韓愈春雪詩觀雪乘清旦無人坐獨謠拂花輕尚起落地暖初消已訝凌歌扇還來伴舞腰灑篁留密節著栁送長條入鏡鸞窺沼行天馬度橋遍階憐可掬滿樹戲成搖江浪迎濤日風毛縱獵朝弄間時細轉爭急忽驚飄城險疑懸布砧寒未搗綃莫愁隂景促夜色自相饒韓愈詠雪贈張籍詩秪見縱橫落寧知逺近來飄颻還自弄歷亂竟誰催座暖消那怪池清失可猜坳中初蓋底垤處遂成堆慢有先居後輕多去却回度前鋪瓦壠奔發積墻隈穿細時雙透乘危忽半摧舞深逢坎井集早值層臺砧練終宜搗階紈未暇裁城寒粧睥睨樹凍裹莓苔片片勻如翦紛紛碎若捼定非燖鵠鷺真是屑瓊瑰緯繣觀朝萼冥茫曯曉埃當窗恆懍懍出户即皚皚潤野榮芝菌傾都委貨財娥嬉華蕩漾胥怒浪崔嵬磧迥疑浮地雲平想輾雷隨車翻縞帶逐馬散銀杯萬屋漫汗合千株照耀開松篁遭挫抑糞壤獲饒培隔絶門庭邃擠排階級才豈堪禆嶽鎮強欲效鹽梅隱匿瑕疵盡包羅委瑣該誤雞宵厄喔驚雀暗徘徊浩浩過三暮悠悠匝九垓鯨鯢陸死骨玉石火炎灰厚慮填溟壑髙愁㨖斗魁日輪埋欲側坤軸壓將頽堰似長蛇擾陵猶巨象豗水官夸傑黠木氣怯胚胎著地無由卷連天不易推龍魚冷蟄苦虎豹餓號哀巧借奢豪便専繩困約災威貪凌布被光肯離金罍賞玩捐他事歌謠放我才狂教詩硉矹興與酒陪鰓惟子能諳耳諸人得語哉助留風作黨勸坐火為媒雕刻文刀利搜求智網恢莫煩相屬和傳示及提孩釋無可和賔客相國雪詩近臘千巖白迎春四氣催雲隂連海起風急度山來盡日隨堤絮經冬越嶺梅艷疑歌處散輕似舞時回道藴詩傳麗相如賦騁才霽添松篠媚寒積蕙蘭猜暗漲宫池水平封輦路埃燭龍初照耀巢鶴乍徘徊簷日瓊先挂墻風粉旋摧五門環玉壘雙闕對瑶臺綺席凌寒坐珠簾逹曙開靈芝霜下秀仙桂月中栽卷幌書千帙援琴酒百杯垂休編太史呈瑞表中台皓夜迷三徑浮光徹九垓兹辰是豐嵗歌詠屬良哉溫庭筠雪詩踏緊寒聲澀飛交細點重圃斜人過迹階靜鳥行蹤李洞雪詩正繁秦甸暖漸厚楚宫飢凍把分泉澀光凝二閣癡踏遺蘭署迹聽起石門思用表豐年瑞無令掃玉墀張九齡立春日晨起對積雪詩忽對林庭雪瑶花處處開今年迎氣始昨夜伴春回玉潤窗前竹花繁院裏梅東郊齋祭所應見五神來李白淮海對雪贈傅靄詩朔雪落吳天從風渡溟渤海樹成陽春江山皓明月興從剡溪起思繞梁山發寄君郢中歌曲罷心斷絶錢起和王員外雪晴早朝詩紫微晴雪帶恩光繞仗偏隨鴛鷺行長信月留寧避曉宜春花滿不飛香獨看積素凝清禁已覺輕寒讓太陽題柱盛名兼絶唱風流誰繼漢田郎白居易春夜喜雪寄王二十二詩夜雪有佳趣幽人出書帷微寒生枕席輕素對階墀坐罷楚絃曲起吟班扇詩明宜滅燈後靜愛卷簾時忩引曙色早庭消春氣遲山隂應有興不卧待徽之李衢都堂試貢士日慶春雪詩錫瑞來豐嵗旌賢入貢辰輕搖梅共笑飛嫋栁知春繞砌封瓊屑依階噴玉塵蜉蝣吟更古科斗映還新鶴吹迷難辨氷壺鑒易真因歌大君德率舞詠陶鈞庾敬休春雪映早梅詩清晨凝雪彩新候變庭梅樹愛春榮遍忩驚曙色催寒光添粉壁積潤履青苔分眀六出瑞隱映幾枝開聞笛花疑落揮琴興轉來曲成非寡和長使思悠哉施肩吾早春殘雪詩春景照林巒玲瓏雪影殘井泉添碧甃藥圃洗朱欄雲路迷初醒書堂映漸難花分梅嶺色塵減玉階寒逺稱棲松鶴髙宜點露盤佇逢春律後隂谷始堪看唐常袞賀雪表重隂益固應水澤腹堅之時積潤潛通迎土膏脈起之候琪樹上林粲爛現六花之瑞瓊田茂苑繽紛冝五榖之精李嶠賀雪表層隂候律豐澤順時薈蔚方興起泰山之膚寸參差荐委自平地而盈尺銅階皓其如素金隰紛其遂滿縈樓栖檻疑璧臺之九重落絮飄花似芳林之二月豈惟洛神呈象來舞帝宫故亦海騎相趨下朝金闕東臯欣其望嵗南史慶而書祥萬寶登秋居然可咏雙銅協唱即事非遙張九齡觀御製喜雪篇陳誠狀臣聞食者萬姓之命雪為五榖之精兆且見於祈年律既和於言志聖心昭感天瑞合符豈比夫漢詠白雲但嗟歡樂周歌黃竹徒事巡遊而已哉臣等仰望昭回莫知逺近幸均生植同是霑濡况臣忝在樞衡無能翼亮聞罪已之義若置氷谷循忘軀之節冀益涓塵韓愈為宰相賀雪表深念黎氓屢形詞旨神監昭達皇情感通春雲始繁時雪遂降寶豐穰之嘉瑞銷癘疫於新年東作可期南畝有望此皆陛下與天地合德視人如傷每發聖言則獲靈貺見天人之相應知朝野之同歡宋吕祖謙代宰臣以下賀雪表皇極之主疇既敘於時寒豐年之冬兆先占於積雪繽紛六羃賁冒九圍綏靜嘉師財成元化嚴凝西北斂義氣以方升疆理東南瞻同雲之已合瑞呈禹甸喜溢堯衢臣等幸際昌辰欣逢休應授簡而居客右雖慚梁苑之辭為樂而與民同請上齊宫之對晉羊孚雪贊資清以化乘氣以霏遇象能鮮即潔成暉天文部露唐李鐸秋露賦故色貴含秋光宜泛曉既騰文於地上復垂容於筆杪煙淡彩而的的月籠華而皛皛豈只華山之際童子受於囊中金莖之端仙掌承於雲表况乎胥臺發色軒丘降祥紅蘭受而彌潔緑葵含而轉芳初益巨海終晞太陽既隨時以隱見還任物以行藏張彥勝露賦兆自元氣生於太虛巨人飲之而不死上古吮之而穴居天無雲兮珠的皪野有草兮玉扶踈寫蟲鳥兮為篆懷蛟龍兮著書河洛建都兮氣均風雨甘泉築館兮名亞儲胥或泛灧池臺或葳蕤竹柏鶬鶊鳴兮色紫鴻鴈來兮光白白行簡五色露賦惟上天之隂隲至誠感通靈液肇吉能分五色之異以候一時之出祥風爍乎茂草瑞景晞乎朝日玄黃雜錯綴玉樹以相鮮丹紺交輝映金盤而乍失既能偶聖以呈貺寧有普天之不率飛液花塢流光蕙圃青熒玉綴燦爛珠吐露藥訝仙童捧來潤石疑女媧欲補花禽拂著宛如陳寶之雞平野染成煥若徐方之土何必徴畢勒之言以為國泰驗吉雲之説乃辨時康喜氣度關徒虛語耳雲光出水曷足方之狀天酒類神漿超絳雪掩玄霜唐駱賔王露詩玉關寒氣早金塘秋氣歸泛掌光逾淨添荷滴尚微變霜凝曉液承月委圓輝别有吳臺上應濕楚臣衣董思恭露詩夜色凝仙掌晨甘下帝庭不覺九秋至逺向三危零蘆渚花初白葵園葉尚青晞陽一灑惠方願溢滄溟李正封露詩霏霏靈液重雲表無聲落沾樹急玄蟬灑池凄皓鶴流塵清逺陌飛月澄髙閣宵潤玉堂簾曙寒金井索佳人比珠泪坐感紅綃薄梁沈約謝賜甘露啓臣往年經見不過霑條而已時或凝結才若輕霧未有玉聚珠聯光粲若是實繇積仁上通冥德下降故能委華霄極氛被後雕蕭欣謝賜甘露啓聖德至大和氣茂逺是以神液甘流靈滋膏被求之前代鏡諸中古或降邑都尚君臣動色遐邇趨慶未有發瑞殿庭呈祥玩矚視聼罕聞祥符絶代梁褚洊芳林園甘露頌福以德彰慶沿業皎矧兹嘉露因祥特表翻潤夕星流甘月曉竒越雕氛珍逾素鳥至道伊融大化期肇惟此大化實感天眷降液丹墀飛津綺殿九服依風八荒改面敢述蒙詞或旌舞忭北齊邢邵甘露頌歷選列辟逖聼前聞三才易統五運相君皇極攸序庶類以分乃忠乃敬或質或文一赫矣景命蒸哉上聖大德莫名至道無競川停嶽跱雲臨水鏡望日齊明瞻天比映二功深微禹業隆作周英華內積文教外修廣輪四海提封十洲紫川北注赤水南流三宸居兩楹恭已萬國聖敬日躋皇猷允塞禮有大成樂無慙德用天之道順帝之則四政平民裕嵗稔時和九功惟敘九敘惟歌風輪輾漢毛羽沉河玉龜出沼鳴鳯在阿五休徴屢動感極回天流甘委素玉潤氷鮮蜜房下結珠琲上懸布濩林野灑散旌旃六日月已明宇宙已廓鼓缶成詠挹水為樂以為玄黃猶參沃若取慰天壤用忘溝壑七隋盧思道賀甘露表河榮洛變授祉於勳華玄玉素鱗降靈於湯武其間微禽弱草改狀移形夜宿朝雲呈光動色皆以照臨下土發揮帝載千歲一致隔代同符伏惟陛下上總天維傍握河紀持欽翼之小心纂升平之大業萬靈翹首應三台以西巡兩儀貞觀乘六氣而東指雲卿既出還聞百辟之歌河清可俟實得萬人之歎而上玄乃顧神物荐委飛甘灑潤玉散珠連昔魏明仙掌竟無靈液漢武金盤空望雲表豈若神漿可挹流珠九户之前天酒自零凝照三階之下斯實曠代禎符前王罕遇休矣美矣皇哉唐哉臣等並邀昌運俱沐玄造驟聞祕祉亟睹冥貺振鱗撫翼空馳魚鳥之心瘞玉編金方待云亭之后唐栁宗元禮部賀甘露表太和潛逹閟瑞克彰發於天霄特降宫樹朝光初燭方湛湛而不晞晨景轉炎更瀼瀼而未已綴葉而珠璣積耀盈器而氷玉呈姿芳襲椒蘭味兼飴醴然則零其庭而著異紀於年以標竒徒矜往辰孰並茲日崔融為皇太子賀甘露表五材並用天地合而凝津四序迭來隂陽和而灑潤望之成雪若墜崑玉之山嘗之則甘似降軒轅之國薦河圖而升洛範日載祥編過竹院而憩芝臺宵零瑞液爾其塗塗被物滴滴流膏承以玉杯凌漢宫而擅美獻之瓊爵掩魏殿而稱珍可以致靈仙之竒可以延帝王之夀孝經援神契未足敘其和平春秋運斗樞不能議其清濁梁張率霜詩駟見視乾度鐘鳴測地機秋冬交代序申霜白綏綏原野生暮靄階墀散夕霏徘徊總嚴氣悵望淪清輝平臺寒月色池水愴風威凝隂同徂夜遞鴈獨歸飛縈叢亂蕪絶繁林紛已稀貞松非受令芳草徒具腓唐蘇味道霜詩金祗暮律盡玉女暝氛歸孕冷隨鐘徹飄華逐劔飛帶日浮寒景乘風進晚威自有貞筠質寧將庶草腓天文部雷電晉李顒雷賦伊青陽之肇化兮陶萬殊於天壤結鬱蒸以成雷兮鼓訇稜之逸響應萬風以相薄包羣動而為長乘雲氣之鬱蓊兮舒電光之炯晃驚蟄於始作兮懼逺邇之異象爾其發也則騰躍噴薄砰磕隱天起偉霆於霄際催徑木於巖巔驅宏威之迅烈若崩嶽之填填斯實陽臺之變化固大壯之宗源也若乃駭氣奔激震響交搏濆淪隱轔崩騰磊落來無轍迹去無阡陌君子恐懼而修省聖人因象以制作審其體勢觀其曲折輕如伐鼓轟若走轍嶪猶地傾繣似天裂比五音而無當校衆響而稱傑於是上穆下明順天承法戒刑獄以致亨孰非善而可攝正震體於東方立不易之恆業豫行師而景奮解宥過而人協若夫洪細靡常興廢難克殷其山陽勸義崇德起五龍於河始戕武乙於渭北啓周成之沖昧罰展氏之凶慝雖通塞於萬形猶違虛而守盈肆大夏而有烈奮嚴冬而弗經保恬靜以處順乃上善以屏營夫有往而為閎若太音之希聲顧凱之雷電賦太極紛綸元氣澄練隂陽相薄為雷為電擊武乙於河而誅戮之罰明震展氏之廟而隱慝之誅見是以宣尼敬威忽變夫其聲無定響光不恆照砰訇輪轉倐閃羅曜若乃太隂下淪少陽初升蟄蟲將啓動靈先應殷殷徐振不激不憑豈隱隱之虛應乃違和而傷生昭王度之失節見二儀之幽情至乃辰開日明太清無靄靈眼揚積以瞿煥壯鼓崩天而砰磕陵堆訇隱以待傾方地嶪崿其若敗蒼生非悟而喪魂龍鬼失據以顛沛光驚於泉底聲動於天外及其灑北斗以誕聖震昆陽以伐違降投鹿以命桀島雙濆而橫尸倒驚檜於霄際摧騰龍於雲湄烈天地以繞映帷六合以動威在虛德而卷舒謝神艷之難追又賦若夫子午相乘水旱太零仲冬奮發代雷先行林鐘統節溽暑煙煴星月不朗衣牀若焚爾乃清風前颯蕩濁流塵豐隆破響列缺開雲當時倦容廓焉清新豈直驚安竦寐乃以暢精怡神天怒將凌赤電先發窺巖四照映流雙絶雷電赫以驚衡山海磕其崩裂天文部虹梁江淹赤虹賦東南嶠外爰有九石之山乃紅壁千里青崿百仞苔滑臨水石險帶蹊自非巫咸採藥羣帝上下者皆斂意焉於是夏蓮始舒春蓀未歇肅舲投渚緩拽江潭正逢巖崖相照雨雲爛色俄而雄虹赫然暈光耀水偃蹇山頂舄奕江湄迫而察之實曰隂陽之氣信可觀也紫霧上河絳氛下漢白日無餘碧雲卷半殘雨蕭索騰光艷爛水學金波石似瓊岸錯龜鱗之崚崚繞蛟色之漫漫俄而赤霓電出蚴蚪神驤曖昧以變依稀不常非虛非實乍滅乍光赩赫山頂照燎水陽雖圖緯之有載曠代識而未逢既咨嗟而躑躅聊周流而從容想番禺之廣澤憶丹山之喬峰騎傅説之一星乘夏后之兩龍彼靈物其詎幾寂火滅而山紅餘形可覽殘色未去曜葳㽔而在草映青葸而結樹昏青苔於丹渚曖朱草於石路霞晃朗而下飛日通曨而上度俯形命之窘局哀時俗之不固定赤舄之易遺乃鼎湖之可慕既以為騂鬐四毳之駕方瞳一角之人帝臺北荒之際弇山西海之濵流沙之野析木之津雲或怪彩煙或異鱗必雜虹霓之氣隂陽之神焉唐閻朝隱晴虹賦洗竒光於暴雨留艷彩於飄風隱顯之情奚爾造化之理何窮若乃碧嶂無雲清江息浪曲折異體低昂殊狀半出髙岊疑蟾魄之孤生全入澄瀾若蛾眉之相向又乃綺忩逺闢錦帳斜褰髣佛天上依稀目前暐兮曄兮既類丹山碧樹之重疊斷兮連兮又似美人綵女之嬋娟天文部天漢唐謝偃明河賦徒觀其粲兮如磋潔兮如磨明月照而不失其素飄風驚而匪揚其波莫測其深含天際之四氣莫度其逺掩人間之衆河及夫嵗入三秋勢直千里度龍駕而容曳構鵲橋而迤邐霞粧星靨知婺女之不如雜珮明璫必姮娥之相似七夕作之以良會羣方於是而仰止固能流不可凖涯不可度既莫見乎端倪亦焉知其厚薄名連地脈影雜天文當霽夕而逾曉凝微雨以暫曛明白可稱則皓如曳練正平可緝亦矗似長雲亘紫極以斜轉橫碧空而中分吐霄光而淡灧含曙色而氤氲將欲問之於槎客如何欲決於嚴君張環秋河賦非碧海之分上即黃河之轉來萬里直繩九霄橫帶奕奕髙影湯湯連瀨透垂簾於户前飛瀑布於雲外黯如平江不動矗似長雲欲銷映東吳而寫練挂南斗而成橋氣象晶明波瀾澒洞泛濫星點紆餘月㺯界黃道而宵迎落青山而曉送雖滔天而作限乃沃日而為節識示盈而必謙恆昏凝而晝滅亦猶靈烏之謝顧兔之缺適足明其卷舒夫何纍乎昭晰鵲填銀而何去人取石而何依盧肇天河賦光連月窟何慙媚以懷珠影照天津豈愧靜而如練至若白榆風徑析木煙秋吹玉葉而將落泛金波而共流皎皛無際闌干自浮渡蟾魄之孤輪不聞濡軌漲鵲橋之逺岸詎見操舟流合璧之輝幾疑沉玉映散金之氣或類披沙王損之曙觀秋河賦孤星迥泛狀清淺之沉珠殘月斜臨似滄浪之垂釣積曙色之牢落涵爽氣之淒清疑曳練而勢逺訝殘虹而體輕古儷府卷一
