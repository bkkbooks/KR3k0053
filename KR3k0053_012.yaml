body:
  text: 古儷府卷十二明王志慶編物類部珍寶梁吳均碎珠賦寶月生焉越浦隨川標魏之美擅楚之賢既登席而趨麗亦綴履而升妍豈銜恩以赴時獨佩皎而騰天瀛淮激電甘海震雷明珠碎矣于川之隈視員流而失轉見折水之亡回謝驪宫之瑞飾粉靈蚌之神胎魏文帝瑪瑙勒賦乃加砥礪刻方為圓沈光內照浮景外鮮繁文縟藻交采接連晉潘尼琉璃碗賦光映日耀圓盛月盈纖瑕罔麗飛塵靡停灼爚旁燭表裏相形凝霜不足方其潔澄水不能喻其清剛堅金石徑勵瓊玉磨之不磷涅之不濁唐仲之玄玉賦振鶴羽以益鮮聳雞冠而增煥匪蒸栗之足侔何純漆之能亂乍騰虹于白氣或見女以青衣山林孕之而含鬱川瀆育之而漣漪復有逍遙人俗髣佛仙府泛醴流膏崇臺結宇飛華崑閬之岫結彩蓬瀛之浦獨孤授韞玉求價賦雪澤膏光隂中之陽工成六器色備五方暢瓘良玉比君子賦融雪華于潛潤洞冰彩而凝清王奉圭明珠賦西山之下隨珠星而隱見東海之上逐明月而虧全故能色奪琉璃光射金玉鮫人泣吳江之際遊女弄漢皋之曲在蜀郡而浮青居石家而自緑去映魏車之裏來還合浦之中垂輕簾而璀璨綴蛛網之玲瓏文魚謝恩將我酬于漢室靈蛇報德將我答于隨侯一丸則鶴贈于噲參九曲乃蟻穿于夫子上見搜神記令狐楚珠還合浦賦上掩星彩遙迷月規粲粲離離與波逶迤乍入潭心時依浦口驚泉客之初泣疑馮夷之始剖發潤洲蘋增輝岸草水容益媚澤氣彌好川實效珍地寧愛寶隱見諒符乎龍躍虧全非繫乎蚌老王季友商丘開泳得明珠賦於是握照乘之珍出重泉之濵星輝耀掌雪彩環身當太陽之益照射衆象而驚新虛白無瑕粲瓊華而納景清規半濕炯氷狀而流津吕穎西域獻徑寸珠賦彼珠之靈積隂之魄稟金氣而堅固韞河潤之耀澤布指而小大無差洞物而纖毫不隔迥夜常滿初月每讓其圓明爽曙欲凝髙星自掩其孤白奪夏璜以為美齊楚璧而積異莫宣卿水懷珠詩長川含媚色波底孕靈珠素魄生蘋末圓規照水隅淪漣冰彩動蕩漾瑞光鋪迥夜星同貫清秋岸不枯江妃思在掌海客亦忘軀合浦當還日恩威信已敷葉季良琢玉成器詩片玉寄幽石紛綸當代名荆人獻始遇良匠琢初成冰映寒光動虹開晚色明雅容看更徹餘響扣彌清自與瓊瑶比方隨掌握榮因知君有用髙價佇連城吳丹玉水記方流詩玉泉何處比四折水文浮潤下寧踰矩居方在上流映空虛碌碌涵白淨悠悠影碎疑衝斗光清耐掩舟圭璋分辨狀沙礫共懷柔願赴朝宗日縈回入御溝又鄭俞詩積水棊文動因知玉産幽如天涵素色侔地引方流潛潤滋雲起英華射浪浮魚龍泉不夜草木岸無秋璧沼寧堪比瑶池詎可儔若非懸可測誰復寄冥搜王維清如玉壺冰詩玉壺何用好偏許素冰居未共銷丹日還同照綺疏抱明中不隱含淨外疑虛氣似庭霜積光言砌月餘曉凌飛鵲鏡宵映聚螢書若向貪夫比貞心定不如魏文帝與鍾大理書良玉比德君子圭璋見美詩人晉之垂棘魯之璵璠宋之結緑楚之和璞價越萬金貴重都城有稱疇昔流聲將來是以垂棘出晉虞虢雙禽和璧入秦相如抗節竊見玉書稱玉白如截肪黑如純漆赤擬雞冠黃侔蒸栗側聞斯語未覩厥狀物類部五穀唐許敬宗麥秋賦應制考宿麥于生類起嚴秋于溽暑扇漸秀于梅風潤岐苗于穀雨雜藝黃于緑野參肅殺于朱明疇中氣爽壟際風清引神飇于綺殿指明月于紈扇砌積玉兮凝冰庭飛花兮似霰矯微陽于修景溽寒露于方甸棟刻桂兮含英井雕蓮兮發絢雲標峯而勢詭氣登商而節變髙揚庭瑞麥賦冠異氣于繚垣吐嘉牟于寒藪不忘風雪全抽兩穗逼日月之光華得雲雨之攸利芒纖纖而擢隴葉青青而聳翠同黍谷之移暄類榆林之因地瑞紀增煥嘉禾異植出天苑以稱竒訪人寰而未識凌玉霜而表徑挺金莖而孤植成粒貴于鳥銜覆苗期于雉雊潘炎嘉禾合穗賦脈震土膏且分苗于南畝駟臨天漢爰合穗以西成生非百里驗管仲之虛詞出異崑山自我皇之所寶唐叔得之而合穎周成得之以充箱雙米一稃稱之表異孤莖六穗頌以非常今也尤盛居然允臧轉風而屢騰佳氣就日而交見祥光獨天不生託厚載於富媪非聖不感效元符于我皇張真祥嘉禾合穎賦稃已聞于二米莖乃殊于九穗麥兩岐而能匹茅三脊而徒稱固神倉之可貯期郊廟之以升欲薦堯階且聞挃挃之穫將登禹膳遂入浮浮之蒸趙蕃甸人獻嘉禾賦合穗之珍方將效祉于今日異畝之美豈獨標竒于古風祥煙近拂乍疑連理之形喜氣旁臨更辨合歡之色豈比躬稼之時盡化晉君之草挺生之嵗克符漢帝之名孟簡嘉禾合穎詩二首玉燭將成嵗封人亦自歌八方霑聖澤異畝發嘉禾共秀芳何逺連莖瑞且多穎低甘露滴影亂惠風過表稔由神化為祥識氣和因知興嗣嵗王道舊無頗天祚皇王德神呈瑞穀嘉感時苗特秀證道葉方華氣轉騰佳色雲披映早霞薰風浮合穎湛露淨祥花六穗垂兼倒孤莖嫋復斜影同唐叔獻稱慶比周家鄭畋麥穗兩岐詩聖慮憂干畝嘉苗薦兩岐如雲方表盛成穗忽標竒瑞露縱橫滴祥風左右吹謳謡連上苑花實遍平陂史册書堪重丹青畫更宜願依連理樹俱作萬年枝張聿餘瑞麥詩瑞麥生堯日芃芃雨露偏兩岐分更合異畝穎仍連冀獲明王慶寧唯太守賢仁風吹靡靡甘雨長芊芊聖德應多稔皇家配有年已聞天下泰誰為濟西田栁宗元為御史臺賀嘉禾表嘉穀順成靈貺昭格天人合應遐邇同風睿謨廣運神化旁行植物知仁祥圖應聖靈嶽不愆于贊祐燕谷用遂于生成豐稔既均知朔南之被澤休嘉克協見天地之同和六德慙稱于漢臣異畝恥書于周典自中形外均慶同歡常衮賀芝草嘉禾表垂蓋連莖三華煥發離根合穎一穗孤秀沐我渥澤扇其祥風衆草之英百穀之長以兆稔嵗以符大年昔周得唐郊之獻列篇于典䇿漢獲甘泉之祉薦歌於清廟三瑞之極一朝會同長發其祥無疆之慶崔融為皇太子賀嘉麥表纖芒濯露疑同黑壤之宜香稼搖風若吐黃金之色豈非靈心昭應睿德感通降之自天何必來牟之詠嘗之于廟先符孟夏之時凡在含生相趨動色臣謬當居守肅奉宗祧一穗兩岐徒説張君之詠千畝一石方輕汜氏之書仰天意而增歡顧人心而載躍物類部布帛唐李君房海人獻文錦賦非同㡆氏之練更異仙家之織臨風始啓全含琪樹之芳向闕爰開遙寫蜃樓之色當其綵縷方織鳴梭靜聞絢霞光于隂火綴縟藻於卿雲舞鳯翔鸞乍徘徊而撫翼重葩疊葉紛宛轉以成文疑映地之花拆似飲渚之虹分離披耀彩臨玉砌以蓮舒燦爛生姿映金門而霞起梁張率繡賦尋造物之妙巧固飾化于百工嗟莫先于黼繡自帝虞而觀風雜藻火與粉米鬱山龍與華蟲若夫觀其締綴與其依放龜龍為文神仙成象總五色而極思藉羅紈而發想具萬物之有狀盡衆化之為形既綿華而稠彩亦密照而疏明若春隰之揚花似秋漢之含星已間紅而韻紫亦表玄而裏素間緑竹與蘅杜雜青松與芳樹若乃邯鄲之女宛洛少年顧影自媚窺鏡自憐極車馬之光飾盡衣裳之妖妍既徙倚于丹墀亦徘徊于青閣不息末而反本吾謂遂離乎澆薄魏殷臣竒布賦森森豐林在海之洲煌煌烈火焚焉靡休天性固然兹殖是由牙萌炭中穎發燼隅葉因焰潔翹與炎敷焱榮華實焚灼蕚珠丹輝電逝彤炯星流飛耀衝霄光赫天區惟造化之所陶理萬端而難察燎無爍而不焦在兹林而獨昵火焚木而弗枯木吐火而無竭同五行而並生與大椿其相率乃採乃析是紡是績每以為布不盈數尺以為巾帊服之無斁既垢既汙以焚為濯投之朱爐載然載赫停而冷之皎潔凝白唐康翊仁鮫人潛織詩珠館馮夷室靈鮫信所潛幽間雲碧牖滉漾水精簾機動龍梭躍絲縈藕綷添七襄牛女恨三日大人嫌透手擊吳練凝冰笑越縑無因聽札札空想濯纖纖物類部服飾陳江總山水納袍賦濫時來之寵沐振長纓以祗肅奉性與之文章侍相娛之絲竹解女蘿之山帶佩流霞之羽服裁縫則萬壑縈體針縷則千巖映目圖島嶼之削成寫淪漣之徑復埒符采於雕煥並芬芳于蘭菊憫四選之徂遷軫百慮之回邅霜飛空而浸霧鴈照月而猜弦聽風鐘之易近對水霤之疏懸若董衣之百結同衛服之十年嗟斑鬢之已颯愧冶袖之為妍謝銜珠之有報荷墜履之無捐魏文帝玉玦賦有崑山之妙璞産曾城之峻崖嗽丹水之炎波蔭瑶樹之玄枝包黃中之純氣抱至靜而無為應九德之淑懿體五材之表儀唐雍陶千金裘賦乍掩孔雀全欺鷫鸘獻武帝之時人來西域受平公之處鳥下東方杜顔白環賦玉華溫潤玉理精堅英光千以旁達肉好一以虛圓皛皛霜皎田田月懸分清輝于綺殿失皓質于瓊筵魏曹植七啓步光之劍華藻繁縟飾以文犀雕以翠緑綴以驪龍之珠錯以荆山之玉陸斷犀象未足稱俊隨波截鴻水不漸刃九旒之冕散曜垂文華組之纓從風紛紜佩則結緑懸黎寶之妙微符采照爛流景揚暉黼黻之服紗縠之裳金華之舄動趾遺光繁飾參差微鮮若霜緄珮綢繆或雕或錯薰以幽若流芳肆布雍容間步周旋馳曜南威為之解顔西施為之巧笑晉書輿服志前史以為聖人見鳥獸容貌草木英華始創衣冠而玄黃殊采見秋蓬孤轉杓觿旁建乃作輿輪而方圓異則遇物成象觸類興端周因於殷其來已舊成王之會壇垂隂雨五方之盛有八十物者焉宗馬鳥旌奚往不格殷公曹叔此焉低首周禮巾車氏建大赤以朝大白以戎雅制𢎞多式遵遺範賔入異憲師行殊則是以有嚴有翼用光其武鉤膺鞗革乃暢其文六服之冕五時之路王之常制各有等差逮禮業雕訛人情馳爽諸侯征伐憲度淪亡一紫亂於齊飾長纓混于鄒玩孔子曰君子其學也博其服也鄉若乃豪傑不經庶人干典彯鷸冠於鄭伯之門躡珠履于春申之第及秦皇并國攬其餘軌豐貂東至獬豸南來又有玄旗皂旒之制旄頭罕車之飾寫九王之廷于咸陽北坂車輿之綵各樹其文所謂秦人大備而陳戰國之後車者也物類部器用唐趙良器鼎賦煥以雕文錯虬龍之鱗介騰乎瑞色雜天地之玄黃影射金晶光飛玉鉉論者徒議其小大觀者寧識其深淺故道歸天命無勞楚子之言德自休明實賴王孫之辨爾其法剛柔之節順行藏之志乃有道則見生于汾水之隂無道則隱沒于彭城之地可以斥姦慝可以禦魑魅應時而動吉無不利梁德裕寶鼎賦昔軒皇之有天下也鑠至範恢崇謨用建皇極永康帝圖徵鐵于晉國之野鑄鼎于荆山之湖以隂陽作炭以天地為爐下碎礦而星入鼓長扇而風驅炎氣旁飛寒雪影消于玉馬紅光四照晴日色掩于丹烏已上鼎梁昭明太子銅博山香爐賦于時青女司寒紅光翳景吐圓舒于東嶽匿丹曦于西嶺翠帷已低蘭膏未屏爨松柏之火焚蘭麝之芳熒熒內曜芬芬外揚似慶雲之呈色如景星之舒光齊姬合歡而流盼燕女巧笑而蛾揚劉公聞之見錫粵女惹之留香信名嘉而器美永服玩于華堂陳傅縡博山香爐賦器象南山香傳西國丁緩巧鑄兼資匠刻麝火埋朱蘭煙毁黑結構危峯橫羅雜樹寒夜含暖清宵吐霧已上香爐漢蔡雍筆賦惟其翰之所生於季冬之狡兔性精亟以慓悍體遄迅以騁步削文竹以為管加漆絲之纒束形調摶以直端染玄墨以定色畫乾坤之隂陽贊宓皇之洪勳敘五帝之休德揚蕩蕩之典文紀三王之功伐兮表八百之肆覲傳六經而綴百氏兮建皇極而敘彛倫綜人事于暗昧兮贊幽冥于神明象類多喻靡施不協上剛下柔乾坤之位也新故代謝四時之次也圓和正直規矩之極也玄首黃管天地之色也晉傅玄筆賦簡修毫之竒兔選珍皮之上翰濯之以清水芬之以幽蘭嘉竹翠色彤管含丹于是班匠竭巧名工逞術纒以素枲納以玄漆豐約得中不文不質爾乃染芳松之淳煙寫文象于紈素動應手而從心煥光流而星布唐竇紃五色筆賦效用辭林分宿鳥之丹羽呈功學海間遊魚之彩鱗所以成盡飾之規得和光之道輕肆力于垂露覩流精于起草俾題橋之處轉稱舒虹當進牘之時尤宜奮藻是能潛映丹誠暗彰吉夢嘉不亂之如削意相宣而載弄混青蠅之點取類華蟲述皓鶴之書思齊彩鳯故可以彰施薤葉點綴桃花舒彩箋以增麗耀彤管以孔嘉彼雕翠羽而示功鏤文犀以窮奢曽不如披藻翰而發光華李德裕斑竹筆管賦昔漢代之方侈增其炳煥綴明璣以為柙飾文犀以為玩徒有貴于繁華竟何資于藻翰曾不知擇美于江潭訪竒於湘岸梁吳筠筆格賦幽山之桂樹恆縈風而抱霧葉委鬱而陸離根縱橫而盤互爾其負霜含液枝翠心赤翦其匡條為此筆格趺則岩岩方爽似華山之孤生上則員員峻逸若九疑之爭出長對坐而銜煙永臨窗而儲筆庾肩吾謝賚銅硯筆格啓煙磨青石已踐孔氏之壇管插銅龍還笑王生之壁西域胡人卧織成之金簟遊仙童子隱芙蓉之行障莫不並出梁園來頒狹室已上筆晉傅玄硯賦採隂山之潛璞簡衆材之攸宜節方圓以定形鍛金鐵而為池設上下之剖判配法象乎二儀水貴其能軟石美其潤堅加采漆之膠固含沖德之清玄唐張少博石硯賦徒觀夫清光影耀真質霜浮符彩華鮮精神隱映皎如之色比藏冰之玉壺煥然之文狀吐菱之石鏡當其山谷之側沈竒未識韜玉吐雲懷珍隱德及乎入用以磨礪因人而拂拭故能撫之類磬發竒音對之若鏡開新色既垂文以呈象亦澄瀾而漬墨用之漢帝常同彭祖之席存之魯國猶列宣尼之廟光鳥迹于青簡發龜文于洪筆魏繁欽硯贊方如地象圓似天常或薄或厚乃圓乃方班采散色漚潤毫芒點黛文字曜明典章施而不德吐惠無疆漸漬甘液吸受流芳已上硯曹植九華扇賦有神區之名竹生不周之髙岑對淥水之素波背玄澗之重深體虛暢以立幹播翠葉以成隂形五離而九折篾氂解而縷分效虬龍之蜿蜒法虹霓之煙煴因形致好不常厥儀方不應矩圓不中規隨皓腕以徐轉發惠風之微寒時氣清以芳厲紛飄動乎綺紈梁江淹扇上綵畫賦臨淄之稚女宋鄭之妙工織素麗于白日傅畫明于綵虹洛陽之技極江南之巧窮故飾以赤野之玉文以紫山之金空青生蛾眉之陽雌黃出嶓冢之隂丹石發王屋之岫碧髓挺青峻之岑粉則南陽鉛澤墨則上黨松心乃雜以為此扇與君翳素女與玉琴玉琴兮珠徽素女兮錦衣促織兮始鳴秋蛾兮初飛識桂莖之就罷知蘭葉之行衰重曰碧臺寂兮無人蔓丹草與朱塵度俄然如一代經半景若九春命幸得為綵扇出入玉帶與綺紳唐田鶴扇賦織飛禽而寫妙規曉月以成圓葉隨意出花逐情妍飾金翠而作彩緻膠漆以期堅題竹流譽贈葵稱美梁庾肩吾團扇銘武王玄覽造扇于前班生贍博白綺仍傳裁筠比霧裂素輕蟬片月內掩重規外圓炎隆火正石鑠沙煎清逾蘋末瑩等寒泉恩深難恃愛極則遷秋風颯至篋笥長捐勒銘華扇敢薦夏筵已上扇梁劉緩照鏡賦夜籌已竭曉鐘將絶窗外明來帷前影滅荆王欲起侍妾應還前齋上幔內閣除關開屏易疊捲簾難扳搔頭斂髻叉子縈鬟階邊就水盤中光映訝宿粉之猶調笑殘籹之不正欲開奩而更飾乃當窗而取鏡臺本王宫氏姓溫背後銘文宜子孫四面回風若流水勾欄􅂒匝似城門分明似無礙影前彌可愛近來顔色不須紅即時好眉猶約黛世間好鏡自無多唯聞一箇比嫦娥曾經玉女照屢被仙人磨周庾信鏡賦天河漸沒日輪將起燕噪吳王烏驚御史玉花簟上金蓮帳裏始摺屏風新開户扇朝光晃眼早風吹面臨桁下而牽衫就箱邊而著釧宿鬟尚卷殘妝已薄無復脣硃才餘眉蕚靨上星稀黃中月落鏡臺銀帶本出魏宫能橫却月巧挂回風龍垂匣外鳯倚花中鏡乃照膽照心難逢難值鏤五色之盤龍刻千年之古字山雞看而獨舞海鳥見而孤鳴臨水則池中月出照日則壁上菱生暫設粧奩還抽鏡屜競學生情爭憐今世鬢齊故略眉平猶剃飛花磚子次第須安朱開錦踏黛蘸油檀脂和甲煎澤漬香蘭量髻鬢之長短度安花之相去懸媚子于搔頭拭叉梁于粉絮梳頭新罷照著衣還從粧處取將歸暫看弦繫懸知纈縵衫正身長裙斜假襻真成箇鏡特相宜不能片時藏匣裏暫出園中也自隨唐趙自勵八月五日花萼樓賜百官明鏡賦偉其爛矣生光炯爾明發色洞秋水清涵夜月均曲池之引照或淺或深比太陽之圓明不盈不闕崔膺金鏡賦于是考斗建候天清波上飛焰日中鑄成磨洗既畢澄瑩秋日玉匣初開寒光飛出仰映晴空天地洞通萬象在中虛涵不窮湛為寒潭搖為飛電任在公以無心有妍媸而自見向陽烏而燧發照金波而水泠色合天而為一規分月而成雙玄蟾躍影於藻井姮娥飛豔于前窗張彚干秋鏡賦映空而天地且霽照逺而山河更重何據鏡花賦洞碧空其何際湛清潭其絶底鸞舞翮于曈曨龍怒鱗于清泚又古鏡賦四規是徹百鍊彌輕裁冰比麗止水侔清盤龍發彩玄兔生隂若乃秦樓對月魏乘臨珠共照而車中轉麗雙明而臺上不孤梁簡文帝鏡銘金精玉英冰輝沼清髙堂懸影仁夀摛聲雲開月見水淨珠明已上饒江淹燈賦若大王之燈者銅華金檠錯質鏤形碧為雲氣玉為仙靈雙碗百枝豔帳充庭照錦地之文席映繡柱之鴻筝恣靈修之浩蕩釋心疑而未平兹侯服之誇詡而處士所莫營也若庶人之燈者非珠非銀無藻無縟心不貴美器窮于朴是以露冷帷幔風結羅紈螢光别桂蛾命辭蘭秋夜如嵗秋情如絲怨此愁抱傷此秋期必丹燈坐嘆停説忘辭至夫霜封園橘冰裂池蓀雲雪無際河海方昏冬膏既凝冬節未度涓連冬心寂歷冬暮亦復朱燈空明但為傷故乃知燈之為寶信可賦也周庾信燈賦九龍將暝三爵行棲瓊鈎半上弱木全低窗藏明于粉壁栁助暗于蘭閨翡翠珠被流蘇羽帳舒屈膝之屏風掩芙蓉之行障卷衣秦后之牀送枕荆臺之上乃有百枝同樹四照連盤香添然蜜氣雜燒蘭燼長宵久光青夜寒秀華掩映蚖膏照灼動鱗甲于鯨魚焰光芒于鳴鶴蛾飄則碎花亂下風起則流星細落況復上蘭深夜中山醑清楚妃留客韓娥合聲低歌著節遊絃絶鳴輝輝朱燼焰焰紅榮乍九光而連彩或雙花而並明寄言蘇季子應知餘照情唐馮真素燈賦日杲而朝隮月朧而西出稟純陽而合彩體沈隂而盈質照未被于覆盆光豈周於暗室顧兹燈之燠炫保謙光于自薦推九華于洞房攢百枝于復殿嗟微瑣之陋質侍君子之髙宴光逶迤于舞袖影朦朧于歌扇絲竹夜響綺羅春絢玉階星列金釭花遍至若上客將歡中樽未闌吐氤氲于玉宇流豔溢于金盤雜行月而浮桂乘流風而泛蘭瑟韻喧兮逾炳更籌深兮轉寒覺離筵之閴寂知别恨之良難梁簡文帝對燭賦雲母窗中合花氈茱萸幔裏鋪錦筵照夜明珠且莫取金羊燈火不須然下弦三更未有月中夜繁星徒依天于是挂同心之明燭施雕金之麗盤眠龍傍繞倒鳯雙安轉辟邪而取正推櫺窗而畏寬緑炬懷翠朱燭含丹豹脂宜火牛膫耐寒銅芝抱帶復纒柯金藕相縈共吐荷視橫芒之昭曜見密淚之蹉跎漸覺流珠走熟視絳花多宵深色麗焰動風過夜久唯煩鋏天寒不畏蛾菖蒲傳酒座欲闌碧玉舞罷羅衣單影度臨長枕煙生向果盤回照金屏裏脈脈兩相看已上燈周庾信卭竹杖賦㛹娟髙節寂歷無心霜零色苦露染斑深每與龍鍾之族幽翳沈沈文不自殊質而見賞藴諸鳴鳯之律制以成龍之杖枝條徑直璘斌色滋和輪人之不重待羽客以相貽青春欲暮白雲來遲謀于長者操以從之執末而獻無因自持謂蔗雖甘不可以倚彼藜雖實不可以美未若處不材之間當有用之始魯分以爵漢錫以年昔尚爾齒今優我賢梁簡文帝錫杖銘妙節嘉光遊聖振灼排空霧轉騰雲鳯躍永異玉神長踰金錯已上杖唐仲子陵清簟賦雙入巧作連心織成始蔥蘢而席卷終絢練而砥平本其初則王爾運心班匠寓目吳溪赤剛楚澤寒竹皓簳冰截素膚縞裂斷此枝間略其溝節然後角軼手匠妙意文理橫生波瀾荐至雕龍綺錯切玉鱗次淡冰泮而泉開分霜徑而雪地況乃虛館方晝華堂且空髙梧閟景密篠生風撤文茵與綺席虛翠幕及朱櫳惟珍簟之在御望美人之來同美人遲兮隔修路對珍簟兮日已暮矚筵幌之虛深卧層隂之空度帶餘霞而斂綺映片月而舒素昭列宿之清光披青天之薄霧于時輕箑屏用微綃罷服霜簡自凄冰壺增肅獨孤授清簟賦發緘而冰氣驚客入座而波文滿目入芙蓉之幕煥以相鮮照瓊樹之姿粲其增色亦有别號行唐是稱流黃紋織錦象凝霜承以羅綺薦以玉牀肅蔥蘢之翠幄取寂歷之洞房已上簟梁簡文帝案銘刻香鏤彩纖銀卷足照色黃金回花青玉漆華映紫畫製舒緑性廣知平文雕非曲厠質錦帷承芳綺縟敬客禮賢恭思儼束披古通今察姦理俗仁義可安忠貞自燭鑒矣勒銘知微敬朂漢鄒陽几賦髙樹凌雲蟠紆煩寃旁生附枝王命公輸之徒荷斧斤援葛虆攀喬枝上不測之絶頂伐之以歸眇者督直聾者磨礱齊貢金斧楚入名工乃成斯几離竒髣佛似龍盤馬回鳯去鸞歸君王慿之聖德日躋已上几案晉棗據船賦伊河海之深廣兮嗟綿邈而無垠彼限隔而靡覩兮此由兹而莫聞雖后土之同載兮實殊代而乖分嘉聖王之神化兮理通微而達幽悼生民之隔塞兮愍王教之不周立成器以被用兮因垂象以造舟濟凌波之絶軌兮越巨川之懸流水無深而不渡兮路無廣而不由運重固之滯質雖載沈而載浮飄燕鼎於吳會轉金石于洪濤訴無涯之浩浩不抑進而輟流登陽侯之激浦兮方魚翔而龍遊雖滔天而橫厲長抱樂而無憂且論器而比象似君子之淑清外質朴而無飾內空虛以受盈乘流則逝遇坻而停受命若響唯時而征不辭勞而惡動不偷安而自寧不貪財以徇功不愛力而欲輕且其行無轍迹止無所根不疾而速忽若馳奔豐儉隨乎質量所勝任乎本形雖不乘而常浮雖涉險而必正周遊曲折動與時併博載善施心無所營囊括品物受辱含榮唯載涉之所欲混貴賤于一門包涵通于道德普納比乎乾坤感斯用之却廣信人道之所存梁甄玄成車賦鑄金磨玉之麗凝土剡木之竒體衆術而特妙未若作車而載馳爾其車也名稱合于星辰圓方象乎天地夏言以庸之服周曰聚焉之器制度不以陋移規矩不以飾異古今貴其同軌華夷獲其兼利爾其利也天子以郊祀田伐諸侯以朝聘會盟庶人以商農工賈夷狄以致蓄遷生爾其作也均輕重而攻材正隂陽而斫木既中正而合剖亦面勢而審曲候離婁之督繩須公輸而削墨布骸服之有定施爪牙之不忒既涉用于牛馬亦受名于羊鹿爾其容也侔蓋樹之獨立似髙雲之出巘獨映水也如舞鸞之對鏡衆行陸也若翔鴻之赴逺聽長響之轔轔望遙儀之婉婉信有美兮宜比興徒欲貌兮不能辨及其駕也堅珊瑚之駐引絶羣之駮既絲靷之縈頭亦銅鈎而瑩角始向軛而龍轉就入轅而獸躍或鼽􅡩而鳴鼻或參差而動腳咆哮歇轉鬱怏隕閣見輪隂之翻亂視帶影之飛泊及其乘也或方夏虐暑炎氣歊烈浮幰動以來風輕紗飛而去熱纖埃著而即墜煩氣衝而爰歇或固隂沍寒祁嚴凛厲復帷下而前屏重幨垂而後蔽霜露侵而靡及風飇激而不戾或油雲雨霈中逵半恢宏宇宙而雷奔杼軸割而去衍被洪流染而自落散水湔而不霑云已上舟車物類部飲食茶附後漢張衡南都賦酒則九醖甘醴十旬兼清醪敷徑寸浮蟻若蓱其甘不爽醉而不酲及其糾宗綏族禴祠蒸嘗以速逺朋嘉賔是將魏曹植酒賦嘉儀氏之造思亮兹美之獨珍仰酒旗之景曜協嘉號于天辰穆生以醴而辭楚侯嬴感爵而增深其味有宜城醪醴蒼梧縹清或秋藏冬發或春醖夏成或雲沸潮涌或素蟻浮萍爾乃王孫公子遊俠翺翔將承芬以接意會陵雲于朱堂獻酬交錯宴笑無方於是飲者並醉縱橫喧譁或揚袂屢舞或扣劒清歌或嚬噈辭觴或奮爵橫飛或歎驪駒既駕或稱朝露未晞於斯時也質者或文剛者或仁卑者忘賤窶者忘貧于是矯俗先生聞之而歎曰噫夫言何容易此乃淫荒之原非作者之事若耽于觴酌流情縱逸先王所禁君子所斥晉束晳餅賦爾乃重羅之麵塵飛白雪膠黏筋䵒溔液濡澤肉則羊膀豕脅脂膚相半臠如蛇首珠連礫散薑株蔥本萃縷切判辛桂銼末椒蘭是灑和鹽漉豉攬和膠亂于是火盛湯涌猛氣蒸作振衣振裳握搦拊搏麵彌離于指端手縈回而交錯紛紛駁駁星分雹落籠無迸肉餅無流麵姝偷冽欶薄而不綻弱如春錦白若秋練氣勃鬱以揚布香飛散而逺遍行人垂涎于下風童僕空噍而邪眄擎器者舐唇立侍者乾咽宋蘇軾老叨賦庖丁鼓刀易牙烹熬水欲新而釡欲潔火惡陳而薪惡勞九蒸暴而日燥百上下而湯鏖嘗項上之一臠嚼霜前之兩螯爛櫻珠之煎蜜滃杏酪之蒸羔蛤半熟而含酒蟹微生而帶糟蓋聚物之天美以養吾之老叨引南海之玻璃酌涼州之葡萄願先生之耆夀分餘瀝于兩髦候紅潮于玉頰驚緩響于檀槽忽纍珠之妙唱抽獨繭之長繅閔手倦而少休疑吻燥而當膏倒一缸之雪乳列百柁之瓊艘各眼灧于秋水咸骨醉于春醪又菜羮賦嗟余生之褊迫如脫兔其何因殷詩腸之轉雷聊禦餓而食陳無芻豢以適口荷鄰蔬之見分汲幽泉以糅濯摶露葉與瓊根爨鉶錡以膏油泫融液而流津適湯濛如松風投豆糝而偕勻覆陶甌之穹崇罷攬觸之煩勤屏醯醬之厚味却椒桂之芳辛水耗初而釜治火增壯而力均滃嘈雜而亷清信淨美而甘芬登盤盂而薦之具匕梜而晨飱助生肥於玉池與五鼎其齊珍鄙易牙之效技超傅説而䇿勳沮彭尸之爽惑調竈鬼之嫌嗔嗟丘嫂其自隘陋樂羊而匪人先生心平而氣和故雖老而體胖忘口腹之為纍似不殺而成仁竊比余于誰歟葛天氏之遺民唐陸龜蒙中酒賦前歡已誓于拋擲往事空經乎思慮有馘卓擒靈與伶同之伍我願先登有殛狄放杜之君臣能執御必當拔酒樹平麴封掊仲榼碎堯鍾先刊美椽次削真龍編虎鬚者寧教畔去持蟹螯者不要相逢晉張協七命大梁之黍瓊山之禾唐稷播其根農帝嘗其華爾乃六禽殊珍四膳異肴窮海之錯極陸之毛伊公爨鼎庖丁揮刀味重九沸和兼芍藥晨鳬露鵠霜鵽黃雀圓案星亂方丈華錯封熊之蹯翰音之跖燕髀猩唇髦殘象白靈淵之龜萊黃之鮐丹穴之鷚玄豹之胎燀以秋橙酟以春梅接以商王之箸承以帝辛之杯范公之鱗出自九溪赬尾丹腮紫翼青鬐爾乃命支離飛霜鍔紅肌綺散素膚雪落婁子之毫不能厠其細秋蟬之翼不足擬其薄繁肴既闋亦有嘉羞商山之果漢皋之楱析龍眼之房剖椰子之殼芳旨萬選承意代奏漢傳毅七激殫極滋味嘉旨之膳芻豢常珍庶修異饌涔養之魚膾其鯉魴分毫之割纖如髮芒散如絶縠積如委紅殊方異味厥和不同既食日晏乃進夫雍州之梨出于麗隂下生芷隰上託桂林甘露潤其葉醴泉漸其根脆不抗齒在口流液握之摧沮披之離坼桓驎七説香萁為飯雜以粳菰散如細蚳摶似凝膚河黿之美齊以蘭梅芳芬甘旨未咽先滋魏曹植七啓芳菰精稗霜蓄露葵玄熊素膚肥豢膿肌蟬翼之割剖纖析微纍如疊縠離若散雪輕隨風飛刃不轉切山鵽斥鷃珠翠之珍寒芳蓮之巢龜鱠西海之飛鱗臛江東之潛鼉臇漢南之鳴鶉乃有春清縹酒康狄所營應化則變感氣而成彈徵則苦發叩宫則甘生于是盛以翠樽酌以雕觴浮蟻鼎沸酷烈馨香可以和神可以娛腸劉卲七華乃有荆南烏程豫北竹葉浮蟻星沸飛華萍接玄石嘗其味儀氏進其法傾罍一朝可以流湎干日單醪投川可使三軍告捷晉湛方生七歡良疇沃壤傍山之阿靈澤津其根春露染其禾上蔭玄雲輕靄下流石泉清波含山澤之清潤結玉實于秋霜簡嘉穗以精微璀冰散而珠光釀縹醪于九秋醖千日于三陽米望麯而冰消甕未啓而流芳梁何遜七召銅瓶玉井金釜桂薪六穀九鼎百葉千珍熊蹯虛掌雞跖猩唇𩻛魚兩味玄犀五肉拾卵鳯巢剖胎豹腹三臠甘口七葅愜目蒸餅十字湯官五熟梅椒魯豉河鹽蜀薑劑水火而調和糅蘇蔱以芬芳脯追復而不盡犢魚稍割其何傷黿羮流啜蚳醬先嘗鱠溫湖之美蚶切丙穴之嘉魴落爼霞散逐刃飛揚輕同曳繭白似飛霜蔗有盈丈之名桃表兼斤之實杏積魏國之貢菱為巨野所出衡曲黃梨汶垂蒼栗隴西白榛湘南朱橘荔枝沙棠蒲萄石蜜瓜稱素腕之美棗有細腰之質並抗吻以除煩亦咀牙而消疾于是三雅陳席百味開印玉機星稀蘭英縹潤既夷志于坎壈亦忘懷于鄙吝梁昭明太子七契輔性和神實惟至味非直方今見重乃亦自古攸貴不周之和調腸補胃雜以龍肝玃炙豹舌猩唇劉氏之醢范氏之麟鶬出雲際鱘來江岷蒲爼芬馥古聖所珍其酒則蒼梧九醖中山千日取譬湛露擬之飴蜜百味交馳三雅間出若其珍異則修筵斯溢千品萬類不可詳悉西母靈桃南楚萍實東陵之瓜北燕之栗湖畔之柿江隂之橘張掖白奈恆陽黃梨河東洗犬隴蜀蹲鴟並怡神甘口窮美極滋加以伊公調和易氏燔爨傳車渠之碗置青玉之案瑶爼既已麗竒雕盤復為美玩梁簡文帝七勵九州珍雜八方豐貴名亷天地之聲殽竭山海之味蟬鳴秋稻燕頷玉精離紅之膾勺藥之羮蒙山擅重灌水傳聲桂蠧石瓊龍胎鳯肺四膳八珍五肉七菜纍似縠雜切均鮮繪色若紫蘭紛如紅綷若乃越梅變實楚醴方添陳晨鳬之美味薦雋燕之肥甜洗以三危之露水調以大夏之香鹽霜薤沸烈露葵繁舒芳菰之菜白霜之茹澄瓊漿之素色雜金筍之甘葅素醥浮氣酃醪凝清獻三爵之踰雅等千日之芳醴酌玉斗之英麗照銀杯之輕蟻晉劉伶酒德頌先生于是方捧罌承糟銜杯潄醪奮髯踑踞枕麴藉糟無思無慮其樂陶陶兀然而醉恍爾而醒靜聽不聞雷霆之聲熟視不見泰山之形不覺寒暑之切肌嗜欲之感情俯觀萬物擾擾焉如江漢之載浮萍二豪侍側焉如蜾螺之與螟蛉梁吳均餅説安定噎鳩之麥洛陽董德之磨河東長若之蔥隴西舐背之犢枹罕赤髓之羊張掖比門之䜴然以銀屑煎以金銚洞庭負霜之橘仇池連蒂之椒調以濟北之鹽銼以新豐之雞細如華山之玉屑白如梁甫之銀泥既聞香而口悶亦見色而心迷已上飲食唐顧況茶賦夢裏還錢懷中贈橘韋應物喜園中茶生詩潔性不可汙為飲滌塵煩此物信靈味本自出山原聊因理郡餘率爾植荒園喜隨衆草長得與幽人言鄭谷峽中嘗茶詩簇簇新英摘露光小江園裏火煎嘗吳僧謾説鴉山好蜀叟休誇鳥觜香入座半甌輕泛緑開緘數片淺含黃鹿門病客不歸去酒渴更知春味長茶附物類部木齊謝朓髙松賦若夫修幹垂隂喬柯飛穎望肅肅而既間即微微而方靜懷風音而送聲當月路而留影既芊眠于廣隰亦迢遞于孤嶺集九仙之羽儀棲五鳯之光景固總木之為選貫山川而自永爾乃青春爰謝雲物含明江皋緑草曖然已平紛弱葉而凝照競新藻而抽英陵翠山其如剪施懸蘿而共輕梁沈約髙松賦鬱彼髙松栖根得地託北園于上邸依平臺而養翠若夫蟠株聳幹之懿含星漏月之竒經千霜而得拱仰百仞而方枝朝吐輕煙薄霧夜宿迷鳥羈雌露雖滋而不潤風未動而先知既捎雲于清漢亦倒景于華池輕隂蒙密喬柯布濩葉斷禽蹤枝通猿路聽騷騷于既曉望隱隱于將暮曖平湖而漾青緑拂繒綺而籠丹素於時風急壟首寒浮塞天流蓬不息明月孤懸檀欒之竹可詠鄒枚之客存焉清都之念方逺姑射之想攸然擢柔情于蕙圃涌寶思于珠泉豈徒為善之小樂離闕之短篇若此而已乎晉左九嬪松柏賦何竒樹之英蔚託峻嶽之嵯峩被玄澗之逶迤臨緑水之素波擢修木之丸丸萃緑葉之芬葩敷纖莖之蘢蓯布秀葉之蔥蒨列翠實之離離馥幽藹而永馨紛翕習以披離氣肅肅以清泠應長風以鳴條似絲竹之遺聲稟天然之貞徑經嚴冬而不零雖凝霜而挺幹近青春而秀榮若君子之順時又似乎真人之抗貞赤松遊其下而得道文賔餐其實而長生詩人歌其榮蔚齊南山以永寧唐謝偃髙松賦若乃月起陽爻嵗窮隂律匝地冰厚周空霧密雪積巖而逾峻風乘林而轉疾結暗霮之愁雲暗蒼茫之寒日於是衆草零羣木墜千巖稿萬嶺悴獨潔固而不渝常猗猗而結翠始見貞而表潔乃以叢而辨類夫其深山遂性委液流津感天地之粹質稟隂陽之精純根含冰而彌固枝負雪而更新既無懼于玄月寧有恱乎芳春含竒文而養徑收髙節而自珍恥取嫓于嵇子嗤受封于亡秦本絶希于雕刻詎有憂於斧斤若乃流膏可咀嘉賔可薦香有四飛味逾九轉延促齡于度隙駐生涯于流電故餌之者目改服之者容變紛羽翼而上騰排紫虛而髙扇起九垓而憩息周四海而顧盼信神經而最品實祕録而精選李嶠松詩鬱鬱髙巖逺森森幽澗垂鶴棲君子樹風拂大夫枝百尺條隂合千年蓋影披嵗寒知不及徑節幸君知顧況蕭寺偃松詩淒淒百卉病亭亭雙松迥直上古寺深橫拂秋殿冷輕響入龜目片隂栖鶴頂山中多好樹可憐無比並鄭浣中書相公任兵部侍郎日後閣植四松逾數年浣忝此官因獻拙詩丞相當時植幽襟對此開人知舟楫器天假棟梁材錯落龍鱗出離褷鶴翅回重隂羅武庫細響靜山臺得地公堂裏移根澗水隈吳臣夢寐逺泰嶽嵗年催轉覺飛纓謬何因繼組來幾尋珠履迹願比角弓培柏恱猶依社星髙久照台後雕應共操無復問良媒又劉禹錫奉和詩右相歷中臺移松武庫栽紫茸抽組綬青實長玫瑰便有干霄勢看成構厦材數分天柱半影逐日輪回舊賞台階去新知谷口來息隂常仰望玩意幾徘徊翠粒晴懸露蒼鱗雨起苔凝音助瑶瑟飄蘂泛金罍月桂光搖燭星榆葉對開終須似雞樹榮茂近昭回又姚合奉和詩右相歷兵署四松皆手栽斸時驚鶴去移處帶雲來根倍雙桐植花分八桂開生成造化力長作棟梁材豈羡蘭依省猶嫌柏占臺出樓終百尺入夢已三台幽韻和宫漏餘香度酒杯拂冠枝上雪染履影中苔髙位相承地新詩寡和才何由比蘿蔓扳附在條枚白居易題遺愛寺前溪松詩偃亞長松樹侵臨小石磎靜將流水對髙共逺峯齊翠蓋煙籠密花幢雪壓低與僧清影坐借鶴穩枝栖筆寫形難似琴偷韻易迷暑天風槭槭晴夜露淒淒獨憩依為舍間行繞作蹊棟梁君莫採留著伴幽棲韓喜松詩倚空髙檻冷無塵往事間微夢欲分翠色本宜霜後見寒聲偏向月中聞啼猿想帶蒼山雨歸鶴遙知紫府雲莫向東園競桃李春光還是不容君張喬興善寺古松詩種種近王城前朝古寺名瘦根侵地逺香吹入雲清鶴動池臺影僧禪雨雪聲看來人旋老因此嘆浮生已上松李嶠桐詩孤秀嶧陽岑亭亭出衆林春花雜鳯影秋月弄圭隂忽被夜風激遂逢霜雪侵不因將入爨誰為作鳴琴王昌齡段宥廳孤桐詩鳯凰所宿處月映孤桐寒稿葉零落盡空柯蒼翠殘虛心誰能見直影非無端響發調恆苦清商勞一彈已上桐梁簡文帝梅花賦年歸氣新搖藝動塵梅花特早偏能識春或承陽而發金乍雜雪而披銀吐艷四照之林舒榮五衢之路既玉綴而珠離且冰懸而雹布葉嫩出而未成枝抽心而插故標半落而飛空香隨風而逺度挂靡靡之遊絲雜霏霏之晨霧爭樓上之落粉奪機中之織素乍開花而傍巘或含影而臨池向玉階而結彩拂網户而低枝七言表柏梁之詠三軍傳魏武之竒于是重閨佳麗貌婉心嫺憐早花之驚節訝春光之追寒夾衣始薄羅袖初單折此芳花舉兹羅袖或插鬢而問人或殘枝而相授恨鬟前之太空嫌金鈿之轉舊顧影丹墀弄此嬌姿洞開春牖四卷羅帷春風吹梅畏落盡賤妾為此斂蛾眉花色持相比恆愁恐失時陳後主梅花落詩春砌落芳梅飄飄上鳯臺拂粧疑粉散逐溜似萍開映日花光動迎風香氣來佳人早插髻試立且徘徊張正見梅花落詩芳梅映雲野發早覺寒侵落逺香風急飛多花徑深周人嘆初摽魏帝指前林邊城少灌木折此自悲吟唐楊炯梅花落詩窗外一株梅寒花五出開影隨朝日逺香逐便風來泣對銅鈎幛愁看玉鏡臺行人斷消息春恨幾徘徊盧照鄰梅花落詩梅院花初發天山雪未開處處疑花滿花邊似雪回因風入舞袖雜粉向粧臺胸奴幾萬里春至不知來梁何遜早梅詩兔園標物序驚時最是梅御霜當路發映雪擬寒開枝橫却月觀花繞陵風臺朝灑長門泣夕駐臨卭杯應知早飄落故逐上春來庾肩吾同蕭左丞詠摘梅花詩窗梅朝始發庭雪晚初消折花牽短樹扳叢入細條垂冰溜玉手含刺冒春腰逺道終難寄馨香徒自饒唐杜牧梅詩輕盈照野水掩斂下瑶臺妬雪聊相比欺春不逐來偶同佳客見似為凍醪開若在秦樓畔堪為弄玉媒李商隱酬崔八早梅有贈詩知訪寒梅過野塘久留金勒為回腸謝郎衣袖初翻雪荀令薰爐更換香何處拂胸資粉蝶幾時塗額藉蜂黃維摩一室雖多病要舞天花作道場李羣玉人日梅花病中作詩去年今日湘西寺獨抱寒梅愁斷腸今年此日江邊宅卧見瓊枝低壓牆半落半開臨野岸團情團思醉韶光玉麟寂寂飛斜月素艷亭亭帶夕陽已被兒童苦攀折更遭風雨損馨香洛陽桃李漸撩亂回首行宫春景長羅隱梅花詩吳王醉處十餘里照野拂衣今正繁經雨不隨山鳥散倚風疑共路人言愁憐粉艷飄歌席靜愛寒香撲酒樽欲寄所思無好信為君惆悵又黃昏已上梅唐太宗賦得李詩玉衡流桂圃成蹊正可尋鶯啼密葉外蝶戲脆花心麗景光朝彩輕煙散夕隂暫顧暉章側還眺靈山林李嶠賦得李詩潘嶽間居暇王戎戲陌辰蝶遊芳徑馥鶯囀弱枝新葉暗青房晚花明玉井春方知有靈幹持用表真人已上李李嶠桃詩獨有成蹊處紅桃發井傍含風如笑臉裛露似啼粧隱士顔應改仙人路漸長還欣上林苑千嵗奉君王章孝標玄都觀栽桃詩驅使鬼神功妖金遍纍空色燃燒藥火影舞步虛風粉撲青牛過枝驚白鶴沖拜星春錦上服食晚霞中碁局隂長合簫聲祕不通艷陽迷俗客幽邃失壺公根柢終盤石桑麻自轉蓬求師飽靈藥他日訪遼東薛能桃花詩香色是天種千年豈易逢開齊全未落繁極欲相重冷濕朝如淡晴乾晚更濃風光新社燕時節舊春鴻籬落欹臨竹亭臺盡間松亂緣堪羡蟻深入不如蜂有影宜暄照無言自冶容洞連非俗世蹊盡接仙蹤子熟河應變根盤土已封西王潛愛惜東朔恣偷從醉席眠英好題詩戀境慵芳菲聊一望何必是臨卭又羅隱詩暖觸衣襟漠漠香間梅遮栁不勝芳數枝艷拂文君酒半里紅欹宋玉墻盡日無人疑怨望有時經雨乍淒涼舊山山下還如此回首東風一斷腸已上桃李商隱杏花詩上國昔相值亭亭如欲言異鄉今暫賞脈脈豈無恩援少風多力墻髙月有痕為含無限思遂到不勝繁仙子玉京路主人金谷園幾時醉碧落誰伴過黃昏鏡拂鉛華膩爐藏桂燼溫終應催竹葉先擬詠桃根莫學啼成血從教夢寄魂吳王採香徑失路入煙村已上杏唐郭炯西掖瑞栁賦衆皆畢出盡達我則向日而衰衆皆黃落萎腓我則感時而盛不然何以知至德之動天運神功而瑞聖者矣翠色牂牂異酒泉嘉奈之祥輕盈淡淡同鄱郡枯梓之感煙銷雨霽霏素雪于宸居日晏春深雜繁花于睿覽梁元帝詠雲陽樓簷栁詩楊栁非花樹依樓自覺春枝邊通粉色隙裏映紅巾帶日交簾影因吹掃窗塵拂簷應有意偏宜桃李人唐太宗春池栁詩年栁變池臺隋堤曲直回逐浪分隂去迎風帶影來疏黃一鳥哢半翠幾眉開縈雪臨春岸參差間早梅姚係庭栁詩裊裊楊柳枝當軒雜珮垂交隂總共密分條各自宜因依似永久攬結更傷離愛此陽春色秋風莫遽吹溫庭筠栁詩楊栁千條拂面絲緑煙金穗不勝吹香隨靜婉歌塵起影伴嬌嬈舞袖垂羌管一聲何處曲流鶯百囀最髙枝千門九陌花如雪飛過宫墻兩不知李商隱謔栁詩已帶黃金縷仍飛白玉花長時須拂馬密處少藏鴉眉細從他斂腰輕莫自斜玳梁誰道好偏擬映盧家韓喜栁詩雪入青雲弄影微暖風遲日早鶯歸如慿細葉留春色須把長條繫落暉彭澤有情還鬱鬱隋隄無主自依依世間惹恨偏饒此可是行人折贈稀顧雲栁詩帶露含煙處處垂綻黃搖緑嫩參差長堤未見風飄絮廣陌初憐日映絲斜傍畫筵偷舞態低臨粧閣學愁眉離亭不放到春暮折盡拂簷千萬枝張昔小苑春望宫池栁色詩小苑春初至皇衢日更清遙分萬條栁迥出九重城隱映龍池潤參差鳯闕明影宜宫雪曙色帶禁煙晴深淺殘陽變髙低曉吹輕年光正堪折欲寄一枝榮賈稜御溝新栁詩御苑陽和早章溝栁色新託根偏近日布葉乍迎春秀質方含翠清隂欲庇人輕煙度斜景多露滴行塵裊裊堪離贈依依獨望頻王孫如可賞攀折在芳辰又歐陽詹詩東風韶景至垂栁御溝新媚作千門秀連為一道春柔荑生女指嫩葉長龍鱗舞絮回青岸輕煙拂緑蘋王孫初命賞佳客幾傷神芳意能相贈一枝先逺人又李觀詩御溝回廣陌芳栁對行人翠色枝枝滿年光樹樹新畏逢攀折客愁見别離辰近映章臺騎遙分禁苑春嫩隂初覆水髙影漸離塵莫入胡兒笛還令淚濕巾已上栁舒元輿牡丹賦圓玄瑞精有星而景有雲而卿其光下垂遇物流形草木得之發為紅英英之甚紅鍾乎牡丹拔類邁倫國香欺蘭我研物情次第而觀暮春氣極緑苞如珠清露宵偃韶光曉驅動蕩支節如解凝結百脈融暢氣不可遏兀然盛怒如將憤泄淑日披開照曜酷烈美膚膩體萬狀皆絶錦衾相覆繡帳連接晴籠晝薰宿霧宵裛或的的騰秀或亭亭露竒或颭然如招或儼然如思或帶風如吟或泫露如悲或垂然如縋或爛然如披或迎日擁階或照影臨池或山雞已馴或威鳯將飛乍疑孫武來此教戰其戰謂何搖搖纖柯玉欄滿風流霞成波歷階重臺萬朵千窠西子南威洛神湘娥或倚或扶朱顔已酡角衒紅缸爭嚬翠蛾灼灼妖妖逶逶迤迤漢宫三千豔列星河我見其少孰云其多弄彩呈妍壓景駢肩席奪銀燭爐升絳煙洞府真人會于羣仙晶熒往來金釭列錢凝睇相看曽不晤言未及行雨先驚早蓮公室侯家列之如麻咳唾萬金買此繁華遑恤終日以言相誇列幄庭中步障開霞曲廡重梁松篁相加如貯深閨似隔窗紗髣佛息媯依稀館娃我來觀之如乘仙槎脈脈不語遲遲日斜九衢遊人駿馬香車有酒如澠萬坐笙歌一醉是競孰知其他王建題所賃宅牡丹詩賃宅得花饒初開恐是妖霞光深紫膩肉色退紅嬌且願風流著唯愁日炙燋可憐零落蘂收取作香燒又賞牡丹詩此花名價别開豔益皇都香逼苓菱疑死紅燒躑躅枯軟光籠細脈妖色暖鮮膚滿蕊攢黃粉含稜縷綘蘇好和薰御服堪畫入宫圖晚態愁新婦殘粧望病夫教人知箇數留客賞斯須一夜輕風起千金買亦無韓愈戲題牡丹詩幸自同開俱隱約何須相倚鬭輕盈凌晨併作新粧面對客偏含不語情雙燕無機來拂略遊蜂多思正經營長年是事皆拋盡今日欄邊暫眼明白居易惜牡丹花詩惆悵階前紅牡丹晚來唯有兩花殘明朝風起應吹盡夜惜衰紅把火看李商隱牡丹詩錦帷初卷衛夫人繡被猶堆越鄂君垂手亂翻雕玉珮招腰爭舞鬱金裙石家蠟燭何曽剪荀令香爐可待薰我是夢中傳彩筆欲書花片寄朝雲白居易牡丹詩絶代祗西子衆芳唯牡丹月中虛有桂天上謾誇蘭夜濯金波滿朝傾玉露殘性因輕菡蓞根本是琅玕奪目霞千片陵風綺一端稍宜經宿雨偏覺耐春寒見説開元嵗初令植御欄貴妃嬌欲比侍女妬羞看巧類鴛機織光攢麝月團漸移公子第還種杏花壇豪士傾囊買貧儒假乘觀葉藏梧際鳯枝動鏡中鸞似笑賔初至如愁酒欲闌詩人忘芍藥釋子愧栴檀酷烈宜名夀恣容想姓潘素光翻鷺羽丹焰赩雞冠燕拂驚還語蜂貪困未安儻令紅臉笑兼解翠眉攢少長呈連蕚嬌矜寄合歡息肩移九軌無脛到千官日耀香房折風披蘂粉乾好酬青玉案稱貯碧冰盤璧要連城與珠堪十斛判更思初甲拆那得異泥蟠騷詠應遺恨農經祗粗刋魯般雕不得延夀筆將殫醉客同攀折佳人惜犯干始知來苑囿全勝在林巒泥滓當澆灑庭除又綽寬若將桃李並方覺效嚬難韓琮牡丹詩桃時杏日不爭濃葉帳隂成始放紅曉艷逺分金掌露暮香深惹玉堂風名移蘭杜千年後貴擅笙歌百醉中如夢如仙忽零落暮霞何處緑屏空盧綸裴給事宅白牡丹詩長安豪貴惜春殘爭玩街西紫牡丹别有玉盤承露冷無人起就月中看王貞白白牡丹詩穀雨洗纖素裁為白牡丹異香開玉合輕粉泥銀盤時貯露華濕宵傾月魄寒家人淡粧罷無語倚朱欄已上牡丹魏曹植芙蓉賦其始榮也皎若夜光尋扶桑其揚暉也晃若九陽出暘谷芙蓉蹇産菡蓞星屬絲條垂珠丹榮吐緑焜焜韡韡爛若龍燭觀者終朝情猶未足已上芙蓉唐王維海棠詩海邉佳樹生竒彩知是仙山取得栽瓊蘂籍中聞閬苑紫芝圖上見蓬萊淺深芳蕚通宵換委積紅英報晚開寄語春園百花道莫爭顔色泛金杯溫庭筠題磁嶺海棠花詩幽態竟誰賞嵗華空與期島回香盡處泉照艷濃時蜀彩淡搖曵吳粧低怨思王孫又誰恨惆悵下山遲鄭谷海棠詩春風用意勻顔色銷得攜觴與賦詩艷麗最宜新著雨嬌嬈全在欲開時莫愁粉黛臨窗懶梁廣丹青點筆遲朝醉暮吟看不足羡他蝴蝶宿深枝已上海棠楊巨源夏日裴尹員外西齋看花詩笑向東來客看花枉在前始知清夏月更勝艷陽天露濕呈粧汙風吹畏火燃蔥蘢和葉盛爛漫壓枝鮮紅彩當鈴閣清香到玉筵蝶栖驚曙色鶯語帶晴煙得地殊堪賞過時倍覺妍芳菲遲最好唯是謝家憐羅隱紅葉詩不奈荒城畔那堪晚照中野晴霜裛緑山冷雨摧紅遊子灞陵道美人長信宫等間俱嵗暮搖落意無窮唐彥謙紅葉詩無處不飄揚髙樓臨道旁素娥前夕月青女夜來霜宿雨隨時潤秋晴著物光幽懷長若此病眼更相妨蜀紙裁深色燕脂落靚粧低叢侵小閣倒影入回塘謝朓留霞綺甘寧棄錦張何人休逺道是處有斜陽薜荔垂書幌梧桐墜井床晚風生旅館寒籟近僧房桂緑明淮甸楓丹照楚鄉鴈疏臨鄠杜蟬急傍瀟湘樹異桓宣武園非顧辟疆茂陵愁卧客不自保危腸已上花葉許敬宗竹賦惟修竹之徑節偉聖賢之留賞覽山經而逖聽詠周詩而遐想掩寰中而獨秀非庶物之所仰若夫嶰谷著美稽山見知衛國之稱淇澳梁園之賦夾池山陽之翻密葉江潭之竦喬枝雖有聞于在昔諒無得而標竒上便娟而防露下檀欒而來風散歸雲之掩翳引落日之玲瓏雖復嚴霜曉結驚飇夕扇雪覆層臺寒生復殿惟貞心與徑節隨春冬而不變吳筠竹賦若乃渭川千畝山陽數林會稽方潤于碧玉羅浮比色于黃金上點點以雲翳下泠泠而鳯吟祛赫曦之燠景納淒涼之清隂王子所以嘯詠嵇生為之幽尋召嘉賔及令友暢緑醖與鳴琴美遊盤之逸趣清寂寞之逺心若乃夾滄江倚丹崿蓄水霧之沈沈搖巖煙之漠漠湘妃有揮涕之感楚謡興防露之作或挺鼓吹之嶔崟或垂天門之旁薄皆鸞鳯之所翔集孔翠之所棲託豈獨嬋娟於廣漢之壤亦有璀璨於蓬萊之峯結實珠粒敷花紫茸拂皓絮以飛雪摧紺莖以韻鐘故列仙之攸玩匪吾人之所從也亦有化雉吳國成龍葛陂容人篔簹育蟲桃枝一笋明其胤嗣三節獲乎嬰兒榮燈纂以感孝茂窗櫺以表竒篲霜壇以塵滅環石牀以隂滋皆靈變之譎怪良難得而備知爾其衆彚非一則有策簩筋蔓射筒籃箊蕕􅀢箛箠之肅矗龍鍾雲母之扶疏箬箭浮色以縹燠筨􅀢綷文而繡攄方志之所遺載山經之所闕書安可得而詳矣靡不徑堅其性蔥蒨厥色不規而圓不操而直故髙皇製冠以守位孝文剖符以表職博望侯傳于大夏之外穆天子樹于玄池之側推此類以彌廣匪斯文之可極也梁元帝竹詩嶰谷管新抽淇園節復修作龍還葛水為馬向并州柯亭臨絶澗桃枝夾細流冠學芙蓉勢花堪威鳯遊卭王若有獻張騫應拜侯陳隂鏗侍宴賦得夾池竹詩夾池一叢竹青翠不驚寒葉醖宜城酒皮裁薛縣冠湘川染別淚衡嶺拂仙壇欲見葳蕤色當來兔苑看唐虞世南賦得臨池竹詩蔥翠捎雲質垂彩映清池波泛含風影流搖防露枝龍鱗漾嶰谷鳯翅拂漣漪欲識凌冬性唯有嵗寒知李嶠竹詩髙簳楚江濆蕭條含翠氛白花搖鳯影青節動龍紋葉拂東南日枝捎西北雲誰知湘水上流淚獨思君王維沈十四拾遺新竹生讀經處同諸公作詩間居日清靜修竹復檀欒嫩節留餘籜新叢出舊欄細枝風響亂疏影月光寒樂府裁龍笛漁家伐釣竿何如道門裏青翠拂仙壇朱放竹詩青林何森然沈沈獨曙前出墻同淅瀝開户滿嬋娟籜卷初呈粉苔侵亂上錢疏中思水過深處若山連疊夜常栖露清朝乍有蟬砌隂迎緩䇿簷翠對攲眠迸笋雙分箭繁梢一向偏月過驚散雪風動極聞泉幽谷添詩譜髙人欲製篇蕭蕭意何限不獨住湘川令狐楚郡齋左偏栽竹詩齋居栽竹北窗邊素壁新開映碧鮮青藹近當行樂處緑隂深到卧帷前風驚曉葉如聞雨月過春枝似帶煙老子憶山心暫緩退公間坐對嬋娟白居易題盧祕書夏日新栽竹詩湘竹初封植盧生此考槃久持霜節苦新託露根難等度雖當户疏稠要滿欄買憐分薄俸栽稱作間官葉剪藍羅碎莖抽玉管端幾聲清淅瀝一簇緑檀欒未夜青嵐入先秋白露漙拂樓搖翡翠尉手弄琅玕韻繞窗風起隂鋪砌月殘炎天聞覺冷窄地見疑寬梢動勝搖扇枝低好挂冠碧籠煙羃幕珠灑雨珊珊曉籜晴雲展隂牙蟄虺蟠愛從抽馬䇿惜未截漁竿松韻徒頻聽桃天不足觀梁慙當家杏臺陋本司蘭撑撥詩人興勾牽酒客歡靜連蘆簟滑涼拂葛衣單豈止銷時暑應能保嵗寒莫同凡草木一種夏中看李紳南庭竹詩東南舊美陵霜操五月凝隂入座寒煙惹翠梢含玉露粉開春籜聳琅玕莫令戲馬童兒見試引為龍道士看須信結根香實在鳯皇終擬下雲端賈島題鄭常侍廳前竹詩緑竹臨詩酒嬋娟思不窮亂枝低積雪繁葉亞寒風蕭颯疑泉過縈回有徑通侵庭根出土隔壁笋成叢疏影紗窗外清音寶瑟中卷簾終日看欹枕幾秋同萬頃歌王子千竿伴阮公露光憐片片雨潤愛濛濛嶰谷蠻湖北湘川灞水東何如軒檻側蒼翠裊長空許渾題諸塘館竹詩蕭蕭陵雪霜濃翠異三湘疏影月移壁寒聲風滿堂卷簾秋更早髙枕夜偏長忽憶南遊路萬竿今正涼陳陶題僧院紫竹詩喜遊蛟井寺復見炎州竹杳藹萬丈間嘯風清獨速江南正霜霰吐秀弄顓頊似瑞驚堅貞如魔試金粟笋非孝子泣文異湘靈哭金碧誰與鄰蕭森自成族新聞赤帝種子落毛人谷逺祖賜鷦鵬遺芳遍南陸對煙蘇麻醜夾澗篔簹伏美譽動丹青瓌姿豔秦蜀因緣鹿苑識想像蛇丘斸幾葉別黃茅何年依白足龍樹蟄一花砌搖掃雲屋色靜曼陀羅名髙給孤獨青蔥太子樹灑落觀音目法雨每沾濡玉毫時照燭離居鸞節變住冷金顔縮豈念葛陂榮幸無狙父辱光搖水精串影送蓮花軸江霧日相尋野鶚時寄宿幽香入茶竈靜翠直碁局肯羡垣上蒿自多籬下菊從來道生一況伴龜藏六棲託詎星回檀欒已雲矗霞杯傳縹葉羽管吹紫玉久絶釣竿歌聊裁竹枝曲愧生黃金地千秋為師緑李嶠為百寮賀瑞笋表緑籜含霜紫苞承雪凌九冬而擢穎冒重隂而發翠伏惟陛下仁兼動植化感靈祇故得萌動維新象珍臺之更始貞堅效質符聖夀之無疆鄰帝座而虛心當嵗寒而抱節一人有慶萬類呈祥凡在見聞無不欣躍竹附物類部果唐張九齡荔枝賦果之美者厥有荔枝雖受氣于震方實稟精于火離乃作酸于此裔爰負陽以從宜蒙休和之所播涉寒暑而匪虧下合圍以擢本傍蔭畝而抱規紫文紺理黛葉緗枝蓊茸霮䨴環合棼纚如蓋之張如帷之垂雲煙沃若孔翠于斯靈根所盤不髙不卑陋下澤之沮洳惡層崖之嶮巇彼前志之或妄何側生之見疵爾其勾芒在辰凱風入律肇允含滋芳敷謐溢緑穗靡靡青英苾苾不豐其華但旨其實如有意乎敦本故從文而妙質蒂藥房以攢萃披龍鱗以駢比膚玉英而含津色江萍以吐日朱苞剖明璫出炯然數寸猶不可匹未玉齒而殆銷雖瓊漿而可軼彼衆味之有五此甘滋之不一伊醇淑之無準非精言之能悉聞者歡而竦企見者訝而驚仡心恚可以蠲忿口爽可以忘疾且欲神于醴露何比數于甘橘援蒲桃以見擬亦古人之深失若乃華軒洞開嘉賔四會時當燠煜客或煩憒而斯果在焉莫不心侈而體泰信雕盤之仙液實玳筵之綺繢有終食于纍百逾益氣而理內故無厭于所甘雖不貪而必愛沈李美而莫取浮瓜甘而自退豈一座之所榮冠四時而為最夫其貴可以薦宗廟珍可以羞王公亭十里而莫致門九重兮曷通山五嶠兮白雲江千里兮青楓何斯美之獨逺嗟爾命之不工每被誚于凡口罕獲知于貴躬柿何稱乎梁侯梨何幸乎張公亦因地之所遇孰能辨乎其中哉鄭谷荔枝樹詩二京曾見畫圖中數本芳菲色不同孤棹今來巴徼外一枝煙雨思無窮夜郎城近含春瘴杜宇巢低起暝風腸斷渝瀘霜霰薄不教葉似灞陵紅曹松南海陪鄭司空遊荔園詩荔枝時節出旌斿南國名園盡興遊亂結羅紋照襟袖别含瓊露爽咽喉葉中新火欺寒食樹上丹砂勝錦州他日為霖不將去也須圖畫取風流已上荔枝後梁宣帝櫻桃賦惟櫻桃之為樹先百果而含榮既離離而春就乍冉冉而冬迎異羣龍之無首垂牢器之晚成鳥才食而便墮雨薄灑而皆零未覩紅顔之實空有薦廟之名等橘柚于簷户匹諸薦乎中庭異梧桐之棲鳯愧緑竹之恆貞豈復論其美惡且聳幹乎前􅎉葉繁抽而掩日枝長弱而風生且得蔽乎羲赫實當暑之淒清梁簡文帝奉答南平王康賚朱櫻詩倒流映碧叢照露擎朱實花茂蝶爭飛枝濃鳥相失已麗金叉瓜仍美玉盤橘寧異梅似丸不羡萍如日永植平臺垂長與雲桂密徒然奉推甘終以愧操筆唐太宗賦得櫻桃詩華林滿芳景洛陽偏宜春朱顔含逺日翠色影長津喬柯囀嬌鳥低枝映美人昔作園中實今來席上珍權德輿酬裴傑秀才新櫻詩新果真瓊液來應宴紫蘭圓疑竊龍頷色已奪雞冠逺火微微辨殘星隱隱看茂先知味易曼倩恨偷難忍用烹騂駱從將玩玉盤流年如可駐何必九華丹已上櫻桃宋謝惠連甘賦嘉寒園之麗木美獨有此貞芳質葳蕤而懷風性耿介而凌霜擬夕霞以表色指朝景以齊圓侔萍實乎江介超玉果于崑山傾子節兮湘之區承君玩兮堂之隅濯雨兮冒霜長無絶兮芬敷陳徐陵詠甘詩朱實挺江南苞品擅珍淑上林雜嘉樹江潭間修竹萬室擬封家千株挺荆國緑葉萋以布素榮芬且郁得陳終宴歡良垂雲雨育已上甘梁吳均橘賦增枝之木既稱英于緑地金衣之果亦委體于玉盤見雲夢之千樹笑江陵之十欄葉葉之雲共琉璃而並碧枝枝之日與金輪而共丹若乃秋夜初露長郊欲素風賫寒而北來鴈銜霜而南渡方散藻于年深遂凝貞于冬暮唐何頻瑜洞庭獻新橘賦白商謝玄律改風落瑶林寒生窮海枇杷落而將盡荔枝摘而不待然後浮香外散美味中成照斜暉而金色帶曉潤而霜清圓甚垂珠琪樹方而孰可味能適口玉果比而全輕白居易揀貢橘書情詩洞庭貢橘揀宜精太守勤王請自行珠顆形容隨日長瓊漿氣味得霜成登山敢惜駑駘力望闕難申螻蟻情疏賤無由親跪獻願慿朱實表丹誠周元範奉和揀貢橘詩離離朱實緑叢中似火燒山處處紅影下寒林沈緑水火搖髙樹照晴空銀章自竭人臣力玉液誰知造化功看取明朝船發後餘香猶尚逐仁風李嶠橘詩萬里盤根植千株布葉繁既榮潘子賦方重陸生言玉花含霜動金衣逐吹翻願辭湘水曲長茂上林園已上橘晉傅玄桃賦有東園之珍果兮承隂陽之靈和結柔根以列樹兮豔長畝而駢羅夏日先熟初進廟堂辛氏踐秋厥味益長亦有冬桃冷侔冰霜放神適意恣口所嘗華升御于內庭兮飾佳人之令顔實充虛而療飢兮信功烈之難原嘉放牛于斯林兮恱萬國之乂安望海島而慷慨兮懷度朔之靈山何兹樹之獨茂兮條枝紛而麗間根龍虬而雲結兮彌萬里而屈盤禦百鬼之妖慝兮列神荼以司姧辟凶邪而濟正兮豈唯榮美之足言已上桃張協安石榴賦揮長枝以揚緑披翠葉以吐丹流暉俯散回葩仰照爛若百枝並燃爀如烽燧俱燎皎如朝日晃若龍燭晞絳綵于扶桑接朱光于若木爾乃赬蕚挺蒂金牙承蕤蔭佳人之玄髻發窈窕之素姿遊女一顧傾城無鹽化為南威于是天漢西流辰角南傾芳實纍落月滿虧盈爰採爰收乃剖乃拆內璘豳以含紫外滴瀝以震赤柔膚氷潔凝光玉瑩漼如冰碎泫若珠迸含清冷之溫潤信和神以理性已上榴唐李嶠梨詩擅美玄光側傳芳瀚海中鳯文疏象郡花影麗新豐春暮條應紫秋來葉早紅集作色對瑶池紫甘依大谷紅若令逢漢主還冀識張公已上梨梁簡文帝棗詩浮華齊水麗垂彩鄭都竒白英紛靡靡紫實摽離離風搖羊角樹日映雞心枝穀城踰石蜜蓬嶽表仙儀已聞安邑美永茂玉門垂已上棗梁禇澐奈詩成都貴素質酒泉稱白麗紅紫奪夏藻芬芳掩春蕙映日照新芳叢林抽晚翠誰為種三珠終焉競八桂不讓圜丘中粲潔華庭際已上奈唐李嶠梅詩大庾斂寒光南枝獨早芳雪含朝暝色風引去來香舞袖回青徑歌塵起畫梁若能遙止渴何暇泛瓊漿已上梅梁沈約麥李詩青玉冠西海碧石彌外區化為中園實其下成路衢在先良足貴因小邈難逾色潤房陵縹味奪寒水朱摘持欲以獻尚食且踟蹰王筠答元金紫餉朱李詩穠華春發彩結實不成蹊潘生詠金谷魏后沈寒溪逢君重妖麗移玩入崇閨慙無瓊玖報徒用萃幽棲已上李唐權德輿賀神龍寺渠中瑞蓮表絪緼降祉菡蓞敷榮瑞兹灼灼之華迥出田田之葉雙房挺茂一雨均霑栁宗元賀西內嘉蓮表祥圖煥開異彩交映道協重華慶傳種德陶隂陽之粹美孕造化之精英是使雙華擢秀連蒂垂芳香激大王之風影耀天泉之水煥開宫沼旁映給園靈貺應期天龍護聖寶厯敻超于小劫神功允洽于大千已上蓮李嶠菱詩巨野韶光暮東平春溜通影搖江浦月香引棹歌風日色翻池上潭花發鏡中五湖多賞樂千里望難窮已上菱物類部草梁江淹蓮花賦檢水陸之具品閲山海之異名珍爾秀之不定乃天地之精英殖東國以流詠出西極而擅名方翠羽而結葉比碧石而為莖蘂金花而赩色藕冰拆而玉清載紅蓮以吐秀披絳華以舒英故香氛感俗淑氣參靈躑躅人世茵蒀祇冥青桂羞烈沈水慙馨於是生乎澤陂出乎江隂見綵霞之夕照覿雕雲之晝臨既翕赩于洲渚亦映曖于川潯奪夜月及熒光掩朝日與赩火出金沙而延曜被淥波而覃沱冠百草而絶羣出異類之衆夥故仙聖傳圖英隱流記一為道珍二為世瑞發青蓮于王宫驗竒花於陸地若其江淡澤芬則照電爍日池光沼緑則明壁洞室曜長洲而瓊文映青崖而火質或慿天淵之清峭或殖疏圃之蒙密唐顔籀幽蘭賦灑嘉言而擅美擬自操以稱賢詠秀質于楚賦騰芳聲于漢篇冠庶卉而超絶歷終古而彌傳若乃浮雲卷岫明月澄天光風細轉清露微懸紫莖膏潤緑葉水鮮若翠羽之羣集譬彤霞之競燃宋之問秋蓮賦曉而望之若電裳宛轉朝玉京夕而察之若霞標灼爍散赤城既如秦女艷日兮鳯鳴又似洛妃拾翠兮鴻驚足使瑶草罷色芳樹無情復道兮詰曲離宫兮相屬飛閣兮周廬金鋪兮璧除君之駕兮旖旎蓮之葉兮扶疏萬乘顧兮駐綵騎六宫喜兮停羅裾仰仙遊而德澤縱玄覽而神虛豈與夫溪澗兮沼沚自生兮自死海沂兮江沱萬里兮煙波泛漢女遊湘娥佩鳴玉戲清渦中流欲渡兮木蘭楫幽泉一曲兮採蓮歌江南兮峴北汀洲兮不極既有芳兮蓑城長無依兮水國豈知移植天泉香飄列仙嬌紫臺之月露含玉宇之風煙雜葩兮照燭衆彩兮相宣鳥翡翠兮丹青翰樹珊瑚兮林碧鮮夫其生也春風盡蕩爍日相煎天桃盡兮穠李滅出大堤兮豔欲燃夫其謝也秋灰度管金氣騰天宫槐疏兮井桐變搖寒波兮風颯然歸根息豔兮八九月乘化無窮兮千萬年越人望兮已長久鄭女採兮無由緣何深蒂之能固何穠香之獨全別有待制揚雄悲秋宋玉夏之來兮玩早紅秋之暮兮悲餘緑禮盛燕臺人非楚材雲霞圖兮蘭為閣金銀酒兮蓮作杯落英兮徘徊風轉兮衰頽入黃扉兮灑錦石縈白蘋兮覆緑苔史近漢武帝齋宫産靈芝賦豈比夫楚水之空嘉萍實仙宫之獨貴玄霜拔竒瑶砌標異彤庭紫蓋與祥雲允合朱莖將火德相冥秀射猗蘭之室光連雲母之屏煥國典而永昭歌頌徹玄風而丕耀德馨彼丹甑呈豐器車表德潛美巖野挺芳幽側曷比夫耀甲乙之帳赫矣朱榮結天地之精混然剛克異朝菌之為體同夜光之非飾含聖澤以成春體正陽而稟色陸龜蒙書帶草賦吳娃楫上空羡苔滋魏主帷中惟通蕙氣或乃蘭熒越徼薰茂周原幽搜莫及興詠徒存此則對仲舉蕭疏之室處子山搖落之園不識深宫豈是曾為帝女非侵逺道誰言能憶王孫金燈照灼尚驚秦帝之焚粉蝶留連真謂羽陵之蠧楊炯幽蘭賦全惟幽蘭之芳草稟天地之純精抱青紫之竒色挺龍虎之佳名不起林而獨秀必固本而叢生爾乃丰茸十步綿連九畹莖受露而將低香從風而自逺當此之時叢蘭正滋美庭幃之孝子循南陔而採之楚襄王蘭臺之宫零落無叢漢武帝猗蘭之殿荒涼幾變聞昔日之芳菲恨今日之不見至若桃花水上佩蘭若而續魂竹箭山隂坐蘭亭而開宴江南則蘭澤為洲東海則蘭陵為縣隰有蘭兮蘭有枝贈逺別兮交新知氣如蘭兮長不改心若蘭兮終不移及夫東山月出西軒日晚受燕女于春闈降陳王于秋坂乃有送客金谷林塘坐曛鶴琴未罷龍劒將分蘭釭燭耀蘭麝氛氲舞袖回雪歌聲遏雲度清夜之未艾酌蘭英以奉君若夫靈均放逐離羣散侣亂鄢郢之南都下瀟湘之北渚步遲遲而適越心鬱鬱而懷楚徒眷戀于君王斂精神于帝女汀洲兮極目芳菲兮襲豫思公子兮不言結芳蘭兮延佇借如君章有德通神感靈懸車舊館請老山庭白露下而鶴警秋風髙而虬縈循階除而下望見秋蘭之青青重曰若有人兮山之阿紉秋蘭兮嵗月多思握之兮猶未得空珮之兮欲如何抽琴命操為幽蘭之歌歌曰幽蘭生兮于彼朝陽含雨露之津潤吸日月之休光美人愁思兮採芙蓉于南浦公子忘憂兮樹萱草于北堂雖處幽林與窮谷不以無人而不芳趙元淑聞而嘆曰昔聞蘭葉據龍圖復道蘭林引鳯雛鴻歸燕去紫莖歇露往霜來緑葉枯悲秋風之一敗與蒿草而為芻又庭菊賦含天地之精氣吹日月之淳光雲布霧合箕舒翼張鬱兮曼衍郁兮芬芳珉枝金蕚翠葉紅芒其在夕也言庭燎之晢晢其向晨也謂明星之煌煌爾其萬里年華九州春色花灼爍兮如錦草綿連兮似織當此時也和其光同其塵應春光而早殖及夫秋星下照金氣上騰風蕭蕭兮瑟瑟霜剌剌兮稜稜當此時也弱其志強其骨獨嵗寒而晚登雨還風去天長地久純黃象于后土故採桑而菊衣輕體御于神仙故登山而菊酒文賔採之而羽化康公服之而不朽東極于是長在南陽以之眉夀李康成採蓮詩採蓮去月沒春江曙翠鈿紅袖水中央青荷蓮子雜衣香雲起風生歸路長歸路長那得久各回船兩搖手王勃採蓮詩採蓮歸緑水芙蓉衣秋風起浪鳬雁飛桂棹蘭橈下長浦羅裙玉腕搖輕櫓葉嶼花潭極望平江謳越吹相思苦相思苦佳期不可駐塞外征夫猶未還江南採蓮今已暮今已暮摘蓮花渠今那必盡倡家官道城南把桑葉何如江上採蓮花蓮花復蓮花花葉何重疊葉翠本羞眉花紅強如頰佳人不在兹悵望別離時牽花憐共蒂折藕愛連絲故情無處所新物徒華滋不惜西津交解佩還羞北海雁書遲採蓮歌有節採蓮夜未歇正逢浩蕩江上風徘徊蓮浦夜相逢吳姬楚女何丰茸共問寒光千里外征客關山路幾重鄭愔採蓮詩錦楫沙棠艦羅帶石榴裙緑潭采荷芰清江日稍曛魚鳥爭唼喋花木相芬蒕不覺芳洲暮菱歌處處聞張敬徽採蓮詩遊女泛江晴蓮紅水復清競多愁日暮爭疾畏船傾波動疑叉落風生覺袖輕相看未盡意歸浦棹歌聲楊衡採蓮詩凝鮮霧渚夕揚艷緑波風魚遊乍散藻露重稍欹紅楚客傷暮節吳娃泣敗藂促令芳本固寧望雪霜中溫庭筠和太常杜少卿東都修竹里有嘉蓮詩春秋罷注直銅龍舊宅嘉蓮照水紅兩處龜巢清露裏一時魚躍翠莖東同心表瑞荀池上半面分粧樂鏡中應為臨川多麗句故持重艷向西風李紳重臺蓮詩緑荷舒卷涼風曉紅蕚開縈紫的重遊女漢皋爭笑臉二妃湘浦並愁容自含秋露貞姿潔不曉春妖冶態穠終恐玉京仙子識却持歸種碧池中雍陶永樂殷堯藩明府縣池嘉蓮詠詩青蘋白石匝蓮塘水裏蓮開帶瑞光露濕紅芳雙朵重風搖緑蒂一枝長同心梔子徒誇艷合穗嘉禾豈解香不獨豐祥先有應更宜花縣對潘郎李商隱荷花詩都無色可並不奈此香何瑶席乘涼設金羈落曉過覆衾燈照綺渡襪水沾羅預想秋前別離居夢棹歌王貞白宫池産瑞蓮詩雨露及萬物嘉祥有瑞蓮香飄雞樹近榮占鳯池先聖日臨雙麗恩波照並妍願同指佞草生向帝堯前唐太宗賦得殘菊花詩階蘭凝曙霜岸菊照晨光露濃晞曉笑風徑搖殘香細葉雕輕翠圓花飛碎黃還將今嵗色復結後年芳駱賔王秋菊詩擢秀三秋晚開芳十步中分黃俱笑日含翠共搖風碎影涵流動浮香隔岸通金翹徒可泛玉斝竟誰同白居易和錢員外早冬玩禁中新菊詩禁署寒氣遲孟冬菊初拆新黃間繁緑爛若金照碧仙郎小隱日心似陶彭澤秋憐潭上看日慣籬邊摘今來此地賞野意潛自適金馬門內花玉山峯下客寒芳引清句吟賞煙景夕賜酒色偏宜握蘭香不敵淒淒百卉死嵗晚冰霜積有此花開時殷勤助君惜李商隱菊詩暗暗淡淡紫融融冶冶黃陶令籬邊色羅含宅裏香幾時禁重露實是怯斜陽願泛金鸚鵡升君白玉堂又野菊詩苦竹園南椒塢邊微香冉冉淚涓涓已悲節物同寒鴈忍委芳心與暮蟬細路獨來當此夕清樽相伴省他年紫雲新苑移花處不取霜栽近御筵許棠白菊詩所向雪霜姿非關落帽期香飄風外別影到月中疑發在林凋後繁當露冷時人間稀有此自古乃無詩羅隱菊詩籬落嵗云晏數枝聊自芳雪裁纖蘂密金拆小苞香千載白衣酒一生青女霜春叢莫輕薄彼此有行藏梁孝元帝蘭澤多芳草詩春蘭本無艷春澤最葳蕤燕姬得夢罷尚書奏事歸臨池影入浪從風香拂衣當門已芬馥入室更芳菲蘭生不擇徑十步豈難稀陳張正見蘭生野徑詩披襟出蘭畹命酌動幽心鋤罷還開路歌喧自動琴華燈共影落芳杜雜花深莫言間徑裏遂不斷黃金唐張九齡園中時蔬盡加鋤理唯秋蘭數本委而不顧彼雖一物有足悲者遂賦二章詩幸得不鋤去孤苗守舊根無心羡旨蓄豈欲近名園遇賞寧充佩為生莫礙門幽林芳意在非是為人論釋無可蘭詩蘭色結春光氛氲掩衆芳過門階覆葉尋澤徑連香畹靜風吹亂亭秋雨引長靈均曾攬擷紉珮挂荷裳梁吳均採藥大布山詩我本此山北緣澗採山麻九莖日反照三葉長生花可以蠲憂疾聊持駐景斜景斜不可駐年來果如驅安得崑崙山偃蹇樹三珠三珠樹始荄絳葉陵朱臺玉壺白鳯肺金鼎青龍胎韓衆及王子何代無仙才安期倘欲顧相見在蓬萊唐王績採藥詩野情貪藥餌郊居倦蓬蓽青龍護道符白犬遊仙術要鐮戊巳月負鍤庚辛日時時斷嶂遮往往孤峯出行披葛仙經坐撿農皇帙龜蛇採二苓赤白尋雙术地凍根難盡藂枯苗易失從容肉作名薯蕷膏成質家豐松葉酒器貯參花蜜且復歸去來刀圭輔衰疾劉禹錫楚州開元寺北苑枸杞詩僧房藥樹依寒井井有香泉樹有靈翠黛葉生籠石甃殷紅子熟照銅瓶枝繁本是仙人杖根老新成瑞犬形上品功能甘露味還知一勺可延齡蕭穎士為李北海進芝草表遐考曩厯旁窺瑞諜多矣至若神爵九枝青龍三幹菌蠢池籞葳蕤甸服猶復登諸宗廟被以頌聲又況極道德之至精鑠玄元之景命超漢軼魏光圖掩諜之祕瑞哉雖復晨敷者五競爽于丹田嵗秀者三擢榮于玄圃以兹覩彼奚其瑣碎崔融為皇太子賀天后芝草表霑霈雨露之精搖動風雲之氣斜臨網樹分貝葉而重開近對淪池接蓮華而倒下豈與夫生于石室空傳好道之言産自珠宫徒事不經之説崔融為皇太子賀芝草表瑞命天來祥符日至煌煌三秀分芰井而攢柯曄曄九光間梅梁而吐葉晉都宫閣何必靈芝之臺洛邑山川居然密芝之地觀其如蓋如閣如日如星得五方之氣象合四時之景色仙人在上則車馬疑飛神龍居下則風雲不去謂蓬瀛之海列即崑閬之山開魏皇之雙幹莫儔漢帝之九莖為劣可以薦郊廟可以觴公卿梁庾肩吾答陶隱居賚术煎啓竊以緑葉抽條生于首峯之側紫花標色出自鄭岩之下百邪外禦六府內充山精見書華神在籙木熒火謝盡採擷之難啓旦移申窮淋漉之劑故能競爽雲珠爭竒冰玉自非身疲掌硯役倦攀桃豈可立致還年坐生羽翼臨沅丹井方覺可捐酈縣菊泉無勞復汲庶得遨遊海岸追涓子之塵馳騖霍山共陳生為侣謡俗輕施尚曰難酬出世鴻恩寧知上報唐于邵遊李校書花藥園序但覩其縹眇霞錯蔥蘢煙布密葉層映虛根不搖珠點夕露金燃曉光而後花發五色色帶深淺藂生一香香有近逺色若錦繡酷如芝蘭動皆襲人靜則奪目此李公及時之適也至若上苗可食下體可採子入菰飯華雜蒲葅既甘平而性寒又辛溫而執熱癖除而不為去傳風愈而安知及書此李公谷中之本也物類部蔬晉陸機瓜賦發金榮于秀翹結玉實于柔柯蔽翠景以自育綴修莖而星羅夫其種族類數則有括蔞定桃黃㼐白摶金文密筒小青大斑玄骭素碗貍首虎蹯東陵出于秦谷桂髓起于巫山五色比象殊形異端或濟貌以表內或惠心而醜顔或攄文而抱緑或披素而懷丹氣洪細而俱芬體修短而必圓芳郁烈其充堂味窮理而不䬼德𢎞濟于飢渴道殷流乎貴賤唐康子玉瓜賦爾其大則三尺二升美則金漿玉實狸頭羊骹之字黃㼐白摶之質感仙貴于孫鍾避世資于步隲異蒂表于前代同心彰乎曩日既而橫綺席會嘉賔琴樽逸賞海陸具陳香分四座氣雜八珍既取類于母子亦取辨於君臣李嶠瓜詩欲識東陵味青門五色瓜龍蹄逺珠履女臂動金花六子方呈瑞三仙實可嘉終期奉絺綌謁帝佇非賒栁宗元禮部賀嘉瓜表伏惟陛下保合太和緝熙庶類德馨上達神化旁行嘉瓜發祥來自侯服質惟同蒂見車書之永均地則移風知化育之方始七月而食豳土歌王業之艱五色稱珍東陵詠嘉賔之會未聞感通若斯昭著者也背芳春以初載近朱夏而自延奮修絲之漠漠邁秀體之綿綿赴廣武以長蔓粲煙接以雲連有葛虆之覃及象椒聊之衆多物類部鳥晉顧愷之鳳賦望太清以抗思誕儀鳯之逸羣稟鶉火之靈曜資和氣之煙煴允雞喙而燕頷宛蛇頸而龍文勵歸昌于漢陽發明德乎聖君荷義躡正雞跱鴻前比翼交輝五色備宣興八風而降時雨音中鍾律步則規矩朱冠赫以雙翹靈質翽其髙舉歷黃冠于招搖陵帝居之懸圃唐闕鳯巢阿閣賦臨四榮而肅乎雲委播五采而煥爾霞鮮爰居爰處恆依應龍之祥載飛載鳴寧侣化鴛之瓦道既砥平時亦鏡清厭丹穴而不息鄙髙岡而不鳴方為應至仁而來玄扈豈徒愛層構而集丹楹李解鳳凰來儀賦吸天地之嘉氣赴簫韶之雅聲知至道之可樂識太階之已平身安撫馴或顧步以屢舞心畏榮寵乍聮騫而若驚寧同衆鳥之德竊比達人之情夜宿椅桐之枝朝餐竹實之粒望雙闕以上下先百禽而翔集祥風飄而響清甘露沾而羽濕對離景以照耀披慶雲而出入崔損鳯鳴朝陽賦旁應玄律調十二管于四時上陵紫煙擊九萬里而一息非丹穴勿處非蒼竹不食小鵬起于扶搖卑鸞棲乎枳棘若夫雞冠燕頷心逺貌間雖衆禽之纍百諒比德而難攀六合為之澄朗八風于是揚清川不波而昭其德地不翳而感其聲李嶠鳯詩有鳥居丹穴其名曰鳯凰九苞應靈瑞五色成文章屢向秦樓側頻過洛水陽鳴岐今日見阿閣佇來翔已上鳯宋鮑照舞鶴賦散幽經以驗物偉胎化之仙禽鍾浮曠之藻質抱清迥之明心指蓬壺而翻翰望崑閬而揚音匝日域以回騖窮天步而髙尋踐神區其既逺積靈祀而方多精含丹而星曜頂凝紫而煙華引員吭之纖婉頓修趾之洪姱疊霜毛而弄影振玉羽而臨霞朝戲于芝田夕飲乎瑶池厭江海而遊澤掩雲羅而見羈去帝鄉之岑寂歸人寰之喧卑嵗峥嶸而愁暮心惆悵而哀離于是窮隂殺節急景凋年涼沙振野箕風動天嚴嚴苦霧皎皎悲泉冰塞長河雪滿羣山既而氛昏夜歇景物澄廓星翻漢回曉月將落感寒雞之早辰憐霜雁之違漠臨驚風之蕭條對流光之照灼唳清響于丹墀舞飛容于金閣始連軒以鳯蹌終宛轉而龍躍躑躅徘徊振迅騰摧驚身蓬集矯翅雪飛離綱别赴合緒相依將興中止若往而歸颯沓矜顧遷延遲暮逸翮後塵翺翥先路指會規翔臨岐矩步態有遺妍貌無停趣奔機逗節角睞分形長揚緩騖並翼連聲輕迹凌亂浮影交橫衆變繁姿參差洊密煙交霧凝若無毛質風去雨還不可殫悉既散魂而蕩目迷不知其所之忽星離而雲罷整神容而自持仰天居之崇絶更惆悵以驚思當是時也燕姬色沮巴童心恥巾拂兩停丸劒雙止雖邯鄲其敢倫豈陽阿之能擬入衛國而乘軒出吳都而傾市守馴養于千齡結長悲于萬里梁簡文帝賦得舞鶴詩來自芝田逺飛渡武溪深振迅依吳市差池逐晉琴竒聲傳回澗動翅拂花林欲知情外物伊洛有清潯隋孔德紹賦得華亭鶴詩華亭失侣鶴乘軒寵遂終三山陵苦霧千里激悲風心危白露下聲斷綵絃中何言斯物變翻復似遼東唐虞世南飛來雙白鶴詩飛來雙白鶴奮翼逺凌煙俱棲集紫蓋一舉背青田揚影過伊洛流聲入管絃鳴儔倒景外刷羽閬風前映海疑浮雪拂澗瀉飛泉燕雀能知去蜉蝣不識還何言別儔侣從此間山川顧步已相失徘徊反自憐危心猶警露哀響詎聞天無因振六翮輕舉復隨仙張九齡郡府中見羣鶴詩雲間有數鶴撫翼意無違曉日東田去宵煙北渚歸歡呼良自適羅列好相依逺集長江靜髙翔衆鳥稀豈煩仙子馭何畏野人機却念乘軒者拘留不得飛裴度白二十侍郎有雙鶴留在洛下豫西園多野水長松可以栖息遂以詩請之聞君有雙鶴羈旅洛城東未放歸仙去何如乞老翁且將臨野水莫閉在樊籠好是長鳴處西園白露中白居易酬裴相公乞豫雙鶴詩警露聲音好沖天相貌殊終宜向寥廓不稱在泥塗白首勞為伴朱門幸見呼不知疏野性解愛鳯池無李逺失鶴詩秋風吹起九皋禽一片間雲萬里心碧落有情應悵望瑶臺無路可追尋初來白雪翎猶短欲去丹砂頂漸深華表柱頭留語後更無消息到如今趙嘏山陽盧明府以雙鶴寄遺白氏以詩為答因寄和詩緱山雙去羽翰輕應為仙家好弟兄茅固枕前秋對舞陸雲溪上夜曾鳴紫泥封處曽回首碧落歸時莫問程自笑滄江一漁叟何由似爾到層城李羣玉失鶴詩瑶臺煙霧外一去沒還心暗海蓬壺逺秋風碧落深墮翎留片雪雅操入孤琴不是籠中物雲羅更莫尋已上鶴周庾信齊王進蒼烏表臣聞飛南陽之雉尚闡霸圖下建章之鵠猶調和氣況乃虞廷告瑞姬社呈祥咸髙識哺之心實貫能知之性伏惟皇帝陛下德教百姓孝刑四海攝提從紀天下文明是以東海輸禽乍改黔質西山度羽或變蒼精臣去月三十日行到陜州獲大都督莫仁回樂列稱于州射堂內見一蒼烏林薄回翔循環不去駐乘木之精轉司風之翼即召儀同等同時觀見斯實禮敬所覃孝慈之感理宜歸瑞祕圖書祥帝册用光至德取效升平無令赤鳯留止偏為瘞玉之歌玄鶴徘徊獨擅銜珠之舞唐張説進白烏賦雪羽霜毛冰清玉狀拔竒緑林之下賞異紫臺之上瞰鳷鵲之紗窗抱鳯凰之衣桁恐同類之見嫉畏不才之速謗期委命于渥恩豈願思于間放採朝噪之聲樂眷夜啼之曲新無芒距而躍武不鈎觜以懷仁謝先容而特達却假飾以全真鑒深心于反哺終報德于君親裴度白烏呈瑞賦上瓊樹而若無下瑶階而乍失懷恩反哺方去去以凌雲養素來儀且翻翻而就日不染而成因心之孝以立匪召而至感物之道遐宣雲凝標于羽族玉潤合于王度常從碧海隨杲日而悠揚今在華林偶盛時而瞻顧孟簡白烏呈瑞賦驗白烏之祥諜告皇家之寶祚蓋由天子張至仁本太素享宗廟而無爽薦孝敬而有度何嘗日浴翻皓體以來儀曽異火流奚丹羽之可慕凌翯翯之白鳥類振振之翔鷺稟純德而自甄誠衆色之難汙觀其皎皎竒狀明明麗質霜毳潔朗玉姿間逸不愛其瑞嘉載飛之可瞻思效其祥見莫黑之如失出林而日華亂動繞樹而月影相鮮已上烏晉潘嶽射雉賦涉青林以遊覽兮樂羽族之羣飛聿采毛之英麗兮有五色之名翬厲耿介之專心兮侈雄豔之姱姿巡丘陵以經略兮畫墳衍而分畿麥漸漸以擢芒雉鷕鷕而朝雊眄箱籠以揭驕睨驍媒之變態奮徑骹以角搓瞵悍目以旁睞鶯綺翼而赬撾灼繡頸而衮背鬱軒翥以餘怒思長鳴以效能爾乃搬場拄翳停僮蔥翠緑柏參差文翮鱗次蕭森繁茂婉轉輕利裏料戾以徹鑒表厭躡以密緻恐吾遊之晏起慮原禽之罕至甘疲心于企想分倦目以寓視何調翰之喬桀邈儔類而殊才候扇舉而清呌野聞聲而應媒褰微罟以長眺已踉蹡而徐來摛朱冠之赩赫敷藻翰之毰毸首藥緑素身拖黼繪青鞦莎靡丹臆蘭綷或蹶或啄時行時止斑尾揚翹雙角特起良遊厄喔引之規裏應叱愕立擢身竦峙捧黃間以密彀屬剛罫以潛擬倒禽紛以迸落機聲振而未已唐謝觀越裳獻白雉賦閉靈質于雕玉馳星使于絶域夕辭南土形迷夜月之光曉向北風影混朝霜之色過吳門而練影光透惹曹風而麻衣色浮歷雉門而捧進隨鴻臚而坌入俯雕題而就位拱疏趾以前集利觜玉植修領縞戢風搖細尾當軒而練帶長垂日照輕毛在手而雪花孤立以其耿介無比貞明可稱距列瑶刺身摛鶴翎徘徊而隟駒其轉奮迅而振鷺將興其淨珉潔其神露凝皎皎敷粉亭亭卓冰自稟時清之化誠非日浴之能已上雉隋許善心神雀頌序月棲日浴熱坂寒門吹鱗沒羽之荒赤蛇青馬之裔解辮請吏削袵承風豈止呼韓北埸俯勒狼居之岫息慎南境近表不耐之城故使天不愛道地寧吝寶川嶽展異幽顯效靈狎素遊赬團膏潄醴半景青赤孳歷虧盈足足懷仁般般擾義祥祐之來若此升降之化如彼白爵主鐵象之竒赤爵銜丹書之貴班固神爵之頌履武戴文曹植嘉雀之篇棲庭集牖未若于飛武帳來賀文㮰刷彩青蒲將翺赤罽玉几朝御取玩軒楯之間金門旦開兼留翬翟之鑒終古曠世未或前聞福召冥徵得之兹日煥發王䇿昭彰帝道御地七神飛天五老山祗吐祕河靈孕寶黑羽升壇青麟伏皂丹烏流火白雉從風棲阿德卲鳴岐祚隆未如神爵近賀王宫五靈何有百福攸同孔圖獻赤荀文表白節節竒音行行瑞迹化玉黼扆銜環陛戟上天之命明神所格謹按考異記曰軒轅有黃爵赤頭立日傍占云土精之應又禮稽命徵云祭祀合宜則黃雀集昔漢集泰畤之殿魏立文昌之宫一見雍丘之祠三入東平一作平東之府並旁觀回矚事陋人微奚足稱之矣周庾信齊王進赤雀表臣聞南陽雉飛尚論秦霸建章鵠下猶明漢德當今天不愛寶地必呈祥自應長樂觀符文昌啓瑞光同朱鳯色類丹烏降火飛精似入公車之府流金成製若上凌雲之臺謹按赤雀銜書止于酆户周之受命興乎此祥即事所觀同符合契實可圖形瑞譜書頌儒林事足成臺名堪紀號豈直雲中太守見赤心之奉主蓬萊童子知白環之報恩已上雀宋汪藻賀赤烏白鵲表治格時雍祥昭羽屬生皆異稟凝丹素以成形出若相符信圖書之上瑞必有召此來非偶然伏以烏本陽精鵲知嵗事方聖祚紹隆於火德適天時應在于金穰宜爾珍禽呈兹瑞質孝能致哺煌煌儀則之新喜必傳音翯翯羽毛之潔用明諸福之畢至孰謂二蟲之無知是生神物來相昌期將合采以成章乃同時而薦祉徊翔有煒協周家王屋之符粹美而真異莊子雕陵之見既九重之有托寧三匝以求安已上鵲唐鄭繇白鷹詩白錦文章亂丹霄羽翮齊雲間呼暫下雪裏放還迷梁苑驚池鶩陳倉拂野雞不知寥廓外何處是依棲張謂進白鷹狀特稟異氣挺生殊姿頭圓頂平臆濶脛短丹目時轉志凌雲霄花毛始齊色淨霜雪徒有願于擊搏竟無階于效用今寒風凛冽殺氣嚴凝萬乘時巡六龍各狩出樊籠之地登校獵之場必能隨人指縱驅御苑之狐兔順時行令逐禁林之鳥雀物性有適天心所知蘇頲雙白鷹讃序皓如練色班若綵章積雪全映飛花碎點所謂金氣之英瑶光之精髙髻偉臆長距秀頸奮發而鋭堅剛則厲摩天絶海電擊飈逝觀其行時令順秋殺指麾應捷顧盼餘雄當落鵬之賞蔑仇鷂之敵實稀代之尤也職命司冦師惟尚父聞針刺姦擇善為吏晉孫楚鷹賦有金剛之俊鳥生井陘之巖阻超萬仞之崇巔蔭青松以靜處體徑悍之自然振肅肅之輕羽摛狡兔于平原截鴻雁于河渚且其為相也疏尾濶臆髙鬐秃顱深目蛾眉狀似愁胡曲觜短頸足若雙枯麾則應機招則易呼背碣石以西遊經馬嶺而南徂于時商秋既邁嵗在玄冥風霜激厲羽毛振驚爾乃䇿良驥服羔裘鞲青骹戲田疇縈深谷繞山丘定心意審精眸獸馳厥足鳥矯其翼下赴幽溪上翔辰極隨指授以騰踴因升降以畢力紛連薄以攖竄遂陷首以摧臆唐闕蒼鷹賦散以瑶光之彩來自鍾巖之丘周官以司寇比德漢氏以將軍作儔鈎成利嘴電轉竒眸蒼姿疊色玄距聨鞲凌紫氣而蔽日下平皋而覆草歸鴻失四飛之路狡兔亡三穴之道章孝標見人臂蒼鷹詩星眸未放瞥秋毫頻掣金鈴試雪毛會使老拳供口腹莫辭親口啖腥臊穿雲自怪身如電殺兔誰知爪勝刀可惜忍飢寒日暮向人鵮知咸切鳥啄食也斷碧絲絛已上鷹杜甫雕賦當九秋之清淒見一鶚之直上以雄才為己任橫殺氣而獨往梢梢徑翻肅肅遺響杳不可追俊無留賞然後綴以珠飾呈于至尊摶風槍櫐用壯旌門乘輿或幸别館獵平原塞蕪空濶霜仗喧繁觀其夾翠華而上下卷毛血之崩奔隨意氣而電落引塵沙而晝昏豁堵墻之榮觀棄功效而不論斯亦足重也降精于金立骨如鐵目通于腦筋入于節架軒楹之上純漆光芒掣棟梁之間寒風凜烈雖趾蹻千變林嶺萬穴擊藂薄之不開突杈丫而皆折此又有觸邪之義也已上雕李雍鶻賦一指一呼一擊一搏為主之用騁人之樂凛然神動翕然氣作殞三窟之狡兔斃五里之仙鶴騰霄漢而風卷透原野而星落萬乘為之顧盼六軍為之揮霍歡聲動于天地逸氣靄于林薄驅逐妙于人智促節合于兵機禽雖小而不陋獸雖捷而無依或則九霄擊下萬里接來風行電轉月上雲開乍差池而不中終棄置而不回彼俊異之英決豈凝滯于嫌猜髙適奉和鶻賦嚴冬欲雪蔓草初焚野莽蕩而風緊天峥嶸而日曛忿頑兔之狡伏恥髙鳥之成羣始滅沒而略地忽升騰而篲雲翻決裂以電擊皆披靡而星分奔走者折脅而絶脰鳴噪者血灑而毛紛雖百中而自我終一呼而在君翕六翮以直上交雙指以迅擊合連弩之應機類鳴􅐴之破的升巢絶壁獨立危條心倐忽于萬里思超遙于九霄豈外物之能慕豈凡禽之見邀已上鶻陳後主夜亭度鴈賦春望山楹日暖苔生雲隨竹動月共水明暫逍遙于夕徑聽霜鴻之度聲度聲已悽切猶含關塞鳴從風兮前侣駛帶暗兮後羣驚帛久兮書字滅蘆束兮斷銜輕唐盧照鄰失羣雁詩三秋北地雪皚皚萬里南翔渡海來欲隨石燕沈湘水試逐銅烏繞帝臺帝臺銀闕距金塘中間鴛鷺已成行先過上苑傳書信暫下中州戲稻粱虞人負繳來相及齊客虛弓忽見傷毛翎憔􅀈飛無力羽翮摧頽君不識唯有莊周解愛鳴復道郊歌重竒色惆悵驚思悲未已徘徊自憐中罔極傳聞有鳥集朝陽詎勝仙鳬邇帝鄉雲間海上應鳴舞逺得鵾絃猶獨撫金龜全寫中牟印玉鵠當變萊蕪釜願君弄影鳯凰池時憶籠中摧折羽又同臨津紀明府孤鴈詩三秋違北雁萬里向南翔河洲花稍白關塞葉初黃避繳風霜徑懷書道路長水流疑箭動月照似弓傷橫天無有陳度海不成行會刷能鳴羽還赴上林鄉駱賔王秋鴈詩聮翩辭海曲搖曳指江干陳去金河冷書歸玉塞寒帶月凌空易迷煙逗浦難何當同顧影刷羽泛清瀾又詠雁詩唼藻滄江逺銜蘆紫塞長霧深迷曉景風急斷秋行陳照通宵月書封幾夜霜無復能鳴分空知愧稻粱杜牧早鴈詩金河秋半虜弦開雲際驚飛四散哀仙掌月明孤影過長門燈暗數聲來須知胡騎紛紛在豈逐春風一一回莫厭瀟湘少人處水多菰米岸莓苔鄭谷早鴈詩八月悲風九月霜蓼花紅淡葦條黃石頭城下波搖影星子灣西雲間行驚散漁家吹短笛失羣征戍鎖殘陽故鄉聞爾亦惆悵何況扁舟非故鄉已上鴈樊晦燕巢賦鳯凰集于梧桐鷦鷯巢于枳棘俱順時以適理盡攝生以自得豈如雕梁禖燕葺髙巢以安息既開珧户逐仙羽以長生或在王筵疑作玉筐文選安陸王碑文注有娀氏取燕復入筐馴主人而含識質有稟于玄造妙無方兮何極頡頏金屋差池翠宫銜泥繞棟度勢巡空憐綺窗之華影愛羅幌之春風得地相賀分飛就功廣狹殊軌規模不同散彩彬斑攢文潗㵫疊輕蘂而矜暖布重泥而訝濕陳蕭詮銜泥雙燕詩銜泥金屋外表瑞玉筐中學飛疑漢妾巢幕憚吳宫爪截還猶短窠成長不空詎並零陵石飛舞逐春風唐李嶠燕詩天女伺辰至玄依淡碧空差池沐時雨頡頏舞春風相賀雕楹側雙飛翠幕中勿驚留爪去猶冀識吳宫李益早燕送別詩碧草漫如線來去雙飛燕長門未有春先入班姬殿梁空繞復息簷寒窺欲遍今至隨紅蘂昔還悲素扇一别與秋鴻差池詎相見鄭谷燕詩年去年來來去忙春寒煙暝度瀟湘低飛緑岸和梅雨散入紅樓揀杏梁間几硯中窺水淺落花徑裏得泥香千言萬語無人會又逐流鶯過短牆已上燕漢禰衡鸚鵡賦惟西域之靈鳥挺自然之竒姿體金精之妙質含火德之明輝性辨慧而能言兮才聰明以識機故其嬉遊髙峻栖跱幽深飛不妄集翔必擇林紺趾丹觜緑衣翠襟采采麗容咬咬好音雖同族于羽毛固殊智而異心配鸞皇而等美焉比德于衆禽於是羡芳聲之逺揚偉靈表之可嘉命虞人于隴坻詔伯益於流沙跨崑崙而播弋冠雲霓而張羅雖綱維之備設終一目之所加且其容止間暇守植安停逼之不懼撫之不驚寧順從以逺害不違忤以喪生故獻全者受賞而傷肌者被刑爾乃歸窮委命離羣喪侣閉以雕籠翦其翅羽流飄萬里﨑嶇重阻踰岷越障載罹寒暑女辭家而適人臣出身而事主彼賢哲之逢患猶棲遲以羈旅矧禽鳥之微物能馴擾以安處宋謝莊赤鸚鵡賦及其雲移霞峙霰委雪翻陸離翬漸容裔鴻軒躍林飛岫煥若輕電溢煙門集場棲圃曄若夭桃被玉園至于氣淳體浮霧下崖沈月圖光于緑水雲寫影于青林遡還風而聳翮霑清露而調音唐李百藥鸚鵡賦繡領綺翼紅襟翠裳飾以朱紫間以玄黃碧雞仰而寢色金鵝對以韜光亘萬里之重阻隨四夷而來王既逾嶺以自致亦凌江而逺翔開神情之聰辨發樞機而抑揚咨此鳥之來儀亦攝生而遂性辨方物于圖象具靈表于言詠酬對清敏發吐祥正實靡靡而可恱雖喋喋而無競徘徊阿閣容與堂皇背風雲之遐路承日月之休光聽簫韶之逸響味椒掖之餘芳更無歎于羅罻終懷恩于稻粱應舞節以鸞回慕知來而鵲起先假道于朱咮方徐行于紺趾配六象以表德參四靈而效祉庭開霧夕景淨霞空乍褰珠網始出金籠遊萬年于木末玩四照于花叢窺仙盤而飲露登井幹以承風唐闕白鸚鵡賦雪膚皎晶擯池鷗之光潔霜毛瑩淨奪軒郝名逺白鸚鵡賦霜毛雪毳鮮襟皓臆明眸珠朗修趾赬飾理翮整翰仰雲路而翻飛自邇陟遐託風林以棲息已上鸚鵡梁元帝鴛鴦賦勝林鳥之同心邁池魚之比目朝浮兮浪華夜集兮江沙萍隨流而傅岸網因風而綴花見虹梁之春色復相鳴而戢翼蘭渚兮相依同盛兮同衰魂上相思之樹文生新市之機金雞玉鵲不成羣紫鶴紅雉一生分願學鴛鴦鳥連翩恆逐君崔珏和友人鴛鴦詩三首翠鬛紅毛舞夕暉水禽情似此禽稀暫分煙島猶回首只渡寒塘亦並飛映霧乍迷金殿瓦逐梭齊上玉人機採蓮無限蘭橈女笑指中流羡爾歸寂寂春塘煙晚時兩心如影共依依溪頭日暖眠沙穩渡口風寒浴浪稀翡翠莫誇饒彩飾鸊鵜須美好毛衣蘭深芷密無人見相逐相呼何處歸舞鶴翔鸞俱别離可憐生死兩相隨紅絲毳落眠沙處白雪花成蹙浪時琴上只聞交頸語窗前空展共飛時如何相見長相對肯羡人間多所思已上鴛鴦魏鍾會孔雀賦有炎方之偉鳥感靈和而來儀稟麗精以挺質生丹穴之南垂戴翠旄以表辨垂緑蕤之森纚裁修尾之翹翹若順風而揚麾五色點注華羽參差鱗交綺錯文藻陸離丹口金輔玄目素規或舒翼軒峙奮迅洪姿或蹀足躇蹰鳴嘯郁咿已上孔雀梁沈約反舌賦其聲也驚詭噂噆縈紆離亂駢浮回合嵒危瑣散或發曲無漸或收音去半既含意于將曉亦流妍于始旦雜沓逶迤噭咷參差攢嬌動葉促囀縈枝分宫析徵萬矩千規因風起哢曳響生竒對芳辰于此月屬今余之遵暮倦城守之喧疲愛田郊之間素眷春物而懷之聞好音于庭樹已上反舌唐張何織鳥詩季春三月裏戴勝下桑來映日華冠動迎風繡羽開候驚蠶事晚織向女工裁旅宿依花定輕飛繞樹回欲過髙閣栁更拂小庭梅所寄一枝在寧憂弋者猜陸扆禁林聞曉鶯詩曙色分層漢鶯聲繞上林報花開瑞錦催栁綻黃金斷續隨風逺間關送月沈語當溫樹近飛覺禁林深繡户驚殘夢瑶池囀好音願將棲息意從此沃天心顧況春鳥詞送元秀才入京詩春來繡羽齊暮向竹林栖禁苑銜花出河橋隔樹啼尋聲知去逺顧影念飛低别有無巢燕猶窺幕上泥已上鶯晉傅玄鬬雞賦玄羽黝而含曜兮素毛熲而揚精紅縹厠于微黃兮翠彩蔚而流青五色錯而成文兮質光麗而豐盈前看如倒傍視如傾目象規作觜似削成髙膺峭跱雙翅齊平躍身竦體怒勢橫生爪似鍊鋼目如奔星揚翹因風撫翮長鳴猛志橫逸勢凌天廷或躑躅踟蹰或囁喋容與或爬地俯仰或撫翼未舉或狼顧鴟視或鸞翔鵠舞或佯背而引敵或畢命于強禦于是紛紜翕赫雷合電擊爭奮身而相戟兮競隼鷙而雕睨得勢者凌九天失據者淪九地徒觀其戰也則距不虛挂翮不徒拊意如飢鷹勢如逸虎梁簡文帝鬭雞詩歡樂良無已東郊春可遊百花非一色新田多異流龍尾橫津漢車箱起戍樓玉冠初警敵芥羽忽猜儔十日驕既滿九勝勢恆遒脫使田饒見堪能説魯侯又劉孝威詩丹雞翠羽張妬敵復專場翅中含芥粉距外耀金芒氣踰上黨烈名貴下韝良祭橋愁魏后食跖忌齊王願賜淮南藥一使雲間翔唐杜淹寒食鬬雞詩寒食東郊上揚鞲競出籠花冠初照日芥羽正生風顧敵知心勇先鳴覺氣雄長翹頻拂陳利距屢通中飛毛遍緑野灑血漬芳叢雖然百戰勝會自不論功陳張正見晨雞髙樹鳴詩晨雞振翮鳴咿喔擅竒聲蜀郡隨金馬天津應玉衡摧冠驗逺石繫火出連營爭棲斜揭暮解翼橫飛度試飲淮南藥翻上仙都樹枝低且候潮葉淺還承露承露觸嚴霜葉淺向朝陽猜羣怯寶劒勇戰出花場尚損黃金距誰論白玉璫長鳴逢晉帝恃氣遇周王流名説魯國分影入陳倉不復愁苻朗猶能感孟嘗已上雞物類部獸唐李嶠賀麟迹表靈貺潛開禎符顯發唯此仁獸獨冠毛羣識變知機通靈感化悟金輪之欲轉即見殊祥知玉輦之方遊先呈異迹九九為數曜儀院內有麟迹八十一故云明厯算之無疆濯濯咸歌見休明之有應五蹄顯五方之會一角彰一統之符式廣𢎞基方鴻象教昔有鳯巢軒閣纓冕相趨龍止堯壇神祗動色豈若祥開紫掖瑞感玄樞發揮萬劫之符幽贊三天之果美超五籍珍越四靈曠千古而不聞超九皇而獨逺張仲素賀東川麟表伏惟陛下昭事上帝凝情衢室宵興滌慮申旦忘倦大敷至化以永時雍故得希世之祥應我皇運異質卓犖竒彩光明顧步幽巖發聞郡國神物自生于聖日靈編徒載其嘉名況大田之中衆穗斯茂沐以膏澤扇其和氣而後呈彼珍羣承兹共抵必生長畝之秀以期王者之瑞因緣所驗鄭重合符有以識上聖之心兆至和之本德超千古慶洽無疆日月所均無思不服已上麟唐闕獬豸賦步玄墀以龍擾向彤庭而鶚視夫其洪纎之狀周正之儀摶風比毳素絲類皮人間之所常覩天下之所備知騰雙眸而舉柱聳特角而觸邪宋皓獬豸賦肇允丕應時惟我皇咨爾輔弼咸懷忠良感觸邪之義成無妄之綱五福儲峙四靈倣徨爾有足兮不行而至爾有角兮其用也剛人是知勸實丁厥祥孰與鳯鳥去飛龍圖未揚惜暌濶于明代竟流連于素王懿兹神獸間執讒慝分兩造之疑冠百祥之特勇毅而能斷智明而不惑守法者仰之以司南疾惡者投之于有北固操斧而思用因伐柯而取則龍闕分官烏臺肅政扶直指之角象繩愆之性聮繡衣以生風借白簡而增徑物莫不肅時靡有競已上獬豸虞世南獅子賦其為狀也則筋骨糾纒殊文異制濶臆修尾徑毫柔毳鈎爪鋸牙藏鋒蓄鋭弭耳宛足伺間借勢暨乎奮鬛舐脣倐來忽往瞋目電曜發聲雷響拉虎吞貔裂犀分象碎遒兕于斷齶屈巴蛇於指掌踐藉則林麓摧殘哮呼則江河振蕩牛上士獅子賦非取俊于熊豹豈方姿于甝虪簇拳毛以被徑縷柔毳以為裳口裂奔貙足捎狂兕猛虎摧于掌握豪豬碎于牙齒已上獅闕越人獻馴象賦牙櫛比而槮槮眼星翻而熠熠中黃雖勇力不能加蒼舒信竒知之莫及輪囷而重若旄丘贔屭而髙如巨防執燧奔戰牽鈎委貺常衮賀文丹國獻白象表舊典未載之邦前王不賔之長聲教所隔言語莫通攸攸南溟幾千萬里瞻望中國知有聖人踰海而來歷年方至陵冒重阻奔波載馳黃金設冠白璫玩耳伏柔羣象獻致闕前低徊馴擾稽顙屈膝隨萬國而來庭與百獸而率舞如知禮樂之節益盛羽儀之容犀來徼外表章帝之重熙雉貢越裳慕成王之極治昔虞因齒以焚身今獲逢辰而獻技名應周郊之五輅克協御儀耳聞舜樂之八音能參率舞已上象虞世南白鹿賦有金方之瑞獸乃曜質于名都既馴洽于郊甸亦騰倚于山隅素毳呈彩霜毫應圖宴嘉賔于雅什偶仙客于天衢故能著美祥瑞流名典謨李蒙上林白鹿賦粵有竒獸言彰聖德賁然來思載白其色才麌麌以呈貺不呦呦于野食謝仙家之騰倚歸御苑而棲息于是上囿幽間禁林清祕炯如玉立皎若霜萃場町疃于地沙影光芒于山翠畫輻為飾能隨太守之車緣繢稱珍可薦王侯之位徑角昭勇縞色呈鮮應皇家之盛德當聖運之承天足使殷帝之狼恥擅銜鈎之瑞吳門之馬慙當曳練之妍已上鹿蔣防白兔賦乘金氣而來居然正色因月輪而下大叶祥經皎似霜輝溫如玉粹毫素絲而可擬足瓊枝而取類與三窟以殊歸將五靈而共至飲玉池而冰光不散食瑶草而雪影長新倘使銜鈎殷帝之狼不若如令受彩江生之筆非神梁簡文帝上白兔表瑞表丹陵祥因舊沛四靈可邁既驗玉衡之精千嵗變采有符明月之狀豈殊丹岫之羽來止帝梧庶比素質之禽得遊君囿周庾信齊王進白兔表臣聞與國欲逺則玉虎晨鳴轍迹方開則銀麞入貢伏惟陛下明明在上翼翼居尊德動天關威移地軸是以風煙照燭毛羽徵祥史不絶書府無虛日臣受脤元戎用綏邊鄙轅門所屆始次熊山前茅慮無乃獲白兔光鮮越雉色麗秦狐月德符徵金精表瑞呈祥輿頌效異披圖尊敬之迹既明應事之機斯兆臣之龔行實從陜略瑞以素質彌雄西氣庶重承廟算方事申威掩代偃齊分韓裂趙不任鳬藻踊躍之情唐令狐楚為人進白兔狀皓質玉立素毛霜垂清明不遜于殷狼皎潔可齊于周鹿協元符之一氣彰皇德于千齡雖標中瑞之科實應太廟之曲皓然養素恬爾守柔方𢎞三面之仁果應千齡之瑞冰光雪影被白含文豈比魯傳趙郡獨歌如練之詞實同晉獲夀春又繼凝鉛之詠來從月窟疊霜毳以蒙茸獻自梁園粲冰毫而皎潔增輝瑞牒歸美皇猷協太隂之瑞應千嵗之祥育質雪園淪精月殿紀周宣舞鎬之年外攘復古按韓愈辨徐之説不戰來戎已上兔宋劉義恭白馬賦是以周稱踰輪漢則天駟體自乾維衍生坎位伊赭白之為駿超絶世而稱驥爾其為狀也竦身輕足髙顙露睛氣猛聲烈步逺視明著獻西宛表德東京價傾幽夏觀竭都城飾金鑁之倐爍揚玉鸞之玲瓏發鳴鏑于懸月驅永埒于修坰旋四介以作好耀二矛之重英舉舊間而未儔考前迅而較名顔延之赭白馬賦昔帝軒陟位飛黃服皂后唐膺籙赤文候日漢道亨而天驥呈才魏德懋而澤馬效質伊逸倫之妙足自前代而間出並榮光于瑞典登郊歌乎司律所以崇衛威神扶護警蹕精曜叶從靈物咸秩徒觀其附筋樹骨垂梢植髮雙瞳夾鏡兩權協月異體峯生殊相逸發超攄絶夫塵轍驅騖迅于滅沒簡偉塞門獻狀絳闕旦刷幽燕晝秣荆越梁張率舞馬賦伊況古而赤文爰在兹而朱翼既效德于炎運亦表祥于尚色資皎月而載生祖河房而挺授種北唐之絶類嗣西宛之鴻胄稟妙足而逸倫有殊資而特茂善環旋于齊夏知蹈屣于金奏超六種于周間踰八品于漢廏爾其挾尺懸鑿之辨附蟬伏兔之别十形五觀之姿三毛八肉之勢臣何得而稱焉固已詳于前製徒觀其神爽視其豪異軼跨野而忽踰輪齊秀騏而並末駟貶代盤而陋小華越定單而小天驥信無等于漏面孰有取于決鼻可以迹章亥之所未遊踰禹益之所未至既傾首于律同又蹀足于鼓振擢龍首回鹿軀睨兩鏡蹙雙鳬既就場而雅拜時赴曲而徐趨敏躁中于促節捷繁外于驚桴騏行驥動獸發龍驤雀躍燕集鵠引鳬翔妍七盤之綽約陵九劒之抑揚豈借儀于褕袂寧假器于髦皇婉脊投頌俯音合雅露沫噴紅沾汗流赭唐喬彛渥窪馬賦全域中之寶生乎天涯天子之馬産乎渥窪澤出騰黃獨降精于太乙神開滇壑固不涉乎流沙目散電兮彪駮喙含丹而虎牙躡紅雲而噴玉霑赤汗以攢花望兮已久來何晚耶應圖合謀光我帝業星通兩眸月貼雙頰四蹄曳練翻瀚海之霜華一噴生風下胡山之木葉然後絡以金羈拂于鱗鬐睛射紫焰梢垂緑絲凝驕欲嘶嚼淒鏘之玉勒疊影不顧紛偃蹇之朱旗皇矣帝徹漢綱斯缺慿百萬之精徑倚四夷之磔裂屠蒲梢而亘大漠指二師而求汗血謂滅沒之未來竟羈縻而不絶有生必感有感必通通也不極環之無窮彼泓汚之斗水乃幽贊于神功然後豗沙卷浪于馮夷之宫疊足側身于奫淪之中星精降兮河嶽動天駟入兮駑駘空嗟我皇之英特而牽其惑欲能敗度侈多涼德夏后九伐越天地之紀穆滿八駿荒帝王之則而況金通月支價及疏勒悉復馳去終無所得此余吾之降生解倒懸于中國祈招愔愔式昭德音感激萬古淒涼至今願以采求馬之人為求賢之使待馬之意為待賢之心唐闕漢文帝却千里馬賦吉良之種渥窪之出嫓飛黃于軒宫奄驊騮于周室王損之汗血馬賦名重騄驥價髙驌驦骨騰肉飛既揮紅而沛艾麟超龍翥亦流汗以徜徉初疑霡霂染瀚海之霜華終訝淋漓變榆關之霞影獻闕之始就駕之初飾金羈而勢如躡景排玉勒而態若凌虛伯樂乍觀訝霑襟而沃若王良載馭驚濺袖以班如觀其步驟如流驅馳若滅恣餘力而聳躍控中衢而敻絶長鳴向日躞蹀而色若渥丹驤首臨風奮迅而光如振血王起朔方獻千里馬賦名超兹白瑞掩飛黃權竒于絳闕之下沛艾于紫庭之前稟月未匹追風莫先牛上士古駿賦則有俠少驫眓雄駒捷疾耳若插筒顱疑削出局金鑣以弄影控鐵銜而齧膝始驂驔以舞風忽濩略而追日超騰絶壑走及奔箭疑隔漢之流星似披雲而出電左賢為之膽懾骨都為之頷戰飛奔肅肅恣意馳逐宛若遊龍行如驚鹿左右披靡東西往復溝蹙漢以朱殷毛拂霜而蝟縮梁簡文帝西齋行馬詩晨風白金絡桃花紫玉珂影斜鞭照耀塵起足蹉跎任俠稱六輔輕薄出三河風吹鳯凰袖日映織成靴逺江舳艫少遙山煙霧多雲開瑪瑙葉水靜琉璃波廣路拂青栁回塘繞碧莎不效孫吳術寧須趙李過梁元帝後園看騎馬詩良馬出蘭池連翩驅桂枝鳴珂隨局駛輕塵逐影移香來知驟近汗斂覺風吹遙望黃金絡懸識幽并兒陳張正見君馬黃詩五色乘馬黃追風時滅沒血汗染龍花胡鞍抱秋月唯騰渥窪水不飲長城窟詎待燕昭王千金市駿骨李燮紫騮馬詩紫燕忽踟蹰紅塵起路隅圉人移苜蓿騎士逐蘼蕪三邊追黠虜一鼓定強胡安用珂為玉自有汗成珠徐陵紫騮馬詩玉鐙繡纒鬃金鞍錦覆幪風驚塵未起草淺埒猶空角弓連兩兔珠彈落雙鴻日斜馳逐罷連翩還上東唐盧照鄰紫騮馬詩騮馬照金鞍轉戰入皋蘭塞門風稍急長城水正寒雪暗鳴珂重山長噴玉難不辭橫絶漠流血幾時乾楊炯驄馬詩驄馬鐵連錢長安俠少年帝畿平若水官路直如絃夜玉裝車軸秋金鑄馬鞭風霜但自保窮達任皇天沈佺期驄馬詩西北五花驄來時道向東四蹄碧玉片雙眼黃金瞳鞍上留明月嘶間動朔風借君馳沛艾一戰取雲中陳沈炯邉馬有歸心詩窮秋邊馬肥向塞甚思歸連鑣渡蒲海束舌下金微已却魚麗陳將摧鶴翼圍彌憶長秋道金鞍背落暉唐韓翃羽林騎詩駿馬牽來御栁中鳴鞭欲過渭橋東紅蹄亂踏春殘雪花領頻嘶上苑風又觀調馬詩鴛鴦赭白齒新齊晚日花中教碧蹄玉勒斗回初噴沫金鞭欲下不成嘶嚴維奉和劉祭酒傷白馬詩沛艾如龍馬來從上苑中棣華恩見賜伯舅禮仍崇鏡點黃金眼花開白雪騣性柔君子德足逸大王風色照鳴珂淨聲連噴玉雄食場恩未盡過隙命旋終練影依雲沒銀鞍向月空仍聞樂府唱猶念代勞功唐太宗詠飲馬詩駿骨飲長涇奔流灑絡纓細紋連噴聚亂荇繞蹄縈水光鞍上側馬影溜中橫翻似天池裏騰波龍種生楊師道詠飲馬應詔詩清晨控龍馬弄影出花林躞蹀依春澗聨翩度碧潯苔流染絲絡水潔寫雕簮一御瑶池駕詎憶長城隂張籍蒙裴相公賜馬謹以詩謝緑耳新駒已有名司空自選寄書生逺離華廏移蹄澀初到貧家覺眼驚每見間人多被問唯尋古寺獨騎行思量幾夜沙堤上得從鳴珂倚火城韓愈和張祕書得裴司空馬司空逺寄養初成毛色桃花眼鏡明落日已曽交轡語春風還擬並鞍行長令奴僕知飢渴須著賢良待性情旦夕公歸申拜謝免勞騎去逐雙旌又白居易詩齒齊臕足毛頭膩祕閣張家叱撥駒洗了頷花翻假錦走時蹄汗踏真珠青衫乍見曽驚否紅粟難賒得飽無丞相寄來應有意遣君騎去上雲衢又劉禹錫詩草玄門户少塵埃丞相并州寄馬來初自塞垣銜苜蓿忽行幽徑破莓苔尋花緩轡威遲去帶酒垂鞭躞蹀回不與王侯與詞客知輕富貴重清才晉張協七命天驥之駿逸態超越稟氣靈淵受精皎月眸􅀈黑照玄采紺發沫如揮紅汗如振血秦青不能識其衆尺方堙不能覩其若滅爾乃巾雲軒踐朝霧赴春衢整秋御虯踊螭騰麟超龍翥望山載奔視林載赴氣盛怒發星飛電駭志陵九州勢越四海影不及形塵不暇起浮箭未移再踐千里爾乃踰天垠越地隔過汗漫之不遊躡章亥之未迹陽烏為之頓羽夸父為之投䇿後漢傅毅七激驥騄之乘龍驤超攄騰虛鳥踊莫能執御前不可先後不可追踰埃絶景倐忽若飛日不轉曜窮逺旋歸劉廣世七興駿壯之馬慉不征路其荷衡也躍似驚禽其即行也翬若遊鷹飈駭風逝電發波騰影不及形塵不暇興梁昭明太子七契通肩合相平腹應圖激電比速躡景競驅騰黃弗敢擬駿赤兔莫與爭途異態蹥踡竒姿猗倚逸足驟反遊雲移駛形函遊葉日不暇徙宋顔延之天馬狀降靈驥子九方是選白􅀈朱文緑蛇紫燕水軼驚鳬陸越飛箭遇山為風值雲成電唐元稹進馬狀羡魏闕之塵埃猶隨日御恨新豐之雞犬亦聽車音目斷魂消形留神往梁簡文帝馬寶頌序詔以馬寶示羣臣太僕效官趣馬掌贊三令五申丞聮事舉八麗四圍給役相趨暉煜金鑣陸離寶勒天地無疆之德永星致逺之功鸞眄善鳴龍儀美稱沸毅權竒之威趨攄抑揚之態足轉驚電眼流含燭霧噴粉霏流沫飄灑數千為夀豈待原蠶之禁萬里一息不藉杜衡之草王良不能控其衡䇿伯樂不能辨其文機方知總轡崑岑周非吾馭張樂大野夏有慙德豈止沈河用璧獨有緑文之稱盛德在木偏受蒼龍之名至于干將寶劒遙服書鄭之軍蓮花烏玉騰威大海之際況乎馬寶義實踰之方當夙沙自歸滑疑橋屈膝款關入塞偃武修文去病無出師之勞充國罷議邊之略五律成珍九河如鏡唐張説隴右監牧頌德碑水瑞感而河龍出星精應而天駟來騊駼騕裊乘黃兹白來儀外廏呈技內櫪朝刷浪風夕洗天潢聖王一馭長夀萬年骨必殊貌毛不雜羣行如動地止若屯雲秦汧渺渺尚想非子之風魯野區區猶傳史克之頌有霍公之掌政擇張氏之舊令乾道為良坤元利牝駒從渥水駿發中廬屈産貴其能鳴雁門多其美脊象車垂德以服箱龍馬宅神而受轡竦身輕足髙顙露精著猷西宛表德東京價傾函夏觀竭都城飾金騣之倐爍揚玉鑾之玲瓏泰階之平可升興王之規既接訪國美于舊史考方載于往牒昔帝軒陟位飛黃服皂后唐應籙赤文候日漢道興而天驥呈材魏德懋而澤馬效質伊逸倫之妙足自前代而間出並榮光于瑞典登郊歌乎司律異體峯生殊相逸發月晷呈祥乾確效氣賦景河房承靈天駟辭冰空而南傃去輪臺而東暨登壁門而歸實掩芝庭而獻轡超益野而踰緑蛇軼蘭池而轢紫燕方疊鎔于丹縞亦連規而朱駁始徘徊而龍俯終沃若而鸞盼迎調露于飛鐘起承雲于金箭寫秦坰之躡塵狀吳門之曳練已上馬物類部鱗介魏繆襲青龍賦觀夫仙龍之為形也蓋鴻洞輪碩豐盈修長容姿溫潤蜲蛇成章繁蛇虯蟉不可度量逺而視之似朝日之陽邇而察之象列缺之光爚若鑒陽和映瑶瓊㬣若望飛雲曳旗旌或蒙翠黛或類流星或如虹霓之垂耀或似紅蘭之芳縈唐錢起西海雙白龍見賦我君宣八風之惠化澄四海之波瀾覆燾斯極生靈以安惟此上瑞灼然可觀其始見也精光皓耀溟澥清廓曳冰雪于半空晏雷電于萬壑若長雲帶水而不散雙劒倚天而中落忽虹立而電回其儀不可彌度表其祥同乘黃之偶運處其度掩嘉魚之有樂昔軒以負圖為景福舜以入壇為神變殊旨同歸千載一見潘炎黃龍再見賦目中精耀光飛列缺之火頷下珠懸色奪蟾蜍之月秦王之夢立乎鄜畤漢后之時見于成紀彼皆一至此則重光采色炫耀文明焜煌錯甲鏤鱗既以來乎宇分官紀號可以表其祥超紫鳯于丹穴越青鸞于女牀已上龍獨孤申叔資州獻白龜賦足使孟津之鱗恥捷乎素鬛越裳之雉羞奮于翹英然後知戲朝之虎不足徵銜鈎之狼不足云彼駒來思徒稱皎皎爾獸至止虛擅諄諄未若兹瑞德無與鄰應天之命昭王之仁非櫝中之毁棄不蓮上以因循已上龜李羣玉石門韋明府為置東陽潭石魚鱠詩錦鱗銜釣出清漣暖日江亭動鱠筵疊雪亂飛消筯底散絲繁灑拂刀前太湖浪説朱衣鮒漢浦休誇縮項鯿俊味品流知第一更勞霜橘助芳鮮已上魚物類部蟲晉潘嶽螢火賦載飛載止光色可嘉無聲無臭明影暢遐啖朝露于曠野庇一葉之垂柯無干欲于萬物豈顧恤于網羅至夫重隂之夕風雨晦暝萬物眩惑翩翩獨征竒姿燎朗在隂益榮猶賢哲之處時時昏昧而道明若蘭香之在幽越羣臭而彌馨隨隂陽以飄飄非飲食之是營梁蕭和螢火賦聊披書以娛性恱草螢之夜翔乍依欄而回亮或傍牖而舒光忽翔飛而暫隱時凌空而更揚竹依窗而度影蘭因風而送香此時逸趣方遒良夜淹留眺姮娥之澄景觀熠耀之羣遊類乾沙之飛火若清漢之星流入玄夜而光淨出明燈而色幽時臨池而泛影與列宿而俱浮覺更籌之稍竭見微光之漸收爾其斜月西傾獨照蓬楹矚曙河之低漢聞夜潮之逺聲望落星之掩色見晨禽之曉征悲扶桑之吐曜翳微軀而不明寫余襟其未盡聊染翰以書情晉郭璞蜜蜂賦眩猿之雀下林天井青松冠谷赤蘿繡嶺無花不纒無陳不省吮瓊液于懸峯吸赮津乎晨景於是回鶩林篁經營堂窟繁布金房疊構玉室咀嚼華滋釀以為蜜自然靈化莫識其術散似甘露凝如割肪冰鮮玉潤髓滑蘭香百藥須之以諧和扁鵲得之而術良唐左牢蟬蛻賦吟逺樹于荒郊思盈秋野噪寒花于别浦韻繞晴江李逺蟬蛻賦嘒嘒而頻遷碧樹淒淒而若紡寒絲響繞晴雲傳楚岸之風逺聲催晚景怨陶家之栁衰駱賔王螢火賦序夫類同而心異者龍蹲歸而宋樹伐質殊而聲合者魚形出而吳石鳴茍有會于精靈夫何患于異類古儷府卷十二
