body:
  text: 古儷府卷二明王志慶編地理部總載唐劉允濟地賦既布井而陳邑亦列郡而分州窪盈沃瘠之品原野墳衍之流斂跨萬俗兼該六幽隔蠻壤限夷陬珍卉竒木之他族鱗介羽毛之異儔詭怪畢備璀璨咸周銀臺瑶檻𤣥闕丹丘鄒衍之所不議方朔之所難紬禎符應于河象災異紀於春秋錢起盖地圖賦廣竪亥之遐歩資重華之睿覧規方逺近㣲妙周通致蠻貊于度内出山川于卷中嗤秦政得燕圖以拓境小穆公夢鶉首以稱靈亦有周王御天漢君求仙窮人力于宇宙遍轍跡于山川孰與夫髙居深視探㣲洞𤣥得地理于冥契擁神休以永年梁昭明太子謝賜地圖啟漢氏輿地形兹未擬晉世方丈比此非妙匹之長樂惟書古賢儔之未央止圖將帥未有洞該八藪渾觀六合域中天外指掌可知地角河源戸庭不出豈問千秋自識烏丸之路脱逢壯武方著博物之書唐權德輿魏國公貞元十道録序盡瀛海之地窮鞮譯之詞陳農不獲之書朱贑未條之俗貫穿切劘靡不詳究開卷盡在披圖朗然吕温地志圖序觀其粉散百川黛凝羣山元氣剖判成乎筆端任土之毛有生之類大鈞變化不出其意然後列以城郭羅乎陬落内自五侯九伯外洎要荒蠻貊禹跡之所窮漢驛之所通五色相宣萬邦錯峙毫釐之差而下正乎封畧方寸之界而上當乎分野乾象坤勢炳焉可觀與夫聚米擬其端倪畫地陳乎梗槩固不可同年而語詳略也每虛室燕居薄帷晴褰普天之下盡在屋壁户納四海窓籠八極名山大川隨顧奔走殊方絶域舉意而到髙視華裔坐橫古今觀帝王之疆理見宇宙之寥廓出遐入幽曽不崇朝與夫役形神于嵗月窮軌跡於區外又不可並軌而論勞逸也且夫刪百代之弊綜羣言之首繁而不亂踈而不漏才識以潤之丹青以炳之使嗜學之徒未披文而見義不由戸而觀奥斯訓導之明也窮地而述舉世而載事極鴻纎理通皦昧混一家之文軌張大國之襟𢃄覈人物之虛實總山川之要㑹表皇威之有截明王道之無外斯乃功用之大也見蒼梧塗山則思舜禹恤民之艱覩窮荒大漠則悟秦漢勞師之弊覽齊墟晉壤則見桓文勤王之覇觀洞庭荆門則知苖蜀恃險之敗王者于是明乎得失諸侯于是鑒于興替斯又懲勸之逺也然則夲之所以廣學流申之足以贊鴻業垂之可以示後世豈徒由近觀逺以智自樂爲室中之一物哉闕地理志序若乃敦龎於天地之始昭晰於犧農之世一用黎元未爭疆埸而玉環楛矢夷裘風駕南翬表貺東風入律光乎上徳奚逺弗臻然則星象麗天山河紀地而端掖裁其𢎞敞崤函判其都邑仰觀俯察萬物攸歸是以洛址咸陽宛然秦漢晉濵河西同乎堯禹于兹新邑宅是鎬京五尺童子皆能口誦者史官弗之書也大哉坤象萬物資生載崑華而不墜傾河海而寧泄考卜惟王乗飛駐軫睨弇山而鐫勒覽曾城以爲玩時逢稽浸道接陵夷平王東遷星離豆剖當塗御㝢𤓰分鼎立地理部山漢張衡南都賦其山則崆􅱔嶱嵑嵣㟐嶚剌岝㟯㠑嵬􅋂􅇖屹􅝝幽谷嶜岑夏含霜雪或㟒嶙而纚聯或豁爾而中絶鞠巍巍其隠天俯而觀乎雲霓若夫天封大狐列仙之陬上平衍而曠蕩下􅂪籠而﨑嶇坂坁嶻嶭而成甗谿壑錯繆而盤紆芝房菌蠢生其隈玉膏滵溢流其隅崑崙無以奓閬風不能踰梁吳均八公山賦峻極之山蓄聖表僊南參差而望越北邐迤而懷燕爾其盤桓基固含陽藏霧絶壁嶮􅇖層巖廻互挂皎月而常團雲望空而自布袖以華閬帶以潛淮文星亂石藻日流堦若夫神基巨鎮卓犖荆河箕風畢雨育嶺生峩髙岑直兮蔽景修坂出兮架天以迎雲而就日若從漢而廻山露泫葉而原浄花照磯而岫鮮促嶂萬尋平崖億絶上被紫而烟生傍𢃄花而來雪維英王兮好僊㑹八公兮小山駕飛龍兮翩翩髙馳翔兮沖天唐太宗小山賦抗微山于綺砌橫促嶺于丹墀啟一圍而建址崇數尺以成坏既無秀峙之勢本乏雲霞之姿承墜宇之殘霤挂低空之斷絲爾乃參差絶巘威紆短逕風暫下而將飄烟纔髙而不暝寸中孤嶂連還斷尺裏重巒欹復正岫帯栁而合䨇眉石澄流兮分兩鏡爾其移芳植秀擢幹抽莖松新翠薄桂小丹輕細影襍兮俱亂弱勢夾兮共縈纔有力以勝蝶本無心而引鸎半葉舒而嵓暗一花散而峯明何纎㣲之同景亦卑細以相成達奚珣華山賦作秦塞之髙標為豫州之巨鎮其南接楚其北臨晉嶔乎數都之間豈惟直上者五千餘􅌇逺疑將適近若將騰氤氲緑潤霮䨴青凝發地壁立連天石稜披重霄而自致與元氣而相陵玉女明祠星壇尚在羊公舊室石榻常穿房元洛仙掌賦爾其雲散天澄烟消雨霽旭日暉映隂崖虧蔽狀若拍紅霞之霏㣲捧青霄之揺曳察其迹也雖見于東峯混其嶽焉是配乎秋帝及乎蓐收謝𤣥冥格日彩寒霜氣白上捫星漢左控虞虢南聳羣嶺北臨廣陌將招泛槎之仙如指迷途之客至其嵐翠朝欝輕雲夕過桂影依稀而流照松風髣髴而扇和時也靄靄溶溶疑掩氷紈之被蒼蒼羃羃如揮舞袖之羅喬潭羣玉山賦觀其亭亭太虛不可彌度石室靈造玉堂天鑿寳牒有融仙經惟錯蕩青簡兮緑字煥瑶緘兮金絡雘以虬龍拂之鸞鶴爲列真之䇿府亦太乙之延閣覽之而羣聖㑹同㧞之而萬古昭廓且藏書爲寳鎮物爲雄小石林之岝峉陋玉樹之青葱赫曥曥髙崇崇秘精義乎其中何必登隠坌拜崆峒挹方壺而訪道歴秦望而爲功者哉按莊子登隐弅之丘坌當作弅梁王泰巫山髙詩迢遞巫山好逺天新霽時樹交凉去逺草合影開遲谷深流響咽峽近猿聲悲只言雲雨状自有神仙期又李元操詩荆門對巫峽雲夢邇陽臺燎火如奔電墜石似驚雷天寒秋水急風静夜猿哀枕席無由薦朝雲徒去來庾肩吾賦得山詩曽雲霾峻嶺絶澗倒危峰刻削臨千􅌇嵯峨起百重行曦上杳杳結霧下溶溶仁心留此屬休愧奉羣龍吳均登夀陽八公山詩逺澗自傾注曲石漵戔戔含珠㟁恒翠懷玉浪多圓疎峯時吐月宻樹不開天瑶繩盡𤣥秘金檢上竒篇是有琴髙者陵波去水仙周蕭撝上蓮山詩獨邁青蓮嶺探竒紫盖峰挂流遥似鶴挿石近如龍沙崩聞韻鼓霜落候鳴鐘飛花滿叢桂輕吹起修笻石蒲今尚有採摘更相逄陳釋惠標山詩二首靈山藴麗名秀出寫蓬瀛香爐帶烟上紫盖入霞生霧捲蓮峯出巖開石鏡明定知丘壑裏併佇白雲情峨眉信重險天目本仙居金華抱丹竈玉笥藴神書幽人披薜荔怨妾採蘼蕪紫巖無暮雨何時逢故夫周庾信陪駕幸終南山詩玉山乗四載瑶池宴八龍黿橋浮少海鵠盖上中峯飛狐橫塞路白馬當河衝水奠三川石山封五樹松長虹䨇瀑布圓闕兩芙蓉戍樓鳴夕鼓山寺響晨鐘新蒲節轉促短笋籜猶重樹宿含櫻鳥花留釀蜜蜂迎風下列缺灑酒召昌容且欣陪北上方欲待東封宇文昶陪駕幸終南山詩堯盖臨河潁漢蹕踐華嵩日旂廻北鳯星斾轉南鴻青雲過宣曲先驅背射熊金桴拂泉底玉琯吹雲中古轍稱難極新途或易窮烟生山欲盡潭浄水恒空交松上連霧脩竹下來風仙才道無别靈氣法能通東棗羞朝座西桃獻夜宫詔令王子晉出對浮丘公隋李巨仁登名山篇名山稱地鎭千􅌇上凌霄雲開金闕逈霧起石梁遥翠㣲橫鳥路珠潤入星橋風急青溪晩霞散赤城朝寓目幽棲地駕言追綺季避世桃源士忘情漆園吏抽簮傲九辟脫屣輕千駟沉㝠負俗心蕭灑凌雲意蒼蒼聳極天伏眺盡山川叠峯如積浪分崖若斷烟淺深聞渡雨輕重聼飛泉採藥逢三島尋真値九仙藏書凡幾代㸔博已經年逝將追羽客千載一來旋唐王維終南山行詩太一近天都連山到海隅白雲廻望合青靄入㸔無分野中峯變隂晴衆壑殊欲投人處宿隔水問樵夫沈佺期扈從出西嶽作詩西鎭何穹崇壯哉信靈造諸嶺皆峻秀中峰特美好傍見巨掌存勢如拓東倒頗聞首陽去開拆北河道磅礴壓洪源㟴峨壯清昊雲泉紛亂瀑天磴矻橫抱子先呼其巔宫女世不老下有府君廟歴載傳洒掃皇明應天遊十月戒豐鎬㣲末忝扈從兼得事蘋藻宿心愛兹山意欲拾靈草隂壑已永閉雲竇絶探討芳月期再來廻䇿思方浩張喬華山詩青蒼河一隅氣狀杳難圖卓傑三峯出髙竒四嶽無力疑擎上界勢欲壓中區衆水東西走羣山逺近趨天廻諸宿照地聳百靈扶石壁烟霞麗龍潭雨雹麤澄凝臨甸服險固束神都淺覺川原異深應日月殊鶴歸青藹合仙去白雲孤濁瀑斜飛凍長松倒掛枯毎來探洞穴不擬返江湖儻有芝田種商巖老一夫劉得仁和段校書冬夕寄題廬山詩名髙身未到此恨蓄多時是夕吟因話他年必去隨當時廬嶽頂半入楚江湄幾處懸崕上千尋瀑布垂罏峰松淅瀝湓浦棹參差日色連湖白鐘聲拂浪遲烟梯縁薜荔嶽寺歩欹危地夲饒靈草林曾出祖師石樓霞耀壁猿樹鶴分枝細徑縈巖末髙䆫見海涯嵌空寒更極寂寞夜尤思隂谷氷埋木仙田雪覆芝亂泉禪客潄異跡逸人知蘇室新開竈檉潭未了碁如何遂閒放長得任希夷空務漁樵事方無道路悲謝公臺尚在陶令栁潛衰塵外難相許人間貴迹遺雖懷丹桂影不忘白雲期仁者終携手今朝預賦詩盧照隣過東山谷口詩不知名利險辛苦滯皇州始覺風塵倦歸來事緑疇桃源迷處所桂樹可淹留跡異人間俗禽同海上鷗古苔依井被新乳傍崕流野老堪成鶴山神或化鳩泉明碧澗底花落紫巖幽日暮飡龜殻天寒御鹿裘不辨秦將漢寧知春與秋多謝青浦客去去赤松遊杜審言度石門山詩石門千仞斷迸水落遥空道束懸巖半橋欹絶澗中仰攀人屢息直下騎纔通泥擁奔蛇徑雲霾伏獸叢星纒牛斗北地脉象牙東開塞隨行變髙深觸望同江聲連驟雨日氣抱殘虹未改朱明律先含白露風堅貞所不憚險澁諒難窮有異登臨賞徒爲造化功盧照隣巫山髙詩巫山望不極望望下朝氛莫辨啼猿樹徒看神女雲驚濤亂水脈驟雨暗峯文霑衣即此地况復逺思君又皇甫冉詩巫峽見巴東迢迢出半空雲藏神女館雨到楚王宫朝暮泉聲落寒暄樹色同清猿不可聼偏在九秋中又李端詩巫山十二峯皆在碧空中廻合雲藏日霏㣲雨帶風猿聲寒度水樹色暮連空愁向髙堂宿清秋見楚東又李賀詩碧叢叢齊挿天巴江翻瀾神曳烟楚魂尋夢風颸然曉風吹雨生苔錢瑶姬一去一千年丁香卭竹號老猿古桐近月蟾桂寒椒花墮紅濕雲間又陳陶詩玉峯青雲十二枝金母和雲賜瑶姬花宮磊砢楚宫外列仙八靣星斗垂秀色無䨇怨三峽春風幾夢襄王獵青鸞不在嬾吹簫斑竹題詩寄江妾飄颻散絲巴子天苔裳玉轡紅霞幡歸時白帝掩青瑣瓊枝草草遺湘烟劉希夷巫山懷古詩巫山幽隂地神女艶陽年襄王伺容色落日望悠然歸來髙堂夜金釭熖青烟頺想卧瑶席夢魂何翩翩揺落殊未已榮華倐徂遷愁思瀟湘浦悲凉雲夢田猿啼秋風夜鴈飛明月天巴歌不可聽聽此益潺湲梁吳均與施從事書故鄣縣東三十五里有青山絶壁干天孤峯入漢緑嶂百重青川萬轉歸飛之鳥千翼競來企木之猿百臂相接秋露爲霜春蘿被逕風雨如晦雞鳴不已信足蕩累頥物悟衷散賞又與朱元思書風烟俱浄天水共色從流飄蕩任意東西自富陽至桐廬一百許里竒山異水天下獨絶水皆縹碧千丈見底游魚細石直視無礙急湍甚箭猛浪若奔夾岸髙山皆生寒樹負勢競上互相軒邈争髙直指千百成峯泉水激石泠泠作響好鳥相鳴嚶嚶成韻晉顧野王虎丘山序若兹山者髙不概雲深無藏影卑非培塿淺異棘林秀壁數尋被杜蘭與苔蘚椿林十仞掛藤葛與懸蘿曲澗潺湲脩篁䕃映路若絶而復通石將頺而更綴抑巨麗之名山信大吳之勝壤未有登髙能賦而韜斐麗之章入谷忘歸而忽鏗鏘之節故總轡齊鑣競彫蟲于山川雲合霧集争歌頌于林泉于時風清邃谷景麗修巒蘭佩堪紉胡繩可索林花翻灑乍飄颺于蘭臯山禽囀響時弄聲于喬木班草班荆坐蟠石之上濯纓濯足就滄浪之水傾縹瓷而酌旨酒翦緑葉而賦新詩肅爾若與三徑齊蹤鏘然似共九成偕韻庾肅之山贊懸巗沓翳神明攸居官府風雲懷吐川渠崑閬天竦五嶽雲停飛峯紫蔚辰秀太清戴逵山贊蔚矣名山亭亭洪秀並基二儀嶤嶣雲構嵳峩積岨寥籠虛岫輕霞下拂神泉旁潄梁元帝東宫後堂仙室山銘太華削成夲擅竒聲峯如雪委嶺若蓮生雲除紫盖霞通赤城金壇是籙玉記題名鳯依桐樹鶴聼琴聲殿接南箕橋連北斗秋河從帶春禽銜綬朱鳥安窻青龍作牖周庾信東宫行雨山銘山名行雨地異陽臺佳人無數神女羞來翠幔朝開新妝旦起樹入牀前花來鏡裏草色衫同花紅面似開年寒盡正月遊春俱除錦帔並脫紅綸天絲劇藕蝶粉多塵橫藤礙路垂栁低人誰言洛水一箇河神梁元帝𤣥圃牛渚磯碑竊以増城九重僊林八樹未有船如鴈鶴時度宓妃橋似牽牛能分織女丹鳯爲羣紫柱成列清風韻響即代仙歌桂影浮池仍爲月浦璧月朝暉金樓啟扉畫船向浦錦纜牽磯花飛拂袖荷香入衣山林朝市併覺忘歸地理部石唐鄭惟忠古石賦博望侯周遊天下歴覧山川尋長河于異域得美石而獻焉漢武帝未之竒也東方朔見而喟然曰此石英輝潤宻秀色明爛舊枕昆吾之谿曽臨歸美之岸玉雉飛而激矢金鷄鳴而縱彈至如天台始裂地乳初分丹青孕彩隠起成文盈尺則内含明月膚寸則外吐浮雲别有兩楹分竦䨇闕相向依依識啟母之形亭亭表望夫之狀鼓迎桴而若動㠶映舟而似颺此並流膏曲澗滴髓危峯據谷成虎臨池作龍蒲英九節蓮葉千重若乃泗水之上岐山之側撫之則磬動竒音被之則錦開新色匠石見而驚駭師涓聞而歎息于是琢磨成狀雕瑩生輝似龜則負圖盤峙如鵲則緘印鶱飛在地者佳人𢷬練登天者織女支機及其火烈崑墟星流宋國被隕形碎遭焚影黒碑沉郢路之東柱折陽闗之北昔之開壇竹聳抱劍松抽礎應山雲之潤橋通海水之流栁谷岸崩之馬欝林泥落之牛莫不嵗月凋訛丘陵蕪没顚墜坑穽枕倚巗窟據洞口而嵳峩出泉心而硉矹徒見新排理坼舊蹙文廻圓分者雹散方裂者氷開既藏瑕而被蘚又抱穴以侵苔豈如冩鏡能明磨鋒可利擊拊充帝庭之樂闗和覩王府之器總五色而補天含九光而鎭地者矣詞未畢帝乃顧而言曰楚王見璞棄之山阿不有卞氏其如玉何抽琴命操爲古石之歌歌曰江東藏瑞簡濟北藴兵書若非平固湖中鴈定是昆明池裏魚歌響既終神儀有懌左右驚視符彩傍射使玉人而攻之果得連城之璧陳隂鏗石詩天漢支機罷仙嶺博棊餘零陵舊是鷰昆池夲學魚雲移蓮勢出苔駁錦文疎還當榖城下别自觧兵書隋崔仲方奉和周趙王詠石詩玉繩隨月落金碑映日鮮入江疑濯錦出峽似開蓮文馬河西瑞兵符濟北篇㑹逐靈槎上還歸天漢邊唐蘇味道石詩濟北甄神貺河西濯錦文聲應天池雨影觸岱宗雲鴈歸猶可候羊起自成羣何當握靈髓髙枕絶囂氛李嶠石詩宗子維城固將軍飲羽威巗花鏡裏發雲葉錦中飛入宋星初隕過湘鷰早歸儻因持補極寧復羡支機劉禹錫奉和牛相公題姑蘇所寄太湖石見示兼寄李蘇州詩震澤生竒石沈潛得地靈初辭水府出猶帶龍宫腥發自江湖國來榮卿相庭從風夏雲勢上漢古查形拂拭魚鱗見鏗鏘玉韻聆烟波含宿潤苔蘚助新青嵌穴胡雛貎纎鋩蟲篆銘孱顔傲林薄飛動向雷霆煩熱近還散餘酲見便醒牛僧孺李蘇州遺太湖石竒狀絶倫因題二十韵詩攙义鋒刃簇縷絡釣絲縈近水搖竒冷依松助澹清通身鱗甲隠透穴洞天明醜凸隆胡凖深凹刻兕觥雷風疑欲變隂黒訝将行噤㾕微寒早輪囷數片横唐上官儀爲朝臣賀凉州瑞石表臣聞太陽含宇天之命也德水呈文地之符也是知光膺寳厯非幽贊無以享鴻名對越兩儀非神物何以昌丕緒故有神馬負卦繇表軒功朱鳥銜書兆彰姬籙非聖人之撫運孰能與于此乎伏惟陛下慶醖上元與天皇而合德祥凝太始體耀魄以齊明作周錫𦙍王業夲于氷翼生商降祉寶祚基于玉筐然後樞電効神星虹授彩彤雲澹景標映龍顔瑞火流光呈發鳥跡由是凝圖作極握紀中天化洽九垓恩綿八表功成戢武散騑服于桃園業定𢎞文覃正朔于昌海輯五玉而彰禮備陳萬舞而表樂成至德至仁垂拱巗廊之上乃聖乃神逺筭廟堂之下憲文王而授立招天奬于夣齡象漢帝以發賢選神明于刻石國重曜而照臨家萬宇而永貞是以淹嵗亢陽離輝昇而𤣥澤降春疇罕闕震方建而年稼登受册之辰隨輕輪而翊佳氣夏絃之月接飛盖而吐芝英郡國陳孝徳之符煙浮霧集縣道奏明靈之貺電擊雷奔豈與夫日至月書可同年而語歟伏見凉州都督李襲譽表奏昌松瑞石合一百十字文素文玉潔若瓊樹之華滋𤣥質碧鮮擬翠微之逺色雖復霞標冠岳暉鏤文於介丘海鏡浮山昭列名於稽岊方兹秀麗曾何足云臣等歴選皇猷稽河圖於東序詳觀帝籙披冊府于西崑媧燧以前不可得而知矣羲農以降乃考載而言焉若乃馬遰堯壇鳯御虞厯麟㳺吐字頗渉劉邦葉蠧為文纔稱病已𤣥石降徴于典午赤符錫命于炎精皆髣髴如神徴文見意或旁通以取證或索隠以求端猶且動色當年光華曩志矧兹天䇿顯發靈瑞頌聖德之欽明通史筆之揚堯典述國祚之悠永倍龜冊之卜周年追美先朝衍軒丘之德姓式昭儲后邁鈞臺之有光豈非天鑒孔明聖猷大者祥彌著靈心至察德加厚者祚愈長是用越契超繩光前振古績無與二慶溢登千臣等自省㣲生幸霑鴻造荷重光之煦育覩三才之宅心雀躍無以表其誠鳬趨不足勝其喜地理部海魏王粲游海賦懷珍藏寶神隠怪匿或無氣而能行或含血而不食或有葉而無根或能飛而無翼鳥則爰居孔鵠翡翠鷫鸘繽紛徃來沉浮翺翔魚則橫尾曲頭方目偃額大者若山陵小者重鈞石乃有賁蛟大貝明月夜光蠵鼊瑇瑁金質黒章若夫長洲别島棋布星峙髙或萬尋近或千里桂林藂乎其上珊瑚周乎其趾羣犀代角巨象解齒黃金碧玉名不可紀洪洪洋洋誠不可度也處嵎夷之正位兮同色號於穹蒼包納汚之𢎞量正宗廟之紀綱總衆流而臣下爲百谷之君王晉木華海賦乃鏟臨崖之阜陸决陂潢而相沷唘龍門之岝􅣉墾陵巒而嶄鑿羣山既畧百川潛渫泱漭澹泞騰波赴勢江河既導萬穴俱流掎㧞五嶽竭涸九州瀝滴滲淫薈蔚雲霧涓流泱瀼莫不來注於廓靈海長爲委輸其爲廣也其爲怪也宜其爲大也爾其爲狀也則乃浟湙㶑灔浮天無岸浺瀜沆瀁𣺌瀰湠漫波如連山乍合乍散噓噏百川洗滌淮漢襄陵廣舄㶀㵧浩汗若乃大明㩠轡于金樞之穴翔陽逸駭于扶桑之津彯沙礐石蕩􅠞島濵于是鼓怒溢浪揚浮更相觸搏飛沫起濤狀如天輪膠戾而激轉又似地軸挺㧞而争廻岑嶺飛騰而反覆五嶽鼓舞而相磓􅀈濆淪而滀漯欝沏迭而隆頽盤􅀢激而成窟􅢨􅡰傑而爲魁㴸泊栢而迆颺磊匒匌而相豗驚浪雷奔駭水迸集開合解㑹瀼瀼濕濕葩華踧沑㴿濘潗㵫若乃霾曀潛消莫振莫竦輕塵不飛纎蘿不動猶尚呀呷餘波獨湧澎濞􅀈䃶碨磊山壟其垠則有天琛水怪鮫人之室瑕石詭暉鱗甲異質若乃雲錦散文于沙汭之際綾羅被光于螺蚌之節繁采揚華萬色隠鮮陽氷不冶隂火潛然熺炭重燔吹烱九泉朱􅀈緑烟䁏眇蟬蜎珊瑚琥珀羣産接連車渠馬瑙全積如山魚則橫海之鯨突扤孤遊戞巗㟼偃髙濤茹鱗甲吞龍舟噏波則洪連踧蹜吹澇則百川倒流或乃蹭蹬窮波陸死鹽田巨鱗挿雲鬐鬛刺天顱骨成嶽流膏爲淵若乃巗坻之隈沙石之嶔毛翼産鷇剖卵成禽鳬雛離褷鶴子淋滲羣飛侣浴戱廣浮深翔霧連軒洩洩淫淫翻動成雷擾翰爲林更相呌嘯詭色殊音潘岳滄海賦徒觀其狀也則湯湯蕩蕩瀾漫形沈流沫千里懸水萬丈測之莫量其深望之不見其廣無逺不集靡幽不通羣溪俱息萬流來同含三河而納四瀆朝五湖而夕九江隂霖則興雲降雨陽霽則吐霞曜日煮水而鹽成剖蚌而珠出其中有蓬萊名嶽青丘竒山阜陵别島㟪環其間其山則􅠾崔嵬崒嵳峩降屈披滄流以特起擢崇基而秀出其魚則有吞舟鯨鯢鰞鱡龍鬚蜂目豺口貍斑雉軀怪體異名不可勝圖其蟲獸則素蛟丹虬元龜靈鼉修黿巨鼈紫貝螣虵𤣥螭蚴虬赤龍焚藴遷體改角推舊納新舉扶揺以抗翼汎陽侯以濯鱗其禽鳥則鶠鴻鷫鸘鵝鵁鶄朱背煒􅂱縹翠蔥青詳察浪波之來徃遍聼奔激之音響力勢之所廻薄潤澤之所彌廣際普天之極大横率土而莫兩孫綽望海賦五湖同浸九江叢溉抱河含濟吞淮納泗南控沅湘西引涇渭洲渚迢遞以疏属島嶼綿邈以牢羅殖嵬崔之碣石構穹隆之牂牁𤣥奥之府重仭之房鱗彚萬殊甲産無方包隨珠銜夜光瑇瑁熠爍以泳游蟕蠵煥爛以映漲虛具含素而表紫蠳螺絡丹而帶緗青甲芬飇以㣲扇𤣥木杳渺以舒芳其卉木則緑苔石髪蔓以流綿紫莖菎綜解以被渚華組依波而錦披翠綸扇風而綉舉長鯨嶽立以截浪虭䱜揚鬐以排流巨鼇贔屓以冠山烏鱯呼翕以吞舟鵬爲羽桀鯤稱介豪翼遮半天背負重霄舉翰則宇宙生風抗鱗則四瀆起濤考萬川以周覽亮天地之綜緯彌綸八荒亘帶九地昏明注之而不溢尾閭洩之而不匱齊張融海賦爾其海之狀也則窮區沒渚萬里藏岸控㑹河濟朝總江漢湍轉則日月似驚浪動則星河如覆展轉縱橫揚珠起玉峰勢崇髙岫形參錯或如前而未進乍非遷而已却却瞻無後向望何前長尋髙眺唯水與天若乃山橫蹙浪風倒摧波磊若驚山竭嶺以竦石欝若飛烟奔雲以振柯連瑶光而交彩接玉繩以通華爾其竒名出録詭物無書髙岸乳鳥橫闗産魚蟕蠵瑇瑁綺貝綉螺𤣥珠牙綵緑紫相華唐梁洽海重潤賦吞吸八裔流不逆細怪必思蓄珍無不麗沖融濜汨膠轕澎濞飛濤叠躍于秋隂白浪翻光于春霽雖則沙石混濁不蕩其清波瀾迅委終復于平石岑海水不揚波賦量納羣川而道遒百谷功配乾絡而運回坤軸四海盡鏡九瀛涵影冩合璧之祥光湛連珠之瑞景德侔上善洗物而容潔道夲𤣥元澄心而體静湛兮恒清晏兮砥平汨乎無情蕩乎難名如君之道酌焉而不竭象君之德注焉而不盈梁劉孝綽上虞卿亭觀濤津渚學潘安仁河陽縣詩昔余筮賔始衣冠仕洛陽無貲徒有任一命忝爲郎再踐神仙側三入崇賢傍東朝禮髦俊虛薄厠才良遊談侍名理搦管創文章引籍陪下膳橫經㕘上庠誰謂服事淺契濶變炎凉一朝謬爲吏結綬去承光烹鮮徒可習治民終未長化鷄仰季智馴雉推仲康此城隣夏穴橚矗茂筠篁孝碑黃絹語神濤白鷺翔遨遊住可望釋事上川梁秋江凍雨絶反景照移塘纎羅殊未動駭水忽如湯乍出連山合時如高盖張漂沙黄沫聚礐石素波揚傍人不敢唱舟子詎能航離家復臨水眷然思故鄉中來不可絶奕奕苦人膓泝洄若無阻謝病反清漳隋煬帝季秋觀海詩孟軻叙遊聖枚乗説瘉疾逖聼乃前聞臨深騐兹日浮天逈無岸含靈固非一委輸百谷歸朝宗萬川溢分城碧霧晴連洲彩雲宻欣同夫子觀深愧𤣥虛筆虞茂奉和望海詩清蹕臨溟漲巨海望㴞㴞十洲雲霧逺三山波浪髙長瀾疑浴日連島類奔濤神遊藐姑射睿藻冠風騷縱然雖觀海何以效涓毫唐太宗春日望海詩披襟眺滄海憑軾翫春芳積流橫地紀疏𣲖引天潢仙氣凝三嶺和風扇八荒拂潮雲布色穿浪日舒光照岸花分彩迷雲鴈斷行懷卑運深廣持滿守靈長有形非易測無源詎可量洪濤經變野翠島屢成桑之䍒思漢帝碣石想秦皇霓裳非夲意端拱且圖王楊師道奉和春日望海詩春日臨渤海征旅輟晨装廻瞰盧龍塞斜瞻肅慎鄉洪波迴地軸孤㠘映雲光落日驚濤上浮天駭浪長仙臺隠螭駕水府泛黿梁碣石朝烟滅之罘歸鴈翔北廵非漢后東幸異秦皇搴旌羽林客䟦距少年塲龍擊驅遼水鵬飛出帶方將舉青丘繳安訪白霓裳李嶠海詩習坎疏丹壑朝宗合紫㣲三山巨鰲湧萬里大鵬飛樓冩春雲色珠含明月輝㑹因添霧露方逐衆川歸宋之問海詩肅事祠春溟宵齋洗䝉慮鷄鳴見日出鷺下驚濤騖地濶八荒逺天㢠廻百川㴻筵端接空曲目外唯雰霧暖氣物象來周遊晦明遽致牲匪𤣥享禋滌期靈煦的的波際禽泫泫島間樹安期今何在方丈蔑尋路仙事與世隔旁搜徒已屢四明背羣山遺老莫辨處中撫良自慨弱齡忝恩遇三入文史林兩拜神仙署雖歎出闗逺始知臨海趣賞來空自多理勝孰能喻留楫竟何待徙倚忽云暮宋務光海上作詩曠哉潮汐池大矣乾坤力浩浩去無際沄沄深不測崩騰歙衆流泱漭環中國鱗介錯殊品氛霞饒翠色天波混莫分島樹遥難識漢主探靈怪秦皇恣遊陟搜竒大壑東竦望成山北方術徒相誤蓬萊安可得吾君畧仙道至化孚淳黙驚浪晏窮溟飛航通絶域馬韓底厥貢龍伯修其職粤我遘休明匪躬期正直敢輸鷹隼鷙以問豺狼忒海路行已殫輶軿未遑息勞歌𤣥月暮旅睇滄海極魏闕𣺌雲端馳心附歸翼宋昱樟亭觀濤詩濤來勢轉雄獵獵駕長風雷震雲霓裏山飛霜雪中激流髙岸失吹澇上侵空翕闢乾坤異盈虛日月同艅艎從陸起洲浦隔阡通跳沬噴巗翠翻波帶景紅怒湍初抵北却浪復歸東寂聼堪増勇晴㸔自發蒙伍生傳或謬枚叟説難窮來信應無已申威亦匪窮衝騰如決勝廻合似相攻委質任平視誰能見始終唐栁宗元中散大夫御史中丞張公墓誌銘公患浮海之役可濟可覆而無所恃乃刳連烏以闢坦途鬼工來并人力罕用沃日之大束成通溝摩霄之阻硩爲髙崖地理部江晉郭璞江賦總括漢泗兼包淮湘并吞沅澧汲引沮漳源二分于崌崍流九𣲖乎潯陽鼓洪濤于赤岸淪餘波乎柴桑綱絡羣流商㩁涓澮表神委于江都混流宗而東㑹注五湖以漫漭灌三江而漰沛滈汗六州之域經營炎景之外所以作限于華裔壯天地之險介呼吸萬里吐納靈潮自然徃復或夕或朝激逸勢以前驅廼鼓怒而作濤峨嵋爲泉陽之掲玉壘作東别之標衡霍磊落以連鎮巫廬㟴崛而比嶠恊靈通氣濆薄相陶流風蒸雷騰虹揚霄出信陽而長邁淙大壑與沃焦若乃巴東之峽夏后疏鑿絶岸萬丈壁立赮駮虎牙嵥豎以屹崒荆門闕竦而磐礴圓淵九廻以懸騰湓流雷呴而電激駭浪暴灑驚波飛薄迅澓增澆湧湍叠躍碧沙瀢􅘍而徃來巨石硉矹以前却潛演之所汨淈奔溜之所磢錯厓隒爲之泐嵃碕嶺爲之嵒崿幽澗積岨礐硞䃕礭若乃曽潭之府靈湖之淵澄澹汪洸瀇滉囦泫泓汯浻澋涒㔂㘤潾混瀚灦渙流映揚焆溟漭渺湎汗汗沺沺察之無象尋之無邉氣滃浡以霧杳時欝律其如烟類胚渾之未凝象太極之構天長波浹渫峻湍崔嵬盤渦谷轉凌濤山頺陽侯砐硪以岸起洪瀾涴演而雲廻峾淪溛瀤乍浥乍堆豃如地裂豁若天開觸曲崖以縈繞駭崩浪而相礧其旁則有雲夢雷池彭蠡青草具區洮滆朱滻丹漅極望数百沆瀁皛溔爰有包山洞庭巴陵地道潛逵旁通幽岫窈窕金精玉英瑱其裏瑶珠怪石琗其表驪蚪摎其址梢雲冠其㟽海童之所廵遊琴髙之所靈矯氷夷倚浪以傲睨江妃含嚬而􅗻眇撫凌波而鳬躍吸翠霞而夭矯若乃宇宙澄寂八風不翔舟子于是搦棹渉人于是檥榜漂飛雲運艅艎舳艫相屬萬里連檣泝洄沿流或漁或商赴交益投幽浪竭南極窮東荒爾乃雰祲于清旭覘五兩之動静長風颹以增扇廣莫䬅而氣整徐而不䬐疾而不猛鼓帆迅越䞟漲截泂凌波縱柂電徃杳溟䨴如晨霞孤征眇若雲翼絶嶺倐忽数百千里俄頃飛亷無以睎其蹤渠黃不能企其景曹毗渉江賦迄趙屯歴彭川修岸靡靡莞葦芊芊紫蓮被翠波而抗英碧椹乘天岸而星懸百籟夕奏山精夜燃狂飇蕭瑟以洞駭洪濤突兀而橫峙爾乃江狶彭濞夜光輝煥凌錯吐飇駭鯨噴瀾采蚌于是汎波文魚于是登岸齊謝朓楚江賦爰自山南薄暮江潭滔滔積水褭褭霜嵐憂與憂兮竟無際客之行兮嵗已嚴爾乃雲沈四岫風蕩中川馳波欝素駭浪浮天明沙宿莾石路相懸于是霧隠行鴈霜眇虚林迢迢落景萬里生隂列攅笳兮極浦弭蘭鷁兮江潯願希光兮秋月承末照于遺簪梁劉孝綽渡浙江詩季秋弦望後輕寒朝夕殊商人泣紈扇客子夢羅襦憂方自難違况復阻川隅日暮愁隂合繞樹噪寒烏濛漠江烟上蒼茫沙嶼蕪觧䌫辭東越接舳騖西徂懸㠶似馳驥飛棹若驚鳬言歸遊俠窟方從冠盖衢隋薛道衡入栁江詩仗節遵嚴㑹揚舲泝急流征塗非白馬水勢類黃牛跳波鳴石磧濺沫擁沙洲岸廹槎倒轉灘長船却浮縁崖頻斷挽挂壁屢移鈎還憶青絲騎東方來上頭唐李百藥渡漢江詩東流既渳渳南紀信滔滔水激沉碑岸波駭弄珠臯含星映淺石浮盖下奔濤溜濶霞光近川長曉氣髙檣烏轉輕翼戱鳥落風毛客心既多緒長歌且代勞地理部河洛唐闕襄華貫洪河賦偉連天之浩汗壯發地之峥嶸翠岫屏擁澄瀾砥平疑白虹飲壑而半隠似寒雲抱塞而初横峻勢危而不騫靈源注而常滿積隂騰氣與嵐色而相鮮爍日生霞連榮光而不斷趙冬曦三門賦大河瀰漫上應天漢濬靈波于積石之西瀑懸流于崑崙之半茫茫禹功兹焉㑹同鑿連巗而㵼㶑羅崛島以攅空濶兮若橫兩闕于江上岌兮若稜三山于海中崇山嶔崟呀水淙射左右飛濤起伏相擊截奔湍兮躋石臺目霍濩兮心徘徊三峯砥其却立架崇門以洞開連嶂紆河以壁峭疊巘喬空而半頽洪流蹙拆以坌涌潄湍崟窟而相磓苞巒秘隒砯其鼓作徊澩澎瀑灕以山摧奔濤迅澓紛其蕩駭蓬渤滑淈霍以雲廻盤渦窙寥以谷施奔石砰磕以成雷拗怒未洩橫流逆折合如地轉散若天裂揺騰䂬嶼刷蕩珊穴硉岩腰而沫沸淙隘口而湍咽然後得澡雲霽靄收濤巻瀬汨沄沄以無聲漫浩浩以東㑹總四流而混合注三穴而滂沛泛洪連於大磧之東薄餘怒于天池之外當其時也山獸驚躍水禽亂飛魚獺沉潭以不動獑猱拱樹以相依竄鮫人于洞壑帖舟子于連漪莫不愁白鷺之初下歎黄牛之暝歸李君房清濟貫濁河賦狀盤渦之瀺灂不染乎濁湔跳沫之飛驚不傷夫清均上善以清美含至虛而體平度龍堂而愈灑洗貝闕而増明何必溱洧之陽然後濯其髮寧俟滄浪之畔然後澡其纓吕温河出榮光賦布德惟新儲慶兹始濁色既變榮光乃起乍若燭龍噴熖上騰鍾嶺之雲又似陽烏廻翔下落咸池之水増華一代振曜千祀信能陵晏海而比崇蔑浴日而專美祥烟斂彩瑞日韜晶掩輕雲而旁屬拂薫風而上征詎比流景集壇獨作郊天之應赤光照室空稱誕帝之祥而已哉鄭宗哲温洛賦夏蟲不疑失輕氷于曲渚秋鴻欲去戀㣲暖于通津掲厲之軰謂祁寒初失于波中游泳之徒疑薫風逺至于天表狀真宰爲爐于其底意鄒子吹律于其傍唐張良噐河出榮光詩二首引𣲖崑山峻朝宗海路長千齡逢聖主五色瑞榮光隠映浮中國晶明助太陽坤維連浩漫天漢接㣲茫丹闕清氛裏函闗紫氣旁位尊常守伯道㤗毎呈祥習坎靈逾久居卑德有常龍門如可渉忠信是舟梁符命自陶唐吾君應㑹昌千年清德水九折滿榮光極岸浮佳氣㣲波照夕陽澄輝明貝闕散彩入龍堂近帶關雲紫遥連日道黃馮夷矜海若漢武貴宣房漸没孤槎影仍呈一葦杭撫躬悲未濟作頌喜時康李嶠奉和拜洛詩七萃鑾輿動千年瑞檢開文如龜負出圖似鳯銜來殷薦三神享明祠萬國陪周旗黃鳥集漢幄紫雲廻日暮鈎陳轉清歌上帝臺唐崔融奏河清表上𤣥降祉變孟津于渌波厚載呈祥發榮光于徳水嵩髙維嶽形入清流少室竒峯參差具冩又賀秦州河清表清自龍門之下騐登期以御天波及萬春之卑表無疆以彌夀權德輿賀河清表氣新天宇光澈地脉仰分萬象之法中涵千聖之德初澄海裔表陛下橫恩波于海上再清洛口助陛下鋪文明于土中二十八日兆陛下告成之日也百六十里期陛下得聖之数也秦號水德徒推厭勝漢紀河平苟安決溢神功幽贊獨表清時足以薦諸宗廟書之史䇿宋播芳大全賀河清表域中四大地得一以攸寧天生五材水潤下而爲利稽九河之既導冠四瀆以稱尊抱睢壤以縈廻合汾源而奔注舟師振楫幾汨于涇泥川后静波俄呈于江練連銀漢而共色侔浪井以成文三門緩激箭之流百丈見纎鱗之戯蕩邪却穢挹之無遜于甘泉薦潔明馨用之可資于𤣥酒波聫銀浦似泛秋楂𣲖接瑶池疑逢羽駕宋鮑照河清頌汪彼四瀆媚此䨇川伏靈遥紀閟貺遐年澄波崑丘鏡流葱山泉室凝澱水府清涓俛瞰夷都降視驪淵朱宫潛耀紫閣隂鮮昔在爽德王風不昌廼溢廼竭或壅或亡潔源濫壑曽是未央先民永嘆大道悠長云何其實鍾靈我皇張暢河清頌龍門誕溜積石傳津乗運萬有經啟天人化流上帝時表初星飛書曝瑞龍圖照神恊靈既偉通氣載榮唐王延昌河瀆神靈源公祠廟碑中國經瀆河爲長上應析木下朝扶桑演崑崙踰積石繚大漠經龍門灌注九州之間經營萬里之外鱗介所宅神靈所都𤣥冥總之以命官憑之以爲伯唐堯觀渚龍圖肇見周公沉璧榮光發祥元符之來彪炳彰灼古先哲后㒺不欽崇奠封居之儀修壇墠之制存乎祀典代以爲常則班固序漢書所謂河祠臨晉是也偉其南直太華左隣中條渭水過其傍汾睢掲其後風雲相盪精氣交馳一作配于以禮神事之宜也至于春以泮凍秋以涸流初以嵗禱終以報祈嘗醪有加駵駒是薦盖以在雍州之域通天子之都地既稱雄禮云異数與夫淮流桐栢江出㟭山僻在遐方莫我京也地理部河工唐吕令則河堤賦矗長堤其若雲岌修岸其如島何固䕶之克壯息奔突以永保既夾植于菱蓮又夤縁于萍藻雖興役賦而一勞永固牛馬由其望辨樓船可以逕度宋蘇軾徐州賀河平表聖謩獨運天眷莫違庻邦子來民㒺告病萬杵雷動役不踰時遂消東北莫大之憂然後麥禾可得而食人無後患喜若再生臣軾中謝大河爲災歴世所病禹治兖州之野十有三載乃同漢築宣防之宫二十餘年而定未有收狂瀾于既潰復故道于將湮俛仰而成神速若此恭惟陛下至仁溥施神智無方逹四聰以來衆言廣大孝以安宗廟水當潤下河不溢流屬嵗久之無虞故患生于所忽方其決也夲吏失其防而非天意及其復也盖天助有德而非人功振古所無溥天同慶維豐沛之大澤實汴泗之所鍾伊昔橫流凛孤城之若塊迨兹平定蔚秋稼以如雲害既廣則利多憂獨深而喜倍雖官守有限不獲趨外庭以稱觴而民意所同亦能抒下情而作頌水經注王尊建節河堤不溢王覇精誠滹沱不流漢書叙傳述溝洫文陻棗野武作瓠歌羣書麗句五日一風十日一雨神明存指顧之間千夫有澮萬夫有川興廢在笑譚之頃地理部水利唐樊珣絳巗湖記吟使臣之清風酌良收之髙課將圖永逸匪顧暫勞因察其地形訪以輿誦謀始作則定徒撰工月在休農雲其荷鍤周匝百頃蓄爲湖塘昔叔敖芍陂能張楚國史起漳水竟富魏邦秦稱鄭國漢歌召杜皆謂是也毎商羊罷舞龍見而雩比屋有憂于銷鑠連阡莫覩于耘耨我則黛波奫淪白鳥飛滅下洞庭之鳬鴈泳中流之鱣鮪橫塘之右構爲新亭芬其芰荷樹以杞栁楊楚江嶺憧憧是途行李實獲于䕃庥歌詠或藉于觀覧懿乎哉君子之用心也孰愈崇其島榭侈以林堂此而莫文翰墨奚述魚孟威桂州重修靈渠記靈渠乃海陽山水一𣲖也謂之灕水焉舊說秦命史禄吞越嶠而首鑿之漢命馬援征徴側徴貳而繼疏之所用導三江貫五嶺濟師徒引饋運推爼豆以化猿飲演墳典以移鴃舌蕃禹貢盪堯化也則所繫實大矣唐李華潤州丹陽縣復練塘頌序先王因流下而導之故曰九川滌源因迤匯而瀦之故曰九澤既陂以疏天地之氣以利元元之用崇伯汨五行而殛羽山臺駘障大澤而封汾川洪範首之春秋載之李軫泗州刺史李君神道碑谿白水之口壅樊陽之陂築埇雲屯疊石山積樹建立則截流施扄制畜洩之門爲水府之權分血脉之經緯爲農夫之司命條流百道浸潤七邑疆畦綺錯稼穡龍鱗田疇之歌何獨子産吳越春秋禹行寓内東造絶跡西延積石南踰赤岸北過寒谷徊崑崙察六扈脈地理名金石寫流沙于西隅決弱水于北漢青泉赤淵分入洞穴通江東流至于碣石疏九河于潛淵開五水于東北鑿龍門闢伊闕平易相土觀地分州晉束晳廣農議谷口之謡載在史篇荆揚兖豫汙泥之土渠䲧必多不待天時而豐年可獲以其雲雨生于畚臿多稌生于決泄不必望朝隮而黃潦臻榮山川而霖雨息是故兩周争東西之流史起惜漳渠之浸明地利之重也玉海繞霤未足言其固鄭白未足語其豐祥符中陳堯叟導龍首渠入城民便之詔嘉奨孫叔敖起芍陂楚蒙其惠文翁穿㳛水蜀以富饒白公引涇水谷口歌禾黍史起鑿漳河􅀈旁詠稻梁張闓築新豐李襲引雷陂灌晉陵惟揚之田各八百餘頃召父杜母之惠靡不由之治水有兩端川流畎瞺轉相入以達於海使之有所歸也或不可逹海則損數百里之地因其勢以為澤使之有所容也衆水皆東而弱水獨西黒水獨南因其勢之不得不然行其所無事也古者治水或以佐耕或以通􅒩白公引涇嚴安導洛農民獲其利而轉漕之弗聞宇公厮流韋堅堰渭􅒩運僅得其便而灌溉之績弗著地理部水襍載漢張衡南都賦其水則開竇灑流浸被稻田溝澮脈連堤塍相輑朝雲不興而潢潦獨臻決渫則暵爲溉爲陸冬稌夏穱隨時代熟晉左思吳都賦或涌川而開瀆或吞江而納漢磈磈䃬䃬滮滮涆涆䃢碒乎數州之間灌注乎天下之半百川𣲖别歸海而㑹控清引濁混濤并瀬濆薄沸騰寂寥長邁濞焉洶洶隠焉􅔫􅔫出乎大荒之中行乎東極之外經扶桑之中林包暘谷之滂沛潮波汨起廻復萬里歊霧漨浡雲蒸昏昧泓澄奫潫澒溶沆瀁莫測其深莫究其廣澶湉漠而無涯總有流而爲長壞異之所叢育鱗甲之所集徃唐尹程觀秋水賦惟秋水之清泚宗大壑而潺湲波浩蕩而不極影澄澈而彌天波沉馬色類真人之雲度岸迷牛影疑織女之河邉栁浸影而如卧萍隨流而似牽鳬帶藻而聲澁魚亂流而水圓晴霞晩鋪如漢江之濯錦夜月初上若纎鈎之映泉張嘉貞空水共澄鮮賦託九霄如染翠澈千里而含碧含泳㳺鱗若廻陵而上出聫翩度鳥疑戱沙之下沉晉顧愷之氷賦激厲風而貞質仰和景而融暉清流離之光徹邈雲英之巍巍爾乃連綿絡幕乍結乍無翕然靈化得漸已麤緗白隨川方圓隨渠義剛有折照壺則虛託形超象比朗𤣥珠一綜理而常全經百合而彌切轉若驚電照若澄月積如累空泮若墮莭臨堅投輕應變縷裂瓊碎星流精練清越若乃上結薄映下鏡長泉靈葩隨流含馨揚鮮唐林滋陽氷賦滄淵掩巨蚌之魄碧落奪寒蟾之影幽疑玉樹露皓氣之皚皚浄若銀河亘秋光之耿耿鮮飇乍觸無慙于雲母屏中纎翳不生曷愧于琉璃地上浄拂霜影輕籠月華禀質茍因于涸沍分形詎委于泥沙既異在隂彩射鮫人之室非同向晦光寒漁父之家至若浪息遥川烟收逺嶠焱晶鑠野以増熾皓色澄空而引耀清􅅤上善曽無泮渙之期素激中流豈憚赫曦之照陸環氷賦其藏之也黒牡秬黍以享候其出之也桃弧棘矢以除災取順則人不夭札用逆則時多震雷故以北陸而收西陸將啟冬鍳秋􅀈識寒暑之情大盤夷盤表君臣之禮劉長卿氷賦觀乎外示貞堅内含虛澈無受染以保其素無納汙以全其潔比玉而白不爲蠅玷比月而明不爲蟾缺瓊樹色奪瑶池光發變寒日之清瑩帶隂天之肅殺二之日始鑿命虞官三之日始納享司寒天子陳禮容賦豳風大啟氷室獻于王宫氣肅雲陛寒生衮龍闢九門于月下列千官于鏡中頒聚一作衆位取飲以受命御至尊得象于朝宗若君莫之求臣莫之見則深山窮谷詎可得而加薦茍藏之不周用之不徧則災霜害雹如有待而爲變鮑溶薦氷詩西陸宜先啟春寒寢廟清厯官分氣候天子薦精誠已辨瑶池色如和玉佩鳴禮餘神轉肅曙後月殘明雅合氷容潔非同雪體輕空憐一掬水珍重此時情又趙蕃詩仲月開凌室齋心感聖情寒姿分玉座皎質發丹楹積素因風壯虛空逈日明遥涵窻戸冷近映冕旒清在掌光逾澈當軒質自輕良辰方可致由此表精誠又陳至詩凌寒開固沍􅃦廟致精誠色静澄三酒光寒肅兩楹形鹽非近進玉豆爲潛英禮自春分展堅從北陸成藉茅心共結出鑒水慚明幸得來觀薦靈臺一小生馬戴府試水始氷詩南池寒色動北陸嵗隂生薄薄流澌聚灕灕翠㶑平暗霑霜稍厚廻照日還輕乳竇懸殘滴湘流減恨聲即堪金井貯㑹映玉壺清潔白心誰識空期飲此明張彚征觀藏氷詩寒氣方窮律隂精正結氷體堅風帶壯影素月臨凝冬賦凌人掌春期命婦昇鑿來壺色澈納處鏡光澄魯史曽流問豳詩舊見稱同觀里社享王道頌還興周庾信温湯碑咸池浴日先應緑甲之圖砥柱浮天始受𤣥夷之命仁則滌蕩埃氛義則激揚清濁勇則負山餘力弱則鴻毛不勝仲春則榆莢同流三月則桃花共下其色變者流爲五雲之漿其味美者結爲三危之露烟青于銅浦色白于鉛谿非神鼎而長沸異龍池而獨涌灑胃湔腸興羸起瘠秦皇餘石仍爲鴈齒之階漢武舊陶即用魚鱗之瓦山間湧水實表忠誠室内江流彌彰純孝豈若醴泉消疾聞乎建武之朝神水蠲疴在乎咸康之世嵩岳二仙之館不孤擅于天池華隂百丈之泉豈獨髙于蓮井唐吳筠廬山雲液泉賦甘侔𤣥玉之膏滴乃雲華之液懸之則素皎壅之則澄碧唐常衮賀醴泉表西京櫟陽縣有泉水于平地湧出潔誠飲者痼疾咸痊稽之圖牒是曰醴泉臣聞和氣上感湛恩下浹則有休徴以彰至化近在雨金之地特啟英泉之瑞無源獨湧平地滂流當神明之積髙表隂陽之不測其氣香潔其味甘醇抱華清而盪邪資靈化以除穢積年之疾一飲皆除挈瓶而至重跡相望日以萬計酌而不竭齋莊之誠益厲神逹之效愈彰伏惟陛下𢎞父母之深仁納黎元于夀域感此靈液助其生成疾苦蠲除天昏不作勿藥有喜愛人斯甚可以見天地之心可以明帝王之德昔唐堯至聖光武中興沛然發祥千嵗一睹啟我昌運居然合符鴻休無疆天下慶幸張悦爲留守作奏慶山醴泉表比仙漿于軒后均愈疾于漢代唐蘇頲河南龍門天竺寺碑洞澈深淺則鋪丹孕碧噀連珠而上跳廻夐經復則小雨微風㸃坼瓊而傍散積礫揺動光輝自然琉璃混成毛髪可数唐權徳輿㑹稽虚上人石㠶山靈泉北塢記崖隒之下㣲得泉脉及薙草轉石潗濬沮洳畚之鍤之決之濬之噴若玉寶泄爲瑶池浄如醍醐瑩若琉璃疑青蓮可植金沙在下惠風天籟相爲虛寂然後伐集作殖碧鮮以相接引清流而備用以盥以潄以糜以茗或以助火化或以祛熱惱日用無窮不知其功武少儀王處士鑿山引瀑記縈樹石而散流瀝沙瓖而潛耗注未成瀑浮不勝杯于是周相地形幽尋水脉目指頥諭浚㣲導壅穿或数􅌇通如一源竇巗腹渠總引涓溜集爲澄潭始旁決以淙瀉復湧流而環曲觴斚徐泛自符洛汭之飲管絃乍舉若試舒姑之泉映碧甃而夏寒間蒼苔而石静周王褒温湯銘白礬上徹丹砂下沉華清駐老飛流瑩心唐王冷然清泠池賦是時宫人出看上客淹留既成此池勝形無比喬樹青㝠而外合層甍岌嶪而斜指曉座狎鷗春祠薦鮪連小山而夾廻嶝截長河而分半水徒觀其清泠無㸃洞澈如凝鏡開珠浄月滉星澄鳬嚼紅藻龜翻碧菱地將昏而霧合天欲雨而雲蒸明則可鑒虛而不竭風静浪碎日落圓折波含閣而相動潭映空而俱澈張仲素漲昆明池賦詔京尹以亢役命水工而叶贊陳衆力而雲鍤勃興決萬𣲖而箭流共灌浪湧烟郊更失辨牛之涘日華翠㶑纔分織女之津瑞氣長凝表宸居之在鎬晴虹乍飲若榮光之出河宋悛漲昆明池賦烟收霧斂混天色而波清秋霽霜晴浮月華而影白李之卿昆明池石鯨賦豈比夫爲犀蜀郡浦際空沉作燕湘川雨中方振色映乎崖渚性合乎風雲非任子之釣得儻琴髙之御來幸見處于河漢亦何辭於刼灰晉王彪之井賦考五材之物化寂冥感而資静水帶地而壤潤月流天而宵烱燧鑚木而發火益穿坤而搆井摹𤣥羲之靈爻仰東宿之飛景歩土脉測水泉方欄結轆轤懸下沈瓶而互汲飛纎綆而幽牽于是杳黃壚之邃鮮潤下之潔澄瀾恬以清渟泓冷朗以寥戾恊太隂以化液體上善以流惠唐王起浪井賦窺則澄澄乍玉甃而同色汲之浩浩激銀瓶而有聲鮒飛鱗而不定羊在缶而皆傾洎夫列宿參差曉月韜映搖珠彩而争潔湧金波而轉浄湯湯下激不施屏翳之功洶洶潛驚詎假陽春之詠彼青桐素綆之飾玉檻銀床之盛皆人力之所成固神造之不競吕令則義井賦魏主罷指梅之䇿隰朋息尋蟻之請殊季氏之有缶異疎勒之無泉又井賦㢲下坎上創庖羲之畫象鍤壤畚土喜伯益之初營若乃寒漿是汲美人至止玉甃駢固銀床呇起轆轤宛轉以旋目素綆逶迤而度趾羅袖互引扇皓腕而生香金瓶素泉曲纎腰而貯水旁搜詭迹遐評殊見土精似出惕羵羊之怪奇趹角已陳鬱神龍之氣變金色化粥山形溜殿源洞徳陽之兵勢逆江陵之縣秦分星聚卭都火煽漢皇歘應于雲飛葛公一窺而電烻斯固潛怪之所畜洩吾不可得而言遍髙無際井賦資坎徳以成潤播靈液而澄鮮潜流洞澈細影凝冽不以處幽而易清不以居深而變潔於是雕以玉甃飾以銀床棲永康之瑞鳥呈魯國之羵羊張耀井賦青梧下映泛珪葉以搖揚素綆髙懸弄銀瓶之出入闕枯井賦神丘玉檻仙苑銀床浪華浮潤醴泉味芳永康則金精化鳥曲阜則土怪成羊感至誠于漢将通瑞氣于吳王邵真義井記導之深源經以善利庇彼邃宇達于交衢鐵其瓶以永不羸石其甃以給無泥飛輪周散泄竇前注淬而平之隨用不私主發生以流潤當赫曦以伏炎在搖落而激清抵凝沍而不閉環四序以一其恵俾憧憧者知飲濯所嚮焉滌汰氛坌沃灑蒸灼澹然不改與地配乆崔黃中觀風驛新井記貳師鑿井爰有檻一作濫泉愚叟移山素無巨力志之所至神亦或昭一之日興畚鍤俾應鼕鼓騰沙掊土二之日困于石飛鎚敲火轉石磊硪三之日計功未畢瀐泉仄出泛濫渤潏井上千夫􅗏噪喧呼揚灑甘溢一作泉提缶爭先巷無居人語笑道邊嵗時部厯魏楊偉表時以紀農月以紀事少昊則𤣥鳥司分顓嚳則重黎司天唐虞則羲官掌日三代因之世有日官日官司厯則頒之諸侯諸侯受之則頒于境内周室既衰戰國横騖告朔之羊廢而不紹登臺之禮滅而不遵閏分乖次而不識孟陬失紀而莫悟大火猶西流而怪蟄蟲之不蔵也是時天子不協時司厯不書日諸侯不受職日御不分朔仲尼于春秋司厯失閏則譏而書之登臺頒朔則謂之有禮見宋書志唐李嶠神龍厯序昔者龍負河圖八卦列明時之象龜呈洛字九疇開叶紀之文青巖啟而六甲飛黃壤堙而五行缺故知乾筴逺坤符靈秘法効用常邀乎聖期硏幾測深必貫于神道皇軒于是乎合而不死帝皥于是乎推而致福自重黎並命叔仲分官理八節而調四時部三元而齊七政權衡度律在虞夏而兼修正朔隂陽及殷周而備舉既而王風版蕩戰國縱横瞽史忘三家之言疇人失二官之業履端闕而歸餘壞攝提差而孟陬殄廢時亂日非直羲和湎淫亡甲喪子豈唯商辛暴虐漢興草創肇謀紀綱而方士異詞天官横議張蒼從甲乙之術未叶變通鄧平用丁丑之元旋聞疎濶當塗圮隔典午陵遲戎狄升僣偽之壇㝢縣乏神祇之主三辰九野各析景而分躔二象七衡孰當期而合度建元髙而不競沿木火而無譏興百代之闕文復千齡之大綂匪我昌運疇能釐此自麟徳創紀四十餘年雖斗憲未移而渾儀漸變蔡伯喈所謂術無恒是洛下閎所謂厯後當差昔太初肇視徒易髙皇之制元和新造旋移孝武之法因時通變厥有前聞爰命典司更從刋正皆學富偃韋藝超甘石窮神盡智之妙闇落銅丸測逺窮髙之方懸裁玉表稽長短之效無煩于驗䜟披圖察休咎之徵非假于登臺上庫于是精硏六位遍考十端立東西之定儀採南北之遺事㑹數于天九地十起元于子二丑三追日月之行按星分之度以推四時之發生以步三元之盈縮然後分至啟閉無愆于玉衡弦望躔離必應于銅史纔窺幽室已見飛灰雜候清臺仍㸔合璧追論古法師驗前章八十一寸為日分徒言精宻六百八年為嵗紀終非允當歴祀之所紕繆異端之所穿鑿莫不裁之繩準格以銓衡究天道之精㣲開日官之軌憲容成再出不能添累黍之功壽王重生無以議分毫之失豈比夫時乖兩閏始載鄒人之語亥有二首方聞絳老之年序臨安寧嵗次强圉皇帝撫天下之三載也珍圖載御寳厯初調授以丹鳯之官頒以𤣥鳥之署候耕耘之節非藉杏花亶昏夕之期詎須蓂葉參幽明而制術邁古今而垂範玉儀既正金鏡逾明知聖祉之明疆識懐生之永大元符允合可以觀天地之心能事畢甄可以為帝王之式張説開元大衍厯序分分而加之者百圖集作鈞必過毫毫而減之者千里必差何則古法存而其人異也詔沙門一行上本軒頊夏殷周魯五王一侯之遺式下集太初至于麟徳二十三家之衆義比其異同課其疎宻或前疑而後定或始㑹而終乖振古未探之象必發揮于神筭大鈞不測之氣盡覼縷于天聰乃更審日晷集作晷度之短長覈星間之廣狹繩九道之朓朒糺五精之進退參大衍天地之數綜八卦六爻之序一轍于文王也覆文粹作覈春秋交蝕之辰硏九疇五紀之奥同符文粹作同文集作有同于孔子也杼軸萬象優游四載奏章集作草朝竟一公夕落臣説奉詔金門成書䇿府先有理厯陳景善筭趙昇首尾參𤣥之言接承轉籌之意因而緝合編次勒成一部名曰開元大衍厯經七章十卷長執厯一卷厯議十卷立成法十二卷天竺九執厯一卷九執厯名出西域古今厯書二十四卷畧例奏章一卷凡五十九卷所以貫三才周萬物窮數術先鬼神稱制曰者即聖人顧訪之㫖標謹按者是厯家進退之詞非軒后至聖不啟履端之業非容成詣業不就歸餘之經據其圖也七政之天心不逺守其術也千嵗之日月可知盖中黃之寳符太紫之神器也唐穆宗皇帝長慶宣明厯序爰命太史洎乎疇人候望于清臺論思于别殿究以㣲妙考其禎祥觀渾儀以見天心視圭影而知日至則八卦之氣不雜百工之職允釐豈必于記威鳯之晨晦明無爽候仙蓂之莢弦望不􅄽承唐堯授人之規庶于是矣効軒后合符之騐非所企焉晉律厯志昔者聖人擬宸極以運璿璣揆天行而序景曜分辰野辨躔厯欽農時興物利皆以繋順兩儀紀綱萬物然則觀象設卦扐閏成文厯數之源存于此也逮乎炎帝分八節以始農功黄帝紀三綱而闡書契乃使羲和占日常儀占月鬼區占星氣伶倫造律吕大撓造甲子𨽻首作筭數容成總斯六術考定氣象建五行察發斂起消息正閏餘述而著焉謂之調厯洎于少昊則鳯鳥司厯顓帝則南正司天陶唐則分命羲和虞舜則因循堯法及夏殷乗運周氏應期正朔既殊剏法斯異玉海治厯明時羲易存革故之象頒嵗告朔周官述太史之職其來尚矣辰弗集房嗣侯徂征于羲和火猶西流仲尼歸過于司厯其事重矣聖人上謹天戒下修人紀厯以正時不容差忒漢厯五變而太初最宻唐厯八改而大衍最宻日月轉運于天猶人之行歩故推厯謂之歩厯八卦列明時之象九疇開恊紀之文曲技雲浮疇官雨絶劉焯蓂莢知朔梧桐知閏嵗時部春周庾信春賦宜春苑中春已歸披香殿裏作春衣新年鳥聲千種囀二月楊花滿路飛河陽一縣併是花金谷從來滿園樹一叢香草足礙人數尺遊絲即橫路開上林而競入擁河橋而争渡出麗華之金屋下飛燕之蘭宫釵朶多而訝重䯻鬟髙而畏風眉將栁而争綠面共桃而競紅影來池裏花落衫中苔始緑而藏魚麥纔青而覆雉吹簫弄玉之臺鳴佩凌波之水移戚里而家富入新豐而酒美石榴聊泛蒲桃醱醅芙蓉玉盌蓮子金杯新芽竹笋細核楊梅緑珠捧琴至文君送酒來玉管初調鳴絃暫撫陽春渌水之曲對鳯廻鸞之舞更炙笙簧還移筝柱月入歌扇花承節鼓恊律都尉射雉中郎停車小苑連騎長楊金鞍始被柘弓新張拂塵㸔馬埓分朋入射堂馬是天池之龍種帶乃荆山之玉梁艶錦安天鹿新綾織鳯皇三日曲水向河津日晚河邊多觧神樹下流杯客沙頭度水人縷薄窄衫䄂穿珠帖領巾百丈山頭日欲斜三晡未醉莫還家池中水影懸勝鏡屋裏衣香不如花唐王勃春思賦帝鄉迢遞闗河裏神臯欲暮風烟起黄山半入上林園𤣥㶚斜分曲江水玉臺金闕紛相望千門萬户遙相似昭陽殿裏報春歸未央臺上㸔春暉水晶却掛鴛鴦幔雲母斜開翡翠幃競道西園梅色淺争知北闕栁隂稀歛態調歌扇囘身正舞衣銀蠶吐絲猶未暖金燕銜泥試學飛妾夲幽閨學歌舞寧知漢代多廵撫前年齋祭謁甘泉今嵗笙簫祠后土桃花萬騎喧長薄蘭葉千旗照平浦見原野之方春憶山河之遂古行行避葉歩歩㸔花自有蘭閨數十重安知榆塞三千里榆塞連延玉闗側雲間沉沉不可識葱山隠隠金河北霧裏蒼蒼幾重色忽有驛騎出幽并𫝊道春衣萬里程龍沙春草遍瀚海春雲生疎勒井泉寒尚竭燕山烽火夜應明聞道河源路逺逺誰教夫婿苦行行君子塞外多霜露爲想春園起烟霧遊絲空罥合歡枝落花自遶相思樹春望年年絶幽閨離緒切春色朝朝異邊庭羽書至都䕶新封萬里侯將軍稍定三邊地長斾猶銜掃雲色寳刀尚擁千星氣昨夜祁連驛使還征夫猶住鴈門闗君度山川成白首應知嵗序歇紅顔戚里繁珠翠中閨盛綺羅鳯移金谷舞鶯引石城歌向夕天津洛橋暮争驅紫燕黃牛度閒居伊水園舊宅邙山路武子新布金錢埒季倫欲償珊瑚樹復有西墉春霧寡更值南津春望冩入金市而乘羊出銅街而試馬葉抱露而争宻花牽風而亂下錦障縈山羅幃照野司空令尹之博物三陸二張之文雅新年栢葉之樽上已蘭英之斚爲問逐春人年光幾處新何年春不至何地不宜春亦有當春逢逺客亦有當春别故人風物雖同候悲歡各異倫韋縝讀春令賦若夫太昊綂節勾芒御辰厯以元而天地更始氣值震而物候惟新皇上乃順時令序􅃔倫載青旗之容與服蒼玉之璘玢辨色而金貂列位迎春而玉輅廻輪爰奉令以進讀遂授時而發春俯僂前止精誠上陳曉色分于丹陛韶華發于紫宸遂煥爵以頒秩乃布徳而昭仁陳而未讀千門之寒氣猶飛捧而既宣九有之春輝頓發賈餗東郊迎氣賦蒼龍矯首以虚徐玉輅啟行而肅穆千官萬騎拱神位于中霄太皥勾芒扇和風于東陸明徳惟馨蒼精龍靈寒色尚留于壇墠淑氣已生乎杳冥少陽始來隨初日而其輝未赤新春乍應拂大旌而其色彌青天綂則彰禮容斯覿樂聲動蕩于木氣黄道麗彩于蒼璧氣先四序克配于木德震宫光被八紘不違于金壺玉厯王起東郊迎春賦八鑾振響隨觧凍之和風五輅騰輝映麗天之遲日王起元日觀上公獻夀賦拱北辰之尊不異乎台居列宿獻南山之夀更聞其嶽視三公既而天顔迴眷堯酒畢獻乾坤永固上下無怨禮循墻而已退福如茨而咸勸則山呼萬嵗徒稱漢日之祥天錫九齡詎比周年之願闕元日觀上公獻夀賦夀獻南山率土願歌于周雅位登北極惟仁亦播乎薫風千秋御厯既同傅氏之詞五采綴觴有異邯鄲之獻慶流華夏徳配乾坤梁簡文帝晩春詩紫蘭葉初滿黃鸎弄不稀石蹲還似獸蘿長更如衣水曲魚文聚林暝雅鳥飛渚蒲變新節巗松長舊圍風花落未巳山齋開夜扉梁元帝春日詩新鸎隠葉囀新燕向窻飛栁絮時依酒梅花乍入衣玉珂隨風度金鞍照日暉無令春色晩獨望行人歸庾肩吾奉和春夜應令詩春牖對芳洲珠簾新上鈎燒香知夜漏刻燭驗更籌天禽下北閣織女入西樓月皎疑非夜林疎似更秋水光懸蕩壁山翠下添流詎假西園讌無勞飛盖遊唐盧綸劉侍御春日見招詩清園君子居左右滿圖書三徑春自足一瓢歡有餘莎庭成野席蘭藥是家蔬幽顯豈殊迹昔賢徒病諸包何和程員外春日東郊即事詩郎官休浣憐遲日野老歡娱爲有年幾度折花驚蝶夢數家留葉待蠶眠藤垂委地縈珠履泉長侵階浸緑錢直到閉闗朝謁去鶯聲不散栁含烟張濯迎春東郊詩顓頊時初謝勾芒令復陳飛灰將應節賔日已知春考厯明三統迎祥授萬人衣冠宵執玉壇墠曉清塵肅穆來東道回環拱北辰仗前花待發旗處栁凝新雲歛黃山際氷開素滻濵聖朝多慶賞希爲薦沉淪皇甫冉東郊迎春詩曉見蒼龍駕東郊春已迎綵雲天仗合𤣥象太階平佳氣山川秀和風政令行鈎陳霜騎肅御道雨師清律向韶陽變人隨草木榮遙歡上林苑今日遇遷鶯冷朝陽立春詩玉律傳佳節青陽應北辰土牛呈嵗稔綵鷰表年春臘盡星廻次寒餘月建寅風光行處好雲物望中新流水初銷凍潜魚欲振鱗梅花將栁色偏思越鄉人白行簡長安早春詩杳靄三春色先從帝里芳折楊猶恨短測景已忻長鸎和紅樓樂花連紫禁香躍魚驚太液佳氣接温湯風送飛珂響塵䝉翠輦光熈熈晴煦逺徒欲奉堯觴沈亞之春色滿皇州詩何處春歸好偏宜在雍州花明夾城道栁暗曲江頭風軟遊絲重光融瑞氣浮鬬鷄憐短草乳鷰傍髙樓繡轂盈香陌新泉溢御溝行㸔日欲暮迴騎似川流已上春總晉傅𤣥朝㑹賦考夏后之遺訓綜殷周之典制採秦漢之舊儀肇元正之嘉㑹于是先期戒事衆發允敕萬國咸享各以其職翼翼京邑巍巍紫極前三朝之夜中庭燎晃以舒光華燈若乎火樹熾百枝之煌煌俯而察之如亢燭龍而炤𤣥方仰而觀焉似披丹霞而鑒九陽唐虞世南奉和獻嵗讌宫臣詩履端初啟節長苑命髙筵肆夏喧金奏重潤響朱絃絲光催栁色日彩泛槐烟㣲臣同濫吹謬得仰鈞天蕭慤奉和元日詩帝宫通夕燎天門拂曙開瑞雲生寶鼎榮光上露臺華山不凋葉宜城萬夀杯遙見飛鳬下懸知鄴縣來許敬宗奉和元日應制詩天正初開節日觀上重輪百靈滋景祚萬土慶維新待旦敷𤣥造韜旒御紫宸武帳臨光宅文衛象鈎陳廣廷揚九奏大帛麗三辰發生同化育播物體陶鈞霜空澄曉氣霽景瑩芳春徳暉覃率土相賀奉還淳唐許敬宗爲汝南公賀元日御正殿受朝賀表上正三辰下臨萬國事雖舉舊命則維新臣聞聖祖垂訓王者處域中之尊公羊紀時春者爲一嵗之始載稽故實抑有典章近嵗以來此禮多闕或事因惜費或時屬告休伏惟皇帝陛下道被無垠政敷有截全取發生之德無非訢合之仁蒼旻降符黃輿告瑞石碑既見文作太平銀甕旋臻字成萬嵗而又憂勤不輟刻責方深精誠旁照于八紘懇惻上通于九廟仙厨撤味獸館休畋遂使化妖宿爲夀星變小戎爲餓殍慶由聖感令屬神行爰在新正式脩闕典彤庭列位丹陛陳儀凝旒而天啟其門服衮而日升于觀巽風發越兑澤滂沱左右賢臣駿奔多士國無䛕佞擢靈草而不搖朝絶奸邪儼神羊而莫動禮成而退物有其容况以光耀瑤圖丹青玉版輝前映後邁五登三臣竊訪碩儒逺徴舊典帝堯華封之祝唯止匹夫神禹塗山之儀且非元㑹然猶堯有多憂之戒禹存後至之誅在和平而尚乖孰歡呼之可致豈與兹日而得同年臣方守河潼正分符竹不獲躬陳玉帛首率梯航况又嘗以藝文叨居禁密雖逺離天上猶近闗西抃賀空深就望無所心馳紫闕非夢寐而不通魂繞皇闈羨歸飛而莫及宋秦觀賀元㑹表漏未盡而車輅陳蹕既鳴而鼔鐘作應龍髙舉雲氣畢從北極上臨星宿咸拱受四海之圖籍拜萬國之衣冠嵗月日時于焉先正聲名文物燦爾可觀邁康王豐宫之朝揜高帝長樂之事維嵗月日時之首乃朝宗覲遇之先循用舊章遹陳盛禮東臺瑞物貫玉璽之珍符左右車圖增金城之列障樂象成而乃作文稱賀以非虛多士盈庭四夷在列忻逢千載之運敬上萬年之觴晁補之代人元日賀表魯史書春事盖先于五始漢儀朝朔氣亦謹于三㣲玉燭成書慶新元于端月椒花入頌美舒景于青陽蘇軾賀正啟葦桃在户磔攘以餞餘寒椒栢稱觴燔烈以興嗣嵗在時爲泰與物咸新已上元旦唐李嶠人日重宴大明宫恩賜綵縷人應制詩鳯城景色已含韶人日風光倍覺饒桂吐半輪迎此夜蓂開七葉應今朝魚猜水凍行猶澁鸎喜春熈弄欲嬌愧奉登髙搖綵翰欣承御氣上丹霄又蘇頲詩疏龍磴道切昭回建鳯旗門繞帝臺七葉仙蓂承月吐千秋御栁拂烟開初年競帖宜春勝長命光浮獻夀杯是日最靈知竊幸羣心就捧大明來又李適詩朱城待鳯韶年至碧殿蟠龍淑氣來寶帳金屛人已帖圖花學鳥勝初裁林香近接宜春苑山翠遥添獻夀杯向夕凴髙風景麗天文垂曜象昭回已上人日盧照隣十五夜觀燈詩錦里開芳宴蘭釭艷早年蘇味道正月十五夜詩火樹銀花合星橋鐡鎖開暗塵隨馬去明月逐人來遊騎皆穠李行歌盡落梅金吾不禁夜玉漏莫相催孫逖正月十五夜應制詩洛城三五夜天子萬年春彩仗移雙闕瓊筵㑹九賓舞成倉頡字燈作法王輪不覺東方白筵隨御栁新王維奉和十五夜燃燈繼以酺宴之作應制詩上路笙歌滿春城刻漏長遊人多晝日明月讓燈光魚鑰通翔鳯龍輿出建章九衢陳廣樂百福透名香仙妓來金殿都人遶玉堂定應偷艷舞從此學新粧奉引迎三事司儀立萬方願將天地夀同以獻君王已上元夕後漢杜篤祓禊賦於是㫖酒嘉肴方丈盈前浮棗絳水酹酒醲川若乃窈窕淑女美媵艷姝戴翡翠珥明珠曳羅袿立水涯㣲風掩􅝙纎縠低徊蘭蘇肸蠁感動情魂晉夏侯湛禊賦爾乃擢翠旗垂繁纓㣲雲乗軒清風卷旌飛輪猋起良馬電驚車駕鱗萃男女霧㑹服煥羅縠翠翳連盖縈香丸于素襟結九齡乎時外燦爛虺韡焜􅈌發越若乎朝春挺葩夕霞抱月梁簡文帝三日侍宴林光殿詩芳年留帝賞應物動天襟挾苑連金陣分衢度羽林帷宫對廣掖層殿邇髙岑風旗争曳影亭臯共生隂林花初墮蒂池荷欲吐心劉孝綽三日侍華光殿曲水宴詩薫祓三陽暮濯禊元已初皇心睠樂飲帳殿臨春渠豫游髙夏諺凱樂盛周居復以焚林日丰茸花樹舒羽觴環階轉清瀾倚席䟽妍歌已寥亮妙舞復紆餘九成變絲竹百戱起龍魚庾肩吾三日侍蘭亭曲水宴詩䇿星依夜動鑾駕總朝游旌門臨逺樹栢風出鳯樓春生露泥泥天覆雲油油桃花生玉澗栁葉暗金溝禊川分曲洛帳殿掩芳洲踴躍赬魚醉參差綘藻浮百戯俱臨水千鍾共逐流沈約三日率爾成篇詩麗日屬元已年芳具在斯開花已匝樹流鸎復滿枝洛陽繁華子長安輕薄児東出千金堰西臨鴈鶩陂遊絲映空轉髙栁拂池垂緑萍文照耀紫燕光陸離清晨戯伊水薄暮宿蘭池象筵鳴寳瑟金瓶泛玉巵仍憶蠶眠起日暮桑欲萎長袂屢以拂雕胡方自炊愛而不可見宿昔減容儀早晚忘情士歎息獨何爲北齊邢子才三日華林園公宴詩廻鑾自樂野弭盖屬瑤池五丞接光景七友樹風儀芳春時欲遽覽物惜將移新萍已冒沼餘花尚滿枝草滋徑蕪沒林長山蔽虧芳筵羅玉爼激水漾金巵歌聲斷且續舞袖合還離隋江總三日侍宴宣猷堂曲水詩上已娱春禊芳辰喜月離北宫命簫鼔南館列旌麾繡柱擎飛閣雕軒傍曲池醉魚沉逺岫浮藻漾清漪落花懸度影飛絲不礙枝樹動丹樓出山斜翠磴危禮周羽爵遍樂闋光隂移唐王維奉和聖製與太子諸王三月三日龍池春禊之作詩故事修春禊新宫展豫遊明君移鳯輦太子出龍樓賦掩陳王作盃如洛水流金人來捧劍畫鷁去迴舟苑樹浮宫闕天池照冕旒宸章在雲漢垂象滿皇州又奉和聖製上已于望春亭觀禊飲之作詩長樂青門外宜春小苑東樓開萬井上輦過百花中畫鷁移仙仗金貂列上公清歌邀落日妍舞向春風渭水明秦殿黃山入漢宫君王來祓禊㶚滻亦朝宗宋之問三月三日奉使涼州雨中禊飲序摯虞對而不經束晳言而有禮漢庭故事衣冠就𤣥㶚之橋晉國遺風輜軿耀翠媯之浦稽叔夜之鳴琴偏依緑竹郭子期之春酒夲出青山論史可聽談𤣥愈黙宋之問上已泛舟昆明池宴宗主簿席序摩肩錯轂備朝野之歡娱袨服靚粧匝都城之里閈翠幕星布錦㠶霞属餘瀝下醉于鮫人新聲逺聒于川后縱目遐覽識皇代之承平得意同歸有吾儕之行樂髙明一座桂樹藂生君子肆筵玉山交映束晳以言談得俊張華以史漢先鳴登㫖酒而無荒絃清琴而自逸王勃三月上已祓禊序遲遲風景出沒媚于郊原片片仙雲逺近生于林薄雜花争發非止桃蹊羣鳥亂飛有踰鸎谷王孫春草處處争鮮仲阮芳園家家並翠已上上已韋承慶寒食應制詩鳯條春色滿龍禁早輝通舊火收槐燧餘寒入桂宫鸎啼正隠葉鷄鬬始開籠藹藹瑤山滿仙歌始樂風又張説詩寒食春過半花穠鳥復嬌從來禁火日㑹接清明朝鬬敵鷄殊勝争毬馬絶調晴空數雲㸃香樹百花揺改木迎新燧封田表舊燒皇情愛嘉節𫝊曲宴簫韶沈佺期嶺表逢寒食詩嶺外逢寒食春來不見􅄳洛陽新甲子何日是清明花栁争朝發軒車滿路迎帝鄉遙可念腸㫁報親情獨孤良弼上已連清明遊宴詩上已觀初罷清明賞又追閏年侵舊厯令節併芳時細雨鶯飛重春風酒醒遲翫花迷白雪㸔栁折青絲淑氣如相待天和竟爲誰却嗟名未立空詠宴遊詩張籍寒食内宴詩二首朝光瑞氣滿宫樓綵纛魚龍四靣稠廊下御厨分冷食殿前香騎逐飛毬千官盡醉猶教坐百戱皆呈未放休共喜拜恩侵夜出金吾不敢問行由城闕沉沉向曉寒恩當冷節賜餘歡瑞烟深處開三殿春雨㣲時引百官寶樹樓前分翠幕綵花廊下映朱欄宫庭戯樂年年别已得三廻對御㸔已上寒食嵗時部夏魏曹植大暑賦炎帝掌節祝融司方羲和按轡南雀舞衡虵折鱗于靈窟龍觧角于皓蒼遂乃温風赫戱草木垂榦山坼海沸沙融礫爛飛魚躍渚潛黿浮岸鳥張翼而近棲獸交游而雲散于時黎庻徙倚棊布葉分機女絶綜農夫釋耘背暑者不羣而齊跡向隂者不㑹而成羣于是大人遷居宅幽綏神育靈雲屋重構閒房肅清寒泉湧流𤣥木奮榮積素氷于幽館氣飛結而爲霜奏白雪于琴瑟朔風感而増凉晉夏矦湛大暑賦爾乃土墳地坼谷枯川竭寒泉潛沸氷井騰沫洪液蒸于單簟兮珠汗霑乎絺葛温風翕其至兮若洒湯于玉質沃新水以達夕振輕箑以終日傅𤣥述夏賦四月惟夏運臻正陽和氣穆而扇物麥含露而飛芒清徴泛于琴瑟朱鳥感于炎荒鹿解角于中野草木蔚其條長隋盧思道納凉賦積歊蒸于簾櫳流煩溽于園籞陽風淟其長扇火雲赫而四舉爾乃警六御按三條擊鼉鼓吹鳯簫雲車錯轂麟馬齊鑣入雲宫之􅑬嵼登仙觀之岧嶤引雄風于洞穴承清露于丹霄動颼飀于翠帳散霏㣲于綺寮周庾信奉和夏日應令詩珠簾卷嚴日翠幕蔽重陽五月炎蒸氣三時刻漏長麥隨風裏熟梅逐雨中黄開氷帶井水和粉雜生香衫含蕉葉氣扇動竹風凉早菱生軟角初蓮開細房願陪仙鶴舉洛浦聼笙簧梁簡文帝和湘東王首夏詩泠風雜細雨垂雲助麥凉竹水俱蔥翠花蝶兩飛翔燕泥銜復落鶗鴂吟更揚卧石藤爲䌫山橋樹作梁欲待華池上明月吐清光又苦熱詩六龍騖不息三伏啟炎陽寢興煩几案俯仰倦帷床滂沱汗似瀹微靡風如湯洄池愧玉浪蘭殿非含霜細簾時半掩輕幌乍横張雲斜花影没日落荷心香願見洪崖井誰憐河朔觴何遜苦熱詩昔聞草木燋今覩沙石爛曀曀風逾静曈曈日漸旰習静閟衣巾讀書煩几案卧思清露浥座待髙星燦蝙蝠户中飛蠛蠓窻間亂實無河朔飲空有臨淄汗遺金自不拾惡木寧無榦願以三伏晨催促九秋換梁蕭子範夏夜獨坐詩節序遇徂炎兹宵在三伏慿軒佇凉氣中筵卷煩燠寂寞對空窻清疎臨夜竹蟲聲亂階草螢光繞庭木簾月度斜暉風花起餘馥一傷年志罷長嗟逝波速周庾信苦熱詩火井沉熒散炎洲髙燄通鞭石未成雨鳴鳶不起風思爲鸞翼扇願借光明宫臨淄迎子禮中散就安豐美酒合蘭氣甘𤓰開蜜筒寂寥人事屏還得隠墻東隋魏彦琛奉和夏初應詔詩雖度芳春節物色尚餘華出簾飛小燕映戸落殘花舞袖飄細縠歌扇掩輕紗蘭房夲宜夜不畏日光斜唐楊師道奉和夏日晩景應詔詩輦路夾垂楊離宫通建章日落橫峯影雲歸起夕凉彤軒動流吹羽盖息廻塘薙草生還緑殘花落尚香青巖類姑射碧澗似汾陽幸属無爲日歡娱方未央隋李徳林夏日詩夏景多煩蒸山水暫追凉桐枝覆玉檻荷葉滿銀塘輕扇搖明月珍簟拂流黃壺盛仙客酒缾注帝臺漿才人下銅雀侍妓出明光歌聲越齊市舞曲冠平陽㣲風動羅帶薄汗染紅粧共欣陪宴賞千秋樂未央唐張聿首夏猶清和詩早夏宜初景和光起禁城祝融將御節炎帝啟朱明日送殘花晩風過御苑清郊原浮麥氣池沼發荷英樹影臨山動禽飛入漢輕幸逢堯禹化全勝谷中情已上夏總唐李商隠端午日上所知劍啟銀装漆鞘紫錦􅌩盛𫝊自道流頗全古製未遇良工之鑒嘗爲下客所彈龍藻雖繁鵜膏稍薄敢因五日仰續千齡厠玉玦于君侯擬象環于夫子所冀更蒙千灌重許三鄉使武士讓鋒佞臣喪魄梁王筠五日詩裁縫逗早夏㸃畫守初晨綃紈既妍媚脂粉亦香新長絲表良節命縷應佳辰結蘆同楚客採艾異詩人折花競鮮彩拭露染芳津含嬌起斜盼斂笑動㣲嚬獻璫依洛浦懐珮似江濵須待恩光接中夜奉衣巾北齊魏收五日詩麥凉殊未畢蜩鳴早欲聞喧林尚黄鳥浮天已白雲辟兵書鬼字神印題靈文因想蒼梧郡兹日祀陳君唐𤣥宗端午三殿宴羣臣探得神字詩五月符天數五音調夏鈞舊來傳五日無事不稱神穴枕通靈氣長絲續命人四時花競巧九子粽争新方殿臨華節圓宫宴雅臣進對一言重遒文六義陳股肱良足詠風化可還淳張説端午日三殿侍宴得魚字應制詩小暑夏絃應㣲隂商管初願齎長命縷來續大思餘三殿褰珠箔羣官上玉除助陽嘗麥彘順節進龜魚甘露垂天酒芝花捧御書含丹同蝘蜓灰骨慕蟾蜍今日傷蛇意銜珠遂闕如已上午日嵗時部秋宋沈勃秋羈賦朱雲弛辰金祗御嵗菊圖縟于園沼橘倒飾于池側草改貎而傾蕡林伐状而揺蔕潭歛氣而威荷露危光而嚴蕙梁元帝臨秋賦草色雜而香同樹影齊而花異遙峰迢遰縈沙㫁絶雲出山而相似水含天而難别唐張秀明西郊迎秋賦律中夷則神司蓐收凉風以厲大火西流草木不芳誰忍聞于鶗鴂囹圄再繕亦申命于鷞鳩天仗齊列野慶清秋乗白輅而啟行載白旗而扈從天顔廼穆帝典攸重彼詞客與史臣咸作歌而陳頌鴻鴈將賔待橫舟于汾曲鷹隼已擊且較獵于長楊唐太宗秋日即目詩爽氣浮丹闕秋光澹紫宫衣碎荷疎影花明菊㸃叢袍輕低草露盖側舞松風散岫飄雲葉迷路飛烟鴻砌冷蘭彫珮圭寒樹隕桐别鶴棲琴裏離猿啼峽中落野飛星箭絃虛半月弓芳菲夕霧起暮色滿房櫳又許敬宗奉和詩玉露交朱網金風度綺錢昆明秋景澹岐岫落霞然辭燕歸寒海來鴻出逺天葉動羅惟颺花晩綉衣鮮規空昇闇魄籠野散輕烟鵲度林光起鳬沒水文圓無機絡秋緯如管奏寒蟬乃睠情何極宸襟豫有旃袁朗秋日應詔詩玉樹凉風舉金塘細草萎葉落空飇觀鴻歸明月池迎寒桂酒熟含露菊花垂一奉章臺宴千秋長願斯盧綸和太常王卿立秋日即事詩山髙雲日晴潘岳賦初成籬槿花無色堦桐葉有聲綘紗垂簟静白羽拂衣輕鴻鴈悲天逺龜魚覺水清别絃添楚思牧馬動邉情田雨農官問林風苑吏驚松篁終盛茂蓬艾自衰榮遥仰慿軒夕唯應苦宋生司空曙立秋日詩律變新秋至蕭條自此初花酣蓮報謝葉在栁呈疎淡日非雲暎清風似雨餘卷帷凉暗度迎扇暑先除草静多翻燕波澄乍露魚今朝散騎省作賦興何如駱賔王上瑕丘韋明府啟商蛬秋應節素鴈序屆時飇金將露玉俱清栁黛與荷緗漸歇王勃宇文德陽宅秋夜山亭宴序於時白藏開序青女御律金風髙而林野動秋露下而江山静琴亭酒榭磊落乘烟竹徑松扉參差向月魚鱗積磴還昇蘭桂之峰鴛翼分橋即映芙蓉之水亦有紅蘋緑荇亘渚連翹玉帶瑤華分楹間植池簾夕敞香牽十歩之風岫幌宵褰氣襲三危之露縱冲􅁭于俗表留逸契于人間東山之賞在焉南澗之情不逺已上秋總周庾信七夕賦兎月光上羊燈次安覩牛星之曜景視織女之闌干于是秦娥麗妾趙豔佳人窈窕名燕逶迤姓秦嫌朝妝之半故憐晚拭之全新此時併捨房櫳共徃庭中縷條𦂳而貫矩針鼻細而穿空闕七夕賦息龍杼于仙機駕羽橋于淺瀬耀九微之華彩澄八極之氛靄儼翠鳯以翔鑣舉丹蜺而振斾籠霧縠于雕輦疉雲花于綺葢舟容裔于水濱駕逶迤于烟外若乃仙娥侍轂玉女承騑嬴簫後唱洛鼓前揮褰九霄之雲幄曳五色之霞衣珮揺星而玉振扇掩月而紈飛陵紫宫而沉景轥黄道而騰暉始徘徊而好宻契方阻而情違悵此夕之行盡恨前秋之未歸恡宵光之不駐泫晨露之將晞于是虯水移箭魚闗驚鑰槎客河低針樓月落分一筵于俄頃觧雙袂於今昨河漢忽其無梁秋期杳其無度縈别緒而惆悵對離居之寂寞梁栁惲七夕穿針詩代馬秋不歸緇紈無復緒迎寒理衣一作夜縫暎月抽纎縷的爍愁睇光連娟思眉聚清露下羅衣秋風吹玉柱流景對秋夕餘光亦難取庾肩吾七夕詩玉匣巻懸衣針樓開夜扉姮娥随月落織女逐星移離前㸔促夜别後對空機得語雕陵鵲填河未可飛陳江總七夕詩漢曲天榆冷河邉月桂秋婉孌期今夜飄颻度淺流輪隨列宿動路逺綵雲浮横波翻㵼淚束素反緘愁此時機杼息獨向紅粧羞唐李嶠同賦山居七夕詩明月青山夜髙天白露秋花庭開粉席雲岫敞針樓石類支機影池似泛槎流暫驚河女鵲終狎野人鷗又奉和七夕兩儀殿㑹宴應制詩靈匹三秋㑹仙期七夕過槎來人泛海橋渡鵲填河帝縷昇銀閣天機罷玉梭誰言七襄詠重入五絃歌又趙彦昭詩青女三秋節黄姑七日期星橋渡玉佩雲閣掩羅帷河氣通仙掖天文入睿詞今宵望雲漢應得見蛾眉又劉憲詩秋吹過䨇闕星仙動二靈更深移月鏡河淺渡雲軿殿上徴方朔人間失武丁天文兹夜裏光照紫微庭張文恭七夕詩鳯律驚秋氣龍梭静夜機星橋百枝動雲路七香飛暎月囘雕扇凌霞曳綺衣含情向華幄流態入重闈歡餘夕漏盡怨結曉驂歸誰言分河漢還憶兩心違劉禹錫七夕詩二首河鼓靈旗動姮娥破鏡斜滿空天是幕徐轉斗爲車機罷猶安石橋成不礙查寧知觀津女竟夕望雲涯天衢啟雲帳仙馭上星橋初喜渡河漢頻驚轉斗杓餘霞張錦幛輕電閃紅綃非是人間世還悲後㑹遥已上七夕唐楊烱盂蘭盆賦渾元告秋羲和奏曉太隂望兮圓魄皎閶闔開兮凉風嫋四海澄兮百川皛隂陽肅兮天地窅掃離宫清重閣設皇邸張翠幕鸞飛鳯翔燄陽倐爍雲舒霧布翕赫䀜霍陳法供飾盂蘭壯神功之妙物何造化之多端青蓮吐而非夏赬果揺而不寒銅鐵銀錫璆琳琅玕映以甘泉之玉樹冠以承露之金盤憲章三極儀形萬類上寥廓兮法天下安貞兮象地殫怪力窮神異少君王子掣曵兮若來玉女瑤姬翩􅗁兮必至鳴鷫鸘與鸑鷟舞鶤鷄與翡翠毒龍怒兮赫然狂象奔兮沈醉怖魍魎潛魑魅離娄明目不足見其精㣲匠石洗心不足徴其奥秘繽繽紛紛氤氤氲氲五色成文若榮光休氣發彩于重雲蒨蒨燦燦煥煥爛爛三光壯觀若合璧連珠耿曜于長漢夫其逺也天台嵥起繞之以赤霞夫其近也削成孤峙覆之以蓮花晃兮瑶臺之帝室赩兮金闕之仙家其髙也上諸天于大梵其廣也遍法界于恒沙上可以薦元符于七廟下可以納羣動于三車已上七月十五唐沈佺期九日侍宴詩御氣幸金方慿髙薦羽觴魏文分菊蘂漢武賜萸房秋變銅池色晴添銀樹光雜詠作去鶴留笙吹歸鴻識舞行年年重九慶日月奉天長趙彦昭九日幸臨渭亭應制詩秋豫凝仙覽宸遊轉翠華呼鷹下鳥路戯馬出龍沙紫菊宜新夀丹萸辟舊邪湏陪長久宴嵗嵗奉吹花王維奉和聖製重陽莭宰臣及羣官上夀作詩四海方無事三秋大有年百生逢此日萬夀願齊天芍藥和金鼎茱萸挿玳筵玉堂開右个天樂動宫懸御栁疎秋景城鵶拂曙烟無窮菊花節長奉栢梁篇嚴維九日陪崔郎中北山醼詩上客南臺至重陽此㑹文菊芳寒露洗杯翠夕陽曛務簡人同醉溪間鳥自羣府中官最小唯有孟㕘軍李羣玉九日詩玉醴泛金菊雲亭敞黛筵晴山低畫浦斜鴈逺書天謝朓離都日殷公出守年不知瑶水宴誰和白雲篇王濯九月九日勤政樓下觀百寮獻夀詩御氣黄花節臨軒紫陌頭早陽生彩仗霽色入仙樓獻夀皆鴛鷺瞻天盡冕旒菊罇過九日鳯厯肇千秋樂奏薫風起盃酣瑞影收年年歌舞度此地慶皇休楊衡九日陪樊尚書龍山宴集詩孟嘉從宴地千乘復登臨緑危陟髙歩慿曠冩幽襟黃花翫初馥翠物喜盈斟雲雜組繡色樂和山水音斾揺秋吹急筵卷夕光沉都人瞻騎火猶知隔寺深于邵九日陪亷使盧端公宴東樓序慿髙而翠靄轉㣲送逺而白鴈㸔没泛椒菊而筭爵顧絲桐而間奏賔醉月上主待露晞想彭澤之獨遊悵馬臺之陳迹已上九月九日嵗時部冬唐王起北郊迎冬賦于時時和嵗豐勞農息力結氷于坎改火于國天欣玉燭之太和人受銅渾之㒺忒由是文物成聲名飾皇皇濟濟鏘鏘翼翼向仙蹕之駐方引斾于司南望曉星之殘尚建杓于禮北嚴飇絶𤣥輅之響愛日動鐵驪之色一人由之而展容萬姓于焉而仰德導嚴凝之氣無奪其倫應廣莫之風不􅄽于度趙自厲寒賦大火宿藏青霜晨烈則蜀井烟閉漲海氛滅長河天浹綴珠崖而生氷幽朔地窮濛飛沙而雨雪唐楊巨源奉酬竇郎中早入省苦寒見寄詩𤣥冥怒含風羣物戒嚴節空山頑石破幽澗層氷裂題詩金華彦接武丹霄烈曠懷玉京雲孤唱粉垣雪窮隂總凝沍正氣直肅殺天狼㸔墜地霜兎敢拒穴悠然蓬蒿士亦得奉朝謁羸驂苦遲遲單僕怨切切端闈仙階邃廣陌凍橋滑旭日鴛鷺行瑞烟芙蓉闕司寒申鄭重成嵗在凛冽謝監逢酒時袁生閉門月漸思霜霰減欲報陽和發誰家挾纊心何地當鑪熱慘舒能一改恭聽逺者説唐李商隠爲榮陽公進賀冬銀等狀黃鍾應候白琯舒和近訪晉儀禮同元日遐觀魯史事重朔朝宋蘇軾賀冬啟候緹室之清宫瞽告以日卜臺觀之黄祲史書有年共安消長之來以待隂陽之定已上冬總唐張叔良長至日上公獻夀詩二首鳯闕清鐘度雞人曉漏長九重初起鑰三事盡稱觴日至龍顔近天旋聖厯昌休光連雪浄瑞氣雜爐香化被君臣洽恩沾士庻康不因稽舊典誰得記朝章候曉金門闢乘時玉厯長羽儀瞻上宰雲物麗初陽漢禮方𫝊珮堯年正捧觴日行臨觀闕帝錫洽珪璋盛美超三代洪休降百祥自憐朝不坐空此詠無疆釋皎然冬至日陪裴端公使君清水堂宴集詩亞嵗崇髙宴華軒照緑波渚芳迎氣早山翠向晴多推徃知時訓書祥辨政和從公惜日短留賞夜如何魏曹植冬至獻襪表千載昌期一陽佳節四方交泰萬彚昭蘇亞嵗迎祥履長納慶不勝感節情係帷幄拜表奉賀并獻文履七緉襪若干副茅茨之陋不足以入金門登玉臺也亞嵗魏晉冬至受賀其儀亞于嵗朝亦云如正見崔寔四民月令冬至之日薦羔黍先薦𤣥㝠以及祖禰其進酒肴及謁賀君師耆老如正日唐許敬宗爲百官賀朔旦冬至表臣聞乾坤資始上元開厯象之端日月還流朔旦正旋衡之夲事韞有形之表理遂無物之先故能運彼𤣥樞財成庻類麗兹黄道孕育羣生惟聖則天允執在躬之厯惟皇作極必叶履端之契所以書稱敬授易曰明時克正降平無非此道伏惟皇帝陛下聲凝祕籙功𢎞造化縱如神之𤣥覽體不言于四時發就日之光華同無私于七曜階蓂循晷阿鳯吟辰元精究開闢之初握先窮名數之始裁炎凉于玉管節雨露于金渾道格彼蒼仁霑無外八紘受朔盡入封疆九譯承風逺遵文軌昆蟲涵于愷澤草木汎于榮光由是上感天而下漏泉不愛道而効其寶肇一元于甲子致希世之貞符挾五始于長至播光前之茂禮伏見宣義郎李淳風表竊見古厯分日起于子半勘得今嵗十一月甲子朔旦冬至而故太史令傅仁均欲茍異張曹𤣥法減餘稍多子初爲朔遂差三刻用乖天正然自初及終日月全未相離筭與太初事皆符合奉勅付有司及經術者詳加考定以議奏聞于是鴻生碩儒咸稽茂典研精覃思俱考舊文國子祭酒臣孔穎逹十有一人與尚書八座參議得天咸以爲仁均定朔事有㣲差淳風推校理尤精宻謹按漢書云古者黃帝合而不死應邵云厯合天心而僊也益部耆舊傳云洛下閎改顓頊法更作太初厯自云後八百嵗此厯差一日有聖人出定之斯乃差日濫觴久著之於㝠兆聖出之騐叶當今有之徴俯㑹八百之期逺叶九仙之道臣等緬惟邃古歴考前王若乃萌氣黄鍾兆根𤣥牝闡其幽而藏其用窺其奥而開其文列聖存而不論故無得而稱也自圖書爰始三統騰鑣皇王以來六家分軫帝軒垂憲大撓汨其洪源伯禹嗣興小正窮其至賾命羲叔于唐厯考箕子于周年或以𤣥乙司分翠虬定箭登清臺而索隠揆圭表以知㣲事緒多途無聞感應猶且各稱書契並擅鴻名改年號以應元符禮日觀而爲稱首豈與夫兩儀同德五緯齊明景延南正星纒北流聨珠候朔的皪清漢之間合璧規天徘徊紫霄之上校先代之優劣豈同年而語哉庻當玉輅徐輪金泥祕檢塗山之下㑹百神而合符介丘之側朝萬玉而光耀天人交際不亦休歟臣等生屬夀昌累逢祉福至于今慶曠古無儔何幸如之親承旦暮不任欣躍之至宋晁補之冬至賀表璧合珠連㑹三辰于初紀芸生荔挺兆萬物之華心又代人冬至賀表衡端氣至候炭仰而鐡低表北景長知人和而嵗美律當乾九六氣資宣養之端陽潛地中七日知來復之候易謹閉闗盖待隂陽之定傳先書物以知天地之祥已上冬至唐太宗守嵗詩二首暮景斜芳殿年華麗綺宫寒辭去冬雪暖帶入春風堦馥舒梅素盤花卷燭紅共歡新故嵗迎送一宵中嵗隂窮暮紀獻節啟新芳冬盡今宵促年開明日長氷消出鏡水梅散入風香對此歡終宴傾壺待曙光杜審言守嵗侍宴應制詩季冬除夜接新年帝子王孫捧御筵宫闕星河低拂樹殿庭燈燭上薫天彈絲奏管梅風入對局探鈎栢酒𫝊欲向元正歌萬夀蹔留歡賞寄春前戴叔倫除夜宿石橋館詩旅館誰相問寒燈獨可親一年將盡夜萬里未歸人寥落悲前事支離笑此身愁顔與衰鬢明日又逢春唐王勃守嵗序嵗月易盡光隂難駐春秋冬夏錯四序之凉炎甲乙丙丁紀三朝之厯數十二月之隂氣玉律窮年一萬嵗之休禎金觴獻夀賁鼓雷動烟火星流侲子黄童統鈎陳而驅赤疫諸王萬國陳玉帛而謁一作朝諸侯京兆天中竦樓臺而徹漢長安路上亂車馬而飛塵王丞相之登臨行將在目戴侍中之重席忽爾明朝槐火滅而寒氣消蘆灰用而春風起魚鱗布葉爛五色而翻光鳯腦吐花燦百枝而引照悲夫年華將晩志事寥落公孫𢎞之甲第天子未知王仲宣之文章公卿不識對他鄉之風景憶故里之琴歌柏葉為樽聊泛新年之酒椒花入頌先開獻嵗之詞已上除夕嵗時部刻漏晉陸機刻漏賦挈金壺以南羅藏幽水而北戢擬洪殺於編鐘順卑髙而為級激懸泉以逺射跨飛途而遥集伏隂蟲以承波吞長流其如挹口納胸吐水無滯咽形㣲獨繭之緒逝若垂天之電籠八極於千分度晝夜於一箭積水不過一鍾導流不過一莛而用天者因其敏分地者頼其平宋鮑照觀漏賦觀騰波之吞冩視驚箭之登没墐户牖而知天掩雲霧而測曜龍首應時雞人合節大小之候共砌蓂以凋榮昏旦之期逐宫槐而舒卷二分二至無虧余遂之蹤大餘小餘允叶容成之度齊君望曉莫聼鐘聲京尹失時空奔馬足唐竇翬漏賦重金壺之器建銅史之司致用久而不易循環因而可推水滴瀝而潛響箭差池而靡錯俯通軒禁上應寥廓亘千門兮連萬户左彤階兮右丹閣亂㣲唱于晨雞雜幽聲于夜鶴清清泠泠日殷鳥星送春漏于重扃赫赫曈曈時方祝融傳夏漏於深宫的的綿綿明河爛然耿秋漏于凉天暗暗隂隂濃氛欝沉轉冬漏于寒林觀夫修短之意見乎造化之心信晷刻之道廣知挈壺之用深故能度量萬物均分四序既不忒于盈縮亦無差于寒暑符子璋漏賦疇人失業挈壺不舉詩刺東方之未明史書南風之乖序測辰屢錯于杓建揆景頗謬于寒暑其本則披甲子而求範得黄鍾而下生如因三以窮數隔八以循行課六厯之疎宻齊七曜之經營俾攝提之有紀寔孟陬之用成其器則方圓列階髙卑中度制隂蟲以吐輸設靈虯以承注銅史應其方金箭刻其數則于道如符契之合精于㣲無黍累之誤闕漏賦閏餘之數乖厯攝提之運無紀空跡馬遷之能竟絶邵平之美于是金徒抱箭銅史司刻尊疑作遵靈虯吐納之規揆抽繭髙卑之力信是模範可為法則體象隂陽代爲作式故鷄人合唱洪殺無差鶴盖成隂員流不息能收視返聼周流六虛䇿勤補拙寅亮三餘校擊刀之有則均藂木之不疎察銅衡兮氣混混純積水兮來徐徐顔舒刻漏賦罷衣裳之顛倒配皇極而詞變不假軒閣之鳯凰何用堯堦之蓂莢王冀洛都賦挈壺司刻漏樽㵼流仙叟秉尺隨水沉浮玉虬吐水分灌兩壺金龍轉注下激衡渠天道可觀神化無跡日運波澄氣分箭易五夜持宵三商定夕儀禮注日入三商爲昏尚書緯謂刻爲商云南齊陸倕新漏刻銘今之宫漏出自㑹稽漏水違方導流乖則六日無辨五夜不分于是俯察旁羅登臺升庫測以地四參以天一建武遺蠧咸和餘舛金筩方員之制飛流吐納之規變律改經一皆懲革以考辰正晷測表候隂不謬圭撮無乖黍累方壺外次員流内襲洪殺殊等髙下異級靈虬承注隂蟲吐噏倐忽徃來鬼神出入㣲若抽繭逝如激電耳不輟音眼無留盼銅史司刻金徒抱箭合昏暮卷蓂莢晨生尚辨天意猶測地情况我神造通幽洞靈配皇等極爲世作程周王褒刻漏銘二分同道鳥靈正其昏夕兩至相遇表圭測其短長雖則晦朔先後失于公羊之説次舍盈縮惑于丘明之𫝊至乎出卯入酉黄道青緣季孟相推啟閉從序挈壺掌分數之令太史陳立成之法軍將以之縁井壺郎以之趨奏百王垂訓千祀餘烈箭水無絶靈虬長注玉海陸佐公曰自天觀象昏旦之刻未分治厯明時盈縮之度無凖挈壺命氏逺哉義用揆景測辰徼宫戒井守以水火分兹日夜又曰衛宏載傳呼之節較而未詳霍融叙分至之差詳而不察嵗時部豐荒宋司馬光永興謝上表維此咸秦昔爲畿甸山川清美土地膏腴論其平時誠爲樂土在于今日適值凶年經夏亢陽苖青乾而不秀渉秋淫雨穗黒腐而無收廩食一空家乏盖藏之粟襁負相屬道有流離之人老弱懐溝壑之憂奸猾蓄萑蒲之志正宜安静不可動揺譬之烹魚勿煩擾則免于糜爛如彼種木任生植則自然繁滋謹當䇿勵疲駑雕磨朽鈍智力所及勤瘁無辭雖復失位危身終不病民負國真德秀江東賑濟無罪可待謝丞相啟頃當原隰驅馳之時備暏田野焦熬之實欲糴則人苦青蚨之寡欲濟則官無紅粟之儲抑立視其死與既有負求芻之託茍利專之可也又難逃矯制之刑與其失職以偷安寧若殞身而任責勉効便宜之舉亟􅂪問可之音顧小臣敢越于拘攣見盛世素行於寛大是乃彰朝廷之美何至干堂陛之嚴夲謂羣臣之善亦王之善齊人嘗有格言而衆職之功乃相之功栁子誠爲確論古儷府卷二
