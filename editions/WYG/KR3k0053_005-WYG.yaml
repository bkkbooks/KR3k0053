body:
  text: 古儷府卷五明王志慶編人部君臣唐潘炎君臣相遇樂賦繼天者君也戴天者臣也下之事上作股肱耳目上之任下敷心腹腎膓宋王安石除平章事監修國史謝表臣聞人君代天而理物人臣資父以事君然而君臣之大義有方非若父子之至恩無間須倡而後和則誠意每患於難通不入而後量則忠力或嫌於自獻惟成湯之聴伊尹與傅説之遇髙宗皆以䟽逺而相求何其親厚之獨至盖所趨非由於二道故所為若出於一身夫豈於越夷貉之異心是謂元首股肱之同體二臣既以此獲展事君之義兩君亦以此得成理物之功茍非其人孰與於此齊王融求自試啟春庚秋蟀集候相悲露木風榮臨年共悦夫惟動植且或有心况在生靈而能無感夫君道含𢎞臣術無隱翁歸乃居中自見充國曰莫若老臣竊景前修敢蹈輕節唐盧照隣歌公卿歌雲佐漢捧日匡堯獨孤及送餘杭薛郡守入朝序受宣室之釐忽思賈誼以謗書之篋先示樂羊李嶠攀龍臺碑賈文和之揣君酈食其之觀將翔而後集可謂明逺人部父子唐杜甫送許八拾遺歸江寧覲省詩詔許辭中禁慈顔赴北堂聖朝新孝理祖席倍恩光内帛擎偏重宮衣著更香淮隂清夜驛京口渡江航春隔雞人晝秋期燕子凉賜書誇父老壽酒樂城隍看畫曽飢渴追蹤恨淼茫虎頭金粟影神妙獨難忘劉長卿送張七判官還京覲省詩春蘭方可採此去葉初齊函谷鶯聲裏秦山馬首西庭闈新栢署門舘舊桃蹊春日長安道相隨入禁閨錢起送邊補闕東歸覲省詩東去有餘意風生賜錦衣鳳凰銜詔下才子採蘭歸斗酒百花裏人情一笑稀别離須計日想望在彤闈盧綸送尹樞令狐楚及第後歸覲詩佳人比香草君子即芳蘭寶器金罍重清音玉佩寒貢文齊受寵獻醴兩承歡鞍馬并汾地争迎陸與潘盧綸送渾錬歸覲却赴闕庭詩雲幕擁簮裾台庭餞伯魚綵衣人競㸔銀詔帝親書知子當元老為臣餞二疏執珪期已迫捧膳歩寜徐而我誠愚者夫君豈病諸探題多決勝饌玉每分餘榮比成功後恩同造化初甑塵方欲合籠翮忽將舒榆筴錢難比楊花雪不如明朝古隄路心斷玉人車盧綸送内弟韋仁宗歸信州覲省詩常嗟外族弟兄稀轉覺心孤是送歸醉掩壺觴人有淚愁穿魂夢月無輝烹魚緑岸烟浮草採橘青溪露濕衣聞説江樓長卷幔幾囬風起望胡威權徳輿送崔端公郎君入京覲省詩已見風姿美仍聞藝業勤清秋上國路白晳少年人帶月輕帆疾迎霜綵服新過庭若有問一為説漳濱戎昱送王端公之太原歸覲相公詩柱史今何適西行詠陟岡也知人惜别終美鴈成行春雨桃花静離樽竹葉香到時丞相閣應喜棣華芳周庾信傷心賦或有擁樹罹災藏衣遭難未設桑弧先空柘館人惟一丘亭遂千秋邊韶永恨孫楚長愁張壯武之心疾羊南城之淚流膝下龍摧掌中珠碎芝在室而先枯蘭生庭而早刈對寶盌而痛心撫𤣥經而流慟石華空服犀角虗篸風無少女草不宜男烏毛徒覆獸乳空含周宇文逌庾信集序青鸞降宿樹之祥白雉有依欄之感唐李華二孝讃序靈武二孝曰侯知道程俱羅生養以孝没奉以哀廬於塜次號泣無節埃垢積首草生髪間每大漠晨空連山夜寂人烟四絶虎豹與隣擁墳椎膺聲氣咽塞下入九泉上徹九天背爛心朽皮枯節攣草水先秋而凋落景氣不時而凝烟一作閉殊鳥異獸助之悲號萬物有極此哀無窮色慘莪蒿聲酸棘薪晉書孝友傳論大矣哉孝之為徳也分渾元而立體道貫三靈資品彚以順名功苞萬象用之于國動天地而降休徵行之于家感鬼神而昭景福若乃博施備物尊仁安義柔色承顔怡怡盡樂擊鮮就養亹亹忘劬集苞思蓺黍之勤循陔有採蘭之詠事親之道也屬屬如在哀哀罔極聚薪流慟銜索興嗟灑風樹以隤心頫寒泉而沫泣追逺之情也審徳筮仕正務移官居髙匪危在醜無争協修升以匡化懷履冰而砥節立身之行也是以閔曽翼翼遵六教而緝貞規蔡董烝烝𢎞七體而垂令迹亦有至誠上感明祇下賛郭巨致錫金之慶陽雍標蒔玉之祉烏馴丹羽巢叔和之室鹿呈白毳擾功文之廬唐王維右豹韜衛長史任君神道碑廬以長號淚少於血杖而後起骨餘於形彈琴不成從先王之禮捧筐便慟有終身之哀段文昌平淮西碑欒書作帥鍼為戎右充國討虜印統支軍是能從帥之命成父之志昔趙孟慕成季之勲復能霸晉亞夫紹絳侯之武亦克擒吳周庾信大將軍趙公墓銘泉驚孝水竹動寒林又柱國大將軍紇干𢎞神道碑對其苫寝則梓樹寒生聞其悲泣則巢禽夜下又大將軍聞喜公栁遐墓誌成都孝子自赴江流桂陽先賢身彰野火並存靈應咸可傷嗟人部夫婦閒情附漢蔡邕協初賦其在近也若神龍采鱗翼將舉其既逺也若披雲縁漢見織女立若碧山屹其堅動若翡翠奮其羽衆色遼照視之無主面若明月輝似朝日色若蓮葩肌如凝蜜宋謝靈運江妃賦小腰微骨朱衣皓齒矊視騰來靡容膩理出月隱山落日映嶼收霞歛色廻飇拂渚每馳情於晨暮矧良遇之莫叙投明珠以申贈覬色授而魂與嗟佳人之眇邁眺霄際而皓語懼展愛之未期抑傾念而蹔佇天台二娥宮亭雙媛青袿神接紫衣形見或飄翰凌煙或潜泳浮海萬里俄頃寸隂未改事雖假于雲物心常得於無待梁江淹麗色賦夫絶世獨立者信東鄰之佳人既翠眉而瑶質亦盼瞳而赬脣鍱金花及珠履颯綺袂與錦紳色練練而欲奪光炎炎而若神非氣象之可譬焉影響而能陳故仙藻靈葩氷華玉儀其始見也若紅蓮鏡池其少進也如綵雲出崖五光徘徊十色陸離寶過珊瑚同樹價直瓊草共枝于是雕臺繡户當衢横術椒庭承月碧幌延日架虬柱之嚴麗亘虹梁之峻密錦幔垂而香寂桂煙起而清謐女乃曜邯鄲之躧歩媚北里之鳴瑟若夫紅華舒春黄鳥飛時紺蕙初軟赬蘭始滋不掔蘅帶無倚桂旗摘芳拾蕋涵詠吐辭笑月出于陳歌感蔓草于衛詩氣炎日永離明火中槿榮任露蓮花勝風後欄丹奈前軒碧桐笙歌畹右琴舞池東至乃西陸始秋白道月弦金波照户玉露曖天氣以濕兮曉未半星水流兮夜何央憶雜佩兮且一欷念錦衾兮以九傷於是帳必藍田之寳席必蒲萄之文館圖明月室畫浮雲言必入媚動必應規有光有豔如合如離氣柔色靡神凝骨竒經秦歴趙既無其雙尋楚訪蔡不覿其容非天下之至麗孰能與於此哉沈約麗人賦有客弱冠未仕締交戚里馳驚王室遨遊許史歸而稱曰狹斜才女銅街麗人亭亭似月嬿婉如春凝情待價思尚衣巾芳踰散麝色茂開蓮陸離羽佩雜錯花鈿嚮羅幃而不進隱明燈而未前歩中檐而一息順長廊而逈歸池翻荷而納影風動竹而吹衣薄暮延佇宵分乃至出闇入光含羞隱媚垂羅曳錦鳴瑶動翠來脱薄粧去留餘膩霑膚委露理鬢清渠落花入領微風動裾唐駱賔王蕩子從軍賦全録胡兵十萬起妖氛漢騎三千掃代一作陣雲隠隠地中鳴戰鼔迢迢天上下一作出將軍邊沙逺雜風塵氣塞草長垂霜露文蕩子苦辛十年行逥首關山萬里情逺天横劍氣邊地聚笳聲鐵騎朝恒警銅焦夜不鳴抗左賢而列陣屯右校以䟽營滄波積凍連蒲海白雪凝寒逼栁城若乃地分𤣥徼路指青波邊城暖氣由來少關塞寒雲本自多嚴風凛凛將軍樹苦霧蒼蒼太史河既㧞距而從軍亦揚麾而挑戰征斾隣沙漠戎衣犯霜霰樓船一舉争沸騰烽火四連相隱見戈文耿耿懸落星馬足駸駸擁飛電終取雋而先鳴豈論功而後殿征夫行樂踐榆溪倡婦銜怨守空閨蘼蕪舊曲終難贈芍藥新詩豈易題池前怯對鴛鴦伴庭際羞看桃李蹊花有情而獨笑鳥無事而恒啼見空陌之草積知闇牖之塵栖蕩子别來年月久賤妾空閨更難守鳳凰樓上罷吹簫鸚鵡杯中寜勸酒聞道書來一鴈飛此時緘怨下鳴機裁鴛帖夜被薫麝染春衣屏風宛轉蓮花帳窗月玲瓏翡翠惟箇日新粧始復罷祇應含笑待君歸呂向美人賦燕趙鄭衛楚越巴漢之邦士農工商皂𨽻輿臺之族不鄙褊陋不隔賤卑工技者密聞淑邈者遽知上心由是震動中使載以交馳周若雲布迅如飇發以日繫時以時繫月徳雋相次為樂不歇闐紫微環帝座蕖華灼爍栁容婀娜輕羅隨風長縠舒䝉霧隔膚紅柔姿靡質妖艷逞逸絶衆挺出嬛然容冶霍若明媚曼睩騰光以横波修蛾濯色以揔翠齒編貝鬢含雲顔綽約以氷雪氣芬郁而蘭薫腰珮激而成響首飾曜而騰文或纎麗婉以似羸或穠盛態而多肌有沈靜見節有語笑呈姿思若老成體類嬰兒妙舞謂何尚以輕善歌取何矜以清齊列㨗獵按次屏營間直往以曵緒歘轉入而旋縈低視候節紆體遺聲遏行雲結遺風衆工相錯迭美不同徐寅勾踐進西施賦波淺丹臉鴉深緑鬟楊栁羞弱芙蓉遜妍乃命寶馬騰龍香車輾風迎織女于銀漢聘姮娥于月宮炫燿雲外喧闐洞中粧成而瑞玉凝彩服麗而朝霞剪紅昨日猶賤今晨不同陳張正見怨歌行新豐妖冶地遊俠競嬌奢池臺間羅綺桃李雜烟霞蓋影分連騎衣香合並車艷粉驚飛蝶紅粧映落花舞衫飄冶袖歌扇掩團紗玉帳珠簾捲金樓鏡月斜還疑簫史鳳不及季倫家唐宋之問江南行妾住越城南離居不自堪採花驚曙鳥摘葉餧春蠺懶結茱茰帶愁安玳瑁篸待君銷痩盡日暮緑江潭李叔卿江南行湖上女江南花無雙越女春浣紗風似箭月如弦少年吳兒曉進船郗家子弟謝家郎烏巾白袷紫香囊菱歌思欲絶楚舞斷人膓歌舞未終涕雙隕舊宮坡陁纔嶙隱西山暮雨過江來北渚春雲沿海盡渡日水流緩妾歸宵剰遲含情為君再理曲月華照出澄江時芮挺章江南行春江可憐事最在美人家鸚鵡能言鳥芙蓉巧笑花馬銜金作埒水抱玉為砂薄晩青絲騎長鞭赴狹斜劉眘虚江南行美人何蕩漾湖上風月長玉手欲有贈徘徊雙明璫唱歌隨渌水怨色起青陽日暮還家望烟雲横洞房陳標江南行水光春色滿江天蘋葉風吹荷葉錢香蟻翠旗臨岸市艷娥紅袖渡江船曉驚白鷺聯翩雪浪蹙青茭瀲灧煙不怕汀洲芳草暮待將春興折湖蓮梁張率長相思詩長相思久别離所思何在若天垂鬱陶相望不得知玉階月夕映羅帷風夜吹相思不能寢坐望天河移又陸瓊詩長相思久離别一罷鴛鴦機聲絶鴻始去栁堪結室冷鏡凝氷庭幽花似雪容貌春春減書字朝朝滅又王磋詩長相思久離别兩同心憶不相徹悲風凄愁雲結栁葉眉上銷菱花鏡中滅鴈封歸飛斷鯉素還流絶唐權徳輿詩少小别潘郎嬌羞倚畫堂有時裁尺素無事約殘黄鵲語臨粧鏡花飛落繡床相思不解説明月照空房梁王筠有所思詩丹墀生細草紫殿網輕隂曖曖巫山逺悠悠湘水深徒歌轆轤劔空貽瑇瑁簮望君終不見屑淚且㣲吟又庾肩吾詩佳期杳不歸春物生芳菲拂匣㸔離扇開箱見别衣井桐生未合宮槐卷復稀不及銜泥燕從來相逐飛又王僧孺詩夜風吹熠燿朝光照辟邪幾銷蘼蕪葉空落蒲萄花不堪長織素誰能獨浣沙光隂復何極望促反成賖知君自蕩子奈妾亦倡家梁簡文帝櫂歌妾住在湘川菱歌本自便風生解刺浪水深能捉船葉亂由牽荇絲飄為折蓮濺粧疑薄汗霑衣似故湔浣沙流暫濁汰錦色還鮮參伺趙飛燕借問李延年從來入絃管詎在櫂歌前隋盧思道詩秋江見底清越女復傾城方舟共采摘最得可憐名落花流寶珥微吹動香纓帶隨連理濕棹舉木蘭輕避人傳細語因波送逺情誰能結錦䌫薄暮隠長汀唐駱賓王詩冩月塗黄罷凌波拾翠通鏡花揺芰日衣麝入荷風葉密舟難蕩蓮踈浦易空鳳媒羞自託鴛翼恨難窮愁帳燈光翠倡樓粉色紅相思無别曲併在櫂歌中温庭筠和友人悼亡詩玉貌潘郎淚滿衣畫羅輕鬢兩霏微紅蘭委露愁難盡白馬朝天望不歸寶鏡塵昏鸞影在細筝絃斷鴈行稀春來多少傷心事碧草侵階粉蝶飛杜審言悼亡詩二八泉扉掩帷屏寵愛空淚痕銷夜燭愁思亂春風巧笑人疑在新粧曲未終尚憐脂粉氣留著舞衣中隋盧思道後園宴詩嘗聞崑閬有神仙雲冠羽佩得長年秋夕風動三珠樹春朝露濕九芝田不如鄴城佳麗所玉樓銀閣與天連太液囬波千丈映上林花樹百枝燃流風續洛渚行雲在南楚可憐白水神可念青樓女便妍不羞澁遥艷工言語池苑正芳菲得戯不知歸媚眼臨歌扇嬌香出舞衣纎腰如欲斷側髻似能飛南樓日已暮長簷鳥應度竹殿遥聞鳳管聲虹橋别有羊車路擕手傍花叢徐歩入房櫳欲眠衣先解半醉臉逾紅日日相㸔轉難厭千嬌萬熊不知窮欲知妾心無劇已明月流光滿帳中闕七召妍姿艷逸淑性閒華效施顰于宋里經墮馬于梁家折纎腰以微歩揎皓腕乎輕紗臨池正領拂鏡看花觀堵墻以颯沓傾城國以諠譁墨欲歸而抽軫惠將返而逥車至乃鄭衛繁聲抑揚絶調足使風雲變動性靈感召擊哀嚮則春臺之人愴焉而雪涕起歡情則崩城之婦嫣然而微笑嶰谷調鳳之竹龍門獨鵠之柯緑珠絳樹宋獵韓娥青春婉娩上客經過開洞房以命賞召才人而合宴舉輕幔以徐來隔珠簾而可見牀披珠象簟展羅薦聴促柱之方進聞廣聲之始轉歩想象以頓足腕蹁躚而拂面托斜視於遺簮寄含情而舉扇俄而夕烏東返落日西懸綺霞映水蛾月昇天解鴛鴦之繡被拂距蛩之長氊燭中帷而動爛香出帳而微烟願横施以自眤脱斜領于君前後漢張衡七辨西施之徒姿容修嫮弱顔囬植妍夸閒暇形似削成腰如束素淑性窈窕秀色美艷鬒髪𤣥髻光可以鑒靨輔巧笑清眸流盼皓齒殊唇的皪粲練于是紅華曼理遺芳酷烈待夕先至同兹宴䙝假明蘭燈指圖觀列蟬綿宜愧夭紹紆折晉陸機七徵若夫妖嬪艷女蒐羣擢俊穆藻儀于令表茂當年之柔曼罄視趨之綽約體每變而増閒秀紅蕤其愉愉若餘穎之可餐若夫靈晷潛祖顔退羽觴升清琴厲因清明以宣誠流微睇而授愛纎手揮而鳴珮鏗華衿被則芳塵萃梁簡文帝七勵于時斜光西委薄霧舒紅隨珠照影羅衣從風觀者方堤覩者盈淇令二鷰之綴翼使八鶴之増悲明君為之歛泣西施為之解眉唐李商隠上河東公啟某悼傷已來光隂未幾梧桐半死才有述哀靈光猶存且兼多病眷言息𦙍不暇提㩦或小于叔夜之男或幼于伯喈之女檢庾信荀娘之啓常有酸辛詠陶潜通子之詩毎嗟漂泊所賴因依徳宇馳驟府庭方思効命旌旄不敢載懷鄉土錦茵象榻石舘金臺入則陪奉光塵出則揣摩鉛鈍兼之早嵗志在𤣥門及到此都更敦夙契自安衰薄微得端倪至于南國妖姬叢臺妙妓雖有渉于篇什實不接于風流况張懿仙本自無雙曽來獨立既從上將又託英僚汲縣勒銘方依崔瑗漢庭曳履猶憶鄭崇寜復河裏飛星雲間墜月窺西家之宋玉恨東舎之王昌誠出恩私非所宜稱伏惟克從至願賜寢前言使國人盡保展禽酒肆不疑阮籍則恩眷之理何以加焉陳伏知道為王寛與婦義安主書昔魚嶺逢車芝田息駕雖見妖媱終成揮忽遂使家勝陽臺為歡非夢人慙簫史相偶成仙輕扇初開欣看笑靨長眉始畫愁對離粧猶聞徙佩顧長廊之未盡尚分行幰冀逈陌之難逥廣攝金屏莫令愁擁恒開錦幔速望人歸鏡臺新去應餘落彩薫爐未徙定有餘烟泪滴芳衾錦花長濕愁隨玉軫琴鶴恒驚已覺錦水丹鱗素書稀逺玉山青鳥仙使難通綵筆試操香牋遂滿行雲可托夢想還勞九重千日詎想倡家單枕一宵便如蕩子當令照影雙來一鸞羞鏡勿使窺窗獨坐嫦娥笑人梁何遜為衡山侯與婦書昔人邀逰洛汭㑹遇陽臺神仙髣髴有如今别雖帳前微笑渉想猶存而握裏餘香從風且歇掩屏為疾引領成勞鏡想分鸞琴悲别鶴心如膏火獨夜自煎思等流波終朝不息始知萋萋萱草忘憂之言不實團團輕扇合歡之用為虚路邇人遐音塵寂絶一日三秋不足為喻聊陳往翰寧冩欵懷遲枉瓊瑶慰其杼軸陳徐陵玉臺新詠序凌雲槩日由余之所未窺千門萬户張衡之所曾賦周王璧臺之上漢帝金屋之中玉樹以珊瑚作枝珠簾以玳瑁為匣其中有麗人焉其人也五陵豪族克選掖庭四姓良家馳名永巷亦有潁川新市河間觀津本號嬌娥曽名巧笑楚王宮内無不推其細腰魏國佳人俱言訝其纎手閲詩敦禮非直東隣之自媒婉約風流無異西施之被教弟兄協律生小學歌少長河陽由來能舞琵琶新曲無待石崇箜篌雜引非因曹植𫝊鼔瑟于楊家得吹簫于秦女至若寵聞長樂陳后知而不平畫出天仙閼氏覽而遥妬且如東隣巧笑來侍寢于更衣西子微顰將横陳於甲帳陪游馺娑騁纎腰于結風長樂鴛鴦奏新聲于度曲粧鳴蟬之薄鬢照墮馬之垂鬟反揷金鈿横抽寶樹南都石黛最發雙蛾北地臙脂偏開兩靨亦有嶺上仙童分丸魏帝腰中寶鳳授厯軒轅金星與婺女争華麝月共嫦娥競爽驚鸞冶袖時飄韓掾之香飛燕長裾宜結陳王之佩雖非圖畫入甘泉而不分言異神仙戲陽臺而無别真可謂傾國傾城無對無雙者也加以天情開朗逸思雕華妙解文章尤工詩賦琉璃硯匣終日隨身翡翠筆床無時離手清文滿篋非惟芍藥之花新製連篇寧止蒲萄之樹九日登髙時有縁情之作萬年公主非無累徳之詞其佳麗也如彼其才情也如此既而椒房宛轉柘館隂岑綘鶴宸嚴銅蠡晝靜三星未夕不事懷衾五日猶賒誰能理曲優游少託寂寞多閒厭長樂之疎鐘勞中宮之緩箭輕身無力怯南陽之搗衣生長深宮笑扶風之織錦雖投壺玉女為歡盡于百驍争博齊姬心賞窮于六著無怡神于暇景惟屬意于新詩庶得代彼萱蘇蠲兹愁疾但往世名篇當今巧製分諸麟閣散在鴻都不藉篇章無由披覽于是燃脂暝冩弄墨晨書撰録艷歌凡為十巻曽無參于雅頌亦靡濫於風騷涇渭之間若斯而已于是麗以金箱裝之寶軸三臺妙迹龍伸蠖屈之書五色花牋河北膠東之紙髙樓紅粉仍定魯魚之文辟惡生香聊防羽陵之蠧靈飛六甲髙擅玉函鴻烈仙方長推丹枕至如青牛帳裏餘曲既終朱鳥窗前新粧已竟方當開兹縹帙散此縚繩永對玩于書帷長循環于纎手豈如鄧學春秋儒者之功難習竇傳黄老金丹之術不成固勝西蜀豪家託情窮于魯殿東臺甲館流詠止于洞簫孌彼諸姬聊同棄日猗與彤管麗矣香奩梁劉孝儀為人作連珠洛妃髙髻不資于草澤𤣥妻長髪無藉于金鈿故雲名由于自美蟬稱得于天然是以梁妻獨其妖艷衞姬專其可憐津亭掩馥祇結秦婦之恨爵臺餘妬追生魏妾之悲唐楊烱原州百泉縣令李君神道碑霜凄月瑩菊艷苕華淑問秀于閨房柔風洽于詩禮琴前鏡裏孤鸞别鶴之哀竹死城崩杞婦霜娥之泣人部兄弟唐岑參送李太保兼御史大夫充渭北節度使詩詔出未央宮登壇近總戎上公周太保副相漢司空弓抱關西月旗翻渭北風弟兄皆許國天地荷成功白居易同夢得暮春寄賀東西川二楊尚書詩龍節對持真可愛鴈行相接更堪誇兩川風景同三月千里江山屬一家魯衛定知聯氣色潘楊亦覺有光華應憐洛下分司伴冷宴閒遊老看花章孝標贈劉侍郎子弟三人一時及第詩文動星辰衣彩霞問誰兄弟是劉家鴈行雲接參差翼庭樹風開次第花天假聲名喧日月國憑騷雅變浮華曽看晉漢儒家傳龍虎雖多不足誇劉商送李元規昆季赴舉詩見誦甘泉賦心期折桂歸鳳雛皆五色鴻漸又雙飛别思看衰栁秋風動客衣明朝問禮處蹔覺鴈行稀盧綸宴趙氏昆季書院詩詩禮挹餘波相歡在琢磨琴樽方㑹集珠玉忽駢羅謝族風流盛于門福慶多花攅騏驥櫪錦絢鳳凰窠詠雪因饒妹書經欲換鵝仍聞廣練被更有逺儒過晉書孝友傳論夫天倫之重共氣分形心暌則葉顇荆枝性合則華承棣萼乃有推肥代瘦徇急難之情讓果同衾盡歡愉之致緬窺緗素載流塵躅者歟晉氏始自中朝逮于江左雖百六之災遄及而君子之道未消孝悌名流猶為繼踵王偉元之行已許季義之立節夏方盛彥體至性以馳芬庾衮顔含篤友于而宣範自餘羣士咸標懿徳採其遺絢足厲澆風唐楊炯恒州刺史建昌公王公神道碑荆枝擢秀棣萼生光何止平輿之二龍是為賈家之三虎人部師唐白居易和楊郎中賀楊僕射致仕後楊侍郎門生合宴席上詩業重關西繼大名恩深闕下遂髙情祥鱣降伴趨庭鯉賀燕飛和出谷鶯范蠡舟中無子弟疏家席上欠門生可憐玉樹連桃李從古無如此㑹榮漢蔡邕郭有道碑序先生誕膺天衷聰睿明哲孝友温恭仁篤慈惠貞固足以幹事隠括足以矯時遂考覽六經探綜圖緯周流華夏隨集帝學收文武之將墜拯微言之未絶于時纓緌之徒紳佩之士望形表而影附聆嘉聲而響和者猶百川之歸巨海鱗介之宗龜龍也又文範先生陳仲弓銘序夫其仁愛温柔足以孕育羣生廣大寛容足以包覆無方剛毅强固足以威暴矯邪正身體化足以陶冶士心先生有此四徳故言斯可法行斯可樂動斯可象靜斯可傚是以邦之子弟遐方後生莫不同情瞻仰由其模範從其趨嚮戾很思和争訟化讓雖嚴君猛政廹以刑戮未若先生潛道之速人部友唐權徳輿奉酬張鑑閣老雪後過中書見贈輒加兩韻通簡南省僚舊詩寓直久叨榮新恩倍若驚風清五夜永節換一陽生潘鬢年空長齊竽藝本輕常時望連茹今日劇懸旌枉歩歡方接含毫思又縈煩君白雲句嵗晏若為情梁朱瑒與徐陵請王琳首書瑒早簉末僚預參下席荷公一作降薛君之吐握感君一作荷魏公之知遇是用沾一本作霑巾拭袂痛可識之顔廽膓疾首切猶生之面伏惟聖恩博厚明詔爰發赦王經之哭許田横之塟瑒雖芻賤竊亦有心琳往莅壽陽頗存遺愛曽遊江左非無舊徳比肩東閣之吏繼踵西園之賔願歸元彼境還修窀穸庶孤墳既築或飛銜土之燕豐碑式樹時留墮淚之民近故舊王綰等已有論牒仰蒙制議不遂所陳昔廉公告逝即肥川而建塋域孫叔云亡仍芍陂而植楸檟由此言之抑有前例不使壽春城下惟傳報葛之人滄洲島上獨有悲田之士唐張九齡上姚令公書夫見勢則附俗人之所能也與不妄受志士之所難也君侯察其茍附及不輕受就而厚之因而用之則禽息之首為知己而必碎豫讓之身感國士而能漆至于合如市道亷公之門客盈虚勢比雀羅廷尉之交情貴賤初則許之以死殉體面俱柔終乃背之而飽飛身名已遂小人恒態不可不察梁劉峻廣絶交論若其寵鈞董石權壓梁竇雕刻百工鑪錘萬物吐潄興雲雨呼噏下霜露九域聳其風塵四海疊其燻灼靡不望影星奔藉響川騖鷄人始唱鶴盖成隂髙門旦開流水接軫皆願摩頂至踵隳膽抽膓約同要離焚妻子誓殉荆卿湛七族是曰勢交其流一也富埒陶白貲巨程羅山擅銅陵家藏金穴出平原而聯騎居里閈而鳴鐘則有窮巷之賔繩樞之子冀宵燭之末光邀潤屋之微澤魚貫鳬躍䬃沓鱗萃分鴈鶩之稻梁霑玉斚之餘瀝銜恩遇進欵誠援青松以示心指白水而旌信是曰賄交其流二也陸大夫讌喜西都郭有道人倫東國公卿貴其藉甚搢紳羡其登仙加以顩頥䠞頞涕唾流沫騁黄馬之劇談縱碧雞之雄辨叙温燠則寒谷成暄論嚴苦則春叢零葉飛沈出其顧指榮辱定其一言于是有弱冠王孫綺紈公子道不挂于通人聲未遒於雲閣攀其鱗翼丐其餘論附駔驥之旄端軼歸鴻于碣石是曰談交其流三也陽舒隂慘生民大情憂合歡離品物恒性故魚以泉涸而喣沫鳥因將死而鳴哀同病相憐綴河上之悲曲恐懼寘懷昭谷風之盛典斯則斷金由于湫隘刎頸起于苫蓋是以伍員濯溉于宰嚭張王撫翼于陳相是曰窮交其流四也馳騖之倫澆薄之俗無不操權衡秉纎纊衡所以揣其輕重纊所以屬其鼻息若衡不能舉纊不能飛雖顔冉龍翰鳳雛曽史蘭薫雪白舒向金玉淵海卿雲黼黻河漢視若遊塵遇同土梗莫肯費其半菽罕有落其一毛若衡重錙銖纊微彯撇雖共工之蒐慝驩兠之掩義南荆之䟦扈東陵之巨猾皆為匍匐逶迤折枝䑛痔金膏翠羽將其意脂韋便辟導其誠故輪蓋所遊必非夷惠之室苞苴所入實行張霍之家謀而後動毫芒寡忒是曰量交其流五也周庾信擬連珠蓋聞廉將軍之客館翟廷尉之髙門盈虗倐忽貴賤何論是以平生故人灌夫不去門下賔客任安獨存蓋聞居蘭處庖在其所習白羽素絲隨其所染是以金性雖質處劒即凶水徳雖平經風即險宋周祇執友箴四輔揚輝伐木幽林撫喬鸞飛爰逮姬衰俗遂凋成交縁利昵朋因偽情谷風興哀繁霜夏零道之未盡𢎞焉由人自室有迴過門則親微言綿邈清談輟響金雖能照塵積翳朗西河感離口悟投杖慊慊文侯友賢好學英英燕昭禮郭致樂推誠嵗寒功標松竹落落僑札遼遼莊惠解帶一愚道映萬世人亦有言貴則交易利重太山道輕鴻毛久而致敬見之晏平霜雪既至勁栢冬青唐楊炯楊去盈墓誌銘莊公獨歎聞潁叔之純深有道相推見茅容之盡禮則閨門雍穆以孝聞也輔仁㑹友合志同方晏平仲之善交鮑叔牙之知我張琪死日妻子唯托于朱暉劉惔生平風月每思于𤣥度則朋友之徳若蘭芬也人部宗唐温庭筠上首座相公啟舉不違宗得于王濟近因其族聞自謝𤣥雖通人與善之規亦前哲睦親之道儻或假一言之甄發隨百蟄之昭蘇庶令葛藟之隂均其煦育椒聊之實遂彼扶踈成鍾儀操樂之規寛顧悌拜書之戀李商隱為鄭從事妻李氏祭從父文馬援於兒姪之間一情無異王華在弟兄之列數從猶親人部戚唐蕭穎士登臨河城賦羊曇是日獨吟零落之篇周翼終身寧亡吐哺之愛韓伯懷恩羊曇念昔追北渚之曩餞歎西州之忽覿曽一顧而不忘况仁深與密戚也張九齡為王司馬祭妻父文謬入郄公之選當荷戴侯之遇人部品藻周王褒俠客行京洛出名謳豪俠競交遊河南期四姓關西謁五侯鬭雞横大道走馬出長秋桑隂徙將夕槐路轉淹留庾信詩俠客重連鑣金鞍被桂條細塵障路起驚花亂眼飄酒醺人半醉汗濕馬全驕歸鞍畏日晚争路上河橋陳良詩洛陽春色麗遊俠騁輕肥水逐車輪轉塵隨馬足飛雲影遥臨蓋花氣近薫衣東郊鬬鷄罷南坡射雉歸日暮河橋上揚鞭惜晩暉梁元帝劉生詩任俠有劉生然諾重西京扶風好驚坐長安恒借名菊花連夜飲竹葉解朝酲結交李都尉遨遊佳麗城陳張正見詩劉生絶名價豪俠恣遊陪金門四姓聚簫鼓五香來塵飛瑪瑙勒酒映車渠盃别有追遊夜愁牕向月開唐楊炯詩卿家本六郡年長入三秦白璧酬知己黄金謝主人劍鋒生赤電馬足起紅塵日暮歌鐘發喧喧動四隣周庾信和劉儀同詩止戈興禮樂修文盛典謨璧開金石篆河浮雲霧圖芸香上延閤碑石向鴻都誦書徵博士明經拜大夫璧池寒水落學樹舊槐枯髙談變白馬雄辨塞飛狐月落將軍樹風驚御史烏子雲猶汗簡温舒正削蒲連雲雖有閣終歎想江湖唐楊炯和劉長史答十九兄詩帝堯平百姓髙祖宅三秦子弟分河岳衣冠動搢紳盛名恒不隕歴代幾相因街巷塗山曲門閭洛水濱五龍金作友一子玉為人寶劒豐城氣明珠魏國珍風飇自落落文質且彬彬共許刁𤣥亮同推周伯仁石城俯天闕鍾阜對江津驥足方遐駛狼心獨未馴鼓鼙鳴九域風火集重闉城勢餘三版兵威乏四隣居然混玉石直置保松筠耿介酬天子危言數賊臣鍾儀琴未奏蘇武節猶新受禄寧辭死揚名不顧身精誠動天地忠義感明神怪鳥來垂翼修虵竟暴鱗來朝拜休命述職下梁岷善政馳金馬嘉聲繞玉輪三荆忽有贈四海更相親宮徵諧鳴石光輝掩燭銀山川遥滿目零淚坐霑巾友愛光天下恩波浹後塵懦夫仰髙節下俚繼陽春盧象贈張員外詩公家世業昌才子冠裴王出自平津邸還為吏部郎神仙餘氣色列宿動輝光夜直南宮靜朝趨北禁長時人窺水鏡明主賜衣裳翰苑飛鸚鵡天池待鳳凰承欣疇日顧未記後時傷去去圖南逺微才幸不忘方干贈趙常詩貴達合逢明聖日風流又及少年時才因出衆人皆嫉勢欲摩霄自不知迢遞早年聞苦節從容此日見清規却教鸚鵡呼桃葉便遣嬋娟唱竹枝閒話篇章倚燭久醉迷歌舞出花遲雲鴻别有回翔便應笑啁噍燕雀卑唐上官儀詔册周王為并州都督文識表槐扉之象詞掩蘭臺之駕西園孤月秀心鏡而齊明小山叢桂偃情田而並烈温恭夙劭業尚日新棣萼交芬珪璋具美簡文與湘東王令風韻遒上神峯標映千里絶跡百尺無枝樂明龜賜陳敬暄太尉鐵券文論清政而水鏡無光吐赤誠而朝霞失色梁武帝請徵補謝朏何𦙍表家膺鼎食而甘兹橡艾世襲青紫而安此懸鶉陸徽刺史廣州薦從事朱萬嗣表年暨知命亷尚愈髙氷心與貪流争激霜情與晚節彌茂歴宰金山家無寶鏤之飾連組珠海室靡璫珥之珍确然守志不求聞達實足以澄革汚吏洗鏡貪氓梁元帝法寶聯璧序似懸鐘之應響猶衢罇之待酌周宇文逌庾信集序徳茂褰帷才膺刺舉吏不敢賄人不忍欺上洛兒童如迎郭汲商山故老似值劉𢎞晉書郭璞𫝊論景純篤志綈緗洽聞强記在異書而畢綜瞻往滯而咸釋情源秀逸思業高竒襲文雅于西朝振辭鋒于南夏為中興才學之宗矣夫語怪徵神伎成則賤前修貽訓鄙乎兹道景純之探䇿定數考往知來邁京管于前圖軼梓竈于遐篆而官微于世禮薄于時區區然寄客傲以申懷斯亦伎成之累也王湛諸人𫝊論勝氣籠霄飛譚巻霧後魏温子昇寒陵山寺碑序渤海王命世作宰唯幾成務摽格千仭崖岸萬里運鼎阿于襟抱納山岳于胸懷擁𤣥雲以上騰負青天而髙引又印山寺碑序既而蒼龍入隱白虎出見命世有期匡時作宰拯沈溺以援手渉波瀾而濡足懸皎日于胸懷起大風于襟袖動之以仁義行之以忠貞附之者影從應之者響起唐李嶠宣州大雲寺碑或文房學府吐鳳而懷蛟或劔室珠泉衝星而襲月水火錯居而致用青一作朱藍糅色而成彩羣務允緝喧北汝之謳謡庶事無留閴南陽之府寺唐徳宗段秀實紀功碑利刃在手投節皆虚貞松有心老而彌勁周庾信上柱國齊王憲神道碑王武子以上將開府未滿立年荀中郎為十州都督才踰弱冠又大將軍豳國公墓銘為子則名髙五都為臣則光照千里華蓋中天之峯未階其峻虞淵浴日之水不盡其源唐楊炯楊去溢墓誌銘至如白雪逥光清風度曲崔亭伯真龍之氣揚子雲吐鳳之才莫不玉振金聲筆有餘力逺心天授髙興生知盡江海之良圖得烟霞之祕筭又從甥梁錡墓誌銘歴諸侯而説劒直之無前引司馬而操弓觀者如堵已上品藻總梁任昉王文憲集序年始志學家門禮訓皆折衷於公孝友之性豈伊喬梓夷雅之體無待韋弦汝郁之幼挺淳至黄琬之早標聰察曾何足尚周宇文逌庾信集序雖桓驎十四之嵗答宿客之詩魯連十二之年杜離堅之辨匪或斯尚同日語哉楊烱王勃集序時師百年之學旬日兼之昔人千載之機立談可見唐魏徵故邢國公李密墓誌銘體質貞明機神警悟五行一覽半面十年已上夙慧郭適人不易知賦復覽前志清通不易或失子羽之容或失宰我之議自非識周郎之顧曲辨齊竽之濫吹安能取士于飯牛之時㧞才于卧龍之器聞撤俎而興歎指負甑而留規管仲霸齊終慟哭于鮑叔國僑相鄭始登舉于子皮已上知人齊謝朓為東海太守教昔長孫東組降龍丘之節文舉北輜髙通徳之稱所以激貪立懦式揚風範唐駱賔王上司列太常伯啟分庭讓士虚右禮賢片善經心揖仲宣于蔡席一言合道接然明于鄭階駱賓王上李少常伯啟片善必甄揖虞翻于東箭一言可記許顧榮以南金駱賓王上兗州刺史啟求小善于毫芥顧正禮于二龍振幽滯于泥沙許公明于一驥李商隱為任侍御史上崔相國啟孫閣時開邴茵多恕又為舉人上翰林蕭侍郎啟昔管仲經邦賔客有二周公待士吐握皆三邴丞相之車茵寧彈醉客平津侯之賔館不礙布衣並脂粉簡編冠纓圖史後之披卷皆若升堂又為栁珪謝京兆公啟玳簮珠履緑水紅蓮成藉藉于淮山致憧憧于燕路呂温湖南都團練副使㕔壁記羣材響附各以類至文雅之器集作器用嵗餘大備錯金碧于晴壑綷孔翠于春林遐邇翕然稱為盛府中行感㑹知己竭其誠能黄鍾音韻調于嶰谷之竹太阿鋒鋩拭以華山之土其吟鸞鳳斷犀兕不足怪也員半千蜀州青城縣令達奚君神道碑採芳草于蘭澤省靈苗于松澗楊烱唐恒州刺史建昌公王公神道碑吐食下士倒屣迎賔無笑客之美人有拜賔之童𨽻已上好士周庾信大將軍司馬裔碑渭南千畆之竹更懼盈滿池陽二頃之田常思止足身殁之日家無餘財素車白馬狹室﨑嶇黄膓𤣥甲堦庭仄陋有詔冬官為營寢室朱邑祭酹無所漢后是以賜金陳表妻子露立吳王為之開舘又柱國大將軍拓㧞儉神道碑㧞園葵而去織婦無三惑而絶四知一室之中未免虚白日膳之資三杯而已居常服翫或以布被松牀盤案之間不過桑杯石鼎唐嚴識𤣥潭州都督楊志本碑侁侁五嶠皇皇百越路窮南服境淑西屠握水衡之錢權御府之産歴剖蚌泣鮫之巨漲窺結緑珊瑚之怪穴自異時魁傑之士以事而臨其地罕有聲背于黷節全其貞將軍北旋猶見猜于薏苡大夫南使亦受遺于金裝而公散國財市蠻寶混之不濁湼而不緇易生人之所難凛然有伯夷之風矣張説唐故凉州長史元君石柱銘化澄巴濮無侵橘柚之園教溢河湼不飲蒲萄之酒已上廉潔蘇晉賢良方正䇿夫選物化人著誠去偽豈惟君上之道實亦官聯之職故文翁好儒蜀學比于齊魯毛玠崇質魏士素其裘裳是知易俗移風使天下廻心而嚮道者非俗吏之所能為也蘇頲御史大夫贈右丞相程行謀神道碑含照灼而更幽蓄堅剛而轉鋭常謂處山者猛不採藜藿成蹊者芳不言桃李悉心果孚履尾奚懼獖豕既制拉二竪于威弧之張神羊既立挫三思于止戈之武固亦霜驅隼勁露落鵬摧周庾信車騎大將軍贈小司空宇文顯墓誌銘不聴雜樂以變齊國之風不食鮮禽以斷荆王之獵已上方正人部節義撫孤附晉書忠義𫝊論古人有言君子殺身以成仁不求生以害仁人云非死之難處死之難信哉斯言也是知隕節茍合其宜義夫豈吝其沒捐軀若得其所烈士不愛其存故能守鐵石之深衷厲松筠之雅操見貞心于嵗暮摽勁節于嚴風赴鼎鑊其如歸履危亡而不顧書名竹帛畫象丹青前史以為美談後來仰其徽烈者也晉自元康之後政亂朝昏禍難荐興艱虞孔熾遂使奸凶放命戎狄交侵函夏沸騰蒼生塗炭干戈日用戰争方興雖背恩忘義之徒不可勝載而蹈節輕生之士無乏于時至若嵇紹之衛難乗輿卞壼之亡軀鋒鏑桓雄之義髙田叔周﨑之節邁解揚羅丁致命于舊君辛吉耻臣于戎虜張禕引鴆以全節王諒斷臂以厲忠莫不志烈秋霜精貫白日足以激清風于萬古厲薄俗于當年者歟所謂亂世識忠臣斯之謂也宋顔延之陽給事誄貞不常祜義有必甄處父勤君怨在登賢苫夷致果題子行間忠壯之烈宜自爾先舊勲雖廢邑氏遂𫝊惟邑及氏自温徂陽狐續既降晉族弗昌之子之生立績宋皇拳猛沈毅温敏肅良如彼竹栢負雪懷霜如彼騑駟配服驂衡力雖可窮氣不可奪義立邊疆身終鋒栝嗚呼哀哉賁父隕節魯人是志汧督効貞晉策攸記皇上嘉悼思存寵異唐王維臨汝太守贈秘書監韋公神道碑并序坑七族而不顧赴五鼎而如歸徇千載之名輕一朝之命烈士之勇也隱身流涕獄急不見南冠而縶遜詞以免北風忽起刎頸送君智士之勇也種族其家則廢先君之嗣戮辱及室則累天子之姻非茍免以全其身思得當有以報漢棄身為餌俯首入槖偽就以亂其謀佯愚以折其僭謝安伺桓温之亟蔡邕制董卓之邪然後吞藥自裁嘔血而死仁者之勇夫子為之嗚呼上京既駭法駕大遷天地不仁穀洛方鬬鑿齒入國磨牙食人君子為投檻之猿小臣若喪家之狗偽疾將遁以猜見囚勺飲不入者一旬穢溺不離者十月白刃臨者四至赤棒守者五人刀環築口㦸枝入領已上節義張九齡故光禄大夫右散騎常侍徐文公神道碑景倩幼露實賴愍孫令伯大成抑由祖母周庾信大將軍司馬裔碑複壁襁負深山擁樹程嬰之匿趙武從役家臣王成之藏李燮為傭酒市年十有五始幹家事楹前鑿柱即取遺書石上開松仍求故劒撫孤附人部壽宋蘇軾宣徳郎劉錫永父元年一百四嵗可承事郎制尚齒教民三代之義咨爾百年之故老乃吾六世之遺民自非吉人莫享上壽張蒼事秦柱下而至漢孝景思邈生隋開皇而及唐永淳古有其人乃今親見何愛一命慰其子孫張正巳賀丞相生日啟五百年而名世有開合徳之符八千嵗以為春願罄大年之祝方國家卜世以無疆宜福禄自天之未艾慶傳衮舄封誓山河階符同耀拱宸極以常尊神岳比崇鎮坤輿而益固播芳大全代胡侍郎謝朝士賀生日啟五十之年過二應憐坡老之衰三萬之日無多欲擬茶山之老華其斑白飾以青黄人情欲壽欲安顧所蒙矣君子善頌善禱何以報之歐陽修聖節五方老人祝壽文但某太山老叟東海真仙一有一字溜穿石而曽究初終一有五字松避雨而備知嵗月羲氏定三百六日嘗守寅賓之官夷吾紀七十二君盡覩登封之事遇安期而遺棗笑方朔之偷桃風入律而來自巖前斗指春而光臨洞口昔漢武帝嘗懷三島之勝遊有羡門生欲謁巨公于昭代今則紫庭降聖華渚開祥逺離朝日之方來展望雲之懇千八百國咸歸至治之風億萬斯年共禱無疆之夀遥望天庭敢進祝聖之頌東海蓬萊第一仙遥瞻西北祝堯天願皇長似東君壽與物為春億萬年右東方老人但某秦川故老華岳幽人詢仙掌之遺蹤咸知始末戀蓮峯之絶頂不記嵗時潄流玉乳之泉枕石雲陽之洞逍遥物外笑傲林間奉王母之蟠桃嘗延漢帝指老耼之仙李永佑唐基掌中五色之丸世上千年之壽欣逢聖代來至塵寰當洪河澄九曲之時是甲觀誕一人之日祥麟遊于泰畤天馬來于大宛景星見而朱草生瑞露降而赤烏集既遇無為之化宜歌有道之君是以駕青牛而度函關指丹鳳而趨魏闕唯願慶源流逺齊河海以無窮睿算綿長等乾坤而不老遥望天庭敢進祝聖之頌華岳峯頭萬葉蓮開花今古世相𫝊願皇長似蓮峯久結實盤根不記年右西方老人但某棲心嵩極振迹伊川年髙而可等松椿氣粹而嘗飱芝术洞裏之煙霞不老壺中之日月偏長當聖主之盛時居天心之奥壤但見璿璣運而寒暑正土圭測而隂陽和冠帶被于百蠻玉帛來于萬國龍在沼而麟在藪河出圖而洛出書民躋壽域之中俗樂春臺之上今則堯眉誕秀舜目開祥逺離王屋之間來入帝畿之内仰瞻天表莫非嶽降之神上祝皇圖豈止山呼之嵗遥望天庭敢進祝聖之頌嵩髙維嶽鎮中天王氣盤基降夀仙惟願吾皇等嵩嶽三靈齊祝萬斯年右中央老人但某託迹炎洲遊神衡嶽非海濱之野叟乃星極之老人當火徳為治之朝是離明繼照之日里社鳴而聖人出泰階正而王道平百蠻向風重譯來貢屢覩豐年之上瑞故知百姓之懽心鼓腹而歌治世之音安以樂曲肱而枕化國之日舒以長斯可謂唐虞之民又豈止成康之俗今則流虹誕聖遶電開祥來趨北闕之前上祝南山之永雲翔霧集既羅仙籍之班地久天長以禱皇家之祚遥望天庭敢進祝聖之頌南極星中一老人南山為壽祝吾君願君永奏南薫曲當使淳音萬國聞右南方老人但某修真北嶽常傾葵藿之心混俗幽都不避草茅之迹潛神自得味道為娛易水歌風曽識荆軻于往嵗燕山勒石親逢竇憲于當年仙家之景物常春人世之光華易老華表之鶴未久還來蓮葉之龜于時屢見且處積隂之境每舒就日之誠望干呂之青雲慶流虹于華渚當萬域來王之際是千齡誕聖之初是以歴沙漠而朝宗叩天閽而祝頌惟願慶基不朽永齊金石之堅寶祚無疆更等山河之固遥望天庭敢進祝聖之頌北嶽神仙九轉丹持來北闕獻君前願將北極齊君壽萬國陶陶共戴天右北方老人人部棲逸唐王績逰北山賦南山故情老而彌篤東坡餘業悠哉自寧酒甕多于歩兵秫田廣于彭澤皇甫謐之心事壠畝終焉仲長統之規模園林幸足歴丹危而尋㨗徑攀翠險而覔修塗聳飛情于遐道振逸想于烟衢况乃幽谷藏真傍無四隣紫房半掩𤣥壇尚新逢閬風之逸客直蓬萊之故人忽據梧而䇿枝亦披裘而負薪荷衣薜帶藜杖葛巾出芝田而計畆入桃源而問津昆丘若礪渤澥揚塵栽碧奈而何日種瓊𤓰而幾春自然詭異非徒隱淪乃有上元仙骨大清神手走電奔雷耘空蒔朽河間之業不齊貫淮南之術無虗受祝動南極符廽北斗偓佺贈藥麻姑送酒青龍就食於甲辰𤣥牛自拘於乙丑永懷世事天長地久瞻顧流俗紅顔白首儻千秋之可營亦何為而自輕拭丹爐而調石髓裛翠釡而出金精珠流玉結雪耀霜明咸謂刀圭暫近足使雲車下迎雲峯龜甲而重聚霞岫龍鱗而結絡水出浦而潺潺霧含川而漠漠是忻是賞爰遊爰豫結蘿幌而迎宵敞茅軒而待曙爾其雜樹相糾長條交茹葉動猿來花驚鳥去起公子之殊賞澹王孫之逺慮山水幽尋風雲路深蘭窗左闢菌閣斜臨石當堦而虎踞泉映牖而龍吟月照南浦煙生北林閲丘壑之新趣縱江湖之舊心道集吾室風吹我襟許由避地張超成市察俗刪詩依經正史康成負笈而相繼根矩摳衣而未已組帶青衿鏘鏘儗儗堦庭禮樂生徒杞梓山似尼丘泉凝洙泗丘園散誕窟室徘徊坐等枯木心同死灰亦有山羞野饌蘭漿木麨杞葉煎羮松根溜醥既採藥而為食諒隨情而不矯負鍤春前腰鎌嵗抄草漸密而饒蟬樹彌髙而足鳥地寂寞而森深路縱横而窈窕野亭鶴唳山梁雉鷕逺遊之所幽棲之次或抱犢而新來乍聞鷄而始至藋畦一兩茅齋數四山為險而無人嶺時平而有地石菌抽葉金芝吐穗鏡執山精刀驅水魅泉繞砌而魚躍樹横窗而鳥萃天網何寛人生幾難飲河知足巢林必安亦何榮于拾紫亦何羡于還丹紅藜促節之仗緑籜斑文之冠野飱二簋園蔬一盤送阮籍而長嘯得劉伶而甚懽曉入柴户暮歸藥欄老萊地僻鄒生谷寒楊栁則條垂鍜沼杏樹則花飛坐壇賦或鼓吹詩如彈丸擕始醉之嗚鶴對新婚之伯鸞我有懷抱蕭然自保古人則與子同歸紛吾則此焉將老磵溪沼沚之蘋艾丘陵坂險之梨棗接果移桑栽苗散稻不藏無用之器不愛非常之寳抵玉驚禽揮金薙草接朋友於盃案㺯兒童于襁褓樂山澤之浮遊笑江潭之枯槁戒非佞佛齋非媚道無譽無功形骸自空坐成老圃居成下農身與世而相棄賞隨山而不窮披衣竈北逐食墻東皇甫松大隱賦擁萬卷而笑百城舉簞瓢而歌一室乃歩重水常趨遥林竒峯峞􅐑古木深沈泉出山而漸淺雲入洞而愈深遇清風而藉席對緑篠以開襟垂蘿窱窵以樛結連巒菌蠢而相尋望去鶴于沙尾見歸龍于水心青苔潤而饒露碧梧欹而足隂松脂滴酒樹癭薦琴山席平鋪而葉墜書卷横開而露侵廽首遥壑松蘿漠漠曲徑抱雲根斜陽遶山脚瀑迸疑懸峯危欲落歴斷岫而峥嶸入踈林而綺錯委葉交扶盤根相閣野䑕鬭於林梢山鷄鳴於叢薄蔓韌時縈壁危或拓出入烟蘿徊翔寥廓山泉鳴而入夜洞花寒而變春閒遊諳野蔬食慣貧盤中之周生紫蓼嶺上之陶公白雲野岸波澄蓬門露曉徘徊緑水之際蕭洒青林之表杞根成狗蘿葉垂蔦山鹿奔而草低野鶴飛而桂褭溪外負薪田中荷蓧鶉披子夏之衣蛙鳴稚圭之沼壠畆連延桑麻繚繞入崦而朽竹芟踈出溪而茅茨稀少依林壑以終焉經沼沚而留連花披籬而綿絡瀑鳴山而布懸潭中則赬魚躍日洞裏則沈鹿呌煙遇山客以停杖逢沙禽而駐船槎崩水没樹空籬穿雉雊霧日鼉鳴雨天灌於陵之藥圃耕彭澤之黍田偷閒散于一日役筋骸于百年開山决水澆蘭蒔芷移風桂于嶺頭種煙篁于澗裏浪滿沈舟苔生濕地山廪空而䑕喧野浪髙而鷗喜或曲岸而流觴或平崖而隱几白鷗兩岸青莎一床或刺舟而共去或駕犢而相從採藥于巖下行歌于里中兒童目以痴叔鄉人指作愚公怪蔣詡之徑狹笑孫登之室空昔者梁伯鸞之牧猪馬仲圭之兔毛公隱身于博徒嚴生攻書于卜舗咸蓄竒聲共沈髙歩陸龜蒙幽居賦遂求衡泌聊以棲遲建一畝之宮忝稱儒者置千金之産雅叶中人晏子以囂塵可容曹公以泥水自蔽羅含宋玉嘗戾止於荆蠻蕭相武侯亦潛安于僻巷楊徳祖家唯弱栁殷仲文庭只枯槐馮衍薑辛繁欽苔碧復有稻名半夏藥號恒春長榆是降星精修竹乃生雲母潘尼館裏嘗聞柰素𤓰甘庾信園中亦信棗酸梨酢切觀流詠雅尚清風古今攸同聖賢何逺武仲遊于沛澤伊尹耕于有莘余欲無言回不願仕神交六位方為賣卜之人歌動五噫竟作賃舂之客龜床鹿幘訝招隱兮何遲橡飯菁羮笑謀生之太簡名安可釣筆不堪耕頽垣抱碧無非海髪山衣暗坐飄紅盡是松脂桂蠧加以籬邊種菊堂後生萱覆井之新桐乍引臨窗之舊竹猶存花妨過帽栁礙移門夢去而雲遮絶洞樵歸而水遶孤村遇景逍遥就魚鳥之情樂開襟散誕見羲皇之道尊讀仙氏之琅書安能解慍傾洛公之金醴幾得消憂清樽方灧于遥水寶瑟坐凝于華月周庾信奉和趙王隠士詩洛陽徵五隱東都别二賢雲氣浮函谷星光集潁川霸陵採樵路成都賣卜錢鹿裘披稍裂藜床坐欲穿阮籍推長嘯稽康訝下絃澗險無平石山深足細泉低松猶百尺少鶴已千年野鳥繁絃囀山花熖火燃雖無亭長識終見野人船庾信奉報窮秋寄隱士詩王倪逢齧缺桀溺遇長沮藜床負日卧麥隴帶經鋤自然曲木几無名科斗書聚花聊飼雀穿池試養魚小徑治澁路低田補瓌渠秋水牽沙落寒藤抱樹踈空枉平原騎來過仲蔚廬庾信尋周處士𢎞讓詩欣逢赤松遊披林對一丘梨紅大谷晚桂白小山秋石鏡菱花發桐門琴曲愁泉飛疑度雨雲積似重樓王孫若不去山中定可留唐司空曙過終南山栁處士詩雲起山蒼蒼林居蘿薜荒幽人老深境素髪與青裳雨滌莓苔緑風揺菡萏香洞泉分𣲖淺巖笋出叢長敗屨安松砌餘碁在石牀書名一為别還路已堪傷周庾信贈周處士詩九丹開石室三徑没荒林仙人翻可見隱士更難尋籬下黄花菊丘中白雪琴方欣松葉酒自和遊仙吟唐釋皎然山居寄呈吳處士詩山事由來别只應中老身寒園掃綻栗秋浪拾乾薪領鶴閒書竹誇雲笑向人俗家相去逺野水作東隣王績贈李徵君大夀詩孔淳辭散騎陸昶謝中郎幅巾朝帝罷䇿杖去官忙附車還趙郡乘船向武昌九徵書未已十辟譽彌彰副君迎綺季天子送嚴光霸陵幽徑近磻溪隱路長編蓬還作室績草更為裳㑹稽置樵處蘭陵賣藥行看書惟道徳開教止農桑别有懷幽侶由來髙讓王前年辭厚幣今嵗返寒鄉有書横石架無氊坐土牀蘭英猶足釀竹實本無糧澗松攀轉直山菊秋自香管寧存祭禮王霸重朝章去去相隨去披裘驕盛唐李白贈盧徵君鴻詩陶令辭彭澤梁鴻入㑹稽我尋髙士𫝊君與古人齊雲卧留丹壑天書降紫泥不知楊伯起早晩向關西釋理瑩送戴三徵君還谷口舊居詩巖穴多遺秀弓車屢逺招周王尊渭叟潁客傲唐堯出處天波洽關河地勢遥瞻星吳郡夜作霧華山朝清論虚重席閒居挂一瓢漁歌思坐酌宸渥寵行軺春為荷裳暖霜因葛履消層崖懸瀑溜萬壑振清飆谷鳥猶遷木場駒正食苗謝安何日起台鼎佇君調錢起送温逸人詩垂白無名老何年此陸沈丘園應得性婚嫁不縈心嵗計因山薄霞棲在谷深設罝連草色曝藥避松隂觸興雲生岫隨耕鳥下林搘頥笑來客頭上有朝簮張籍和盧常侍寄華山鄭隱者詩獨憶三峰下年深學錬丹一間松葉屋數片石花冠酒待山中飲琴將洞内彈開門移逺竹剪草出幽蘭荒壁通泉架晴崖曬藥壇寧知騎省客長向白雲看張籍酬李僕射春日見示詩㦸户洞初晨鸎聲雨後頻虚庭清氣在衆藥濕光新魚動芳池面苔侵老竹身教鋪嘗酒處自問探花人獨此長多病閒居欲過春今朝聴髙韻忽覺離埃塵許渾寄題商洛王隱士居詩近逢商洛客知爾住南塘草閣平春水柴門掩夕陽尋蜂收野蜜隨麝拾生香更憶前年别松花滿石床李羣玉送隠者歸羅浮詩春山杳杳日遲遲露入雲峯白犬隨兩卷囊書留貰酒一柯樵斧坐看碁蓬萊道士飛霞札清逺仙人寄好詩自此塵寰音信斷山川風月永相思溫庭筠西江上送漁父詩却逐嚴光向若耶釣綸菱棹寄年華三秋梅雨愁楓葉一夜篷舟宿葦花不見水雲應有夢偶隨烟鳥便成家白蘋風起樓船暮江燕雙雙五兩斜許渾題韋處士山居詩劚藥去還歸家人半掩扉山風藤子落溪雨豆花肥寺逺僧來少橋危客過稀不聞碪杵動應解剪荷衣温庭筠處士盧岵山居詩西溪問樵客遥識主人家古樹老連石急泉清露沙千峯隨雨暗一徑入雲斜日暮鳥飛散滿山蕎麥花皮日休李處士郊居詩石衣如髪小溪清溪上柴門架樹成圜裏水流澆竹響窗中人静下棋聲幾多狎鳥皆諳性無限幽花未得名滿引紅螺詩一首劉楨失却病心情劉長卿送鄭山人還廬山别業詩潯陽數畆宅歸卧掩柴關谷口何人待門前秋草閒忘機賣藥罷揮手杖藜還舊筍成寒竹空齋向暮山水流經舍下雲去到人間桂樹花應發因行寄一攀李嘉祐送韋山人歸鍾山别業詩旗亭閲書罷負笈向桃源萬巻長開帙千山不掩門緑楊垂野渡黄鳥傍山村念爾能髙枕丹墀㑹一論皇甫曽送陸鴻漸山人採茶廽詩千峯待逋客香茗復叢生採摘知深處烟霞羡獨行幽期山寺逺野飯石泉清寂寂燃燈火相思一磬聲梁昭明太子七契三春蔓户八桂攅簷蓽門鳥宿圭竇狐潜風來室揺霧下窗霑齊孔稚珪北山移文鍾山之英草堂之靈馳烟驛路勒移山庭夫以耿介㧞俗之標瀟洒出塵之想度白雪以方潔干青雲而直上吾方知之矣若其亭亭物表皎皎霞外芥千金而不盼屣萬乘其如脱聞鳳吹于洛浦值新歌于延瀬固亦有焉豈其始終參差蒼黄飜覆泪翟子之悲慟朱公之哭乍囘迹以心染或先貞而後黷何其謬哉嗚呼尚生不存仲氏既往山阿寂寥千載誰賞世有周子儁俗之士既文既博亦𤣥亦史然而學道東魯習隱南郭竊吹草堂濫衿北岳誘我松桂欺我雲壑雖假容于江臯乃纓情于好爵其始至也將欲排巢父拉許由傲百氏蔑王侯風情張日霜氣横秋或嘆幽人長往或怨王孫不游譚空空于釋部覈𤣥𤣥于道流務光何足比涓子不能儔及其鳴騶入谷鶴書赴隴形馳魄散志變神動爾乃眉軒席次袂聳筵上焚芰製而裂荷衣抗塵容而走俗狀風寒悽其帶憤石泉咽而下愴望林巒而有失顧草木而如喪至其紐金章綰墨綬跨屬城之雄冠百里之首張英風于海甸馳妙譽于浙右道帙長擯法筵久埋敲扑諠囂犯其慮牒訴倥偬裝其懷琴歌既斷酒賦無續常綢繆于結課每紛綸于折獄籠張趙于往圖架卓魯于前籙希蹤三輔豪馳聲九州牧使我髙霞孤映明月獨舉青松落隂白雲誰侶澗户摧絶無與歸石徑荒凉徒延佇至于還飇入幕冩霧出楹蕙帳空兮夜鶴怨山人去兮曉猿驚昔聞投簮逸海岸今見解蘭縛塵纓於是南岳獻嘲北隴騰笑列壑争譏攅峯竦誚慨游子之我欺悲無人以赴弔故其林慚無盡澗愧不歇秋桂遣風春蘿擺月騁西山之逸議馳東臯之素謁今乃促裝下邑浪拽上京雖情投于魏闕或假歩于山扄豈可使芳杜厚顔薜荔無恥碧嶺再辱丹崖重滓塵游躅于蕙路汙渌池以洗耳宜扄岫幌掩雲關歛輕霧藏鳴湍截來轅于谷口杜妄轡于郊端於是叢條瞋膽叠穎怒魄或飛柯以折輪乍低枝而掃迹請廽俗士駕為君謝逋客宋洪适通周太尉啟榆莢生涯菊花歸夢方岳除兵部架閣制幹謝丞相啟蠧簡故貧牛衣猶暖半畦夜雨甘自隨黄犢之鑱兩鬢秋風已不作青山之夢芍藥揚州歎已老三生之杜牧桃花觀裏笑重來前度之劉郎周王褒與周𢎞讓書鏟迹幽蹊銷聲穹谷祖𢎞勛與陽休之書比以家貧親老時還故郡在本縣之西界有雕山焉其處閒逺水石清麗髙巖四匝良田數頃家先有野舍于斯而遭亂荒廢今復經始即石成基憑林起棟蘿生映宇泉流繞階月松風草縁庭綺合日華雲實傍沼星羅簷下流煙共雲氣而舒卷園中桃李雜椿栢而䓤蒨時一褰裳渉澗負杖登峯心悠悠以孤上身飄飄而將逝杳然不復自知在天地間矣若此者久之乃還所住孤坐危石撫琴對水獨詠山阿舉酒望月聴風聲以興思聞鶴唳以動懷企莊生之逍遥慕尚子之清曠首戴萌蒲身衣縕襏出藝稻粱歸奉慈親緩歩當車無事為貴斯已適矣豈必出塵哉而吾生既繫名聲之韁鏁就良工之剞劂振佩紫臺之上鼓袖丹墀之下采金匱之漏簡訪玉山之遺文敝精神于丘墳盡心力於河漢摛藻期之鞶繡發議必在芬香兹自美耳吾無取焉嘗試論之夫崐峰積玉光澤者前毁瑶山叢桂芳茂者先折是以東都有挂冕之臣南國見捐情之士斯豈惡粱錦好蔬布哉蓋欲保其七尺終其百年耳今弟官位既達聲華已逺象由齒斃膏用明煎既覧老氐谷神之譚應體留侯止足之逸若能飜然清尚解佩捐簮則吾于兹山莊可辦一得把臂入林挂巾垂枝攜酒登巘舒席平山道素志論舊欵訪丹法語𤣥書斯亦樂矣何必富貴乎去矣陽子途乖趣别緬尋此㫖杳若天漢已矣哉書不盡意梁何𦙍答皇太子書𦙍性愛山泉情篤魚鳥而從鷗未狎入獸相驚兼年齒衰暮荒徑榛梗既無語稼之客寧有論書之賔緘黙畎畆栖息丘壑秀水清潭于兹永已陶𢎞景答謝中書書山川之美古來共譚髙峯入雲清流見底兩岸石壁五色交暉青林翠竹四時俱備曉霧將歇猿鳥亂鳴夕日欲頽沈鱗競躍實是欲界之僊都自康樂以來未有能與其竒者又答趙英才書隴薪井汲樂有餘歡切松煮术此外何務謝幾卿答湘東王書本立金覊之飾無假玉璧為資徒以老使形踈疾令心阻沈滯床簟彌歴七旬夢幻俄頃憂傷在念竟知無益思自祛遺尋理滌意即以任命為膏酥鑒鏡照形翻以支離代萱樹故得仰慕徽猷永言前哲鬼谷深栖接輿髙舉遯名屠肆發迹關市其人緬邈餘流可想張充與王儉書介然之志峭聳霜崖確乎之情峯横海岸飄纓天闕既謝廊廟之華綴組雲臺終慚衣冠之秀所以擯跡江臯佯狂隴畔者實由氣岸疏凝情塗狷隔獨師懷抱不見許于俗人孤秀神崖每邅囬于在世故君山直上蹙壓于當年叔陽夐舉坎􅇄乎千載充所以長羣魚鳥畢影松阿半頃之田足以輸税五畆之宅樹以桑麻嘯歌于川澤之間諷詠于澠池之上泛濫于漁父之遊偃息于卜居之下如此而已充何識焉若夫驚巖罩日壯海逢天竦石崩尋分危落仞桂蘭綺靡叢雜于山幽松栢隂森環繚于澗曲元卿于是乎不歸伯休亦以兹長往若乃飛竿釣渚濯足滄洲獨浪煙霞髙卧風月悠悠琴酒岫逺誰來灼灼文譚空罷方寸不覺鬱然千里路阻江河每至西風何嘗不眷聊因疾隙略舉諸襟持此片言輕枉髙聴唐王績答刺史杜之松書承欲相招講禮聞命驚笑不能已已豈明公前眷或徒與下走相知不熟也下走意踈體放抑有由焉兼棄俗遺名為日久矣淵明對酒非復禮義能拘叔夜攜琴惟以烟霞自適登山臨水邈矣忘歸譚虚語𤣥忽焉終夜僻居南渚時來北山兄弟以俗外相期鄉閭以狂生見待歌去來之作不覺情親詠招隱之詩惟憂句盡帷天席地友月交風新年則柏葉為罇仲秋則菊花盈把羅含宅内自有幽蘭數叢孫綽庭前惟對長松一樹髙吟朗嘯挈榼攜壺直與同志為羣不知老之將至欲令復整理簮屨修束精神揖讓邦君之門低昂刺史之座逺譚糟粕近棄醇醪必不能矣亦將恐芻狗貽夢社櫟見嘲去矣君侯無落吾事梁昭明太子陶淵明集序玉之在山以見珍而終破蘭之生谷雖無人而自芳故莊周垂釣於濠伯成躬耕於野或貨海東之藥草或紡江南之落毛譬彼鵷雛豈競鳶鴟之肉猶斯雜縣寧勞文仲之牲鼔枻清潭棄機漢曲江淹自序淹字文通濟陽考城人為建安吳興令地在東南嶠外閩越之舊境也爰有碧水丹山珍木靈草皆淹平生所至愛不覺行路之逺也山中無事專與道書為偶及悠然獨往或日夕忘歸放浪之際頗著文章自娛常願卜居築宇絶棄人事苑以丹林池以緑水左倚郊甸右帶瀛澤青春受謝則接武平皋素秋澄景則獨酌虚室侍姬三四趙女數人否則逍遥經紀彈琴詠詩朝露夕月忽忘老之將至云爾淹之學盡此而已矣唐王勃山亭宴序山人對興即是桃花之源隱士相逢不異菖蒲之澗黄精野饌赤石神脂玉案金盤徵石髓于蛟龍之窟山樽野酌求玉液于蓬萊之峰溪横燕尾巖豎龍頭鍜野老之真珠掛幽人之明鏡山腰半折溜王烈之香膏洞口横開滴嚴遵之芳乳藤牽赤絮南方之物産可知粉隤青田外域之謡風在即人髙調逺地爽氣清漢家二百所之都郭宮殿平看秦氏四十郡之封畿山河坐見班孟堅騁兩京雄筆以為天地之奥區張平子奮一代宏才以為帝王之神麗珠城隱隱䦨干象北斗之宮清渭澄澄滉漾即天河之水長松茂栢鑚宇宙而頓風雲大壑横溪吐江河而懸日月鳳凰神嶽起煙霧而當軒鸚鵡春泉雜風花而滿谷顧雲題致仕武賔客嵩山舊隠詩序捫危選勝駕迥裁基鈿走伊波控隱士飲牛之渚螺排緱嶠對仙人駕鶴之峯移紫府之全模冩清都之勝槩王桃植砌董杏栽壇帳合蘿髙床平石古飛流界練貫幽響於風湍曙景張屏掛清光于露壑時或春花發盡秋雨晴初虚籟調風斜窗印月吞露華兮漱煙液而樂天和吟酒賦兮唱吟歌焉知帝力乃知飛霜匝野氷崖留不死之蠶烈日熒溟珠岸有不枯之草故能振清風于戚里飛逸駕于雲逵宜乎與禄産分鑣夷齊結轍比夫吞腥咽腐懷禄偷安者不亦優乎今則八桂森指五芝零落立松崖而盡日不見王孫掃石壁以題詩别招逋客楊盈川羣官尋楊隱居詩序忽乎將行指林壑而非逺莞爾而笑覽烟霞而在矚登岡阜踐莓苔阮籍之見蘇門止聞鸞嘯盧敖之逢髙士詎識鳶肩憶桑海而無時問桃源之易失寒山四絶烟霧蒼蒼古樹千年藤蘿漠漠晉庾闡孫登賛靈巖霞蔚石室鱗搆青松標空蘭泉吐漏蘢薈可游芳津可嗽𤣥谷蕭寥鳴琴獨奏先生體之寂坐幽岸凝氷結璞熈陽靡煖潛真内全飛榮外散凌崖髙嘯希風朗彈道有􅁳廢運有昏消達隱不巖𤣥迹不標或曰先生晦徳逍遥嵇子秀達英風朗烈道攜薫秀鮮不玉折兆動初萌妙鑒竒絶翹首丘𠖇仰想𤣥哲戴逵閒游賛降及黄綺至于臺尚莫不有以保其太和肆其天真者也且夫巖嶺髙則雲霞之氣鮮林藪深則蕭瑟之音清其可以藻𤣥瑩素疵其皓然者舍是焉往庾亮翟徵君賛夫所謂至人者體包傑量神凝域表該落萬動𤣥心獨融故能虬驤慶霄而不紲豢龍之轡鳳鳴瑶林而不屈伶倫之網豈必欣太清而樂瓊藹哉顧蹄涔不足以濯神鬚翳薈不足以翔雲翮是故藐姑有綽約之膚箕阜有髙嘯之宇唐勛表于𤣥亭夏功忘于虚室晉書阮籍諸人𫝊論帝堯縱許由于埃􅅽之表光武舍子陵于潺湲之瀨松蘿任舉用以優賢岩水澄華兹焉賜隱臣行厥志主有嘉名梁陶隱居尋山誌荆門晝掩蓬户夜開室迷夏草徑惑春苔庭虚月映琴響風哀夕鳥依簷暮獸争來時復歴近隴尋逺巒坐磐石望平原日負障以共隱月披雲而出山風下松而含曲泉縈石而生文草靃靃以拂露塵颯颯集作鹿飈飇而來羣捫虗蘿以入谷傍洪潭而比清照石壁以端色攀桂枝而齊貞函扈蘭而佩蕙及春鴂之未鳴且含懷以屏氣待惠風而舒情梁元帝陶𢎞景碑昔太和中有許逺游者乃雲霄之勝賓太虚之選客先生規同矩合實踵髙歩曩基先搆即駕胥宇千尋危聳憑牖以望奔星百栱髙懸倚櫺而觀朝日飛流界道似天漢之横波觸石起雲若竒峯之出岫碧嶂千嶺清流萬谷景落崖重烟生岫複裴子野劉虬碑鑿室林臯面流傍隴咫尺荆衡表裏巫夢樹蕙滋蘭蕪没庭中平疇翠㶑千里極目信物外之神區幽居之勝境蕭綸隱居貞白先生陶君碑倚巖栖隱依林遁跡交柯結宇剗徑為門懸崖對溜悲吟灌木深壑絶峭組織烟霞枕石漱流水禽無撓採藥耦耕野獸不亂逍遥閒曠放浪陵山嗒然若喪確乎難㧞慕遥風于緱氏繪遺像于橋陽勒𤣥碑而相質騰綘霄之流芳留舄表化棄劔凝神徘徊紫氣照耀丹鱗厥跡猶在餘風可遵結宇依巖貞棲茂草水玉留年華精却老泉過危庭峯臨窈洞露凝蘭階雲生桂棟日斜欄席花落窗甕尚平未反王孫不旋海桑交易陵谷貿遷豐碑有樹遺烈無騫人部游賞唐范慥競渡賦飾畫舸以争麗建綵標而競取聿來肇自于北津所届𦕈期于南浦選孟賁烏獲以用壯酹川后天吳以潛輔重輕莫異于錙銖先後不差于歩武外希得雋之稱内約疇庸之伍逺岸天闊乘流鏡清援枹者氣作于一鼔理棹者伎癢于先鳴聆大呼之始發若縱柂而迅征直衝諒駃于狂兕忽往未殊于駭鯨目正晝而懼眩浪無風兮歘生鳴鼙吹竽上聒天衢如伏波整旅合水獸于江湖建旗列卒俯映泉室若五利將軍訪仙師于溟渤攝弄竒以潛駭恒游泳而下逸羣聲合譟羣手齊力慮勍敵之我先莫遑捨于瞬息乘輕若在于風馭處疾訝飛于首飭舳艫惟正審流鏑之向齊檝棹翻然亂驚鳬之揮翼王勃採蓮賦黛葉青跗煙周五湖紅葩絳蘤電鑠千里吳娃越艷鄭婉秦妍感靈翹于上朔悦瑞色于中年錦帆映浦羅衣塞川飛木蘭之畫楫駕芙蓉之綺船至若金室麗妃璇宫佚女傷鳳臺之寂寞厭鸞扄之閒處侍飲南津陪歡北渚見磯岸之紆直覿旌旄之低舉上苑神池芳林御陂樓隂架沚殿彩乘漪張拜洛之容衛備横汾之羽儀簫鼓發兮龍文動鱗羽喧兮鷁首移咸靚粧而麗服各分騖而並馳蘋縈槳礙荇觸船危視雲霞之沃蕩望林泉之蔽虧折紺房與緗菂攬紅葩及碧枝廽綃裙兮竊獨嘆歩羅襪兮私自竒莫不驚香悼色畏别傷離復有濯宮年少期門公子翠髪蛾眉赬唇皓齒傅粉蘭堂之上偷香椒屋之裏亦復銜恩激誓佩寵緘愁承好賜之珍席奉嬉游之彩斿繡棟曛兮翠羽帳瑶塘曙兮青翰舟搴條拾蘂沿波泝流池心寛而藻薄浦口窄而萍稠和橈姬之衛吹接榜女之齊謳去復去兮水色夕採復採兮荷華秋侯家瑣第戚里芳園穿池灞岸之曲蓄水河陽之源隄防谷口島嶼轘轅嘉木畢植靈草具繁沈桂北之丹藕播荆南之紫根鬰萋萋而霧合燦􅈌􅈌而霞飜洎乎氣徹都鄙景華川陸麥雨微凉梅飇淺燠命妖侶于石城嘯娛朋于金谷乃使緑珠捧棹青琴理舳樽芳醪藉珍餗汎玉潭之瀰漫遶金渠之隈隩石近水而苔濃岸連山而樹複排芰末而争逺託蘆間而競逐赴汨凌波飛袿振羅風低緑榦水濺黄螺上客喧兮樂未已美人醉兮顔將酡愛蓮色之如臉願衣香兮勝荷又若妖姬蕩媵命侣招羣淇上洛表湘臯汝濆望洲草兮翡翠色動浦水兮驪龍文願解珮以邀子思褰裳而從君憐曙野之綘氣愛晴天之碧雲棹廵汀而栁拂船向渚而菱分掇翠莖以翳景襲朱蕚以為裙艇怯奔潮篙憎淺石絲著手而偏遶刺牽衣而屢襞貴子王孫乘閒縱觀何平叔之符彩潘安仁之藻翰税龍馬於金堤命鳬舟於石岸錦䌫飜洒銀檣照爛日側光沈風驚浪深快北渚之新贈恣東溪之密尋鴛鴦繡彩之文履玳瑁瓊華之寶琴扣舷擊榜吳歈越吟溱與洧兮葉履水淮與濟兮花冒潯值明月之夕出逢丹霞之夜臨茱茰歌兮軫妾思芍藥贈兮傷人心宜其色震百草香奪九芝栖碧羽之神爵負青􅀈之寶龜紫秩流記丹經秘詞豈徒加繡柱之光彩煜文井之華滋王勃上巳浮江宴詩披觀玉京路駐賞金臺阯逸興懷九仙良辰傾四美松吟白雲際桂馥清溪裏别有江海心日暮情何已上巳年光促中川興緒遥緑齊山葉滿紅洩片花銷泉聲喧後澗虹影照前橋遽悲春望逺江路積波潮又聖泉宴詩披襟乘石磴列席俯春泉蘭氣薫山酌松聲韻野紘影飄垂葉外香度落花前興洽林塘晩重巖起夕烟盧照隣三月曲水宴詩風煙彭澤里山水仲長園由來棄銅墨本自重琴樽髙情邈不嗣雅道今復存有美光時彥養徳坐山樊門開芳杜徑室距桃花源公子黄金勒仙人紫氣軒長懷去城市髙詠狎蘭蓀連沙飛白鷺孤嶼嘯𤣥猿日影巖前落雲花江上翻興䦨車馬散林塘夕鳥喧趙嘏和令狐補闕春日獨遊西街詩左掖初辭近侍班馬嘶尋得過街閒映鞭栁色微遮水隨歩花枝欲礙山暖泛鳥聲來席上醉從詩句落人間此時失意哀吟客更覺風流不可攀宋之問鳳閣尋勝地詩西掖持醇酒東山就白雲開軒緑池映命席紫蘭芬舞度花為伴鶯來管作羣太平多樂事春物共氛氲韓翃寄劉太真詩長安道上落花朝羡爾當年賞事饒下筯已憐鵞炙美開籠不奈鴨媒驕春衣晩入青楊巷細馬初過皂莢橋相訪不辭千里逺西風好借木蘭橈魏曹植七啓于是逍遥暇豫忽若忘歸乃使任子垂釣魏氏發機芳餌沈水輕繳弋飛落翳雲之翔鳥援九淵之靈龜然後采菱蓽擢水蘋㺯珠蜯戲鮫人諷漢廣之所詠覿遊女于水濵燿神景于中沚被輕縠之纎羅遺芳烈而靖歩抗皓手而清歌晉張協七命携公子而雙逰時娛觀于林麓登翠阜臨丹谷華草錦繁飛采星燭陽葉春青隂條秋緑華實代新承意恣觀仰折神囂俯采朝蘭遡惠風于蘅薄眷椒塗于瑶壇爾乃浮三翼戲中沚潛鰓駭驚翰起沈絲結飛矰理挂歸翮于赤霄之表出華鱗于紫淵之裏然後縱棹隨風弭楫乘波吹孤竹拊雲和淵客唱淮南之曲榜人奏采菱之歌魏文帝與吳質書妙思六經逍遥百氏彈棋閒設終以博奕髙談娛心哀筝順耳馳騁北場旅食南館浮甘𤓰于清泉沈朱李于寒水白日既匿繼以朗月同乘并載以游後園輿輪徐動賔從無聲清風夜起悲笳微吟樂徃哀來愴然傷懷方今㽔賔紀時景風扇物天氣和暖衆果具繁時駕而游北遵河曲從者鳴笳以啟路文學託乘于後車應璩與滿公琰書㑹承來命知諸君子復有漳渠之㑹夫漳渠西有伯陽之舘北有曠野之望髙樹翳朝雲文禽蔽緑水沙場夷敞清風肅穆是京臺之樂也得無流而不反乎宋顔延之三月三日曲水詩序有詔掌故爰命司厯獻洛飲之禮具上巳之儀南除輦道北清禁林左關巖隥右梁潮源畧亭臯跨芝㕓苑太液懷曽山松石峻峗葱翠隂烟游泳之所攅萃翔驟之所往還于是離宮設衛别殿周徼旌門洞立筵帷接枑閲水環階引池分席春官聯事蒼靈奉塗然後升秘駕𦙍緹騎揺玉鑾發流吹天動神移淵旋雲被以降于行所禮也既而帝暉臨幄百司定列鳳盖俄軫紅旗委斾肴䔩芬藉觴醳泛浮妍歌妙舞之容銜組樹羽之器三奏四上之調六莖九成之曲競氣繁聲合變争節龍文飾轡青翰侍御華裔殷至觀聴騖集揚袂風山舉袖隂澤靚裝藻野袨服縟川故以殷賑外區煥衍都内者矣王融三月三日曲水詩序既而滅宿澄霞登光辨色戒道執殳展軨效駕徐鑾警節明鐘暢音七萃連鑣九斿齊軌建旗拂蜺揚葭振木魚甲煙聚貝胄星羅重英曲瑵之飾絶景追風之騎昭灼甄部駔駿函列虎視龍超雷駭電逝轟轟隱隱紛紛軫軫羌難得而稱計爾乃逥輿駐罕嶽鎮淵渟睟容有穆賔儀式序授几肆筵因流波而成次蕙肴芳醴任激水而推移葆佾陳階金匏在席戚奏翹舞籥動邠詩召鳴鳥于弇州追伶倫于嶰谷發參差于王子𫝊妙靡于帝江正歌有闋羽觴無筭上陳景福之賜下獻南山之壽信凱燕之在藻知和樂于食苹桑榆之隂不居草露之滋方渥唐王勃秋日宴季處士宅序庭前栁葉纔聴鳴蟬野外蘆花行看過雁數人之内幾度琴樽百年之中少時風月蘭亭有昔時之㑹竹林無今日之歡又上巳浮江宴序兼以上巳芳節雲開勝地大江浩曠雲山紛糾出重城而振䇿下長浦而方舟林壑清其顧盼風雲蕩其懷抱于時序躔青律運啟朱明輕荑秀而郊戍青落花盡而亭臯晩丹鸎紫蝶候芳晷而騰姿早燕歸鴻俟迅風而㺯影巖暄蕙密野淑蘭滋弱荷抽紫踈萍泛緑于是儼松舲于石嶼停桂檝于璇潭指林岸而長懷出河洲而極睇妍粧炫服香驚北渚之風翠幙𤣥帷彩綴南津之霧若乃尋曲渚歴逥溪榜謳齊引漁歌互起飛沙濺石湍流百勢翠嶮丹崕岡巒萬色亦有銀鈎犯浪掛赬翼于文竿瓊轄乘波耀錦鱗于畫網鍾期在聴𤣥雲白雪之琴阮籍同歸紫桂蒼梧之酌既而遊盤興逺景促時淹野日照晴山烟送晩方披襟朗咏餞斜光于碧岫之前散髪髙吟對明月于青溪之下客懷既暢遊思遄征視泉石而如歸佇雲霞而有自昔周川故事初傳曲路之悲江甸名流始命山隂之筆蓋遵清轍共舒幽襟俾後之視今亦猶今之視昔又綿州北亭羣公宴序離亭北望烟霞生故國之悲别舘南開風雨積他鄉之思于是蒼雲寡色白日無光沙塵起而桂浦昏鳬鴈下而蘆洲晩傍隣蒼野霜風橘柚之園斜枕碧潭直斷芙蓉之水宋之問奉勅從太平公主遊九龍潭尋安平王宴别序籍桃花而聴時鳥累宿忘歸䕃芳樹而弄春泉窮年不厭衣冠車馬明日下于春山鸞鶴笙歌今宵共乎芳月隱淪可作將知心與事違城闕非遥終惜風流雲散下官少懷微尚早事靈丘踐疇昔之桃源留不能去攀君王之桂樹情可何之王勃夏日諸公見尋訪詩序幽人待士非無北壁之書隱士迎賔自有西山之饌席門蓬巷佇髙士之來遊叢桂幽蘭喜王孫之相對山南花囿澗北松林黄雀至而清風生白鶴飛而蒼雲起停琴緑水仲長統之歡娛置酒青山郭子期之賔客駱賓王揚州看競渡序夏日江干駕言臨眺於時桂舟始泛蘭棹初遊鼓吹咽江山綺羅蔽雲日便娟舞袖向渌水以全低飄颺歌聲聴清風而更逺是以臨波笑臉艷出浦之輕蓮映渚蛾眉麗穿波之半月靚粧舊飾此日争奇絃管相催兹辰特妙能使洛川逥雪猶賦陳思巫嶺行雲專稱宋玉凡諸同好請各賦詩王維暮春太師左丞相諸公于韋氏逍遥谷讌集序山有姑射人蓋方外海有蓬瀛地非宇下逍遥谷天都近者王官有之不廢大倫存乎小隱跡空同而身拖朱紱朝承明而暮宿青靄故可尚也神臯藉其緑草驪山啟于朱户渭之美竹魯之嘉樹雲出其棟水源于室灞陵下連乎萊地新豐半入于冡林館層巔檻側徑師古節儉惟新丹堊巖谷先曙羲和不能信其時卉木後春勾芒不能一其令花逕窈窕蘅臯漣漪一作超忽驂御延佇于叢薄珮玉升降于蒼翠於是外僕告次獸人獻鮮樽以大罍烹用五鼎木器擁腫即天姿以為飾沼毛蘋蘩在山羞而可薦伶人在位曼姬始縠齊瑟慷慨于座右趙舞徘徊于白雲衮旒松風珠翠煙露日在濛汜羣山夕嵐猶有濯纓清歌據梧髙咏與松喬為伍是羲皇上人且三代之後而其君舜帝九服之内而其俗華胥上客則冠冕巢由主人則弟兄元愷合是四美同乎一時廢而不書罪在司禮竊賢楚傅常諧茅堂之居仰謝右軍忽序蘭亭之事蓋不獲命豈曰能賢王勃遊山廟序雅厭城闕酷嗜江海常學仙經博渉道記知軒冕可以理隔鸞鳯可以術待而事親多衣食之虞登朝有聲利之迫清識滯于煩城仙骨摧于俗境嗚呼阮籍意踈嵇康體放有自來矣常恐運促風火身非金石遂令林壑交喪烟霞版蕩此僕所以懷泉塗而惴恐臨山河而歎息者也人部别梁簡文帝餞别詩行樂此南皮讌餞臨華池籜解篁開節花暗鳥迷枝窗隂隨影度水色帶風移徒命銜盃酒終成憫别離梁簡文帝傷離新體詩傷離復傷離别後情鬱紆悽悽隱去棹憫憫愴還途還途意不申轉顧獨霑巾前驅經御宿後騎歴河漘朱旗翼還幰清笳送後塵落日斜飛蓋餘暉承畫輪栁影長横路槐枝深隱人桂宮夕掩銅龍扉甲舘霄垂雲母幃朧朧月色上的的夜螢飛草香襲余袂露灑霑人衣帶堞凌城雲亂聚排枝度葉鳥争歸盆中浮蟻不能酌琴間玉徽調别鶴别鶴千里别離聲絃調軫急心自驚試起登南樓還向華池遊前時篠生今欲合近日栽荷尚不抽猶是銜盃共賞處今兹對此獨生愁樓髙望曖曖山川自分態偃師雖北連轘轅已南背逺聴寂無聞遥瞻目有礙含毫意不迷長歎情無賴沈約送别友人詩君東我亦西衘悲涕如霰浮雲一南北何由展言宴方作異鄉人贈子同心扇遥裔發海鴻連翩出簷燕春秋更去來參差不相見吳均同栁吳興烏亭集送栁舍人詩河陽一悵望南浦送將歸雲山離晻曖花霧共依霏流連反舌喉下上陽禽飛桂舟無淹枻玉軫有離徽願君嗣蘭杜時拂東臯薇吳均同栁吳興何山集送劉餘杭詩王孫重離别置酒峯之畿逶迤川上草參差澗裏薇輕雲紉逺岫細雨沐山衣簷端水禽息窗上野螢飛君隨緑波逺我逐清風歸吳均酬别江主簿屯騎詩有客告將離贈言重蘭蕙泛舟當泛濟結交當結桂濟水有清源桂樹多芳根毛公與朱亥俱在信陵門趙瑟鳳凰柱吳醥金罍樽我有北山志留連為報恩夫君皆逸翮搏景復凌鶱白雲間海樹秋日暗平原寒蟲鳴趯趯落葉飛翻翻何用贈分首自有北堂萱吳均酬别詩故人杯酒别天清明月亮露下寒草中風起秋江上衣染潺湲泣棹犯參差浪七首直千金七寶雕華壯生離何用表賴此持相餉朱超别劉孝先詩疲疴積未瘳伏枕掩長愁復念夜分手江上值徂秋隂凝變逺色落葉泛寒流繁霜積曉䌫輕氷繞夜舟曵裾出兔苑引領望龍樓勿念荆臺側無為戚情遊王僧孺新林送劉之遴詩斾轉黄山路舟纚白馬津送輪時合幰分驂各背塵常山喜臨岱隴頭悲望秦欲持漢中䇿還以寄征人范雲送沈記室夜别詩桂水澄夜氣桂山清曉雲秋風兩鄉怨秋月千里分寒芝寧共採霜猿行獨聞捫蘿勿遺我折桂方思君范雲别詩孤煙起新豐候鴈出雲中草低金城霧木下玉門風别君河初滿思君月屢空折桂衡山北摘蘭湘水東蘭摘心焉寄桂折意誰通陳徐陵别毛尚書詩顧子厲風規歸來振羽儀嗟余今老病此别畏長離白馬君來哭黄泉我詎知徒勞脱寶劒空掛隴頭枝徐陵秋日别庾正員詩征途愁轉斾連騎慘停鑣朔氣陵踈木江風送上潮青雀離帆逺朱鳶别路遥唯有當秋月夜夜上河橋周王褒别陸子雲詩解䌫出南浦征棹且凌晨還看分手處唯餘送别人中流揺蓋影邊江落騎塵平湖開曙日細栁發新春滄波不可望行雲聊共因庾信别張洗馬樞詩别席慘無言離愁兩相顧君登蘇武橋我見楊朱路關山負雪行河水乘氷渡顧子著朱鳶知余在𤣥兔陳江總别袁昌州詩河梁望壟頭分手路悠悠徂年驚若電别日欲成秋黄鵠飛飛逺青山去去愁不言雲雨散更似東西流唐王勃餞韋兵曹詩征驂臨野吹别袂慘江垂川霽浮烟斂山明落照移鷹風彫晩葉蟬露泫秋枝亭皋分逺望延想間雲涯王勃羈遊餞别詩客心懸隴路遊子惓江干槿濃朝砌靜篠密夜窗寒琴聲銷别恨風景駐離歡寧覺山川逺悠悠旅思難楊烱送臨津房少府詩岐路三秋别江津萬里長煙霞駐征蓋絃奏促飛觴階樹含斜日池風泛早凉贈言未終竟流涕忽霑裳楊烱送豐城王少府詩愁結亂如麻長天照落霞離亭隱喬樹溝水浸平沙左尉才何屈東關望漸賖行看轉牛斗持此報張華楊烱送劉校書從軍詩天將下三宮星門召五戎坐謀資廟畧飛檄佇文雄赤土流星劍烏號明月弓秋隂生蜀道殺氣繞湟中風雨何年别琴樽此日同離亭不可望溝水自西東盧照隣還京贈别詩風月清江夜山水白雲朝萬里同為客三秋契不彫戲鳬分斷岸歸騎别髙標一去仙橋道還望錦城遥盧照隣送幽州陳參軍赴任寄呈鄉曲故老詩薊北三千里關西二十年馮唐猶在漢樂毅不歸燕人同黄鶴逺鄉共白雲連郭隗池臺處昭王樽酒前故人當已老舊壑幾成田紅顔如昨日衰鬢似秋天西蜀橋應毁東周石尚全灞池水猶緑榆關月早圓塞雲初上鴈庭樹欲銷蟬送君之舊國揮涕獨澘然駱賔王送吳七遊蜀詩日觀分齊壤星橋接蜀門桃花嘶别路竹葉㵼離樽夏去蘭猶老秋深栁尚繁霧銷山望迥風髙野聴喧勞歌徒欲奏贈别竟無言惟有當秋月空照野人園宗史别詩别酒正參差乖情將陸離悵焉臨桂苑愍然瞻華池輕雲流惠彩時雨亂清漪耿耿追蘭徑悠悠結芳枝眷言終可託心寄方在斯盧照隣西使兼送孟學士南遊詩地道巴陵北天山弱水東相看餘萬里共倚一征篷零雨悲王粲清樽别孔融徘徊聞夜鶴悵望待秋鴻骨肉胡秦外風塵關塞中惟餘劒鋒在耿耿氣成虹盧照隣還赴蜀中貽示京邑遊好詩籞宿花初滿章臺栁向飛如何正此日還望昔多違悵别風期阻將乖雲㑹稀斂袵辭丹闕懸旗陟翠微野禽喧戍鼔春草變征衣囘顧長安道關山起夕霏駱賔王别李嶠詩芳樽徒自滿别恨轉難勝客似遊江岸人疑上灞陵寒更承夜永凉景向秋澄離心何以贈自有玉壺氷陳子昂春夜别友人詩銀燭吐青烟金樽對綺筵離堂思琴瑟别路遶山川明月隱髙樹長河没曉天悠悠洛陽道此㑹在何年宋之問漢江宴别詩漢廣不分天舟移杳若仙秋虹映晚日江鶴㺯晴烟積水浮冠蓋揺風逐管絃嬉遊不可極留恨此山川宋之問渡吳江别王長史詩倚棹望兹川銷魂獨黯然鄉連江北樹雲斷日南天劒别龍初没書成鴈不𫝊離舟意無限催渡復催年李白夜别張伍詩吾多張公子别酌酣髙堂聴歌舞銀燭把酒輕羅霜横笛弄秋水琵琶彈陌桑龍泉解錦帶為爾傾千觴李白江夏别宋之悌詩楚水秋若空遥將碧海通人分千里外興在一杯中谷鳥吟晴日江猿嘯晩風平生不下淚於此泣無窮岑參趙少尹南亭送鄭侍御歸東臺詩江亭酒瓮香白靣繡衣郎砌冷蟲喧座簾疎雨到床鐘催離興急紘逐醉歌長關樹應先落隨君滿路霜陳子昂送客詩故人洞庭去楊栁春風生相送河洲晩蒼茫别思盈白蘋已堪把緑芷復含榮江南多桂樹歸客贈生平陳子昂送别陶七詩黄鶴烟雲去清江琴酒同離帆方楚越溝水復西東芙蓉生夏浦楊栁送春風明日相思處應對菊花叢李嶠送光禄劉主簿之洛詩函谷雙崤右伊川二陜東仙舟窅將隔芳斚暫云同朋席餘歡盡文房舊侣空他鄉千里月岐路九秋風背櫪嘶班馬分洲呌斷鴻别後青山外相望白雲中李嶠餞駱四詩平生何以樂斗酒夜相逢曲中驚别緒醉裏失愁容星月懸秋漢風霜入曙鐘明日臨溝水青山幾萬重徐彥伯餞唐州髙使君赴任詩桐栢膺新命芝蘭惜舊遊鳴皋夜鶴在遷木早鶯求𫝊擁淮源路樽空灞水流落花紛送逺春色别離憂李適餞許州宋司馬赴任詩國為休徵選輿因仲舉題山川襄野隔朋酒灞亭睽零雨征車警秋風别驥嘶離歌一曲罷愁向勿悽悽徐堅餞許州宋司馬赴任詩舊許星車轉神京祖帳開斷煙傷别望寒雨送離杯辭燕依空逺賔鴻入聴哀分襟與秋氣日夕共悲哉宋之問送合宮蘇明府詩鉉府誕英規公才天下知謂乘羔鴈族繼入鳳凰池赤縣求人隱青門起路岐翟迴車少别鳬化舄遥馳神哭周南境童歌豫北垂賢哉荀奉倩職衮佇來儀宋之問送楊六望赴金水詩借問梁山道嶔岑幾萬重遥州刀作字絶壁劍為峯惜别路窮此留歡意不從憂來生白髪時晩愛青松勿以西南逺夷歌寖盛容台階有髙位寧復久臨卭宋之問送杜審言詩臥病人事絶聞君萬里行河橋不相送江樹逺含情别路追孫楚維舟弔屈平可惜龍泉劒流落在豐城張九齡送别鄉人南還詩橘柚南中煖桑榆北地隂何言榮落異因見别離心吾亦江鄉子思歸夢寐深聞君去水宿結思𣺌雲林牽綴從浮事遲逥謝所欽東南行舫逺秋浦念猿吟季明泛江送客詩二月頻送客東津江欲平烟花山際重舟檝浪前輕淚逐勸盃落愁連吹笛生離筵不隔日那得易為情李白送袁明府任長江詩别離楊栁青樽酒表丹誠古道攜琴去深山見峽迎暖風花繞樹秋雨草沿城自此長江内無因夜犬驚劉長卿送栁使君赴袁州詩宜陽出守新恩至京口因家始願違五栁閉門髙士去三苗按節逺人歸月明江路聞猿斷花暗山城見吏稀惟有郡齋窗裏岫朝朝空對謝𤣥暉朱頎送竇參軍詩城南送歸客舉酒對林巒喧鳥迎春囀風衣度雨寒桃花開翠幕栁色傍金鞍公子何時至無令芳草䦨張謂道林寺送莫侍御詩何處堪留客香林隔翠微薜蘿通驛騎松竹挂朝衣霜引臺烏集風驚塔鴈飛飲茶勝飲酒聊以送君歸楊凝送客東歸詩君向古營州春風戰地愁草青蒙别路栁亞拂孤樓人意傷難醉鸎啼咽不流芳菲只合樂離思返如秋陳羽西蜀送許中庸歸秦赴舉詩春色華陽國秦人此别離驛樓横水影鄉落入花枝日暖鶯飛好山晴馬去遲劒門當石隘棧閣入雲危獨鶴心千里貧交酒一巵桂條攀偃蹇蘭葉藉參差旅夢驚蝴蝶殘芳怨子規碧霄今夜月惆悵上峨嵋髙適送柴司户充劉鄉判官之嶺外詩嶺外資雄鎮朝端寵節旄月卿臨幕府星使出詞曹海對羊城闊山連象郡髙風霜驅瘴癘忠信渉波濤别恨隨流水交情脱寶刀有才無不適行矣莫徒勞王昌齡送季濯遊江東詩清洛日夜漲微風引孤舟離傷便千里逺夢生江樓楚國橙橘暗吳門烟雨愁東南具今古歸望山雲秋劉眘虚海上送薛文學詩日處歸且逺送君東悠悠滄溟千萬里日夜一孤舟曠望絶國所微茫天際愁有時近仙境不定若夢遊或見青山石孤舟百處秋前心方杳眇此路獨夷猶離别惜吾道波澤敬皇休春浮溪花逺思逐海水流日暮驪歌後永懷空滄洲劉長卿送嚴員外詩春風倚棹闔閭城水國春寒隂復晴細雨濕衣看不見閒花落地聴無聲日斜江上孤帆影草緑湖南萬里情君去若逢相識問青袍今已悮儒生王勃秋晚入洛于畢公宅别道王宴序既而神馳象外宴洽寰中白露下而南亭虚蒼烟生而北林晩鶢鶋始望不及牲牢麋鹿長懷非忘林藪先生負局倦城市之塵埃遊子横琴憶汀洲之杜若况乎迹不皆遂時不再來屬宸駕之方旋值羣公之畢從洛城風景此㑹無期戚里一作維嶺笙竽浮懽易盡仰雲霞而道意捨塵事而論心夏仲御之浮舟願乗春水張季鷹之命駕思動秋風䇿藜杖而非遥勅一作整柴車之有日青溪數曲幽人長往白雲萬里帝鄉難見安貞抱樸已甘心于下走全忠履道是所望于羣公倘心迹克諧去留咸遂廟堂多暇返身滄海之隅軒冕所辭廽首箕山之路尋赤松而見及泛黄菊以相從雖流水桃花時時失路而幽山桂樹往往逢人庶公子之來遊幸王孫之畢至茅君待客自有金壇王烈迎賔還開石架惟恐一丘風月侣山水而忘年三徑蓬蒿待公卿之來日宋之問袁侍御席餞永昌獨孤少府序爾乃撰辰開宴考地疏筵落花覆沼懸藤掃砌竹林以清氣娛賔蘭畹以芳心愛客環坐三尺起君子之風祖道百壺酌賢人之酒去留交軫讌詠相喧管召魚樂杯薫鸎醉陳子昂金門餞東平序昔者漢朝卿士供帳餞于東都晉國名賢傾城祖于西郊雖時稱盛觀而人非帝族東平紫微英胄朱邸天人藴岐嶷之瓌姿得山河之寶氣劉君愛士常致禮于幽人曹植論文每交歡于數子屬鑾輿拜日來朝太室之前玉檢停刋言返章華之路羣公以眷深王粲思邀祖道之歡下走以遇重荀慈謬奉芳筵之醴于時青陽二月黄鳥羣飛殘霞將落日交暉逺樹與孤烟共色江山萬里眇然荆楚之塗城邑三春去矣伊瀍之地既而朱軒不駐緑蓋行遥琴罇之清讌已疲珠玉之芳言未贈請各陳志以序離襟人部傷逝唐杜甫八哀詩故司徒李公光弼司徒天寶末北收晉陽甲胡騎攻吾城愁寂意不愜人安若泰山薊北斷右脅朔方氣乃蘇黎首見帝業二宫泣西郊九廟起頺壓未散河陽卒思明偽臣妾復自碣石來火焚乾坤獵髙視笑䘵山公又獻大㨗異王冊崇勲小敵信所怯擁兵鎮河汴千里初妥帖青蠅紛營營風雨秋一葉内省未入朝死淚終映睫大屋去髙棟長城掃遺堞平生白羽扇零落蛟龍匣雅望與英姿惻愴槐里接三軍晦光彩烈士痛稠疊直筆在史臣將來洗箱篋吾思哭孤冢南紀阻歸檝扶顛永蕭條未濟失利渉疲苶竟何人灑淚巴東峽又贈左僕射鄭國公嚴公武詩鄭公瑚璉器華嶽金天晶昔在童子日已聞老成名嶷若大賢後復見秀骨清開口取將相小心事友生閲書百氏盡落筆四座驚歴職匪父任嫉邪常力争漢儀尚整肅胡騎忽縱横飛傳自河隴逢人問公卿不知萬乘出雪涕風悲鳴受詞劒閣道謁帝蕭關城寂寞雲臺仗飄颻沙塞旌江山少使者笳鼔凝皇情壯士血相視忠臣氣不平密論貞觀體揮發岐陽征感激動四極聯翩收二京西郊牛酒至原廟丹青明匡汲俄寵辱衛霍竟哀榮四登㑹府地三掌華陽兵京兆空栁色尚書無履聲羣鳥自朝夕白馬休横行諸葛蜀人愛文翁儒化成公來雪山重公去雪山輕記室得何遜韜鈐延子荆四郊失壁壘虚舘開逢迎堂上指圖畫軍中吹玉笙豈無成都酒憂國祇細傾時觀錦水釣問俗終相并意待犬戎滅人藏紅粟盈以兹報主願庶獲禆世程烱烱一心在沈沈二䜿嬰顏囘竟短折賈誼徒忠貞飛旐出江漢孤舟轉荆衡虚無馬融笛悵望龍驤塋空餘老賔客身上愧簮纓梁沈約悼亡詩秋去三五月今秋還照梁今春蘭蕙草春來復吐芳悲哉人道異一謝永銷亡簾屏既毁撤帷席更施張遊塵掩虚座孤帳覆空牀萬事無不盡徒令存者傷陳何胥傷章公大將軍詩十萬横行罷三千白日新短簫應出塞長笛反驚隣槐庭慘芳樹舞閣思陽春所悲金谷妓坐望玉關人隋薛徳音悼亡詩鳯樓簫曲斷桂帳瑟絃空畫梁纔照日銀燭已隨風苔生履跡處花没鏡塵中惟餘長簟月永夜何朦朧陳張正見傷韋侍讀詩懷經侍北海藴義盛西河髙峯落迴照逝水役驚波栁下悲風急山陽秋氣多宿草摧書帶寒松脆女蘿無復華隂市空餘蒿里歌隂鏗和悼亡詩畫梁朝日盡芳樹晩花辭忽以千金笑長作九泉悲鏡前塵劇粉機上網多絲户餘雙入燕牀有一空帷名香不可得詎見反魂時江總在陳旦解酲共哭顧舍人詩獨酌一罇酒髙詠七哀詩何言蒿里别非復竹林期階荒鄭公草户閴董生帷人隨暮槿落客共晩鶯悲年鬢兩如此傷心詎幾時唐禇亮傷始平李少府正己詩勞息本相循悲歡理自均誰能免𤣥夜惜爾正青春邁徳惟家寶生才諒國珍髙文綴翡翠茂學掩麒麟述作紛無已言談妙入神斷腸雖累月分手未盈旬輔嗣俄長徃顔生即短辰聲華滿昭代形影委窮塵禪草迴中使生芻引弔賔同遊秘府日方駕直城闉並拜黄圖右分曹清渭濵風期嵇呂好存沒范張親虚座懷王述遺篇慟景純精靈與豪翰千祀壽何人王勃傷裴録事喪子詩蘭堦霜候早松露穸臺深魄散珠胎没芳銷玉樹沈露文晞宿草煙照慘平林焚芝空歎息流恨滿籝金盧照隣哭明堂裴主簿詩締歡三十載通家數百年潘楊稱代穆秦晉忝姻連風雲洛陽道花月茂陵田相悲復相樂交騎共交筵始謂調金鼎如何掩玉泉黄公酒壚處青眼竹林前故琴無復雪新樹但生煙遽痛蘭襟斷徒令寶劍懸客散同秋葉人亡似夜川送君一長慟松臺路幾千盧照隣同崔録事哭鄭員外詩文學秋天逺郎官星位尊伊人表時彥飛譽滿司存楚席光文雅瑶山侍討論鳳詞陵漢閣龜辨罩周園已陪東岳駕將逝北溟鯤如何萬化盡空歎九飛魂白馬西京驛青松北海門夜臺無曉箭朝奠有虚樽一代儒風沒千年隴霧昏梁山送夫子湘水弔王孫僕本多悲泪沾裳不待猨聞君絶絃曲吞恨更無言鄭愔哭郎著作詩詩禮康成學文章賈誼才已年人得夢庚日鳥為災書草藏天閣琴聲入夜臺荒階羅駮蘚虚座網浮埃白馬賔徒散青烏隴隧開空憐門下客懷舊幾遲逥趙彥昭哭僕射鄂公楊再思詩兩揆光天秩三朝奉帝熈何言集大鳥忽此喪元龜坐歎公槐落行聞宰樹萎壑舟今已去寧有濟川時王維過山居哭沈居士詩楊朱來此哭桑户返於真獨自成千古依然舊四隣閒簷喧鳥雀故榻滿埃塵曙月孤鶯轉空山五栁春野花愁對客泉水咽迎人善卷明時隱黔婁在日貧逝川嗟爾命丘井歎吾身前後徒言隔相悲詎幾晨杜甫哭嚴僕射歸櫬詩素幔隨流水歸舟返故京老親如夙昔部曲異平生風送蛟龍雨天長驃騎營一哀三峽暮遺後見君情又哭李尚書之芳詩漳濵與蒿里逝水竟同年欲挂留徐劔猶逥憶戴船相知成白首此别間黄泉風雨嗟何及江河涕泫然修文思管輅奉使失張騫史閣行人在詩家秀句傳客亭鞍馬絶旅櫬網蟲懸復魄昭丘逺歸魂素滻偏樵蘇封塟地喉舌罷朝天秋色凋春草王孫若箇邊劉長卿雙峯下哭故人李宥詩憐君孤塚寄雙峯埋骨窮泉復幾重白露空沾九原草青山獨閉數株松圖書經亂知何在妻子移家失所從惆悵東皋却歸去人生無處更相逄又哭張員外繼詩慟哭鍾陵下東流與别離二星來不返雙劍沒相隨獨繼先賢傳誰刋有道碑故園荒峴曲旅櫬寄天涯白簡曽連拜滄洲毎共思撫存憐齒稚歎逝顧身衰泉壤成終古雲山若在時秋風隣笛發寒日寢門悲世難愁歸路家貧緩塟期舊賔傷未散夕臨咽恒遲自此辭張邵何由見戴逵獨聞山吏部流涕訪孤兒公與夫人相次没於共州衞象傷李端詩才子浮生促泉臺此路賖官卑揚執㦸年少賈長沙人去門栖鳥災成酒誤虵唯餘封禪草留在茂陵家劉禹錫哭呂衡州時余方謫居詩一夜霜風凋玉芝蒼生絶望士林悲空懷濟世安人畧不見男婚女嫁時遺草一函歸太史旅墳三尺近要離朔方徙嵗行當滿欲為君刋第二碑元稹傷呂衡州詩鵰鶚生難敵沈檀死更香兒童喧巷市羸老哭碑堂鴈起沙汀暗雲連海氣黄祝融峯上月幾照北人喪白居易哭皇甫七郎中詩志業過𤣥晏詞華似禰衡多才非福禄薄命是聰明不得人間壽還留身後名渉江文一首便可敵公卿賈島哭孟郊詩身死聲名在多應萬古傳寡妻無子息破宅帶林泉塜近登山道詩隨過海船故人相弔後斜日下寒天張祜哭汴州陸大夫詩利劍太堅操何妨㧞一毛寃深陸機霧憤積伍員濤直道非無驗明時不録勞誰當青史上卒為顯詞褒許渾傷馮秀才詩旅塟不可問茫茫西隴頭水雲青草濕山月白楊愁琴信有時罷劍傷無處留淮南舊烟月孤棹又逄秋又傷楊攀處士詩先生憂道不憂貧白髪終為不仕身嵇阮沒來無酒客應劉亡後少詩人山前月照荒墳曉溪上花開舊宅春昨夜囘舟更惆悵至今鐘磬滿南鄰又傷李秀才詩曾醉笙歌日正遲醉中相送易相期菊花滿地人亡後菰葉連天客過時琴倚舊窗塵漠漠劍埋新塚草離離河陽酒熟平生事更向東流奠一巵李洞弔膳曹從叔郎中詩華省支殘俸寒齋辦祭稀安墳對白閣買石折朱衣蜀客彈琴哭江鷗入宅飛帆吹佳句逺不獨徧王畿鄭谷弔禮部常員外序詩臘雪初晴共舉盃便期攜手上春臺髙情惟怕酒不滿長慟可悲花正開曉奠鶯啼殘漏在風幃燕覓舊巢來杜陵荒草年年緑醉魄吟魂無復回陳陶哭王賛府詩白水流今古青山送死生驅馳三楚掾倐忽一空名金玉埋皋壤芝蘭哭弟兄龍頭孤後進鵬翅失前程愁變風雲色悲連鼓角聲落星辭聖代寒夢閉佳城伊昔來江邑從容副國英徳踰棲棘美公亞飲氷清大厦亡孤直羣儒憶老成白駒悲里巷梁木慟簮纓隴遂添新草珠還滿舊籝蒼蒼難可問原上晩烟横崔珏哭李商隱詩成紀星郎字義山適歸髙壤抱長歎詞林枝葉三春盡學海波瀾一夜乾風雨已吹燈燭滅姓名長在齒牙寒只應物外攀琪樹便著蜺裳上綘壇周朴哭陳庾詩繫馬向山立一杯聊奠君野煙孤客路寒草故人墳琴韻歸流水詩情寄白雲日斜休哭後松韻不堪聞又哭李端詩三年剪拂感知音哭向青山永夜心竹在曉烟孤鳳去劒荒秋水一龍沈新墳日落松聲小舊宅春殘草色深不及此時親執紼石門遥想淚沾襟元姚燧丞相塔喇哈追封淇陽王制改為改作緇衣何賴乎武桓拜後拜前赤舄未慚于周魯方歌功于清廟倐委魄于𤣥閭豈意少者沒而老者存益信神難明而理難測憐乃公獨傷于漠北誓爾後均胙乎淇陽嗚呼何但上下床盡餘子可束之髙閣如失左右手慨正人不作于下泉梁簡文帝與湘東王令威明昨宵奄復殂化甚可痛傷其風韻遒上神丰標映千里絶迹百尺無枝文辯縱横才學優贍跌宕之情彌逺濠梁之氣特多斯實俊民也一爾過隟永歸長夜金刀掩芒長淮絶涸去嵗冬中已傷劉子今兹寒孟復悼王生俱往之傷信非虗説劉孝儀從弟喪上東宮啟自碣宮陪宴釣臺從幸攀附鱗翼三十餘載茫昧與善一旦長辭劒匿光芒璧碎符采躬揺神筆親動妙思雖毎想南皮書憶阮瑀行經北館歌悼子侯不足擬此深仁齊兹舊愛梁簡文帝南康簡王薨上東宮啟常願陪承甲館同奉畫堂預得西苑賦文北場旋食豈謂不幸獨隔昭世異林有悲飛鳴斯切伏惟殿下愛睦恩深常棣天篤北海云亡騎傳餘藁東平告盡驛問留書嗚呼此恨復在兹日梁元帝荅晉安王書志異雙鸞之集遽切四鳥之悲松茂栢悦夙昔歡抃芝焚蕙歎今用嗚咽劉峻重答劉治書劉侯既重有斯難值余有天倫之蹙竟未之致也尋而此君長逝化為異物緒言餘論藴而莫傳或有自其家得而示余者余悲其音徽未沫而其人已亡青簡尚新宿草將列泫然不知涕之無從也隙駟不留尺波奄逝而秋菊春蘭英華靡絶故存其梗槩更酬其㫖若使墨翟之言無爽宣室之談有徵冀東平之樹望咸陽而西靡蓋山之泉聞絃歌而赴節但懸劒空隴有恨如何任昉王文憲集序皇朝軫慟儲鉉傷情有識銜悲行路掩泣豈直舂者不相工女寢機而已哉故痛深衣冠悲纒教義豈非功深砥礪道邁舟航沒世遺愛古之益友周庾信擬連珠蓋聞營魄不反燐火宵飛時遭獵夜之兵或斃空亭之鬼是以射聲營之風雨時有寃魂廣莫郡之隂寒偏多夜哭庾信思舊銘序至于東首告辭西陵長往山陽車馬望别郊門潁川賓客遥悲私路嵇叔夜之山亭尚多楊栁王子猷之舊徑唯餘竹林王孫塟地方為長樂之宮烈士埋魂即是將軍之墓昔嘗歡宴風月留連追憶平生宛然心目麟亡星落月死珠傷瓶罄罍恥芝焚蕙歎所望鐘沈徳水聲出風雲劒沒豐城氣連牛斗孀機嫠緯獨鳳一作鶴孤鸞閨深夜靜風髙月寒生平已矣懷舊何期匣中絃絶隣人笛悲庾信周故大將軍趙公墓銘言尋聴訟猶見寒棠還顧空營唯餘衰栁唐李商隠為李郎中祭舅竇端州文銅梁改秩錦里經時人去而琴臺壞棟文移而石室摧基劉𢎞之重銘葛廟王商之更立嚴祠詎言渭水之乖離竟絶西州之出入人部烈女晉書烈女傳論夫三才分位室家之道克隆二族交歡貞烈之風斯著振髙情而獨秀魯冊于是飛華挺峻節而孤標周篇于焉騰茂徽烈兼邵柔順無愆隔代相望諒非一緒然則虞興媯汭夏盛塗山有娀有㜪廣隆殷之業大姙大姒衍昌姬之化馬鄧恭險險作儉漢朝推徳宣昭懿淑魏代揚芬斯皆禮極中闈義殊月室者矣至若恭姜誓節孟母求仁華率傳而經齊樊授規而霸楚譏文伯于奉劒讓子發于分菽少君之從約禮孟光之符隱志既昭婦則且擅母儀宋謝莊孝武宣貴妃誄𤣥丘烟煴瑶臺降芬髙唐渫雨巫山鬱雲誕發蘭儀光啟玉度望月方娥瞻星比婺毓徳素里棲景宸軒處麗絺綌出懋蘋蘩修詩賁道稱圖照言翼訓姒幄賛軌堯門綢繆史館容與經闈陳風緝藻臨彖分微游藝殫數撫律窮幾躊躇冬愛怊悵秋暉展如之華實邦之媛唐張説延州豆盧使君萬泉縣主薛氏神道碑貞孝義烈之傳吉凶賔祭之儀一聞成誦紘綖紃組之制湆芼醖羞之品一見懸解至乃鶴廻清泛蠶聚崩雲月韻玫砧花穠綵樹婦人能事咸臻妙焉蘭行彰信于閨門蕙風滿盈于邦國又裴太尉母夫人神道碑有任姒之徳班左氏之才聖后臨朝召入宮闕拜為御正中宗踐祚歸養私門嵗時致禮媧皇集作后補天進參十亂少康嗣夏退叶三從晉朝公卿列拜虞潭之母周官音注近同韋逞之家周庾信譙國公夫人步陸孤氏墓誌銘七徳含章四星連曜敬愛天情言容禮典九日登髙作銘秋菊三元告始或誦春椒年十有四聘于譙國友其琴瑟愈恭節儉之心伐其條枚實秉憂勤之徳鄴地登髙之錦自濯江波平陽採桑之津躬勞蠶月星機北轉日轡西廽陽泉伏氣隂律沈灰鶴辭吳市鳳去秦臺神光離合燈影徘徊雙流反塟百兩廽旌少女離位夫人去城帷堂野設帳殿郊營山川竒事風月無情揺落丘隴荒凉封域樹樹秋聲山山寒色草短逾平松長轉直節墳方固園陵永植又周趙國公夫人紇豆陵氏墓誌銘河西斗絶觀津孤起章武賢臣安豐貴仕木樓千仞金山萬里紹慶邢姨基昌宋子施衿趙北待姆秦南紘綖禮數褕狄騑驂義超江汜仁流葛覃玉筐迎燕金籠助蠶敬愛純深端莊淑問有光國史無形喜愠舉案外恭停機下訓馨馥于蘭年華于蕣風雨消散神靈離絶婺女還星姮娥歸月左楹夕奠髙堂朝發空揚凌波更無逥雪下平曰隰髙平曰原西臨火井北望塞門猶垂雉服尚駕魚軒平原忽矣天道何言山廽地市路沒滕城松悲鶴去草亂螢生新雲别起舊月孤明賢墳永式節隴常貞又周安冒公夫人鄭氏墓誌銘三星在户百兩言歸䖍恭内政榮曜中闈承姑奉盥訓子停機桑園蠶績錦室鸞飛珩璜節歩藻火文衣巴水幽咽猿鳴斷絶月落珠傷春枯桂折趙瑟長辭秦簫永别貞姬掩隧節女封墳洛濵無月荆臺失雲鳥悲傷聴松聲愴聞千年遂古百代餘芬又周冠軍公夫人烏石蘭氏墓誌銘人世風煙山川超忽陵陂青麥儻逢貞女之墳隴首白楊或表賢姬之墓三星麗天五岳鎮地禮有其秩人居其位燕趙多竒山川雄氣挺兹令淑惟此含章玉生庭照蘭開室香邢姨褧服宋子河魴百兩言歸九儀從聘褕狄七彩軒車六命鼎室辭親槐庭賛政世為閲水人成大夢迥帳山門移燈泉洞金􅀥長含銀蠶永送香填栢槨路閉松城悲鸞獨影雄劒孤鳴留連趙瑟悽愴秦笙又周大傅鄭國公夫人鄭氏墓誌銘夫有安世之貴躬服浣濯子有文伯之尊無忘機杼又儀同松滋公拓䟦兢夫人尉遲氏墓誌銘昔西河女子值九節之菖蒲東海婦人得三山之芝草無由再遇悲矣如何又冠軍伯柴烈李夫人墓誌銘妻者齊也謂嫁曰歸三星夜照百兩朝飛褕狄有典容禮無違台庭等秩侯服同衣子奉母儀夫聞家政七族承和九閨連慶紛帨恭肅温凊孝敬杼秉秋成蠶隨春令年華未落電影先過徒飱日氣空飲天河星凋玉井月揜金波虞淵落日薤露哀歌寂寞虚奠荒凉象設幽隴龜封重泉蟻結秋色悽愴松聲斷絶百年何幾歸于此别又彭城公夫人爾朱氏墓誌銘玉臺貞氣金河仙液蔡中郎之女子早聴色絲謝太傅之閨門先揚麗則巫山南眺逢暮雨於瑶姬華嶽西臨降明星於玉女動合詩禮言成軌則晨昏展敬事極於移天蘋藻挈誠義申於中饋女郎砧石響明月而思秋風織婦機牀聴寒蛩而催絡緯用曹大家之明訓執宋伯姬之貞節加以心依八覺理㑹三空遊智刃於檀林泛仙舟于法海機神獨照嘿言象而無施空有兼忘束筌蹄而不用銀臺竊藥想奔月而何年玉釡煎香思返魂而無日唐張説司屬主簿博陵崔訥妻劉氏墓誌銘璇室載蘭蕙林層秀喈喈黄鳥豔豔清月明詩説禮竊比諸生茂行淵心實稱士女及鳳飛啟繇夫婦盡琴瑟之和鷄鳴咸纚舅姑移喬梓之敬友愛洽乎姒媦任恤周乎姻戚豈惟禮備澄羃工深機杼固以能循法度宜其室家矣又上邽縣君李氏墓誌銘帷堂而哭有敬姜之禮擇鄰而處有孟母之教入閭俟信有諸婦之期出言成章有衆女之誡鏡下穸臺衣緘泉笥壠煙不散松風長起又鄧國夫人墓誌銘家芳淑女國茂賢妃具瞻四德旁通八徽歩幛馳辨連環定機調絃魚躍弄杼鴛飛陳子昻袁州參軍李府君妻張氏墓誌銘青松摧抑哀斷女蘿之心丹節孤髙終守栢舟之誓而府君食先人之徳無厚生之財夫人徇黔婁之貞闕丹臺之產孀居永日蓬首終年處貧素而彌堅保幽芳而不昩令儀有穆惠問無諠敦雅志于詩書婉娩情於琴瑟若乃母師酒食之儀女工纂組之繁莫不總制清衷𢎞宣懿則茂蘋蘩之雅韻協沼沚之芳猷雖古稱敬姜詩云淑女論容比徳殆無以過王維工部楊尚書夫人王氏墓誌銘事姑至孝旁穆六姻為母深慈均養七子又汧陽郡太守王公夫人成氏墓誌世有明訓家無遺徳蕙心紈質豈曰師成螓首蛾眉抑惟天與同雲降雪常聞栁絮之詩獻嵗發春即賦椒花之頌言事舅姑宜其家室寢門纔闢筓六珈而問安擊鐘未晞具八籩而獻饋染朱與緑不愆公子之衣采藻及蘋有甚季姜之祭魚軒翟茀為諸侯之夫人鳴珮垂環對具國之君子綺跡寓目助選賢人青帳藩身用酬髙論誡良人之從田不嘗原獸訓愛子之為政遂返池魚言成大家之書行為衆婦之法至於彈琴製賦纂組攻書具舉百事之能仍居四徳之外古儷府卷五
