body:
  text: 古儷府卷七明王志慶編禮部總載梁徐勉上修五禮表臣聞立天之道曰隂與陽立人之道曰仁與義故稱導之以徳齊之以禮夫禮所以安上治人𢎞風訓俗經國家利後嗣者也唐虞三代咸必由之在乎有周憲章尤備因殷革夏損益可知雖復經禮三百曲禮三千經文三百威儀三千其大歸有五即宗伯所掌典禮吉為上凶次之賓次之軍次之嘉為下也故祠祭不以禮則不齋不莊喪紀不以禮則背死忘生者衆賓客不以禮則朝覲失其儀軍旅不以禮則致亂于師律冠婚不以禮則男女失其時為國修身于斯為急洎周室大壊王道既衰官守斯文日失其序禮樂征伐出自諸侯小雅盡廢舊章缺矣是以韓宣適魯知周公之徳叔侯在晉辨郊勞之儀戰國從横政教愈泯暴秦滅學掃地無餘漢氏鬱興日不暇給猶命叔孫于外野方知帝王之為貴末葉紛綸逓有興毁或以武功鋭志或好黄老之言禮義之式于焉中止及東京曹褒南宫制述集其散畧百有餘篇雖寫以尺簡而終闕平奏其後兵革相尋異端互起章句既淪俎豆斯輟方領矩步之容事滅于旌鼓蘭臺石室之文用盡于末既而中原喪亂罕有所遺江左草創因循而已釐革之風是則未暇伏惟陛下睿明啟運先天改物撥亂惟武經時以文作樂在乎功成制禮𢎞于業定光啟二學皇枝等于貴遊闢兹五館草萊升以好爵爰自受命迄于告成盛徳形容備矣天下能事畢矣明明穆穆無徳而稱焉至若𤣥符靈貺之祥浮溟機山之賮固亦日書左史副在司存今可得而畧也是以命彼羣才搜甘泉之法延兹碩學闡曲臺之儀淄上淹中之儒連蹤繼軌負笈懐鉛之彦匪旦伊夕諒以化穆三雍人從五典秩宗之教勃焉以興詔㫖云禮壊樂缺故國異家殊實宜以時修定以為永准但頃之修撰以情取人不以學進其掌知者以貴總一不以稽古所以歴年不就有名無實此既經國所先外可議其人人定便即撰次于是尚書僕射沈約等參議請五禮各置舊學士一人人各自舉學士二人相助抄撰其中有疑者依前漢石渠後漢白虎隨源以聞請㫖㫁决復以禮儀深廣記載殘缺宜須博論共盡其致更使鎮軍將軍丹陽尹沈約太常卿張充及臣三人同參厥務臣又奉别勅總知其事末又使中書侍郎周捨庾於陵二人復預參知若有疑義所掌學士當職先立議通諮五禮舊學士及參知各言異同條牒啟聞决之制㫖疑事既多嵗時又積制㫖裁㫁其數不少莫不網羅經誥玉振金聲義貫幽微理入神契前儒所不釋後學所未聞凡諸奏决皆載篇首具列聖㫖為不刋之則洪規盛範冠絶百王茂實英聲方垂千載寧孝宣之能擬豈孝章之足云隋潘徽江都集禮序禮之為用至矣大與天地同節明與日月齊照源開三本體合四端巢居穴處之前即萌其理龜文鳥跡以後稍顯其事雖情存易簡意非玉帛而夏造殷因可得知也至於秩宗三禮之職司徒五禮之官邦國以和人神惟敬道徳仁義非此莫成進退俯仰去兹安適若璽印塗猶防止水豈直譬彼耕耨均斯粉澤而已哉加以佃漁六學網羅百氏繼稷下之絶軌𢎞泗上之淪風賾無隠而不探事有難而必綜至于采標緑錯華垂丹篆刑名長短儒墨是非書圃翰林之域理窟譚叢之内謁者所求之餘侍醫所挍之逸莫不澄涇辨渭拾珠棄蚌以為質文逓改損益不同明堂曲臺之記南宫東觀之説鄭王徐賀之答崔譙何庾之論簡牒雖盈菁華盖鮮乃以宣條暇日聽訟餘晨娱情窺寳之鄉凝想觀濤之岸摠括油素躬披緗縹芟蕪刈楚振領提綱去其繁襍撮其指要勒成一家名曰江都集禮方可韜之頖水副彼名山見刻石之非工嗤懸金之已陋是知沛王通論不獨擅于前修寧朔新書更追慙于往册禮部明堂唐劉允濟明堂賦體神化以成規應靈圖而立矩度七筵以垂憲分四室而通輔合宫之典鬱乎軒丘重屋之儀崇于夏禹因殷成于五帝繼周道於千古答后土之嘉祥藹上雲之殊祉望仙閣之秀出瞻月觀之左峙鏤紅玉以圖芳肅龜壇而荐祀道不言而有洽物無為而自致訪子輿于前跡揆公玉之遺芳順春秋之左右法天地之圓方成八風而統刑徳觀四序而候炎凉跨東西而作甸掩二七以疏疆下臨星雨傍控煙霜翔鶤墜於層極宛虹拖于逰梁崑山之玉樓偃蹇曽何髣髴蒼海之銀宫煥爛安足翺翔于是覽時則徵月令觀百王綏萬姓肆類之典攸集郊禋之禮爰盛衣冠肅于䖍誠禮樂崇于景令三陽再啟百姓來朝𤣥纁霧集旌斾雲搖湛恩畢被元氣斯調羅九賓之玉帛舞六代之咸韶澤被翔泳慶溢煙霄穆穆焉煌煌焉粤自開闢未有若斯之壯觀者矣任華明堂賦其宫十二以象辰行水四周而為海堂筵楣徑可以見乾坤之籌策暑往寒來可以知六九之變改室也州之數窻也卦之在髙得黄鍾之實柱懸列星之彩畢千古之能事終一人之不宰至有虞之總章期夏后之太室殷重屋以五周太廟以七伊數君之餘制各殊途而並逸雖信美于當年是無取于今日别有清河絆鳥長沙求贄一作試討論公玉之圖錯綜伯喈之議倘繡桷之有漸庶青雲之可致王諲明堂賦徒觀其藻畫周設雕刻具美綺寮豁達以生風重檐周流以藏晷嶔崟﨑嶬狀崑岳含霧而挿天衢隆崇峍屼若蓬萊駕鼇而涌海水屹乎氤氲孤標紫氛琁題皓飾金鋪洞文拱星辰以端居傍眺白日慿軒檻以直視俯見青雲于沼明堂賦下之象地也以列五位之神上之法天也以配五方之帝稟太乙之威靈順隂陽之開閉左个右个分以寒暑之宜以筵以几度以堂室之際劉允濟萬象明堂賦睿哲惟唐受天之明究皇王之鴻休包宇宙之純精恢天禄以作乂攄元命之振英鼓黔雷以播氣運蒼昊而時成括闓陽與泰階襲三聖以光亨禮樂交通典謨洋溢天以洛視而龜書至地以河觀而龍圖出擁神休尊明號激清流揚茂實將大報于𤣥天享神祗以稱秩願卑宫而自處惟禋宗而是恤思致美于總章覽娵訾而法營室訪夏后之軌儀云廣四而修一彼宗周之有制聞或九而或七錯綜乎舊典經始乎玉律紹先志以髙興匪矜功而首出乃延公侯卿士藝人表臣而審其議焉咸以為明堂者明乎天道者也所以明有功表有徳崇大教發大政登假嚴經欽修宗祀非夫為己者也安可已乎粤正月庚午始創明堂之制焉考經緯之長策應黄鍾之旋宫穆穆四門可納四氣明明八窻均調八風靡金靡玉非磨非礱去隨侯之夜光明素質以為工思承天以接神故峻極乎皇穹䬃乎懿濞繣兮豐融雷承乾以震耀雲大壯乎其中非至聖之精誠孰能克勤乎此功宋虞通之明堂頌肅肅明堂惟國之光儀天矩地崇姬潤黄縣殷颺輝服夏擅芳無斁伊典有煥斯章緜緜教樞翳翳化紀聲沈五都風晦千祀我皇烝哉追孝創軌縟憲垂統光圖麗史宗祀既崇享配惟馨六樂荐和四圭流明殷殷華海鑒盥孚誠慶輝旁燭休光下盈唐崔融代宗奉御賀明堂成表臣聞昭昭上天五座列降神之府赫赫中國几筵開布政之宫自軒皇肇制帝堯嗣作歴虞夏而惟新在殷周而克壯斯在尊祖配帝從時統天節寒暑而吹律順隂陽以班令降及有漢頗採前章雖年惟屢豐而日不暇給過此以往寂寥無聲伏惟陛下興復舊邦光啟新邑萬物睹而聖人作百寳用而神靈滋遠肅邇安功成道洽泥金刻玉紀修中嶽之儀乗鑾駕龍更葺正陽之禮乾策坤策具稟宸聰左个右个親承叡式朴畧淹中莫能言其制度﨑嶇汶上疇克効其規模土事不文木事不鏤九柱自立豈藉瑯琊之飛二石潛開寧煩穀城之採板築星奔而化造斧斤風動而神助聖有通于上帝産無費于中人由是日抱紅輝雲叢紫靄霜毛下翥電翼羣飛夕見神光似對莊嚴之國晝聞仙響疑過數樂之天匪日而成衝霄特起仰浮圓笠俯鎮方輿金鸑鷟而將飛玉驪龍而若動三辰引曜相望于複道之間六氣氤氲旁魄于重檐之半可以發大教陳盛容㑹百神朝萬國比二儀而永固齊四序而偕行允所謂穆穆皇皇巍巍蕩蕩者矣又代百官賀明堂成上禮表上帝居髙懸太微之府先王建國闡宗祀之堂不有聖人誰其經始伏惟陛下尊祖揚禰嚴禋之徳再光統天順時布政之道尤急親紆睿思躬運𤣥模故能上合乾象下當坤策柱將扶而已立石未鑿而懸開丹鷟踶甍似鳴岐而逺至蒼虯繞棟疑出河而欲飛神光熠燿于向晩仙樂清泠而方晝月惟孟夏時属正陽張文物于闕庭震聲名于㝢縣聖皇戾止諸侯在列穆穆焉顒顒焉交喜氣于三靈動歡心于萬類者也臣等進窺朝典既逢嘗麥之辰旋顧野誠輕襲獻芹之禮謹上禮若干轝如别項滋踈鶴鼎味劣鱻庖何以延萐莆之涼契芝英之夀盧照隣歌明堂穆穆聖皇雍雍明堂左平右墄上圓下方調均風雨制度隂陽四窻八達五室九房南通夏火西瞰秋霜天子臨御萬玉鏘鏘禮部郊祀漢揚雄甘泉賦於是欽柴宗祈燎薫皇天招搖太一舉洪頥樹靈旗樵蒸焜上配藜四施東爥滄海西燿流沙北熿幽都南煬丹涯𤣥瓚觩䚧秬鬯泔淡肸蠁豐融懿懿芬芬炎感黄龍兮熛訛碩麟選巫咸兮呌帝閽開天庭兮延羣神儐暗藹兮降清壇瑞穰穰兮委如山張衡東京賦及將祀天郊報地功祈福乎上𤣥思所以為䖍肅肅之儀盡穆穆之禮殫然後以獻精誠奉禋祀曰允矣天子也乃整法服正冕帶珩紞紘綖玉筓綦㑹火龍黼黻藻繂鞶厲結飛雲之袷輅樹翠羽之髙盖建辰旒之太常紛飇悠以容裔六𤣥虯之奕奕齊騰驤而沛艾龍輈華轙金鋄鏤錫方釳左纛鉤膺玉瓖鑾聲噦噦和鈴鉠鉠重輪貳轄疏轂飛軨羽盖葳蕤葩瑵曲莖順時服而設副咸龍旂而繁纓立戈迤戛農輿輅木屬車九九乗軒並轂􅕈弩重旃朱旄青屋奉引既畢先輅乃發鑾旗皮軒通帛蒨斾雲罕九斿鈒㦸轇轕髶髦被繡虎夫戴鶡駙承華之蒲梢飛流蘇之騷殺總輕武於後陳奏嚴鼔之嘈囐戎士介而揚揮戴金鉦而建黄鉞清道按列天行星陳肅肅習習隠隠轔轔殿未出乎城闕斾已反乎郊畛盛夏后之致美爰恭敬乎明神爾乃孤竹之管雲和之瑟雷鼓鼝鼝六變既畢冠華秉翟列舞八佾元祀惟稱羣望咸秩颺槱燎之炎煬致髙煙于太一神歆馨而顧徳祚靈主以元吉晉郭璞南郊賦於是時惟青陽日在方旭我后將受命靈壇乃改步而鳴玉升金軒撫太僕揚六鸞齊八騄列五幡于一元兮靡日月乎黄屋矯陵烏以偵候兮整豹尾於後屬武騎仡以清道被練煥以波燭爾乃造曠場戾壇庭百寮山立萬乗雲縈延祝史肆玉牲登圓丘揖太清禮羣望告皇靈天澄其氣日朗其精飛亷鼓舞于八維兮豐隆擊節于九㝠祝融穆以肅侍兮陽侯澹以中停于是司烜戒燧火烈具炳宗皇祖而配祀増孝思之惟永郊寰之内區域之外雕題卉服被髮左帶駿奔在壇不期而㑹峩峩羣辟蚩蚩黎庶翹懷聖猷思我王度事崇其簡服尚其素化無不融萬物自鼓振西北之絶維隆東南之撓柱廓清紫衢電掃神宇風馬桂林抗旌琳圃五岳不足以題其勲九韶不足以贊其舞饗駭鬼神聲振丘隴倒景望風龍漢企踵爛若列星之環辰咸雲騰而海涌此盖和氣旁通𤣥羅潛總自然之感鼓而遂動唐崔立之南至郊壇有司書雲物賦矧器用陶匏藉以包茅光逾泰畤馨邁周郊朱火煬煙逺浮于華盖𤣥酒止水近映乎長旓徐彦伯南郊賦左日壑右星圃吹烈火于炎丘覿堅氷于委羽莫不匍匐我聲教駿奔我珪組納大荒之管鑰伏堪輿之扃户肇允神聖浸發葆命芬徳馨香崇庸祗敬吟蓼蕭以游握合枲一作台桑而藴正闗石和鈞飛沈翔泳擇明居之全法撰蒼渠之闕令則太階平而玉衡正也庶績洪凝賡歌浩作隂隲于下有孚顒若恢負勝之圖賁昭功之籥是以𤣥龜逰乎湍瀨丹鳥吟于觀閣芝房菌蠢而玉英景雲璀璨而金萼雙􅀈共觝一作抵之獸躑躅苑山一稃二米之穎紛拏畎壑邦誦中和甿歌小毖嵗合作噩日交長至遘朔旦之明期擇純陽之正地欲陳大旅展時事告紫宙之成功定皇天之寳位蜃鷩司典鳲鳩蕆職崇泰壇考星翼劃八卦以通道錯五行而辨域對越精祗森羅正直木巽火而殷薦豫乗雷以㒺極載師清野土訓掃㕓繚垣虹合參途電聨籠組帷以艾景覆皇邸以慶煙宫伯糾其禁内饔烹其鱻周廬攢構以戢孴列纛抗莖而翩綿繩繩都人濟濟多士九牧之守百蠻之子莫不絜一作挈鴈提羔攢驂噎軌紛鴻溶以騰逗叛遹皇而佁儗或駢肩而側足候吾君之戾止若葵藿之傾離光同江河之赴溟水也然後啟端門警仙蹕雙鳳矯首六龍齊膝青斾罥雲紅旌彗日鏘玉鸞之鳴轙按金雞之廣術傳畫角以啾嘈曳朱旗以駢坒蒲必切見呉都賦呵風伯令戒道制𤣥㝠使司律此靈祗所以保綏皇天所以宥密於是闢龍次幸蜺幬鶉鳥司表熊羆奉收皇帝乃彰畫黻襲大裘端玉珽肅珠旒翼翼穆穆遂臻乎圜丘躬孝享擁神休設天宗之六席援長發之二球盥以明水薦以香羞陳蒼璧而咸事藉白茅而闡幽絜騂旄之泔淡酌𤣥瓚之觩䚧盛哉神疑作坤言后亞獻極順天而見邸乳祥開曽沙業荐赫禮數于彤壼布徽音于紫縣率先于金簿之蠶謹覆以瑤筐之燕皇后介禮恭兹亞奠凝億兆之歡心注穹蒼之景盼紫㣲開兮天香滿神之來兮軒星纂候黄鍾兮雪飛調大吕兮風煖戛雲和之寳瑟吟孤竹之清管石麟夭矯團翠烟而上征蕤鳳㫚霍迓鴻釐之無算瑞氣蜿蜒于藪甸祥光熠爚于旄罕三觶終獻萬祗呈醺昇羽節導靈羣凝肆夏以青晷颺登歌而咽雲徽鸞鷖之颯沓致戩穀之絪緼杜甫朝獻太清宫賦太一奉引庖犧在右堯步舜趨禹馳湯驟鬱曽一作閟宫之嵂崒拆元氣以經構㫁紫雲而竦牆撫流沙而承霤紛隳珠而陷一作隠碧㸌波錦而浪繡森青㝠而欲雨赩色一作光炯而初晝于是翠蕤俄的藻藉舒就祝融擲火以焚香溪女捧壺而盥潄羣有司之望幸辨名物之難究瓊漿自間于粢盛羽客先來于介胄賈餗至日圓丘祀昊天上帝賦是時星昏東壁日躔南至爰命有司肅將祀事羅幄帟以雲黕駢罍俎以鱗次藉白茅兮取諸潔薦蒼璧兮象其類皇威允穆司儀辨等而以班明徳惟馨祝史陳辭而不愧覆玉葉之卿雲昭扶桑之初日齋心滌慮所以感無不通樂徧禮成故能神降之吉杜甫有事于南郊賦盖主上兆于南郊聿懐多福者舊矣今兹練時日就陽位之美又所以厚祖考通神明而已職在宗伯首崇禋祀先是春官修頌祗之書獻祭天之紀令泰龜而不昧俟萬乘之將履掌次閲氊邸之則封人考壝宫之㫖司門轉致乎牲牢之繫小胥專達乎懸位之使二之日朝廟之禮既畢天子蒼然視于無形澹然若有所聽又齋心于宿設將旰食而匪寧旌門坡陀以前騖彀騎反覆以相經頓曽城之軋軋軼萬方之熒熒馳道端而如砥浴日上而如萍掣翠旄于華盖之角彗黄屋于鈎陳之星神仙戌削以落羽魍魎幽憂以固扃戰岐慄華擺渭掉涇地回回而風淅淅天泱泱而氣青青甲胄乘陵轉迅雷於荆門巫峽玉帛清迥霽夕雨于瀟湘洞庭于是乘輿霈然乃作翳夫鸞鳳將至以沖融寥廓不可乎彌度聲明通乎純粹溟涬為之垠堮駟蒼螭而蜒蜿若無骨以柔弱奔烏獲而黝蟉徒有勢于殺縛朱輪竟野而杳冥金鋄成隂以結絡吹堪輿以軒輊槍寒暑以前却中營密擁乎太陽宸眷𦕈臨乎長薄熊羆弭耳以相䑛虎豹髙跳以虚攫上方將降帷宫之綝縭屏玉軑以蠼畧人門行馬以拱乎合沓之場皮弁大裘始進乎穹崇之幕衝牙鏗鏘以將集周衞轇轕而咸若月窟黒而扶桑寒田燭稠而曉星落肅定位以告潔藹嚴上而清超雲菡萏以張盖春葳蕤以建杓簪裾斐斐樽俎蕭蕭方面曲折周旋寂寥必本於天王宫與夜明相射動而之地山林與川谷俱標于是乎官有御事有職所以敬鬼神所以勤稼穡所以報本反始所以度長立極𤣥酒明水之上越席疏布之側必取先于稻秫麴糵之勤必取著于紛純文繡之飾雖三牲八簋豐備以相沿而蒼璧黄琮實歸乎正色先王之丕業繼起信可永其昭配羣望之徧祭在斯示有明其翼戴由是播其聲音以陳列從乎節奏以進退韶夏濩武采之于訓謨鍾石陶匏具之于梗槩變方形于動植聽宫徵于砰􅔫英華發外非因乎簨簴之髙和順積中不在乎雷鼓之大既而臠醟挂罥柴燎窟塊騞砉擘赫葩斜晦潰電纒風升雪颯星碎拂勿侹濙𣺌溟蓯淬聖慮岑寂𤣥黄増霈蒼生顒昂毛髪清籟雷公河伯或駓騃以修聳霜女江妃乍紛綸而晻曖執紱秉翟朱干玉戚鼓瑟吹笙金支翠旌神光倐斂祀事虚明於是涾􅀈乎渙汗紆餘乎經營浸朱崖而灑朔漠洶暘谷而濡若英耆艾涕而童子儛叢棘坼而狴犴傾是率土之濱覃酺醵以涵泳非奉郊之縣獨宴慰以縱横𤣥澤淡泞乎無極殷薦綢繆乎至精稽古之時屢應符而合契聖人有作不逆寡而雄成爾乃孤卿侯伯羣儒三老儼而絶皮軒趨帳殿稽首曰臣聞燧人氏已往法度難知文質未變太昊氏繼天而王根啟閉于厥初以木傳子攄終始而可見洎虞夏殷周兹煥炳而葱蒨秦失之于狼貪蠶食漢綴之以蛇㫁龍戰中莽茫茫夫何從聖蓄縮曽不下眷伏惟道祖視生靈之磔裂醜害馬之蹄齧呵五精之息肩考正氣之無轍協夫貽孫以降使之造命更挈累聖昭洗中祚觸蹶氣慘黷乎脂夜之妖勢迴薄乎龍蛇之孽伏惟陛下勃然憤激之際天闗不敢旅拒鬼神為之嗚咽髙衢騰塵長劒吼血尊卑配宇縣刷揷紫極之將頺拾清芬于已缺鑪之以仁義鍛之以賢哲聨祖宗之耿光卷夷狄之彯撇盖九五之後人人自以遭唐虞四十年來家家自以為稷禼王綱近古而不軌天聽貞觀以髙掲蠶爾差僭粲然優劣宜其課密于空積忽微刋定于興廢繼絶而後覩數統從首八音六律而惟新日起算外一字千金而不滅上曰吁昊天有成命惟五聖以受我其夙夜匪遑實用素樸以守于嗟乎麟鳳胡為乎郊藪豈上帝之降鑒及兹𤣥元之垂裕于後夫聖以百年為鶉鵓道以萬物為芻狗今何以茫茫臨乎八極眇眇託乎羣后端策拂龜于周漢之餘緩步濶視于魏晉之首斯上古成法盖其人已朽不足道也於是天子黙然而徐思終將固之又固之意不在抑殊方之貢亦不必廣無用之祠金馬碧雞非理人之術珊瑚翡翠此一物何疑奉郊廟以為寳増怵惕以孜孜况大庭氏之時六龍飛御而歸權徳輿朔旦冬至攝職南郊因書即事詩大明南至應天正朔旦圜丘樂六成文軌盡同堯厯象齋祠忝備漢公卿星辰列位祥光滿金石交音曉奏清更有觀臺稱賀處黄雲捧日瑞昇平李吉甫圜丘攝事合于中書後閣宿齋移止于集賢院㑹門下相公以七言垂寄因叙所懐奉寄詩淮海同三入樞衡過六年廟齋兢永夕書府㑹羣仙粉壁連霜曙氷池對月圓嵗時憂裏換鐘漏静中傳蓬髮顔空老松心契獨全贈言因傅説垂訓在三篇武元衡奉酬中書相公至日圜丘攝事宿齋叙懐見寄詩郊廟祗嚴祀齋莊覿上𤣥别開金虎觀不離紫微天樹古長楊接池深太液連仲山方補職文舉自傷年風澁銅壺漏香凝綺閣煙仍聞白雪唱流詠滿鵾絃又裴度詩翼亮登三命謨猷本一心致齋移秘府祗事見沖襟皓月當延閣祥風自禁林相庭方積玉王度已如金運偶唐虞盛情同丙魏深幽蘭與白雪何處寄庸音鄭谷丞相孟夏禮薦南郊紀獻十韻詩節應清和後郊宫事潔羞至誠聞上帝明徳祀圜丘雅用陶匏器馨非黍稷流就陽陳盛禮匡國稱鴻休漸曉蘭凝露微涼麥弄秋夀山横紫閣瑞靄抱皇州外肅通班序中嚴錫慶優升歌三酒備表敬百神柔池碧將還鳳源清再問牛萬方瞻輔翊共賀贊王猷梁簡文帝上南郊頌表雖周郊南甸宗伯之官徒設漢興北畤夤恪之道未隆而體元含極先後弗違典盛望禋禮通孝敬潔静之禮載光禘郊之風斯洽昔東平瑯琊著藻炎徳臨淄中山摛文魏美唐令狐楚為桂府王珙中丞賀南郊表臣聞禘嘗之禮所以仁祖禰也郊祀之儀所以尊天地也五帝之前蕢桴土鼓致其敬敬有餘矣而禮不足三王以降金罍玉斚備其禮禮有餘矣而敬不聞秦之増封也覬望神仙漢之郊丘也禳除災害雖無文而咸秩終有廢而莫舉猶可以編在方册垂其鴻名豈若國家㕘文質于六經之中陛下酌損益于百代之後既昊天之承疑作成命得黎人之歡心九穀有年四方無事然後因吉土迎長日咸池屢舞太蔟登歌萬靈識周旋之位百神知饗獻之節雲斂而柴燎髙達風清而蕭薌遠聞信大報之無私亦𤣥鑒之不昧當時集軍州官吏僧道百姓等丁寧宣示訖惟天之意莫遺于細微如日之輝不隔于幽逺頑鈍知感鬼神懐柔何則刑莫大于成獄陛下捨之罪無輕重恩莫深于延賞陛下推之澤及存殁行道求志敢于直言者既許以親覽觸綸罣網屏于遠方者又移之近郊減來嵗之新税昭其儉也棄七嵗之逋債𢎞諸仁也念勲臣而樹勲者益勸尊有徳而不徳者知慙賜羸老有粟帛之優禮神祗無牲幣之愛此所謂幽室盡曉枯條遍春雷雨作而蟄蟲昭蘇疾風行而窮鳥飛舞率土臣下不勝大慶况臣蒙被恩澤獲齒生類㑹守逺郡阻窺盛禮徘徊天外目與心㫁王晙賀南郊表燔燎洞合于神光日月共禎于瑞色宋宋祁賀南郊大赦表顧懐時憶瑞應日來亟修上儀若祗舊典戒期百職攽詔九州曳雲鳳之徜徉服翠虯之伴奐殊庭一獻諸祜徧躋遂自陽靈之宫往㑹天元之旦羽旄四合垓陛參登上璧左琮之華合袪而信祝祖蕝宗題之次更侑而迪嘗拜嘉胙于席垂列欽柴于雲表靈心合答熈典備成臣嚮觀舊史殫見往朝或不愛牲玉為恭殊非明薦或所過租賦為復盖出重勞語昔罕全訂今絶擬所恨清塵在望自苦周南之留紫槖仍持不與甘泉之從宋王安石賀南郊禮畢肆赦表精意上昭神靈底豫茂恩旁暢夷夏接和中賀臣聞道以饗帝為難禮以配天為至有秩斯祜唯四表之歡心胡臭亶時匪九州之美味自古在昔若聖與仁厥遭昌辰乃覩熈事恭惟皇帝陛下邁種三徳敷奏九功率籲奉璋之衆髦肇稱奠璧之新禮廟籩致孝郊血告幽誠既格于穹旻福遂均于品庶振憂矜寡原宥眚烖第五玉以褒封善人是富發三錢而慶賜賤者不虚天其居歆人以呼舞曽鞏賀熈寧十年南郊禮畢大赦表其功施于人效見于事則宅仁由義搢紳之徒成材于學校超距蹋鞠熊羆之旅養勇于營屯甌窶汚邪之收充于倉廩闗石和鈞之利阜于市㕓家有樂豫之聲人無愁怨之色協氣所召休應自殊鈎陳太微星緯咸若崑崙渤澥波濤不驚近則金石之音鳥獸欣躍逺則干羽之舞蠻夷駿奔象齒旅于闕庭龍媒納于閑廏是謂六府三事皆可以歌四海九州罔不率俾盖巍巍而特起非瑣瑣之能闚故寅畏嚴恭積之有素而齋明薰祓進而益䖍在于物者不取其煩盡諸已者必求其實是以蕭光之烈奏于宗祊柴燎之蒸焜于郊兆幽隠昭答神靈顧懐無疆惟休方寖昌于萬世不敢專享故敷錫于羣元梁簡文帝南郊頌龍官弱言之后合揆于蒼旻鳥紀垂衣之君昭格于上帝皇帝之御天下也塵清世晏蒼兕無所用其武功運謐時雍鴛鷺咸並修其文徳玉門罷候紫塞沈烽畫一之政萬代表于時和三章之律百姓沐於仁夀于是龍光之地日浴之鄉紫舌黄支頭飛鼻飲自西自南無思不服由是嘉祥被衆瑞發金人澤馬丹甑玉雞三角九尾四肩六足參差于郊藪布濩于宫闈乃以恭肅神祗理通孝敬江左以來爽塏未闢爰命將作揆日載營三靈叶響百工咸事宛如神造儼類仙居五達四通廓郊彌澤南瞻重岳北眺芒嶺東臨霸滻西望舊豐紆餘委蛇丘陵起伏澎湃嶤屼山川異態飛梁邃宇洞爥空懸紫殿仙宫霞鶱鳥翥霧映倒梁日光疎鈑玉桃卷葉銀樹抽芳百果千株三珠八桂朝葉與蜜露共鮮晚花與薰風俱落露禽乍聚望北翼之翺翔歸飛時宿聞同心之夜響故以熊熊灼灼炫兩明而仰七曜紛紛沐沐承五煙而帶三靈圓丘閒静紫壇肅設五精之場千神之位八堦𢎞麗四維博敞宛若千仞狀懸流之仙館煥如五彩同瑤山之帝壇石牒神昌之瑞方臻金縷飛光之徵永固是雕是琢鄙茅茨之為倫非珠非玉嗤甘泉之已奢望昔方今獨髙千古沿襲異等質文斯中於是嵗在單閼星次娵訾律中太蔟日惟辛卯特有事于南郊甸師清野封人壝宫朱幕夕峙帷宫宿設曉漢斜隂挈壺升漏天子御玉輅動金根八驥揚衡雙龍翼盖雲罕徐迴鳴鐃韻響風承豹尾日映鶡冠萬騎天行千乗雷動石鎧犀衣之士連七萃而雲屯珠旗日羽之兵亘五營而星列鬱鬱阡阡震震填填充溢乎國都彌漫于􅆵邑者也若乃迴輿降蹕荐禮帝儀揖太清秩羣望被大裘服山冕恭蒼璧之明祀穆靈壇之禋敬黍稷非馨明徳惟馨日曜彤精天澄翠色百僚師師九官濟濟千神叶福萬億均慶六典斯備三禮必該焚柴告成㒺不欽若翠煙升緑疑同河濱之瑞雲丹燎燭天若帝鄉之美氣雲門麗舞咸池廣樂已叶九韶之曲復諧六列之奏金匏既動望蜿蟬之遊龍玉磬徐鳴觀參差之舞鳳袿轊駕肩士女填噎接袂為幃連裾猶堵鼓腹擊轅行歌舞抃然後紆玉輦而謝書生登靈臺而望雲物欽明美化跨萬古于兹日廣運愉樂表千載于當今其辭曰肅恭明神逖聽前踵配天道尊迎陽義重𤣥酒陶匏燔柴雲聳跨舜論韶籠堯稱拱郊宫載静紫壇新謐肅肅禁闈隂隂仙室六戎列野八鑾昭日架殿星羅重宫霧出康哉徳盛美矣時豐三辰増曜七政永崇五方來洎四煥兹通懸繩度笮駕塵追風既敷懋化復覩瑞滋金車出野玉露霑墀紫脱神草華平瑞芝長愉汪濊永固雍熈唐王勃拜南郊賦三門遁甲黄公成不戰之師五壘神兵𤣥女下先登之策肅牙璋而按律輝旄節而分麾降南宫之元老裂西營之毅卒良將首路偏戎竟野軸轤萬里旌旗四合金緗玉匱司空慿首勝之威鶚視龍趨將軍仗萬全之畧負鼇丘而峻壁據黿壑而深溝一鼓而亭塞無塵七縱而江山失險伐罪以明而不以衆懐遠人于絶境均惠化于殊隣登若木以照臨折紅桃以延佇然後分州列鎮對明月以收營返斾旋戈部𤣥雲而振旅爰考吉日遂静行宫有司具典乗輿乃出撫𤣥虯戴翠鳳鼉鼔按節鯨鐘流響千乗嶽動萬騎林迴星陳而天行雷震而霧合是時未登夫太壇也迺齋帷宫宿帳殿華盖移影鈎陳從蹕千營夕布亘蒼野而烟凝萬幕宵懸背黄闉而霧列既而屏翳清曉飛廉警旦孫叔奉轡王良聳策雲藏星謐宇曠山明旌軒具照簫笳互凝陟名嶽以告成歴神丘而展事國容象物而動朝章視令而肅宸儀有睟虚徐大帝之庭列侍無譁髣髴華胥之國於是襲袞服戒俎豆端瑞班儼華旒樂懸六代禮備三古奠惟蒼璧藉用白茅鳴孤竹之簫管奏空桑之琴瑟感格以誠不以事動植咸驩敬神以道不以華天人合應然後駐聲名於上邑反文物于仙宫因雷雨而作施法雲天而用響風行電舉未寸景而浹九埏野抃途歌不崇朝而晏六合盧照隣歌南郊虔郊上帝肅事圓丘龍駕四牡鸞旗九斿鐘鼓晚引紫煬髙浮日麗蒼璧雲飛清球皇之慶矣萬壽千秋晉郊祀歌整泰壇禮皇神精氣感百靈賓藴朱火燎芳薪紫烟起冠青雲營泰畤定天衷思心睿謀筮從建表藴設郊宫田燭置雚火通歴元旬集首吉飾階壇坎列室周庾信方澤降神歌辭報功隂澤展禮𤣥郊平琮鎮瑞方鼎升庖調歌孤竹縮酒江茅聲揚鐘鼓器用陶匏列曜秀華凝芳郁荔川澤茂祉丘陵容裔雲飾山罍蘭浮沈齊日至之禮歆兹大祭闕祠靈星賦於是驗星紀稽帝文覩農祥之晨正彰土膏之脈分奠玉盃于青帝用潔牲于白雲列綴兆于峻舞徵歌頌于絲衣雕豆玉觴自殊器於宗祀青圭紺席乃叶禮於禳祈祭星附禮部社稷唐張餘慶祀后土賦隔嵗梅花氛氲于帳殿迎春楊栁搖曳於離宫戈横鐵騎旗掣長虹叠靈鼓於流水引繁笳于朔風甸師清野宗伯奉秩端旒垂綖左輔右弼修五禮之大道酌千靈之故實綵幣藻耀層壇崷崪黄琮展前以備陳白茅有藉而間出𤣥酒式降以尚本瑞圭不瑑音篆而貴質繁纓藻帶燦爛于祭容孤竹雲和鏗鏘于聲律鬱人獻爵司干授器據青野之雕阜肅黄祗之神位鼎氣歊雲神光燭地魏珠映天子之輦汾鴈入大夫之贄薰風偃草以浹洽遲景暄空而明媚河圖所以無隠天寳由其不秘豈比夫魯蜡有乖仲尼聞而發嘆漢祀多僻匡衡陳其用祥唐𤣥宗后土神祠碑往者漢氏之祠也牲以養牛五嵗蠒栗所以貴其誠藉以采席六重藁稭一作秸所以尚其質事與古及一作反義不經見朕因其地而不因其儀取其得而不取其失凡牲幣法物之事歌舞接神之類咨故實于方澤不遂過于元鼎此皆公卿大夫鴻生鉅儒獻其方聞匡于不逮朕何有也享於至誠錫以繁祉黄雲盖于神鼎降光燭于靈壇自昔已然乃今復見豈與夫封禪有牒專在求僊秘祝有辭密于移過而已隋牛𢎞祈社歌厚地開靈方壇崇祀逹以風露樹之松梓句萌既申芟柞伊始恭祈粢盛載膺休祉又祈稷歌粒食興教播厥有先尊神致潔報本惟虔瞻榆秉耒望杏開田方慿戩福佇詠豐年禮部封禪唐李義府在巂州遙叙封禪詩天齊標巨鎮日觀啓崇祠岧嶤臨渤澥隠嶙控河沂建嶽誠為長升功諒在兹帝猷符廣運𤣥範暢文思飛聲總地絡裁化撫乾維瑞策開珍鳳禎圖薦寳龜創封超昔夏修禪掩前姬東后方肆覲西都尊六師肅駕移星苑揚罕馭風司沸鼓喧平陸凝蹕静通逵汶陽馳月羽蒙隂警電麾巖花飄曙輦峰葉蕩春旗石閭環藻衞金壇映黼帷仙階溢秘秬靈檢耀祥芝三始貽遐貺萬嵗受重釐菲質陶恩奬趣迹奉軒墀觸網淪幽裔乗繳限明時周南昔已歎卭西今復悲宋之問扈從登封告成頌詩御路迴中嶽天宫接下都百靈無後至萬國競前驅文衞嚴清蹕幽仙讀寳符貝花明漢菓芝草入堯厨濟濟衣冠㑹喧喧夷夏俱宗禋仰神理凱樂望仙途撫已貧非病時來本不愚願陪丹鳳輦率舞白雲衢唐許敬宗勸封禪表粤自生民兆興司牧朱襄皓英之日黄軒葛天之世莫不雷鼗振響節萬舞于雲門大路脂輪籍千藁于嬴里使夫空桑孤竹仰鈞天而合奏十碑再累齊厚地以相終是以員精朗鑒睠欽明之同徳方祗効祉祚至仁之比義馳薰風而驛膏露靈心急于置郵驟澤馬而騖山車神物切于推轂帝道浸微淳風不競南茅北秬綿百世而寂寥升中告成歴千祀而湮墜使太山靡紀梁甫曠巡復盛禮于休明企來蘇于肆覲大夫之樹傾柔荑以望塵仙人之閭聳危峰而佇貺駱賓王為齊州父老請陪封禪表臣聞元天列象紫宫通北極之尊天帝凝圖𤣥猷展東巡之禮是知道隆光宅既輯玉于雲臺績劭禋宗必塗金于日觀河浮五老啟赤文于帝期海薦四神奉丹書于王㑹瑞開三脊祥洽五靈既而緝總章之舊文捃辟雍之故事非烟翼軫移玉輦于梁隂若月承輪祕金繩于岱巘鄒魯舊邦臨淄遺俗俱穆二周之化咸稱一變之風境接青疇俯瞰獲麟之野山開翠岊斜連辨馬之峯豈可使稷下遺甿頓隔陪封之禮淹中故老獨奏告成之儀是用就日披丹御壁輪之三舍望雲抒素呌天門於九重倘允微誠許陪大禮則夢瓊餘息翫仙閭以相驩就木殘魂遊岱宗而載躍上官儀勸封禪表臣聞乾元惟大播四序而無言坤儀盖厚寧萬象而得一至于號均三大體覆載以曲成聖表千齡順剛柔以藏用是以可久可大永固皇王之緒貞觀貞明獨照陶鈞之上故可登封泰嶽類帝以尊天降禪肅然禋宗以厚地伏惟陛下膺圖紹籙儀天纂鏡受昭華而光寳位正璣衡而握金符銷伏鼇而綴上𤣥剪應龍而清下瀆于是靈臺偃伯暢轂埋輪刑政肅清削秋荼之繁廡雅頌光烈激圓海之漪瀾就月幽覃則燭龍開景薰風遠暢則蟠木増華没羽浮金之章昭載筆于仙室韋韝卉袵之首襲長纓于蘭錡九疇式序七徳攸宣發神化之丹青敷禮義之粉澤既而睿徳潛通至誠冥召禎圖載啟神物發揮雙觡呈班馴擾于君囿九芝獻彩燭耀于帝池太史標祥鏡流千里卿雲表貺凝華五色江茅鄗黍嵗時鱗萃東鰈西鶼日月波屬鴻符巨慶疇可詳言誠迺岱郊佇遂云坰望蹕某等永言遐載緬鏡前徽王迹之所葳蕤帝圖之所凝遠龍官結繩之后鳥紀垂衣之君治定功成俱肅升中之禮塵清海晏咸申謁欵之誠異世同符干載一揆諒以増髙益厚式酬靈睠陛下徳光宙始文煥震初蓆蘿而因萬物典裒而濟下元鎔範生靈張四維于地絡締構函夏建八柱于𤣥樞宏視絶跡功無與二駕三五而遙集超八九而騰驤加以瑤厯啟微躔南至于朔旦金鼓問罪削左袵于交河固可恭柴燎之展采穆靈壇之禋敬焉得徇小節於沖挹忘至公之鴻典絶三神之歡拒萬方之志雖復翹心天路未留三舍之感延佇帝閣逾邈九霄之望伏惟陛下紆瑤池之𣺌轡屈姑射之凝神酌令典于中樽遵時邁于嬴里採公卿之嘉議覽搢紳之讜辭逸記重甄頺章再紐詔雨師以先路命風伯以清塵六飛案軌九旗齊列榮光承幰非烟翼衡輯瑞而嘉肆覲瘞玉而恭儲祉方使日觀増華仙閭改飾神光霄映若流照于春陵雲色盡開似凝暉于豐谷表咸池於翠岊萬嵗叶其殷薦席藁秸于紫壇八神歆其明祀籠千古之偉觀孕七百之丕業某等命與時偕濯景昌運優游渠閣之内怊悵南風之絃棲息蓬山之阿弋釣先皇之道至于朝獻國紀頗踐奥隅陛下推而不居竊所未喻鬱云梁之典缺懐庭之儀沮神主之欲漏貪天之議伏願杲其日出照其傾陽之心油然作雲降其離畢之澤庶使飛英騰茂秘玉檢而遐傳手舞足蹈扈翠華於喬嶽岑文本勸封禪表伏願順萬國之歡心膺三靈之睠命備天官以周衞盛輿服以巡遊五輅齊列六龍按轡瞻岱郊而啟軔指嬴里為一息詔卿士延禮官設壇場陳玉帛禋六宗而報上帝班五瑞以朝諸侯成天下之壯觀紹帝王之盛節俾夫山稱萬嵗壇燭神光播厚福于無窮揚鴻徽于來裔髙若思勸封禪表伏願褰旒冩照洽羣請于帝俞闢纊垂矜遂微懇於人欲騰兹璽誥激彼天波徵萬玉以警塗詔八神而弭策藉江茅而陳鄗黍飾蒼璧而奠黄琮馳萬嵗以飛聲接九重而嫓美使編珠毓貺開麗色于金泥觸石凝禎蕩浮華于石䃭式昭昌祚永播鴻名凡在生靈義深聳踊崔融代宰相賀尊號表于是靈命孔彰𤣥心㧾集山開秘篆洛出祥圖毎纓冕同觀軒墀共謁則有曦車五色對玉匣而如遲雲盖三層伴瓊緘而不去張説大唐封禪壇頌帝乃揖之曰欽崇天道俯率嘉誥恐徳不類敢憚于勤其撰巡狩之儀求封禪之故既而禮官不誡而備軍政不謀而輯天老練日雨師洒道六甲按隊八神警蹕孟冬仲旬乗輿乃出千旗雲列萬㦸林行霍濩燐爛飛熖揚精原野為之震動草木為之風生歴郡縣省謠俗問耆年舉百祀興墜典葺闕政攸徂之人室家相慶萬方縱觀千里如堵城邑連歡丘陵聚舞其中垂白之老樂過以泣不圖蒿里之魂復見乾封之事堯雲往舜日還神華靈鬱瀾漫乎穹壤之間累封壇于髙岡築泰壇于陽阯夫其天壇三襲辰陛十二咸秩衆靈列座有次崇牙樹羽管磬鏞鼓宫懸于重壝之内干戚釵殳鈎㦸戣戵周衞于四門之外代國重器傳代絶瑞旅之于中庭玉輦金轂翠冒黄屋夾之於端路庶官百辟羌夷蠻貊褒成之後讓王之客叙立于禮神之場髦頭弩牙鐵馬金鏃介胄如雪旗幟如火遠匝于清禁之野於是乎以天正上元法駕徐進屯千乘于平路留羣臣于谷口皇帝御六龍陟萬仞獨與一二元老執事之人出天門臨日觀次沆瀣宿巉巖赤霄可接白雲在下金奏作佾羽舞撞黄鐘歌大吕開閶闔與天語請將信公奉斗布度懋建皇極勤恤蒼生招嘏乎未兆禳災乎未萌上下傳節而禮成樂遍福夀同歸而帝賜神策乃檢玉牒於中頂揚柴燎于髙天庶衷誠而上達若慿熖而駕煙日轡方旋神心餘眷五色雲氣拂馬而隨人萬嵗山呼從天而至地謝偃玉牒真記我聖王之受命也則九服翹心三靈竚睠振乾維以綴象舉地絡以籠人曩者炎運將終九域淪陷于是披丹霄而軒鵬翼駕𤣥海而截鯨鱗俯拔嵩華仰迴星漢納風雲于懐抱鼓雷電於胸臆流雕矢于日谷横文劒於天外所以八狄乘風九夷請朔固可以包鎮虞夏跨躡殷周今陛下乃欲貶惡百靈拒絶羣議虧厥真紀昧兹懿徳使泰山指望梁甫失幸金繩脱檢玉牒收文瑞日潛暉徳星晦色此非所以發榮舒徳應天順時垂裕百代激流千祀者也伏願陛下上祗天休下順坤徳叶羣靈之望從億兆之心清蹕云亭鳴鑾岱岳肆射牛之禮展大澤之詩垂紺幄而佇羣神謁紫壇而陳衆瑞使白雲朝起靈光夜燭應千齡之期流萬嵗之響則四溟受福天下稱泰明明聖範巍巍至徳𤣥化難名神功靡測上包乾蒙下括坤域五岳塵銷四溟波息仁風綿浹惠澤下霈船海極琛梯山窮貝九譯同徳萬里齊信宿彗收芒朝雲解陳階蓂晦落庭軼晨鮮氤氲和氣蕭索非烟輪重璧合星次珠聨鴻名始茂景祚方延霧闢雲㟁霞褰日觀山川効祉人神叶贊靈貺凝祥光華啟旦播美貞石馳芳柔翰徳盈彌損道積逾中禮成斯大樂變推功讓為政始益寡謙終千齡展美萬古承風李嶠大周降禪碑正八柱之低昂理三光之盈縮乾坤一作象闗鑰于廡下品物鑪錘於堂一作掌内春生夏長循環奉亭毒之仁暑往寒來奔走赴財成之節干苞虎皮箭射貍首鞞鼔不作廟堂懸百勝之威尉候無虞征戍罷三邊之役恩澤流通教化洽著龍荒鼠徼覃㝢外之雍熈鳳穴麟洲奉寰中之度律遠安邇肅地平天成一作天平地成玉律調年珠囊叶紀棲京坻于隴畆逸馬牛于衢路惸嫠蒙餼班白不提閭閻無犬吠之驚風俗有鶉居之暇原隰驅軺之使採詩聽歌菑畬植杖之翁擊壤鼓腹和氣旁薄禎符肸蠁招一角五蹄之仁獸儀九苞六象之仙禽亳蟬出其祥麟昆田化其珍物日烏素毛而丹喙天龜𤣥甲而青純雲蒸霧涌拜九洛之璿圖電激雷奔受三清之寳册若乃山鶼海鯨石銘巖篆之符候月搖風連葉駢柯之祉神靈之所酬酢廣大之所荐成紛綸葳蕤紹至疊見董狐之窮墨罄簡書而未周夷吾之傾辯畢辭談而不盡包含藝文考練風俗採儒術徵禮官窺五嵗之典章覈四朝之制度叔孫掌事容成諏日以天册萬嵗二年臘月乙亥闢丹掖開紫微撫𤣥虯按黄道叶紀先路靈威並轂五戎促節旗常一作旌旗畫垂象之文六甲分營壁壘曖太隂之氣雷動海運天迴星轉踰鼎觀而南下望圭臺而左薄陸離方攘煥炳聿皇以届夫嵩陽萬乘停鑣百司就列文物隠地遺光滿于竹宫輿徒沸川輕壒埋于石柱山祗䕶野風伯清塵玉醴潛滋金砂闇涌神鐘驚曙峰巖傳九乳之音寒律移暄草樹動三陽之色藉陳蒩秸器用陶匏髙炎四施耀流沙而燭滄海廣樂六變來象物而降天神感霏烟瑞一作潏露之徵延薰風景星之祉戈矛山立玉帛星陳登澗沼之毛輯江淮之物禹會之殊方異俗俱執豆籩漢祠之偉獸珍禽悉加壇墠撫空桑之琴瑟􅆽鬱鬯之樽罍咸秩衆靈遍祀羣望席以黄琮為鎮書以青石為緘元封之謁欵一作欵謁方丘儀因東峙建武之推功太折禮視北郊陽烏珥而仙鶴飛紫雲騰而黄霧起靈之來兮如雨瑞之委兮如山方使炎農抱愧愕睨于梁甫之阿姚舜欽風延佇于崇髙之路盧照隣歌登封炎圖喪寳黄厯開璿祖武類帝宗文配天玉鑾垂日翠華陵煙東雲干吕南風入絃山稱萬嵗河慶千年金繩永結璧麗長懸禮部祭山川闕衛顗西岳華山亭碑文巖巖西嶽五顛次宗緒徳之尊太華優隆皇帝永思祀典孔明髙神肯宴圭璧贄通赫赫在上以畜萬邦惟嶽降神實生羣公卿士百辟纘業攸蒙帝命不違嵗事報功羣后命卿散齋外亭敬恭明祀以奉皇靈處所逼窄屑窣有聲神樂其静翛翬無形尊卑有序潔心致誠因繕舊室整頓端平在其板屋孰不加精天人同道萬祚來迎既受帝祉延於後生為龍為光顯乂王庭為公為侯福禄來成刻石紀號永享利貞後漢張昶西嶽華山堂闕銘易曰天地定位山澤通氣然山莫尊於嶽澤莫盛于瀆山嶽有五而華處其一瀆有四而河在其數其靈也至矣聖人廢興必有其應故岱山石立中宗繼統太華授璧秦胡絶緒白魚入舟姬武建業寳珪出水子朝喪位布五方則處其四列三條則居其中若廣袤竒蟲山經有紀矣是以帝王巡狩親五嶽而告至覲方后而考禮故經有望秩之禋典有生殖之祀盖所以崇山川而報功也四海一統天子秉其禮諸侯力政彊國攝其祭奉其邑曰華隂也久矣乃紀于禹貢而分秦晉之境秦鄙晉之西則曰隂晉晉邉秦之東則曰寧秦邑既遷徙禮亦如之二國力争以奉以祭其城險固基趾猶存故老之言未殞於民也逮至大漢受命克亂不愆不忘舊名是復率禮不越故祀是尊歴葉増修虔恭又備一禱三祝終嵗而四以迄于今而世宗又經集靈之宫于其下想喬松之疇是逰是憩郡國方士自遠而至者充巖塞厓鄉邑巫覡宗祝乎其中者盈谷溢谿咸有浮飄之志愉悦之色必雲霄之路可升而越果繁昌之福可降而致也故殖財之寳黄玉自出令徳之珍卿相是毓匪惟嵩髙降生申甫此亦有焉天有所興必先廢之故殷宗周宣以衰致盛是時也王業中缺大化陵遲郡縣既毁財匱禮乏庭廟傾壊壇場蕪穢祭祀之禮有缺焉于是鎮逺將軍領北地太守閺鄉亭侯段君諱煨字忠明自武威占此土慿託河華二靈是與故能以昭烈之徳享上將之尊銜命持重屯斯寄國討叛柔服威懐是示羣兇既除郡縣集寧家給人足户有樂生之歡朝釋西顧之慮而懐闗中之恃雖昔蕭相輔佐之功功冠羣后弗以加也遂解甲休士陣而不戰以逸其力修飾享廟壇場之位荒而復辟禮廢而復興又造祠堂表以參闕建神路之端首觀壯麗乎孔徹然後旅祀祈請既有常處雖雨霑衣而禮不廢於穆堂闕堂闕昭明經之營之不日而成匪奢匪儉惟徳是程匪豐匪約惟禮是榮虔恭禋祀黍稷芬馨神具醉止降福穰穰隋薛道衡祭江文引雙流而分九𣲖長四瀆而納百川自晉永嘉乾靈落綱蕞爾吳越僭偽相承陳賊叔寳世濟其凶士庶為其塗炭人神所以怨憤忝司九伐清彼一方分命將士乘流南渡仰慿靈佑咸蒙利涉今申命蒼兕躬總精鋭直趨金陵行登石首庶蛟螭竄于洲渚帷盖静于波濤江表克平海内清泰謹申禮薦惟神尚享禮部祀廟闕新修四晧廟記昔申后黜而小弁賦子朝寵而王室亂獻公從筮晉祀如線楚建遇讒芊姓累棋列于格言垂作殷鑒漢髙皇帝提三尺劔奮布衣夷秦剪項南面而帝及乎踈孝惠私趙王本根一搖海内失望向使安車空駕羽翼不來蹈金寒玦離之蹤成母愛子抱之計四百之祚岌乎殆哉非四公之髙名不能割漢祖肌膚之愛非留侯之竒策不能振大賢金玉之音然而顯晦異宜語黙殊用塗山玉帛有櫛風沐雨之勞陋巷簞瓢無被髮纓冠之責兼濟獨善相與背馳唯四先生兩有之矣往者明祠頺壊靡有孑遺太傅兼中書令許國公爰命經營不日而就棟宇甚美神形若生如裁兔鹿之書似指狼羊之喻松涼桂燠雲白霞丹坐視天倪時聞地籟周庾信拓拔儉神道碑桂棟杏梁緑墀青瑣按歌㑹舞鳳盖霓裳南浦送而行雲東風飈而零雨是知漢陽郡前非徒武侯之廟臨淄城下豈獨欒公之社唐裴度蜀丞相諸葛亮祠堂碑我未從虎時稱卧龍禮部宗廟唐杜甫朝享太廟賦初髙祖太宗之櫛風沐雨勞身焦思用黄鉞白旄者五年而天下始一歴三朝而戮力今庶績之大備上方采庬俗之謠稽正統之類盖王者盛事臣聞之於里曰昔武徳已前黔黎蕭條無復生意遭鯨鯢之蕩汨荒嵗月而沸渭袞服紛紛朝廷多閏者仍亘乎晉魏臣竊以自赤精之衰歇曠千嵗而無真人及黄圖之經綸息五行而歸厚地則知至數不可以久缺凡材不可以長寄故髙下相形而尊卑各異惟神㫁繫之于是本先帝取之以義壬辰既格于道祖乗輿即以是日致齋于九室所以昭達孝之誠所以明繼天之質具禮有素六官咸秩大輅毎出或黎元不知豐年則多而筐筥甚實既而太尉參乘司僕扈蹕望重闉以肅恭順法駕之徐疾公卿淳古士卒精一黕宗廟之愈深抵職司之所密宿翠華于外户曙黄屋于通術氣凄凄于前旒光靡靡於嘉栗階有賓阼帳有甲乙升降之際見玉柱生芝擊拊之初覺鈞天合律簨簴仡以碣磍干戚宛而婆娑鞉鼓塤篪為之主鐘磬竽瑟以之和雲門咸池取之至空桑孤竹貴之多八音循通既比乎旭日升而氛埃滅萬舞凌亂又似乎春風壯而江海波鳥不敢飛而𤣥甲􅝧嵺以岳峙象不敢去而鳴珮剡爚以星羅已而上乾豆以登歌美休成之既享璧玉儲精以稠疊門闌洞豁而森爽黒帝歸寒而激昂蒼靈戒曉而來往熈事莽而充塞羣心麌以振蕩桐花未吐孫枝之鸞鳳相鮮雲氣何多宫井之蛟龍亂上若夫生𢎞佐命之道死配貴神之列則殷劉房魏之勲是可以中摩伊吕上冠䕫卨代天之工為人之傑丹青滿地松竹髙節自唐興已來若此時哲皆朝有數四名垂卓絶向不遇反正撥亂之主君臣父子之别奕葉文武之雄注意生靈之切雖前輩之温良寛大豪俊果决曾何以措其筋力與韜鈴載其刀筆與喉舌使祭則與食則血若斯之盛而已爾乃直于主索于祊警幽全之物散純道之精盖我后常用惟時克貞膋以蕭合酌以茅明嘏以慈告祝以孝成故天意張皇不敢殄其瑞神姦妥帖不敢秘其精而撫絶軌享鴻名者矣于以奏永安于以奏王夏福穰穰于絳闕芳霏霏于玉斚沛枯骨而破聾盲施殀胎而逮鰥寡園陵動色躍在藻之泉魚弓劒皆鳴汗鑄金之風馬霜露堪吸禎祥可把曽宫歔欷隂事儼雅薄清輝于鼎湖之上静餘響于蒼梧之野窅然漠漠惕然兢兢紛益所慕若不自勝瞰牙旗而獨立吟翠駮而未乘五老侍祠而精駭千官逖聽而思凝于是二丞相進曰陛下應道而作惟天與能澆訛散淳朴登尚猶日慎業業孝思烝烝恐一物之失所懼先王之咎徵如此之勤恤匪懈是百姓何以報夫元首在臣等何以充其股肱且如周宣之教親不暇孝武之滛祀相仍諸侯敢于迫脅方士奮其威稜一則以微弱内侮一則以輕舉虚馮又非陛下恢廓緒業其𤨏細亦曷足稱丞相退上跼天蹐地授綏登車伊澒洞槍櫐先出為儲胥本枝根株乎萬代睿想經緯乎六虚甲午方有事于綵壇紺席宿夫行所如初已上宗廟徐彦伯送特進李嶠入都祔廟詩特進三公下台臣百揆先孝圖開寢石祠坐卜牲筵思急青綸賜徂裝紫槖懸綢繆金鼎席宴餞玉横川北斗分征路東山起贈篇樂池歌緑藻梁苑藉紅荃騎轉商巖日旌搖闗塞煙廟堂須鯁議錦節佇來旋唐吕温代齊賈二相賀遷獻懿二祖表臣聞國有事莫大於嚴祀禮有經莫大于尊祖夏殷得之以繁祉周漢用之以休明爰自魏晉迄于隋氏或以祚短而不及祧正或以時艱而未遑討論紛綸興謝綿曠載祀竟虚盛典允属昌期陛下道冠前王慶殷累聖奉無競之烈克廣鴻休瞻有赫之靈思正大典精誠感念旰食疇咨内㫁皇明俯裁羣議奉祖宗于常尊之地定昭穆于式序之宜清廟肅雍𤣥穹保佑奔走夷裔鼓舞生靈煥乎觀一代之光盛矣接千年之統劉禹錫代京兆李尹賀遷獻懿二祖表陛下濬發睿謩旁延正論爰詔多士㑹于中臺酌三禮之前文參百王之故事講貫斯定詢謀僉同備物展儀考祥視履配貴神于逺祖正尊位于始封廟貌有嚴禘嘗允穆示人以孝得禮之中既觀秩秩之容必降穰穰之福遷祔附禮部陵寢梁何遜經孫氏陵詩山鸎空曙響壠月自秋輝銀海終無浪金鳬永不飛閴閴今如此望望沾人衣唐王維過始皇墓詩古墓成蒼嶺幽宫象紫臺星辰七曜隔河漢九泉開有海人寧渡無春鴈不迴更聞松韵切疑是大夫哀杜甫行次昭陵詩舊俗疲庸主羣雄問獨夫䜟歸龍鳳質威定虎狼都天属尊堯典神功協禹謨風雲隨逸足日月繼髙衢文物多師古朝廷半老儒直詞寧戮辱賢路不﨑嶇往者災猶降蒼生喘未蘇指麾安率土盪滌撫洪鑪壯士悲陵邑幽人拜鼎湖玉衣晨自舉石馬汗嘗趨松柏瞻虚殿塵沙立暝途寂寥開國日流恨滿山隅宋傅亮修復漢諸陵教夫信陵之墳守衛無曠展季之壟採樵有刑彼匹夫懐道列國陪隸猶見禮異世取貴鄰邦漢髙撥亂反正大造區宇道拯横流功髙百代盛徳之烈義在不冺唐韓休梁宣帝明帝二陵碑陵谷驟改市朝無處荒墳巋然蔓草蕪没孟嘗尊貴獨愴雍門之言魏武英威空留士衡之弔有可悲矣禮部朝㑹唐白居易叔孫通定朝儀賦天地澄爽宫殿清曠風傳警蹕日麗天仗於是右陳列辟左立丞相東西分而則别文武儼以相向簪裾奕奕頌鵷鷺之具寮劒㦸森森列熊羆之名將帝容式展皇威克壯莫不上恭已以臨下下竭誠而奉上謝觀周公朝諸侯于明堂賦洞八闥以臨八極闢四門而來萬有所司備班品于庭除執事肅文物于前後及夫諸位散設三公最崇當中階而列位與羣臣而不同諸侯東階之東西面而北上諸伯西階之西東面而相向諸子應門之東而鶚立諸男應門之西而鶴望戎夷金木之户外蠻狄水火而位配九采外屏之右以成列四塞外屏之左而遙對朱干玉戚森聳以相参龍旂豹韜抑揚而相偝肅肅沈沈巒崇壑深烟收而卿士齊列日出而天顔始臨戴冕旒以當軒見八紘稽顙負斧扆而南面知萬國歸心於是鏘金石揚律吕動塤篪搖柷敔儼若思而山立悄不言而鴈序一拜一起嶽抃而齊傾舞之蹈之雷屯而復舉俄而翠華轉仙仗迴恩覃率土化溢九垓合蠻貊以畢至盡梯航以爰來彼禹有大室武作靈臺曷與此而同哉梁簡文帝守東華開門詩脂車向馳道揔轡息東華落闗猶待漏交㦸未通車薄雲初啟雨曙色始成霞壍流鋪紫若城風泛橘花弦誦終無取顧已自懐嗟周王褒入朝守開門詩直城通複道嚴駕早凌晨鐵符行警曙銀棨未開闉壍暗城無影晴新路不塵屯兵引畫劒騎吹動班輪徒知仰睿藻抽辭慙未申陳江總賦得謁帝承明廬詩霧開仁壽殿雲曉承明廬輪停紺幰引馬度紅塵餘香貂拜黻袞花綬拂𤣥除謁帝升清漢何殊入紫虚唐太宗正日臨朝詩條風開獻節灰律動初陽百蠻奉遐賮萬國朝未央雖無舜禹跡幸欣天地康車軌同八表書文混四方赫奕儼冠盖紛綸盛服章羽旄飛馳道鐘鼓震巖廊組練暉霞色霜㦸照朝光晨宵懐至理終愧撫遐荒又魏徵奉和詩百靈侍軒后萬國㑹塗山豈如今睿哲邁古獨光前聲教溢四海朝宗引百川鏘洋鳴玉珮灼爍輝金蟬淑景輝雕輦髙旌揚翠煙庭實超王㑹廣樂盛鈞天既欣東户日復詠南風篇願奉光華慶從斯萬億年又岑文本奉和詩時雍表昌運日正叶靈符徳兼三代禮功包四海圖踰沙紛在列執玉儼相趨清蹕喧輦道張樂駭天衢拂蜺九旗映儀鳳八音殊佳氣浮仙掌薰風繞帝裾天文光七政皇恩被九區方陪瘞玉禮珥筆岱山隅鄭愔早朝詩瑞闕龍車峻宸庭鳳掖深才良寄天綍趨拜侣朝簪飛舄看來影喧車識駐音重軒輕霧入洞户落花侵聞有題新翰依然想舊林同聲慙卞玉謬此託韋金又沈佺期詩閶闔連雲起巖廊拂霧開玉珂龍影度珠履鴈行來長樂宵鐘盡明光曉奏催一經推舊徳五字擢英才儼若神仙去紛從霄漢迴千春奉休厯分禁喜趨陪沈佺期和崔正諫登秋日早朝詩雞鳴朝謁滿白露禁門秋爽氣臨旌㦸朝光映冕旒河宗來獻寳天子命焚裘獨負池陽議言從建禮遊王維春日直門下省早朝詩騎省直明光雞鳴謁建章遙聞侍中珮暗識令公香玉漏催銅史天書問夕郎旌旗映閶闔歌吹滿昭陽官舍梅初紫宫門栁欲黄願將遲日意同與聖恩長竇叔向春日早朝應制詩紫殿俯千官春松應合歡御爐香熖暖馳道玉聲寒乳鷰翻珠綴祥烏集露盤宫花一萬樹不敢舉頭看司空曙和耿拾遺元日觀早朝詩元日争朝闕奔流若㑹溟路塵和薄霧騎火接低星門響雙魚鑰車喧百子鈴冕旒當翠殿憧㦸滿彤庭積嵗方編瑞乘春即省刑太官陳禹玉司厯貢堯蓂壽酒三聲退簫韶九奏停太陽開物象霈澤及生靈南陌髙山碧東方遠氣青自憐揚子賤歸草太𤣥經韓愈和庫部盧四兄曹長元日朝迴詩天仗宵嚴建羽旄春雲送色曉雞號金爐香動螭頭暗玉珮聲來雉尾髙戎服上趨承北極儒冠列侍映東曹太平時節身難遇郎署何湏歎二毛白居易行簡初授拾遺同早朝入門因示十二韻詩夜色尚蒼蒼槐隂夾路長聽鐘出長樂傳鼓到新昌宿雨沙堤潤秋風樺燭香馬驕欺地軟人健得天涼待漏排閶闔停珂擁建章爾隨黄閣老吾次紫微郎並入連稱籍齊趨對折方鬬班花接萼綽立鴈分行近職誠為美微才豈合當綸言難下筆諫紙易盈箱老去何徼幸時來不料量唯求致身地相誓答恩光鄭谷朝謁詩捧日整朝簪千官一片心班趨黄道急殿揖紫宸深威鳳迴香扆新鸎囀上林小松含瑞露春翠易成隂魏陳王曹植請赴元正表欣豫百官之美想見朝覲之禮耳存九成目想率舞唐岑文本三元頌攝提改度孟陬順紀歸餘既終獻嵗方始乃詔司存命掌故考憲章修法度三朝之禮畢陳九賓之儀咸具庭燎晃以飇舉明燈􅂱以星布爾乃月正元日節應勾芒浮祥煙而泛佳氣闢閶闔而敞徳陽虞賓光于列位呼韓厠乎班行百寮濟濟萬國皇皇腰金鳴玉執贄奉璋内自畿甸外被要荒輸賝王㑹納貢職方司儀之職無替臚人之列有章既伸睠于宸極亦矯首于巖廊猶川流之歸海若湛露之晞陽張崇牙設柷敔陳鼎實列樽俎梐枑肅而為衞戈鋋森以齊舉五輅接軫九旗揚斾羽盖葳蕤雲車晻靄發聲明于文物備威儀于冠帶禮部燕享隋薛道衡宴喜賦于時霜重庭蘭秋深氣寒横長河之耿耿挂孤月之團團乃有丹墀縹碧柘館椒宫徘徊宛轉掩映玲瓏妖姬淑媛玉貌花叢織女下而星落姮娥來而月空澄粧影于歌扇散衣香于舞風圖雲刻雷之樽漬桂釀花之酒拭珠瀝于羅袂傳金杯于素手李百藥笙賦玉饌厲而不爽金罍湛而將溢梁王僧孺侍宴詩迥鑾避暑宫下輦迎風館𣺌漫卿煙轉霏微商雲散蔓草亘巖垂髙枝起天半迴風稍驚水落花漸斜岸妙舞駐行雲清歌入層漢睟顔暢有懌徳音良已粲陳江總宴樂修堂應令詩肅城通甲觀承華啟畫堂北宫降恩賞西園度羽觴殊私奉玉裕終宴在金房庭暉連樹彩簷影接雲光仙如伊水駕樂似洞庭張彈絲命琴瑟吹竹動笙簧庸疎濫應阮衰朽媿連章又秋日侍宴婁湖苑應詔詩翠渚還鸞輅瑤池命羽觴千門響雲蹕四澤動榮光玉軸昆池浪金舟太液張虹旗照島嶼鳳盖繞林塘野静重隂閣淮秋水氣涼霧開樓闕近日迥烟波長洛宴諒斯在鎬飲詎能方朽劣叨榮遇簪笏奉同行梁何遜九日侍宴詩皇徳無餘讓重規習帝勲垂衣化比屋眷顧慎為君翾飛悦有道草木荷平分宸襟動時豫嵗序属涼氛城霞朝晃朗槐霧曉氛氲鸞輿和八襲鳳駕起千羣羽觴歡湛露佾舞奏承雲禁林終宴晩華池物色曛疏樹翻髙葉寒流聚細紋日斜迢逓雨風起嵳峩雲運偶參侯服恩洽厠朝聞於焉籍多幸嵗暮仰遊汾晴軒連瑞氣飛惹御香芬又庾肩吾詩轍迹光周頌巡遊盛夏功鈎陳萬騎轉閶闔九門通秋暉逐行漏朔氣遶相風獻壽重陽節迴鑾上苑中疏山開輦道間樹出離宫玉醴吹巖菊銀牀落井桐御梨寒更紫仙桃秋轉紅飲羽山西射浮雲冀北騘塵飛金埒滿葉破栁條空騰猨疑矯箭驚鴈避虚弓雕才濫杞梓花綬接鵷鴻愧乏天庭藻徒參文雅雄唐太宗春日𤣥武門宴羣臣詩韶光開令序淑氣動芳年駐輦華林側髙宴柏梁前紫庭文樹滿丹墀袞紱連九夷簉瑤席五狄列瓊筵娛賓歌湛露廣樂奏鈞天盈樽浮緑醑雅曲韻朱絃粤余君萬國還慙撫八埏庶幾保貞固虚己厲求賢李嶠奉和天樞成宴夷夏羣寮應制詩轍迹銘西弇勲庸紀北燕何如萬方㑹頌徳九門前的的臨黄道迢迢入紫煙仙盤正下露髙柱欲承天山類叢雲起珠疑大火懸聲流塵作刼業固海成田帝澤傾堯酒宸歌掩舜絃欣逢下生日還覩上皇年盧綸奉和麟徳殿宴百僚應制詩雲闢御筵張山呼聖壽長玉欄豐瑞草金陛立神羊台鼎資庖膳天星奉酒漿蠻夷陪作位犀象舞成行網已祛三面歌因守四方千秋不可極花發滿宫香張説奉和御製春曉宴兩相及禮官麗正殿學士探得開字詩聖政惟稽古賓門引上才坊因購書立殿為集賢開髦彦星辰下仙章日月迴字如龍負出韻是鳳銜來庭栁餘春駐宫櫻早夏催喜承芸閣宴幸捧栢梁杯張説奉和聖製送赴集賢院詩侍帝金華講千齡道固稀位將賢士説書共學徒歸首命深燕隗通經淺漢􅅊列筵榮賜食送客愧儒衣賀鷰窺簷下遷鸎入殿飛欲知朝野慶文教日光輝又賀知章詩西學垂𤣥鑒東堂發聖謩天光燭武殿時宰集鴻都枯朽霑皇澤翾飛舞碧梧跡同遊汗漫榮是出汙塗三歎承湯鼎千歡接舜壺微軀不可答空欲詠依蒲又劉昇詩圖書應明主策府宴嘉賓台曜臨東壁乾光自北辰網羅窮象繫述作究天人聖酒千鍾洽仙厨百品陳成山徒可仰涉海詎知津幸逢文雅盛還覩頌聲新又褚琇詩講習延東觀趨陪盛北宫惟師恢帝則敷教叶天工宣室恩嘗異金華禮更崇洞門清永日華紱接徽風蓮降堯厨翠榴開舜酒紅文思光萬宇髙議待升中虞世南侍宴應詔得前字詩芬芳禁林晩容與桂舟前横空一鳥度照水百花燃緑野明斜日青山澹晚烟濫得陪終宴握管類窺天杜審言蓬萊三殿侍宴奉勅詠終南山應制詩北斗挂城邊南山倚殿前雲標金闕迥樹杪玉堂懸半嶺通佳氣中峯繞瑞烟小臣持獻壽長此戴髙天趙彦昭立春日侍宴内出剪綵花應制詩剪綵迎初候攀條故寫真花隨紅意發葉就緑情新嫩色驚銜鷰輕香誤採人應為薰風拂能令芳樹春又宋之問詩金閣装仙杏瓊筵弄綺梅人間都未識天上忽先開蝶繞香絲住蜂憐艶粉迴今年春色早應為剪刀催又上官昭容詩葉密因裁吐新花逐剪舒攀條雖不謬摘葉詎知虚春至由來發秋還未肯疎借問桃將李相亂欲何如李嶠春日侍宴幸芙蓉園應制詩年光竹裏遍春色杏間遙烟氣籠青閣流文蕩畫橋飛花隨蝶舞艶曲伴鸎嬌今日陪歡豫還疑陟紫霄蘇頲九日侍宴應制詩嘉會宜長日髙遊順動時曉光雲半洗晴色雨餘滋降鶴因韶徳吹花入御詞願陪陽數節億萬九秋期沈佺期白蓮花亭侍宴應制詩九日陪天仗三秋幸禁林霜威變緑嶼雲氣落青岑水殿黄花合山亭絳葉深朱旗夾小徑寳馬駐清潯苑吏收寒菓饔人膳野禽承歡不覺暝遙響素秋砧張九齡奉和登封禪禮畢洛陽酺宴應制詩大君畢能事端扆樂成功運與千齡合歡將萬國同漢酺歌聖酒韶樂舞薰風河洛榮光遍雲烟喜氣通春花頻覺早天澤倍知崇草木皆霑被猶言不在躬唐𤣥宗左丞相説右丞相璟太子少傅乾曜同日上官命宴都堂賜詩詩赤帝收三傑黄軒舉二臣由來丞相重分掌國之均我有握中璧雙飛席上珍子房推道要仲子訝風神復輟台衡老將為調䕶人鴛鸞同拜日車騎擁行塵樂聚南宫宴觴連北斗醇俾予成百揆垂拱問彛倫又源乾曜奉和御製詩睿作超千古湛恩育萬人遞遷齊荷澤同拜忽為鄰道洽音徽暢芳馳景命新鼓鐘重享禮鴛鷺集朝倫竊位思官謗凋容謝木春慙多無以叙拙實固難陳進級懐三少承光盡百身自當歸第日何幸列宫臣王昌齡夏月花萼樓酺宴應制詩土徳三元正堯心一國同汾隂備冬禮長樂應和風賜慶垂天澤流歡舊渚宫樓臺生海上簫鼓出天中霧曉筵初接宵長曲未終雨隨行羃合月影舞羅空玉陛分朝列文章發聖聰愚臣忝書賦歌詠頌絲桐唐宋璟三月三日為百官謝賜宴表萃帟文茵俱來天上嘉肴清酤亦自大官常袞謝賜宴表臣聞禮之制也以飲食親宗族詩之義也以愷樂宴嘉賓以通上下之情以展君臣之義錢翊為宰相謝内宴表我心則悦洞開咫尺之顔不醉無歸畢降獻酬之禮又為兩省官謝内宴表忘憂而飲備六清既飽而羞踰百品戒膳夫之失飪詔酒正以如澠賜者鮮闕行之皆徧飾喜則聲從禹律製曲則音自堯聰樂和而鳳鳥應來舞妙而薫風共轉曲形文字全為生靈承天詔以咸觀兼聞金石泛恩波而已醉不待罇罍柏梁殿惟召詞臣華林園亦非密座共當異寵難並兹辰李嶠為姚疇等上禮食表瞻鳳闈而列鼎抗龜浦而開筵風光滿佳麗之城烟霧上神仙之閣傾罍倒斝盡百辟之歡娛伏檻馮軒延九霄之眺矚五日開十旬之賞千齡逢萬嵗之期又為孔禎等上獻食表和如九沸美異八珍有慙殷鼎之滋豈益堯厨之膳陳子昂為建安郡王獻食表白茅微藉願享于鈞臺潢汙菲誠思奉于瑤水伏知金雞瑞鼎盈上帝之珍羞玉女行厨盡羣仙之品味以兹菲薄有陋蘋蘩多慚在藻之歡竊有獻芹之志李邕謝賜逰曲江宴表順發生之時𢎞在鎬之宴仙厨和鼎浹洽于廣筵舜瑟歌風均調于法曲吕温代百寮謝許游宴表令行如春神應若響寒木暉潤嚴風變和始覺飛沈之樂宇宙之寛物自不疑人知所措在宗載考夜飲承湛露之恩求友相鳴時宴奉需雲之慶白居易九日謝賜曲江宴㑹狀樂感形骸歡容動而成舞榮均草木秋色變以為春徒激丹心豈報𤣥澤張説先天酺宴序原夫樂生于心非因結風之奏和達于氣無待陽春之節盖澤之所及者深則情之所感者遠是日六樂振作萬舞苒弱鳥獸徘徊士女踴躍則知衆庶觀聽之所樂㫖酒絡繹大庖燔炙芳溢風烟醉流阡陌則知衣冠酣暢之所適也由近而視遠萬國之慶皆然自明而察幽三靈之歡可接張説季春下旬詔宴薛王山池序泉賙御府味給天厨仙倡侑樂中貴督酒太平佳事前史未書申錫逾于百甕慈惠出于三爵炮炙熏林塘醪醴厭丘壑抃急管于無算醉湛恩以取樂禮部藉田晉潘岳藉田賦乃使甸師清畿野廬掃路封人壝宫掌舍設枑青壇蔚其嶽立翠幕黕以雲布結崇基之靈趾啟四塗之廣阼沃野墳腴膏壤平砥清洛濁渠引流激水遐阡繩直邇陌如矢葱犗服于縹軛紺轅綴于黛耜儼儲駕于㕓左俟萬乘之躬履百僚先置位以職分自上下下具惟命臣襲春服之萋萋接游車之轔轔微風生于輕幰纎埃起乎朱輪森奉璋以階列望皇軒而肅震若湛露之晞朝陽似衆星之拱北辰于是前驅魚麗屬車鱗萃閶闔洞啟參塗方駟常伯陪乘太僕秉轡后妃獻穜稑之種司農撰播植之器挈壺掌升降之節宫正設門閭之蹕天子乃御玉輦䕃華盖衝牙錚鎗綃紈綷䌨表朱𤣥于離坎飛青縞于震兑中黄􅈌以發暉方綵紛其繁㑹震震填填以幸乎藉田蟬冕熲以灼灼碧色肅其芊芊似夜光之剖荆璞若松栢之依山顛于是我皇乃降靈壇撫御耦逰場染屨洪縻在手三推而舍庶人終畆貴賤以班或五或九躡踵側肩掎裳連袂黄塵為之四合陽光為之潛翳動容發音而觀者莫不抃舞乎康衢謳吟乎聖世陳江總勞酒賦在陽春之仲序覽具物之芳菲帥公卿而播百穀親耒耜而命三推開青壇于迥甸列翠幕于清沂乃遵執爵之典爰降食苹之讌豁朱鳥之髙牕啟黄龍之抗殿奏帝鴻之萬舞動鈞天之九變顧曲私之亭育遞寒暑而徂遷謬陳力而策駘豈酬恩于暮年闕藉田賦祥風發于耒耜瑞雪掩于郊􅆵萬姓顒顒若百川之朝海九宫濟濟如衆星之麗天出甲乙之帳命先農之官設庭燎而晰晰陳量幣而戔戔旌旄夾于翠幕簨簴列于青壇然後華鐘撞焚燎舉馨香發乎聖躬烟煴感乎寰宇常伯撰播植之器宗人掌牲帛之數既金石而間陳亦籩豆而静旅晨光漸朗湛露初晞告九天之事畢將三辰之禮依帝猶懐神農之務穡想伯禹之疆理一之日于是躬耕二之日于是舉趾秉金耦而顒若駕鐡驪而禮矣將致美于粢盛遂盡力于耘耔望農祥之晨正知土膏之脈起所寳惟穀故大飲以勞農所貴惟人故躬耕以悦使祭惟司嗇蜡必田畯即異畆同穎豈獨瑞于往年象畊鳥耘是錫羨于今運陳張正見從藉田應衡陽王教詩帝京惟赤縣宸居映紫微塗山萬國仰滄海百川歸東郊事平秩仲月祀靈威含光開早扇閶闔啟朝扉洛城鐘漏息靈臺雲霧卷森森虎㦸前靄靄鸞旗轉屬車逰絳闕風鳥度丹巘帳殿幸金輿旌門擁玉輦玉輦帶飛烟金輿映緑川雨師清遠路風伯静遙天分渠通沃野激水入公田草發青壇外花飛蒼玉邊蒼玉陳珪璧青壇躬帝籍冒撅乃三推齊衡均百辟蘭場儼芝駕桂圃芳瑤席山禽詠管絃野獸和金石金石既相和江海復無波梁客簪裾盛陳王文雅多修塗參弱駘喬木蔽輕羅幸承温吹末擊壤自為歌梁簡文帝藉田詩禮經聞往説觀寳著華篇豈如春路動祈穀重民天蒼龍引玉􅋴交旗影曲旃皮軒承早日豹尾拂逰烟地廣重畦浄林芳翠幕懸青壇出長畎帷宫繞直阡秉耒光帝則報獻重皇䖍度諧金石奏徳厚歌頌詮三春潤蓂莢七月待鳴蟬鰩魚顯嘉瑞銅雀應豐年不勞鄭國雨無營鄴令田是知躬稼美兼聞富教先齊王融永明九年策秀才文昔周宣惰千畆之禮虢公納諫漢文缺三推之義賈生直言良以食為民天農為政本金湯非粟而不守水旱有待而無遷朕式照前經寳兹稼穡祥正而青旗肅事土膏而朱紘戒典將使杏花菖葉耕穫不愆清甽泠風述遵無廢而釋耒佩牛相沿莫返兼貧擅富浸以為俗若爰井開制懼驚擾愚民舄鹵可腴恐時無史白宋闕賀耕藉表藉乃借民周雅述載芟之訓冕而從事戴經垂秉耒之詞不惟敦龎純固于是乎誠抑亦醴酪粢盛由此而出故孝武頒詔于東郊章帝親巡于懐縣豈止一時之稱美實為千古之流光千耦其耘佇慶康功之即萬邦無斁永歌嗣嵗之興梁元帝慶東耕啟伏惟陛下敬授民時造幄藉圃漢之元鳳未足捧羈晉之太始非堪扶轂梁元帝祭東耕文三農九穀為政所先萬箱億庾是曰民天繫稱斵耜書美厥田花開杏樹凍解新泉當使黍稷莫莫民翳胥樂甘雨祁祁遂及我私我私之熟表裏禔福禔福中田嵗取十千是藨是蔉登頌有年禮部親蠶魏韋誕皇后親蠶頌于時明庶扇物鳥帑昏正躬耕帝籍邁徳班令嘉柔桑之肇敷思郊廟之至敬命皇后以親蠶俾躬桑于外坰考時日于巫咸詔太卜以獻禎御坤徳之大輅翳翠葆以揚旌爾乃皇英參乘塗山奉輿總姜任于後乗載樊衞于貳車千乘隠其雷動萬騎粲以星敷啟前路于三宫命蚩尤而清衢逰青虯于左角步素螭于右隅登崇壇而正位覿休氣于朝陽步雕輦而下降手柔條于公桑嬪妾肅以涖事職蠶植而承筐供副褘之六服昭孝敬于烝嘗平土就蠶彰乎曩烈亘山成繭著自前書爰崇黻冕之宜遂展鞠衣之範禮部巡幸漢揚雄幸河東賦伊年暮春將瘞后土禮靈祗謁汾隂于東郊乃撫翠鳳之駕馳先景之乘棹奔星之流旃攫天狼之威弧奮電鞭驂雷輜鳴洪鐘建五旂羲和司日顔倫奉輿樂往昔之遺風喜虞舜之所耕瞰帝唐之嵩髙兮眽隆周之大寧叱風伯于南北呵雨師于西東參天地而獨立廓蕩蕩其無雙周庾信華林園馬射賦𤣥鳥司厯蒼龍馭行羔獻氷開桐花萍生皇帝幸于華林之園千乘雷動萬騎雲屯落花與芝盖同飛楊柳共春旗一色乃命羣臣陳大射之禮騶虞九節狸首七章于是選朱汗之馬校黄金之埒紅陽飛鵲紫燕晨風唐成公之驌驦海西侯之千里莫不飲羽銜竿吟猨落鴈鐘鼔振地埃塵漲天綵則錦帳俱移錢則銅山合徙實天下之至樂景福之歡欣者也嵗次昭陽月在大梁其日上已其時少陽春吏司職青祗効祥徵萬騎于平樂開千門于建章皇帝翊四圉于帝閑迴六龍于天苑華盖平飛風烏細轉帷宫宿設帳殿開筵傍臨細栁斜界宜年河漘薙草渭口澆泉堋雲五色的暈重員陽管既調春絃實撫玉律調鐘金錞節鼓于是咀銜拉鐵逐日追風並試長秋之埓俱下蘭池之宫鳴鞭則汗赭入埓則塵紅變三驅而畫鹿登百尺而懸熊禮正六耦詩歌九節弓如明月對堋馬似浮雲向埒鴈失羣而行㫁猿求林而路絶乃有六郡雄材五陵髙選新迴馬邑之兵始罷龍城之戰尚帶流星猶乘奔電始聽鼓而唱籌即移竿而摽箭熊耳刻杯浮雲畫罍水衡之錢山積織室之錦霞開司筵賞至酒正杯來既而日下澤宫筵䦨相圃悵徙蹕之流歡眷迴鑾之餘武唐闕述聖賦至如雲觀晨開風亭夜敞迴長飇于輕翼凝濃露于仙掌沈落月于璧臺挂奔星于珠網羅紈飄而散馥環珮動而流響垂密葉于綺窻散飛花于翠幌復有天池濛沼以嬉以遊鼓輕枻漾仙舟䕃喬木鏡清流魚鳥陵亂蘋藻沈浮控飛梁以架迥列層閣以環洲漬檀欒之修竹映迢遰之危樓風未生而葉動景將昃而光收若夫瑞草竒色祥樹嘉名霏紅曜紫垂緗拖青或玲瓏于玉砌或㸃綴于金楹交九衢而結影分四照以開榮浥朝露而逾馥帶星風而更輕于是登崇觀以周覽闢層軒而遐瞩樹含嶺而共青草帶原而同緑俯八紘而非逺願千里而為局闕望春宫賦鮮飇微扇籠輕靄于髙臺淑氣初臨鏁浮光於緑仗吾君于是縱目前檻馳神逺郊散晴煙于地表拂佳氣于林梢覩青陽之煦然載懐祈榖聽鶬鶊之鳴矣不使覆巢布政有孚宸逰是假察微明于逺嶠睇新緑于平野南山之翠色盈前渭水之素光在下盖將賦藉田于晉代豈比撰吉月疑作吉日於周雅李程華清宫望幸賦竹花雖吐如含待鳳之誠雲氣纔升若睹從龍之狀李子卿駕幸九成宫賦由是叶清秋練吉日乘石洗皇輿出七騶按隊千乗扈蹕戈矛林森士馬櫛比始地嶪而天旋終電馳而飇疾翻然而八駿騫騰霍濩而六龍奔逸雷公轉轂風伯按馭朱旗列而秋野生春金甲照而暮川増曙陋漢帝之逰衍哂秦皇之逸豫祥烟不散近飛槍壘之間瑞草常開併拂車宫之處廣陌鳴鑾異彼逰盤訪百年之疾苦知五稼之艱難成王之蒐由是問古公之政有以觀翠華來兮野老喜屬車至兮國人歡詎比夫隴塞回中妄開行幸之路泰郊畤上虚立禮神之壇張仲素穆天子宴瑤池賦絳宫𤣥囿異故鄉之樓臺鳳舞鸞歌勝至樂之韶濩澄光𣺌瀰極望瑤池湛水容之漫漭蕩日彩以參差逺近洲沚駢羅羽儀蕩蕩五雲冒芝田而不散翩翩三鳥拂珠樹以相隨金液是嘗玉杯是挹桃杏之花競秀蓬瀛之侣遙集逰仙可戀覺天路之日長惟帝念歸懼人間之景急梁簡文帝幸甘泉宫歌雉歸海水寂裘來重譯通吉行五十里隨處宿離宫鼓聲恒入地塵飛暗上空尚書隨豹尾太史逐相風銅鳴周國旞旗曳楚雲紅倖臣射覆罷從騎新歌終董逃拜金紫賢妻侍禁中不羨神仙侣排烟逐駕鴻劉孝威幸甘泉宫歌漢家迎夏畢避暑甘泉宫機車鳴里鼓駟馬駕相風校尉烏丸騎待制樓煩弓後旌猶五柞前笳度九嵕才人豹尾内御酒屬車中輦迴百子閤扇動七輪風鳴鐘休衞士披圖召後宫材官促校獵凉秋戯射熊梁簡文帝侍逰新亭應令詩神襟愍行邁岐路愴徘徊遙瞻十里陌傍望九成臺鳳管流虚谷龍騎籍春荄曉光浮野映朝烟承日迴沙文浪中積春隂江上來栁葉帶風轉桃花含雨開聖情藴珠綺札命表英才顧憐碔砆質何以儷瓊瓌陳張正見御幸樂遊苑侍宴詩大君臨四表榮光普八埏區中文化洽海外武功宣鳳書下丹篆龜符著緑編昆明不習戰雲夢豈遊畋軌文通萬國旗節靖三邊髙秋藐姑射睿想属汾川兩宫明合璧雙闕帶非烟揚鑾出城觀詔蹕指郊壥禁苑迴雕輦離宫建翠旃流水犇雷轂追風赴電鞭畫熊飄析羽金埒響膠弦鳴玉升文砌稱觴溢綺筵獸舞依鐘石鸞歌應管絃霞明黄鵠路風爽白雲天潦收荷盖折露重菊花鮮上林賓早鴈長楊唱晚蟬小臣慙藝業擊壤慕懐鉛康衢飛駛羽大海滴微涓詠歌還集木舞蹈遂臨泉願薦南山夀明明奉萬年隋薛道衡奉和臨渭源應詔詩𤣥功復禹迹至徳去湯羅玉闗亭障遠金方水石多八川兹一態萬里導長波驚流注陸海激浪還天河鸞旗歴巖谷龍穴暫經過西老陪逰宴南風起詠歌庶品蒙仁澤生靈沐太和微臣惜暮景願駐魯陽戈李徳林從駕還京詩至仁文教逺惟聖武功宣大師觀六義諸侯問百年𤣥覽時乘隙訓旅次山川鎮象屯休氣華盖翼飛烟鼓奏千人響旗動七星連峻嶺戈迴日髙原馬煦天姑射神遊罷蕭闗獵騎旋更待東山上看君巡狩篇李德林從駕巡遊詩大夏堯遺俗汾河漢豫遊今隨龍駕往還属鴈飛秋天行肅輦路日馭翼華輈朝乘六氣輦夕動七星旒谷静禽多思風髙松易秋遠林才有色遙水漫無流京華佳麗所目極與雲浮但覩凌霄觀詎見望仙樓璅門皆秀發鴛池盡學優待君草封禪東山觀射牛薛道衡從駕幸晉陽詩省方遵往冊遊豫叶前經金吾朝戒道校尉晚巡營重巒下飛騎絶浦渡連旌澗水寒逾咽松風遠更清方觀翠華返簪筆上云亭虞世南奉和幸江都應詔詩南國行周化稽山秘夏圖百王豈殊軌千載叶前謨肆覲遵時豫順動悦來蘇安流浮玉舳戒道翼金吾龍旗煥辰象鳳吹溢川塗封唐昔敷錫分陜被荆吳沐道咸知讓遵儀允美都冬律初飛管陽鴈正銜蘆嚴飇肅林薄愛景落江湖鴻私浹幽遠厚澤潤凋枯虞琴起歌詠漢筑動巴歈多幸沾行葦無庸類散樗唐太宗重幸武功詩代馬依朔吹驚禽愁昔藂况兹承睿徳懐舊感深衷積善欣餘慶暢武悦神功垂衣天下治端拱車書同白水巡前跡丹陵幸舊宫列筵歡故老髙宴聚新豐駐蹕撫田畯迴輿訪牧童瑞氣縈丹闕祥烟散碧空孤嶼含霜白遙山帶日紅於焉歡擊筑聊以詠南風沈佺期仙萼池亭侍宴應制詩步輦尋丹嶂行宫在翠微川長看鳥滅谷轉聽猿稀天磴扶階迥雲泉透户飛閒花開石竹幽葉吐薔薇徑狹難留騎亭寒欲進衣白龜表獻夀仙吹返彤闈宋之問三陽宫石淙侍宴應制詩離宫秘苑勝瀛洲别有仙人洞壑幽巖邊樹色含風冷石上泉聲帶雨秋鳥向歌筵來度曲雲依帳殿結為樓微臣昔忝方明御今日還陪八駿遊蘇頲奉和登驪山髙頂寓目應制詩仙蹕御層氲髙髙積翠分巖聲中谷應天語半空聞豐樹連黄葉函闗入紫雲聖圖恢㝢縣歌賦小横汾徐彦伯幸新豐温泉宫應制詩姬典歌時邁虞編記省方何如黒帝月𤣥覽白雲鄉翠仗縈船岸明斾應萯陽風搖花毦彩雪艷寳戈芒御柏開油次離宫夾樹行桂枝籠騕褭松葉覆堂皇仙女含珠液温池孕璧房湧疑神瀵溢澄若帝䑓漿獨沸流常熱潛蒸氣轉香青坻環玉甃紅淀鑠金光藻耀凝芳潔葳蕤獻淑祥五龍歸寳算九鳸叶時康同預華封老中衢祝聖皇又武平一詩秦王登碣石周后襲崑崙何必在遐遠方稱萬㝢尊我皇順時豫星駕動軒轅雄㦸交馳道清笳度國門迴輿長樂觀校獵上林園行漏移三象連營摠八屯旌搖鸚鵡谷騎轉鳳凰原絶壁蒼苔古靈泉碧溜温參差開水殿窈窕敞巖軒豐邑模猶在驪宫跡尚存烟松銜翠幄雪徑遶花源侍從推𤣥草文章負武賁深仁浹夷夏大造溢乾坤謬忝王枚列多慚雨露恩張説奉和途經華嶽應制詩西嶽鎮皇京中峰入太清玉鑾重嶺應緹騎薄雲迎霽日懸髙掌寒空映削成軒遊㑹神處漢幸望仙情舊廟青林古新碑緑字生羣臣願封岱迴駕勒鴻名又張九齡詩萬乘華山下千巖雲漢中靈宫雖奥密睿覽忽𤣥同日月臨髙掌神仙仰大風攢峰勢岌岌翊輦氣熊熊揆物知幽贊銘勲表聖衷㑹應陪玉檢來此告成功唐明皇早渡蒲津闗詩鐘鼔嚴更曙山河野望通鳴鑾下蒲阪飛斾入秦中地險闗逾壯天平鎮尚雄春來津樹合月落戍樓空馬色分朝景雞聲逐曉風所希常道泰非復候繻同又張九齡奉和應制詩魏武中流處軒皇問道迴長堤春樹發髙掌曙雲開龍負王舟度人占仙氣來河津㑹日月天仗役風雷東顧重闗盡西馳萬國陪還聞股肱郡元首詠康哉唐明皇早登太行山中言志詩清蹕渡河陽鳴笳上太行火龍明鳥道鐵騎遶羊腸白霧埋隂壑丹霞助曉光澗泉含宿凍山木帶餘霜野老茅為屋樵人薜作裳宣風問耆艾敦俗勸耕桑凉徳慙先哲徽猷慕昔皇不因今展義何必冒垂堂又張九齡奉和詩孟月攝提貞乘時我后征晨嚴九折度暮戒六軍行日御馳中道風師巻太清戈鋋林表出組練雪間明動植希皇豫髙深奉睿情陪遊七聖列望幸百神迎氣色烟猶喜恩光草尚榮之罘稱萬嵗今此復同聲張説扈從南出雀鼠谷詩豫動三靈贊時巡四海威硤闗凌曙出平路半春歸霍鎮迎雲罕汾河送羽旂南山柳半宻谷北草全稀遲日宜華盖和風入夾衣上林千里近應見百花飛蘇頲奉和聖製答張説南出雀鼠詩雨施巡方罷雲從訓俗迴密途汾水衞清蹕晉郊陪寒看山邊静春當日下來御祠𤣥鳥應仙仗緑楊開作頌音傳雅觀文色動台更知西向樂宸藻叶鹽梅又張九齡奉和詩設險諸侯地承平聖主巡東君朝二月南斾擁三辰寒出重闗盡年隨行漏新瑞雲叢捧日芳樹曲迎春舞詠先馳道恩華及近臣汾川花鳥意併捧屬車塵杜審言宿羽亭侍宴應制詩步輦千門外離宫二月開風光新栁報宴賞百花催碧水搖雲閣青山繞吹臺聖情留晚興歌管送金盃又夏日仙萼亭應制詩髙嶺逼星河乘輿此日過野含時雨潤山雜夏雲多睿藻光巖穴宸襟洽薜蘿悠然小天下歸路滿笙歌唐明皇同二相已下羣臣樂遊園宴詩選日巖廊暇需雲宴樂初萬方朝玉帛千品㑹簪裾地入南山近城分北斗餘池塘隨栁密原野雜花疎帝幕看逾暗歌鐘聴自虚興闌歸騎轉還奏弼違書張説奉和恩賜樂遊園宴應制詩漢苑佳遊地軒庭近侍臣共持榮幸日來賞艷陽春饌玉頒王篚摐金下帝鈞池臺草色徧宫觀柳條新花綬光連榻朱顔暢飲醇聖朝多樂事天意毎隨人又蘇頲詩侍飲終酺㑹承恩續聖遊戴天惟慶幸選地即殊尤北面祗雙闕南臨賞一丘曲江新溜緩上苑雜花稠亹亹韶絃屢戔戔賁帛周醉歸填畛陌榮耀接軒裘又張九齡詩寳筵延錫命供帳叙羣公形勝宜春接威儀建禮同晞陽人似露解愠物從風朝慶千齡始年華二月中輝光變草木和氣發絲桐嵗嵗無為化徒知樂九功李嶠奉和幸韋嗣立山莊侍宴應制詩南洛師臣契東巖王佐居幽情遺紱冕神眷属樵漁制下峒山蹕恩迴灞水輿松門駐旌罕薜幄引簪裾石磴平黄陸烟樓半紫虛雲霞仙路近琴酒俗塵疎喬木千齡外懸泉百丈餘崖深經鍊藥穴古舊藏書樹宿搏風鳥池逰縱壑魚寧知天子貴尚憶武侯廬又武平一詩三光迴斗極萬騎肅勾陳地若遊汾水畋疑歴渭濱圓塘氷寫鏡遙樹雪成春絃奏魚聽曲機忘鳥狎人築巖思感夢磻石想垂綸落景搖紅碧層隂結翠筠素風紛可尚𤣥澤藹無垠薄暮清笳動天文煥紫宸又徐彦昭詩鼎臣休澣隙方外結遐心别業清霞逕孤潭碧樹林毎持東野䇿遙弄北溪琴帝幸紆時豫台園賞嵗隂移鑾明月沼張俎白雲岑御酒瑤觥落仙壇竹徑深三光懸聖藻五等冠朝簪自愧承恩盛咸言獨在今又崔湜詩丞相登前府尚書啟舊林式閭明主睿榮族聖嬪心川狹旌門抵巖髙蔽帳臨閒牕慿柳暗小徑入松深雲卷千峰色泉和萬籟吟蘭迎天女珮竹礙侍臣簪宸翰三光燭朝榮四海欽還嗟絶機叟白首漢川隂又蘇頲詩摐金寒野霽步玉曉山幽帝握期松子臣廬問葛侯百工徵往夢七聖扈來遊斗柄乘時轉台階捧日留樹重巖籟合泉迸水光浮石徑喧朝履璜溪擁釣舟恩如犯星夜歡比濟河秋不學堯年隠空令傲許由沈佺期奉和幸禮部尚書竇希玠宅應制詩北闕垂旒暇南宫聽履迴天臨祥鳳轉恩向濯龍開蘭氣承仙帳榴花引御杯水從金穴吐雲是玉山來池影搖歌席林香散舞臺不知行漏晚清蹕尚徘徊又蘇頲詩尚書列侯地外戚近臣家飛棟臨青綺迴輿轉翠華日交當户樹泉漾滿池華圓頂圖嵩石方流擁魏沙豫遊今聴履侍從昔鳴笳自有天文降無勞訪海查蘇頲幸新豐及同州勅虞之四朝且徧區㝢漢之三輔本同京師善于古者考于今發乎邇者應乎遠若順豫之事缺則紊于王制巡遊之典備則慮于人勞朕受命膺期勵精設教幸乾坤幽贊風雨咸若百物既阜三農已登同穎薦于宗廟雙穗生于郡國我無大桀實欣於嵗取人有小康未果于時邁但左翊之地近入黄圖新豐之邑甫鄰青綺山川宫館咫尺相望欲過灞亭而涉滻經沙阜而臨渭見彼耆耋問其疾苦察長吏之政恤黎甿之寃盖所以展義陳詩觀風問俗始自畿甸化於天下張説諫則天幸三陽宫表臣聞明王不惡切諫以博覽忠臣不敢隠忠以曲辭陛下屯萬乘幸離宫暑退凉歸未降還㫖愚臣固陋恐非長策請為陛下陳其不可三陽宫去洛陽城一百餘里有伊水之隔崿岅之峻遇涉夏秋扈從兵馬日費資給連雨彌旬即難周濟陛下太倉武庫並在都邑積粟利器藴若丘山奈何去宗廟之上都安山谷之僻處是猶倒持劒㦸示人鐔柄臣竊為陛下不取夫禍敗之生在人所忽故曰安樂必戒無行所悔此不可止之理一也告成􅄶小萬方輻湊填城溢郭併挿無所排斥居人蓬宿草次風雨暴至不知庇託孤惸老疾流轉衢巷陛下作人父母將若之何此不可止之理二也造設竒巧誘掖上心鑿山疏觀竭流漲海俯貫地脈仰出雲路易山川之氣奪農桑之土延木石運斧斤山谷連聲春夏不輟勸陛下作此者豈正人邪詩云民亦勞止汔可小康此不可止之理三也御􅁐東西僅三十里出入來去雜人甚多外無牆垣扃禁内有榛藂谿谷猛獸所伏暴慝是慿陛下來往輕行警蹕不肅歴蒙密乘險􅇖卒然有逸獸狂夫驚犯左右豈不殆哉雖萬全無疑然人主之動不宜容易也易曰思患豫防願陛下為萬姓持重此不可止之理四也崔融為皇太子請停幸東都表臣聞乘雲駕羽者非以逸樂其身觀風設教者將以𢎞濟于物故後予胥怨幾望湯來吾王不遊嘗思禹㑹林希尚書省謝車駕臨幸表天臺肇建具崇喉舌之司帝車下臨増重陛亷之寄非常之舉視古無倫忽紆清蹕之傳罙聳鴻都之觀且北辰居極外環象斗之宫而黄道所經旁及積星之位瞻威顔于咫尺被法語之丁寧勅以在公退而交儆分曹率屬燦然周典之文望輦拜恩陋彼漢郎之歎齊王融三月三日曲水詩序臣聞出豫為象鈞天之樂張焉時乗既位御氣之駕翔焉是以得一奉宸逍遙襄城之域體元則大悵望姑射之阿然窅𣺌寂寥其獨適者也至如夏后兩龍載驅璿臺之上穆滿八駿如舞瑤水之隂亦有饗云固不與萬民共也後漢班固東巡頌粤若稽古在漢迪哲聿修厥徳憲章丕烈翿六龍較五輅齊百僚陶質素命南重以司厯厥中月之六辰備天官之列衞盛輿服而東巡馬融東巡頌允迪在昔紹烈陶唐殷天衷克搖光若時則運瓊衡敷六典經八成肆類乎上帝實柴乎三辰禋祀乎六宗祗燎乎羣神遂發號羣司申戒百工卜筮稱吉蓍龜襲從南征有時馮相告祥清夷道而後行曜四國而揚光展聖義于巡狩喜圻畤而詠八荒指宗嶽以為期固岱神之所望散齋既畢越翼良辰棫槱増構烈火燔燃暉光四煬焱爛薄天蕭香肆升青烟習雲珪璋峩峩犧牲潔純鬱鬯宗彛明水𤣥樽空桑孤竹咸池雲門六八匝變神祗並存唐王勃九成宫頌姬文考筮容成奏日千旌鳳轉儼鏤象而星陳萬騎龍嘶伐靈鼉而曉𦙍静帷宫于緑野肅帳殿于黄街奔欃槍而走陸梁陳浮靈而候明月前驅電竦下列缺于騰鞭後乘雷驚起豐隆于驟轂瓊戈晝指太陽疲轉日之鋒玉劒霄翻懸象睹衝星之氣禮部登極梁王僧辯勸進表以錫珪之功既歸有道當璧之禮允属聖明而優詔謙沖窅然凝邈飛龍可躋而乾爻在四帝閽云扣而閶闔未開謳歌再馳是用翹首所以越人固執薰丹穴以求君周氏樂推踰岐山而事主漢王不即位無以賞功臣光武不止戈豈謂紹宗廟縱陛下拂袗衣而游廣城登弇山而去東土羣臣安得仰訴兆庶何所歸仁况郊祀配天罍篚禮曠齋宫清廟匏竹不陳仰望鑾輿匪朝伊夕瞻言法駕載渴且飢豈可久羈衆議有曠彛則舊郊既復函洛已平髙奴櫟陽宫館雖毁濁河清濟佳氣猶存皋門有伉甘泉四敞土圭測景仙人承露斯盖九州之赤縣六合之樞機博士捧圖書而稍還太常定禮儀而已列豈得不揚清駕而赴名都其玉鑾而游正寢陳徐陵勸進梁元帝表封唐有聖還居帝嚳之家居代維賢終纂髙皇之祚無為稱于革舄至治表于垂裳而撥亂反正非聞前古至如金行重作源出東莞炎運猶昌枝分南頓豈得掩顯姓於軒轅非才子于顓頊莫不因時多難俱繼神宗者也伏惟陛下出震等于勲華鳴謙同于旦奭握褒秉鉞將在御天玉媵珠衡先彰元后神祗所合非惟太室之祥圖牒斯歸何止堯門之瑞若夫大孝聖人之心中庸君子之徳固已作訓生民貽風多士一日二日研覽萬幾允文允武包羅羣藝兹以三大賓是四門歴試諸艱咸熈庶績斯無得而稱也自無妄為象踵禍上京梟獍咸劉宗社蕩墜銅頭鐵額興暴皇年封狶修虵行災中國靈心所宅下武其興望紫極而行號瞻丹陵而殞慟家寃將報天賜黄鳥之旗國害宜誅神奉𤣥狐之録尅李軼於河津征陶謙于海岱滕公擁樹雄氣方嚴張繡交兵風神彌勇忠誠貫于日月孝義感于氷霜如雷如霆非貔非虎前驅効命元惡斯殱既挂膽于西州方燃臍于東市蚩尤三塚寧謂嚴誅王莽千剸非云明罰青羌赤狄同界豺狼胡服夷言咸為京觀邦畿濟濟還見隆平宗祀愔愔方承多福自氛氲渾沌之世驪連栗陸之君卦起龍圖文因鳥跡雲師火帝非無戰陣之文禹誓湯征咸用干戈之道星躔東井時破肴潼霆震南陽初平尋邑未有援三靈之已墜救四海之羣飛赫赫明明龔行天罰得如當今之盛者也於是卿雲似盖晨映姚鄉甘露如珠朝垂原寢芝房感徳咸出銅池蓂莢伺辰無勞銀箭重以東漸𤣥兔西踰白狼髙栁生風扶桑銜日莫不編名屬國歸貢鴻臚荒服來賓遐邇同慶其文昭武穆跗萼也如彼天平地成功業也如此久應旁求典故詢詔天官斟酌繁昌經營髙邑宗王啟霸非勞武徳之侯清蹕無虞何事長安之邸揚龍旂以享帝御鳳扆以承天厯數在躬疇咨為讓七月二十四日散騎常侍栁暉等至鄴伏承聖㫖謙沖為而不宰咸云洛陽未復函谷無泥旋駕金陵方膺天眷愚謂大庭少昊非有定居漢祖殷宗皆無恒宅登封岱嶽且置明堂巡狩荆州時行司隸何必西瞻虎踞乃建王宫南望牛頭方稱天闕抑又聞之𤣥珪既錫蒼玉無陳乃棫樸之愆期非包茅之不貢雲和之瑟久廢甘泉孤竹之管無聞方澤豈不懼歟伏願陛下因百姓之心振萬邦之命豈可逡巡固讓方示石户之農髙謝為君徒效箕山之客未知上徳之不徳惟見聖人之不仁率土翹翹蒼生何望昔蘇秦張儀違鄉負俗尚復招三方以事趙請六國以尊秦况臣等預奉皇華親承朝命珪璋特達通聘河陽貂珥雍容尋盟漳水加牢貶館隨世汚隆瞻望鄉關誠均休戚但輕生不造命與時乖等一介之行人同三危之遠擯承問内殿事絶耿弇之因封奏邊城私等劉琨之哭唐柳宗元賀登極表天地泰而聖人出雷雨解而品物榮是以五行迭用木火更其位千葉重光宗廟輔其徳殷宗恭黙再開成湯之業漢文聰明克成髙祖之緒梁元帝答王僧辯勸進書孤以不徳天降之災枕戈飲膽叩心泣血風樹之酷萬死不追霜露之哀百憂摠萃甫聞伯升之禍彌切仲謀之悲若封豕既殱長虵即戮方欲追延陵之逸軌繼子臧之髙讓豈資秋亭之壇安事繁陽之石侯景項籍也蕭棟殷辛也赤泉未賞劉邦尚曰漢王白旗弗懸周發猶稱太子飛龍之位孰謂可躋附鳳之徒既聞來議羣臣卿士其諭孤之志禮部聖誕唐明皇千秋節宴詩蘭殿千秋節稱名萬嵗觴風傳率土慶日表繼天祥玉宇開花萼宫懸動㑹昌衣冠白鷺下帟幕翠雲長獻遺成新俗朝儀入舊章月銜花綬鏡露綴綵絲囊處處祠田祖年年宴杖鄉深思一徳事小獲萬人康張説奉和千秋節宴應制詩五徳生王者千齡啟聖人赤光來照夜黄雲上覆辰海縣銜恩久朝章獻夀新髙居帝坐出夾道衆官陳槊仗洗晴景磬管凝秋旻珠囊含瑞露金鏡抱僊輪何嵗無鄉飲何田不報神薰歌與名節傳代幸羣臣王季友皇帝移晦日為中和節詩皇心不向晦改節號中和淑氣同風景佳名别詠歌湔裙移舊俗賜尺下新科厯象千年正酺醵四海多花隨春令發鳥度嵗陽過天地齊休慶歡聲欲盪波宋史文昌賀聖節表穹昊儲祥光輔萬億年之祚聖神開世適符五百嵗之期藹佳氣于乾坤溢歡聲于朝野福全洪範符周后之歴年筴受泰元通漢家之永世與天齊久如日方升唐吕頌降誕日進光明砂等狀大電遶樞千年感聖神光照室六合歸尊恭唯降誕之辰是啟乾坤之祚普天稱慶率土同歡仰舜日而徘徊望堯雲而抃躍上𤣥降聖之時皇帝出震之日天垂景麗曜北斗以呈祥人竭歡心願南山以為夀裴次元降誕日進物狀搖光之祥貫月於佳夕遶樞之感降聖於良辰百靈効祉固増夀于南山萬國一心皆貢珍于北闕令狐楚降誕日進鞍馬等狀臣任重戎旃路遙天闕懽呼萬嵗如聞山嶽之聲傾竭一心庶均葵藿之志臣限守邉陲未朝雲闕尚想河清之色如聞里鼓之聲王仲周降誕日進器物狀紫氣充庭黄河變色用符昌運式表誕彌雖聖夀齊天不假封人之祝而獻芹為禮空馳野老之誠禮部天子加元服後漢黄香天子冠頌惟永元之盛代聖皇徳之茂純躬烝烝之至孝崇敬順以奉天以三載之孟春建寅月之上旬皇帝將加𤣥冕簡甲子之元辰厥日王于太皥厥時叶于百神皇輿幸夫金根駕𤣥虯之連蜷建螭龍以為旂鳴節路之和鑾既臻廟而成禮乃迴軫而反宫正朝服以享宴撞太蔟之庭鐘祚蕃屏與鼎輔暨夷裔之君王咸進酌于金罍獻萬年之玉觴禮部太學後漢張衡東京賦春日載陽合射辟雍設業設虡宫懸全鏞鼖鼓路鼗樹羽幢幢于是備物物有其容伯夷起而相儀后䕫坐而為工張大侯制五正設三乏厞司旌并夾既設儲乎廣庭于是皇輿夙駕䡨于東階以須消啟明掃朝霞登天光于扶桑天子乃撫玉輅時乘六龍發鯨魚鏗華鐘大丙弭節風后陪乘攝提運衡徐至于射宫禮事展樂物具王夏闋騶虞秦决拾既次彫弓斯彀達餘萌于暮春昭誠心以遠喻進明徳而崇業滌饕餮之貪慾仁風衍而外流誼方激而遐騖唐朱休駕幸太學賦属車連延輾御陌而後入翠華容裔向文囿以前驅臺觀惟新牆垣盡飾宗伯禮賢以蕆事司成執經而奉職端冕旃而綵仗初立始駐六龍發聲教而翠華未旋以行萬國龍顔不遠顧探索之惟勤天步下臨曷斯須之敢惰雲布星攢周回可觀彼儒風之習習資睿思以安安頥指于學海儒林自因澤及目擊乎雄詞麗藻誰謂才難恩下育而冬暖命遐宣而晝寒宣化畢盛禮終繳素志播皇風轉龍旂于祥烟之表返鑾輅于瑞氣之中黎逢貢士謁文宣王賦聖人没而教在明王興而道宣命上公以陳信展大禮以登賢觴酒豆肉金鏞筦懸致克禋以如在當質明而不愆祁祁諸生必恭敬止廓廣庭以容衆峩髙冠以修己臨奠獻之筵肅造秀之士階間儼以成列槐隂布以如市將備禮于先師遂儲精于祝史于以致君恢復王化𢎞闡人文磬音繼于夜杵燭影迎于朝雲見曲暢于和易知具歆于苾芬肅肅階戺隂隂門闕喬木棲于暮烟前軒滿于行月羣士沓而嵗至庶工齊而曉謁上𤣥酒以清滌間朱絃而踈越齊百王于建號歴千古而未歇盖以教俟天地而不朽功格宇宙而不伐陳沈不害上髙祖置學書臣聞立人建國莫尚于尊儒成俗化民必崇于教學故東膠西序事隆乎三代環林璧水業成于兩京自淳源既遠澆風以扇物之感人無窮人之逐物無節是知施設訓範啟導心靈譬彼染藍類諸琢玉然後人倫以正髙卑有序忠孝之禮既明君臣之道攸固執禮自塞魯公所以難侮歌樂已細鄭伯于前知亡干戚舞而有苗至泮宫成而淮夷服長想洙泗之風載懐淹稷之盛有國有家莫不尚已成均自斯墜業瞽宗于是不修褒成之祠不陳祼享釋菜之禮無稱俎豆後生敦悦不見函丈之儀晚學鑽仰徒深倚席之歎使擔簦負笈鏘鏘接袵方領矩步濟濟成林如切如磋聞詩聞禮一年可以倍功三冬于是足用故能擢秀雄州揚廷觀國入仕登朝資優學以自輔莅官從政有經業以治身輜駕列廷青紫拾地唐皮日休移成均博士書俾庠聲序音玲瓏于珩珮鏗訇于金石為諸生之蓍龜作後來之綿蕝又請韓文公配饗太學書唯昌黎文公之文蹴楊墨于不毛之地蹂釋老于無人之境故得孔道爣集本作巍然而自正陳徐陵皇太子臨辟雍頌臣聞天大王大詳于道徳之言天文人文顯于爻象之説是以大君革命黔首所以庇焉聖人創制文籍所以生焉咸由此道制為民極莫不對越上靈裁成庶類濟世育徳昭被昆蟲皇帝世膺下武體兹上徳握天鏡而授河圖執玉衡而運乾象皇太子曜彼重離光兹匕鬯儀天以文化成天下侍中國子祭酒新安王宗室羽儀衣冠凖的惟善為樂造次必儒粤以十一年三月二十一日受詔𢎞宣發論語題攝齊升堂摳衣即席對揚天人開闢大訓清言既吐精義入神副徳爰動音闕鋒起問難泉涌辨論綸之異定倫理之疑玉振鏘鏘雲浮雨布介王奉繫聖蹤馳辨秀出信令張禹慙其師法何晏忸其訓詁穆穆焉洋洋焉此實虞朝之盛徳生民之壯觀者也臣抑又聞之魯頌聿興史克宣其懿晉雍大啟王廙逞其詞所以述休平之風揚君上之徳輕以下材敢為頌曰皇運勃啟膺圖受命紫盖東臨黄旌南映積仁累徳重明疊聖四海無浪三階已平儲駕戾止和鸞有聲𢎞風講肆崇儒肅成丹書貴道黄金賤籝洙泗興業闕里増榮禮部州郡學梁簡文帝求寧國臨城二公入學表臣聞瞻彼緝狐既次良冶相諸筍玉猶藉他山故沮渙之水可居鄒魯之鄉為貴下帷投斧昔人以為精力棄竿委麥先哲以為美譚伏惟陛下𢎞至徳之微言闡無為之妙説話郊講道不勞賈生之議就陽啟位無待公玉之圖願得齒年國胄隨肩選造梁元帝請于州立學校表臣聞公宫之南四術四教司樂成均六詩六律韶濩既舞羽籥之道行焉黨塾兹備離經之志辨焉故不升嵩霍豈識乾行之峻不臨溟渤安知地載之厚洎乎秦焚金篆周亡玉鏡羣言争亂諸子相騰書則夏侯歐陽易則神輸道訓詩乃齊魯毛韓傳稱鄒左張夾禮有曲臺王史之異樂有龍徳趙定之殊伏惟陛下撫五辰而建五長播九徳而導九州容成為厯興景雲之瑞伶倫吹律應黄鍾之管撥亂反正經武也制禮作樂緯文也若非六經庖厨百家異饌三墳為瑚璉五典為笙簧豈能暴以秋陽紆就望之景濯以江漢播垂天之澤王僧孺為蕭監利求入學啟竊以翹首伺飛不如修弋宛足念遠莫若驅鑣故樸斵成于丹雘篠簜資于栝羽敢因莩末有志庠均為山資于一簣學海漸其微流任昉為劉瓛立館啟昔在魏中爰及晉始書貴虚𤣥人悦陶縱瑚璉廢泗上之容樽俎恣林下之適春干秋羽委曠而弗陳西序東膠寂寥而誰仰所以金雞忘曉玉羊失馭神器毁于獯戎寳厯遷于於越豈不悲歟劉瓛澡身浴徳修行明經賤珪璧于光隂勁松筠於嵗晚貧不隕穫其心窮不二三其操而困無居止浮寓親遊垣棟傾替窐衢墊側有朋自逺無用栖慿皆負笈擔簦櫛風沐露瓛之器學無謝前修輒欲與之周旋開館招屈臣第西偏官有閒地北距晉山南望通邑雖曰人境實少浮喧廣輪裁盈數畆布以施立黌塾薄藝桑麻麤創茨宇唐梁肅崑山縣學記昔崔瑗有南陽文學志王粲有荆州文學志皆表儒訓以著不朽蕭定袁州文宣王廟記廊廡庭除㒺不畢葺籩豆簠簋㒺不畢陳入其室若聞講誦之音升其堂如聆金石之響冀夫袁江之上將𢎞洙泗之風袁山之人能傳鄒魯之學儒行充于比屋中庸化而為俗矣禮部養老後漢張衡東京賦日月㑹於龍狵恤人事之勞疚因休力以息勤致歡忻于春酒執鑾刀以袒割奉觴豆於國叟降至尊以訓恭送迎拜于三壽敬慎威儀示民不偷我有嘉賓其樂愉愉晉隂澹請索襲為三老書今四表輯寜將行鄉射之禮先生年耆望重道冠一時養老之義實繫儒賢既樹非梧桐而希鸞鳳降翼器謝曹公而冀盖公枉駕誠非所謂也然夫子至聖有召赴焉孟軻大徳無聘不至盖欲𢎞闡大猷敷明道化故也今之相屈遵道崇教非有爵位意者或可然乎禮部喪葬梁何遜悲行路孤墳詩行路一孤墳路成墳已毁空疑年嵗積不知陵谷徙幾經秋葉飛驟見春流瀰金蠶不可織玉樹何曽蕋陌上驅馳人笑歌自侈靡今日非明日可憐詎憐此陳張正見和楊侯送袁全紫葬詩𤣥泉開隧道白日照佳城一朝嗟此路千載幾傷情秋氣悲松色凄風咽晚聲歸雲回谷散還栁背山輕唯當三五夜壟月暫時明唐太宗望送魏徵葬詩閶闔摠金鞍上林移玉輦野郊愴新别河橋非舊餞慘日映峰沈愁雲隨盖轉哀笳時㫁續悲旌乍舒卷望望情何極浪浪淚空泫無復昔時人芳春共誰遣皇甫冉送魏六侍御葬詩哭葬寒郊外行將何所從盛曹徒列柏新墓已栽松海月同千古江雲復幾重舊書曽諫獵遺草議登封疇昔輕三事常期老一峰門臨商嶺道忩引洛城鐘應積泉中恨無因世上逢招尋偏見厚疎慢亦相容張范唯通夢求羊永絶蹤誰知長卿疾歌賦不還邛李端張丞相挽歌素斾低寒水清笳出曉風鳥來傷賈傅馬立禍滕公松栢青山上城池白日中一朝今古隔唯有月明同張説崔司業挽詞像設存華館威儀下墓田鳳池傷舊草麟史泣遺篇帷盖墟烟没干旌壠日懸古來埋玉樹流恨盡山川温庭筠過北海墓詩撫事如神遇臨風獨涕零墓平春草緑碑折古苔青珪玉埋英氣山河孕炳靈發言驚辨囿揮翰動文星藴策期干世持權欲反經激揚思壯氣流落歎頺齡惡木人皆息貪泉我獨醒輪轅無匠石刀几有庖丁碌碌迷藏器規規守潔瓶憤容陵鼎鑊公議動朝廷故國將辭寵危邦竟緩刑上卿亷白璧凡石礪青萍掲月昭東夏摶風滯北溟後塵遵軌轍前席詠儀型木秀當憂悴絃傷不底寧矜誇遭尺鷃光彩困飛螢草羽留談柄清風襲徳馨鸞凰嬰雪刃狼虎犯雲屏蘭蕙荒遺址榛蕪蔽舊坰羨君雖不禄猶得到明庭又過陳琳墓詩曽於青史見遺文今日飄蓬過此墳詞客有靈應識我霸才無主始憐君石麟埋没藏春草銅雀荒凉對暮雲莫怪臨風倍惆悵欲將弓劒學從軍張祜真娘墓詩佛地葬羅衣孤魂此是歸舞為蝴蝶夢歌謝伯勞飛翠髮朝雲㫁青蛾夜月微傷心一花落無復戀春暉羅隠經耒陽杜工部墓詩紫菊馨香覆楚醪奠君江畔雨蕭騷旅魂自是才相累閒骨何妨塚更髙騄驥喪來輕蹇蹶芝蘭衰後遠蓬蒿屈原宋玉憐居處幾駕青螭緩鬱陶宋晁補之代司馬康子植謝應副葬事表致主之心已淪幽壤飾終之錫更躐舊章兆協卜之以時思殞身而莫報伏念臣祖光以徳業名世常擢任于宰衡臣父康以詩禮成家亦登延而勸講而侈俗方改哀楊綰之已亡太醫遽臨痛桓榮之未老無禄私室荐罹鞠凶自啟手足之初至掩窀穸之際君命屢至賵賜有加復因屬匠之鳩材俾過家塋而視堋殘喘何力秋毫賴官仁深念功禮不遺舊將博勸于士類豈曲私于臣門克意紹先獨自期于忠孝纒哀待盡兩無報於君親周庾信擬連珠盖聞穀林長遠蒼梧不從惟桐惟葛無樹無封是以隨珠日月無益驪山之火雀臺絃管空望西陵之松唐李商隠重祭外舅司徒公文簡子將戰之誓唯止桐棺晏嬰送死之文寧思石槨素車樸馬疎巾弊帷成一代之清規揚百古之休聞周庾信婁慈神道碑但以遊魂久客反葬途遠道阻山長妻孤子幼哀聲滿野愁氣連雲况復松檟飄颻方臨武威之戍丘陵迴遠直對臨洮之城馬援亡于武溪尸柩返於魏里梁鴻死于㑹計妻子歸于平陵又鄭偉墓誌合葬非古既異三王之前死則同穴還同六載之始雖復銜珠兩鶴同歸紫盖之松出匣雙龍共没延平之水梁任孝恭祭雜墳文惟爾㝠然往代求圓石而無名邈矣遐年討方磚而不記封樹漂殄誰别羽商之家墳壟傾迴終迷庚癸之向不謂綸繩所用遂毁牛亭之基鍬鍤所侵爰傷馬鬛之勢重使翠幕臨風佳城見日昔靈沼枯骨周王盖以衣冠廣武横尸漢主加其轊櫝輙勒彼山虞覆頺隍于舊址命兹匠者修反壤于故林還蟻結之文依似坊之勢幸得宜陽大道無變無移京兆長阡勿迴勿徙庶幽魂逰止踐昔徑而不疑塗車往還瞻舊轍而猶在陳沈炯祭袁府君文長樂未央已夾樗里之墓公宫魯庫非復少昊之墟成土一棺未知何託解劒絮漿轉増欷歔已上喪葬唐陳子昻為義興公求拜掃表臣禍釁所鍾早日孤露墳塋莫掃松柏凋荒臣之不天實有由咎死罪死罪昔先臣下代遺訓未亡而殃降不圖家禍漸遘兄弟無故並為參商中冓之言所不可道孤臣不孝萬死餘責死罪死罪然臣之負譴實陷無辜吏議不明以投魑魅自泣血去國寄命南荒歴年被病再以生死炎山漲海氣瘴窮天戴白之老俗無聞者孤臣疲苶豈望須臾分謂委骨滄溟餌身魚鼈狼荒之鬼永悲長逝不意慶雲重澤天渙横流拂拭露霜生見白日踴躍昭泰情何以堪死罪死罪而餘殃未泯凶故仍臻亡兄濟江合家淪溺嫂姪俱没一不生存尋途未中臣妻又殞重疊亡殁契濶山川至止之日生意盡矣誓將守死陵墓殁齒家園不圖恩幸曲成寵章仍及題輿别駕職是恩州再造生涯天實為徳死罪死罪臣自歸日淺塋廟未修荆棘荒蕪祭祀無主今則便祗王命遠職邊夷嵗月方賖拜掃何日瞻言出涕感咽崩摧伏惟陛下仁養羣生孝理天下萬物咸遂各得其宜臣獨向隅有以長戚伏願天慈愷悌憐憫孤窮寛以簡書之刑賜其告歸之請使其駿奔西土長號北陵獲申存殁之悲生謁園塋之樹稽顙松闕謝不睦之辜肉袒山門祈自新之路誓刻肌骨奉以周旋然後退死蠻夷沈骸糞土甘心朽滅庶無遺恨倘昊天鑒照孤誠可哀則臣之鮿生志畢今日不勝崩迫之至李商隠為楊贊善奏請東都洒掃狀竊惟令式合許芟除追遠興情敢希榮于陸􅀈報恩未死寧自誓於羲之祭掃附禮部諡南齊虞羲為袁彖求諡與蕭令王僕射書岱山委岫崑岳摧峰四海搢紳誰不掩泣明公徳冠時宗道髙物表若得横議聖時斟酌今古採茂實于當年標流芳于千載馳徽諡于山道潤貞氣于泉門豈非體國之至公典謨之盛軌者哉禮部家廟唐顔真卿郭子儀家廟碑友于著睦臠龍虎者十人貽厥有光紆青紫者八九勲庸舉集今古莫儔昔奮號尊榮紅粟纔霑于萬石惲家全盛朱輪不出于十人繇吾觀之事不侔焉清廟之典所以仁祖考鴻伐之刻亦以垂子孫爰創制于舊居將永圖而觀徳中堂有侐丕構克崇感霜露而怵惕以増叙昭穆而敬恭斯在庶乎觀盥顒若既無斁于永懐入室僾然必有覿乎其位哀榮既極情禮用申仁人之所及遠哉孝子之事親終矣豈惟温温孔父遠稱讒鼎之銘穆穆魯侯獨美龍旂之祀牛僧孺代郡開國公王涯家廟碑銘閟宇神庭邃清而嚴上公之儀四室耽耽犧以潔牲粢以大糦交神尚敬合魄尚氣子姓宗工駿奔奉事副笄侈袂儼恪居次孝孫兢兢執爵而升以祼以濯以伏以興水陸具來羶薌畢登列于圜方其氣増増乃初烝嘗敬而追遠二昭二穆孝以尊本瞻瞻几幄蹜蹜堂閫禮成起慕涕洟𤣥袞濡露踐霜誰無永懐不如達者哀與榮偕逢時奮庸誰不得位不如仁人以道為貴惟公之達兮名以顯親惟公之仁兮徳以澡身六朝之清臣一代之全人宜其世家翼亮振振㒺不恭肅祗于廟門古儷府卷七
