body:
  text: 古儷府目録類書類卷一天文部卷二地理部嵗時部卷三帝王部宫掖部儲宫部帝戚部卷四政術部卷五人部卷六職官部卷七禮部卷八樂部道術部卷九文學部卷十武功部卷十一居處部恩賚部卷十二物類部臣等謹案古儷府十二卷明王志慶編志慶崑山人其書以六朝唐宋駢體之文足供詞藻之用者採摭英華分類編輯其漢魏賦頌之類雖非四六而典實博麗已開對偶之漸者亦併取焉凡分十八門每門各分子目凡一百八十有二大槩仿歐陽詢藝文類聚之例或載全篇或存節本與他類書割裂餖飣僅存字句者不同所引止於宋以前又皆從各總集别集採出亦非明人類書輾轉稗販以致冗瑣舛訛貽悞来學者可比葢志慶為僉事志堅舉人志長之弟昆仲皆以文學見稱於世志慶之考訂精確雖不及其兄而源流既正識度自超故偶然選輯之本終能不失前人矩矱惟書中間收玉海所載儷句稍為猥襍若以此為例則吳淑事類賦必將全部收入文繁語冗安有終窮幸其偶一見之故尚不至為全書之累而貪多嗜博之弊亦終不能相掩云乾隆四十四年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:88186b799b8a51ac4708d1b06b2fc8082d4025cad785854f0349868f1b35628a
