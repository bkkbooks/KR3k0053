body:
  text: 古儷府卷四明王志慶編政術部總載陳徐陵與王僧辨書行糜仲月王政無塞分榖髙年仁風斯逺梁簡文帝南郊頌道洽世昌國殷民阜鄉知舜讓邑比堯封委粟栖畆神絲被澤可謂我化若風民應如草我靜如鏡物動猶煙唐王勃乾元殿頌鄭竹分科燕棠輟諷銅機化極珠囊業洞禮貴丹虬樂調朱鳯殊坰獻寳綿鄉委貢李湜唐江州沖陽觀碑文以化成虞庠有籯金之業法惟刑措夏臺鮮辨璧之疑吕温故太子少保韋君神道碑于時戡復日近勲勤者衆都市惰游盡垂金組邦畿豪奪半賜丹書輕禽逸于疎網悍馬駭于柔轡二境之間百里而近靈源自出殊派共清膏澤所霑異壤同潤下車期月報政如初如秩賜金借留累嵗政術部勤政宋晁補之日蝕請皇帝御正殿表徒傾葵藿之誠敢期回照未竭潢汙之滴尚或可著矧變異之已消尤故常之當復中叙恭惟皇帝陛下法禹罪已繼文小心惟五事之罔愆于三光而何累爰以朔旦自興重雲不用其行史前占于必蝕增修其徳人莫覩其或虧和足致祥順宜獲助而猶謙尊自牧震虩靡寧雖天所以愛人君常欲制于未亂而王所以奉天道故當懼于無灾然與其戒居處飲食之安孰若擴視聽猷為之善豈惟過也見而更也仰是謂應以實而不以文南靣宅尊達四聰于虞舜大庖日御綏五福于周成庶或聽卑終聞詔可隋許善心神雀頌序上庠養老躬問百年下士字民心為百姓政術部求言梁武帝詔晉氏陵替虚誕為風自此相因其失彌逺遂使武帳空勞無汲公之奏丹墀徒闢闕鄭生之履梁任昉策秀才文朕立諌鼓設謗木于兹有年矣比雖輻輳闕下多非政要日伏青蒲罕能切直將齊季多諱風流遂往將謂朕空然慕古虚受弗宏然自君臨萬㝢介在民上何嘗以一言失㫖轉徙朔方睚眦有違論輸左校而使直臣杜口忠讜路絶將恐𢎞長之道别有未周悉意以陳極言無隱明臺既闢承雲之歌闡衢室爰啟南風之頌流莫非降道爝輝紆靈浸澤垂聽革之典降聆金之訓召對神功不宰而萬化得以鈞陶者唯天心之有常皇治無疆而百職得以承宣者在淵衷之不息故堯仁蕩蕩不忘衢室之咨而舜治巍巍猶大闢門之典在禹下臯陶之拜雖磬鐸而有詢惟商有傅説之師盖左右之是置彼其君臣之際眞如父子之歡殿庭交勅都俞吁咈以相聞堂陛周旋可否是非之交正慨自面對之規不復致使封章之上日煩深拱禁庭疏奏密裁于幕内髙居臺閣敷陳僅隔于階前手足腹心之義無聞元首股肱之情安在竊恐密謀機事㚥或出于𫝊宣至于大政羣疑事必宜于奏對相須既切論事必深宣室流聲何取鬼神之問齋居决事未聞延訪之公唯譚理于延英者勵精忘日旰之勞而召對于天章者雅意給上方之札頗為一時之芳潤遂來千古之美名門外翠雲旗何鞀可擊殿頭金鳯簡無事堪書地連霄漢風生鳷鵲之樓座倚太清光映龜龍之沼天章閣詔問天子為億兆生靈之主獨理惟艱而朝廷設左右輔弼之臣論思是倚故一堂交儆猶不忘總章衢室之開即四方無虞未嘗撤吁咈都俞之響予違汝弼毋靣從而有後言朕德乃風必交修而㒺余棄建武賢稱七制公卿郎將數被召以至夜分貞觀推美三宗宰相諫官並入閣而商大政斯皆超出凡庸之上以故光輝信史之間批答條奏衢室闢于堯年嘉猷㒺伏明臺開于黄序庶績其凝惠哲安民臯謨夏室聰明憲帝説訓商廷鐘磬鼓鞀古風既逺表啟章疏故事徒存奏牘三千惜俳優之見畜陳篇五百恨左校之旋輸皂嚢切論于金商難彌鼠社彤史昌言于白虎莫止龍漦鳯扆一箴景德之天書益侈麟臺七驗巴陵之地道猶開召還諫臣芻蕘工瞽虞帝所以發神聰鐘磬鼓鞀夏王因而昭明德何古今之異代遂開塞之殊途殷侑八十四通竟長黜而不返元成三百餘奏嘆遇合之惟艱憶仙臺徒嘉仲郢之弼直披香殿空羡世長之忠貞時人爭畏其筆端誰問崔鴻之虎天下想望其丰采孰誇任昉之龍劾陳岵之邪怒其傷體論延齡之佞借以知名藏罟思忠何如置革于左右葺檻旌直孰若列雲於公卿放跡江湘致托譏于漁父竄身遼海嗟獨弔于舟人是以觸邪之神羊無登于殿陛指佞之屈軼不産于台階政術部相業唐劉禹錫謝中書張相公啟伏以相公心符上德道冠如仁一夫不獲慼見于色密啟未下歎形于言竟廻三舍之光能㧞九泉之厄袁公之平楚獄不忍錮人晏子之哀越石仍伸知己所以慶垂𦙍祚言成春秋神理孔昭報應斯必身侔蟬翼何以受恩死輕鴻毛固得其所宋蘇軾賀韓丞相啟洪惟上聖之后眷求一德之臣謂莫如公遂授以政付八音於師曠孰敢争能捐六轡于王良坐將致逺引領以望惟日為年恭以昭文相公全德難名巨才不器亹亹申伯之望堂堂漢相之風出入三朝險夷一節蕞爾種羗之叛命慨然當宁以請行威聲所加羶穢自屏淮蔡既定而裴度相徐方不回而召虎歸縱復遺種龍荒遊魂沙海譬之癬疥豈足爬搔必將訓兵擇帥而授之規模積榖堅城而磨以歲月破斧之惡四國實願周公之亟還折箠以鞭赤眉無煩鄧禹之乆外唐鄭亞太尉衛公㑹昌一品制集序唐虞之盛二典存焉夏殷之隆厥有訓誥自𦙍征甘誓乃有誓命之書皆三代之文一王之法也虞夏之際代祀綿逺其代王掌制之名氏莫得而知至于成湯太甲則有仲虺伊尹為之訓誥髙宗得傅説則有説命之篇周公召公相成王則有洛誥酒誥周官顧命秦始皇帝并一區宇丞相李斯實掌其言漢興當秦焚書之後侍從之臣皆不習文史蕭曹之軰又乏儒墨之用每封功臣建子弟其辭多天子為之縱委于執翰者亦非彰灼知名之士武帝使司馬相如視草率皆文章之流以相如非將相之器也厥後寖微寖長下于魏晉亦代有其人我髙祖革隋文物大備在貞觀中則顔公師古岑公文本興焉在天后時則李公嶠崔公融出焉燕許角立于𤣥宗之朝常楊繼美于代宗之世洎憲宗皇帝英武啟運雄圖赫張中興之業高映前古其時則先太師忠公翺翔内署有密勿賛佐之績平吳定蜀時唯其功及登樞衡作霖雨尊王室卑諸侯圖蔡料齊外定内理顯王言于典誥彰帝範于圖籍紀在徽册播于無窮沃心無疑躡足乃定由是洞啟宸衷大破羣議運籌制勝舉無遺䇿防㣲慮逺必契神機授鉞之臣伏膺承命謝安之圍碁尚刼曹参之飲酒方酣果有軍書繼聞戎㨗砥磨周鉞水淬鄭刀萬里來袁尚之頭顱二塜𦵏蚩尤之肩髀歡聲雖震于朝市喜氣不見于形容何其纂立功勲鎮定風俗若是之重也每牙管既㧞芝泥將熟一作乾嘗于前席親授筆札公亦分隂可就落簡如飛時有急宣關于密畫内庭外制皆不與聞或勢切疾雷機難終日宣室未召武帳莫開公則手疏封章達于旒扆當乙夜觀書之際未嘗不稱美再三此又豈可與賦洞簫而諷于後庭聞子虚而嗟不同世者論功校德耶李商隱太尉衛公會昌一品制集序意以黙識確乎寡詞車匠胡奴㒺迷于半靣背碑覆局無俟于專心聿承儉訓不有長物昔猶卑官端坐心齋江革分謝朓之舊襦便為卧具周正得袁憲之談柄常在講筵五車自娛三篋能識麗則孔氏之賦清新鄴下之詩重以多能推於小學王子敬之隷法遒媚皇休明之草勢沉著異代相逼當世罕儔不妄遇人慎于取友與李杜齊名者少願僑札交貺者稀故能應是昌時媚于天子憲章皇極燮理𤣥穹燭耀家聲粉飾國史侔帝典之灝灝噩噩尊王道之蕩蕩平平陳徐陵侯安都徳政碑天生宰輔堯年致白虎之祥神賜英賢殷帝感蒼龍之傑公亦觀時佇聖嘯咤風雲跪開黄石之書高詠𤣥池之野沈吟梁甫自比管仲之才惆悵莘郊久負伊生之嘆政術部選舉隋楊素贈薛播州詩二首有帛賁丘園生芻自幽谷塵芳金馬路瀾清鳯池澳零露既垂光清風復流穆傾盖如舊知彈冠豈新沐利心金各斷芬言蘭共馥自余歴端揆緝熈恧時彥及爾陪帷幄出納先天睠髙調發清音縟藻流餘絢或如彼金玉歲暮無凋變余松待爾心爾筠留我箭唐王維送丘為落第歸江東詩憐君不得意况復栁條春為客黄金盡還家白髪新五湖三畆宅萬里一歸人知爾不能薦羞稱獻納臣劉禹錫聞韓賔擢第歸覲以詩美之兼賀韓十五曹長時韓牧永州詩零陵香草滿郊坰丹穴雛飛入翠屏孝若歸來呈畫讃孟陽别後有山銘蘭陵舊地花纔結桂樹新枝色尚清為報儒林丈人道如今縱放鬢星星劉希夷餞李秀才赴舉詩鴻鵠振羽翮翻飛入帝鄉朝鳴集銀樹暝宿下金塘日月天門近風烟驛路長自憐窮浦鴈歲歲不隨陽白居易東都冬日會諸同年宴鄭家林亭詩盛時陪上第暇日會羣賢桂折應同樹鸎遷各異年賔階紛組綬妓席儼花鈿促膝齊榮賤差肩次後先助歌林下水銷酒雪中天他日昇沉者無忘共此筵孟郊同年春讌詩少年三十士嘉會良在兹髙歌揺春風醉舞摧花枝意動婉娩景喜凝芳菲時馬跡攅騕褭樂聲韻參差視聽改舊趣物象含新姿紅雨花上滴綠烟栁際埀淹中講精義南皮戯清詞前賢與今人千載為一期明鍳有皎潔澄玉無磷緇永將泥沙别各整霄漢儀盛氣自中積英名日四馳塞鴻無儔匹海月難等夷欝抑忽已盡親朋樂無涯幽蘅發空曲芳杜綿所思浮跡自聚散壯心誰别離願保金石志無令有奪移劉得仁和鄭先軰謝秩閒居寓書所懐詩西風日夜吹萬木共離披近甸新晴後髙人得意時暫閒心亦泰論道靣難欺把筆還詩債將琴當酒資藍衫懸竹桁烏㡌掛松枝名占文章重官歸諌憲遲生涯貧帝里公議到台司室冷沾苔蘚門清絶路岐莫言隣白屋即賀立丹墀豈慮塵埃久雲霄故有期梁武帝詔在昔周漢取士方國頃代凋訛幽仄罕被人孤地絶用隔聽覧士操淪胥因兹靡勸豈岳瀆縱靈偏有厚薄實由知與不知用與不用耳朕以菲德君此兆民而兼明廣照屈于堂戸飛耳長目不及四方永言懐愧無忘旦夕任昉求薦士詔朕纂統鴻緒寅畏大寶思用俊異協賛雍熈歴聽九工物色輿皂而白駒盈谷萇楚未刈所以臨朝咏嘆日昃伊佇陳後主令百官舉士詔旁求俊乂爰逮側微用道和羮是隆大厦上智中主咸由此術朕以寡薄嗣膺景祚思所以登俊髦彥式備周行但空勞宵夣屢勤史卜申旦凝慮丙夜損懐豈以食玉炊桂無因自達將懐寶迷邦咸思獨善應内外衆官可各薦一人以會彚征之㫖且取備大小之用其有負能伏義擯壓當時著賔戯以自憐草客嘲以慰志人生一世逢遇誠難亦宜去此幽谷翔兹天路趨銅駝以觀國望金馬而來庭便當隨彼方員飭之矩矱唐顔師古策問設官分職非賢不任知人則哲惟帝難之良由言行相違名實乖舛情態難覩蘭艾莫分藻鏡銓衡苦其混糅如何審綜察兹優劣八觀之術往彦所陳七繆之郵非無前説澄汰糠粃其可必陳吳師道賢良方正策是知席蘿黄屋握一作緬鏡紫微誠一作咸資獻替之功必待弼諧之助所以軒轅撫運遂感大風之祥伊帝乘時遽致秋雲之兆朕雖慙古烈而情切上皇未校滋泉之占猶虚傅野之夢欲使歲星入仕風伯來朝河薦蕭張之名山降甫申之佐埀衣佇化端拱仰成多士溢于周朝得人過于漢日行何政道可以至斯下僚必録上賞頻霑則葉縣遊龍自九天而下降燕郊駿馬赴千金而遥集崔沔詞標文苑策撫踠足于吳阪指潜璧于荆山房晉詞標文苑科策誠願察彼山苖之詞求夫縱壑之論材或可紀超升于槐棘之班德或可褒擢任于公卿之位開其上賞之路頌以中和之詩則淳于髠之進賢一朝而見七士許子將之舉德少選而收二俊自然時人濶步才子長鳴公理息昌言之篇節信罷潜夫之作皇甫瓊詞標文苑科策洎嬴暉掩鏡漢道亡珠位以恩升榮非德進挂網羅者則黄鵠髙飛縻爵禄者則青鳬競至靈祗翕忽出震宫而齊巽圍雲雨氤氲辨天垓而通地圻慕崩沙之靈運符潤石之休期憂在進賢道叶採苓之化恩無不逮德合樛木之風掩媧后以稱尊邁姬任一作旦而立政吹塵一作竽釣璜之侣接武于堦墀騎星弄電之夫肩隨于廊廟雖良駿充廐逾懐買骨之謀真龍在堂更佇丹青之翫應休璉之獨坐鳥雀來庭尹叔良之閒居蠨蛸在戸傍加策問親覧政途詞麗汾州聲侔沛邑一作聲洋洛邑掩鵬圖而該魏網漆園無控地之詞飛鶴板而徵漢臣九臯有聞天之譽凡曰羣生孰不幸甚彭殷賢文詞雅麗策斷斷之士必擢于廟堂九九之術不遺于管庫自土皷簣桴之後始自無聲汙樽抔飲之初彰乎有用既而莫不曲諧九變信合四時是知大樂與天地同和大禮與天地同節移風易俗義切于鐘鼓安上理人事寖乎揖讓既而祀歴三王時更七國經籍道息颺宣榭之煙埃儒生數窮赴秦坑而歇滅迨乎斷蛇立極乘牛設位紀綿蕝之儀鳴鼓舞之節必欲樂宣惉懘禮釋回邪取其不肅而成必在既富而教孟萬石文詞雅麗策張雲羅以掩俊設天網以頓竒片善不遺有能皆進故得飛飛丹鳯棲翼于帝梧皎皎白駒連食于場藿上官儀求賢對鳯德方亨必資英輔龍光未聘實俟明君既藏器以須時亦虛襟而待物莫不理符靈應道洽𠖇通類霜降而鐘鳴同雲蒸而礎潤秘策赴之如投水神心應之若轉規用能感會一時抑揚千古是以沉鱗暫躍遂游泳于天漢墜羽纔遷乃騰驤于日陸𢎞心體之妙音播舟水之嘉謨義列丹青德融金璧迨乎時鍾季叔化漸澆訛㧞萃之惠罕流因地之階愈篤使西都金一作陳子奕葉稱榮東國袁生八公為貴廷尉之明窮識理十載無知黄門之妙極摛文八遷寧進徒使干星秀氣永翳窮塵照廡竒光長湮幽石自可循風市馬襲軌闕龍三聘不虧七年無廢戔戔束帛指丘園而畢陳翹翹車乘望林泉而載轄則材標海若霧集丹墀德表星精雲飛紫闕豈直高尚之士遥集于台司衡泌之儔喬遷于鼎職梁王僧孺至南海郡求士教是以文舉下車寤夢于根矩長孫入境明發于龍丘此境三閩奥壤百越舊都漢開吳别分星畫部風序洋洋衣簮斯盛其川岳所産豈直明珠大貝桂蠧翠羽而已哉梁元帝薦鮑幾表臣聞思皇多士仄陋所以明敭疇咨熈載髦俊所以並作斯固殷殿初基拾龍淵之寶虞祠始構獻鳯管之玉旌蒲出魯賁帛歸齊頌聲既興盛業斯在伏惟陛下則天緯地乘正馭才沙汰八風澄明六合叶龜登夢之客日賁于丘園韋轂投竿之臣相望于魏闕故以物無遺寳矣振鷺有充庭之謳白駒罕空谷之咏洋洋濟濟無得而稱者焉臣識愧知才職非選舉竊以進賢上賞蔽賢顯戮敢緣斯義用舉所知伏見臣府中錄事参軍東海鮑幾年五十有七字景𤣥門庭雍睦立身貞退博涉文史頗閑刀筆公忠抗直出宰廉平雅志𢎞深安貧專静觧巾入仕三十餘年自游臣府一紀于兹前宰東邑實有二魯之風近處南臺欲尊兩鮑之則伏揆天嚴已當簡在脱蒙顯居良局登以清貫將齊毛玠古人之服實同吳隱酌水之廉昔丁隈牧州陳顧翟之好禮徐靖為郡薦袁奐之篤學桓範驅傳先舉管寧朱則剖符亦稱董直臣才非往哲識愧前修輕塵聽覽伏待斧鉞又薦顧協表貢玉之士歸之潤山論珠之人出於枯岸沈約薦劉粲表陛下則天開業冠帶要荒輶軒韋轂交軫于遐路捨築投竿相望于魏闕或以開圻未採管庫遺賢執㦸忘疲倚輈不息劉義慶薦庾寔等表降睿慮于管庫紆聖思于版築劉孝儀為江僕射禮薦士表陛下緝禮裁樂化俗移風當扆思治分宵夢相枯岸之珠既論潤山之玉已薦伏見太學博士賀瑒幼能斧藻長則琢磨結卷就賢擔簦來學鄉塾染其丹采朋友叩其洪鐘聲無愧于東筠材有踰乎西祀如使聯事宗伯握蘭建禮庶用得其才人知自朂任昉為蕭揚州薦士表陛下道隱旒纊信充符璽六飛同塵五尚髙世白駒空谷振鷺在廷猶懼隱鱗卜祝藏器屠保物色關下委裘河上非取製于一狐諒求味于兼採宋汪藻闕謝狀元及第表龔慶璇源幸備維城之列陞榮桂籍俄先入彀之英廣陛臚𫝊諸儒環視共欣千載之嘉㑹親值一人之至公嘗謂朝廷設科目以致英豪學者用文章而取富貴自古布韋之士有終身鉛槧之間既登鴈塔之標題至比龍門之變化豈有恩隆于帝胄更令名玷于賢書班聯玉笋之華光動金枝之秀由聖德曲成于大小視人材無間于親疎慮汨沒于膏梁特甄陶于翰墨肆埀淵問猥及孱蹤仰漸聖化之深雖能僅綴俯揆天資之陋終愧無竒甫上奏篇遽塵殊等鵬擊天潢之浪鶯遷帝苑之春伏遇陛下長育羣才幷包衆美謂秦之士賤由先王教養之衰方周以宗强宜近屬奨成之急倘不俯同于寒畯孰為自致于亨衢昔慚假寵于分茅今喜成名于拾芥繄君父義方之素致邦家儒術之尊臣敢不敦尚詩書勉思忠孝既與在庭之多士同值文興將令就傅之百男悉從隗始唐權德輿舉楊慿狀卓爾山立不隨波流白居易薦韋楚狀雖飛鴻入㝠自忘飲啄而白駒在谷亦貴縶維倘蒙寘彼周行縻之好爵降羔雁之禮命助鴛鷺之羽儀足以厚貞退之風遏躁進之俗李商隱為濮陽公薦人狀鏡納無私山高不譲又為渤海公舉人自代狀莊栗以裕簡嚴而寛玉無寒温松有霜雪頃居内署實事文皇引裾而外朝莫知視草而中言罔漏隱之清節無愧于投香江革歸資唯聞于單舸使桴鼓希鳴建瓴流化又為濮陽公薦人狀慕碣石之築宫廣延儒雅效西河之擁篲樂得賢才令狐綯薦李羣玉状羣玉苦心歌篇屏跡林壑佳句流傳於衆口芳聲藉甚于一時守道安貧逺絶名利當文明之盛代宜備搜羅俾典校于瀛洲佇光志業齊王融求自試啟臣聞春庚秋蟀集候相悲露木風榮臨年共悦夫惟動植且或有心况在生靈而能無感夫君道含𢎞臣術無隱翁歸乃居中自見充國曰莫若老臣竊慕前修敢蹈輕節梁元帝啟東宫薦石門侯啟切以鳯鳴朝陽必資藍田之寶龍門㸃額亦俟堂溪之珍是以紫玉見稱黄金為貴文傳夢鳥學重靈虵㸃漆凝脂事逾衛玠渾金璞玉才匹山濤昔翟陽隱逸見稱庾亮陳平器局被薦無知以人廢言誠増竦讋進賢上賞伏待慈照丘遲答舉秀才啟方今八友盈庭五丞在幄七教畢修九功具舉猶乃物色關屠夢想巖釣故已天不愛寶野無遺賢唐駱賔王上兖州刺史啟某淹中故俗體朴厚之宏規稷下遺氓陶禮義之餘化頗游簡素少閲縑緗每蟋蟀凄吟映素雪于書帳莎雞振羽截碧蒲于翰池既而學異懐蛟才非夢鳥價不齊于南漢芳不重于東山幸属日月光華雲霞紛郁方結羡魚之網將謡叩角之詞奮短翮於搶榆希髙標之餘拂濯纎鱗于涓滴望洪浪之微沾所兾顧盼曲流剪拂増價則鉛刀起一割之用跛鼈致千里之行是知竊混吹于齊竽濫飛聲于郢路拘山雞而自恧顧遼豕以多慙輕觸威顔不遑流汗駱賔王上司列太常伯啟雕其璞嶧山有半死之桐賞其聲柯亭無永枯之竹王勃上吏部裴侍郎啟駿骨長朽真龍不降鸞扃停逸頻虚不次之階鶴板徵賢累發非常之詔天下有道吾豈匏瓜李商隱為張周封上楊相公啟竽將濫吹石有參瓊顧雲上池州庾員外啟陳於器用則魏瓠興譏列在宫商則齊竽致誚又謝徐學士啟今也河薦綠圖山張疑翠檢開張網罟漁獵英髦周渭商巖皆辭釣築抱關負鼎盡掛簮裾宋真德秀囬馬探花啟發西洛之正傳繹考亭之大義識微見逺憂治危明僉謂劉蕡空臆之言出于董子潛心之業龍津一躍三十喜骨骼之成鵬翼髙騫九萬摶扶搖而上翌日報泥金之帖䨇親傾藥玉之杯一經教子以有功羣兒祝身而願學方雲冀謝試中宏詞啟勒成功于砥柱草木聞風述畫像于凌煙丹青動色李守真賀人及第啟奏藝明庭策名上第喧前騶于廣路觀者肩摩落餘藁于四方傳之紙貴望髙時俊光動儒林乃太平養士之功亦諸生稽古之力恭惟某官天姿峻澈學術粹深璧水升堂七年並席金鑾通籍一唱驚人盖志大而氣豪故實修而名至落落髙騫于日下錚錚獨韻于彀中御史直聲固遺風之自許平津相業不數歲而可期某夙仰英游阻聞緒論方欲效李邕之識靣慕盧仝之卜交奉詔殿廬幸觀落筆曵裾公府復枉過門惠然投我以夜光何以報君之玉案載懐深厚但極感藏通衢在望絶足方遒陽春白雪之音一時寡和金馬玉堂之步指日可期某猥預盛時喜聞榮㨗雖仰洛中之價未親麈尾之談吳叔玉賀第三人及第啟賜第宸廷聯名鼎甲傳玉音而申論藹桂籍以生光恭惟某官經史淹該文詞贍蔚卓爾功名之志見于議論之英以貲為郎欲獻相如之賦隨計詣闕果蒙漢武之知殊科收摘頷之功絶技有中肩之恨高名始唱實居季孟之間故事攸拘遂處王楊之後昭聲華于白日開途轍于青雲某頃預攸司獲觀大對㧞象犀之寶本自因人標龍虎之稱徒欣得士方傳盛事賜貺長牋仰謙德之光亨増鄙悰之感激方岳回史督相啟微如腹背之毛亦玷齒牙之論真德秀回孫榜眼啟比承清問獨罄丹衷鋪陳主德隆替之由力辯國論是非之正雖明白峭直不為媚俗之言而渾厚深醇自得告君之體衆共稱于卓偉公特出于緒餘夫既都儒者之至榮要必慕古人之盛節昔仁皇帝旁搜于多士若韓魏公擢遷在二人顧科第之相同不知其幾而勲名之有爛獨到于今願恢他日之逺圖㒺俾前修之專美歐陽修賀試中舘職啟被召試文陞華儒舘伏以某官天麟異禀廟璉至珍學通古今之淵源言合質文之體要英躔髙步羣俊夐以望風雄彀籠材妙選稱為得士果膺帝意入耀書林給札揮毫聳如墻而駭目奏篇稱善喧貴紙以傳都惟秘府之育賢乃熈朝之盛美優游歲課豈鉛槧之是專選取國材寔棟梁之此出蔚然茂業奚測逺塗楊億賀試中賢良啟召對紫庭祗膺清問揮毫洒落見武仲之不休對策稱嗟升平津于第一翌日便頒于成命十洲咸慶于榮登暫淹椎月之曹豈測摶風之勢趙德莊謝太守薦舉啟伏念某愚不通今拙而嗜古百世而下莫究聖人之大全中年以來不堪世路之多故簿書汨沒師友散亡驚短髪之半華悼初心其既逺靦從煩劇尤失故常當民敝財殫為方今之公患而政苛歛急豈學者之安行故嘗取予于權宜不盡拘攣于文法茍少紓于罷俗亦何愛于微躬所幸人主大明日月其照我公盛德父兄乃心用能三歲之間或致一毫之効然塵埃不可以薰沐拜起甚慚于歩趨舉瓢而酌天漿坐歎星辰之逺比竹而聞人籟益知耳目之卑謂當黜而外之豈曰從之遊者惟時指授不愛巧雕出五色于深嚢既將脱其毛骨捐千金于敝帚又復借以齒牙豈徒了于一生固足施于後世播芳大全干倉使薦舉啟昔者東坡之門卓然北斗之望惟斯文之宗主盡在是故當世之豪傑皆歸之陳後山之在徐嘗賦稲田待公秧之句黄山谷之遊魏亦哦小草有逺志之詩皆由郡文學之臣自負墨客卿之列品題一出聲價倍増遂令四學士之名等華岳而俱重以至六君子之選與星日以並埀此風無𫝊吾道誰屬骨相郊寒性資参魯付悲歌于長鋏每思看劒之文成甘活計于短檠自喜床頭之易在齊江淹奏記詣南徐州新安王伏惟殿下削赤野之玉剪燕山之金至如某者東國之徒走耳方歛影逃形匡坐編蓬之下遂遭烟霞餘彩日月末光惟恩知泰變色薰心某聞齊石既撫無待巴人之唱檀臺已構寧俟不才之木豈宜炫璞鄭氏獻鳯楚門宋崔賾答豫章王書燕南贅客河朔惰游本無意于希顔豈有心于慕藺未嘗聚螢映雪懸頭刺股讀論惟取一篇披莊不過盈尺况復桑榆漸暮藜藿屢空舉燭無成穿楊盡棄但以燕求馬骨薛養雞鳴謬齒鴻儀虛班驥皂挾太山而超海比報德而非難堙崑崙以為池匹酬恩而反易隋王孝藉上牛𢎞書坐人物之源運銓衡之柄反披狐白不好緇衣此小人為明尚書不取也唐王勃上劉右相書嵩衡不拒細壤故能崇其峻江海不譲纖流所以存其廣是以星臺曉闢上台忘吐握之勞月殿宵興中宇軫山林之慕知夫御天下者必待人也詩曰濟濟多士文王以寧未見君子憂心如醉伏見皇明逺燭帝采遐宣張樂岱郊騰勲社首徵廉察孝瑤壇虛不次之階署行議年璿檢動非常之詔天下可謂幸甚矣于是友月朋霞之客背青臯而至馮唐顔駟之才排紫閣而集夫豈知終始異數涇渭同流蘿薜失圖簮纓解體惜哉羣英霧散名侯招蔽善之嫌天下雷同才子鮮長鳴之地而欲招絶足致真龍難矣伏願闢東閣開北堂待之以上賔期之以國士使得披肝膽布腹心大論古今之利害髙譚帝王之綱紀然後鷹揚豹變出蓬戸而拜青墀附景摶風捨薹衣而見丹闕庶幾乎麑卵不棄終感𤣥枵之精駿骨時收或致飛黄之錫周庾信擬連珠盖聞十室之邑忠信在焉五歩之内芬芳可錄是以日南枯蚌猶含明月之珠龍門死樹尚抱咸池之曲豫章七年蔽于豐草芳蘭九畹淪于幽谷是以欲求其真晉陽有自埋之蒿若賞其聲吳亭有已枯之竹政術部招隠周明帝招隱士逍遥公韋夐詩六爻貞遁世三辰光少微潁陽譲逾逺滄州去不歸坐石窺仙洞乘槎下釣磯嶺松千仞直巖泉百丈飛香動秋蘭佩風飄蓮葉衣聊登平樂觀遥想首陽薇詎能同四皓來参余萬機梁沈約為武帝與謝朏敕是用虛心側席属想清塵不得不屈兹獨往同此濡足便望釋蘿襲衮出野登朝必不以湯有慙德武未盡善不降其身不屈其志使璧帛虚往蒲輪空歸傾首東路望兼立表羲軒邈矣古今殊事不獲總駕崆峒依風問道今方復引領雲臺虚已宣室紆賢之媿載結寢興晉陶𢎞景解官表臣聞堯風沖天潁陽振飲河之談漢德括地商隂峻餐芝之氣臣棲遲早日簮帶久年仕豈留榮學非待禄恒思懸纓象闕孤耕壟下席月澗門横琴雲際始奉中恩得遂丘壑今便滅影桂庭神交松友一出東關故鄉就望睠言興念臨波瀉泪隋晉王庚與逸人徐則書夫道得衆妙法體自然包涵二儀混成萬物人能𢎞道道不虛行先生履德養空空𤣥相濟將深明義味曉達法門悦性沖和恬神虚白餐松餌栢栖息煙霞望赤城而待風雲遊玉堂而駕龍鳯雖復藏名台嶠猶且騰實江淮藉甚才華有勞寤寐欽承素道久積虛襟側席幽人夢想巖穴霜色已冷海氣將寒偃息茂林道體休逸念昔商山四皓輕舉漢庭淮南八公羽一作來儀藩邸古今雖異山谷不殊市朝之隱前賢往説遵凡述聖非先生而誰故遣使人往彼延請想無勞束帛賁然來思不待蒲輪去彼空谷希能屈已竚望披雲李密與道士徐鴻客書今龍戰于野鵬翔寥廓或出或處且變星霜猶未闕授道是曰仁人除暴静亂方稱君子賛我興運今也其時尊師宜躡屩擔簦用虞卿之禮披榛輓輅襲婁敬之風引領瞻望拂席相待遲聽酈生之談方聞左車之説桂樹山幽歲云暮矣桃花源穴想見其人宋豫章王遺崔賾書昔漢氏西京梁王建國平臺東苑慕義如林馬卿辭武騎之官枚乘罷𢎞農之守每覽史傳嘗竊怪之何乃脱略官榮栖遲藩邸以今望古方知雅志彼二子者豈徒然哉足下博聞强記鉤深致逺視漢臣之三篋似陟蒙山對梁相之五車若吞雲夢吾兄欽賢重士敬愛忘疲先築郭隗之宫常置穆生之醴今者重開土宇更誓山河地方七百牢籠曲阜城兼七十包舉臨淄大啟南陽方開東閣想得奉飛盖曳長裾藉玳筵躡珠履歌山桂之偃蹇賦池竹之檀欒其崇貴也如彼其風流也如此幸甚幸甚何樂如之髙視上京有懐德祖才謝天人多慙子建書不盡意寧俟繁辭唐上官儀招髙士書則天分命箕山多長往之賔濬川劬勞滄州有肥遁之客是以北荒孤竹甘一作隱草澤而輕周南岳紫芝翫林泉而恥漢此盖為匹夫小節未達汾陽之㫖獨行幽姿寧動少㣲之宿豈若大風在夢飛熊入兆下箕尾而稱師委干旄而作傅自大君有命逺頓天紘盡巖穴之英竒揔濠梁之薖軸脱荷裳而襲朱紱觧薜蘿而綰青綬五尺童子羞稱荷蓧三事大夫恥觀瓢飲將使鄭君谷口擅不言之謠曹相府門多清浄之化方知聖人在上真隱不獲全其髙淳風所偃幽貞不能固其節麛卵一作麛貍得性麟鳯所以呈姿山林不夭風雲以之通氣唐王勃乾元殿頌序飛鶴書而抽海狀桂壑于是投綸轉麟斾而揖山容松澗由其削衽龜文獵彦麟旌放逸桂客攀榮松賔改律紫鵷開紀丹虬聳秩縱壑摶飇登山捧日陳子昂别中嶽二三真人序實欲執青節從白蜺陪飲崑崙之庭觀化𤣥元之府宿心遂矣冥骨甘焉豈知瓊都命淺金格道㣲攀倒景而迷途顧中峰而失路塵縈俗累復汨吾和仙人真侣永幽靈契翳青芝而延佇遥會何期結丹桂而徘徊逺心空絶政術部吏治唐張説送蘇合宫頲詩都邑羣方首商泉舊俗訛變風須愷悌成化佇絃歌疇昔珪璋友雍容文雅多振纓遊省闥鏘玉宰京河别曲鸞初下行軒雉尚過百壺非餞意流詠在人和又洛橋北亭餞諸刺史詩離亭拂御溝别曲舞船樓詔餞朝廷牧符分海縣憂股肱還入郡父母更臨州扇逐仁風轉車隨靈雨流恩光水上溢榮色桞間浮預待羣芳最三公不逺求蘇頲春晩送瑕丘田少府還任因寄洛中鏡上人詩聞道還沂上因聲寄洛濵别時花欲盡歸處酒應春聚散同行客悲歡属故人少年追樂地遥贈一霑巾又餞澤州盧使君赴任詩聞道降綸書為邦建綵旟政憑循吏徃才以貴卿除詞賦良無敵聲華藹有餘榮承四嶽後清絶上天初關路通秦壁城池繞晉墟撰期行子赴分曲列侯居别望喧追餞離言繫惨舒平蕪寒蛬亂喬木夜蟬踈寥泬秋先起推移月向虛舊交何以贈客至待烹魚盧象奉和張使君宴别加朝散詩佐理星辰貴分榮渙汗深言從大夫後用答聖人心騎擁軒裳客鸞驚翰墨林停盃歌麥秀秉燭醉棠隂爽氣凌秋笛輕寒散暝砧祗應將四子講德謝知音劉禹錫奉送裴司徒令公自東都留守再命太原詩星使出關東兵符賜上公山河歸舊國管籥換離宫行色旌旗動軍聲鼓角雄愛棠餘故吏騎竹見新童漢壘三秋静胡沙萬里空其如天下望旦夕詠清風錢起送彈琴李長史赴洪州詩携琴為傲吏孤棹復南征幾渡秋江水皆添白雪聲佳期來客夢幽興緩王程佐牧無勞問心和政自平又送沈少府還江寧詩逺宦碧雲外此行皆興牽湖山入閭井鷗鳥傍神仙斜日背鄉樹春潮迎客船江樓新興發應與政聲傳李夷簡西亭暇日書懐上相公詩勝賞不在逺無然念𤣥搜兹亭有殊致經始富人侯澄澹分沼沚縈廻間林丘荷香奪芳麝石溜當鳴球撫俗來康濟經邦去咨謀寛明洽時論惠愛聞甿謳代斵豈容易守城獲優悠文翁舊學校子產昔田疇琬琰富佳什池臺想舊遊誰言矜改作曾是日增修憲省忝陪属岷峨嗣徽猷提携當有路勿使滯刀州武元衡奉酬李十一西亭暇日書懐詩鼎鉉昔云忝西南分主憂烟塵開僰道旌節䕶蠻陬任重功不立力微恩未酬據鞍慙齒髪責帥懼春秋髙德間鄭履儉居稱晏裘三刀君入夢九折我廽輈時景屢遷易兹焉期退休方追故山事豈謂台階留遐挹清静理眷言蘭杜幽一緘瓊玖贈萬里别離愁巴嶺雲外沒蜀江天際流懐賢耿遥思相望鳯池頭杜荀鶴贈漣水崔少府詩庭戸蕭條燕雀喧日髙忩下枕書眠只聞留客教沽酒未省逢人説料錢洞口禮星披鶴氅溪頭吟月上漁船九華山叟心相許不計官資贈一篇白居易奉和汴州令狐相公詩客有東征者夷門一落㠶二年方得到五日未為淹在浚旌重葺遊梁館更添心因好善樂貌為禮賢謙俗阜知敦勸民安見察廉仁風扇道路陰雨膏閭閻文律操將柄兵機釣得鈐碧幢油業業紅斾火襜襜景象春加麗威容曉助嚴槍森赤豹尾纛吒黒龍髯門静塵初斂城昏日半銜選幽開後院占勝坐前簷平展絲頭毯髙褰錦額簾雷槌柘枝皷雪擺鶻騰衫髪滑歌釵墜粧光舞汗霑廻燈花簇簇過酒玉纖纖饌盛盤心殢醅濃盞底粘陸珍熊掌爛海味蟹螯鹹福履千夫祝儀型四座瞻羊公長在峴傅説莫歸巖眷愛人人遍風情事事兼猶嫌客不醉同賦夜厭厭馬戴寄金州姚使君員外詩老懐清浄化乞去守洵陽廢井人應滿空林虎自藏迸泉踈石誤殘雨發椒香山缺通巴峽江流帶楚檣憂農生野思禱廟結雲裝覆局松移影聽琴月墮光鳥鳴開郡印僧去置禪床罷貢金休鑿凌寒笋更長退公披鶴氅髙歩隔鵷行相見朱門内麾幢拂曙霜張祜投常州從兄中丞詩扁舟何所往言入善人邦舊愛鵬摶海今聞虎渡江士因為政樂儒為説詩降素履氷容静新詞玉韻樅金魚聊觧帶畫鷁稍移椿邀妓思逃席留賔命倒缸吏材誰是伍經術世無䨇廣厦當宏構洪鐘倂待撞成龍須譲邴展驥莫先龎應念宗中末秋螢照一忩姚鵠寄贈許璋少府詩若説君髙道何人更得如公庭唯樹石生計是琴書詩句峭無敵文才清有餘不知尺水内争滯北溟魚皇甫曾送杜中丞還京詩罷戰廻龍節朝天見鳯池寒生五湖道春及萬年枝召化多遺愛胡清已畏知懐恩偏感别墮淚向旌麾崔峒贈同官李明府詩訟堂寂寂對烟霞五桞門前聚曉鵶流水聲中視公事寒山影裏見人家觀風競美新為政計日還知舊觸邪可惜陶潜無限酒不逢籬菊正開花宋舉廉吏詔鞭撻不已而寵賂章簠簋不飭而節行缺退食鮮羔羊之節虐民多碩鼠之譏念激濁在於揚清而癉惡莫如彰善神爵奨朱邑之潔治盛循良開元旌王闕之廉風移苛嬈一賢蒙擢百辟向方齊王融策秀才文下邑必樹其風一鄉可以為績至有旦撫鳴琴日置醇酒文而無害嚴而不殘故能出人于阽危之域躋俗于仁壽之地頃深汰珪符妙簡銅墨而春雉未馴秋螟不散豈薪槱之道未宏為網羅之目尚簡唐駱賔王上齊州張司馬啟推公平而折獄磔鼠謝其嚴明擁端慤而行仁化虵慙其勇智又上瑕丘韋明府啟化浹下車恩孚攬轡德聲洽詠仁風飄十地之雄道化編謠惠露洒三天之渥狎中牟之馴雉豈懼驍媒驚重泉之瑞鸞非關照舞又上梁明府啟水鏡澄瀾照孤鸞之舞影鳴琴動操叶馴翬之雅音陳徐陵與王吳郡僧智書竊承富春頃嵗多難荐臻邑閈皆空黔黎將盡御史舊榻零落不存太傅齋室荒茫無處自神麾所届襁負斯歸新屋方華故田斯墾府吏閒坐長史誦經督郵無事唯慮吹笛東苞海水俱承幕府之威西泊江沱同仰惟良之化政差邊張何其神也梁任昉王文憲集序六輔殊風五方異俗公不謀聲訓而楚夏移情故能使解劒拜仇歸田息訟唐張説唐故凉州長史元君石柱銘序簡綱鳩人峻策羈吏閒田盡闢鰥寡委犬彘之餘絶澗無遊豪猾屏蠶漁之氣晋書劉琨傳轉鬭至晋陽府寺焚毁僵尸蔽地其有存者飢羸無復人色荆棘成林豺狼滿道琨翦除荆棘收葬枯骸造府朝建市獄冦盗互來掩襲恒以城門為戰塲百姓負楯以耕属鞬而耨周庾信丘乃敦崇𫝊清不置水明非舉燭乃是入境移風非直停車待雨唐顧况宋州刺史㕔壁記下車之日無土不殖桑麥翳野舟艫織川城髙以堅士選以飽符載鄧州刺史㕔壁記以大誠受物以至信結物以𤣥機運物以嚴禁肅物構壊竿為廬舍銷遺鏃為鋤耜伐蒿萊為塲圃掘腥穢為泉井交父子之歡正夫婦之倫依仁化者如水赴壑首年而富中年而教季年而政成李白兖州任城縣令㕔壁記季野備四時之氣士元紆百里之才撥煩彌閒剖劇無滯鏑百發尅破于楊葉刀一鼓必合于桑林寛猛相須韋弦適中一之嵗肅而教之二之嵗惠而安之三之嵗富而樂之然後青衿向訓黄髪履禮耒耜就役農無遊手之夫機杼和鳴織罕嚬蛾之女物不知化陶然自春皇甫湜廬陵縣令㕔壁記萼合兄弟之析居者而民以養麕復老弱之流庸者而疆以實程浩相州公宴堂記入境而七德有餘及庭而三歎不足鄧衮望雪樓記昔西漢進儒術臣多貞方魏晋扇虚𤣥吏采風流孰謂公精六籍練衆務藴張趙之幹敏兼王謝之清雅辨辭盈庭奮毫電飛具牘百幅歴眸氷釋前可以折穆之之角近可以挫戴胄之鋭王勃益州夫子廟碑𤣥機應物潜銷水怪之災丹筆申寃俯絶山精之訟仙鳬旦舉影入銅章乳翟朝飛聲含玉軫臨卭客位自髙文雅之庭彭澤賔門猶主壺觴之境又益州德陽縣善寂寺碑仁風易狎候丹籜于春坰惠化難經佇青鸞于曉墜又廣州寶莊嚴寺舍利塔碑越谿仙鍔吐光芒而駭人岱嶺寒松排風飇以成性美哉稱由功著鶻響徹于雲霄方為時須熊軾疲于道路廣陵單轂如送張綱渤海亂繩復思龔遂王尊皂盖欣臨折坂之前吳隱朱軿更集貪泉之右髙名夙著佛化横飛羣盗屏跡而歸農姦吏聞風而去職京坻坐積圄犴潜廽汲黯之卧淮陽直聞清浄王堂之居汝郡但舉賢良用能使檻穽不施猛獸廵江而逺竄市㕓無擾商旅倍道而相歡颶風寢毒炎埃罷厲人稱有道家實無為又梓州𤣥武縣福會寺碑泉魚狎夜多單父之深恩隴翟遊春嗣中牟之善政張文成滄州弓髙縣實性寺釋迦像碑横綺琴于膝上翠翟朝馴攬明鏡于懐中青鸞曉集李嶠宣州大雲寺碑卓子康之莅政不任刑書虞承卿之到官唯開講席李嶠攀龍臺碑泉藪未懲萑蒲猶在鈎距闇施既問羊而知馬網羅潛設亦因魚而得鴻降北海之渠未踰期月盡南山之盗詎假旬時黄次公政稱長者裂壌開封杜伯侯動無間然賜書増秩梁沈約齊故安陸昭王碑文撫同上德綏用中典疑獄得情而弗喜宿訟兩譲而同歸扇以廉風孚以誠德盡任棠置水之情宏郭伋待期之信金如粟而弗覩馬如羊而靡入雛雉必懐豚魚不爽由是傾巢舉落望德如歸椎髻髽首日拜門關卉服滿塗夷歌成韻禮義既敷威刑具舉强民獷俗反志遷情風塵不起囹圄寂寞富商野次宿秉停菑蝝蝗弗起豺虎逺跡北狄懼威關塞謐静偵諜不敢東窺駝馬不敢南牧陳徐陵為徐州刺史侯安都德政碑于是鎮之以清静安之以惠和望杏敦耕瞻蒲勸穡室歌千耦家喜萬鍾陌上成隂桑中可詠春鶊始囀必具籠筐秋蟀載吟競鳴機杼或肅拜靈祀躬瞻舞雩去駕擁于風塵還旌阻于飄沐京坻嵗積非勞楚堰之泉倉廩年豐無用秦渠之水雖復東過小縣夏雨逐其輕輪南渡滄江秋濤弭其張盖固不得同年而語矣約法遵寛設蒲鞭之恥立言惟信控竹馬之期甘雨隨車雲低輕重之盖還珠合浦波含逺近之星至如卧理稱難坐嘯匪易披裳問疾埀愛景以字人褰帷廣聽穆薰風而扇物嚴霜秋降叶隼擊而防小人零露春濡飾羔旌而禮君子譬諸烹魚勿煩擾則免于糜爛如彼種木任生植則自然蕃滋周庾信周柱國大將軍尒綿永神道碑名馳梓嶺聲振榆關無雷畏威負霜懐惠繁不秋荼嚴無夏日民知約法未肯以獄吏為尊吏識刑名無敢以死灰相懼唐楊烱瀘州都督王湛神道碑欒巴典郡山鬼潛移張禹牧州江濤不起張説夏州都督王公神道碑銘勤由宰邑借恂臨郡海女避途山虵可問嚴識𤣥潭州都督楊志本碑貪殘盡去自使乳虎浮江灾疫不生即有牽牛入界楊烱唐恒州刺史建昌公王公神道碑門容駟馬位列三刀防薏苡之譏嫌絶簡書之流謗豈直廣州清節酌貪泉于石門合浦神君返明珠于漲海鄧晨一郡漢帝稱為主人李廣數年匈奴號為飛將行嘗計日郭伋不負于童兒郡異中平王觀無私于任子楊烱益州温江縣令任君神道碑洛陽行馬門士無心齊國池魚權家絶望鄭文公邵陵之縣但稱男子之名師尚父灌壇之鄉唯有神人之哭又原州百泉縣令李君神道碑抽琴命操還臨單父之堂擊石飛鳴即對李泉之學明以御下將水鏡而通輝清以立身共氷壺而合照周庾信大將軍上開府廣饒公鄭常墓誌銘及驅犀節乃牧雄州吏不驚犬人無喘牛西蠶得嵗東作逢秋草爛獄戸星低市樓又周大將軍聞喜公柳遐墓誌静尋欹案或吟長岑之逺乍撫鳴琴不以河陽為陋日南金柱合浦珠泉莫肯經懐未嘗留目已上吏治宋余靖去官受饋判古之循吏名列青編挂府丞之魚誠在涖官之日留壽春之犢實維去任之晨何乃肆貪罔知守節歌鄧侯之五鼔曾是遵途持山隂之一錢當思勵俗唐祖君彦為李密檄洛州文錢神起論銅臭為公梁冀受黄金之虵孟佗薦葡萄之酒已上不職唐張次宗請立李德裕德政碑狀勲著王室者則銘于景鐘功及生人者則刋于樂石故扶風存必拜之地峴山有墮淚之思來暮之謠已彰于昔嵗去思之美無謝于古人今合境同辭諸郡獻狀雖黄覇入用寵方盛于登賢而鄧侯不留情猶深于愛樹臣謬當交代備聞政能願嗟卧轍之情特允紀功之請陳簡甫宣州開元以來良吏記召公之化勿剪其棠桞季之仁不薪其墓楊炎河西節度使杜公碑庶乎覩斯文者有襄南之慕頌遺美者深潁上之風李嶠攀龍臺碑潁川之還借冦恂臨淮之重祈侯覇儔功語德彼獨何人周庾信上柱國齊王憲神道碑成都有文翁之祀非謂生前漢陽有諸葛之碑止論身後已上遺愛政術部重農漢張衡東京賦及至農祥晨正土膏脉起乘鑾輅而駕蒼龍介馭間以剡耜躬三推于天田修帝籍于千畆供禘郊之粢盛必致思乎勤已兆人勸于疆埸感懋力以耘耔唐闕觀農賦是時也杏花毓樹蒲葉抽叢繞出鳯城疲道路之攸往迴瞻鶉野知耕鑿之斯崇美夫原隰底績溝塍刻鏤耒耜交横煙雲輻輳人沮溺而為伴水鄭白以分溜一稃二米禾同北里之禾苗盛草稀豆異南山之豆觀夫田畯至喜室家相歡揮鎡去莠築堰澆蘭野餉曉持于斜逕畚鍤暮荷于層巒鄰近山之樹密悦臨流之地寛葵腰鎌而乍采黍策杖而時看張仲素稼如雲賦爰恊古公之政式𢎞管氏之虞至夫實穎蓁蓁厥田上上膏陰潤以蕃庶矗朝隮之異狀丘陵共秀且聞束晢之詩黍稷盈疇更欝仲宣之望懿夫白露凝冷清風戒寒是刈是穫式宴且歡諒遺滯之足利思京坻而可觀賈餗中和節百辟獻農書賦稽重榖之言徒稱董仲驗深耕之法何媿朱虚所以候驚蟄之辰應夾鍾之律昭八政之所用蓄九年之罔失是藨是蓘將致乎千斯倉爰始爰謀必因乎四之日鄭式方中和節百辟獻農書賦道洽無外化康有截猶慮九扈未宏三時尚缺命陳書而王化可闡俾知方而農政斯列既戒既種粢盛之望有期弗震弗渝地理之宜奚設豈不以寒氣揔入春陽始初陳乎五種之用本乎三農之書王者則千畆是藉庶人則中田有廬故年榖之順不差物力之功克實首嘉節而東作方起符中星而西成乃畢梁元帝令軍國多虞戎旃未静青領雖熾黔首宜安時惟星鳥表年祥于東秩春紀宿龍歌歲取于南畯况三農務業尚看夭桃敷水四民有令猶及落杏飛花化俗移風常在所急勸耕且戰彌須自許豈直燕埀寒谷積黍自温寧可隨此𤣥苖坐餐紅粒不植鷰頷空候鳴蟬可悉深耕溉種安堵復業無棄民力並分地利政術部屯田元魏薛虎子屯田積粟表臣聞金湯之固非粟不守韓白之勇非糧不戰故自用兵以來莫不先積聚然後圖兼并者也今江左未賔鯨鯢待戮自不委粟彭城以彊豐沛將何以拓定江關掃一衡霍竊惟在鎮之兵不減數萬資糧之絹人十二匹即自隨身用度無凖未及代下不免飢寒論之於公無毫釐之潤語其利私則横費不足非所謂納民軌度公私相益也徐州左右水陸壤沃清汴通流足盈激灌其中糧田十餘萬頃若以兵絹市牛分減戍卒計其牛數足得萬頭興力公田必當大獲粟稲一歲之中且給官食半兵􅜶植餘兵尚衆且耕且守不妨捍邊一年之收過于十倍之絹暫時之耕足充數載之食于後兵資唯須内庫五稔之後榖帛俱溢匪直戍士有豐飽之資於國有吞敵之勢昔杜預田宛葉以平吳充國耕西零以彊漢臣雖識謝古人任當邊守庶竭塵露有增山海南齊徐孝嗣立屯田表有國急務兵食是同一夫輟耕于是彌切故井陌疆里長轂盛于周朝屯田廣置勝戈富于漢室降此以還詳畧可見但求之自古為論則賒即以當今宜有要術竊尋縁淮諸鎮皆取給京師費引既殷漕運艱澀聚糧待敵每苦不周利害之基莫此為急臣比訪之故老及經被宰守淮南舊田觸處極目陂遏不修咸成茂草平原陸地彌望尤多今邊備既嚴戍卒増衆逺資餽運近廢良疇士多飢色可為嗟嘆愚欲使刺史二千石躬自履行隨地墾闢精尋灌溉之源善商肥确之異州郡縣戍主帥以下悉分番附農今水田雖晚方是菽麥菽麥二種益是北土所宜彼人便之不減粳稲開創之利宜在及時所啓允合請即使至徐兖司豫爰及荆雍各當境規度勿有所遺别立主曹専司其事田器耕牛臺詳所給歲中言殿最明其刑賞此功克舉庶有宏益若緣邊足食則江南自豐權其所饒畧不可計政術部財賦晉左思呉都賦國税再熟之稲鄉貢八蠶之綿齊王融策秀才文充都内之金紹圜府之職但赤仄深巧學之患榆莢難輕重之權梁沈約闕九棘播于農皇十朋興于上代昔醇人未漓情嗜疎寡奉生贍己事有異同一夫躬耕則餘餐委室匹婦務織則兼衣被體雖貿遷之道適用濟乏龜貝之益為功盖輕及事有訛變姦弊大起昏作役苦故穡人去而從商末業所流非復始造之意也於是競收罕至之珍逺蓄未名之貨明珠翠羽無足而馳彩罽文犀飛不待翼天下蕩蕩咸以棄本事末豐衍則同多稔之資飢凶又減田家之蓄錢雖盈尺不療飢于堯年貝或如山無救渴於湯代其為疵病亦已深矣固宜一罷泉貨専用榖帛使人知役生之路非此莫由夫千匹為貨事難于懐璧萬觔為市未易于越鄉斯可使末技自禁游食必返而事改一朝廢而莫用交易所寄朝夕無待先宜削華止偽還醇返古抵璧幽峰捐珠清壑驅一代之人返耕桑之路蕩滌圜洪銷鑄無遺立制埀統永𫝊於後桓𤣥知其始而不覺其終琳之睹其末而不探其本豈慮有開塞將一往之譚乎唐宋伯宜泉貨策且鑄金為貝信有從來漢改四銖秦行半兩用捨更互廢輕就重之宜損益不常地馬天龍之異復有豫章銅岳蜀道銅山全歸佞倖之爐頓入諸侯之冶所以公私太半偽實相蒙姦佞用此而兼并豪戚因兹而聚歛洛京三鄽之内賈客雲屯齊宫七市之間商人霧塞乃令東漢楚子髙閣浮空西蜀彭家連樓跨術雷車電騎多出工巧之家列鼎撞鐘無非貨殖之里賔徒藿肉鮑書不足倫僮僕藜餘張詩莫能序三田為之廢業五稼由此多荒五羊銜粟時和之義先表雙雀飛鳴歲稔之徵已見郭正一鄽肆策問鄽肆之興用存交易山澤之利事属貿遷是以先王因井而制居往聖觀爻而立義將以致兹百族通彼萬商羅肆巨千廣充上積之貨旗亭五里俯映星繁之珍是使蹀馬廻轅歴闤闠而流溢往商來賈候朝夕以盈途豈唯灼蓍蔡以觀貞旁臨季主之肆泛萍蟻而開宴近對文君之壚詎比夫齊宫七市女閭連閉殷室九君姬屋成列但負販之徒異業趣競刺繡謝其倚門多財歸其善賈由此聶政屠養無辭屈辱平仲有求終甘湫隘故知㭊毫之子不可責以亡機徇利之夫難以徵其重義况墆翳之侣本異夷齊貨殖之徒率同猗白若通其小利諒無擁于四民限以淳心恐有乖於一物誠可除兹濫賄禁彼邪贏則姦黨自銷不待曹参之令市無二價詎止黄軒之風食貨志若乃九土既敷四民承範東吳有齒角之饒西蜀有丹砂之富兖豫漆絲之廥燕齊恠石之府秦邠旄羽迥帯琅玕荆郢桂林旁通竹箭江干橘柚河外舟車遼西旃罽之鄉葱右蒲梢之駿殖物恠錯於何不有若乃上法星象下料無外因天地之利而縂山海之饒百畆之田十一而税九年躬稼而有三年之蓄可以長孺齒可以養耆年因乎人民用之邦國宫室有度旗章有序朝聘自其儀宴饗由其制家殷國阜逺至邇安救水旱之灾卹寰瀛之弊然後王之常膳乃間笙鏞商周之興用此道也食貨志建元中州郡各擁强兵委輸不至尚書郎官自出棌梠或不能自反死于墟巷魏武之初九州雲擾攻城畧地保此懐民軍旅之資權時調給於時袁紹軍人皆資椹棗袁術戰士取給蒲蠃魏武乃募民屯田許下以充兵戎之用已上財賦唐祖君彦為李密檄洛州文公田所藉不過十畆人力所供才止三日是以輕徭薄賦不奪農時寧積于人不藏府庫而課税繁猥不知紀極猛火屢燒漏巵難滿頭會箕斂逆折十年之租杼軸其空日有萬金之用父母不保其赤子夫妻相顧于匡床萬邦則城郭空虚千室則烟火斷絶西蜀王孫之室翻同原憲之貧東海糜竺之家俄成鄧通之鬼隋盧思道為北齊檄陳文踈棄良士狎近小人守宰蠶漁子弟荒暴頭會箕斂杼軸其空災異相仍稻蟹不熟横征附政術部漕宋真徳秀江東漕到任謝表吏責既稀所願優游于邇列主恩未報寧忘眷戀于本朝其如親闈喜懼之年當謹人子温凊之職輙援公輔辭翰林之請庶幾潘岳奉板輿之懽分太守之符日需成命出少府之節遽冒殊恩懐章而過里門閲宿而臨封部敬卜中和之節重宣寛大之書軺𫝊初馳旄倪争覩謂朝廷所以輟柱下之史盖聖主將以惠江右之民因博采于風謠頗䆒知其疾苦以埀磬之家而困追需之目以屢歉之歲而多流徙之人官無定證之簿書里有難平之徭役文移星火不勝胥史之誅求牒訴丘山半為賦租之繁重興言及此勿救可乎輙殫朝夕之咨諏兼酌公私之緩急賦難遽省盍漸損賦外之征民未易蘇當先去民間之蠧切自量其綿薄恐終負于選掄宋史百禮賀張漕改秩啓雲梯石棧不辭蜀道之難流馬木牛逺倣草廬之製惠風扇物游刃發硎奮澄清之志於攬轡之中講水陸之運于鑿潭之始蘇一方之疲瘵權萬貨之低昂非獨有觀風聽吏之才又能善富國强兵之術宋劉克莊賀諸葛提刑除漕啓兹移使指就駕漕車得非煑摘利饒轉輸權重上于鹽鐵之論有感方欲變通公于王伯之辨素嚴必知取予深鄙富强之説痛懲聚歛之人養基本以厚黎元捐錐刀以惠商賈承風問俗修明此日之皇華足國裕民講貫它時之相業唐楊烱上騎都尉髙君神道碑搜粟都尉河堤使者銅橈鐵舳蒼鷹白鶴之船竹箭桃花貝闕龍堂之水引紅粟于淮海汎歸舟于秦晋遂使齊臣獻納先陳不涸之名漢后絲綸即有常平之號望千石之氣可以療飢開萬箱之儲自然知禮政術部鹽政唐閻伯璵鹽池賦坤之美兮焉可以測鹽之池漭沆兮劃開于郇瑕之側廓平陸而無際浸長天之一色前對條山照峯巒之􅀈嶨却鄰安邑對城郭之嶷岌其出形鹽也状雄虎之蹲于長野攫拏兮布濩其吐精光也如白日之升於暘谷照爛兮熻赩既似乎鏡湖之不逺又似乎渤澥之在即皎皛池濵皚峨嶙峋髣髴珪璧依稀碝珉入澤遐窺喜晴天之速曙隔林斜望訝瓊樹之驚春餌之者若茹膏之客捧之者疑獻玉之人張濯唐寶應靈慶池神廟記寶應靈慶池者山海經所謂鹽販之澤也俗稱官號皆曰鹽池供華夏二十餘州宅黄河千里之曲北抱原勢南負山陰涵濡泓澄浸漬舄鹵外無寸草内絶纖鱗水或紫赤鹽皆潔白有自來矣紅鹽自生盈掬傾筐或蠒或栗形攢伏虎色澈丹砂靈貺休徵古未之有權德輿贈太師崔倕神道碑修牢盆謹衡石煎和既精飴散乃盈商通而洊至吏懼而循法民不絓網而國用益饒政術部刑法唐髙祖武德二年春闕月甲子詔釋典微妙净業始于慈悲道教冲虚至德去其殘暴况乎四時之禁毋伐麛卵三驅之禮不取順從盖欲敦崇仁惠蕃衍庶物立政經邦咸率斯道朕祗膺靈命撫遂羣生言念亭育無忘鍳昧殷帝去網庶踵前修齊王捨牛實符本志梁任昉為梁公請刋改律令表臣聞淳源既逺天討是因畫衣象服以致刑措草纓艾韠民不能犯及淳德下衰運距澆季湯刑禹政不足禁奸九法三章無以息獄所以赭衣塞路圄犴成市凝脂已疎秋荼非苦奸吏為市生殺並用可為慟哭非徒一緒夫肖貌天地禀靈川嶽受體愛敬髪膚為重流矢影風顧有憂色而當妄加刳斮金木為伍且夫刻木不對畫地不入畏避若是而動貽非命王道為虧良在于此法開二門為政之蠧生殺多緒誰其失政唐李朝隱執奏裴景仙獄表所以為國惜法期守律文非敢以法隨人曲矜微命射兎魏苑驚馬漢橋初震皇赫竟從廷議豈威不能制而法貴有恒晉郭璞奏立刑以禁刑立殺以去殺重之以死所以求其生峻之以刑所以輕其死子臯行戮刖者忘痛釋之典刑民無怨色何者積之于誠也齊王融永明九年策秀才文自萌俗澆弛法令滋彰肺石少不寃之人棘林多夜哭之鬼朕所以明發動容昃食興慮傷秋荼之密網惻夏日之嚴威永念畫冠緬追刑措徒以百鍰輕科反行季葉四支重罰爰創前古訪游禽于絶澗作覇秦基歌雞鳴于闕下仁稱漢牘二途殊爽即用兼通昌言所安朕將親覽唐白居易罷刑獄策問朕恭臨萬國祗御兆人視之如傷有同赤子未能以理代刑捨其律憲亦輕罰緩死漸就蠲除去凝脂之網收刺骨之怨臨麥秋而惆悵望窮冬而載懐思使畫服象刑同唐虞之世罷獄息罪等成康之時循酷俱治宜有辨析李德裕罷刑獄策但臯陶之類常問黄沙定國之流恒持丹筆分陜有棠隂之德剖符致蒲鞭之美梁獄决疑不假陶朱之璧楚國以理無用荘生之金稍簡刑書漸行禮教使駃騠逺至懸感仁心獬豸來儀不知所觸然後升東獄而揖羣后望西方以謝聖人復何如也上官儀用刑寛猛策甫侯設法徒有説于輕重子產鑄書竟無救于衰敗是知風淳俗厚草艾而可懲主僻時昬黥鑿而猶犯張昌齡用刑寛猛策兩儀亭育蓄嚴刑于積隂四氣平分降明罰于秋序是知觀象設教聖人所以勝殘因物造端懿后由其立辟故媯川受命士師陳九德之歌瑤山載刑吕侯訓百鍰之典然則激揚神化鼓舞皇堦資粉澤而宏風俟德刑而振俗是故六轡在御飛龍之駕可期九罭不施奔鯨之害斯兆縱使業優倦領道邁曾巢齊飲啄於鶉居絶往來於犬吠猶未可長懸三禮永擯五刑削兹噬嗑之科專行忠信之薄况今時推纂聖運屬升皇猶勞丹浦之誅尚漏青丘之罪伯夷典禮與猾夏而同科司冦詳刑共春官而聫事自可逺稽九代近命三驅釋刀鋸于凶魁休甲兵于原野然後施疑作弛威象闕展事天宗繼美媧黄追風火燧石渠未滅豈待一作得輒議寢刑中嶽既封自可専循大禮郝連梵用刑寛猛策舜遊媯汭乃去四凶湯出鑣宫􅚪除三面然則質文異代興廢殊途微禹會昌仁流于下泣獨夫受戮禍招于剖心自運往道消淳離朴散王風不競菀栁之刺斯聞后德方衰杞疑作棘槐之刺疑作制斯闕望夷招敗酷甚凝脂函谷生灾寃多精氣雖復蕭何改創爰始九章温舒上言仍譏一失網漏吞舟之罪主茍持寛律加盈閣之繁吏還舞智念向隅之獨嚬乃納隍而軫慮曲詢管庫取薦芻蕘誠宜妙簡平反旁求庶獄渭橋驚馬必歸張季之言禁圍射兔勿爽髙柔之㫖于公陰德委以廷尉之司盛吉深仁授以憲曹之任剖符寄劉寛之軰蒲鞭之教可追分陜趨召奭之儔棠陰之聽斯在加以五詞咸備兩造兼持運靜躁于韋弦聽遲速于寛猛獬豸雖觸咎繇行其惠化蒼鷹輟號郅都息于煩苛自然圄犴空虚靡怨黄沙之罪鉗􅀈安用無施白粲之刑則迹邁成康道逾文景不仁自逺無得而稱張處信折獄之理策敬刑若祭重獄如傷且律之興其來尚矣盖三光列景法星麗于天文立位成刑習坎彰于易象爰洎貳負見山海經初沿維縶之科降及四凶始受殛流之罰及庭堅翼舜獄律遂此陶情蕭相主劉甲令于焉刻意至如鋸鑽之絶班固書而可知肉刑之興孫卿論而已備劉藏器往代為刑是非策問若云刑法不施于淳朴殺戮必用于凋訛則感電前皇不應染刃望雲後帝方示草纓沉吟久之未知孰是梁簡文帝啟囚徒配役事啟玉科輕重全關墨綬金書去取更由丹筆任昉為王金紫謝齊武帝示皇太子律序啟臣聞化澄上葉草纓垂典教清中世艾服懲刑自禮失宗周俗返炎漢張馮導其跡賈杜浚其流仲舒之得情孔子之博約故以義該往哲美盡前王而年世浸逺篇牘訛誤朽編落簡見誣前淑侮文擅議取弊後昆立不倚衡遂均鴻毛之隕傷足居憂忘貽髪膚之痛豈所以臨河永嘆含肓最靈者也伏惟陛下施博天地澤深禹湯温舒之策優游虚授衛展之議寧失弗經削秋荼之法解凝脂之網唐李嶠上巡察覆囚使厯城張明府書幽明三光止水洞窮神之察雷電六爻連山繹噬膚之象是以金祗獻序肅帝典于秋霜瑞節宣風播皇華于春澤鷞鳩司讞黄沙俟清問之仁神獬推姦素簡飛惠文之筆賔舜門而佇穆指軒郊而静害分聽之寄其在兹乎然後銅章底務絃佩維襟泱泱大風汎游歌而成韻巖巖崇岫應宓琴而度曲誠招異感春狎仁童德禪靈遊夜呼神女屬二星齊騖八駿駢驅議馬良規兹承不寃之裔誅狼俊槩是寄埋輪之風廼者繡衣貳日錦𫝊詢風下璿樞而禀涣劑玉關而致職宰鮮東夏舊辨淄澠道䑕西源近分涇渭鎬池十朱端衡制其輕重清河二天直繩糾其枉紊故使晨雞輟唱于酸吻夜鵲緘謡于苦衷寘棘剗束薪之苛食苖愜甘荼之戮矣梁簡文菩提樹頌序秋荼不設廢九律之嚴科春雨愛生解三驅之密網唐王勃乾元殿頌序爽鳩分職素雲頺鳥啄之祥神獬關司𤣥水照龍顔之側黄沙鞠草剗叢棘而遷訛丹石滋苔仰甘棠而息訟長孫無忌律疏序古者大刑用甲兵其次用斧鉞中刑用刀鋸其次用鑽鑿薄刑用鞭朴其所由來亦以尚矣昔白龍白雲則伏羲軒轅之代西火西水則炎帝共工之年鷞鳩筮賔于少皥金正策一作榮名于顓頊咸有天秩典司刑一作刑司憲大道之化擊壤無違周庾信大將軍豳國公墓銘犴戸苔生囹關籥動載酒属車幸無怨氣觀囚軍府或聽鳴琴刑法志若夫穹厚肇判宵晝攸分流形播其喜怒禀氣彰其善惡則有自然理焉畫衣後刑衢樽先惠將以屏除灾害引導休和取譬琴瑟不忘銜策擬陽秋之成化若堯舜之為心也秦文初造参夷始皇加之抽脅囹圄如市悲哀盈路漢王以三章之法吊之文帝以刑厝之道臨之于時百姓欣然將逢交泰而奸逐情遷科隨意往獻瓊杯于闕上徙青衣于蜀路覆醢裁刑傾宗致獄况乃數囚于京兆之夜五日于長安之市北闕相引中都繼及者亦往往而有焉政術部恩赦唐張説和張監觀赦詩日御臨雙闕天開儼百神雷舒作觧氣歲復建寅春喜候同新驛歡聲發市人金環能作賦來入管絃新梁陸倕豫章王拜後赦教夫議獄緩死著在令圖疑罪維輕聞諸雅誥是以虞經惻隱流涕冬决鍾意埀仁哀矜寒送吾以虚薄夙頒寵章光宅襟險奄有全粤非有沛獻矜嚴空紆青組東平智思徒舉赤帷思所以仰述皇猷導揚𢎞澤遵彼下車譬兹觧網唐獨孤及賀赦表猶念刑不可變死不復生泣辜興慈納隍軫慮與民更始其命維新禦魑魅者復還係桎梏者咸宥丹徼無滯黄沙已空疎漢網而逺無不賔祝湯羅而下無犯順栁宗元賀赦表繼絶存亡忠賢飲德于黄壤棄瑕肆眚奪魄再麗于遺骸極天地之歡心盡帝王之上事疲史臣之筆編簡難書涸詩人之思謳謠絶路李吉甫賀赦表挺黄沙之罪再荷生成洗白璧之瑕俱承涣汗戴叔倫賀平賊赦表雪滌痕累發生枯朽榮光被于草木和氣貫于華夷宋岳飛後昭雪謝表青編塵乙夜之觀白簡悟壬人之譖誠既格于穹昊福遂均于庶品振憂矜寡原眚宥烖第五玉以褒封善人是富發三錢而慶賜賤者不虚天其居歆人以呼舞梁袁昻謝武帝啟塗山始會致防風之誅酆邑方構有崇侯之伐未有緩憲于斮戮之人賖刑于耐罪之族出萬死入一生如臣今日者也幸約法之𢎞承觧網之宥猶當降等薪粲遂乃頓釋鉗赭歛骨吹魂還編黔庶濯疵蕩穢入楚游陳天波既洗雲油遽沐漢張俊上書臣棄恩負義自陷重刑情斷意訖無所復望廷尉鞠遣歐刀在前棺絮在後魂魄飛揚形容已枯陛下聖澤以臣常在近密識其状貌傷其眼目留心曲慮特加偏覆喪車復還白骨更肉披棺發槨起見白日天地父母能生臣俊不能使臣俊當死復生陛下德過天地恩重父母誠非臣俊破碎骸骨舉宗肉爛所報萬一政術部風俗晉左思吳都賦開市朝而並納橫闤闠而流溢混品物而同㕓并都鄙而為一士女佇眙工賈駢坒紵衣絺服雜沓漎萃輕輿按轡以經隧樓船舉颿而過肆果布輻凑而常然致逺流離與珂珬䌖賄紛紜器用萬端金溢磊砢珠琲䦨干桃笙象簟韜于筒中蕉葛升越弱于羅紈澀譶澩㺒交貿相競諠譁喤呷芬葩䕃映揮袖風飄而紅塵晝昏流汗霡霂而中逵泥濘富中之氓貨殖之選乘時射利財豐巨萬競其區宇則并疆兼巷矜其宴居則珠服玉饌唐李庾東都賦開元太平海波不驚乃駕神都東人誇榮時則轔轔其車殷殷其徒行者不賫衣食委衢冠冕之夫綺羅之婦百室連歌千筵接舞髙樓大觀陳賔宴侣金堂玉尸絲哇管語我道如堯我税如貉貧庾而稲賤笥如裼比屋相視恥衣空帛開塲分肆不列麰麥唐盧照鄰長安古意詩長安大道連狹斜青牛白馬七香車玉輦縱橫過主第金鞭絡繹向侯家龍銜寶盖承朝日鳳吐流蘇帶晚霞百丈游絲爭繞樹一羣嬌鳥共啼花啼花戲蝶千門側碧樹銀臺萬種色複道交忩作合歡雙闕連甍垂鳳翼梁家畫閣天中起漢帝金莖雲外直樓前相望不相知陌上相逢詎相識借問吹簫向紫烟曾經學舞度芳年得成比目何辭死願作鴛鴦不羡仙比目鴛鴦真可羡雙去雙來君不見生憎帳額綉孤鸞好取開簾帖雙燕雙燕雙飛遶畫梁羅帷翠被欝金香片片行雲著蟬鬢纖纖初月上鵶黄鵶黄粉白車中出含嬌含態情非一妖童寶馬鐵連錢倡婦盤龍金屈膝御史府中烏夜啼廷尉門前雀欲棲隱隱朱城臨玉道遥遥翠幰沒金堤挾彈飛鷹杜陵北探丸借客渭橋西俱邀俠客芙蓉劒共宿倡家桃李蹊倡家日暮紫羅裙清歌一轉口氛氲北堂夜夜人如月南陌朝朝騎似雲南陌北堂連北里五劇三條控三市弱栁青槐拂地埀佳氣紅塵暗天起漢代金吾千騎來翡翠屠蘇鸚鵡杯羅襦寶帶為君觧燕歌趙舞為君開别有豪華稱將相轉日廻天不相讓意氣由來排灌夫専權判不容蕭相専權意氣本豪雄青虬紫燕坐生風自矜歌舞長千載自謂驕奢陵五公節物風光不相待桑田碧海須臾改昔時金堦白玉堂即今唯見青松在寂寂寥寥揚子居年年嵗嵗一牀書獨有南山桂華發飛來飛去襲人裾梁武帝霸府禁奢令夫在上化下草偃風從世之澆淳恒由此作自永元失德書契未紀窮凶極悖焉可勝言既而琁室外搆傾宫内積竒技異服殫所未見上慢下暴淫侈競馳國命朝權政移近習販官鬻爵賄貨公行竝甲第康衢漸臺廣室長袖低昻等和戎之賜珍羞百品同伐氷之家愚人因之浸以成俗驕豔競爽夸麗相髙至乃市井之家貂狐在御工商之子緹繡是襲日入之次夜分未反昧爽之朝期之清旦聖明肇運勵精惟始雖曰纘戎殆同創革且淫費之後繼以興師鉅橋鹿臺洞罄不一孤忝荷大寵務在澄清思所以仰述皇朝大帛之㫖俯厲微躬鹿裘之義解絃更張斵雕為樸自非可以奉粢盛修黻冕習禮樂之容繕甲兵之備此外衆費一皆禁絶御府中署量宜罷省掖庭備御妾之數大響絶鄭衛之音其中有可以率先卿士准的甿庶菲食薄衣請自孤始加羣才竝軌九官咸事若能人務退食競存約已移風易俗庶期月有成昔毛玠在朝士大夫不敢靡衣偷食魏武歎曰孤之法不如毛尚書孤雖德謝往賢任重先達實望多士得其此心唐獨孤及上元二年豫章冠盖盛集記𢎞舸巨鷁舳接艫隘輶車鸞鑣轊挂轂擊晉書石崇𫝊春畦靃靡列于凝沍之晨錦帳逶迤亘以山川之外政術部興亡唐吕令問雲中古城賦既而年代倐忽朝市遷徙干戈鼙鼓之雄綺羅絲竹之美孰不煙散雨絶沙埋灰委樹名觀而詎存鳥稱樂而俱死危堞既覆髙墉復夷寥落殘徑依稀舊墀榛棘蔓而未合苔蘚紛乎相滋伏熊鬭贙騰麕聚麋常鳴悍鷩乍嘯愁鴟不可勝紀但令人悲胡風起兮馬嘶急漢月生兮鴈飛入可憐久戍人懐歸空佇立張嵩雲中古城賦温室樹古瀛洲水涸城未哭而先崩梁無歌而自落張鼎古銅雀臺賦慷慨遺文凄凉舊閣罇盈玉座燈映蘭幕媫妤妓人鼓舞歌唱當春月而朝臨悵日暮而西望見松栢之成行愁歌舞之相向及石氏之謀帝位高歡之竊神器雖修舊而増崇竟移時而改代銅龍噴水似落九天金鳯銜珠終淪五綵我君遑遑行指鄴旁弔古太息馮髙獨傷東郊道兮蕪漫西原樹兮微茫露窟吒兮泣蒼蘚風蕭梢兮悲白楊粧樓歇艶畫閣銷香陂陀巖岏巋峞摧藏井幹㓕兮有遺甃殿垣毁兮無華構但見蓁蓁蒿棘生復看觺觺飢鼯鬬雨嘯幽畿渠希切月哀離狖宿莾撐骨危巢覆鷇平臯晚兮拱木生寒紫陌昏兮黄埃奪晝人壽㡬何留恨日多追士衡以投弔效明逺以作歌唐吳少微過漢故城詩大漢昔未定强秦猶擅塲中原逐鹿罷髙祖鬱龍驤經始謀帝坐兹焉壯未央規模窮棟宇表裏浚城隍羣后崇長樂中朝增建章鈎陳被蘭錡樂府奏芝房翡翠明珠帳鴛鴦白玉堂清晨寶鼎食閒夜鬱金香天馬來東道佳人傾北方何其赫隆盛自謂寶靈長厯數有時盡哀平嗟不昌氷堅成巨猾火德遂頺綱奥位非虚校貪夫竟速亡魂神吁社稷豺虎鬬巖廊金狄移㶚岸銅盤向洛陽君王無處所年代㡬荒凉宫闕誰家域榛蕪罥我裳井田唯有草海水變成桑在昔髙門内于今岐路傍餘基不可識古墓列成行狐兎驚魍魎鴟鴞嚇獝狂空城寒日晚平野暮雲黄烈烈樊青棘蕭蕭吹白楊千秋并萬歲空使詠歌傷張九齡經江寧覽舊跡至𤣥武湖詩南國更數世北湖方十洲天清華林苑日晏景陽樓幕下廻仙騎津傍駐綵斿鳬鷖喧鳯管荷芰鬭龍舟七子陪詩賦千人和棹謳應言在鎬樂不譲橫汾秋風俗因紓慢江山成易由駒王信不武孫叔是無謀佳氣日將歇覇功誰與修桑田東海變麋鹿姑蘇遊否運争三國康時劣九州山雖幕府在舘豈豫章留水淀還相閲菱歌亦故遒雄圖不足問難想事風流司空曙南浦望漢宫詩荒原空有漢宫名衰草茫茫雉堞平連鴈下時秋水在行人過盡暮烟生西陵歌唱何年絶南陌登臨此日情故事悠悠不可問寒禽野水自縱橫宋曾肇賀上𫝊國寶表臣聞夫國璽之有去來猶周鼎之有輕重好治而惡亂舍昏而即明頃自有唐之衰荐更五代之季伏而不發殆且百年忽爾自歸將𫝊萬世所以表祖宗積累之慶告社稷靈長之休在聖與仁宜昌而壽恭惟皇帝陛下沉潛廸哲剛健好生參天地以成能垂子孫而作則果有神物是貽皇家固將配甘露以紀元豈止擬芝房而度曲徐陵為梁貞陽侯與王太尉僧辨書天狼炳曜非無戰陣之風參虎揚芒便有干戈之務至于夏鍾夷羿周厄犬戎漢委珠嚢秦亡寶篋彰于史籍可得而聞陶唐既作天歸烏啄之臣豐畢將興特挺鷹揚之佐明公量苞金鉉神表玉璜儷衮欽才平階佇德固以留連管樂惆悵風雲濡足維時投竿斯在去歲兇徒不騁言次巴丘鼓聲聞一柱之臺烽火照三休之殿公則懸麾羽扇猶對投壺戎羯咸奔鯨鯢俱剪樓船萬舳還繫昆明胡馬千羣皆輸長樂于是乎夏首西浮雲行電邁彭波東匯谷静山空扼鵲尾而據王畿登牛頭而掃天闕漸臺偽帥仍𫝊首于帝京郿塢元兇咸刳膓于軍市青羌赤狄同畀豺狼胡服夷言咸為京觀公園陵盡拜忠貫長沙神主咸安勲踰髙密重以秦宫既獲魯殿猶存闢綠草于應門開青槐于武庫長安五陵之族鄠杜六遷之民襁負而歸都壥斯滿鬻脂藏脯遊騎擊鐘故市新城飛甍華屋東莞舊宅人識桑榆南頓荒田家分禾黍豈以鄉名穀熟邑號禾興而已哉周庾信擬連珠盖聞彼黍離離大夫有喪亂之感麥秀漸漸君子有去國之悲是以建章低昂不得猶瞻㶚岸景陽淪没非復能臨偃師又盖聞市朝遷貿山川悠逺是以狐兎所處由來建始之宫荆棘參天昔日長洲之苑唐蘇頲長安西明寺塔豐不當必蔀儉不師且奪終異謀始之則滿非守成之具從梁邸第寧復賔遊封薛池臺果成童牧元黄之潤州江寧縣瓦棺寺維摩詰畫像碑江山寂寥居處緬邈年移代改留侯歎過隙之駒物是人非丁令化遼城之鶴古儷府卷四
