body:
  text: 古儷府卷三眀王志慶編帝王部君道總李庾西都賦建金雞於仗內聳修竿而揭起其下則稅三關解銀鐺追共工徙歡兜煦舜絃浹堯年臺收白簡史閣丹筆總秩官之計料不踰乎三十斥匡衡之失論罪溫舒之不足司刑無鬼哭之庭大理有烏巢之獄唐太宗執契靜三邊詩執契靜三邊持衡臨萬姓玉彩輝關燭金華流日鏡無為宇宙清有美璇璣正皎珮星連景飄衣雲結慶戢戈榮七德升文輝九功烟波澄舊碧塵火息前紅霜野韜蓮劒關城罷月弓錢綴榆天合新城栁塞空花稍蔥嶺雪縠盡流沙霧秋駕轉兢懷春氷彌軫慮書絶龍庭羽烽休鳳穴戍衣宵寢二難食旰飱三懼剪暴興先廢除凶存昔亡圓蓋歸天懷方輿入地荒孔海池京邑雙河沼帝鄉修躬思勵已撫俗愧時康元首佇鹽梅股肱唯輔弼羽賢崆嶺四翼聖襄城七澆俗庶反淳替文聊就質已知隆至道共歡區宇一盧綸皇帝聖感詞提劒雲雷動垂衣日月明禁花呈瑞色國老見星精發棹魚先躍窺巢鳥不驚山呼一萬嵗直入九重城杜牧今皇帝陛下一詔徴兵不日功集河湟關郡次苐歸降臣獲覩聖功輒獻歌詠捷書皆應睿謀期十萬曾無一鏃遺漢武慙誇朔方地周宣休道太原師威加塞外寒來早恩入河源凍合遲聽取滿城歌舞曲凉州聲韻逺參差闕七召風無掩稼雨不破塵天瑞磊砢而相尋地符氤氲而不少收六穗于征賦玩九莖于池沼三足應時而來儀一角知時而自擾映景星于初月聆鳳音于將曉梁簡文七勵堯舜垂拱煥彼前聞今唯聖厯萬代一君壁儀照氣玉井珠分德合天地道方華勳滄海碧徹黃河黛文愛人育德澤等春雲宣尼茂典周姬禮容黃裳進士青襟俊童邦知改俗國化移風賣藥無藏名之老河泗無洗耳之翁德星夜映慶雲畫色異草雙條靈禽比翼狐尾既九茅脊復三金船漾寶銀甕呈甘康歌壤笑悅禮樞談隆周謝德盛漢知慙慈照無礙化湛靈覺散漓𢎞淳極澆敦朴國被仁壽家欣教學三眀鑒道六度𢎞風出塵照苦入冥觀空善識無盡因性必通天不愛寶地無隱瑞百神受職三苗奉義石䇿紫泥繩金玉刺或託諷梁甫權卧德而龍盤或織箔渭濵恥藏名而鳳跂于是露㸃飴蜜溜泓澄于玉掌雲垂五采覆旖旎于仙樓漾醴泉于浪井拂垂楊于御溝唐中宗斷進竒巧制蒿宫茅柱實興國之清猷玉席朱衣乃危邦之敝化漢文提舄少小留心晉武焚裘生平措意漢司馬相如封禪文大漢之德㷭涌源泉沕潏漫衍旁魄四塞雲布霧散上暢九垓下泝八埏昆蟲闓懌回首面內然後囿騶虞之珍羣繳麋鹿之怪獸導一莖六穗于庖犧雙觡共抵之獸獲周餘珍放龜于岐招翠黃乘龍于沼欽哉符瑞臻兹猶以為德薄不敢道封禪班固典引是以來儀集羽族于觀魏肉角馴毛宗于外囿擾緇文皓質于郊升黃輝采鱗于沼甘露宵零于豐草三足騫翥于茂樹若乃嘉榖靈草竒獸神禽應圖合牒窮祥極瑞者朝夕坰牧日月邦畿卓犖乎方州洋溢乎要荒周王褒上祥瑞表眀王孝治嶽瀆所以效靈至人澤及風雲以之懸感是以若霧非霧天道叶至德之符似烟非烟觸石表嘉祥之氣𤣥黃蕭索之輝丹紫輪囷之狀豈止唐堯沈璧氣合金方姬后望河形如車蓋梁沈炯勸進梁元帝表指揮則丹浦不戰顧盼則板泉自蕩地維絶而重紐天柱傾而更植鑿河津于孟門百川復啓補穹儀于五石萬物再生梁南平王恪上元帝箋牟麥兩穗出于南平之邦甘露泥枝降乎當陽之境野蠶自績何謝歐絲閒舊生稻寧殊雨粟唐王勃乾元殿頌序元戎握節黃公授犀闕之圖帝座聞鼙𤣥女薦龍庭之䇿頳柯捭疑刃中權决勝于兩階白羽俄麾善陳推亡于四表朱匡反景之域削蛇弭于文㮰黑山眀月之鄉委龍琛于武帳錦軒星騖控乾絡而觀風繡服霞驚浹神紘而問俗川浮沒羽鯨溪靜丹浦之虞陸薦飛毛熊瓛動青雲之偵銀關驟雨望紫陌而趨恩鐵幌馳風計彤闈而瀝思赤馬文猿之寶叢積乎郊虞紈牛露犬之貢滿盈乎儲邸青丘畫野不踰征賦之鄉蒼水奉圖未盡隄封之貫紫庭合粹括宇宙于宸襟丹扆凝尊運陶鈞于寶思摛碧霄而錬石上清耀魄之宫詔寰海而捐珠俯睇陽侯之室功驅偃伯頓鶚視于華封道被來王靜龍吟于武庫梁簡文帝南郊頌流樂復雅逺符雲韶之世墜禮還章非因忠信之薄九垓同軌四海無波儲明變照儀天作兩三衮咸作叶化台光麴蘖王風鹽梅帝載塵清世晏蒼兕無用其武功運謐時平鵷鷺咸修其文德桃林散甲華山韜刃玉門罷候紫塞沉烽屠羊釣壑之士厭洗耳而襲簪佩版築藏巖之逸去燥榖而紆珩組唐王勃九成宫頌蠶功順令業著于青裳蜃磨迎春恩周于黛耜黃沙靜讞爽鳩興頓足之悲丹石銷魂神獬輟推鋒之計星墟列將揮玉節而長驅天䇿神兵下金壇而決勝橫麾赤坂葱山成不戰之郊㑹繳青丘桃野見其亡之兆烟馳火徼厲珠産而移琛雪騖氷洲駕瑶溪而納賮顔師古聖德頌雲飛九域電擊八區共工慝斃涿鹿妖除枝換斯撤攙搶靡餘建武戢刃偃伯釁車蠲苛削密求瘼恤隱琴瑟更張銜策俱盡滿堂已樂聲頌猶軫扇暍垂仁泣辜流憫吏勉端潔民歸願謹閭閻外户馬牛內壤畎畝相移康莊交讓勿用桴鼓無虞亭障賮納鮫人朔班狼望至誠感慶休氣致祥馴擾一角栖集五章華蘋挺幹朱草曜芳良耜畟畟多稌穰穰國儲億庾家登萬箱李百藥皇德頌龜書龍匣河圖將游東鰈西鶼云亭載佇魏曹植文帝誄朱旗所𠞰九壤披震疇克不若孰敢不臣懸旗海表萬里無塵回回凱風祈祈甘雨稼惟嵗豐登我稷黍家佩惠尹戶蒙慈父宋謝靈運武帝誄悠悠聲教綿綿川陸北獻氊裘南貢金竹髽首冠辨穿胸斂服寒穴欣日巢栖玩屋謝莊孝武帝哀冊文百神慕而行雲沈萬國哀而素霜霣綴響蘭深緝言瓊祕浹宇斯澄綿區咸鏡修風曉逸德星夕映溽露飛甘舒雲結慶禎被動植信泊翔泳陳江總陳宣帝哀冊文廣敷丘索𢎞啓膠庠書林吐馥文囿含鏘梁沈約齊武帝諡議至仁與造化爭流靈威與雷霆齊軌上貫蒼昊下洞深泉春無悽風夏無苦雨時若罔愆多稔如積三革不纍五刃不砥庠孰大啓儒雅雲集訓閲得宜搜狩有序丹徼青丘之野跂踵反舌之民浮深駕阻回首革靣梁元帝高祖武皇帝諡議虹旌式卷堡燧載清胥象相因環楛無曠天衢亨泰王道升平南海候風東溟奉貢膏露凝脂慶雲觸石山開蒼璧地出𤣥圭驃騎把鉞則休屠欵塞太尉抗旌則名王蹶角聲教所漸浹靈蛇之都威令所行通燭龍之外徐陵侯安都德政碑皇帝以陶唐啓國致玉版于河宗顓頊承家佐金天于江水經綸草昧定鼎之業居多締構權輿斷鼇之功相半固以英聲馳于海外信義感于寰中主器攸歸當璧斯在隋薛道衡老氏碑千年靈蔡著天性以效徴三足神烏感陽精而表質春泉如醴出自京師秋露凝甘遍于竹葦星光若月雲氣飛烟三農應銅爵之鳴五緯叶珠囊之度唐元黃之潤州江寧縣瓦棺寺維摩詰畫像碑我國家神明造物聖政調時滌瑕穢而玉鏡清剗澆訛而撝大朴牢籠七十七代鬱映萬八千年率土之濵罔有弗一作不韙普天之下共惟帝臣京坻積而銅爵鳴鐘鼓和而玉羊現李德裕進幽州紀聖功碑文狀臣學慚荒淺久病衰殘紀軒后之功徒知渴思敘唐堯之德終愧難名李德裕幽州紀聖功碑銘龍顔善將任人傑而不疑日角好謀歎敵國而强意羌髳率師以翼周北貊梟騎以助漢王褒以日逐歸德稱為人瑞班固以稽落蕩冦大振天聲孰若天子神武百蠻震疊集作懾乘其蹙國臨以兵鋒割單于之旗納休屠之附非萬里之伐無三年之勤巍乎成功輝焯後代王勃益州夫子廟碑冠帶混并之所書軌八絃閭閻兼匝之鄉烟火四極竭河追日夸父力盡于楹間越海陵山章亥塗窮于廡下溢金膏于紫洞雨露均華栖玉燭于𤣥都風雷順軌丹蓂翠菌藻繪軒庭鳳彩龍姿激揚池籞楊炯遂州長江縣先聖孔子廟堂碑星連月合層臺有觀羽之勞海晏河移直筆有書祥之倦楊炯少室山少姨廟碑下應猶草王言如絲畫衣不犯載酒無寃免禽獸于網羅備寰瀛于軌物周人之養國老始闢西膠漢氏之召諸生初開太學辟雍所以行其禮泮宫所以辨其教童子五尺羞談霸后之臣冠者六人唯述眀王之道其文德有如此者涼風至司馬于是乎陳兵太白髙將軍于是乎宜戰乘斗杓而誓旅出星門而仗鉞莊周稱天子之劒舉之按之吕望言聖人之兵如風如雨其武功有如此者稽其殷室有文犀利劒之效珍考其周書有兹一作諸白乘黃之騁力東漸西被南馳北走盧敖之窮觀六合不出于城隍陶侃之飛入八門未游于仙室其疆理有如此者帝王部聖學玉海開寶讀漢書而感于張治獄之無寃雍熙讀晉史而謂後宫繁費之當戒端拱讀漢書而感賈誼之激切淳化覽唐史而譏太宗之好名真宗謂三國志足為鑒戒適時用者莫若漢史景德覽六朝實録而言褒貶之不當祥符讀前史必究事之始終有未見本末者必記之他日異書中可以質正惟昔咸平之盛稍存天䇿之規遴擇英髦進陪講讀晝則密承于顧問夜則遞宿于禁嚴程頥以敬涵養君德范祖禹以和開導主意勸講猶有分章析理之勞進讀專以因事納言為職帝王部聖製唐權德輿奉和聖製豐年多慶九日示懷寒露應秋節清光澄曙空澤均行葦厚年慶華黍豐聲名暢八表宴喜陶九功文麗日月合樂和天地同聖言在推誠臣職惟匪躬瑣細何以報翾飛淳化中唐崔位為人賀聖製政刑針表爰自繩契已還歷選列辟憲章代有詞義罕工湯製局促于盤銘虞歌淡泊于琴曲橫汾乃縱賞之事黃竹匪勸誡之文其餘流泊國風飄淪樂府典謨雅誥寂爾無聞曷若光啓格言昭融至道勤萬幾于一日二日立盛德于先天後天王維謝賜中和節御製詩序表文輝三象諧同六律邁殷湯之晨露掩虞舜之薰風陳子昻為陳御史進奉和秋景觀競渡詩表臣聞白雲興詠漢遊汾水之詞黃竹申歌周舞瑶池之駕然而志崇逺轍事或勞人故文思之化未光太清之道猶闕伏惟聖母神皇陛下太虹齊聖感月含神𤣥德茂于皇階文明照于天下用能提玉斗挹璇衡百神景從三靈叶贊青雲出洛爰開受命之符赤甲縈河終御興王之寶非窮神之至德者其孰能格于是哉既而黃屋務閒紫極時暇洞庭張樂思接軫于軒遊媯水披圖想同參于堯輦然而逺而勞物者未若近而安人動而勤已者豈比靜而神泰于是徙金蹕鳴玉鑾清禁林御池殿肅波臣而戒事命舟子為水嬉彩鷁蓮歌乍起吳江之引青龍桂擑時謳越女之風鳥逝魚驚沸珠潭而競逐雪飛電集橫玉浦而流光信可以娛樂性靈發揮文物皇歡允協白日俄光於是奏薰風于管絃詠嚴雲于林籞帝歌爰作天藻遐彰黼帳帷宫縟文房之繡彩祥烟瑞景霏翰苑之榮光信探賾于𤣥苞得斯文于紫極太平允矣元首康哉方欲朝明堂之宫輯羣后之瑞尊榮顯籙光啓聖圖封玉嵩丘以接千年之統泥金少室攸增萬嵗之規卓哉煌煌聖君之表也微臣曲學蓬户竊位蘭臺未聞驄馬之謡非有雕龍之思鞠躬霜署謬睹于天章逖聽鈞臺側聞于帝樂天文尊貴不逺于下臣帝寶珍崇曲宣于近貴竊以為君唱臣和固不隔于尊卑宫變商從方允諧于金石輒用齊心扣寂假翰求詞以攀日月之末光繼螢爝之微照禇亮聖製故司空魏徴挽歌詞表詞窮清曲理備哀傷漢武北管之書更慙追逺魏文南皮之嘆取愧悼亡與辰緯而相暉隨鍾石而俱振臣趨侍學林竊觀睿藻不入玉山屢逢盈尺如遊珠水常睹照車房𤣥齡遺表翰邁鍾張詞窮班馬文鋒既振則宫徴自諧輕豪暫飛則花花競發崔沔謝手詔表豈謂𤣥化曲成宏私薦及特紆睿思親灑仙毫降自九天粲然五色初喜麗天之象逺燭輝光旋驚垂露之踪曲覃霈澤鸞鶴回翔而變態烟雲舒卷以成姿賦彩飛空竦神蕩目恭惟國寶何幸家藏周庾信謝趙王示新詩啓八體六文足驚毫翰四始六義實動性靈落落詞高飄飄意逺文異水而湧泉筆非秋而垂露藏之山嵓可使雲霧鬱起濟之江浦必當蛟龍繞舟首夏清和聖躬怡裕琉璃雕管鵲顧鸞回婉轉緑沈猿驚鴈落下風傾首以日為年犍為舍人實有微願碧雞主簿無有遂心寂寞荆扉踈蕪蘭徑驂駕來梁未期卜日遣騎到鄴希垂枉道王勃乾元殿頌序靈襟索隱控風伯于詞林睿想鈎深詔天吳于筆海神窮獨照傍探赤水之珍思洽幾深逈寫丹溪之韻金壇紫露映銀籕而翻華瑶林白雪藻瓊章而吐絢帝王部御書唐李嶠為何舍人賀梁王處見御書雜文表天文景爍璧合而珠連聖理雲回鸞驚而鳳集究黃軒鳥跡之巧殫紫府結空之勢偃波垂露㑹寶意而咸新半魄全曦象天形而得妙固已竒縱絶俗美態入神掩八體而擅規模冠千齡而垂楷法是用編之玉軸勒以銀繩盡罄梁珠特裝玳瑁之匣揔攻陶璧用飾琉璃之笥雕鏤千品緹巾萬襲藝香却蠧芝體為封珍寶之精下燭西崑之岫文章之氣上纒東璧之象實可為天下之妙迹域中之竒觀者焉又為納言姚璹等謝賜飛白書表跪承寶貺仰戴瓊文如披七曜之圖似發五神之檢九霄靈澤與垂露而同霑千載嘉祥共回鸞而並集冠六文而首出掩八體而孤騫眇乎若遊霧之拂春林靄乎似輕雲之上秋漢頡皇之始模蟲篆未足多竒劉后之嘗學史書孰云能擬固已工踰懸帳妙盡刻符鍾繇竭力而難比伯英絶筋而不逮則知乃神乃聖包衆智而同歸多藝多才總羣方而兼善諒天機之獨運豈凡識之能窺臣等才埓瓶筲任叨衡石器滿之戒每切于愚心棟隆之吉實慙于眀代而天慈曲奬聖造不遺厚祿尊官既殫恩而極寵良辰美景又申歡而接宴慶方行而已及澤未溥而先加殊恩與骨肉等深縟禮共衣冠相絶今復親陪睿賞特流宸翰嬴氏之魂遊天上未比超升闞生之名在月中詎方遐邈昔者韓稜深博肇蒙于署劒田鳳名流僅聞于題柱未有芝英草聖近縟于綵箋合壁連珠俯光于掌握在臣叨忝獨冠古今方且示彼記言𫝊諸貽訓表一人之殊寵留百代之榮觀宋蘇軾謝賜御書詩表玉斚金尊霈若雲天之澤寶章宸翰煥乎奎璧之文喜溢心顔光生懷袖伏念臣猥緣末技獲玷清流早嵗數竒已老江湖之上餘生何幸得依日月之光入侍燕閒與聞講學卒桓榮之業因人而成登劉泊之床則臣豈敢夫何珍賜及此微軀兹遇皇帝陛下道夲生知才惟天縱文不數于遊夏書已逼于鍾王心慕手追陋文皇之猶學筆縱字大笑宋武之未工知臣遭遇之難亦欲顯榮其老鏤之金石庶𫝊玩于人人付與子孫俾輸忠于世世鳥企龍躍珠解泉分張說謝賜御書大通禪師碑額狀畫起平雲㸃蹲芒玉戈矛攢倚鸞鶴交飛神功發于至想睿思成于𤣥德權德輿太宗飛白書答詔記至若縹眇鴻翥之勢輕濃蟬翼之狀子敬白而不飛子雲飛而不白稽合衆美裁成絶藝又以見哲王之餘裕書圃之逸品云舞鳳回翔于懷袖飛龍顧盼于縑緗霞舒舞鵠之紋雲繞回鸞之勢宫中刀尺剪雲霧于赤城筆下風雷走龍蛇于碧落仙風助其縹眇辰象供其粹凝宫掖部皇太后唐常衮賀冊皇太后表塗山降瑞華渚呈祥照臨典禮示天人之慶範裁成風化表戚屬之宗師劉禹錫賀冊皇太后表禀靈作合誕聖表祥徽號極域中之尊至仁為天下之母長樂宫中永獻南山之壽濯龍門上再揚東海之風楊於陵賀冊皇太后表周室興王文母同其經禮漢王嗣聖明德佐其徽猷堯門薦祉延寶祚于無疆長信頥神播歡心于率土賀太后尊號表修長樂之注已觀景曜之宣誦思齊之詩更侈徽音之嗣賀太后生辰表動鼓鐘于長樂何慙漢家為壽之儀響環佩于後宫更邁唐室奉觴之禮五十而慕父母顧聖德之難加八千以為春秋喜慈齡之方永賀太上皇后尊號表擁篲迎門漢祖悟櫟陽之敬望樓執鞚唐宗修興慶之歡玉巵惟志于夸毗寶冊不心疑作忘于授受奮乎百世在我一時宋朝補之代北京賀坤成節表建畢占中歷紀金行之始妊姜協聖禮嚴坤德之成率土傾心後天申祀恭以太皇太后階下慈仁世濟睿哲生知昊穹所懷宗廟牧享配烈祖勤勞之禮隆嗣王保佑之功盈成祗慎于薄氷豐美大蒙于潤澤式䖍至養允答常尊誕惟考室之祥肇届登禾之候謳謡歸美華夏舉同伏願太皇太后百順咸臻三靈共贊天高地厚扶不拔之洪基松茂竹苞資無疆之妙算又代人冬至賀太皇太后表道參穹厚澤及飛潛生民本姜嫄之仁終配天者后稷思齊詠太任之美要成聖者文王九功可歌五韙咸備又賀皇太后稱尊表漢典具修式䖍長樂之養周詩足繼大顯思齊之功宋文天祥皇子進封左衛上將軍嘉國公賀皇太后表東朝保艾方隆堯母之仁西國分茅式篤文孫之慶兩宫喜色萬宇歡聲德厚慈元神怡長樂尊之至也上承視膳之勤宜爾繩兮下適含飴之趣瑶池日永玉葉春濃臣逺被繡衣隃瞻綵仗于其王母知介壽之來崇佑我後人願丕圖之有衍陸遊賀皇太后箋唐虞盛際乃出一家父子之親任姒徽音仍見三朝婦姑之法播芳大全賀皇太后壽箋重闈介壽聳瞻瑶極之紫仙顯號推崇卓冠玉清之丹籍祲容焜耀茀祉駢蕃殿下離麗重眀坤載萬物德諧烈祖蚤釐降以嬪虞慶篤文孫終貽謀而與啓厯數衍仍雲之系蓬萊宴日月之長熒煌彤管之書赫奕洪徽之盛慈顔不老孝治有光誦思齊思媚之詩逺繼周大任之躅紀長信長秋之制俯卑漢太后之功夏侯孜皇太后諡冊文塗山佐夏莘野興商潛耀空藴于方祇祕景莫觀于圓魄卓爾潔操穆然凝暉正位號于瑶齊森禮容于金配母儀無斁廟貌有嚴柔順承天廣大法地齊二儀以發育含萬物而化光靜專宅心謙儉約已塗山積厚淮水秉靈四德交修六宫承式宫掖部皇后宋梁燾立皇后孟氏制謂王道之大所由興故人倫之始不可緩明揚德閥之懿簡在慈闈之公欽承溫詔之音俾正中宫之位幽閒貞靜藹聞和聲婉睦惠慈雅應柔則天作之合文定厥祥人謀協從龜告并吉是宜入聽內職輔宣外和式瞻褘翟之章卜直軒龍之象嘉典大備並行今古之情文盛德有開增美國家之治理於戲惟恭儉為富貴之守惟憂勤為康樂之資如關睢之進賢則可以基風化之成如樛木之逮下則可以將福履之盛用久乃濟匪初其難勉爾欽修以法三宫之端一相豫顯祀以崇七廟之清眀晉書后妃傳序夫乾坤定位男女流形伉儷之義同歸貴賤之名異等若乃作配皇極齊體紫宸象玉牀之連後星喻金波之合羲璧爰自敻古是謂元妃降及中年乃稱皇后四人並列光于帝嚳之宫二妃同降著于有虞之典夏商以上六宫之制其詳靡得而聞焉姬劉以降五翟之規其事可略而言矣周禮天子立一后三夫人九嬪二十七世婦八十一御妻以聽王者內政故㛰義曰天子之與后如日之與月隂之與陽由斯而談其所從來逺矣故能母儀天㝢助宣王化德均載物比大坤維宗廟歆其薦羞穹壤俟其交泰是以哲王垂憲尤重造舟之禮詩人立言先奬葛覃之訓後燭流景所以裁其宴私房樂希聲是用節其容止履端正本抑斯之謂歟若乃娉納有方防間有禮肅尊儀而修四德體柔範而𢎞六義隂教洽于宫闈淑譽騰于區域則𤣥雲入戶上帝錫母萌之符黃神降徴坤靈贊壽丘之道終能鼎祚惟永𦙍嗣克昌至若儷極虧間憑天作孽倒裳衣于袵席感朓側于弦望則龍漦結釁宗周鞠為黍苖燕尾挻灾隆漢墜其枌社矣自曹劉內主位以色登甄衛之家榮非德舉淫荒挺性蔑西郊之禮容婉戀含詞作南國之竒態詖謁由斯外入穢德于是內宣椒掖播晨牝之風蘭殿絶河雎之響永言彤史大練之範逾微緬視青蒲脫珥之猷替矣晉承其末與世汚隆宣皇創基功𢎞而道屈穆后一善績侔于十亂洎乎太祖始親選良家既而帝掩紈扇躬行請托后採長白實彰妬忌之情賈納短青竟踐覆亡之轍得失遺迹煥在綈緗興滅所由義同畫一故列其本事以為后妃傳云李商隱太尉衛公㑹昌一品制集序惟先后懋守丕基允資內助秀南頓嘉禾之瑞開烈山神井之祥德駕河洲淑肩沙麓將顯降媯之配未𢎞褒紀之恩渝集作論美椒塗掩華蘭掖緣山破芿夙聞齊主之悲採石𫝊形早降漢皇之慟繞樞有慶鳴社承輝而懿號未彰貞魂莫祔唐閭丘均為人賀赦表皇后垂曜軒轅命兆沙麓眀彰教訓以致其功隂祗助宣于陽靈坤德承順于乾道是故貺流椒掖慶發瑶筵祥矞五雲絳丹黃而振色禕䄖六服合黼藻而融文錢翊為人請冊淑妃何氏為皇后表掖庭纍行詎無白燕之徴簡冊正名宜受金螭之錫梁江淹為建平王慶皇后正位章嘉月惠時膺曜宸正翬珩昭品䄖組在飾休遍函夏譽殷靈昧伏惟嶽曜靜德式懷謙順升降圖𫝊左右詩史夙競茂資早摛芳訓衍教紫庭麗軌華屋聲激綺組風偃家邦宋文天祥湖南提刑到任謝皇后箋德侔坤地位正家人關雎之化既行用之天下象魏之法使布正自王宫爰取踐更載叨詳讞臣敢不靈承欽恤祗若平反無刑以乂黎民誕敷聖化式敬以長王國永誦徽音晉書后妃論史臣曰方祗體安儷乾儀而合德圓舒循晷配羲曜以齊眀故知陽爍隂凝萬物假其陶鑄火炎水潤六氣由其調理取譬賢淑作伉文思靈根式固實資于此宣穆閲禮偶德潛鱗翊天造之艱虞嗣塗山之逸響寶運歸其後𦙍蓋有母儀之助焉武元楊氏豫聞朝政眀不逮逺愛溺私情深杜衛瓘之言不曉張泓之詐運其隂沴韜映乾眀晉道中微基於是矣惠皇禀質天縱其嚚識暗鳴蛙智昏文蛤南風肆狡扇禍稽天初踐椒宫逞梟心于長樂方觀梓樹頒鴆羽于離眀褒后滅周方之蓋小妹妃傾夏曾何足喻中原陷于鳴鏑其兆彰于此焉昔者高宗諒暗總百官于元老成王沖眇託萬機于上公太后御宸諒知非古而眀穆康獻仍世臨朝時屬委裘躬行負扆各免華陽之釁竟躡和熹之蹤保陵遲以克終所幸實為多矣梁髙祖德皇后郗氏諡議應祥月德比載坤靈柔範隂化儀形自逺俔天作合義先造舟宋衛涇成肅皇后孝宗后謝氏諡議禮義致化周詩所以著二南之本光大含宏羲易所以贊重坤之象蓋后妃之德始于閨門刑于邦家垂于來裔其體則一而其用有三承順于上則欲殫其婦道之勤警戒于中則欲觀其內則之助保艾爾後則欲求其孫謀之詒三者備而後二南無餘藴坤道無遺功矣端靖而誠莊淑聖而柔令惠問光於彤管慈儀冠乎六宫遊娛之事希從圖史之針自警紘綖是則蘋藻必躬化始閨閫風行邦國有亷退之節有徽嘉之行迹其垂髫之初體相多異則有以著俔天之表受冊之夕日華宣明則有以彰天作之合母育纍朝壽盈七袠號榮衍于六字瑶冊侈乎四上尊崇之養康寧之福奐乎不可尚已雞嗚問安而喜憂有常盥櫛佐餕而㫖甘必進紀千秋之節則每從于鳳輦上萬歲之觴則克悅于龍顔嚴君既樂聖嗣之無違永壽益喜椒塗之盡愛于是五日一朝之禮風雨弗渝兩宫九閏之餘毫釐無間漢揚雄元后誄沙麓之靈太隂之精天生聖姿豫有祥禎作合于漢配元生成孝順皇姑聖敬齊莊內則純備後烈丕光肇初配天元命是將志在黎元是勞是襄寅賔出日東秩暘谷鳴鳩拂羽勝降桑木蠶于繭館躬執筐曲帥導羣妾咸修蠶族分繭理絲女工是敕遐邇蒙祉中外禔福自京逮海靡不仰德晉左九嬪元皇后楊氏誄昔有莘適殷姜姒歸周宣德中閨徽音永流樊衛二姬匡齊翼楚馬鄧兩妃亦毗漢主峨峨元后光嬪晉宇伉儷聖皇比蹤往古宋顔延之元皇后哀冊文倫昭儷升有總有憑圓精初爍方祗始凝昭哉世族祥發慶膺祕儀景胄圖光玉繩昌暉在隂柔明將進率禮蹈和稱詩納順爰自待年金聲夙振亦既有行素章增絢象服是加言觀維則俾我王風始基嬪德惠問川流芳猷允塞方江泳漢再謡南國伊昔不造鴻化中微用集寶命仰陟天機釋位公宫登曜紫闈欽若皇姑允迪前徽孝逺寧親敬行宗祀進思才淑傍綜圖史發音在詠動容成紀坤則順成星軒潤飾下節震騰上清朓側有來斯雍無思不極齊謝朓敬皇后哀冊文肇惟淑聖克柔克令清漢表靈曾沙膺慶爰定厥祥徽音允穆光華沼沚榮曜中谷敬始絺綌教先穜稑睿問川流神襟蘭郁先德韜光君道方被輔佐求賢在謁無陂顧史𢎞式陳詩展義厚下曰仁藏往伊智十亂斯俟四教罔式思媚諸姑貽我嬪則化自公宫逺被南國軒曜懷光素舒佇德盧照鄰歌中宫祥逰沙麓慶洽瑶衣黃雲晝聚白氣宵飛居中履正禀和體微儀刑赤縣演教椒闈陶鈞萬國丹青四妃河洲在詠風化攸歸宫掖部妃嬪梁簡文帝有所思詩昔未離長信金翠奉乘輿何言人事異宿昔故恩踈寂莫錦筵靜玲瓏玉殿虛掩閨泣團扇羅幌詠蘼蕪陳張正見昭君怨詩塞樹暗胡塵霜樓眀漢月泪染上春衣憂變華年髮又隂鏗詩跨鞍今永訣垂淚别親賔漢地隨行盡胡關逐望新交河擁寒霧隴日暗沙塵唯有孤眀月猶能送逺人又周庾信詩拭啼辭戚里回顧望昭陽鏡失菱花影叉除却月梁圍腰無一尺垂淚有千行緑衫承馬汗紅袖拂秋霜别曲真多恨哀絃須更張斂眉光祿塞遙望夫人城片片紅妝落雙雙淚眼生氷河牽馬度雪路抱鞍行朔風入骨冷夜月照心眀方調琴上曲變作胡笳聲又陳後主詩圖形漢宫裏遙聘單于庭狼山聚雲暗龍沙飛雪輕笳吟度隴咽笛轉出關嗚啼粧寒葉下初月愁眉生只餘馬上曲猶作别時聲又唐盧照鄰詩金殿恩中絶交河使漸稀肝腸隨玉輦形影向金微漢宫草應緑胡庭沙正飛願逐三秋鴈年年一度歸又駱賔王詩斂容辭豹尾緘恨度龍鱗金鈿眀漢月玉筯染胡塵粧鏡菱花暗愁眉栁葉嚬唯有清笳曲時聞芳樹春又董思恭詩琵琶馬上彈行路曲中難漢月正南逺燕山直北寒髻鬟風拂亂眉黛雪沾殘斟酌紅顔改徒勞握鏡看又上官儀詩玉關春色曉金河路幾千琴悲桂條上笛怨栁花前霧掩臨粧鳳風驚入鬢蟬緘書待還使淚盡向高天梁孔翁歸班媫妤怨詩長門與長信日暮九重空雷聲聽隱隱車響絶籠籠恩光隨妙舞團扇逐秋風鉛花誰不見人意自難同又何思澄詩寂寂長信晚雀聲愁洞房蜘蛛網髙閣駮蘇被長廊虛殿簾帷寂閒階花蘂香悠悠視日暮還復守空牀又陳隂鏗詩柏梁新寵盛長信昔恩傾誰為諸人巧翻為歌舞輕花月分窗進苔草共階生睫淚衫前滿單眠魂裡驚可惜逢秋扇何用合歡名又陳標詩掌上恩移玉帳空香珠滿眼泣春風飄零怨栁凋眉翠狼藉愁桃墜臉紅鳳輦秪應三殿北鸞聲不散五湖中笙歌處處回天眷獨自無情長信宫陳張正見銅雀臺詩荒凉銅雀晚搖落墓田通雲慘當歌日松吟欲舞風人疏瑶席冷曲罷繐帷空可惜年年淚俱盡望陵中喬知之銅雀妓詩金閣早分香鉛華不重粧空餘强歌舞猶是為君王哀絃調已絶曲艷不須長共看西陵暮秋烟生白楊又劉方平詩遺令奉君王嚬娥强一粧嵗移陵樹色恩在舞衣香玉樹生秋氣銅臺下夕陽淚痕沾井幹舞袖為誰長沈佺期長門怨詩月皎風泠泠長門次掖庭玉階聞墜葉羅幌見飛螢清露凝珠綴流塵下翠屏妾心君未察愁嘆劇繁星又崔皓詩君王寵初歇棄妾長門宫紫殿清苔滿髙樓眀月空夜愁生枕席春意罷簾櫳泣盡無人問容華落鏡中又劉長卿詩何事長門閉珠簾只自垂月移深殿早春向後宫遲蕙草生閒地梨花發舊枝芳菲似恩幸看著被風吹又岑參詩君王嫌妾妬閉妾在長門舞袖垂新寵愁眉結舊恩緑錢侵履跡紅粉濕啼痕羞被夭桃笑看春獨不言又賈至詩獨坐思千里春庭曉景長鶯喧翡翠幕栁覆鬱金堂舞蝶縈愁緒繁花對靚粧深情託瑶瑟絃斷不成章又王貞白詩寂寞故宫春殘燈曉尚存從來非妾過偶爾失君恩花落傷容鬢鶯啼驚夢魂翠華如可待應免老長門又王貞白詩葉落長門靜苔生永巷幽相思對眀月獨坐向空樓鑾駕迷終轉蛾眉老自愁昭陽歌舞伴此夕未知秋劉長卿故女道士婉儀太原郭氏挽歌作範宫闈睦歸真藝業超馭風仙路逺背日帝居遙鸞殿空留處霓裳已罷朝淮王哀不盡松柏但蕭蕭宫禁恩長隔神仙道已分人間驚早露天上失朝雲逝水年無限佳城日易曛簫聲浮薤曲哀斷不堪聞江總為六宫謝表鶴鑰晨啓雀叉曉映恭承盛典夙荷徽章步動雲袿香飄霧縠愧纒艷粉無情拂鏡愁縈巧黛息意臨窗妾聞漢水贈珠人間絶世洛川拾翠仙處無雙或有風流行雲窈窕初日聲高一笑價起兩環乃可桂殿迎春蘭房侍寵借班姬之扇未掩驚羞假蔡琰之文寧披竦戴梁沈約為六宫拜章蓬閨菲質嘉淑無算越自幽衡登軀宸漢奉日月之華侍巾屣之末何以厠鴛鸞之盛序奉屬車之清塵陳江總為陳六宫謝章恭膺禮命愧集丹縷之顔拜奉曲私愁縈翬羽之色魯宫夜火伯媛匪驚楚榭奔濤貞姜何懼豈期日月騰影風雲㵼潤遂復位崇九御聲高六列象服增華丹軿耀采何以弼佐王風克柔隂化兢惶並集追想流荇之詩荷遽相并遂失鳴環之節張說上官昭容集序明淑挺生才華絶代敏識聰聽探微鏡理開卷海納宛若前聞搖筆雲飛咸同宿構則天久視之後中宗景龍之際十數年間六合清謐內峻圖書之府外闢修文之館搜英獵俊野無遺才右職以精學為先大臣以無文為恥每豫逰宫觀行幸河山白雲起而帝歌翠華飛而臣賦雅頌之盛與三代同風豈惟聖后之好文亦云奧主之協讚者也古者有女史記功書過復有女尚書決事宫閣昭容兩朝專美一日萬幾顧問不遺應接如響雖漢稱班媛晉譽左嬪文章之道不殊輔佐之功則異跡祕九天之上身沒重泉之下嘉猷令範代罕得聞庶姬後學嗚呼何仰然則大君據四海之圖懸百靈之命喜則九圍挾纊怒則千里流血靜則黔黎乂安動則蒼氓罷弊入耳之語諒其難乎貴而勢大者疑賤而禮絶者隔近而言輕者忽逺而章忠者忤惟窈窕柔曼誘掖善心忘味九德之衢傾情六藝之圃故登崑巡海之意寢剪胡刈越之威息璿臺珍服之態消從禽嗜樂之端廢獨使溫柔之教漸于生人風雅之聲流于來葉非夫𤣥黃育粹貞眀助思衆妙該識群靈挾志誕異人之寶授興王之瑞其孰能臻斯懿乎鎮國太平公主道高帝妹才重天人昔嘗共遊東壁同宴北渚倐來忽往物在人亡憫雕琯之殘言悲素扇之空曲上聞天子求椒掖之故事有命史臣叙蘭臺之新集謝莊孝武帝宣貴妃誄𤣥丘烟煴瑶臺降芬高唐泄雨巫山鬱雲誕發蘭儀光啓玉度望月方娥瞻星比婺育德素里栖景宸軒處麗絺綌出懋蘋蘩修詩賁道稱圖昭言翼訓姒幄贊軌堯門展如之華實邦之媛宋謝莊殷貴妃諡冊文惟爾含徽挺茂爰光素里友琴流荇實華紫掖奉軒景以柔眀登譽處椒風以婉孌升名幽間之範日藹層闈繁祉之慶方崇蕃世而當春掩藻中波滅源朕用震悼傷于厥心松區已剪泉冥將墜宜有旌德第行式衍聲芳張纘梁高祖丁貴嬪哀冊文隂化代終王風攸始動容咨式出言顧史宜其家人刑于國紀素魄貞眀紫宫照晰逮下靡傷思賢罔蔽躬儉則節昭事惟䖍金玉無玩筐筥不捐祥流德化慶表親賢甄昌軼啓孕魯陶燕方論婦道眀章閫席𤣥池早扃沅湘已穸展衣委華朱幩寢迹幕結儲闈哀深蕃辟常衮贈媫妤董氏墓志銘瑶臺入寵金屋流芳映月幌而方娥上星樓而比婺恩多不恃顧重無矜讓以同車恭而避寢儲宫部太子總梁庾肩吾侍宴宣猷堂應令副君德將聖陳王才掞天歸來宴平樂置酒對林泉爐香雜山氣殿影入池漣艷舞時移節新歌屢上絃聽曲慙回顧思經徒欲眠劉孝威奉和簡文帝太子應令太子天下本元良萬國貞周朝推上嗣漢代紀重眀前星涵瑞彩洊雷揚逺聲三善傳樂正百行紀司成九流遍已辨七經咸所精博聞强子政高才陵長卿禮尊逾屈已德盛益卑情仙氣貽鍾相儒道推桓榮延賢博望苑視膳長安城園綺隨金輅浮丘侍玉笙智囊前斂笏端士後垂纓九仙良所重四海更誰傾班輪同䇿乘甲館齊蓬瀛周庾信北園新齊成應教紅粉跂鳥翼山節拱蘭枝畫梁雲氣繞雕窗玉女窺月懸惟反照蓮開長倒垂盤根細壞石行雨暴澆池長藤連格徙高樹帶巢移鳥聲惟雜曲花風直亂吹白虎題書觀元熊帖射皮文絃入舞曲扇月掩歌兒玉節調笙管金船代酒巵若論曹子建天人本共知唐薛元超奉和同太子監守儲禁銅扉啓宸行玉車犬遙空懷壽街吏尚隔寢門朝地首瞻龍㦸塵外想鸞鑣飛文映仙榜瀝思叶神颷帝念紆蒼陸乾文煥紫霄雲塘橫筆海平圃振詞條欲應重輪曲鏘洋韻九韶梁簡文帝上昭眀太子集别𫝊等表眀月西流幼有文章之敏羽籥東序長備元良之德非假二疏寧勞四皓虎賁恧其經學智囊慙其調護豈止博望延賔壽春能賦問疑棗據書戒憑陵而已哉玉折何追星頽靡續地尊虢嗣外陽之術無徴位比周儲緱山之駕不返梁任昉為皇太子求一日一入朝表臣聞內豎告安姬昌怡色鳴雞戒旦周發冠履或以凉燠之候晨昏異宜膳羞之和鼎飪殊節一辰三朝稱情猶簡終日承顔在理斯愜且長壽之對撫循無已馳道未窮顧懷不輟豈直下動天至固亦上結慈衷自頃半旬乃朝遂為通制事踰信次義乖晨省一日萬幾不敢三塵御省每旦改宿特乞一至寢門蕭子範求撰昭眀太子集表臣聞姬旦云亡播禮樂于百代宣尼既沒𫝊雅頌于千祀夏啓之風載𫝊樂野周晉之迹止在洛濵入侍四公西京見美長壽一察東漢流名魏擊之悟篋衣事關戰國孫登之愛田苗義屬偏霸各稱小善靡擅雕蟲子桓雖詩賦可嘉矩範頓闕貽譏良史取誚前載備而為論發奧允歸自少陽潛位震方滅采神儀長往銅樓毁搆音顔緬邈舟壑遷移若乃緣情體物繁絃縟錦縱橫豔思籠蓋詞林積練纍素盈車滿笈金石有銷斯文方逺既異陳王之躬撰又非當陽之自集臣蟬翼輕身未從塵露而班輸嚴駕永輟騑驂戀主懷兹伏深涕慕冒乞銓次遺藻勒成卷軸唐劉闕論太子初立請尊賢學表臣聞郊迎四方孟侯所以成德齒學三讓元良由是作貞斯皆屈主祀之尊申下交之義故得芻言咸薦睿問傍通不出軒庭坐知天壤率由兹道永為鴻基者焉至若生乎深宫之中長乎婦人之手未嘗識憂懼無由曉風俗雖復神機不測天縱生知而開物成務終由外奬夫宗彼干籥聽兹謡頌何以辨章庶績甄核彛倫歷考賢聖咸資琢玉是故周儲上哲師望奭而加裕漢嗣深仁引園綺而昭德原夫太子宗祧是繫善惡之際興亡斯在不勤乎始將悔于終是以朝錯上書令先通政術賈誼獻䇿務前知禮教竊惟皇太子玉裕挺生金聲夙振眀允篤誠之美孝友仁義之方皆挺自天姿非勞審諭是以華夷仰德翔沛希風矣然寢門視膳已表于三朝藝宫論道宜𢎞于四術雖則春秋鼎盛飭躬有漸實恐嵗月易往惰業興譏取適晏安言從此始臣以愚短幸參侍從恩廣離眀輕願聞徹不敢曲陳故事請以聖德言之伏惟陛下誕睿膺圖登庸歷試多才多藝道著于匡時允武允文功成于纂祀萬方即序九圍清晏尚且雖休勿休日慎一日求異聞于振古勞睿思于當年乙夜觀書事高漢帝馬上披卷勤過魏后陛下自勵如此而令太子優遊棄日不習圖書臣所未諭一也加以暫屏機務即寓雕蟲紆寶思于天文則長河韜映摛玉字于仙札則霽霞成彩固以錙銖萬代冠冕百王屈宋不足以升堂鍾張何階于入室陛下自好如此而令太子悠然靜處不尋篇翰臣所未諭二也陛下備該衆藝獨秀寰中仰達天聰俯詢凡識聽朝之隙引見群儒降以溫顔訪以今古故得朝廷是非里閭好惡凡有巨細必關聽覽陛下自行如此而令太子久入趨侍不接正人臣所未諭三也陛下若謂無益則何事勞神若謂有成則宜申貽厥後蔑而不急未見其可伏願俯惟睿範訓及儲君授以良書娛之嘉客朝披經史觀成敗于前蹤晚接賔逰訪得失于當代間以書札繼以篇章則日聞其所未聞日見其所未見副德逾光群生之福也竊以良娣之選遍于中國仰惟聖㫖本求內助防微慎逺之慮固非羣臣所測暨乎徴簡人物則與聘納相違監撫二周未延一士愚謂內既如彼外亦宜然者恐招物議將謂陛下重內而輕外也古之太子問安而退所以廣敬于君父異宫而處所以分别于嫌疑今太子一侍天闈動移旬朔師傅以下無由接見假令供奉有隙暫還東宫朝謁既疏且事欣仰規諌之道故所未暇陛下不可以親教宫寀無因以進言雖有具寮竟將何補伏願俯循前躅稍抑下流𢎞逺大之規展師友之義則離徽克茂帝圖斯廣凡在黎元孰不慶賴太子溫良恭儉聰眀睿哲含靈所悉臣豈不知而淺識勤勤思效愚衷者願滄溟益潤日月增華也李商隱為濮陽公論皇太子表伏惟皇帝陛下道冠百王功高三古事窺化本謀洞機先皇太子自正位春坊𫝊輝望苑陛下旁延雋乂以贊溫文並學探泉源氣壓浮競嗜魚不進求玦莫從有王褒之獻針無卞蘭之奏賦今縱粗乖睿㫖微慊聖心當以猶屬妙齡未加元服或攜徒御時縱逸逰欒野夏儲亦嘗觀舞南皮魏副屢見飛觴陛下濬發慈仁殷勤措教稍踰規戒即震威靈雖伐木析薪必循其理而逝梁發笱亦有可虞抑臣又聞父之于子也有嚴訓而無責善君之于臣也有掩惡而復録功故得各務日新並從夕改同置于道不傷其慈儻犯在斯須便遺天性過當造次遽抵國章則以古以今孰為令子在朝在野誰曰全臣虛牽復之微言失不二之深㫖伏以陛下侔覆育於天地霽赫怒于雷霆復許省勵宫闈早謝師傅蹈殊休于列聖慰欽矚于兆人臣才則荒凉志惟朴騃因緣代業蒙被官榮竊諸侯之土田領大將之旗鼓當車折檻合首他人瀝膽刺心正當今日而名非朝籍務切軍機道阻且修佇立以泣龍樓獻直戴逵之辭翰蔑聞鳳闕拜章張儼之精誠未泯于志寧諌太子承乾引突厥達哥支入宫書上天蓋高日月以光其德明君至聖輔佐以贊其功是以周誦升儲見匡毛畢漢盈居震取資黃綺周公抗法於伯禽賈生陳事于文帝莫不殷勤于端士懇切于正人昔鄧禹名臣方授審諭之任疏受宿望始除輔導之官歷代賢君莫不丁寧于太子者良以地膺上嗣位處副君善則率土霑其恩惡則海內罹其禍梁簡文帝上皇太子𤣥圃講頌啓竊以舜韶始唱靈儀自舞陳律才宣風心競蕚輕禽短葉尚識音光沐善歡心寧忘撫抃伏惟殿下體高𤣥賾養道春禁牢籠文圃漁獵義河注意龍宫研心寶印雲聚生什之才並命應王之匹探機析理怡然不倦朱華景月詎此忘罷屬素藏晚節𤣥英初氣霜竹浮隂風梧散葉從容雅論實㑹神衷綱經生多幸屬此休世躊蹰奉渥得備磐藩而黏蠅未拔迷象不羈寶沒醉衣珠沉勇額得聞勝善寧忘歌詠許敬宗謝皇太子玉華山宫銘賦啓伏惟殿下天資學府道貫生知絢發詞林若春華之麗韶景漪清筆海譬秋水之淡晨霞仙鶴和吟慙八音于雅韻神龍縟彩謝五色于雕文綺布天庭雲生石砌理含貞邃雅達谷處之端趣極幽閒妙盡嵓居之體烟松合翠露桂分紅察彼殊形翻然共色䆒寫真之奧㫖擅體物之窮神若乃漢月鈎空乍臨珠箔石苕垂髮或映莊帷莫不理超詞表意生文外自餘清拔觸類竒新成若神化之工光乎性道之製蓋由基天挺裕纂聖凝離故能邁古超前納卿雲于度內逾儔絶侣括啓誦于胸中薛元超諌皇太子箋昔漢苑招賢高軒洞敞曹園愛客飛蓋連隂此乃副君之待士也亦有推心鄭衆每佇於咨詢降禮桓榮用承于誨命此則副君之尊師也固以苑囿之地草樹極深絶磴危嶠往往而有控纎離之馬影踰流電擁太阿之劒氣駭奔星截輕禽逐狡兔倘有銜勒之變雖悔何追殿下假以溫顔人各申其藝業鈎深理窟者思憤懷蛟托實詞條者文成吐鳳此亦一時之竒觀可以澡慮怡神預在宫僚人知自效便僻取容者疏之正直不撓者親之棄不急之務而省逰娛絶無益之欲而敦節儉以儒墨為城池翺翔其際以禮義為干櫓棲息其間許敬宗為司徒趙國公謝皇太子寄詩箋手開玉札炫目澄心行諷金聲式歌且抃竊惟化成天下闕以導洪源體物緣情自風騷而綿列代莫不咸相祖述罕見生知伏惟殿下摛絢紹天含章挺睿溫文表裕藻清漢于離暉麗則凝華縟春秋于博望乃以監守餘暇俯貺清篇覽夜月之流光降無私于逺客想懸旌之未卷察翹心于征斾依依垂栁益愴邊城鬱鬱中園偏傷逺塞殊私所被文㫖兼深詞運理而參神氣凌雲而含粹五章間發若啓榮光之圖六律相宣如覿奏金之字無忌幸從神武愧乏王粲之才忝降斯文益深吳質之思無任感荷慶躍之至于是扣寂求音繼震方之逸響披吟見意吐爝火之微光宋汪藻代人賀皇太子正位箋分輝寶緒育粹璿源挺天人岐嶷之資禀聖人徇齊之教保育元良星輝海潤琢磨令德玉粹金純闕賀元正箋乾九四之潛德震一索之長男問寢雞鳴紫禁耐烟花之繞賔賢鴻翼皓眉峙雪柏之堅王勃乾元殿頌序皇太子承雲紫座翊八柱于乾維湛粹青衢揖三樞于地户黃離踵曜太陽分銑樹之輝蒼震薦音少海控銀河之色鶴筌飛奏想丹駕于瓊山鮑爼捐芳齒𤣥冠于寶序彤闈問豎禮崇監撫之威黼席興賢義極君親之愛若乃東門恤𦙍疊仙構于熊山西苑承家導靈波于鴈沼桐圭作瑞鳳毛曜丹穴之英茅壤分維麟距冠𤣥丘之俊楊盈川崇文館宴集詩序齒于成均所以眀其長幼通于博望所以昭其賔客東方曼倩之文史即自陳詞甪里先生之羽翼仍參獻壽為賔者四友等黃龍之簡才論奏者八人同赤烏之下士莫不縉紳舊德縫掖名儒衣簮拜高闕之門驂駕陪直城之路梁王筠昭明太子哀冊文式載明兩實惟少陽既稱上嗣且曰元良儀天比峻儷景騰光奉祀延福守器傳芳睿哲膺期旦暮斯在外𢎞莊肅內含和愷軒緯掩精隂羲弛位纒哀在疚殷憂銜恤孺泣無時蔬饘不溢禫遵踰月哀號未畢實惟監撫亦嗣郊禋問安肅肅視膳恂恂金華玉璪𤣥駟班輪隆家幹國主祭安民光奉成務萬幾是理矜慎庶獄勤恤關市誠存隱惻容無愠喜殷勤博施綢繆恩紀爰初敬業離經斷句奠爵崇師卑躬待傅馳神圖緯研精爻畫沈吟典禮優遊方冊饜飫膏腴含咀肴核括囊流略包舉藝文遍該緗素殫極丘墳幐帙充積儒墨區分贍河闡訓望魯揚芬吟咏性靈豈惟薄伎屬詞婉約緣情綺靡字無㸃竄筆不停綴壯思泉流清章雲委總攬時才網羅英茂學窮優洽辭歸繁富或擅談叢或稱文囿四友推德七子慙秀望苑招賢華池愛客託乘同舟連輿接席摛文掞藻飛觴泛醳恩隆置醴賞逾賜璧徽風遐被盛業日新仁器非重德輶易遵澤流兆庶福降百神四方慕義天下歸仁雲物告徴祲沴褰象星霾恆耀山頽朽壤靈儀上賔德音長往儲宫部太子生後魏溫子升魏莊帝生皇太子赦詔彩雲映日神光照殿方開博望將起龍樓逺近同歡神人共悅宋王安石賀生皇太子表燕禖饗德方儲錫羡之祥羆夢生賢克協㑹昌之運與在照臨之廣敷同慶賴之深竊以思齊神罔時恫假樂民之攸塈天所保佑厥惟太姒之多男國之榮懷亦曰成王之衆子恭惟皇帝陛下令德光乎洛誦康功茂乎岐昌鴻休無疆景命有僕蓋芣苡之薄言采采衆皆先成則螽斯之宜爾振振宗强孰禦臣久叨眷遇適阻進趨親值夲支百世之盛時敢忘壽考萬年之善祝李劉賀皇帝誕太子表斗揭柄于子躔式對履長之慶星重輝于甲觀肇開震索之祥封人祝華願惟在于多男帝子生商命誕膺于百祿矧春秋鼎盛之㑹重日月離麗之眀有道之長無思不服斯干詠朱芾之宜長樂增綵衣之喜臣濫竽郡紱阻綴庭紳歌本支百世之詩知不遺于周士獻父母萬年之頌尚竊附于唐人宋沈清臣賀誕皇嫡孫表洪圖錫羡卜年過蒼籙之期朱邸發祥奕葉啓緑車之慶事關廟社喜極神人毛闕皇子晬日淨髮祝詞帝祉儲休皇圖增永熊夢占管簟之祥燕禖襲弓矢之慶維時百子來侈千齡標日月以含粹擢山河而赫靈儲宫部太子冠宋謝莊皇太子加元服上太后表離景承震樞光陪極育問東華飛英上序樂正歌風司威頌德清眀神鏡溫文在躬練日簡辰昭備元服懋三王之教爥少陽之重又賀太子表伏惟殿下眀兩承乾元良作二抗法遷身英華自逺樂以修中禮以治外三善克茂德成教尊自今吉辰昭加元服對靈祗之望儔上庠之歡率天罄世莫不載躍儲宫部冊立唐內制冊遂王為皇太子文體乾降靈襲聖生德教深藴瑟氣叶吹銅早集大成丕肩幼志溫文得于天縱孝友因于自然符彩昭融器業英逺爰膺錫社實寄維城懿河間之不羣慕東平之最樂自頃離眀輟耀震位虛宫地德可尊人神攸屬式稽令典載煥徽章宋鄧潤甫立皇太子制溫文日就睿智夙成回馳道之車能止班輪之騖辨南陽之牘允符東海之休自疏錫于王封益光華于德望勝衣視膳溢然孝友之姿好禮受經不煩師傅之誨周王褒為百寮請立太子表洊雷居震春方應守器之禮眀兩作離少陽纂重暉之業是以三善昭德載祀之祚克隆一人元良貞國之基永固問安寢門視膳天幄梁簡文帝謝立為皇太子表臣本凡質賔實無取特以育慶雲霄馮暉璿極鳴玉內侍指揮外藩猶懼不任尚疑廢職况復監撫守從道著前經恭敬溫文義彰昔記震維禮絶離景事尊飬德北宫贊業東序事異定陶之舉有類膠東之冊將何以著三善之德延四皓之遊屈叔譽之辭繹卞蘭之頌梁陸倕為豫章王慶太子出宫表臣聞周固夲支實資眀兩漢啓磐石必係元良所以闡宏祚鼎光崇守器伏惟皇太子道契生知照均天縱不藉審諭之功無待溫文之輔而冬書秋記夙表睿資春誦夏絃幼彰神度雖復直門守令長壽察微魏贊多容漢稱寬博不足以連輝茂則匹景令圖甲觀惟新桂宫告始朱班徙次翠蓋移隂華裔式瞻人祗蹈舞唐常衮為代宗讓皇太子表國之上嗣古曰元良觀象于天應前星之環極取法于地視少海之朝宗必訪蓍龜以承主鬯臣幼非樂善長未好儒慈奬特深愚蒙不易教之羽籥有昧樂章訓以詩書終迷義府逰虧四老才乏五官人莫係心德非守器頃者外統羣帥內録尚書竊懼任榮以憂官謗今謬塵博望猥辱壽春位登青宫禮絶朱邸且乖人望載黷朝經循名責實未足承天之序捨長立賢亦猶行古之道伏惟陛下博求公議久納微誠更擇溫文俾膺繼紹逺想伯夷之讓用升季歷之材劉禹錫賀冊皇太子表前星位定拱宸極以昭彰蒼震氣宣與天地而長久禮光匕鬯澤被華夷宗祉有無彊之休生靈懷莫大之慶栁宗元為百官賀册立皇太子表伏惟陛下奉率前規敷揚盛典顧茲守器之重爰正承華之位遵義方之教載錫嘉名崇建儲之禮式光典命以長而立自符于慎擇必子之選遂合于至公邦本不搖王業彌固載錫雕珉之冊委頒青輅之旗宋汪藻代人賀皇太子正位箋分輝寶緒育粹璿源挺天人岐嶷之資禀神聖徇齊之教當周室本支之盛獨冠百男宜漢家羽翼之成無煩四皓前星外炳洊震中潛某幸列宗枝喜隆邦本河潤九里方率族以依仁月有重輪願登歌而薦祉儲宫部儲學唐崔融為皇太子請修書表臣聞昔者眀王學以化人成俗古之君子文以緯地經天雖有閬風之高嶽弗登弗知其峻也雖有浴日之巨溟弗涉弗知其廣也伏惟天皇域中居大天下化成百官以理萬民以察日行中道而淑清嵗起攝提而位序光薰萬物豈直芝珥蓂􅟏澤加四海寧惟壽麻孤竹地成形而天成象其道彌光河出圖而洛出書其徴可驗瓊林璧沼金門石室墳典積于丘山筆墨盈于泉海聖朝多士自可包二代之文臣顧不才可足奉三王之教皇慈渥洽帝奬優隆擢公望為太師徴子房為少傅所冀習與智長化與心成嘗辛苦于嵗餘終未階于日就臣聞學者殖也問以辨之積必有成勤則不匱以周公之上聖日讀百篇以孔父之多能韋編三絶臣雖不敏竊所庶幾然以列代遺章先王舊典康成興業才覽卷于八千士安覃思願加年于纍百豈不以學而時習博則難精者乎今欲搴其蕭稂撮其樞要可以出忠入孝可以益國利人極賢聖之大猷盡今昔之能事商𣙜百氏勒成一家庶有代于針規長不違于左右謹當開桂樹之山鑿芙蓉之水引甘泉之詞賦總望園之賔客下藝閣而長謡臨梓厨而高㑹一遊蘭芷佇變蓬麻區區之誠敢希矜允豈使肅城門內唯傳魏國之名崇政殿中獨紀晉朝之事劉孝綽為東宫奉經啓皇太子四術夙和三善非學猶復旁求儒雅應物稽疑業光夏校德茂周庠諸侯宋魯於焉觀則參陪盛禮莫非國華梁元帝皇太子講學碑皇太子洊雷種德重離作兩業冠孟侯道高上嗣宫墻纍仭高山仰止承華之闈更似通德之門博望之園反類華隂之市家丞庶子並入四科洗馬後車俱通六學轉金路而下辟雍晬玉裕而經槐市詳其懸鏡高堂衢樽待酌瞻後忽前博文約禮將使東極長男之宫不獨銘于銀榜南皮太子之序豈徒擅於金碑陳江總皇太子太學講碑我大陳之御天下若水渙其長瀾瑶星躔其永厯重華誕睿興于大鹿之野敬仲繼業盛矣鳴鳳之占兼以鴻才海富逸思泉㵼含毫落紙動八闋之歌謡隻句片言諧五聲之節奏雲飛風起追壓漢帝之辭高觀華池逺跨魏王之什爰復建藏書之冊開獻書之路帷帳叢殘家壁遺逸紫臺祕典緑帙奇文羽陵蠧迹嵩山落簡外史所掌廣內所司靡不飾以鉛槧雕以緗素此文教之修也儲宫部太子妃唐太宗冊太子妃文族茂冠冕慶成禮訓貞順自然言容有則作合春宫實協三善曰嬪守器式昌萬乘僃兹令典仰惟國章宋謝莊皇太子妃哀䇿文楹凝桂酒庭肅龍輼風吹國輅雲起郊門皇帝傷總繸之掩綵悼副禕之滅華行光既宴長河又斜顧而言曰璇瑶有毁郁烈無湮翦素裁簡授之史臣其辭曰霍岫窺天灊流凝漢祥發桐圭慶昭金算育景帝里飛芳戚閈祕儀施谷升音集灌月晷幾望娣袂維良釋幃春宫承飾少陽五葉衍藻四訓抽光葳蕤蕙振婉孌瓊相清徽就逺祲沴方搏臨華罷翠當曄收蘭復殿生響長廡結寒節移虗饋氣變容衣中庭草曖階上螢飛傷縈里第痛溢朝闈霜侵燭昧風密帷凄驚葭夕轉龍驂夜嘶筵既訣兮奠既徹背青闕兮去神閨旌掩鬱而還泛蓋逶遲而顧低素紼斂維華軿解馭山燧恆隂松阿不曙離天渥兮就銷沉委白日兮即幽暮菊有秀兮蘅有芬德方逺兮聲彌樹齊王儉皇太子妃哀䇿文肇惟初識芳猷夙就翩翻禮園徘徊樂囿視秋齊眀方春等茂伊宋之季天衢薦阻咨我儲二締胥江滸衛女事齊樊姬贊楚美著嬪嗣徽音踵武數盈則反否極斯昌肅膺靈命經緯三光往儀衡館來式椒堂紃組咸事象服有章八演仰則六幽望景悠悠草昧如何不永方中委曜先秋落穎世有遺塵庭無餘影嗚呼哀哉遵三兆之嘉日迢九筮之靈期澄金波而映鑾斾命飛亷而拂瓊輜揚清笳于漢表動嘶挽于雲基帝戚部諸王梁劉孝威過康王第宅詩入梁逢故苑渡薛見餘宫尚識招賢閣猶懷愛士風靈光一超逺行館復朦朧洞門餘舊色甘棠留昔叢送禽悲不去過客慕難窮池竹徒如在林堂暖已空逺樓隔樹出回澗隱崖通芳流小山桂塵起大王風具物咸如此是地感余衷空想靈前劍徒悲壠上桐陳徐陵征虜亭送新安王應令詩鳳吹臨南浦神駕餞東平亭回漳水乘斾轉洛賔笙地凍斑輪響風嚴羽蓋輕曉田雲色暗古樹雪花眀岐路一回首流襟動睿情唐李嶠劉侍讀見和山邸十篇重申此贈詩神嶽瑶池圃仙宫玉樹林垂時警天御清暑滌宸襟梁駕陪𤣥賞淄庭掩翠岑對巖龍岫出分壑鴈池深簷迥松蘿映窗高石鏡臨落泉奔澗響驚吹助猿吟野氣迷凉燠山花雜古今英藩盛賔侣勝境相招尋踐徑披蘭葉攀崖引桂隂穆生時泛醴鄒子或調琴雉翳分場合魚鈎向浦沉朝迷極斜景夕宴待橫參顧已慙鉛鍔叨名齒玳簪暫依朱邸館還暢白雲心丘壑信多美烟霞得所欽寓言攄宿志竊吹簡知音奬價踰珍石訓文重振金方從仁智所攜手濯清潯宋之問奉和梁王宴龍泓應教詩水府淪幽壑星軺下太微鳥驚司僕馭花落侍臣衣芳樹搖春晚晴雲繞坐飛淮王正留客不醉莫言歸宋之問梁宣王挽詞詩金精何日閉玉匣此時開東望連吾子南瞻近帝臺地形龜食報墳土燕銜來可嘆虞歌夕紛紛騎吹回王維從岐王過楊氏别業應教詩楊子談經處淮王載酒過興闌啼鳥換坐久落花多徑轉回銀燭林開散玉珂嚴城時未啓前路擁笙歌王維從岐王夜宴衛家山池應教詩座客香貂滿宫娃綺幔張澗花輕粉色山月吐燈光積翠紗窗透飛泉繡戶凉還將歌舞出歸路莫愁長宋蘇頲封衡陽郡王成義為申王等制敦詩執禮本仁祖義名教之樂得自幾深溫良之容發于忠孝晨趨魏闕則望掩軒霞夕賦曹園則思含澄景梁沈約為南郡王讓中軍表挹道未𢎞踐義多缺徒升國彛空襲宸寵光圭華組暗藹于關陲令采徽猷寂寥于甸表又為晉安王謝南兖州章臣以萊孱幼無秀業依天宅照藉海憑瀾王爵早加藩麾夙樹進不能間詩西楚好禮北河退無以振采六條宣風萬里周庾信為杞公讓宗師表臣幼無學植長闕才成鴻都之門不能定其章句雞鹿之塞無以名其碑碣馮天漢之派水附弱木之分枝東嶽則朝宿有名南宫則門闌有籍在臣庸劣久知滿盈武陽以功臣之重特拜宗師東平以母弟之尊超登上將臣有何德能兼此榮當今玉燭調和既非金革之世璿璣齊政豈忘松檟之餘况復一枝踡曲終危九層之臺一股涔蹄必傷千里之駕唐李嶠為皇太子請加相王封邑表相王旦發彩璿萼承流寶派雖班尋錫瑞既同于伯叔之封而食采苴茅不逮于子男之國敢緣敦叙之義輒獻由衷之誠臣聞命以車服錫之土田實將共安邦家永固宗祏炎漢之開藩樹屏㕓開七十城隆姬之書社建侯封彊四百里故知業隆者基大本盛者末豐涯涘濶而潤澤深枝條繁而庇䕃逺至今骨肉禮薄藩維業曠曲阜之特高才藝仍減附庸平臺之深篤孝慈僅留湯沐徽章空列于五等祿秩不踰于九命曦舒兼曜之德久被于寰中雲雨曲成之恩翻遺于膝上異强幹弱枝之道違先親後疏之意劃以山川優其井賦剖符開國依稀魯衛之親磐石居宗髣佛應韓之躅眀鳲鳩均養之惠慰鶺鴒同氣之心使麟趾式安犬牙愈固又為定王讓官封表陛下懸旌訪逸刻象求才朝有白駒之賢野無黃犢之彥方使思皇多士必眀于至公豈令棫朴能官近廢于親昵伏兾回光斂靄寢紱收綸察臣不移之心矜臣非飾之請特停過誤改命才良則白馬丹書不慙于異姓和羮作礪不逮于凡庸又為臨川王讓千牛將軍表花萼同榮依上林而發彩鶺鴒交賀仰大厦而相歡恩比丘山效微塵露伏乞收迹丹墀歸骸素里庇堯雲之光彩浴舜海之波瀾栁蔚桃濃聽南鄰之鐘磬茅舒桂滿陪北闕之簪纓餐厚渥而忘饑樂太平而愈疾又為安平王讓楊州都督府長史表刷燕雀之毛羽求其奮飛飾駑駘之銜轡徴其滅沒梁書太祖五王贊自昔王者創業廣植親親割裂州國封建子弟是以大旗少帛崇于魯衛磐石凝脂樹斯梁楚高祖逺遵前軌藩屛懿親至于安成南平鄱陽始興俱以名跡著蓋亦漢之間平矣晉史論八王史臣曰昔高辛撫運釁起參商宗周嗣厯禍纒管蔡詳考曩册逖聽前古亂臣賊子昭鑒在焉有晉鬱興載崇藩翰分茅錫瑞道光恆典儀古飾衮禮備彛章汝南以純和之姿失於無斷楚隱習果鋭之性遂成凶狠或位居朝右或職參近禁俱為女子所詐相次受誅雖曰自貽良可哀也倫實庸璅見欺孫秀潛構異圖煽成姦慝乃使元良遘怨酷上宰陷誅夷乾耀以之暫傾皇綱于焉中圮遂裂冠毁冕幸百六之㑹綰璽揚纛窺九五之尊夫神器焉可偷安鴻名豈容妄假而欲託兹淫祀享彼天年凶暗之極未之有也冏名父之子唱義勤王摧僞業于既成拯皇輿于已墜䇿勳考績良足可稱然而臨禍忘憂逞心縱欲曾不知樂不可極盈難久持笑古人之未工忘己事之已拙向若採王豹之竒䇿納孫惠之嘉謀高謝衮章永表東海雖古之伊霍何以加焉長沙材力絶人忠槩邁俗投弓掖門落落標壯夫之氣馳車魏闕凛凛懷烈士之風雖復陽九數屯在三之情無奪撫其遺節終始可觀頴既入總大權出居重鎮中臺藉以成務東夏資其宅心乃協契河間共圖進取而顒任李含之狙詐杖張方之陵虐遂使武閔喪元長沙授首逞其無君之志矜其不義之彊鸞駕北巡異乎有征無戰乘輿西幸非由望秩觀風若火燎原猶可撲滅矧兹安忍能無及乎東海紏合同盟創為義舉匡復之功未立陵暴之釁已彰罄彼車徒固求出鎮既而帝京寡弱狡寇憑陵遂令神器劫遷宗社顛覆數十萬衆並垂餌于豺狼三十六王咸隕身于鋒刃禍難之極振古未聞雖及焚如猶為幸也自惠皇失政難起蕭墻骨肉相殘黎元塗炭氛塵驚而天地閉戎兵接而宫廟隳支屬肇其禍端戎羌乘其間隙悲夫詩所謂誰生厲階至今為梗其八王之謂矣盧照鄰歌諸王星陳帝子嶽列天孫義光帶礪象著乾坤我有眀德利建攸存苴以茅社錫以犧樽藩屏王室翼亮堯門八才兩獻夫何足論梁沈約齊司徒安陸昭王碑公含辰象之秀德體河嶽之上靈氣藴風雲身負日月慧露沾吳仁風扇越北齊邢子才廣平王碑日月在躬水鏡被物望青松而比秀干白雲而上征侍講金華參逰銅雀出陪芝蓋入奉桂室發言為論受詔成文碧雞自口靈蛇在握方見建安之體復聞正始之音梁任昉齊竟陵文宣王蕭子良行狀公道亞生知照臨幾庶孝始人倫忠為令德公實體之非毁譽所至天材博贍學綜兼眀至曲臺之禮九師之易樂分龍趙詩析齊韓有一于此罔不兼綜昔沛獻訪對于雲臺東平齊聲于楊史淮南取貴于食時陳思見稱于七步方斯蔑如也夫家國之道互為公私君親之義遞為隱犯公二極一致愛敬同歸亮誠盡規謀猷𢎞逺矣他人之善若已有之民之不臧公實貽耻誘接恂恂降以顔色人有不及內恕諸已非意相干每為禮屈任天下之重體生民之俊華衮與緼􅀈同歸山藻與蓬茨俱逸良田廣宅符仲長之言邙山洛水協應臾之志丘園東國錙銖軒冕乃依林構宇傍巖拓架清猿與壺人爭旦緹幕與素瀨交輝置之虛室人野何辨高人何㸃躡履于鍾阿徴士劉虬獻書于衡嶽贈以真人之服𢎞以度外之禮梁裴子野司空安城康王行狀降七緯之禎靈禀五行之正性圭璋特達清眀在躬學無常師希追風乎孔父幾神殆庶諒亞跡乎顔生說禮敦詩方昔人而有裕既眀且哲體大雅而弗渝仁恕以懷君子刑憲以肅小人位煩以簡居難則易霈如時雨芬若蘭蓀皇上震天倫之悼庶僚懷人百之感帝戚部外戚故趙王屬贈黃門侍郎上官公挽詞常門旌舊德班氏業前書謫去因丞相歸來為媫妤周原烏相冢越嶺鴈隨車冥漠辭昭代空憐賦子虛晉書外戚𫝊論詳觀往册逖聽前聞階緣外戚以致顯榮者其所由來尚矣而多至禍敗鮮克令終者何哉豈不由祿以恩升位非德舉識慙明哲材謝經通假椒房之寵靈總軍國之樞要或威權震主或勢力傾朝居安而不慮危務進而不知退驕奢既至釁隙隨之者乎是以吕霍之家誅夷于西漢梁鄧之族𠞰絶于東都其餘干紀亂常害時蠧政者不可勝載至若樊靡卿之父子竇廣國之弟兄隂興之守約戒奢史丹之掩惡揚善斯並后族之所美者也由此觀之干時縱溢者必以凶終守道謙沖者永保貞吉古人所謂禍福無門惟人所召此非其效歟逮于晉難始自宫掖楊駿藉武帝之寵私叨竊非據賈謐乘惠皇之蒙昧成此厲階遂使悼后遇雲林之災愍懷濫湖城之酷天人道盡喪亂𢎞多宗廟以之顛覆黎庶於焉殄瘁詩云赫赫宗周褒姒滅之其此之謂也爰及江左未改覆車庾亮世族羽儀王恭高門領袖既而職兼出納任切股肱孝伯竟以亡身元規幾于敗國豈不哀哉若褚季野之畏避朝權王叔仁之固求出鎮用能全身逺害有可稱焉帝戚部公主宗楚客侍宴安樂公主新宅應制詩星橋他日構仙榜此時開馬向鋪錢埒簫聞弄玉臺人疑衛叔美客有馬卿才借問逰天漢誰能帶石回李嶠侍宴安樂公主莊應制詩黃金瑞榜綘河隈白玉仙輿紫府來碧樹青岑雲外聳朱樓畫閣水前開龍舟下瞰鮫人室羽節高臨鳳女臺遽惜歡娛歌吹晚揮戈却使耀雲回又盧藏用詩皇女瓊臺天漢潯星橋月宇構山林飛羅半拂銀題影瀑布環流玉砌隂菊浦香隨鸚鵡泛簫笙韻逐鳳凰吟瑶池駐蹕恩方久璧月無聞興轉深又李適詩平陽金榜鳳凰樓沁水銀河鸚鵡州綵仗遙尋丹壑裏仙輿暫幸緑亭幽前池錦石蓮花艷後嶺香爐桂蘂秋貴主稱觴萬年壽還輕漢武濟汾逰李嶠侍宴長寧公主東莊應制詩别業臨青甸鳴鸞降紫霄長筵鴛鷺集仙管鳳凰調樹接南山近烟含北渚遙承恩咸已醉戀賞未還鑣又李適詩鳳樓紆睿幸龍舸暢宸襟歌舞平陽第園亭沁水林山花添聖酒澗竹繞薰琴願奉瑶池駕千春待德音又李乂詩紫禁乘雷動青門訪水嬉貴台鱣序集仙女鳳樓期合宴簪紳滿承恩雨露滋北辰還捧日東館幸逢時蘇頲奉和初春幸太平公主南莊應制詩主家山第早春歸御輦春逰繞翠微買地鋪金曽作埒尋河取石舊支機雲間樹色干花滿竹上泉聲百道飛自有神仙鳴鳳曲併將歌舞報恩暉又沈佺期詩主第山門起灞川宸逰風景入初年鳳凰樓下歌天仗烏鵲橋頭敞御筵往往花間逢綵石時時竹裏見虹泉今朝扈蹕平陽館不羡乘槎雲漢邊宋之問宴長樂公主宅應制詩英藩築外館愛主出王宫賔至星槎落仙來月宇空玳梁翻駕燕金埒倚晴虹簫奏秦樓裏書開魯壁中短歌能駐日艷舞欲嬌風聞有淹留處山河滿桂叢薛稷奉和送金城公主適西蕃應制詩天道容殊俗深仁乃戢兵懷荒寄赤子忍愛鞠蒼生月下瓊娥出星分寶婺行關山馬上曲相送不勝情上官儀上高密長公主挽歌湖渚韜靈跡娥臺靜瑞音鳳逐清簫逺鸞隨幽鏡沉霜處華英落風前銀燭侵寂寞平陽宅月冷洞房深吳兢永泰公主挽歌穠華從婦道釐降適諸侯河漢天孫合瀟湘帝子逰關雎方作訓鳴鳳自相求可嘆凌波迹東川遂不流舜華徂北渚宸思結南陽盩綬哀榮備遊軒寵悼彰三川謀逺日八水宅連岡無復秦樓上吹簫下鳳凰李乂高安公主挽歌二首湯沐三千賦樓臺十二重銀爐稱貴子玉輦盛過逢嬪則留中饋娥輝沒下舂平陽百歲後歌舞為誰容賔衛儼相依橫門啓曙扉靈隂蟾兔缺仙影鳳凰飛一水秋難渡三泉夜不歸况臨青女節瑶草更前衰宋歐陽修皇第十女封慶壽公主制詩紀王姬之盛車服之制甚嚴漢優帝女之儀湯沐之封並列蓋敦國體匪曰親私寶婺分暉仙源襲慶天姿異稟溫而有儀姆教不煩生而知善方居妙嵗蔚有令猷朕仰承燕翼之謀兹膺一作膺兹蕃衍之祉俾新禮命式示褒榮虞通之讓婚表自晉氏以來配尚王姬者雖纍經美胄亟有名才至如王敦懾氣桓溫斂威真長佯愚以求免子敬炙足以違禍王偃無仲都之質而祼雪于北階何瑀闕龍工之姿而投軀于深井謝莊殆自害于矇叟殷沖幾不免于強鉏彼數人者非無才意而勢屈于崇貴事隔于聞覽吞悲茹氣無所逃訴制勒甚于僕𨽻防間過于婢妾行求出入人理之常當待賔客朋從之義而令掃轍息駕無窺門之期廢筵抽席絶接對之理非惟交友離異乃亦兄弟疏濶第令受酒肉之賜制以動靜監子待錢帛之私節其言笑姆妳爭媚相勸以嚴尼媪競前相諂以急第令必凡庸下才監子皆葭萌愚豎議舉止則未間是非聽言語則謬其虛實姆妳敢恃耆舊唯贊妬忌尼媪自唱多知務檢口舌其間又有應答問訊卜筮師母乃至殘餘飲食詰辨與誰衣被故弊必責頭領又出入之宜繁省難齊或進不獲前或入不聽出不入則嫌于欲疏求出則疑有别意召必以三晡為期遣必以日出為限夕不見晚魄朝不識曙星至于夜步月而㺯琴晝拱袂而披卷一生之內與此長乖又聲影裁聞則少婢奔迸裾袂向席則醜老叢來左右整刷以疑寵見嫌賔客未冠以少容致斥禮有别媵象有貫魚本無嫚嫡之嫌豈有輕婦之誚今義絶傍私䖍恭正匹而每事必言無儀適設辭輒云輕易我又竊聞諸主聚集唯論夫族緩不足為急者法急則可為緩者師更相扇誘本其恆意不可貸借固實嘗辭或云野敗去或云人笑我雖曰家事有甚王憲發口所言恆同科律王藻雖復彊佷頗經學涉戲笑之事遂為寃魂禇曖憂憤用致夭絶傷理害義難以具聞夫螽斯之德實致克昌專妬之言有妨繁衍是以尚主之門往往絶嗣駙馬之身通離釁咎以臣凡弱何以克堪唐李嶠為太平公主請住山陵轉一切經表使烏鳥微志獲與耘禽致哀犬馬孤誠得從耕象申慕李嶠為公主辭家人畜産官給料表妾聞賢相防微格盈門之車騎通人酌損忌滿堂之金玉尚子平之讀易富不如貧孔宣尼之立言奢也寧儉永言故實此為明鑒妾等並承靈坤載荷䕃中樞或天妹申慈忝扶桑之瑞萼或王姬藉寵竊穠李之竒秀開沁水之園苑賜常山之湯沐榜懸金字分衢離巽之宫路夾銀河竝列星辰之位通祕籍於龍廷之內枉仙輿于鳳樓之下殊私曲奬以日而繫年縟禮崇徽夸今而邁昔兼復别隆朝㫖猥存家務輿臺供𨽻之衣食棧廄豢牢之秣養竝回中府俱出大農聚終嵗之儲但憑絲紱供闔門之費不煩機杼仰祗鴻澤退省微躬生以地高徒竊雲霄之幸寵非德進曾微纎芥之勞何義而虛受渥恩何功而謬延賞賜是用每積慚悚常憂顛沛敢忘周公逸豫之誡深念老氏止足之言乞留聖慈俯鑒愚懇使榮無過腆滿不至溢國邑田租之常料既已豐殷馬牛陪𨽻之雜供竝希停減庶得無耗府實稍清朝謗長轂逺馭不逢于致寇之人高門洞開無怯于害盈之鬼李嶠代公主讓起新宅表陛下骨肉之愛天至而溟深敦叙之風日隆而月厚乃復推心連萼結念同胞方欲廣沁水之庭除增常山之版築雖殊恩曲奬惠澤實浸于肌膚而妨公害私謗訕恐盈于道路况臣妾承靈天妹藉寵王姬輿服亞於椒宫土田方於茅社甲第之當衢向市竝列三區别廬之帶水連山將盈萬畝深埒則可乘騏驥高樓則唯待鳳凰常憂瞰室之易灾實懼滿堂之難守寧可更求輪奐别構崇深擾閭里之氓黎傾國家之府藏且鬼神所福常矜于缺隅賢聖垂針必誡于豐屋孫叔辭良沃之土晏嬰求湫隘之居妾雖愚䝉頗聞訓典實願歸師老氏以止足自防仰慕周公將逸豫為戒但希安分于容膝非敢攀榮于潤身宋文天祥皇女進封同壽公主賀皇帝表竊惟興君之際必有積善之餘播在正風則曰王姬之美陳于小雅是為女子之祥無非歌福祿之同于以著國家之盛苞體深仁既茂綿瓜之瓞岡陵厚積復培穠李之華王勃乾元殿頌巽宫延粹構朱柱于娥臺兊野流芬疏紫蘭于别館頻隈育範雲扃分戚里之歡覃嶼凝規星閣絶郎官之請魏溫子升常山公主碑昆山西峙宛有夜光漢水東流是生眀月公主禀靈宸極資和天地芬芳有性溫潤成質自然祕逺若上元之隔綘河直置清高類姮娥之依桂樹令淑之至比光眀于宵燭幽閒之盛匹穠華于桃李託體宫闈而執心撝順宛然左辟率禮如賔舉華燭以宵征動鳴佩而晨去致肅雍于車乘成好合于琴瑟立行潔于清氷抗志高于黃鵠停輪表信闔門示禮終能成其子姓貽厥孫謀而鐘漏相催日夜不息川有急流風無靜樹奄辭身世從宓妃于伊洛遽捐館舍追帝子于瀟湘蘇頲高安長公主神道碑公主承娣月之華分女皇之耀間和美度婉娩令德有循其禮無擇于言鍳圖取則聞詩服義故可以賦絲緡而開湯沐者也于是曳紅綬賜青圭香滿玉罏綵搖金縷允所謂帝乙歸妹以祉元吉魯侯主婚是稱同姓門昌帝緒家纍天姻徴平叔之才貌得孟孫之閥閲亦既遘止展也令儀成其肅雍率由俊彩黃金象牙眀珠翠羽之飾積于外雕文刻鏤衣紈履絲之巧充于內然後堅車良馬漿酒藿肉吹笙竽學歌舞于其間者殊不知以相强而結禍因自恣而招危魯元所以好過度竇太所以縱踰禮鄂邑所以懟抵罪湖陽所以匿犯法館陶所以求不獲昭平所以免河上埒開邙阜𦙍子孰聞田在漢京權臣所奪吁可長嘆息者矣宜於秋犢以助宗人率彼春蠶以從王后蘇頲凉國長公主神道碑思過魯元王豈上邑寵逾竇太常豈臨山每絶館陶之祈自無昭平之贖瑶草淪霜桂枝辭月李嶠攀龍臺碑降六禮于璿樞指三星于金穴魯夫人一作大夫之嫁女卿士送迎張公子之取妻乘輿供帳作儷于鳳凰之兆相從于孔雀之樓伐柯則歡其食魚流荇則美其巢鵲是配琴瑟爰宜室家齊王融永嘉長公主墓志銘相金陋質穠李漸輝顧史求針披圖問則唐中宗賜駙馬制鳳凰樓上宛符琴瑟之歡烏雀橋前載叶松蘿之契宜覃茅土式廣山河帝戚部公族宋王清仲赴任上推官啓銀潢禀潤玉牒聫輝江夏之略而河間之賢朱虛之忠而東平之善麟千年而一角聲譽卓然鳳五色而九苞文華燦若信振振之公子為蹇蹇之王臣古儷府卷三
