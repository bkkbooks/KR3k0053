body:
  text: 古儷府卷八明王志慶編樂部總載唐劉公輿太常觀四夷樂賦於是鞮鞻掌其方位太常總其樂器列在天庭陳其鼓吹僸佅兜離風旋鳥翅其舞也無進旅退旅之容其音也非皎如繹如之義狄鞮騁能扶婁效智既夷樂之具陳彰帝德之廣被周存太常新復樂懸冬日薦之圜丘賦於是繩五元以應氣考八能而術全侈弇不興鳬氏之規惟妙上下合度磬師之法可傳爰設業以設簴備宫懸與宿懸爾其金石具陳鞉鼓間出和其戛擊節以徐疾五色不亂以成文八風不姦而從律大章彰之已合陶唐之代韶盡美矣不惟有虞之日撞黃鍾而角動扣太蔟而徴流大不踰宫而清濁迭和細不過羽而終始相酬是以六變而天神可禮九成而帝德惟休高郢吳公子聽樂賦時則崇牙對望猛簴相向捶鐘擊鼓乍陵厲而清壯鳴磬戛絃又發越而寥亮八音宣六律暢馬彌髦而仰秣魚竦鱗而躍浪信可以察邦國政教之盛衰見造化隂陽之情狀及夫曲已終奏斯闋言之者莫隱觀之者咸恱足使夔曠心沮牙期思絶邵軫雲韶樂賦乃翌日出雲韶而舞之徒觀其降輦路臨廣場曵羅裙之嫋嫋鳴玉佩之鏘鏘始逶迤而並進終婉轉而成行於是合以絃匏從之磬管昭敬意于廉直本喜心之嘽緩克和四夷應春候而角調取象八風如舞行之綴短霓裳綵鬭雲髻花垂清歌互舉玉步徐移俯仰有節周旋中規將導志以變轉幾成文于合離爾其美目流盼輕姿聳峙或少進而赴商俄善來而應徴貫魚初度驚鴻乍起容裔自得蹁躚未已褧衣屢更新態不窮忽舉袖而縈紫復回身而拖紅及夫繁音九變曲度將終神人以和天地攸同立五常之行移四海之風然後樂師告罷退之惟宫李子卿功成作樂賦貞觀草創已模五莖六英開元增修更叶黃鍾大吕命夔典事大制宫懸鳴絲則文動奏金則武宣羽毛含其春露干戚耀其秋天慶雲既同于舜日大風無異于漢年于是八音具舉六樂斯備工無奪倫守不假器伏羲之琴瑟有序女媧之笙簧畢萃乘逸韻于伯牙得遺音于師摰窮搏拊之深術盡戛擊之幽致動角則寒谷花明叩商則春林葉墜聲無誤曲周郎之顧何施調有雅音季子之聽應異初舞而魚躍龍騰終曲而鶴翔鳯至誠可以克諧神人交暢天地者矣蔣至洞庭張樂賦聆黃帝之遺音淡乎至察天非私覆稱其德以無三國有玄風應其方以宣八所以合德樞之幽鍵率至人之大戛非剽之以耳寧聽之以心風師拊石雲將摐金棄園客之絲彈為鶴舞辭羌人之竹擫以龍吟雖不擊而不考或習習而愔愔回日月之運行會鬼神之柔克凄清廣莫之野蔓衍華胥之國奔夷貊于蟠木之東聳鱗翰于幽陵之北和容逺被休氣充塞邦用榮懷人之克諧何以鼓靈鼗之坎坎撞猛簴之喈喈吕溫樂出虛賦聖人取象于物觀民以風闢嗜欲之由塞決形神之未通欲使和氣潛作玄關暗空與吹萬而皆唱起生三而盡同自我及人託物于未分之表蟠天極地開機于方寸之中于是淡以無倪留而不滯有非象之象生無際之際是故實其想而道升窒其空而聲蔽洞乎內而笙竽作刳其中而琴瑟製波騰恱豫風行于有道之年𣲖别商宫雷動于無為之世杳杳徐徐周流六虛信闐爾于始寂乃譁然而戒初鏗鏘于百姓之心於斯已矣鼓舞于一人之德知彼何如是則垂其仁有其實樂因之祖述六其形實其質聲因之洞出理在無二情歸得一塞雲谷而響絶疏天籟而音逸未隨于物絪縕乎七政八風忽變其和剖判于五聲六律由是遷為草木散作笙鏞羣分自此而焱起九奏因之而景從道薄風醨莫究簫韶之本聲銷韻息空傳干戚之容今則素扆垂休清懸繼響平心已立于皇極率舞猶虛于睿想如是則薰然泄泄將生于象罔梁王暕觀樂應詔詩趙瑟含清音秦筝凝逸響參差陳九夏依遲紛四上從風繞金梁含雲映珠網遞奏豈二八繁絃非一兩幸叨東郭吹厠陪南風賞忘味信鏗鏘餐和終俯仰輕塵已飛散逰魚亦翻蕩恩光實難遇詠言寧易放隋何妥奉敕于太常寺修正古樂詩大樂遺鐘鼓至樂貴忘情俗久淳和變年深禮教生嶰谷調孤管崙山學鳯鳴浮雲成舞曲白雪作歌名聞詩六義辨觀漏八風平肅穆皇威暢淪漣河水清鈞天動絲竹聒地響錞鉦盡美兼韶濩威德總咸英寥亮鳬鐘徹飄揚翟羽輕小臣屬千載時幸預簮纓行欣負蒼璧衢壇聽九成何妥樂部曹觀樂詩東海餘風大陶唐遺思深何如觀遍舞奏鼓間樅金清管調絲竹朱絃韻雅琴八行陳樹羽六德審知音至道兼韶濩充庭總韎任高天度流火落日廣城隂百神諧景福萬國仰君臨大樂非鐘鼓且用戒民心許善心於太常寺聽陳國蔡子元所教正聲樂詩維陽盛禮樂治定昔君臨充庭觀樹羽上帝仰摐金既因鐘石變將隨河海沈湛露廢還序承風絶復尋衮章無舊迹韶夏有餘音澤竭英莖散人遺憂思深悲來未減瑟淚下正聞琴詎似文侯睡聊同微子吟鍾奏殊南北商聲異古今獨有延陵聽應知亡國音北齊馬元熙日晚彈琴詩上客敞前扉鳴琴對晚暉掩抑歌張女凄清奏楚妃稍視紅塵落漸覺白雲飛新聲獨見賞莫恨知音稀唐吕炅貢舉人謁先師聞雅樂詩禮聖來羣彥觀光在此時聞歌音乍逺合樂和還遲調朗能偕竹聲微又契絲輕泠流簨簴繚繞動纓緌九變將隨節三終必盡儀國風由是正王化自雍熙陸贄曉過南宫聞太常清樂詩南宫聞古樂拂曙聽初驚煙靄遙迷處絲桐暗辨名節隨新律改聲帶緒風輕合雅將移俗同和自感情逺音兼曉漏餘響過春城九奏明初日寥寥天地清周庾信賀新樂表天地順動則雷出為豫聖人功成則風行有節故六德在咸池之宫山谷可調八風入承雲之奏人神不雜吾太祖文皇帝體國經野設官分職變魏作周移風正雅衣裳而朝萬國圭璧而會諸侯至如經綸圗籍校讐煙燼樂正無缺章秩宗無廢典豈但商頌十篇得諸太師之室虞書五禮取于恭王之宫伏惟陛下以下武嗣興中陽繼業運日月之明動淵泉之慮律厯著微無煩于太史隂陽晷度躬定于天官故得參考八音研精六代封晉魏為二王序殷周為三恪雖復朱干玉戚尚識典刑素韍纁裳猶因雄據未若山雲特起八卦成形鳯凰于飛九州觀德改金奏于八列合天元于六舞聲含擊石更入登歌調起初鍾還參玉管足以感天地而通神明康帝德而光玄象昔者齋居玄扈為曲在于雲門師渡盟津習舞歸于山立遂乃包括三名克諧一代作者之謂聖天之所啓乎豈唯路鼓靈鼗空桑孤竹廣矣大矣輪焉奐焉是知零陵孝廉空傳玉管始平太守虛稱銅尺臣等並與鈞天同觀張樂軒墀𢎞敞欄檻眺聽崇牙業業猛簴趪趪翠鳯揚旌靈鼉樹鼓杳冥雲霧蕩薄丘陵醴泉與甘露同飛赤雁與斑麟並下聘魯請觀自當見其盛德適齊忘味定是知其盡美淵魚聽曲尚得聳鱗櫪馬聞絃猶能仰秣臣等誠愧知音敢忘説豫若使詳其音律是所邈然但能記其鏗鏘於茲為幸唐王維賀古樂器表臣聞隂陽不測之謂神變化無方之謂聖唯神與聖感而遂通伏惟開元天寶聖文神武應道皇帝陛下居皇建之極中得混成之大道奉先天之聖祖玄化協于無為育率土之羣生至仁侔于隂隲然猶精意不倦聖祀逾崇遍禮羣仙思祐九服故得龎眉皓髮遙同入昴之人真訣玄言來告馭風之客棲身七曜以俟唐堯藏樂九疑不傳虞舜留之石室思獻玉墀憑野豕以呈形表洞仙之屬意且神物思變古亦有之龍躍平津實為寶劍鳬飛葉縣空餘素履器非上品人才下仙猶能積誠聿修神變浚若况殊庭致貺天老效祥願授至尊以享上帝亦既考擊動諧律吕韶濩慙其九奏雲咸失其八音翠鳯入于洞簫殊非雅韻朱鷺傳于鼗鼓敢比仙聲天地同和神人降福無窮之夀永撫寶圖無疆之休以康庶績實由至德斯感大道玄通神人親告于休徴靈仙不祕其空樂稽之古昔實未見聞樂部律唐王起律吕相生賦原夫制自伶倫迹于嶰谷始叶音于靈鳯終制器于截竹其名可紀則一暑而一寒其數可陳則隂六而陽六所以均我節物而周乎倚伏借如黃鍾建子以為本林鍾建未以為君動夷則而葉墜應姑洗而草薰霜雪因之以罔忒禽鳥候之而必聞雖覆載之莫窮而飛灰可揣謂隂陽之不測而寸管斯分故王者厯象為務職司是朂奉之以布令法之以成俗肅殺初佐于金風絪縕竟調于玉燭動植無擾含靈斯足莫不因律吕之相生濟仁夀之大欲既而同其法度節其疾徐既環周之無極亦鱗次而用諸故能欽月令之不爽布嵗和之有餘八風既從兮惠化爰被十旬不散兮休徴可書伊上瑞之臨汝實疇人之起豫則律不作無以叶五音之術吕不助無以成萬物之實洞于精微生于隂隲在孕育以咸暢處金石而無失則吹于寒谷不惟鄒子之方叶於樂府奚獨延年之律闕黃鍾宫為律本賦克諧韶濩唯子野以能知自得厚均匪伶倫而莫究故洪纎溥暢上下無頗騰葭灰而漸散映緹幕以方多初感于人復京房之姓氏終均于地成燕谷之陽和俾玉燭以調均與璇璣而錯綜於以宣于四序于以貞乎三統雄鳯鳴而雌鳯應蓋皆類此商為臣而徴為事未足方斯為律之本兮既如彼為天之統兮又如此明廷樂協寧俟于李延年堂上聲撝豈慙于夏后氏闕黃鍾管賦黃帝稽六氣正三光頒命于伶倫之職伐竹于嶰谷之鄉創管籥于分寸審制度于毫芒為十二之首律道初九之潛陽俟青陸之功微而可紀察黃鍾之氣暗然而彰所以定位于初道生于一將啓四分之厯潛運三重之室取厚竅而均者當分至而藏密統緹幔以依辰布葭灰以候律經天順地察晷度而有常隂伏陽回知萌芽而溥出超土圭之至理得銅渾之妙術一氣潛應定立均于數源七曜旋行酌至神于物極由是平之以六紀之惟三仰經綸之祕奧終視聽之所覃單穆不獨稱其美周景抑亦懷其慙故以鳯為名也于盡善而稱未以律為候也實用之而不既裴元律中應鍾詩律窮方數寸室暗在三重伶管灰先動秦正節已逢商聲辭玉笛羽調入金鐘密葉翻霜彩輕氷斂水容望鴻南去絶迎氣北來濃願託無凋性寒林自比松周庾信為晉陽公進玉律稱尺斗升表臣聞三才既立君臣之道已陳六位時成禮樂之功斯正故以叶和日月測度隂陽恱豫兆民儀刑萬國者也伏見敕旨刋正音律平章厯象奏黃鍾而歌大吕變孤竹而舞雲門莫不器取踈通聲從安樂四分既明三微是定是以聞鐘于洛浦即辨聲乖聽鐸于邯鄲先知響隕二分二至行于司厯之官九變九成被于和樂之職足以動天地感鬼神化被風俗平分寒暑豈直嘯吟溪谷回翔鸞鳯而已哉是知零陵廟前徒尋舜管始平城下空論周尺臣聞上制其禮下習其儀君定其法臣行其事謹造玉律云云所冀節移隂管毋勞河內之灰氣動陽鍾不待金門之竹而琬琰事輕般倕慮淺不足展采成均增耀度量王褒上新定鐘表周發聽聲候春冬之生殺師曠吹律知晉楚之衰亡晉書律厯志聖人觀四時之變刻玉紀其盈虛察五行之聲鑄金均其清濁所以遂八風而宣九德和大樂而成政道然金質從革侈弇無方竹體圎虛修短利制是以神瞽作律用寫鍾聲乃紀之以三平之以六成于十二天之道也隋書律志昔者淳古葦籥創觀人籟之源女媧笙簧仍昭鳯律之首後聖廣業稽古彌崇伶倫含少乃擅比竹之工虞舜昭華方傳刻玉之美是以書稱叶時月正日同律度量衡又曰余欲聞六律五聲八音七始訓以出納五言此皆候金常而列管憑璿璣以運鈞統三極之元紀七衡之響可以作樂崇德殷薦上帝七衡六間見援神契劉貺太樂令壁記周世旋宫因孝孫而再設京房灰管遇毛爽而重彰漢章和世實用旋宫漢世羣儒備言其義牛𢎞祖孝孫所由凖的也杜夔漢世之樂郎不識旋宫之義荀勉晉朝之博識莫知古律之則厯動而右移律動而左轉律以厯合氣以錯行金奏隨律而變宫以宣地靈登歌與厯而改調以應天氣歌奏相命所以合天地之情也玉海周顯德六年正月詔王朴考正雅樂朴依京房為律凖至景祐元年九月帝親臨視宋祁為之贊曰有周有臣嗣古成器絃寫琯音柱分律位俾授攸司謹傳來世上聖稽古規庭閲視嘉御正聲親銘寶字奎鈎奮芒河龍獻勢樂府增崇乾華俯賁用叶咸韶永和天地蔡氏曰晉氏而下多求之金石梁隋以來又參之秬黍下至王朴専恃纍黍而金石亦不復考矣金門浮竹玉尺調鍾河內之灰金門之竹冬至陽氣應則樂均清景長極黃鍾通土炭輕而衡仰夏至隂氣應則樂均濁景短極蕤賓通土炭重而衡低樂部歌晉袁山松歌賦朱唇不啓皓齒不離清氣獨轉妍弄潛移或似停而不留或如疾而不馳唐謝偃聽歌賦于時日下梧宫隂清竹殿羣雲始落光風初扇餘霞未斂殘虹猶見玉輦既陳蘭肴乃薦登高閣以騁目臨曲池而逰眄于是徴趙女命齊倡動瓊珮出蘭房橫寶叉而曜首覩鉛華而飾粧低翠蛾而斂色睇橫波而流光聲欲抽而含態氣未理而騰芳乍綿連以爛漫時頓挫而抑揚始析宫而合徴終分角而和商掩餘姿于雕扇散輕塵于畫梁若夫振幽蘭飛激楚俯仰豔逸顧盼容與故其繁會也類春禽振響而流變其微引也若秋蟬輕吟而曵緒似將絶而更連疑欲止而復舉短不可續長不可去延促合度舒縱有所聽之者慮蕩而憂忘聞之者意恱而情抒閻伯璵歌賦驗謳歌于樂府戒伶人以迭唱隨轉意合難為形狀始趨曲以熙熙終沿風以揚揚繚繞容與逶迤超暢函五聲之參差極六律之清壯浮而不蕩聚而不盈比擊鼓以作氣尋鳴笛以遣聲亘簫笳之易響亂楚漢之疑兵或引商刻角或潰渭通涇思彈劍于逆旅念採菱于江汀于是載賡載揚頽思覆句引韻下散沿源上遡若寒雲凝于沙漠秋風起于燕路情慷慨而為霜氣絪緼而掩露啓子均洛北之曲泉客理淮南之調蹈迹載德流言居要九辨勤于水土二南分于周召寶鼎見于汾隂天馬來于荒徼省周詩于魯䇿欽漢風于沛鄉制頌創雅漂齊流商瞽統樂教士符人康展來蘇于日域諧擊壤于皇唐附威儀之濟濟和金石之鏘鏘白雲互進緑水激揚聊以永日歌而無荒沈朗霓裳羽衣曲賦假宫商之具舉成曲度之妙絶變虛徐之歌態始訝遏雲振飄颻之舞容忽驚回雪既應絃而合雅亦投袂而赴節已而樂自宸慮備于太常首瓊殿之法曲改梨園之樂章配八佾以稱美旌九功而無荒盡文物之全盛致衆庶之歡康闕霓裳羽衣曲賦霓裳綽約兮羽衣蹁躚高舞妙曲兮似于羣仙長袖若緩而若急雅音或斷而或連想奏禁城之裏如聞玉皇之前迎拍動容縹眇而羅衣曵霧含霜吐曲響亮而德音徹天止有餘態動無遺妍金石鏗鏘而不雜絲竹要妙而相續舞隨節以袖急歌和氣而韻長退若遊龍之乍婉進如驚鴻之欲翔陳嘏霓裳羽衣曲賦爾其絳節回互霞袂飄揚或眄盼以不動或輕盈而欲翔八風韻肅清音思長引洞雲于丹墀之下颯天風於紫殿之旁懿乎樂洽人和曲含仙意雜絃管之繁節淡君臣之玄思清凄滿聽無非沖漠之音颯沓盈庭盡是雲霄之事闕歌響遏行雲賦息直氣以足踵激清聲于匏墀疑作瓠犀四暢既交五聲大戛以咽喉為管聲以唇吻為椌楬氣調萬象口運四時奏羽商而寒光冽冽動角徴而春光熙熙聲欲斷而復續若貫珠之纍纍元稹善歌如貫珠賦悠揚緑水訝合浦之同歸繚繞青霄環五星以一氣望明月而宛轉感潛蛟之歔欷美清泠而發越憶輝光之璀璨始終無異細大靡殊中規矩而圎折成條貫以縈紆似是而非賦湛露則方驚綴網有聲無實歌芳樹而空想垂珠梁簡文帝江南行桂楫曉應旋歷岸扣輕舷紫荷釣鯉魚銀筐插短蓮人歸浦已暗那得久回船陽春路時使家人度桂中水上春併歸長揚拂地桃花飛清風吹人光照衣景將夕且擲黃金留上客梁栁惲江南行汀洲採白蘋日落江南春洞庭有歸客瀟湘逢故人故人久不還春華復應晚不道新知樂只言行路逺唐李商隱聞歌詩斂笑凝眸意欲歌高雲不動碧嵯峨銅臺罷望歸何處玉輦忘還事幾多青冢路邊南鴈盡細腰宫裏北人過此聲腸斷非令日香灺燈光奈爾何薛能贈歌者詩一字新聲一顆珠囀喉疑是擊珊瑚聽時坐部音中有唱後瓔花葉裏無漢浦蔑聞虛解珮臨卭焉用枉當壚誰人得向青樓宿便是仙郎不是虛梁沈約謝齊竟陵王宋永明樂歌啓鳯綵鸞章霞鮮錦縟覿寶河宗未必比麗觀樂帝所逺有慙德雖日月在天理絶稱詠而徘徊光景不能自息魏繁欽與太子箋都尉薛訪車子年始十四能轉喉引聲與笳同音乃知天壤之所生誠有自然之妙物潛氣內轉哀音外激大不抗越細不幽散聲悲奮笳曲美常均及與黃門鼓吹溫胡迭唱迭和喉所發音無不響應遺聲抑揚不可勝窮暨其清激悲吟雜以怨慕詠北狄之遐征奏胡馬之長思是時涼風拂袵背山臨溪莫不泫泣隕涕悲懷慷慨竊惟聖體兼好愛竒是以先白魏文帝答披書歡笑不能自勝竒才妙技何其善也頃守土孫世有女曰瑣年始九嵗夢與神通寐而悲吟哀聲激切涉歷六載于今十五近者督將具以狀聞是日博延衆賢遂奏名倡曲極數彈歡情未逞乃令從官引內世女須臾而至厥狀甚美素顔玄髮皓齒丹唇詳而問之云善歌舞于是提袂徐進揚蛾微眺芳聲清激逸足橫集然後循容節粧改曲變度斯可謂聲協鐘石氣應風律令之妙舞莫巧于絳樹清歌莫善于宋臘豈能上亂靈祇下變庶物漂悠風雲橫厲無方若斯也哉固非車子喉轉長吟所能逮也吾練色知聲雅應此選謹卜良日納之間房陳琳答東阿王箋刜鐘無聲應機立斷此乃天然異稟非鑽仰者所庶幾也音義既逺清辭妙句焱絶煥炳譬猶飛流星超山越海龍驥所不敢追况于駑馬可得齊足夫聽白雪之音觀緑水之節然後東野巴人蚩鄙益著載歡載笑欲罷不能謹韞櫝玩耽以為吟頌樂部舞漢張衡西京賦祕舞更奏妙材騁伎妖蠱豔夫夏姬美聲暢于虞氏始徐進而羸形似不任乎羅綺嚼清商而却轉增嬋娟以跐豸紛縱體而迅赴若驚鶴之羣羆振朱屣于盤樽奮長袖之颯纚要紹修態麗服揚菁眳藐流眄一顧傾城展季桑門誰能不營張衡舞賦抗修袖以翳面兮展清聲而長歌歌曰驚雄逝兮孤雌翔臨歸風兮思故鄉搦纎腰而互折嬛傾倚兮低昂增芙蓉之紅花兮光的皪以發揚騰􅀈目以顧盼眸爛爛以流光連翩絡繹乍續乍絶裾似飛燕袖如回雪于是粉黛施兮玉質粲珠簮挺兮緇髮亂然後整筓攬髮被纎垂縈同服駢奏合體齊聲進退無差若影追形傅毅舞賦其始興也若俯若仰若來若往雍容惆悵不可為象其少進也若翔若行若竦若傾兀動赴度指顧應聲羅衣從風長袖交橫駱驛飛散颯沓合并翩􅗁燕舉拉㧺鵠驚綽約間靡機迅體輕姿絶倫之妙態懷慤素之潔清修儀操以顯志兮獨馳思乎杳冥在山峨峨在水湯湯與志遷化容不虛生明詩表指嘳息激昻氣若浮雲志如秋霜觀者增嘆諸工莫當梁簡文帝舞賦不遲不疾若輕若重盼鼓微吟回巾自擁髮亂難持簮低易捧牽情恃恩懷嬌妬寵唐謝偃觀舞賦羅薦周設黼帳高舒霧凝珠網風清玉除煙浮暉子緹幕燭籠光于綺疏爾乃咀清哇揚激徴金石奏絲桐理竒調間發新聲互起促宴洽而忘疲歡情暢而未已于是燕餘齊列絳樹分行曵綃裾兮拖瑤珮簮羽叉兮珥鳴璫擢纎腰之孤立若卷旌之未揚紆修袂而將舉似驚鴻之欲翔退不失倫進不踰曲流而不滯急而不促絃無差袖聲必應足香散飛巾光流轉玉若乃巴姬並進鄭女俱前對席齊舉分庭共旋乍差池以燕接又颯沓而鳬連止有餘態動無遺妍似兩艷之同發類雙花之偶然進止合度俯仰如一節緩則顧遲唱逺則回疾殊姿異制不可殫悉若夫金翠的皪緗綺參差方趨應矩圎步中規飛鉛雪落頽鬢雲垂舒類飛霞曵清漢屈若垂栁縈華池既而曲變終雅奏闋清角止流商絶頓華履以自持整文袿而佇節始綽約而回步乃遷延而就列闕平列舞賦掩長袖以徐吟頓纎腰而起舞低鳯鬟于綺席聽鸞歌于促柱燭若蓉蕖折波而湧出婉若鴻鵠凌雲而欲舉其為體也似流風回雪而相應其為勢也似野鶴山雞而對鏡總衆麗以為姿集羣眸而動詠觀其躡影赴節體若摧折將欲來而不進既似去而復輟回身若春林之動條舉袂若寒庭之流雪闕開元字舞賦八佾之羽儀繁會七盤之綺袖繽紛雷轉風旋應鼉鼓以赴節鸞回鶴舉循鳥迹以成文周瑜之顧不作蒼頡之字爰分煙霏桃李對玉顔而共春日照晴霓間羅衣而一色錢衆仲舞中成八卦賦赴度應聲倐鳯轉而龍翥攢青拖紫粲霞駭而錦新翹遙兮比大章而未匹縹眇兮異鈞天之下陳闕國子舞賦天子斂賢才之地合禮樂之府命宗伯因四時之宜教胄子以六代之舞惟德是務以和為主翕左手以執籥就前軒以樹羽方將發揮五禮張皇六詩忽投步而赴節乍整容而自持雖鏘鏘與濟濟必庸庸以祇祇及夫鐘鼓鏗訇絲竹宴衍音容間起干旄迭見屹然山立歘然風從觀者如堵曷不肅雍實經國之洪範蓋訓人于中庸文德溫恭則羽籥在歸根之時武事發揚則干戈居蘖萌之後夫手之舞之有小有大成童舞象弱冠舞夏並允浹于生靈良克諧于風雅莫善于樂執而勿捨聖人若斯須而去身則孰垂拱于天下盧肇湖南觀雙柘枝舞賦乃整金蟬收玉燕襲舞衫突舞辨珠彩熒煌鈐光炫轉外寶帶以連玉中丹裾以疉蒨則有鞶鑑逶迤瓊瑰四垂鞾瑞錦以雲匝袍蹙金而鴈歌疑作欹再撫華裙巧襞修袂將勻玉顔若抗瓊睇懷要妙以盈心望深思而滿背突如其來翼爾而進每當節而必改乍慘舒而復振驚顧兮若嚴進退兮若慎或迎兮如流即避兮如吝傍睨兮如慵俯視兮如引風裊兮弱栁煙羃兮春松縹眇兮翔風婉轉兮遊龍相邇兮如借相逺兮如謝忽抗足而相跐復和容而若射勢雖窘于趨速態終守乎間暇飛飇忽旋鸞鶴聨翩撼帝子之瑤珮觸仙池之玉蓮擁驚波與急雪捲祥雲及瑞煙屹而立若雙鸞之窺石鏡專而望似孤雲之駐蓬萊輕攢翠蛾稍拂香汗暫爾安逸復騁陵亂抽軋軋于蕙心耀纎纎之玉腕躊躇曠望若戀虞以南馳俯僂回旋非為劉而左袒拾華袵以雙舉露輕裾之一半花灼灼鼓逄逄帽瑩隨蛇熠熠浥蘭之露裾翻莊蝶翩翩獵蕙之風來復來兮飛燕去復去兮驚鴻善睞睢盱偃師之招周妓輕軀動蕩蔡姬之讋齊公喬潭裴將軍劔舞賦合桑林之容以盡其意照蓮花之彩以宣其利翕然鷹揚翼爾龍驤鋒隨指顧鍔應回翔爾其陵厲清浮絢練敻絶青天兮何倚白雲兮可決覩二龍之追飛見七星之明滅雜朱干之逸勢應金奏之繁節至乃天輪宛轉貫索回環光沖融乎其外氣混合乎其間若湧雪濤如飛雲山萬夫為之雨汗八佾為之慙顔梁簡文帝舞詩二首戚里多妖麗重娉夢燕餘逐節工新舞嬌態似凌虛納花承褶􅀈垂翠逐璫舒扇開衫影亂巾度履行疏徒勞交甫憶自有専城居可憐二八初逐節似飛鴻懸勝河陽妓暗與淮南同入行看履進轉面望鬟空腕動昭華玉衫隨如意風上客何須起啼烏曲未終王訓舞詩新粧本絶世妙舞亦如仙傾腰逐韻管斂色聽張絃袖輕風易入叉重步難前笑態千金動衣香十里傳持此雙飛燕定當誰可憐楊皎舞詩紅顔自燕趙妙妓邁陽阿就行齊逐唱赴節暗相和折腰送餘曲斂袖待新歌嚬容生翠羽曼睇出橫波雖稱趙飛燕比此詎成多陳徐陵舞詩十五屬平陽因來入建章主家能教舞城中巧畫粧低鬟向綺席舉袖拂花黃燭送窗邊影衫傳扣裏香當筵好留客故作舞衣長周庾信舞詩洞房花燭明燕餘雙舞輕頓履隨疏節低鬟逐上聲伴轉行初進衫飄曲未成鸞回鏡欲滿鶴顧市應傾已曾天上學詎見地中生魏曹植七啓亦將有才人妙技遺世超俗揚北里之流聲紹陽阿之妙曲爾乃御文軒臨彤庭琴瑟交彈左篪右笙然後姣人乃披文縠之華袿振輕綺之飄颻戴金搖之熠爍揚翠羽之雙翹翻爾鴻翥濈然鳬沒縱輕軀以迅赴影追形而不逮為歡未泄白日西頽散樂變飾微步中閨玄眉弛兮鉛華落收亂髮兮拂蘭澤紅顔宜笑睇盼流光時與吾子攜手同行踐飛除即間房華燭爛羅幬張動朱唇發清商九秋之夕為歡未央晉成公綏七唱奮長袖以飇回擢纎腰以煙起鎮抗首而委蛇颯頓足而立峙紛龍轉而鳯翔忽若倒而中止樂部樂器唐敬括觀樂器賦逺而瞻則金石絲竹雜之而殊狀俯而察則東西南北懸之而異方乃既埏埴為之塤篪貌有古象制無新規其氣混其音吹此土之器也及夫汶陽之篠入用曲沃之匏見娛爰裁爰截為笙為竽其氣散其音吁此匏之器也收犬羊之皮取虎豹之鞟為鼗為路是模是度其氣勃其音博此革之器也嶧陽之桐孤生荆山之玉秀出是鍊是斫為琴為瑟其氣清其音密此木之器也皆能協六律暢八聲合天地交神明調風雨以順序布隂陽以元亨既粲然以盈目蓋難得而縷名達奚珣太常觀樂器賦國之盛事殫所未識雅象純殷藂光翕赩樹羽紛纚崇牙崱屴玉管清通瑤琴古色朱絲疏越之制雷鼓靈鼉之飾清笳閟列于軍容畫角融怡于武力故能頓應朄張柷敔猛獸赫怒而擎鐘金人嵌巖以負簴鸞笙在目疑倣佛于周王鳯簫可吹紛肸蠁于嬴女况復天球曜逸金鋭疑蒙鴻大籥清警虛籟生風怒齊竽之濫吹壯秦缶之爭雄稽爾既倬猗歟載豐匪天子之明德孰以成其衆美總四夷而徴妙越六代而高視思其鏗鍠嘈囋清暢逶迤五色成文而不亂八風從律而不虧窮髙逺而測深厚故乃盡美而在斯已上樂器總漢蔡雍琴賦然後哀聲既發祕弄乃開左手抑揚右手徘徊指掌反覆抑按藏摧于是繁絃既抑雅韻乃揚仲尼思歸鹿鳴三章梁父悲吟周公越裳青雀西飛别鶴東翔飲馬長城楚曲明光楚姬遺嘆雞鳴高桑走獸率舞飛鳥下翔感激兹歌一低一昂晉嵇康琴賦乃使離子督墨匠石奮斤夔襄薦法班倕騁神鎪會裛厠朗密調均華繪雕琢布藻垂文於時也金石寢聲匏竹屏氣王豹輟謳狄牙喪味天吳踴躍于重淵王喬披雲而下墜舞鸑鷟于庭階遊女飄焉而來萃若乃高軒飛觀廣厦間房冬夜肅清朗月垂光新衣翠粲纓徽流芳于是器冷絃調心間手敏觸􅔊如志唯意所擬初涉渌水中奏清徴拊絃安歌新聲代起曲引向闌衆音將歇改韻易調竒弄乃發或徘徊顧慕擁鬱抑按盤桓育養從容祕玩牢落凌厲布濩半散英聲發越采采粲粲穆溫柔以怡懌婉順敘而委蛇或乘險投會邀隙趨危嚶若離鵾鳴清池翼若遊鴻翔層崕或摟􅔊擽捋縹繚潎冽逺而聽之若鸞鳯和鳴戲雲中迫而察之若衆葩敷榮曜春風唐王起焦桐入聽賦當其大匠未收樵人所利圭葉零落孫枝殘瘁以薪見迷以竈求媚聲連而丹熖乍飛響送而紅星忽墜聞之者徒為木之稿火之熾殊不知八音之珍佇五絃之至于是收質焰焰求音泠泠撲滅其色鱗皴其形被之以絃佇水流而山立鼓之為操必鶴舞而魚聽張隨無絃琴賦陶先生解印彭澤抗迹廬阜不矯性于人代笑遺名于身後適性者以琴怡神者以酒酒兮無量琴也無絃粲星徽于日下陳鳯啄一作軫于風前振素手以揮拍循良質而周旋幽蘭無聲媚庭際之芬馥淥水不奏流舍後之潺湲以為心和即樂暢性靜則音全和由中出靜非外傳若窮樂于求和即樂流而和喪扣音以徴靜則音溺而靜捐是以撫空器而意得遺繁絃而道宣豈必誘玄鵠以率舞驚赤龍而躍泉者哉仲子陵五色琴絃賦召姑洗則草木潛發歌黃鍾而川池異沍泉魚瀺灂以躍鱗雲鶴婆娑而拂羽林慮山人鍾期聽伯牙鼓琴賦琴者所以納正禁邪弄者所以協情和性必藉其手敏亦假其心靜王太真鍾期聽琴賦空山之谷清澗之湄幽人倣佛絶粒茹芝憑高梧引長颸激楚窈窕流波逶迤陽阿布濩結緑參差高秋風冷逺浦霜滋素月滿繁星稀雅調間逸流風逺吹鍾期當日傾耳志之怡性愜靈中矩應規躊躇四顧侯其禕而曰聽商則知愁霖春零聞角乃覩韶華秋榮羽發則寒生朱夏徴來則暑移玄英陵厲翕忽消息竭盈君子悅懌導心和平斯實庖丁投刃而節應郢人運斤而風生者也髙張絶絃韻清調苦惝恍惻憾一龍一虎猛將之逐虜氷雪操蘭蕙薰嶷兮崇山動若寒雲烈士之諫君跂燕趙望江漢行路難杳無畔淋漓沸渭牢落泮渙逰子之悽斷夔襄愕眙昭曠咄咨北齊蕭慤聽琴詩洞門涼氣滿間館夕隂生絃隨流水急調雜秋風清掩抑朝飛弄凄斷夜啼聲至人齊物我持此恱髙情唐劉希夷琴詩隱士竹林隈英聲寶匣開風前緑綺弄月下白雲來淮海多為寶梁岷舊作臺子期如可聽山水響餘哀王昌齡琴詩孤桐祕虛鳴朴素傳幽真倣佛絃指外遂見初古人意逺風雪苦時來江上春高宴未終曲誰能辨經綸岑參秋夕聽羅山人彈三峽流泉詩皤皤岷山老抱琴鬢蒼然衫袖拂玉徽為彈三峽泉此曲彈未半高堂如空山石林何颼飀忽在窗户間纎指弄嗚咽清絲激潺湲演漾怨楚雲虛徐韻秋煙疑兼陽臺雨似雜巫山猿幽引鬼神聽靜令耳目便楚客腸欲斷湘妃泪斑斑誰裁青桐枝亘以朱絲絃能含古人曲遞與今人傳知音難再逢惜君方老年曲終月已落惆悵東齋眠司空曙同張參軍喜李尚書寄新琴詩新琴傳鳳凰晴景稱髙張白玉連徽淨朱絃擊爪長輕埃隨拂拭新籟滿鏗鏘暗想山泉合如親蘭蕙芳正聲銷鄭衛古狀掩笙簧逺識賢人意清風願激揚晉張協七命寒山之桐出自太冥合黃鍾以吐幹據蒼岑而孤生晞三春之溢露遡九秋之鳴飇零雪灑其根霏霜封其條木既繁而未緑草未素而先凋構雲梯陟崢嶸剪蕤賓之陽柯剖大吕之隂莖營匠斫其朴伶倫均其聲器舉樂奏促調高張音朗號鐘韻清繞梁若乃龍火西頽暄氣初收飛霜迎節高風送秋羇旅懷土之徒流宕百罹之儔撫促柱則酸鼻揮危絃則淚流梁昭明太子七契製起玄修形踰緑綺晉嵇康琴贊惟彼雅器載璞靈山體其德真清和自然澡以春雪淡若洞泉溫乎其仁玉潤外鮮已上琴梁簡文帝筝賦全録江南之竹弄玉有鳴鳯之簫焉洞隂之石范女有逰仙之磬焉若夫排雲入漢之美含商觸徴之竒罷雍祠之麗響絶漢殿之容儀别有泗濱之梓聳幹孤峙負隂拂石停雪栖霜嶔崟岝崿玄嶺相望寄丹崕而茂采依青壁而懷芳奔電碭突而彌固嚴風掎拔而無傷途畏峰澀人羣罕至乃命夔班剪而成器隆殺得宜修短合思矩制端平雕鎪綺媚既而春桑已舒暄風暗曖丹荑成葉翠隂如黛佳人採掇動容生態值使君而有辭逢秋胡而不對里閭既返伏食蠶飢五色之縿雖亂八熟之緒方治異東垂之野繭非山經之漚絲于是制絃擬月設柱方時若夫鏗鏘奏曲溫潤初鳴或徘徊而蘊藉或慷慨而逢迎若將連而類絶乍欲緩而頻驚陸離抑按磊落縱橫竒調間發美態孤生若將往而自返似欲息而復征聲習習而流韻時怦怦而不竑如浮波之逺驚若麗樹之爭榮譬雲龍之無蒂如笙鳳之有情學離鵾之弄響擬翔鴛之妙聲朱絃在手擊重還輕爾其曲也雅俗兼施諧雲門與四變雜六列與咸池王讚既工阮賦亦竒曹后聽之而歡宴謝相聞之而涕垂至若登山望别之心臨流送歸之目隴葉夜黃關雲曉伏覩獨鴈之寒飛望交河之水縮聽鳴筝之弄響聞茲絃之一彈足使遊客戀國壯士衝冠若夫楚王怡蕩楊生娛志小國寡民督郵無事乃有燕餘麗妾方桃譬李本住南城經移東里納千金之重聘擅専房之宴私方美珥而不減擬甘一作投橘而無嗤聞削成于斜領照玉緻于鉛脂度玲瓏之曲閣出翡翠之香帷腕凝紗薄珮重行遲爾乃促筵命妓銜觴置酒耳熱眼花之娛千金萬年之夀白日蹉跎時淹樂久玩飛花之度窗看春風之入栁命麗人于玉席陳寶器于紈羅撫鳴筝而動曲譬輕薄之經過黛眉如掃曼睇成波情長響怨意滿聲多奏相思而不見吟夜月而怨歌笑素彈之未工疑秦宫之詎和若夫釣竿復發蛺蝶初揮動玉匣之餘怨鳴陽鳥之始飛逐東趨于鄭女和西舞于荆妃足使長廊之瓦虛墜梁上之塵染衣鱏魚逰而不沒白鶴至而忘歸于是乎餘音未盡新弄縈纒參差容與顧慕流連落橫叉于袖下斂垂衫于膝前乍含猜而移柱或斜倚而續絃照瓊環而俯捻度玉爪而徐牽見微嚬之有趣看巧笑之多妍抗長吟之靡曼雜新歌之可憐歌曰年年花色好足侍愛君傍影入著衣鏡裙含辟惡香鴛鴦七十二亂舞未成行故乃宋偉緑珠之好聲文君慎女之清角上掩面而不前言韜輝而恥學實獨立之麗人乃入神之佳樂唐張九齡聽筝詩端居正無緒那復發秦筝纎指傳新意繁絃起怨情悠揚思欲絶掩抑態還生豈是聲能感人心自不平白居易筝詩雲髻飄蕭緑花顔旖旎紅雙眸剪秋水十指剝春蔥楚艷為門閥秦聲是女功甲鳴銀玓瓅柱觸玉玲瓏猿苦啼嫌月鶯嬌語泥風移愁來手底送恨入絃中趙瑟情相似胡琴調不同慢彈回斷鴈急奏轉飛蓬霜珮鏘還委氷泉咽復通珠聨千拍碎刀截一聲終倚麗精神定矜能意態融歇時情不斷休去思無窮燈下清歌夜樽前白首翁且聽應得在老耳未多聾已上筝晉鈕滔母孫氏箜篌賦徵班輸之造器命伶倫而調律浮音穆以遐暢沈響幽而若絶樂操則寒條反榮哀曼則晨華朝滅邈漸離之清角超子野之白雪然思超梁甫願登華嶽路嶮悲秦道難怨蜀遺逸悼行邁之離秋風哀年時之速陵危柱以頡頏憑哀絃以躑躅于是數轉難測聲變無方或冉弱以飄沈或頓挫以抑揚或散角以放羽或攄徴以騁商曹毗箜篌賦嶧陽之桐植頴巖標清泉潤根女蘿被條爾乃楚班制器窮妙極巧龍身鳯形連翩窈窕纓以金采絡以翠藻其絃則烏號之絲用應所任體徑質朗虛置自吟已上箜篌晉傅玄琵琶賦素手紛其若飄兮逸響薄于高梁弱腕忽以競騁兮象驚電之絶光飛纎指以促柱兮創發越以哀傷時旃搦以劫蹇兮聲皎耀以激揚啓飛龍之祕引逞竒妙于清商哀聲內結沈氣外徹舒誕沈浮徊翔曲折孫該琵琶賦絃則岱谷檿絲篚貢天府伯竒執軛杞妻抽緒大不過宫細不過羽清朗緊徑絶而不茹伶人鼓焉景響豐硠操暢駱驛遊手風揚抑揚按捻拰搦摧藏于是酒酣日晚改為秦聲壯諒慷慨土風所生延年度曲六彈俱成絀邪存正疏密有程離而不散滿而不盈沈而不重浮而不輕綿駒遺謳岱宗梁父淮南廣陵郢都激楚每至曲終歌闋亂以衆契上下奔騖鹿奮猛厲波騰雨注飇飛電逝唐薛收琵琶賦爾其狀也龜腹鳯頸熊據龍旋戴曲履直破觚成員虛心內受徑質外宣磅礴象地穹窿法天候八風而運軸感四氣而鳴絃金華徘徊而月照玉柱的歷以星懸虞世南琵琶賦若夫巢木為金門之始轉蓬乃玉輅之先斯蓋前古之朴略而後代之精研是以鼉鼓質而罕見葦籥輕而莫傳笛不為于商律瑟見毁于繁絃尋斯樂之所始乃絃鼗之遺事強秦創其濫觴盛漢盡其深致爰有逹人演茲竒器集古今而定質擬神明而攄思慰逺嫁之羇情寬絶域之歸志既而班爾運能鈞繩將設求嘉木于五嶺取殊材于九折剖文梓而縱分割香檀而橫裂木瓜貞柘盤根錯節或錦散而花開或絲縈而緒結徒觀其為狀也則象形斗極殊姿巧製隨良朴之修短逐規模之巨細既異才而合體亦刻方而為鋭惟適道以從宜故無取乎凝滯若乃琢玉範金之巧雕文鏤采之竒上覆手以懸映下承絃而仰施帖則西域神獸南山瑞枝屈盤犀嶺回旋鳯池開寶掫一作撥以更運帶文綬而旁垂體備商角韻包宫羽橫却月于天漢靄回風于洛浦始聞絃之既調乃長弄之徐撫應緩步之疏節隨輕身之妙舞悲紫塞之昭君泣烏孫之公主季倫歡金谷之宴仲容暢竹林之聚至如七德昭備六軍凱旋諧戎麾而威逺合金奏而功宣詠燕山之已勒美瀚海之方鐫亦有飛梁邸逰楚館聞促柱之再調聽鳴絃之疏彈叶髙文而自逺飛羽觴之無算又如長河草緑髙樓月下入小苑而看花逰上蘭而藉野泛澄波而轉鷁息長松而繫馬臨清吹之揮絃與殊方而俱寫其竒趣則抑揚嘈囋聨綿斷續紆餘雙鵠之吟清壯三秦之曲望南山之遙翠見西江之始緑少年有長命之詞娼女有可憐之調願百齡兮眉夀重千金之巧笑逮乎嘉客既醉高宴將闌浮觴劇飲披襟極歡乃催絃而急調交酬獻之無端若以河而注海亦杯來而始彈蓋感物動神和心悅耳豈振木之為輩奚繞梁之足擬唐太宗琵琶詩半月無雙影金花有四時摧藏千里態掩抑幾重悲促節縈紅袖清音滿翠帷駛彈風響急緩曲釧聲遲空遺關隴恨因此代相思已上琵琶闕洞簫賦南國之紀兮江水深中嶻櫱兮天姥岑試一望兮見簫管之參差碧雲飄其正色白日出其重隂每含和以自守雖嵗寒其莫侵于是乃使夫匠人陵皛渺明幽窅攀重蘿閲豐篠截成枝之龍質擬銜花之鳯鳥作為洞簫其聲窈窕纎指敏手隨抑揚之虛滿曲折等分任吹噓而懿􅗍爾其為樂也則和羅稽詣而逸其為苦也則瀏漂冽清而悴或􅡲㟋以相從復淋漓而逺被有若層山抱空而晴燭巨海涵虛而夕涖是以君子聽之載其平粹已上簫晉潘嶽笙賦河汾之寶有曲沃之懸匏焉鄒魯之珍有汶陽之孤篠焉若乃綿蔓紛敷之麗浸潤靈液之滋隅隈夷險之勢禽鳥翔集之嬉固衆作者之所詳余可得而略之也徒觀其制器也則審洪纎面短長􅗇生簳裁熟簧設宫分羽經徴列商泄之反謐厭焉乃揚管攢羅而表列音要妙而含清各守一以司應統大魁以為笙基黃鍾以舉韻望儀鳯以擢形寫皇翼以插羽摹鸞音以厲聲如鳥斯企翾翾跂跂明珠在咮若銜若垂修檛內辟餘簫外逶駢田獵攦魻鰈參差于是乃有始泰終約前榮後悴激憤於今賤永懷乎故貴衆滿堂而飲酒獨向隅而掩淚援鳴笙而將吹先嗢噦以理氣初雍容以安暇中拂鬱以怫㥜終嵬峨以蹇諤又颯遝而繁沸罔浪孟以惆悵若欲絶而復肆懰檄糴以奔邀似將放而中匱若夫時陽初暖臨川送離酒酣徒擾樂闋日移疏客始闌主人微疲弛絃韜籥徹塤屏篪爾乃促中筵携友生解嚴顔擢幽情披黃苞以授甘傾縹瓷以酌醽光歧儼其階列雙鳯嘈以和鳴晉野悚而投琴况齊瑟與秦筝新聲變曲竒韻橫逸縈纒歌鼓網羅鐘律爛熠爚以放艷鬱蓬勃以氣出秋風詠于燕路天光重乎朝日大不踰宫細不過羽唱發章夏導揚韶武協和陳宋混一齊楚邇不逼而逺無携聲成文而節有敘彼政有失得而化以醇薄樂所以移風于善亦所以易俗于惡隋李百藥笙賦發繁絃于流徴動浮磬于清商舒披蓮于舞席散垂藻于歌牀獨仙吹之容裔將凌雲而抑揚見秦趙之音劣識巴渝之調下掩衆技而奪氣諒聲高而和寡歌狂會于楚謠詠承筐于周雅既駭聽于吳札亦留神于晉野婉婉鴻驚喈喈鳯鳴或萬殊而競響乍孤囀而飛聲清則混之而不濁濁則澄之而不清實當無而應有固虛受而徐盈舄奕多緒紛綸難狀抑之則徘徊綿密申之則散朗寥亮始掩斂以夷靡終優遊以怊悵隨流睇而煦愈應微嚬而悽愴挫玉簫之清管息瓊篁之虛唱落遺囀于梁間墜纎腰于掌上既而重門半掩髙宴將終飄餘音于霄漢遏嬌韻于房櫳逺而聽之若逰鴛翔鶴嘹唳飛空近而察之譬瓊枝玉樹響亮從風信絶俗之神解何變態之無窮已上笙楚宋玉笛賦余嘗觀于衡山之陽見竒篠異幹罕節間枝之叢生也其處磅磄千仞絶溪陵阜隆崛萬丈磐石雙起丹水涌其左醴泉流其右師曠將為陽春北鄙白雪之曲取其雄焉宋意將送荆卿于易水之上得其雌焉于是天旋少隂白日西靡命嚴春使午子延長頸奮玉指摛朱唇曜皓齒赬顔臻玉貌起吟清角追流徴歌伐檀號孤子後漢馬融長笛賦律吕既和哀聲五降曲終闋盡餘絃更興繁手纍發密節疉重上擬法于韶簫南籥中取度于白雪淥水下采制于延露巴人於時也綿駒吞聲伯牙毁絃瓠巴聑下挾反柱磬襄弛懸近世雙笛從羌起羌人伐竹未及已龍鳴水中不見已截竹吹之聲相似剡其上孔通洞之裁以當簻使易持京房君明識音律故本四孔加以一君明所加孔後出是謂商聲五音畢晉伏滔長笛賦雲禽為之婉翼潛鱏為之躍鱗潛一作泉傅縡笛賦貞雲翠節冒霜停雪江潭薦竿巴人所截五音是備六孔斯設殊響抑揚似出平陽曲凝高殿聲幽洞房既逐舞而回袖亦將歌而繞梁忽從弄而危短乍調吹而柔長唐鄭瀆吹笛樓賦當昔開元之時天下無事鴻恩不間于中土鑾駕常逰于北地姚公宋公之智略動必咨謀寧王薛王之忠貞出皆參侍西則秦京東則洛城八百里之歌鐘斷續五十年之寰海升平于是駐清蹕御丹楹執簫管而宸衷時一作暗悅臨曲欄而睿思俄生莫不湘絃罷彈泗磬休擊楚舞態止齊謳韻寂九天斂霧送芳景于瓊軒萬籟韜音讓嘉名于玉笛既運指而有規乃濡唇而是吹林巒兮倣佛如變寒暑兮須臾可移折楊栁之數聲鴈驚前渚落梅花之一曲鳥散芳枝自從弓劔有遺星霜頻度綺窗蕭索以將毁繡嶺連延而若故竟無六律繼當時紫府之清音空有一條是往日翠華之來路隋姚察詠笛詩作曲是佳人制名由巧匠鵾絃時莫並鳯管還相向隨歌響更發逐舞聲彌亮宛轉度雲窗逶迤出黼帳長隨畫堂裏承恩無所讓唐李嶠詠笛詩羌笛寫龍聲長吟入夜清關山孤月下來向隴頭鳴逐吹梅花落含春栁色驚行觀向子賦坐憶舊鄰情已上笛喬潭霜鐘賦豐山之峰巉嵒積翠之石森爽凌寒之松上無鳥飛下無人蹤深杳杳以靜謐有天然之古鐘兩欒神資九乳靈化寧失制于侈弇豈遺音于窕摦每簴器以自間常宿懸而不下動于耳而藏于心必高秋之良夜于是泬寥兮日暮而天皛蕭瑟兮霜落而風清爽氣無朕前來滿盈跳然出復鏗爾有聲信不擊而不考能大鳴而小鳴始則函胡擁鬱旋復充詘絀間若往若還徘徊其間爾其舒肆奔放長齊逺暢乍浮空以紆餘更觸物而瀏湸入林蕭蕭在水蕩蕩泛濫淺瀨聨綿疏篁夜鶴怨兮彌苦寒猿悲兮更長餘韻舂容隨風悠揚繞于洞庭浮于瀟湘梧楸紛以離披蒹葭颯其蒼蒼及夫夜已艾兮彌靜山無人兮月冷時肅肅而自凄復硠硠而虛警其動愈出其來甚徐合于元化逰于太虛轉逺而盡誰知所如聊獨立以傾聽恍若失其躊躇翟楚賢觀鑄鐘賦回祿用事兮烈氣激揚飛廉呈巧兮熾聲赫怒沸沸渭渭奪于日光霍穫禾火磷亂青熒蒼黃玄穹之星夜落焉可侔象赤城之霞朝起無以比方疑昆崘之飛爍吸晴天之太陽唐岑文本太極殿前鐘銘夫金之為德冠五材以稱珤鐘之為器諧八音而表節成物兼于軍國致用適于洪纎故習戎者用之以警衆司厯者俟之以考晨其由來也尚矣爾乃卭都作貢虞倕騁神六齊不忒四時合度大小允窕摦之中清濁得舒徐之和聲隨曉唱則貴賤有序響應漏盡則士庶有禁同夏后之喻義異周王之鮮闕加以博採故實無忘彛典肱股之績必紀爪牙之功是勒永貽懿範被之無疆吳少微唐北京崇福寺銅鐘銘序猛虎贔屓以奮翣長絙掣曵以縻􅀈蘇頲太清觀鐘銘序攫蹲獸而俯一作旁捧儼旋蟲而上扶號逺則傳聲希以節時環而載擊載考律應而不舒不疾西升路接韻閶闔之清風北斗城連含未央之夕漏李雍越州華嚴寺鐘銘序曽臺大起雕簴懸列鯨魚吒怒以震擊蒲牢跧曲以駭噭權德輿興唐觀新鐘銘序上士仁人展其助飛廉回祿理其具精乎六齊合以萬數以心齊以神遇槖地籟騰天光無害金無耗氣不窕不摦不石不播于是登簴在懸希聲殷然小大隨扣昏昕警衆周六虛而洞三界投九幽而清五苦已上鐘張仲素玉磬賦嗟至寶之朋契如截肪之曲成挺十德以為美諧八音而作程韞櫝未施尚祕璘玢之色在懸以和乍聞清越之聲明半規而似月發異彩而如虹練響而鳴球可諧還和而浮石非匹爛鮮華之溫潤含正聲之縝密惠而好我為齊路以足珍藏或俟時殊泗濱之自出釋皎然妙善寺達公院賦得夜磬送吕評事詩一磬寒山至凝心轉清越細和虛籟盡疏繞懸泉發在夜吟更長停空韻難絶幽僧悟深定歸客忘逺别寂歷無性中真聲何起滅已上磬樂部雜載梁孝元帝和彈箏人詩瓊柱動金絲秦聲發趙曲流徴含陽春美手過如玉唐厲玄緱山月下聞王子晉吹笙詩緱山明月夜岑寂隔塵氛紫府參差曲清宵次第聞韻流多入洞聲度半和雲拂竹鸞驚侣經松鶴舞羣蟾光聽處合仙路望中分坐惜千嵒曙遺音過汝墳魏璀湘靈鼓瑟詩瑤瑟多哀怨朱絃且莫聽扁舟三楚客藂竹二妃靈淅瀝聞餘響依稀欲辨形柱間寒水碧曲裏暮山青良馬悲銜草逰魚思繞萍知音若相遇終不滯南溟又錢起詩善撫雲和瑟常聞帝子靈馮夷空自舞楚客不堪聽逸韻諧金石清音發杳冥蒼梧來怨慕白芷動芳馨流水傳湘浦悲風過洞庭曲終人不見江上數峰青又王雍詩寶瑟和琴韻靈妃應樂章依稀聞促柱倣佛夢新粧波外聲初發風前曲正長凄清和萬籟斷續繞三湘轉覺雲山逈空懷杜若芳誰能傳此意雅會在宫商劉長卿鄂渚聽杜别駕彈胡琴詩文姬留此曲千載一知音不解胡兒語空愁楚客心聲隨邊草動意入隴雲深何事長江上蕭蕭出塞吟陳賀徹長笛吐清氣詩胡關氛霧侵羌笛吐清音韻切山陽曲聲悲隴上吟栁折城邊樹梅舒嶺外林方知出塞虜不憚武溪深梁簡文帝七勵奏白雪之楚緩陳亭席之吳疾躍鳥追飛潛魚伴出逺流歌于東夏出祕舞于京華金鈿設翠步搖藏花遙同暮雨逼似朝霞髮鬢如點纎腰成削道術部儒梁敬宗詔夫子降靈體哲經仁緯義允光素王載闡玄功仰之者彌高誨之者不倦立忠立孝德被蒸民制禮作樂道冠羣后雖泰山頽峻一簣不遺而泗水餘瀾千載猶在自皇圗屯阻祀薦不修奉聖之門胤嗣殱滅敬神之寢簠簋寂寥永言聲烈實兼欽愴宋魏良臣謝賜御製孔門七十二賢贊表全奎畫文章丕顯杏壇之至教牙籖玉軸蔚為泮水之榮觀偉此道之興崇振斯文而烜赫三薰拜賜十襲祕藏竊以元聖素王雖一時之窮厄立言垂訓實萬世之宗師受其義者三千速而肖者七十類升堂而入室咸附翼以攀鱗自昔流傳見史臣之稱贊於今特盛仰聖作以褒揚如聞魯國之絃歌恍若孔門之問答煥龍光之所被覺廟貌以增輝普頒惠于儒宫用開明于士類伏遇陛下多能天縱盛德日新當萬幾之燕間探六經之奧旨發為睿藻迥超兩漢之文親灑宸毫髙出二王之法恢張吾道竦動多方臣猥以諸生欽承寵錫潛心熟讀真同羲易之重爻盥手披觀下陋唐宗之三絶范端臣謝賜御書孟子表全藴奧之義默契于淵衷昭回之文發揮乎宸翰分頒有寵拜賜惟寅竊以戰國縱橫衆言淆亂乃篤生夫亞聖以丕振于醇風闢楊墨之功不在禹下非堯舜之道不陳王前著為一經垂之萬世伏遇陛下投戈講藝肆筆成書既深造于七篇復妙臻乎八法寫之琬琰炳茲丹青鳯翥鸞翔載出河圖之畫金聲玉振復傳洛誦之文臣猥被鴻祕親瞻睿藻樂與諸生之講習益昭治世之升平後漢張超尼父頌巖巖孔聖異世稱傑量合乾坤明參日月德被八荒名充遐外終于獲麟遺歌魯衛晉孫楚尼父頌皇矣尼父聖哲之傑德比天地明齊日月周室陵遲大道蕪穢禮樂崩阻姦雄罔世乃養門徒廣延俊乂垂訓列國頌聲魯衛威震夾谷義厭陳蔡德之休明幽而彌泰超美三代風馳雲邁唐顔師古聖德頌天下文明日月貞觀百神受職三靈叶贊太階既平光華照爛超軒跨皥騰周軼漢萬夀無疆永延遐算晉陸機孔子贊孔子睿聖配天𢎞道風扇玄流思探神寶明發懷周興言謨老靈魄有行言觀蒼昊清歌先誡丹書有造後漢禰衡魯夫子碑受天至精純粹睿哲崇高足以長世寬容足以廣包幽明足以測神文藻足以辨物然而敏學以求之下問以諏之虛心以受之深思以詠之愍周道之回遹悼九疇之乖悖故發憤忘食應聘四方魯以大夫之位任以國政之權譬若飛鴻鸞于中庭騁騏驥於閭巷也是以期月之頃五教克諧移風易俗邦國肅焉無思不服懿文德以紆餘綴三五之紀綱流洪耀之休赫曠萬世而揚光夫大明以動天則也廣大無疆地德也六經混成洪式也備此三者聖極也合吉凶于鬼神遂殂落于夢寐是以風烈流行無所不通故立石銘勛以示昭明辭曰煌煌上天篤降若人邈矣悠哉千祀一鄰明德𢎞監情性存存奕奕純嘏稽憲乾坤曜彼靈祇以訓黎元終日乾乾配天之行在險而正在困而亨窮達之運委諸穹蒼日月則隂天地不光聖睿殂崩大猷不綱禰衡顔子碑稟天地之純和鍾嶽瀆之休靈睿哲之姿誕自初育英絶之才顯乎嬰孩在束修之齒入宣尼之室德行邁于三千仁風橫于萬國知微知彰聞一覺十用行舍藏與聖合契名為四友之冠實盡疏附之益爾乃安陋巷挹清流甘簞瓢以充飽雖屢空而不憂于時河不出圗周祚未訖仲尼無舜禹之功先生包元凱之烈唐楊炯遂州長江縣孔子廟堂碑隂陽混合泄符瑞于平鄉宇宙氤氲灑休徴于闕里龍峻而龜背月角而雷聲有軒帝之殊姿有殷王之異表山開遁甲尼丘落于紫垣星掌巫咸鈎鈐墜于蒼陸十五而志學三十而有成申下問于伯陽屈帝師于郯子天為木鐸九州知發號之期吾豈匏瓜一國有來蘇之望下學而上達將聖而多能博而無名信而好古察殷周之禮樂捐益可知觀杞宋之文章賢才不足數年學易伏羲龍馬之圖三月聞韶媯帝鳯凰之典泰山頺而梁木壞微言絶而大義乖傳饗祀于百家奉琴書于十代秦始皇見登床之識集作讖始亂衣裳魯恭王看壞壁之書猶聞絲竹漢圖起于六千日賜金之禮載優魏德行于五千年刻石之風未泯述文武者皆憲章于聖人修學校者僉折衷于夫子自革集作韋鞲玉厯毳幕瑤圖皇天無皂白之徴戎狄起豺狼之釁王勃益州夫子廟碑靈襟不測睿視無涯石砮昭集隼之庭土缶驗羵羊之井稽山南望識皓骨于禹封蠡澤東浮考丹萍于夢渚麟圖鑒逺金編題佐漢之符鳯德鈎深玉䇿筮亡秦之兆自四教逺而微言絶十哲喪而大義乖九師爭大易之門五傳列春秋之輻六體分于楚晉四始派于齊韓淹中之妙鍵不追稷下之髙風代起百家騰曜攀户牖而同歸萬匹驅馳仰陶鈞而共貫猶使絲簧金石長懸闕里之堂荆棘蓬蒿不入昌平之墓聖人之遺風也歷先王之舊國懷列聖之遺塵翔赤驥而下云亭吟翠虬而望鄒魯泗濱休駕杳疑汾水之陽尼岫凝鑾暫似銅疑作洞山之典乃下詔曰可追贈太師託鹽梅于異代鼎路生光寄舟楫于同時泉塗改照梁劉協徵聖贊妙極生知睿哲惟宰精理為文秀氣成采鑒懸日月辭富山海百齡影徂千載心在晉庾亮祭孔子文詩書煥于唐虞憲章盛于文武然後黎民時雍彛倫攸敘幽厲頺構王繩絶紀髙岸為谷六合錯否上凌夷而失教下茍免而無恥公以玄聖之靈應感圎通萬物我賴匪我求蒙夫子既沒洪範乖流秦雖慢道漢聿孔修洎我皇晉仰欽大猷宗聖既建遐胄俾侯令月吉辰祇陳大禮磬管鏘鏘威儀濟濟嘉奠既設欽若靈規心存鳯德尚想來儀道術部道梁沈約遊仙詩朝上閶闔宫髙宴清都闕騰蓋擁奔星低鸞避行月九嶷紛相從虹旌乍升沒青鳥去復留高唐雲不歇若華有餘照淹留且睎髮周庾信詩藏山還採藥有道得從師京兆陳安世成都李意期玉京傳相鶴太一受飛龜白石香新芋青泥美熟芝山精逢照鏡樵客遇圍碁石紋如碎錦藤苗似亂絲蓬萊在何處漢后欲遙祠唐王績詩暫出東陂路過訪北巖前蔡經新學道王烈舊成仙駕鶴來無日乘龍去幾年三山銀作地八洞玉為天金精飛欲盡石髓溜應堅自悲生世促無暇待桑田上月芝蘭徑中巖紫翠房金壺新練乳玉釡始煎香六局黃公術三門赤帝方吹砂聊作鳥動石試為羊緱氏還程促瀛洲會日長誰知北巖下延首詠霓裳結衣尋野路負杖入山門道士言無宅仙人更有村斜溪橫桂渚小徑入桃源玉床塵稍冷金爐火尚溫心疑逰北極望似陟西崑逆愁歸舊里蕭條訪子孫真經知那是仙骨定何為許邁心長切嵇康命似竒桑疏金闕迥苔重石梁危照水燃犀角逰山費虎皮鴨桃聞已種龍竹未經騎為向天仙道棲遑君詎知葳蕤三株樹杳靄仙源路日規半隱霞山窗未斂霧泛琴宜秋寂吹簫看鳯度披雲振輕衣踏葉羅幽步前溪鬼谷隱後嶺王喬住翡翠映碧流柱花凝清露眇然歸天理逍遙任真趣寄謝桑榆客榮耀非所務又賈島詩掬河洗古貌照月生嫩輝又王貞白詩露香紅玉樹風綻碧蟠桃曹唐大逰仙詩二首崑崙凝想最高峰王母來乘五色龍歌聽紫鸞猶縹眇語來青鳥許從容風回水落三清月漏苦霜傳五夜鐘樹影悠悠花悄悄若聞簫管是行蹤鼇岫雲低太一壇武皇齋潔不勝歡長生碧字期親署延夀丹泉許細看劍佩有聲宫樹靜星河無影禁花寒秋風裊裊月朗朗玉女清歌一夜闌北齊顔之推神仙詩紅顔恃容色青春矜盛年自言曉書劔不得學神仙風雲落時後嵗月度人前鏡中不相識捫心徒自憐願得金樓要思逢玉鈐篇九龍逰弱水八鳯出飛煙朝逰采瓊實夕宴酌膏泉崢嶸下無地列缺上陵天舉世聊一息中州安足旋唐王勃懷仙詩鶴岑有竒徑麟洲富仙家紫泉潄珠液玄巖列丹葩常希披塵網眇然登雲車鸞情極霄漢鳯想疲煙霞道存蓬瀛近意愜朝市賖無為坐惆悵虛此江上華王勃觀內懷仙詩玉架殘書隱金壇舊迹迷牽花尋紫洞步葉下清溪瓊漿猶類乳石髓尚如泥自能成羽翼何必俟雲梯梁范雲答句曲陶先生詩終朝吐祥霧薄晚孕竒煙洞澗生芝草重崕出醴泉中有懷真士被褐守中玄石戶棲十祕金壇謁九仙乘鵷方履漢轡鶴且騰天又贈學仙者詩採藥層城逺尋師海路賖玉壺橫日月金闕斷煙霞仙人何處在道士未還家誰知彭澤意更覔步兵家春釀煎松葉秋杯浸菊花相逢寧可醉定不學丹砂唐盧照鄰贈李榮道士詩錦節銜天使瓊仙駕羽君投金翠山曲奠璧清江濆圎洞開丹鼎方壇聚綘雲寶貺幽難識空歌迥易分風搖十洲影日亂九江文敷誠歸上帝應詔在明君獨有南冠客耿耿泣離羣遙看八會所真氣曉氛氳劉孝孫逰清都觀尋沈道士詩紛吾因暇豫行樂極留連尋真謁紫府披霧覿青天緬懷金闕外遐想玉京前飛軒俯松竹抗殿接雲煙熖熖清夏景嘒嘒早秋蟬橫琴對危石酌醴臨寒泉聊祛塵俗纍寧希龜鶴年無勞生翼羽自可狎神仙許敬宗逰清都觀尋沈道士詩幽人蹈箕頴方士訪蓬瀛豈若逢真氣齊契體無名既詮衆妙理聊暢逺逰情縱心馳貝闕怡神想玉京或命餘杭酒時聽洛濱笙風衢通閬苑星使下層城蕙帳晨飇動芝房夕露清方叶棲遲趣于此遂鐘聲又凌敬詩聊排靈鎖闥徐步入清都青溪冥寂士思玄徇道樞十芒生藥笥七熖發丹爐縹帙桐君籙朱書王母符宫槐散緑穗日槿落青柎矯翰雷門鶴飛來葉縣鳬凌空自可御安事迫中區方追羽化侣從此得玄珠王維贈焦道士詩海上逰三島淮南遇八公坐知千里外跳向一壺中縮地朝珠闕行天使玉童飲人聊割酒送客乍分風天老能行氣吾師不養空謝居徒雀躍無可問鴻蒙李頎謁張果先生詩先生谷神者甲子焉能計自説軒轅師于今數千嵗寓逰城郭裏浪迹希夷際應物雲無心逢時舟不繫霞餐斷火粒野服兼荷製白雲淨肌膚青松養身世韜精殊豹隱鍊質同蟬蛻忽去不知誰偶來寧有契二儀齊夀考六合隨休憩彭聃猶嬰孩松期且微細常問穆天子更憶漢皇帝親屈萬乘尊將逰四海裔車徒遍草木錦帛招談説八駿空往還三山轉虧蔽吾君感至德玄老欣來詣受籙金殿開清齋玉堂閉笙歌迎拜首羽帳崇嚴衛禁栁垂香爐宫花拂仙袂彌慶寶祚廣致福蒼生惠何必待龍髯鼎成方取濟包佶宿贈廬山白鶴觀劉尊師詩蒼蒼五老霧中壇杳杳三山洞裏官手護崑崙象牙簡心推霹靂棗枝盤春飛雪粉如毫潤曉潄瓊膏氷齒寒漸恨流年筋力少唯思露冕事星冠盧綸酬暢當嵩山尊道士見寄詩聞逐樵夫間看棋忽聞人世是秦時開雲種玉嫌山淺渡海傳書怪鶴遲隂洞石幢微有字古壇松樹半無枝煩君逺示青囊籙願得相從一問師崔洞送李道士歸山詩秋城臨古路城上望君還曠野入寒草獨行隨逺山授人鴻寶內將犬白雲間早晚燒丹罷遙知氷雪寒戎昱送吉州閻使君入道詩廬陵太守近隳官月帔初朝玉帝壇風過鬼神迎受籙夜深龍虎衛燒丹水容入鏡纎埃靜玉液添瓶潄齒寒莫遣桃花迷客舫千山萬水訪君難于鵠終南褚尊師詩得道終南久曽教四皓碁閉門醫病鶴倒篋養神龜松際風長在泉中草不衰誰知茅屋裏有路向峨嵋司空曙送張鍊師還峨嵋山詩太一天壇天柱西垂蘿為挽石為梯前登靈境青霄絶下視人間白日低松籟萬聲和管磬丹光五色雜虹霓春山一入尋無路鳥響煙深水滿溪又送王尊師歸湖州詩煙蕪滿洞青山逺幢節飄空紫鳯飛金闕乍看迎日麗玉簫遙聽隔花微多開石髓調供膳時御霓裳奉易衣莫學遼東華表上千年始欲一回歸李端送吉道士拜官歸舊業詩聞有華陽客儒裳靄紫薇舊山連藥賣孤鶴帶雲歸栁市名猶在桃源夢已稀還鄉見鷗鳥應愧背船飛楊衡贈羅浮易鍊師詩海上多仙嶠靈人信長生榮衛氷雪姿咽嚼日月精默書終符遍晦步斗文成翠髮披肩長金蓋凌風輕曉籟息塵響天雞叱幽聲碧樹來户隂丹霞照窗明焚香扣虛寂稽首回太清鸞鷺振羽儀飛翻拂斾旌左挹玉泉液右搴雲芝英念得參龍駕攀天度赤城孟郊送李尊師玄詩口誦碧簡文身是青霞君頭冠兩片月肩披一條雲松骨輕自飛鶴心高不羣張籍靈都觀李道士詩仙觀雨未靜繞房瓊草春素書天上字花洞古時人泥竈煮靈液掃壇朝玉真幾回逰閬苑青節亦隨身殷堯藩中元日看諸道士步虛詩玄都開祕籙白石禮先生上界秋光淨中元夜景清星辰朝帝處鸞鶴步虛聲玉樹花難老珠宫月最明掃壇天地肅投簡鬼神驚倘賜刀圭藥還留不死名姚合贈溫尊師詩先生自説瀛洲路多在青松白石間海岸夜中常見月仙宫深處却無山犬隨鶴去逰諸洞龍作人來問大還今日偶聞塵外事朝簮未擲復何顔曹唐送羽人王錫歸羅浮詩風前整頓紫荷巾常向羅浮保養神石磴倚天行帶月鐡橋通海入無塵龍蛇出洞間邀雨犀象眠花不避人最愛葛洪尋藥處露苗煙蘂滿山春曹唐送劉尊師祇詔闕庭詩海風葉葉駕霓旌天路悠悠接上清錦誥凄涼遺去恨玉簫哀絶醉離情五湖夜月幡幢濕雙闕清風劍珮輕從此暫辭華表柱更應千載是歸程李商隱贈華陽宋真人兼寄清都劉先生詩淪謫千年别帝宸至今猶識蘂珠人但驚茅許多玄分不記盧劉是世親玉檢賜書迷鳯籙金華歸駕冷龍鱗不因杖屨逢周史徐甲何曽有此身多玄分集作通仙籍李羣玉謫仙吟贈趙道士詩汗漫東逰黃鶴雛縉雲仙子住清都三元麟鳯推高座六甲風雷閟小壺日月暗資靈夀藥山河直擬化生符若為失意居蓬島鼇足塵飛桑樹枯于鵠送宫人入道詩十五吹簫入漢宫看修水殿種芙蓉自傷白髮辭金屋許著黃衣向雪峰解語老猿開曉户學飛雛鶴落高松定知别後宫中伴遙聽緱山半夜鐘釋皎然賦得顔氏古今事得晉仙傳送顔逸詩曽看顔氏傳多記晉時仙却憶桐君老俱還桂父年青春留鬢髮白日向雲煙逺别賫遺簡囊中有幾篇梁何遜七召若夫洗精服食慕道逰仙尋玉塵于萬里守金竈于千年三尸可度九轉難傳飛騰水陸咀嚼靈玄若乃壁上真辭枕中祕要彈壓神鬼吐納靈妙既變醜以成妍亦反老而為少虬駕夭矯而出沒霓裳颯杳而容與接鵠馭于後乘追鳯簫于前侣雨散漫以霑服雲霏微而襲宇瞰芝闕以窈窕見玉臺之相拒蓋排煙而漸滅旌拖風而未舉值解佩于江濱逢弄珠于漢渚薄逰玄圃弭節太華列神童于羽帳侍玉女于仙車澗採兮危實苑拔兮回花聽弱水之晨浪望昆山之夕霞窮北辰而比夀指中嶽以為家此神仙之恍惚豈從我而蠲邪沈約上陶隱居啓先生粳粃俗流超然獨逺裂霓羽帶總轡雲霞方當名書絳簡身逰玄闕馮星夕卧望日朝餐而至理深微眇焉難睹惟欲下風問道未知厥路若夫栖遲間逺咀咽瓊芝出入清都師友靈聖循崕反迹無缺惟心唐陳子昂送中嶽真人序常謂煙駕不逢羽人長往去囂世走青雲登玉女之峰窺石人之廟見司馬子徽馮太和霓裳眇然冥壑獨立其朋羽會金漿玉液則有楊仙翁玄默洞天賈上士幽棲牝谷玉笙吟鳯瑤衣駐鶴方且迷軒轅之駕期汗漫之逰吾亦何人躬接茲賞實欲執青節從白霓陪飲昆崘之庭觀化玄元之府宿心遂矣冥骨甘焉豈知瓊都命淺金籙道微攀倒景而迷途顧中峰而失路塵縈俗纍復汨吾和仙人真侣永幽靈契翳青芝而延佇遙會何期結丹桂而徘徊逺心空絶紫煙去黃庭極仰寥廓而無光視寰區而寡色悠悠何往白頭名利之交咄咄誰嗟玄運盛衰之感始知楊朱岐路墨翟素絲尚平辭家而不歸鮑焦抱木而枯死可以慟可以悲古人之心吾今得之也隋栁辨徐則畫贊可道非道常道無名上德不德至德無營玄風扇矣亦有先生夙鍊金液怡神玉清石髓方軟靈丹欲成言追葛稚將侣茅盈我王遙屬爰感靈誠柱下暫啓河上沈精留符告信化杖飛聲永思靈迹曷用攄情時披繪素如臨赤城薛道衡老氏碑老君感星載誕莫測受氣之由指樹為姓未詳吹律之本含靈在孕七十餘年生而白首自一作因以老子為號其狀也三門雙柱表耳鼻之竒蹈五把十影手足之異爰自伏羲至于周氏綿祀歷代見質變名在文王武王之時居藏史柱史之職南疑朝屢易容貌不改宣尼一覩嘆龍德之難知關尹四望識真人之將隱乃發揮衆妙著書二篇率性歸道以無為用其辭簡而要其旨深而逺飛龍成卦未足比其精微獲麟筆削不能方其顯晦用之治身則神清志靜用之治國則反朴還淳既而鍊形物表卷迹方外霓裳鶴駕往來紫府金漿玉酒宴衍清都參日月之光華與天地而終始涉其流者則擯落囂塵得其門者則騰驤雲霧大椿凋茂非蜉蝣之所知溟渤淺深豈馮夷之能測盛矣哉固無德之稱也莊周云老聃死秦佚弔之三號而出是謂遁天之形雖復傲吏之寓言抑亦蟬蛻之微旨唐陳子昂唐故中嶽體玄先生潘尊師碑崇標曠迹遐情逺意志摩青雲蓬視紫闥投身霄嶺滅景雲林盧照鄰益州至真觀主黎君碑氤氳祖帝發皓鬢於東周兆朕皇輿飛紫雲于西道鳯交開景返徐甲之營魂龍光照天杜宣尼之神氣得一吹萬有大造于蒼生把十蹈五樹靈基于寶祚能使秦皇東指見赤舄而長懷漢帝北逰望青煙而下拜玉笈雲囊之術龍緘鳯蘊之圗莫不吞楚夢于胸中指魯城于掌上臨長水而飲犢不就堯徴卧巨澤而牧羊徒勞漢使冥丘聳駕左肘符觀化之辰濬壑停裝橫目傳栖真之地閉門鍊火陪嘯父之高煙卜肆驅筠記壺公之逺御迷方看博邀赤斧于萬一作寓山失路乘槎問君平于蜀郡地分輿井城連劔關錦瀨開霞嵋峰吐月白雲舒卷青山回沒藝一作菌閣香飛桃源花發道術部釋唐李子卿興唐寺聖容瑞光賦中國之至聖兮西方之大仙凝旒為出代之日立極是分身之年不然者何以垂其拱而鏡清四海建其像而燭耀三天故知有相無相而雙合前聖後聖而兩全不儀刑乎何以表三身之義不鎔範乎何以愜萬人之意乃命鳬氏立法冬官蕆事棲真于會玉之庭禮佛於布金之地炎帝司火飛亷扇吹率天下觀百神旁伺聲激射氣憑凌殷爾而風雷怒囂然而雲霧蒸波旬下回祿升爍寶剎炘金繩忽星透而泉噴遂煙消而氣澄圎相鏡開謂太陽新吐真質山立乃胚渾初凝怡然花臺耀此金髻睟容若動慈眼如睇清淨而青蓮始春圓明而白月新霽光然照夜瑞有應于周王像乃見時夢豈慙于漢帝既營珠額仍輝玉毫見之者宜知極樂之近仰之者誰識須彌之高心遂得于真正身豈有于塵勞乘流者于焉捨筏滯縛者于此操刀夫其發靈光凝瑞相異色傍射清暉逺暢陽烏自耀于暘谷之中燭龍滅焰于鍾山之上自有頂而咸覩歷恆山而逺望赤光照室而多慙紫氣度關而應讓于是百辟奔走萬姓知歸拂塵而香雲自遍著人而花雨如飛莫不請施瓔珞願解寶衣期誓心于相好聿求福于光輝蘇味道和武三思於中天寺尋復禮上人詩藩戚三雍暇禪居二室隈忽聞從桂苑移步踐花臺敏學推多藝高談屬辨才是非寧滯著空有掠嫌猜五術幽機暢三畨妙鍵開味同甘露灑香似逆風來砌古留方石池清辨燒灰人尋鶴洲返月逐虎溪回連躅瞻飛蓋攀遊想玉杯願陪為善樂從此去塵埃劉長卿送少微上人逰天台詩石橋人不到獨往更迢迢乞食山家少尋鐘野寺遙松門風自掃瀑布雪難消秋夜聞清梵餘音逐海潮又送靈徹上人歸嵩陽蘭巖詩南地隨緣久東林幾歲空暮山門獨掩青草路難通作梵連松韻焚香入桂叢唯將舊瓶鉢却寄白雲中又初夜碧澗招明契上人詩漸老知身纍初寒曝背眠白雲留永日黃葉減餘年猿護窗前樹泉澆谷口田沃洲能共隱不用道林錢又禪智寺上方懷演和尚寺即和尚所創詩絶巘東林寺高僧惠逺公買園隋苑下持鉢楚城中斗極千燈近煙波萬井通逺山低月殿寒木露花宫紺宇燒香靜滄洲罷霧空鴈來秋色裏曙起早潮東飛錫今何在蒼生待發蒙白雲飛送客黃葉自辭風捨筏追開士回舟狎釣翁平生江海意唯共白鷗同岑參晚過盤石寺禮鄭和尚詩暫詣髙僧話來尋野寺孤岸花藏水碓溪竹映風爐頂上巢新鵲衣中帶舊珠談禪未得去輟棹且踟蹰錢起送僧歸日本詩上國隨緣去東途若夢行浮天滄海逺去世法舟輕水月通禪觀魚龍聽梵聲唯憐塔燈影萬里眼中明皇甫曽贈鑒上人詩律儀傳教誘僧臘老煙霄樹色依禪誦泉聲入寂寥寶龕經末劫畫壁見南朝深竹風開合寒潭月動搖息心歸靜理愛道坐中宵更欲尋真去乘船過海潮顧况寄江南鶴林寺石氷上人詩山川重復出心地暗相逢忽憶秋江月如聞古寺鐘湖平南北岸雲抱兩三峰定力超香象真言攝毒龍風中何處鶴石上幾年松為報煙霞道人間共不容盧綸夜投終南豐德寺詣海上人詩半夜中峰有磬聲偶逢樵者問山名上方日晚聞僧語下路林疏見客行野鶴巢邊松最老獨龍潛處水偏清願得逺公知姓字焚香洗鉢過浮生嚴維送桃巖成上人歸本寺詩長老歸緣起桃花憶舊巖清晨雲抱石深夜月籠杉道具門人捧齋糧谷鳥銜餘生願依止文字欲三緘楊巨源送定師歸蜀詩鳯城初日照紅樓禁寺公卿識惠休詩引棣花霑一雨經分貝葉向雙流孤猿學定前山夕逺鴈傷離幾地秋空悵碧雲無處所約公曽許剡溪逰又送淡公歸嵩山龍潭寺葬本師詩野煙秋水蒼茫逺禪境真機去住間雙樹為容思舊壑千花成塔禮寒山洞宫曽向龍邊宿雲徑應從鳥外還莫戀本師金骨地空門無處復無關劉禹錫贈日本僧智藏詩浮杯萬里過滄溟遍禮名山適舊扄深夜降龍潭水黑新秋放鶴野田青身無彼我那懷土心會真如不讀經為問中華學道者幾人雄猛得寧馨白居易送文暢上人東逰詩得道即無著隨緣西復東貌依年臘老心到夜禪空山宿馴溪虎江行濾水蟲悠悠塵客思春色滿雲中姚合寄元緒上人詩石窗紫蘚牆此世此清涼研露題詩潔銷氷煮茗香間雲春影薄孤磬夜聲長何計休為吏從師老草堂又送真實上人歸杭州天竺寺詩石橋寺裏最清涼聞説茅庵寄上方林外猿聲連曉磬月中湖色到禪牀他生念我身何在此世惟師性亦忘九陌相逢千里别青山重疊樹蒼蒼于武陵夜尋僧僧逰山未歸詩數歇渡煙水漸非塵俗間泉聲入秋寺月色遍寒山石路幾回雪竹房猶閉關不知雙樹客何處與雲間周賀送忍禪師歸廬嶽詩浪匝湓城嶽壁青白頭僧去掃禪扃龕燈夜雪補殘衲山日上軒看舊經瀑布下氷寒溜澀薜蘿逢雨曙煙腥已知身事非吾道甘臥荒齋竹滿庭溫庭筠贈越僧嶽雲詩世機銷已盡巾履亦飄然一窗故山月滿瓶秋澗泉禪庵過微雪鄉寺隔寒煙應共白蓮客相期松桂前又宿白蓋峰寺寄僧詩山房霜氣晴一宿遂平生閣上見林影月中聞澗聲佛燈銷永夜僧磬徹寒更不學何居士焚香為宦情又寄清源寺僧詩石路無塵竹徑開昔年曽伴戴顒來窗間半偈聞鐘後松下殘碁送客回簾向玉峰藏夜雪砌因藍水長秋苔白蓮社裏如相問為説逰人是姓雷又訪知玄上人遇曝經因有贈詩縹帙無塵滿畫廊終山弟子靜焚香惠能未肯傳心法張湛徒勞與眼方風揚檀煙銷篆印日移松影過禪牀客兒自有翻經處江上秋來蕙草荒方干思桐廬舊居便送鑒上人詩莫道東南路不賖思歸一步是天涯林中夜半雙臺月洲上春深九里花緑樹繞村含細雨寒潮背郭卷平沙聞師却到鄉中去為我殷勤謝酒家李洞喜鸞公自蜀歸詩禁院對生臺尋師到緑槐寺高猿看講鐘動鳥知齋拂石月盈帚濾泉花滿篩歸來逢聖節吟步上堯階許渾和友人送僧歸桂州靈巖寺詩楚客送僧歸故鄉海門帆勢落瀟湘碧雲千里暮愁合白雪一聲春思長滿院草花平講石繞龕藤葉蓋禪牀憐師不得隨師去已戴儒冠事素王一本後四句異栁絮擁堤添衲軟松花浮水注瓶香南宗長老幾年别聞道半嵓多影堂項斯寄石橋僧詩逢師入山日道住石橋邊别後無人見秋來幾處禪溪中雲隔寺夜半雪添泉生有天台約應無却出緣馬戴贈禪僧詩弟子人天遍童年在沃洲開禪山木長浣衲海沙秋振錫搖汀月持瓶接瀑流赤城何日上鄙願從師逰又贈别空公詩雲門秋却入微徑久無人後夜中峰月空林百衲身寂寥寒磬盡盥漱瀑泉新履迹誰相見松風掃石塵顧非熊寄太白無能禪師詩太白山中寺師居最上方獵人偷佛火櫟鼠戲禪牀定久衣塵積行稀徑草長有誰來問法林杪過殘陽陳陶題贈高間上人詩薝蔔花間客軒轅席上珍筆江秋菡萏僧國瑞麒麟內殿初招隱曹溪得後塵龍蛇驚粉署花雨對金輪白馬方依漢朱星又入秦劇談凌鑿齒清論倒波旬拂石先天古降龍舊國春珠還合浦老先疑去玉州貧鴛鷺輸黃絹場壇繞白蘋鼎湖間入夢金閣靜通神海氣成方丈山泉落淨巾獼猴深愛月鷗鳥不猜人拂嶽蕭蕭竹垂空淡淡津漢姝難覔對荆璞夲來真伊傅多聨璧劉雷競買鄰江邊有國寶時為劚疑星辰司空圖贈圓昉公詩天階讓紫衣冷格鶴猶卑道勝嫌名出身間覺老遲曉香延宿火寒碧度高枝每説長松寺他年與我期張喬聞仰山禪師歸曹溪因贈詩曹溪松下路猿鳥重相親四海求玄理千峰繞定身異花天上墮靈草雪中春自惜經行處焚香禮舊真張蠙送南海僧逰蜀詩真修絶故鄉一衲度暄涼此世能先覺他生豈再忘定中船過海臘後路沿湘野迥鴉隨笠山深虎背囊瀑流垂石室蘿蔓蓋銅梁却後何年會西方有上房錢起送外甥懷素歸覲詩釋子吾家寶神清慧有餘能翻梵王字妙盡伯英書逺鶴無前侣孤雲寄太虛往來輕世界醉裏得真如飛錫離江久寧親喜臘初故池殘雪滿寒栁霽煙疏夀酒還嘗藥晨餐不薦魚遙知禪誦外健筆赴疑賦字間居周庾信送靈法師葬詩龍泉今日掩石洞即時封玉匣摧談柄懸河落辨鋒香爐猶是柏麈尾更成松郭門未十里山回已數重尚聞香閣梵猶憶竹林鐘送客風塵擁寒郊霜露濃性靈如不滅神理定何從唐楊炯和旻上人傷杲禪師詩淨業初中日浮生大小年無人夲無我非後亦非前簫鼓旁喧地龍蛇直映天法門摧棟宇覺海破舟船書鎮秦王餉經文宋國傳聲華周百億風烈破三千蕪沒青園寺荒涼紫陌田德音殊未逺拱木已生煙張謂哭護國上人詩昔喜三身淨今悲萬劫長不應歸北斗多是向西方舍利衆生得袈裟弟子將鼠行殘藥碗蟲網舊繩牀别起千花塔空留一草堂支公何處在神理竟茫茫陳陶哭寶月三藏大禪師詩五峰習聖罷乾竺化身歸帝子傳真印門人哭寶衣一囊窮海沒三藏故園稀無復天花落悲風滿鐡圍李商隱上河東公啓全周朝貝葉列妙引于王褒梁日枳園灑芳詞于沈約必資乎鴻筆麗藻刻乎真金翠珉然後可以充足天人發揮龍象茍其曖昧即匪莊嚴爰託亨塗夙聞妙喻雖從幕府常在道場猶恨出俗情微破邪工少二百日斷酒有謝蕭綱十一年長齋多慙王奐仰戀東閣未歸西林近者財俸有餘津梁是念適依勝絶微復經營伏以妙法蓮華經者諸經中王最尊最勝始自童幼常所護持或公幹漳濵有時疾疹或謝安海上此日風波恍惚之間感驗非少今年于此州長平山慧義精舍經藏院特創右壁五間金字勒上件經七卷既成勝果思託其音伏惟尚書有夫子之文章備如來之行願不逢慧逺已飛廬嶽之書未見簡栖便制頭陀之頌是敢右繞三匝仰希一言庶使鵝殿增輝龍宫發色流傳沙界震動風輪報恩于蓮目果脣奪美于江毫蔡絹伏希道念得降神鋒瞻望旌幢携持砧斧曝身晞髮以俟還辭周庾信秦州天水郡麥積崖佛龕銘序方之鷲島迹遁三禪譬彼鶴鳴虛飛六甲鳥道乍窮羊腸或斷雲如鵬翼忽已垂天樹若桂華翻能拂日是以飛錫遙來英杯逺至疏山鑿洞鬱為淨土拜燈王于石室乃假馭風禮花首于山龕方資控鶴似刻浮檀如攻水玉從容滿月照耀青蓮影現須彌香聞忉利如斯塵野還開説法之堂猶彼香山更對安居之佛唐盧照鄰相樂夫人檀龕讚序青蓮皓月爭華蚊睫之端寶樹天倡競爽鴻毛之際納須彌于纎芥嘗謂徒言置由旬于方丈今過其實僧皎然畫藥師琉璃光佛讃序光射金扉日月不開于天上影朧珠綴煙霄自出于壁間盧照鄰益州長史胡樹禮為亡女造畫讚序徴竒綃于水府採妙色于霞莊月面澄華疑金雲之夜敞蓮毫吐照狀珠浦之晨開花寶參差眺鶴林其非逺仙雲肹蠁登鷲巖其可望窮形盡相陋燕壁之含丹寫妙分容嗤吳屏之墜筆王勃四分律宗記序仰揚垢路之業以疆理情田闡導毗尼之藏以隄防性海二邊雲徹方知實相之尊十剎風行乃識真如之貴將使龍象緇服維明克允鶖鷺玄明有恥且格故能莊嚴百福粉繪三身摧憍慢山拔生死樹覆簣菩薩之道濫觴正覺之源除惑箭而斷愛枝銷恚刀而解疑網其後卑摩覃思猶沈赤水之輝惠逺研精尚玷玄巖之彩遂使瓊編浩汗利涉迷于要津瑤軸紛綸登高暗于飛陛所以禆助三明抑揚四謗𢎞八正之道成一家之言庶使衆善雷奔羣疑霧斂照歡戚之兩鏡蕩欣憂之二瓶憑此戒由方躋定境豈直功周沙甸道制鐡圍而已哉闕宗鏡録序從此遺真失性執相徇名積滯著之塵情結相續之識浪鎖真覺于夢夜沈迷三界之中瞽智眼于昏衢匍匐九居之內向不遷境上虛受輪回于無脫法中自生繫縛然後違順想風動搖覺海貪癡愛水資潤苦芽一向徇塵罔知反本發狂亂之知見翳于自心立幻化之色聲認為他法從此一微涉境漸成戛漢之髙峰滴水興波終起吞舟之巨浪復有邪根外種小智機權不了生死之病源罔知人我之見本唯欲厭喧斥動破相析塵雖云味靜冥空不知埋真拒覺如不辨眼中之赤眚但滅燈上之重光罔窮識內之幻身空避日中之虛影豈知重光在眚虛影隨身除病眼而重光自消息幻質而虛影當滅若能回光就已反境觀心佛眼明而業影空法身現而塵迹絶以自覺之智刃剖開纒內之心珠用一念之慧鋒斬斷塵中之見網了萬物由我明妙覺在身可謂搜抉玄根磨礱理窟剔禪宗之骨髓標教網之紀綱餘惑微瑕應手圎淨玄宗妙旨舉意全彰能摧七慢之山永塞六衰之路塵勞外道盡赴指呼生死魔軍全消影響法性山髙頓落羣峰之峻醍醐海濶橫吞衆派之波神珠在手永息馳求覺樹垂隂全消影迹獲真寶于春池之內拾礫渾非得本頭于古鏡之前狂心頓歇或離此别修隨他妄解如㜌角取乳緣木求魚徒歷三祇終無一得無一色非三摩鉢地無一聲非陀羅尼門嘗一味而盡變醍醐聞一香而皆入法界風柯月渚並可傳心煙島雲林咸提妙旨步步蹈金色之界念念嗅薝蔔之香掬滄海而已得百川倒須彌而皆同一色煥兮開觀象之目盡復自宗寂爾道求珠之心俱還本法遂使邪山落仞苦海收波智楫以之安流妙峰以之高出呂溫藥師如來繡像贊貞元二十年余西使吐蕃辭高堂而出萬死介單車而馳不測國故遽至戎情猜閉坎險一遇星霜再周夫人盥饋之餘膏鉛不御日亂蓬首坐銷蕣華異域無期良時自晚書委塵篋迹淪苔階漸昧音容孰知存沒黷龜不告因夢難徴觸慮成端沿情多緒黃昏望絶見偶語而生疑清旭意新聞疾行而誤喜是用濬發慧根妙求真相斷鳴機躬織之素染懿筐手繢之絲纒苦心于香縷注精意于針鋒指下而露洗青蓮思盡而雲開白日遂得慈舟密濟覺路潛引當道場發念之日是荒裔來歸之晨幽贊冥符一何昭焯乃知織回文之錦無補離憂登望歸之臺空為廢日獨孤及洪州大雲寺銅鐘銘徘徊乎霜天凌厲乎清夜千門徹萬户警魚龍皆奮蟲豸不蟄于是聆其音者貪騃遷善聾盲知方識浪安流地獄清涼吒王解形刀輪摧藏嚴乎心者聞聲以知受觀受以悟法若露清耳根鏡照身業彼金鼓聲氣木鐸徇路整衆孚號方斯陋矣費冠卿九華山化成寺記丹素交彩層層倚空嵒巒隊起于前面松檜陳橫于後嶺日月晦明以增其色雲霞聚散而變其狀松聲猿嘯相與斷續都非人間也夏則食兼土冬則衣半火山居苦行于頔潭州法華院記佛説九部法華為最其逗機也韜靈珠于髻上指衆寶于藏內藥草沐莖葉之雨諸子悅羊鹿之車歐陽詹福州南澗寺上方石像記斯石象者其珍慶歟始孕靈韞質朕兆未見則峩峩巨石巖峭山立鎮郡城之前阜壓蓮宫之上界海若鞭而莫動天時泐而終固皇唐天寶八年五月六日清晝忽騰雲傍湧驟雨來集驚飇環駭軒訇杳冥雄雄者雷騞然中震迸火噴野大聲殷空岑嶺躨跜潭洞簸蕩須臾風雨散雲雷收激辟輪囷斬焉中闢南委地以梯集作柿落北干霄而碣一作揭樹不上不下不西不東亭亭厥心隱出真像三十二相具八十種好備列侍環衛品覺有序莊嚴供養文物咸秩融然慈面儼矣儀形似倚雪山而授法如開月殿以趺坐韋臯再修成都府大聖慈寺金銅普賢菩薩記真如常寂色相假名法本無緣誠感必應儀合天表制侔神工蓮開慈顔月滿毫相釋真言大唐金剛般若石經記夫先佛者法法空則境證後佛者教教離則言亡雖至德而無形亦假名而有後繇是脫靈之源流重華于漢土慧命之懸解載頌于魯文李華故中嶽越禪師塔記雨寶之珠伏于泥下燎原之火隱在木中智月開瞽法雷破聾周庾信陜州𢎞農郡五張寺經藏碑如來説法萬萬恆沙菩薩轉輪生生世界豈直優波提舍祇夜修多而已哉是以熙連禪河質多羅樹七處八會三清四説皮紙骨筆木葉山花象負之所未勝龍藏之所不盡雖復銀函東度金疊南翻秦景遙傳竺蘭私記譬猶得海水之一珠不下昆山之片玉唐王勃益州德陽縣善寂寺碑太昊奉楫截若海而橫流風伯扶輪歷邪山而效駕騰燭龍于慧炬俯鏡重昏奏鳴鳯于天歌下清羣籟摩珍在握遙臨七寶之宫正覺為心俯闢三乘之路湛衢樽于忍地品藻雞園推水砥于言河扶持象化王勃梓州通泉縣惠普寺碑爾其譯雉林之寶偈詮鷲嶺之真圖抽紫玉于禪山朗玄珠于智水不生不滅光臨妙物之津無去無來濬發乘時之契仗三明而獨運施洽平分據二諦而同歸功超邃古故能使三千法界向風知袵席之師百億大王聞道失巖廊之貴非釋迦之神化其孰能與于此乎既而正法將隱微言不嗣應身既沒遺儀間起恆星夜掩西天銜風霧之悲夢日宵成東漢肅壇場之禮由是鹿園曾敞像教旁流宣妙奬于希夷範靈蹤于顯晦瑤龕寶座光華震旦之墟鳯剎霓裳斧藻閻浮之域覃機色外練迹塵間浴甘露于身田集祥風于性宇栖情不二頓起初地之權授手大千猶擁彌天之具王勃廣州寶莊嚴寺舍利塔碑寶瓶宵注則雨露隨軒玉柄朝揮則風霜滿席魚峰多讚唄之歡虎溪有送迎之限紫蘿山徑居藏勝記青松澗户坐諧幽致楚鐸淪照擢紫靄以衝星周鼎沈華吐黃雲而噴景翰飛般若之林髙步檀那之舍慈襟密洞散明月于談筵智鍔相輝化繁霜于寶刃王勃梓州玄武縣福會寺碑身持寶印口出神珠心動巴南化行蜀右法羅潛舉馴鳥性于慈林慧鏡旁開息猿心于定水亦有情鈎五縛遙騰解脫之川想瘞六塵回拔沈迷之域名臣長者締玉珮于銀庭苦女靈姬落金環于寶地貪機霧滌法施泉流林衡掄杞梓之材班匠獻鈞繩之巧望逺連規攀澄襲矩張文成滄州弓高縣實性寺釋迦像碑妙覺常身本無顔色至人垂教遂有形儀開滿月之竒姿韞中天之異相髻銜龍髮頂秀螺文萬印生于瑞手千花發于神足蓮開青目毫光照于四天花艷丹唇頂彩周于十地鵝珠護戒標苦節于堅林龍鏡澄空照真歸于靜域鎔金範素寫雘圖青斫象浦之靈珠瑑龍泉之羽璧鮫人水織競送霜縑蛾客抽絲爭投雪線七重交映百寶莊嚴實相端凝睟容圎備蜂王獻蜜紛飛紫紺之樓龍女持華出入珊瑚之殿諸天獻果芙蓉生寶座之前居士焚香柏葉起金爐之上千軀聖像據六地而揚音八部龍神下三天而奏樂李嶠洛州昭覺寺釋迦牟尼佛金銅瑞像碑百工獻技九牧輸琛瑞雀棲爐仙人鍊火觀祕影于龍窟得真形于鷲山一輪千輻之偉姿七滿八圎之殊相青毛紺髮蓮目晬容珠纓大士登護法之筵金杵神王夾降魔之座罄昆岑之瑤碧窮蜀道之丹青黼繢周施莊嚴具足于時人天盡室法俗傾都衆有稻葉之多地無針鋒之隟並睎玉鏡咸仰珠輪莫不注目虔心稽首禮足慶薝蔔之還嗅悅優曇之更開咸訝難思得未曽有爾乃寶坊四敞銀關雙闢地如龜甲山似龍鱗羽騎銜枚列萬隊而清警天龍按部總八神而環衛威容儼其既肅中外寂而無譁然後借座燈王請飯香士大乘法匠開不住之宗耆儒禮官獻無遮之式傾中藏之寶貨移大官之玉厨衣鉢分行簮居聨事流三川之水未足方油渠酪池興二室之榮疑作雲不能嫓香煙花雨大樂驚于寶剎高幢入于梵宫誦經則上界遙聞彈指則下方俱動用慈悲而行喜捨以清淨而為功德初中之布施寧比其多南北之虛空未量其果方見如來種智化成于天寶之基菩薩慧明利建乎維城之業寧止百千聞法咸蒙離垢億萬同會俱證無生蘇頲唐長安西明寺塔碑約身利牧維忍辱之行全信役仁守毗尼之律明猶染壘壑比持綖摧伏魔障弼成學徒張説荆州玉泉寺大通禪師碑仰佛日之再中慶優曇之一現然處都邑婉其祕旨每帝王分座后妃臨席鴛鷺四匝龍象三繞時熾炭待礦故對默而心降時診飢投味故告約而義領一雨溥霑于衆緣萬籟各吹于本分非夫安住無畏應變無方者孰能至爾乎三界火心四部氷背元黃之潤州江寧縣瓦棺寺維摩詰畫像碑毛孔之內鼓大海之波濤芥子之中鬱須彌之巘崿擲世界于恆沙之外不覺不知攝高堂于大會之前同瞻同仰嵐風動地口吸莫以為難猛火燃天腹一作腸貯但聞其一由是騁自在之力縱無礙之威破煩惱而繫慳貪斬毒蛇而擒醉象朦憧暫建面縛四魔智劔才揮心降六賊故使波旬震讋不能變帝釋之容外道摧殘不能竊真如之業若乃上棟下宇空寂為輪奐之資淨服名衣慙愧入裁縫之用開八正之路則衆馬交馳坐四禪之牀則身心不動智惠之果秋繁無漏之林淨妙之花春發總持之苑禪悅為味詎假珍羞解脫充漿寧思玉液奏法音之樂則絲竹藏聲燒異品之香則栴檀罷郁岑勛西京千福寺多寶佛塔感應碑夜夢諸佛覺而有娠是生龍象之徴無取熊羆之兆誕彌厥月炳然殊相岐嶷絶于葷茹齠齔不為童逰道樹萌芽聳豫章之楨幹禪池畎澮涵巨海之波濤舟遷夜壑無變度門劫算墨塵永垂貞範譬滿月麗天螢光列宿山王映海蟻垤羣峰李雍大唐泗州臨淮縣普光王寺碑德水五瓶霑濡紫極甘露一斗福潤蒼生李華杭州餘杭縣龍泉寺故大律師碑至若齋場星列談座雲繞四衆仰山王之髙萬里赴龍宫之會逺夷逾海而來聽長老順風而請益至仁生滅至辨成簡判析疑問若陽和解氷𢎞敷妙理如止水觀月化童蒙為上智伏我慢為調柔引諸佛戒定之池浴衆生輕重之垢垢自流去池常湛然儒墨者般若之笙簧詞賦者伽陀之鼓吹李華荆州南泉大雲寺故蘭若和尚碑質孤晴山神瑩澄海妙聲宣布而剛強悽感慈眼運照而濁惱清涼李華潤州天鄉寺故大德雲禪師碑南方以殺害為事北方多豪右犯法故大通在北能公在南至慈救愍曲無不至其餘則澄公威神止石羯之虐惠始定力悛赫連之暴淨檢尼部之初曇柯律藏之始道安垂範羅什詮譯惠逺道生闡教于廬匡杯渡寶志著異于江浙吕溫南嶽彌陀寺承逺和尚碑七尺全軀峨岷與瞻教之狀九漏懸解江漢資清淨之源蘇頲唐河南龍門天竺寺碑每熙春載陽具物和暢此都人士則填城隘陌自北而南遺光相涉羣聽相接震聞乎數十里外無不舉袂隂峰揚橈沸水潔誠而往修禮而去王維大唐大安國寺故大德淨覺師碑銘禪師嘆曰昔我太師尚以菩提釋位今我小子欲以恩澤為侯仁逺乎哉行之即是裂裳裹足以宵遁乞食糊口以兼行入太行山削髮受具尋某禪師故蘭若居焉猛虎舐足毒蛇熏體山神獻果天女散花淡爾宴安曾無喜懼先有涸泉枯柏至是布葉跳波東魏神泉應焚香而匆湧北天衆果候飛錫而還生禪枝必復之徴法水再興之象聞東京有頥大師乃脫履户前摳衣座下天資義性半字敵于多聞宿植聖胎一瞬超于纍劫九次第定乘風雲而不留三解脫門揭日月而常照雪山童子不顧芭蕉之身雲地比丘欲成甘蔗之種大師委運遂廣化緣海澄而龍額珠明雷震而象牙花發外家公主長跪獻衣薦紳先生却行擁篲乞言于無説請益于又損天池杯水遍含秋月之輝草葉樹根皆霑宿雨之潤不窺世典門人與宣父中分不受人爵廪食與封君相比至于律儀細行由來護持經典深宗毫釐剖析窮其二翼即入佛乘趣得一毛亦成僧寶于是同凡現疾處順將終忽謂衆人有疑皆問我于是夜當入無餘開口萬言音和水馬踴身七樹光映天人如暫如行泯然趺坐香油細㲲用以茶毗合璧連珠為之葬具城門至于谷口幡蓋相連法侣之與都人縞素相半叩膺拔髮灑水坌塵升堂入室之徒數踰七十破山澍海之哭聲振三千或行如白雪或名詎紅蓮或為勝鬘夫人或稱毗邪居士二空法外何處進求七覺分中誰當決釋猶依舍利冀獲菩提身塔不出虎溪淚碑有同羊峴王維能禪師碑舉足下足長在道場是心是情同歸性海商人告倦自息化城窮子無疑直開寶藏泉館卉服之人去聖歷劫塗身穿耳之國航海窮年皆願拭目于龍象之姿忘身于鯨鯢之口駢立于戶外趺坐于牀前林是栴檀更無雜樹花惟薝蔔不嗅餘香皆以實歸多離妄執九重延想萬里馳誠思布髮以奉迎願叉手而作禮則天太后孝和皇帝並敕書勸諭徴赴京城禪師子牟之心敢忘鳯闕逺公之足不過虎溪固以此辭竟不奉詔遂送百衲袈裟及錢帛等供養天王厚禮獻玉衣于幻人女后宿因施金錢于化佛尚德貴物異代同符彈指不留水流燈熖金身永謝薪盡火滅山崩川竭鳥哭猿啼諸人唱言人無眼目列郡慟哭世且空虛擇吉祥之地不待青烏變功德之林皆成白鶴故能五天重迹百越稽首修蛇雄虺毒螫之氣銷跳殳彎弓猜悍之風變畋漁悉罷蠱鴆知非多絶羶腥效桑門之食悉棄罟網襲稻田之衣梁王巾頭陀寺碑文彼岸者引之于有則高謝四流推之於無則俯𢎞六度名言不得其性相隨迎不見其終始不可以學地知不可以意生及宅生者緣業空則緣廢存軀者惑理勝則惑亡于是民以悅來工以心競亘丘被陵因高就逺層軒延袤上出雲霓飛閣逶迤下臨無地夕露為珠網朝霞為丹雘九衢之草千計四照之花萬品崕谷共清風泉相渙金姿寶相永藉間安息心了義終焉遊集宋劉辰翁趙良傑落髮題度牒疏五陵蕭索覺空門氣味之長十地逍遙在一宅塵勞之外然雖如是未免有求蓋摩頂放踵而悲絲須榨蔗摶泥而成佛聞説諸方善誘尚參一語全題鎮州蘿蔔濮州鐘何須刻削仰山藤條德山棒一任承當趙抃定業禪院請慧覺長老住持開堂疏夫如來法無異同衆生根有利鈍上焉者純一不雜下焉者餘二非真大慈則舍實從權頓悟則離凡即聖舉黃葉則小兒之啼暫止詢白練則先師之意愈明古有宗門今傳法要覺師長老機先電事行企山高輟由鷲嶺之禪林來應龜城之使旨門外榜子湖之犬神力復興堂中示南山之蛇禪魔競伏道術部藝術唐何據射楊葉百中賦寢石遇而洞啓蹲甲徹而激勢張友正射已之鵠賦啼猿散繞飛鴈雙中白居易射中正鵠賦及夫觀者坌入射者挺立矢既挾弓既執抗大侯次決拾指正則掌內必取料鵠乃彀中所及雕弧乍滿當晝而明月彎彎銀鏑忽飛不夜而流星熠熠其一發也騞若徹札其再中也􅚹如貫笠玉霜降而弓力調金氣徑而弦聲急恢羣心而踴躍駭衆目而翕習若然者安知不能空彎而鴈落虛引而猿泣者也隋薛道衡和許給事善心戲場轉韻詩京洛重新年復屬月輪圎雲間璧獨轉空裏鏡孤懸萬方皆集會百戲盡來前臨衢車不絶夾道閣相連驚鴻出洛水翔鶴下伊川艷質回風雪笙歌韻管絃佳麗儼成行相携入戲場衣類何平叔人同張子房髙髙城裏髻峩峩樓上粧羅裙飛孔雀綺帶垂鴛鴦月映班姬扇風飄韓夀香竟夕魚負燈徹夜龍銜燭歡笑無窮已歌吹還相續羌笛隴頭吟胡舞龜茲曲假面飾金銀盛服搖珠玉宵深戲未闌競為人所歡臥馳飛玉勒立騎前銀鞍縱橫既躍劔揮霍復跳丸抑揚百獸舞盤跚五禽戲狻猊弄斑足巨象垂長鼻青羊跪復跳白馬回旋駛忽見羅浮起俄看鬱島至峰嶺既崔嵬林叢亦青翠麏麚下騰倚猴猿或蹲跂金徒列舊刻玉律動新灰甲荑垂陌栁殘花散苑梅繁星漸寥落斜月尚徘徊王孫猶勞戲公子未歸來共酌瓊蘇酒同傾鸚鵡杯普天逢盛日兆庶喜康哉唐元稹酬段丞與諸碁流會宿弊居見贈詩鳴局寧虛日間窗任廢時琴書甘盡棄園井詎能窺運石疑填海爭籌憶坐帷赤心方苦鬬紅燭已先施蛇勢縈山合鴻聨度嶺遲堂堂排直陳衮衮逼羸師懸劫偏深猛回征特險巇旁攻百道進死戰萬般為異日玄黃隊今宵黑白碁斫營看一點對壘重相持善敗雖稱怯驕盈最易欺狼牙當必碎虎口禍難移乘勝同三捷扶顛望一搘希因送目便敢恃指蹤竒退引防邊䇿雄吟斬將詩眠牀都浪置通夕共忘疲曉雉風傳角寒叢雪墮枝繁星收玉版殘月耀氷池僧請聞鐘粥賔催下藥巵獸炎餘炭在臘淚短光衰俯仰嗟陳迹殷勤卜後期公私牽去住車馬各支離分作終身癖兼從是事隳此中無限興唯怕俗人知盧藏用折滯論夫環城自守接陳重圍無關地形不乖天道若兵強將智粟積城堅雖復屢轉魁剛頻移太歲坐推白武行計貪狼自符雞鬬之祥多移蟻附之困故曰任賢使能則不時日而事利法審令正則不卜筮而事吉養勞貴功則不禱祀而得福此所謂天時不如地利地利不如人和故太公犯雨逆天時也韓信背水乖地利也並存人事俱成大業削樹而斬龎涓舉火而屠張郃未必暗同嵗德冥會日逰俱運三門並占四殺杜郵齒劍抑惟計沮垓下悲歌實階刓印若以並資厭勝不事良圗則長平盡坑固須恆濟襄城無噍亦可常保是知拘而多忌終喪大功百姓與能必違小數金雞樹上一作玉鶴方為楚國之殃萬畢枕中適搆淮南之禍刻符止一作指盜反更亡身被髮邀神翻招夷族吁嗟威斗占星不禳赤伏之運築城斷岡何救素靈之哭火災不驗禆竈無力以窺天超乘階凶王孫取監于觀德古儷府卷八
