body:
  text: 古儷府卷十明王志慶編武功部論兵唐李商隠為李貽孫上李徳裕啟既赫斯而貽怒乃密勿以陳謀管氏將来屢發新柴之井留侯每入便聞借箸之籌羣帥受成中樞獨運前軍露板方事於羽馳清禁夀觴旋聞於月捷仍其貴種慕我華風或辨姓冩誠推諸右校或釋兵伏義列在周廬潞子離狄而春秋書徐夷朝周而大雅詠其餘􅍪驚烏散風去雨還亘絶漠以銷魂委窮沙而喪膽胡琴公主已出於襜襤毳幕天驕行遺其湩酪向若非薛公料敵先陳三䇿充國為舉甞通四夷則何以雪髙廟稱臣之羞全肅祖復京之好此廟戰之功一也袁熈因累葉之資衛朔拒大君之詔人將自棄鬼得而誅蛙覺井寛蟻言樹大招延輕險曾微呉國之錢藏匿罪亡又乏江陵之粟所謀者河朔遺事所恃者巖險偷生今則趙魏俱攻燕秦併入奉規於帷幄遵命於指縱亞夫拒呉驚東南而備西北韓信擊魏艤臨晉而渡夏陽百道無飛走之虞一縷見傾危之勢計其反接當不踰時是則陳曲逆之六䇿翻成屑屑葛武侯之八陳更見區區此廟戰之功三也王勃上劉右相書昔明王之制國也自近而及逺先仁而後罰徴實則效存徇名則功淺是以農疏千里僅踰重石之鄉禹截九州不叙流沙之境豈才不及而智有遺哉將以辨離方而存正功也雖聖人無外甲兵曜天子之威王事有征金鼓發將軍之氣而長城在界秦漢所以失全昌巨海横流天地所以限殊俗闢土數千里無益神封勒兵十八萬空疲帝卒驚烽走𫝊駭秦洛之甿飛芻挽粟竭淮海之費於是乗奸放命者出繩纒以生威因公挾私者入閭閻而競法雖一物失所太階延旰食之憂而百戰方雄中國鮮終年之樂圖得而不圖失知利而不知害移手足之病成腹心之疾征税屈於東西威信蹇於表裏語曰勝之不武不勝為辱天下之責四而至矣誠可逺凝髙䇿上薦忠言决人事於去就合天情於終始遂令囬麾轉檄背青韭而騖列障分亭廵蒼波而守昔者齊侯以力方城為楚國之辭虞帝崇文苗人失洞庭之險况乎伏徳綏亂以直乗邪明逆順之端聳華夷之望雖復舳艫沸海旌旗觸天鐡山四面金城千里亦不能為敵人計矣沈諒賢良方正䇿大哉武之為功赫矣師之所處象震耀而舉垂雲雷以揚宣威而山河蕩容訓誓而煙塵動色武功部講武唐胡瑱大閲賦長楊草落鄠杜霜明既不虞而作式亦因狩而治兵大田獲之以三品和門樹之以兩旌抱木之猿見矯矢而遙泣傷弦之鴈聞虚弓而已驚且夫設席張幕蒙盾負羽獸之大小既公私而殊獲野之險易亦人車而各主遵蘭防而合禮罷艽野而作鎮李子卿飲至賦蒲海長清匈奴已聞於㫁臂槀街初列戎王正見於懸首舞干且在於舜階挾纊更聞於堯酒喬彛立走馬賦輪寶刀以直視拔長劍而端揖奔鯨絶海旋巨浪以尚遲餓鶻翻身冩長風而未急於是神仙惝恍鬼怪呼吸擺金甲而作寒噴玉花而半濕膂力既剛雄鋒莫當擲紅旌以顛倒按白刄以熒煌霍穫禾火滅沒離披頡䀪引山河之奔走隨簸蕩以低昻雲旗一簸翻古塞而半飛畫㦸雙盤冩長風而自冷王起轅門射㦸枝賦若嗤同失鵠我藝自忝其疊雙儻妙等麗龜爾心固宜乎如一蹲甲非敵措杯不倫梁沈約從齊武帝瑯琊講武應詔詩九功播祧墠七徳陳武懸展事昌國圖息兵由重戰皇情咨閲典出車迨辰選飾徒映寒隰翻綏臨廣甸颯㳫佩呉戈參差腰夏箭風斾舒復卷雲霞清以轉輕舞信徘徊前歌且遥衍秋原嘶代馬朱光浮楚練虹壑冩飛文巖阿藻餘絢發震岳靈從揚旌水華變憑髙訓武則中天起遐眷鳳葢掩洪河珠旗掃長汧方待翠華舉逺適瑤池宴周庾信從駕觀講武詩校戰出長楊兵欄入鬬場置陣横雲起開營鴈翼張門嫌磁石礙馬畏鐡菱傷龍淵出牛斗繁弱駭天狼落星奔驥騄浮雲上驌驦急風吹戰鼔髙塵擁貝裝駭猿時落木驚鴻屢㫁行樹寒條更直山枯菊轉芳豹畧推全勝龍韜揖所長小臣欣寓目還知奉㑹昌唐李嶠奉和杜員外扈從教閲詩杪冬嚴殺氣窮紀送頽光薄狩三農隙大閲五戎場萊田初起燒蘭野正開防夾岸虹旗轉分朋獸罟張燕弧帶曉月呉劍動秋霜原啟前禽路山縈後騎行雲區墜日羽星苑斃天狼禮振軍容肅威宣武節揚神心體殷祝靈兆叶姬祥幸陪仙駕末欣採翰林芳宋之問為人讓羽林將軍表天衛嚴凝北軍清切風霜劍騎頓𤣥武之仙闈龍鳥旌旗環紫微之帝座孫逖伯樂川記戈如林羽若月少長有禮賔主不悖蚩尤衂其五兵若敖慙其六卒洸洸乎信可以慴穹廬而震髙闕也於是地主致餼以昭饗宴之禮君子有儀以訓上下之則歌蔓草之相遇笑投壺之失辭大庖既盈釃酒有藇胥樂周於卒乗屬厭及於輿臺獨孤及風后八陣圖記乃有力吞八荒爭截九有大者天柱折地維絶小者作慝盧山負阻中冀上帝憑怒下土是恤乃眷武徳黄帝受之始順殺氣以作兵法文昌以命將於是乎征不服討不庭其誰佐命曰元老風后葢戎行之不修則師律用爽隂謀之不作則凶器何恃故天命聖者以廣戰術俾懸衡於未然察變於竒獸集作倚數握機制勝作為陣圖夫八宫之位正則數不愆神不忒故八其陣所以定位也衡抗於外軸布於内風雲附其四維所以備物也虎翼張以進蛇向敵而蟠飛龍翔鳥上下其勢所以致用也至若疑兵以固其餘地遊軍以按其後列門具將發然後合戰弛張則二廣迭舉犄角則四竒皆出必使陷堅陣拔深壘若星馳天旋雷動山破彼魏之鶴列鄭之魚麗周武之熊羆昆陽之虎豹出匪以律我異於是既而圖成樽俎帝用經畧北逐獯鬻南平蚩尤戡黎於版泉省方於崆峒底定萬國旁羅七曜鼎成龍至去而上僊於是遺風𡨕𡨕時亡而圖在符載保安鎮陣圖記紅旗拉風長㦸如倚晨暮三接朱殷谿瀆武功部田獵漢司馬相如上林賦列卒滿澤罘網彌山掩兔轔鹿射麋脚麟騖於鹽浦割鮮染輪射中獲多矜而自功楚王乃駕馴駁之駟乗雕玉之輿靡魚鬚之撓旃曳明月之珠旗陽子參乗孅阿為御按節未舒即凌狡獸蹵蛩蛩轔巨虚軼野馬􅗗騊駼乗遺風射遊騏弓不虚發中必決眥洞胸逹掖絶乎心繫於是離宫别館彌山跨谷髙廊四注重坐曲閣華榱璧璫輦道纚屬步櫩周流長途中宿俛杳眇而亡見仰攀橑而捫天奔星更於閨闥宛虹拖於楯軒背秋涉冬天子校獵乗鏤象馭玉虬拖蜺旌靡雲斿前皮軒後道游孫叔奉轡衛公驂乗扈從横行出乎四校之中江河為阹太山為櫓車騎雷起殷天動地生貔豹搏豺狼手熊羆足野羊箭不茍害解脰陷腦弓不虚發應聲而倒然後侵淫促節儵夐逺去流離輕禽蹵履狡獸擇肉後發先中命處拂鷖鳥捎鳳凰捷鵷雛掩鷦䳟蹷石闕歴封巒過鳷鵲望露寒下棠梨息宜春西馳宣曲濯鷁牛首登龍臺掩細栁於是遊戲懈怠置酒乎顥天之臺張樂乎膠葛之㝢撞千石之鐘立萬石之虡建翠華之旗樹靈鼉之鼓奏陶唐氏之舞聽葛天氏之歌千人唱萬人和巴渝宋蔡淮南干遮文成顛歌族居遞奏金鼔迭起鏗鏘闛􅝅洞心駭耳荆呉鄭衛之聲韶濩武象之樂隂淫案衍之音鄢郢繽紛激楚結風若夫青琴宓妃之徒絶殊離俗妖冶嫺都靚粧刻飾嫵媚孅弱皓齒燦爛宜笑的皪色授魂與心愉於側酒中樂酣天子曰嗟乎此大奢侈於是歴吉日以齋戒襲朝服乘法駕建華旗鳴玉鑾遊於六藝之囿馳騖仁義之途修容乎禮園翺翔乎書圃揚雄羽獵賦荷垂天之罼張竟野之罘靡日月之朱竿曳彗星之飛旗渙若天星之羅浩如濤水之波淫淫與與前後要遮立歴天之旗曳捎星之旃霹靂列缺吐火揚鞭車騎雲㑹登降闇藹泰華為旒熊耳為綴木仆山還漫若天外於是鳥不及飛獸不得過軍驚師駭刮野掃地禽殫中衰相與集於靖𡨕之館以臨珍池灌以岐梁溢以江河東瞰目盡西暢亡涯隨珠和氏焯爍其陂方椎夜光之流離剖明月之胎珠班固東都賦由基發射范氏施御弦不睼禽轡不詭遇飛者未及翔走者未及去指顧倐忽獲車已實樂不極盤殺不盡物馬踠餘足士怒未㳿又西都賦爾乃盛娯遊之壯觀奮大武乎上囿因兹以威戎夸狄耀威靈而講武事命荆州使起鳥詔梁野而驅獸毛羣内闐飛羽上覆接翼側足集禁林而屯聚水衡虞人修其營表種别羣分部曲有署罘網連紘籠山絡野列卒周匝星羅雲布於是乗鑾輿備法駕帥羣臣披飛亷入苑門遂繞酆鄗歴上蘭六師發逐百獸駭殫震震爚爚雷奔電激草木塗地山淵反覆蹂躪其十二三乃拗怒而少息爾乃期門佽飛列刄攅鍭要趹追蹤烏驚觸絲獸駭值鋒機不虚掎弦不再控矢不單殺中必疊雙颮颮紛紛矰繳相纒風毛雨血洒野蔽天平原赤勇士厲猨狖失木豺狼懾竄禽相鎮壓獸相枕藉然後收禽㑹衆論功賜胙陳輕騎以行炰騰酒車以斟酌割鮮野食舉烽命釂應瑒西狩賦乃擇吉日練嘉辰清風矢戒屏翳收塵於是魏公乃乗雕輅駟飛黄擁簫鉦建九斿按轡清途颯沓風翔於是圍網周合雷鼓天振千乘長羅萬表星陳雙翼抗旌八校祖分長燧電舉髙烟蔽雲爾乃徒輿並興方軌連質驚飈四駭衝禽驚溢騁獸塞野飛鳥蔽日爾乃赴𤣥谷陵崇巒俯掣奔猴仰捷飛猿雲幕被於廣野京燎照乎平原醴炰充給洪施普宣魏王粲羽獵賦旌旗雲繞鋒刄林錯揚輝吐火曜野蔽澤山川於是搖蕩草木為之摧撥禽獸振駭魂亡氣奪舉首觸網搖足遇撻陷心裂胃潰腦破頰鷹犬競逐奕奕霏霏下鞲窮緤搏肉噬肌墜者若雨僵者若坻清野滌原莫不殱夷唐路季登皇帝冬狩一箭射雙兔賦若乃整鈎陳嚴羽衛星旄燭野雲旗拂曀周長楊而為阹屬甘泉以為綴騁六龍而電發顧雙兔而飇逝性毚狡而不恭足輕迅而靡制爰從聖射乃觀神藝鑾鑣却轉引柘月而隨圓金鏃斜飛疊霜毫而俱斃既絶系而達臆亦洞胸而裂背岐陽之美不獨稱於周王上林之雄未可論於漢帝蘇頲扈從鳳泉和崔黄門喜恩㫖解嚴罷圍詩輦路岐山曲儲胥渭水濵教成提將鼓禮備植虞旗不取從畋樂先流去殺詞舜韶同舞日湯祝盡飛時物應陽和施人知雨露私如何穆天子七萃幾勞師晉張協七命若乃白商素節月既授衣天凝地閉風厲霜飛柔條夕勁密葉晨稀將因氣以效殺臨金郊而講師爾乃列輕武整戎剛建雲髦啟雄芒駕紅陽之飛燕驂唐公之驌驦屯羽隊於外林縱飛翼於中荒爾乃布飛羉張修罠凌黄岑挂青巒畫長壑以為限帶流谿以為闗既乃内無䟽蹊外無漏跡叩鉦散校舉麾贊獲彀金機馳鳴鏑翦剛豪落勁翮連騎競騖駢武齊轍翕忽揮霍雲逥風烈聲動響飛形移影發舉戈林聳揮鋒電滅仰傾雲巢俯殫地穴乃有圓文之豜斑題之豵鼓鬛風生怒目電瞛口齩霜刄足撥飛鋒齀林蹶石扣拔幽叢於是飛黄奮鋭賁育逞伎䠞封狶㩌馮豕拉甝虪挫獬廌鉤爪摧踞牙捭瀾漫狼藉傾榛倒壑隕胔挂山僵踣掩澤藪為毛林隰為丹薄於是徹圍頓網卷斾收鳶虞人數獸林衡計鮮論最犒勤息馬韜弦肴駟連䮽酒駕方軒千鍾電釂萬燧星䌓陵阜沾流膏谿谷厭芳烟歡極樂殫逥節而旋後漢傅毅七激駟驥騄乗輕軒麾旄旗鳴八鸞陳衆車於廣隰散列騎乎平原屬罘網以彌野連罻羅以營山部曲周匝風動雲旋合圍促陣禽獸駭殫仆不暇起窮不及旋擊不待刄骨解肉離摧牙碎首分其文皮流血丹野羽毛翳日於是下蘭臯臨流泉觀通谷望景山酌㫖酒割芳鮮魏曹植七啟駕雲龍之飛駟飾玉輅之繁纓垂宛虹之長緌抗招搖之華旌於是曳文狐掩狡兔捎鷫鸘拂振鷺當軌見藉值足遇踐飛軒電逝獸随輪轉騰山赴壑風厲飇舉形不抗手骨不隠拳野無毛類林無羽羣積獸如陵飛翮成雲梁何遜七召嵗晩農休時閒務隙山火已燎野霜初白聊效殺於秋冬乃從禽於艸澤蜀地五丁齊國二子氣動山漂汗揮雨起渥洼流赬蘭池照血躡飛影於未形赴奔星於欲滅革車隠隠轂騎闐闐鼔噪喧而振地烝徒駭而聒天割玉之刀飲石之箭罝羅布其一目網罟周及三面犬號驤螭鷹名奔電蹔離已合忽隠仍見赴逈超危衝林䟦援草隨足起山從眼轉跨躡岡澗電舉陵陸鳥不及飛獸不遑伏既前轥而後赴亦左排而右蹴蹠實駭而自救騰虚亂而相撲視灑血之丹地見飛毛之暗目傍窮刼剞勢極搜求文皮坐裂膬尾生抽手覊鐡頂足批銅頭象折牙而陵遽貊拉齒而夷猶擒髙樓之度索走大樹之神牛雁聞弦而蹔墜猨抱木而啾啾笑楚王之雲夢恥漢帝之中流昭明太子七契輕繳纔飛則連鴻解羽微纎始放則並鱗失波豈論𤣥泉之則寧願將遨之歌武功部征伐魏陳琳神武賦建安十有二年大司空武平侯曹公東征烏丸六軍被介雲輜萬乘治兵易水次於北平可謂神武奕奕有征無戰者也佇盤桓以淹次乃申命而後征覲狄民之故土追大晉之遐踪惡先縠之懲寇善魏綘之和戎受金石而弗伐葢禮樂而思終陵九城而上濟起齊軌乎玉繩車軒轔於雷室騎浮厲乎雷宫暉曜連乎白月旂旐繼於電光斾既軼乎白狼殿未出乎盧龍威逼天地勢括十衝單鼓未伐虜已潰崩克俊馘首梟其魁雄爾乃總輯瓌珍茵氈幕幄攘瓔帶佩不飾彫琢華璫玉瑤金麟牙琢文貝紫瑛縹碧𤣥緑黼錦繢組罽毼皮服又武軍賦漢季世之不辟青龍紀乎大荒熊狼競以挐攫神寳播乎鎬京於是武臣赫然颺炎天之隆怒呌諸夏而號八荒爾乃擬北落而樹表睎壘壁以結營百校羅峙千部列陳彌方城掩平原於是啟明戒旦長庚告昏火烈具舉鼔角並震千徒從唱億夫求和聲訇隠而動山光赫奕以燭夜其刄也則楚金越冶棠谿名工清堅皓鍔修刺鋭鋒陸陷蘂犀水截輕鴻鎧則東胡闕鞏百煉精剛函師振旅韋人制縫弩則幽都筋角恒山檿榦通肌暢骨崇緼曲煙其弓則烏號越耗繁弱角端象弭繡質哲拊文身矢則申息肅慎箘簵空疏焦銅毒鐡麗轂撻輈馬則飛雲絶景直鬐騧駵駁龍紫鹿文的􅟩魚若乃清道整列按節徐行龍姿鳳峙灼有遺英魏繁欽征天山賦素甲𤣥燄皓旰流光左駢雄㦸右攅干將彤玈朱矰丹羽絳房望之如火燄奪朝陽華旗翳雲霓聚刄曜日鋩於是轒輼雲趨威弧雨發鉦鼔雷鳴猛火風烈躍刄霧散虜鋒摧折呼吸無聞醜類剥滅晉左思魏都賦至乎勁敵糺紛庶土罔寧聖武興言將曜威靈介胄重襲旌旗躍莖弓珧解檠矛鋋飄英三屬之甲縵胡之纓控弦簡發妙擬更嬴齊被練而銛戈襲偏裻以䜋列畢出征而中律執竒正以四伐碩畫精通目無匪制推鋒積紀鋩氣彌鋭三接三㨗既晝亦月尅剪方命呑滅咆咻雲撤叛換席卷䖍劉祲威八紘荒阻率由洗兵海島刷馬江洲振旅䡘䡘反斾悠悠凱歸同飲疏爵普疇朝無刓印國無費留梁沈約憫國賦育素蟣於𤣥胄垂葆髪於縵胡王筠侍宴餞臨川王北伐應詔詩金版韜英玉牒藴精帝徳乃武王威有征軒習弧矢夏陳干戚周騖戎車漢馳羽檄我皇駿聖千年踵武徳洞千門威加八柱金正圮徳水行失道駟馬南牧戎徒西保荐食伊瀍整居豐鎬金闕揚塵銅臺茂草命彼膳夫受詔恊律樂賦出車絃操吉日玉饌駢羅瓊漿泛溢聖徳温温賔儀秩秩周庾信奉報寄洛州詩舟師㑹孟津甲子陳東隣雷轅驚戰鼔劍室動金神幕府風雲氣軍門闗塞人長旍析鳥羽合甲抱犀鱗星芒一丈焰月暈七重輪黎陽水稍緑官渡栁應春無庸奉天睠驅傳牧南秦繁詞勞簡牘雜俗弊風塵上洛逢都尉商山見逸民留滯終南下唯當一史臣庾信奉報趙王出師在道賜詩上將出東平先定下江兵彎弧伏石動振鼔沸沙鳴横海將軍號長風駿馬名雨歇殘虹㫁雲偏一鴈征暗巖朝石濕空山夜火明低橋澗底渡狹路花中行錦車同建節魚軒異伯榮軍中女子氣塞外夫人城小人乖攝養岐路阻逢迎幾月芝田熟何年金竈成哀笳闗塞曲嘶馬别離聲王子身為寶深思不倚衡唐李嶠軍師凱旋自邕州順流舟中詩鳴鞞入嶂口汎舸歴川湄尚想江陵陣猶疑下瀨師岸逥帆影疾風送鼔聲遲萍葉沾蘭槳林花拂桂旗弓鳴蒼隼落劍動白猿悲芳樹吟羌管幽篁入楚詞全軍多勝䇿無戰在明時寄謝山東妙長纓徒自期沈佺期夏日都門送司馬員外逸客孫員外佺北征詩二庭追虜騎六月動周師廟畧天人授軍麾相國持復言徴二妙才令重當時畫省連征橐横門共别詞雲迎出塞馬風卷渡河旗計日方夷寇旋聞杕杜詩又李乂詩日逐滋南寇天威撫北垂析珪行仗節持印且分麾羽檄雙鳬去兵車駟馬馳虎旗懸氣色龍劍抱雄雌候月期戡剪經時念别離坐聞闗隴外無復引弓兒唐蘇頲命吕休璟等北伐制莫不運其長䇿悉心而効六竒接以短兵指掌而論七縱使天陣齊舉雲罝備設賈勇於飲醪之夫一以當萬揚威於汗血之騎左縈右拂咸繫黿斬蛟曳牛佩豕必能力簸窮海聲壓大荒刈谷蠡之庭拔祅渠之壘不遑渭橋之拜已見隂山之哭又命姚崇等北伐制統燕犀冀馬之雄屯斬蛟繫黿之勇鼓鼙沸野旌旗彗雲豈式遏於河塞方震驚於沙漠於是乎善醪以信之芳餌以賞之戮揚干之僕必行其令持穰苴之兵不枉其法堅壁清野則投石而有餘追奔逐北則掃塵而無類又命薛納等伐黙啜制呉鈎楚練照曜隂山之峯冀馬燕犀張皇窮漠之地梁劉孝儀臨川王奉詔班師表臣自受脤廟堂申威塞表既驅熊羆之衆兼稟帷幄之謀登濟河山夷滅趙魏將繫軹道之頸且屈渭橋之膝而𤣥隂届節祁寒方始降此慈𢎞愍兹介胄使燕然之石願勒而不刋函谷之土將封而莫遂雖荷杕杜之恩終慙采薇之㫖宋唐庚賀進築表臣竊以要荒之叛服係乎制馭之是非有蠢西羌久羈天討當元豐之願治將議剪除逮元祐之偷安務從姑息養成其惡以迄於今屬神聖之嗣興起師徒而進築逺攻近取日削月侵城堙漸逼其腹心刁斗相聞於巢穴天都形勝既歸掌握之中靈武勢孤自有唇亡之懼楊億駕幸河北起居表毳幕稽誅鑾輿順動羽衛方離於象魏天威已震於龍荒慰編甿徯后之心增壯士平戎之氣臣聞涿鹿之野軒皇所以親征單于之臺漢帝因之耀武用消弭於侵侮遂底定於邊陲五材並陳葢去兵之未可六龍時邁因犯順以必誅矧朔漠揚氛窮荒恃險敢因膠折之候輙為鳥舉之謀固已命將出師擒俘獻馘雖奪名王之帳未焚老上之庭是用親御戎車躬行天討勞軍細栁之壁巡守常山之陽師人多寒感恩而皆同挾纊匈奴未滅受命而孰不忘家行當肅靜邊垣削平夷落梟冒頓之首收督亢之圖使遼陽八州之民得聞聲教榆闗千里之地盡入提封蛇豕之穴悉降干戈之事永戢齊王融勸髙帝北伐啟雖窮鳥必啄固等命於良鶉困獸斯騖終並懸於厨鹿若藉巫漢之歸師騁士卒之餘憤取函河如反掌凌闗塞若摧枯後漢班固竇將軍北征頌於是雷震九原電曜髙闕金光鏡野武旗冒日衝雞鹿超黄磧輕選四縱所從莫敵唐薛稷應臨難不顧徇節寧邦科䇿第二道持人之術地著為本應敵之道糗糧為先故李悝盡地力而創謀本能强魏衛鞅開阡陌而急戰終以霸秦當今三壤既平九税有職倉庾陳積秷秸充牣山川効正而咸叙隂陽感化而致和狡戎黠羌不討之日久矣天有星象以分其區地有山河以致其險素野遐曠𤣥國寒凉塞下三春未辨重重之樹河邉九月已落青青之草吾后惻隠巖廊之下垂拱祍席之上聖智備天地神武動山岳悠然逺覽白露凉秋建日月朱鳥之旗樹風雨蒼龍之斾將帥良猛謀慮深長猶重息人未修伐鬼而彊梁無檢時驚邊柝定逺侯之功畧還出玉門戊校尉之七營更連金郡麻奴小醜敢懐凌斥之心榆鬼殘祅仍延晷刻之命結山豪而嘯聚驅榖馬而陸梁百萬之師糗糧易盡空磧之地轉餉難集良可追蹤墾草取彼大田修充國之舊圖採威明之逺筭將軍素勵爰興㫁河之術都尉乘强畢盡通溝之利舉農夫而休戰士息轉輸而用耕牛智効其謀勇奮其力資窖金之如粟藉邊馬之如羊賞士犒師選騎館穀或休垣罷障城滅途殫然後坐鳯凰之臺驗麒麟之貢王旅凱入豈不休哉祖君彦檄洛州文遼水之東朝鮮之地禹貢以為荒服周王棄而不臣示以羈縻達其聲教茍欲愛人非求拓土又强弩末矢不能穿於魯縞衝風餘力非敢動於鴻毛石田得而無堪雞肋食而奚用恃衆怙强窮兵黷武務在吞併不思長䇿夫兵猶火也不戢則自焚遂使億兆夷人隻輪莫返夫差喪國實為黄池之盟苻堅滅身良由夀陽之役欲捕鳴蟬於前不知黄雀於後復矢相顧髽吊成行義夫切齒壯士扼腕其罪七也黷武附武功部將畧周王褒從軍行兵書久閑習征戰數曾經講戎平樂觀學戲羽林亭西征度疎勒東驅出井陘牧馬濵長渭營軍毒上涇平雲如陣色半月類城形羽書封信璽詔使動流星對㟁流沙白縁河栁色青將幕恒臨斗旌門常背刑勲封瀚海石功勒燕然銘兵勢因麾下軍圖送掖庭誰憐下玉筯向暮掩金屏又庾信詩河圖論陣氣金匱辨星文地中聞鼔角天上下將軍函犀恒七屬絡鐡本千羣飛梯聊度綘合弩蹔凌汾寇陣先中㫁妖營即兩分連烽對嶺度嘶馬隔河聞箭飛如疾雨城崩似壊雲英王於此戰何用武安君隋陳子良讚徳上越國公楊素詩君侯稱上宰命世挺才英本超騏驥足復藴風雲情攄藻掞錦綺育徳潤瑤瓊已踵四知舉非無三傑名濟世同舟檝匡政本阿衡雍容入青璅肅穆侍丹楹桂宫擅鳴珮槐路獨飛纓髙門羅虎㦸綺閣麗彫甍金罇酌湛湛歌扇掩盈盈匈奴軼燕薊烽火照幽并天子命薄伐受脤事專征七徳播雄畧十萬騁行兵鴈行蔽大漠魚貫出長城交河方飲馬瀚海盛揚旌拔劍倚天外象犀耀日精彎弧穿伏石揮戈斬大鯨鼔鼙朝作氣刁斗夜便鳴六郡多壯士三邊豈足平嶺雲朝合陣山月夜臨營胡塵暗馬色芳樹動笳聲闗雲未盡㪚塞霧常自生川長蔓草緑峰廽雜花明小人愧王氏雕文慙馬卿濫此叨書記何以謝過榮髙山徒仰止終是恨才輕唐張説送趙頥貞郎中試安西副大都䕶詩絶鎮功難立懸軍命匪輕復承遷相後彌重任賢情將起神仙地才稱禮樂英長心堪繫虜短語足論兵日授休門法星教置陣名龍泉㤙已著燕頷相終成月窟窮天逺河源入塞清老夫操别翰承㫖頌營平蘓頲同餞陽將軍兼原州都督御史中丞詩右地接龜沙中朝任虎牙然明方改俗去病不為家將禮登壇盛軍容出塞華朔風搖漢鼓邊月思胡笳旗合無邀正冠危有觸邪當㸔榮旋日及此御溝花杜甫投贈哥舒開府翰詩今代麒麟閣何人第一功君王自神武駕馭必英雄開府當朝傑論兵邁古風先鋒百勝在畧地兩隅空青海無飛箭天山早挂弓亷頗仍走敵魏綘已和戎每惜河湟棄新兼節制通知謀垂睿想出入冠諸公日月低秦樹乾坤遶漢宫胡人愁逐北宛馬又從東受命邊沙逺歸来御席同軒墀曾寵鶴畋獵舊非熊茅土加名數山河誓始終䇿行宜戰伐契合動昭融勲業青𡨕上交親氣槩中未為珠履客已是白頭翁壯節初題柱生涯獨轉蓬幾年春草歇今日暮途窮軍事留孫楚行間識吕蒙防身一長劍聊欲倚崆峒李白送羽林陶將軍詩將軍出塞擁樓船江上旌旗拂紫烟萬里横戈探虎穴三杯拔劍舞龍泉莫道詞人無膽氣臨行將贈繞朝鞭又贈張相鎬詩神器難竊㺯天狼窺紫宸六龍遷白日四海暗紅塵昊穹䧏元宰君子方經綸澹然養浩氣歘起持天鈞秀骨象山岳英謀合鬼神佐漢解鴻門興唐思退身擁旄秉金鉞伐鼔乗朱輪虎將如電霆總戎向東巡諸侯拜馬首猛士騎鯨鱗澤被魚鳥悦令行草木春逢聖不失時建功及良辰醜虜安足紀可貽幗與巾倒㵼溟海珠盡為入幕珍馮異獻赤伏鄧生歘來臻庶同昆陽舉再覩漢儀新昔為管將鮑中奔呉隔秦一生欲報主百代期榮親其事竟不就哀哉難重陳卧病古松滋蒼山空四隣風雲激壯志枯槁驚常倫聞君自天来目張氣益振亞夫得劇孟七國空無人捫虱對桓公願得論悲辛大塊方噫氣何辭鼓青蘋斯言儻不合歸老漢江濵又贈郭將軍詩將軍豪蕩有英威昔掌銀臺䕶紫微平明拂劍朝天去薄暮垂鞭醉酒歸愛子臨風吹玉笛美人嬌月舞羅衣今日相逢俱失路何年灞上弄春輝孟匡明餞王將軍赴雲中詩二師憑廟畧分閫佐元戎勢亞彤弓寵時推金印雄闗山横代北旌節壯河東日轉前茅影春生細栁風飲氷君命速揮涕餞筵空佇聽隂山静誰爭萬里功劉長卿代邊將有懐詩少年辭魏闕白首向沙場瘦馬戀秋草征人思故鄉暮笳吹塞月曉甲帶胡霜自到雲中郡於今百戰强又湖南使還留辭辛大夫詩王師勞近甸兵食仰諸侯天子無南顧元勲在上游大才生間氣盛業拯横流風景隨搖筆山川入運籌羽觴交餞席旄節對歸舟鸎識春深恨猿知日去愁别離花寂寂南北水悠悠唯有家將國終身共所憂又獻寧淮軍節度使相公詩建牙吹角不聞喧三十登壇衆所尊家散萬金酬士死身留一劍答君恩漁陽老將多逥席魯國諸生半在門白馬翩翩春草細邵陵西去獵平原又觀校獵上淮西相公詩龍驤校獵邵陵東野火初燒楚澤空師事黄公千戰後身騎白馬萬人中笳隨曉吹經邊草箭入青雲落塞鴻三十擁旄誰不羨周郎少小有竒功盧綸雪謗後書事上皇甫大夫詩盛徳緫羣英髙標仰國楨獨安巡狩日曾掩趙張名業就難辭寵朝逥更授兵曉川分牧馬夜雪覆連營長策威殊俗嘉謀翊聖明畫圖規陣勢夢筆紀山行綬拂池中影珂搖竹外聲賜歡徴伎樂陪酒間公卿却意經前事翻疑得此生分深存歿感恩在子孫榮覽鏡愁將老捫心喜復驚豈言沈族重但覺殺身輕有淚沾墳典無家集弟兄東西遭世難流浪識交情閲古宗文舉推才慕正平應憐守貧賤又欲事躬耕劉禹錫贈澧州髙大夫司馬霞寓詩前年牧錦城馬踏血泥行千里追戎首三軍許勇名殘兵疑鶴唳空壘辨烏聲一誤雲中繳南遊湘水清韓翃贈劉將軍詩明光細甲照錏鍜昨日承恩拜虎牙膽大欲欺姜伯約功多不讓李輕車青巾校尉遙相許黒矟將軍莫大誇闕下来時親伏奏胡塵未盡不為家韓翃雜言贈哥舒僕射詩萬里長城家一生唯報國腰垂紫艾綬手控黄金勒髙視黒矟翁遙吞白騎賊先麾牙門將轉鬭黄河北帳下親兵皆少年錦衣承日繡行纒轆轤寶劍初出鞘宛轉角弓爭上弦步叉抽箭大如笛前把兩矛後雙㦸左盤右射紅塵中鶻入鵶羣有何敵殺將破軍白日餘逥船舞斾北風初羣公楯鼻好磨墨走馬為君飛羽書耿湋上裴行軍中丞詩胡塵已滅天山外閉閣隂隂日復曛櫪上驊騮嘶鼔角門前老將識風雲旌旗四面髙秋見絲竹千家靜夜聞莫道古来多計策功成唯有李將軍楊巨源贈侯侍御詩步逸辭羣迹機真結逺心敦詩揚大雅映古酌髙音逃禍栖蝸舍因醒解豸簪紫蘭秋露濕黄鶴晩天隂舊葉餘荒草寒山出逺林月明多宿寺世亂重悲琴霄漢時應在詩書道未沈坐期閶闔霽雲暖一開襟又懐徳抒情寄上信州座主詩五馬江天郡諸生淚共垂讌餘明主徳恩在侍臣知悵望緘雙鯉龍鍾假一枝玉峯遥寄夢雲海暗傷離幢葢全家去琴書首路随滄洲值康樂明月向元規鵷鳳終凌漢蛟龍㑹出池蕙香因暖發松色肯寒移舉世瞻風藻當朝揖羽儀加飡門下意溪水緑逶迤又贈隣家老將詩白首羽林郎丁年戍朔方隂天瞻磧落秋日渡遼陽大漠寒山黒孤城夜月黄十年依蓐食萬里帶金瘡拂雪陳師祭衝風立教場箭飛瓊羽合旗動火雲張虎翼分營勢魚鱗擁陣行誓心清塞色鬭血雜沙光戰地晴輝薄軍門曉氣長寇深爭暗襲闗迥勒春防身賤竟何訴天髙徒自傷功成封寵將力盡到貧鄉雀老方悲海鷹衰却念霜空餘孤劍在開匣一霑裳張佑送王昌涉侍御詩十里指東平軍前首出征諸侯青服舊御史紫衣榮入陣梟心死分圍虎力生畫時安楚塞刻日下齊城號令朝移暮偷蹤夜斫營雲梯曾險上地道慣深行舉斾招降將投戈趂敗兵自慙居處者當此立功名楊䕫送張相公出征詩得意在當年登壇秉國權漢推周勃重晉讓趙宣賢儒徳尼丘降兵鈐太白傳援毫飛鳳藻發匣吼龍泉歴火金難耗凌霜桂益堅從来稱玉潔此更讓珠妍鴛鷺臻門下貔貅擁帳前去知清朔漠行不費陶甄獻畫符中㫖推誠契上𤣥願將班固筆書頌勒燕然韋莊贈邊將詩昔因征逺向金微馬出榆闗一鳥飛萬里只携孤劍去十年空逐塞鴻歸手招都䕶新降虜身着文皇舊賜衣只待烟塵報天子壯心無事别無機元閻復丞相阿珠贈諡制鳶瘴揮戈萬里若衽席之上龍驤飛渡三呉歸掌握之中宋汪藻除韓世忠兩鎮節度使麻稟剛故俗甘陳兼六郡之良決勝重圍關張有萬人之敵蚤備師干之試旋膺齋鉞之除豈惟蹇蹇以匪躬每見多多而益善見無禮於君爾既殫於忠藎歸飲至於廟我何愛於寵褒播芳大全韓世忠加恩麻先人有奪人之心進則奮沈雄之畧尚賢無自賢之行退而皆名義之談唐栁宗元為南承嗣請從軍狀臣聞周官考藝國子置車甲之司漢道推恩孤兒備羽林之用千秋思奮於事越仲孺期死於奔呉義激君親名髙竹帛臣雖無似有慕昔人雖身塗草野死而不朽顧雲投西邊節度使啟九天九地之法夜受於神姝金箱金櫃之書曉傳於靈叟故得拔劍龍吼彎弧鴈驚使夷落無喧干戈盡偃邊烽息焰塞柝沈聲為天子之長城㫁匈奴之右臂加以文通三變學洞九流郭璞神毫每通於夢想羅含彩羽素貯於心誠時或月滿青樓風清畫閣謝𤣥暉之理郡不廢謳吟杜元凱之禦戎何妨講讀宋王邁賀陳提刑兼安撫啟披肝許國掉舌籌邊雪衣貂裘慷慨辨太原之檄風聲鶴唳笑談却淮甸之兵草木知其威名夷狄問其年貌屬當鼪鼯之為梗羣然鴻雁之離居嗟懦俗之脂韋伏元戎之斧鉞毅然以身任朝廷責誓不以賊為君父憂卯受命辰即行有崇文之勇決申上奏寅報可從充國之便宜南丹嚴保障之雄西帥習號令之素如毉師之治廢疾半劑而蘇如國手之救危棋一著即活唐張仲宣智合孫呉可以運籌決勝䇿玉弩垂芒耀明威於紫緯金方戒序凝殺氣於丹霄然則負扆登樞規七衡而立辟垂旒御辨法四選以詳刑是故黄運披圖靜妖氛於涿鹿丹陵啟業耀佳兵於洞庭王昻沈謀祕畧科䇿國家授武秩設邊防東自榆林西連蒲海可謂制度祕逺典章大備而猶以遼靄未清湟烽或照者但未得其人耳今若垂旌揚之期崇奬激之道用不求備任惟其材舉呉起則捨其貪推穰苴則畧其賤務升智術勿限資年則將得其人矣晉書羊祜𫝊論泰始之際人祗呈貺羊公起平呉之策其見天地之心焉昔齊有黔夫燕人祭北門之鬼趙有李牧秦王罷東并之勢桑枝不競𤓰潤空慙垂大信於南服傾呉人於漢渚江衢如砥襁袂同歸而在乎成功弗居幅巾窮巷落落焉其有風飈者也唐吕温凌烟閣勛臣頌洸洸鄂公百鍊龍泉沈翳未宣氣沖斗間佩非其人躍入大川神武獲焉提之上天天地之内指揮無前右尉遲鄂公敬徳虎来風壯鼇轉山没翕如鶚聳縱若鯨𡨕右秦胡公叔寶周庾信大將軍崔説神道碑觀虎於檻齠髪不驚稱象於船勝衣能對地似伏龍城如飛鳥燉煌實録宛在胸襟玉門亭障無勞圖畫有馬如羊不以入廏有金如粟不以入懐又柱國大將軍紇干𢎞神道碑學不專經畧觀書籍兵無師古自得縱横青烏甲乙之占白馬星辰之變九宫推步三門起伏天弧射法太乙營圖並皆成誦在心若指諸掌鹵青犢之兵甚有祕計燒烏巢之米本無遺䇿西零賊退屈指可知南郡兵逥挿標而待又車騎大將軍賀婁慈神道碑六郡良家西河鼎族地壯金行人雄塞氣兵書七卷河水浮来射法三篇天弧夜下鋒旗不息刁斗恒驚猶得馬上讀書軍中習禮五車行簡不取博士之名一卷兵書即以將軍自許角端在手必無齊魯之侵蓮花挿腰甚得蛟龍之氣又大將軍襄城公鄭偉墓誌銘公蹔臨江界已悉南越之兵裁御樓船即善昆明之戰又驃騎大將軍開府侯莫陳道生墓誌銘讀書馬上清談劍端又上柱國齊王憲神道碑管絃入耳則溪谷俱調文雅沿心則煙霞並韻養由百發落雁吟猿應奉五行綈緗縹帙少有壯志頗校兵書𤣥水降靈糓城授䇿飛風長栁月角星眉莫不吟誦在心撰成於手所著兵法凡有五卷六韜九法一作地不用呉起舊書三令五申無勞孫武先誡唐張説撥川郡王神道碑公之理兵也堅三甲利五刄偶拳勇齊足力信賞罰分甘苦六轡如手千夫一心接獯獫猶蚊蚋卧沙塞如袵席荐居露食垂二十年雨畢而成師氷泮而休卒寒氣入於肌骨夜霜入於鬢鬚人不堪其勤公不改其節又冠軍大將軍郭知運神道碑金皷登壇隠如敵國麾幢指塞自比長城沈謀可以掩著蔡雄㫁可以奪鬼神故常糟粕韜鈐芻狗風角感知已之主陳必死之力皇情西顧則九羌釁皷詔書北代則六狄焚旗上成聖君之𤣥鑒下効武臣之素節介士送塟即封征虜之墳單于入朝當祭度遼之墓又贈太尉裴行儉神道碑百城故老望塵而雅拜四鎮酋渠連營而獻酒一言召募萬騎雲集公乃解嚴以反諜託獵以訓旅誤之多方間其無備裹糧十日執郅支於帳前破竹一呼鉗遮匐於麾下楊炯唐昭武校尉曹君神道碑陶謙性好於幡旗王濬志在於長㦸又唐右將軍魏哲神道碑乃有心如鐡石氣若風雲洛䜟書名河圖祕象青聨雷燭歴大塊以三休碧羽霜凄倚渾天而一息岑彭許允征南鎮北之名馮異王昌大樹中軍之號杜太行而泥函谷猛氣無前戮封豕而斬長鯨雄圖不測元戎十乗驅衛霍於前矛甲士三千列孫呉於後殿秋風白露執金鼔而齊六軍太山黄河析銅符而光百代營雄對日兵氣横天開玉堂而按部坐金城而勒陣闕鞏之甲犀兕七重艅艎之船舳艫千里駕鼉梁於聖海秦皇息鞭石之威泛鼇釣於仙洲愚叟罷移山之力然後風行電卷斬將屠城塞丹浦之遙源伐黒林之奥本王孫公子名霑皂𨽻之臣深谷大山境入樵漁之囿軍井未建如臨盜水之源軍竈未炊似對嗟来之食又左武衛將軍成安子崔獻行狀斬大風之翼霧卷青丘卧長鯨之鱗煙銷碧海仰觀於天值三軍之星落俯察於地逢五將之山崩詔書來北斗之門圖象在南宫之壁孤虚向背則雖女子之衆可以當於丈夫前後折旋則雖婦人之兵可以陷於湯火兔起而鳬舉龍驤而鳳飛無戰不平無城不尅有如馮異羞言大樹之功宛似魯連不受黄金之賞栁宗元唐故特進贈開府儀同三司揚州大都督南府君睢陽廟碑急病讓夷義之先圖國忘死貞之大利合而動乃市賈之相求恩加而感則報施之常道睢陽所以不階王命横絶凶威超千祀而挺生奮百代而特立者也時惟南公天與拳勇神資機智藝窮百中豪出千人不遇興辭鬱龎眉之都尉數竒見惜挫猿臂之將軍天寶末冦劇憑陵隳突河華天旋虧斗極之位地圮積狐狸之穴親賢在庭子駿陳謨以佐命元老用武夷甫委師而勸進惟公與南陽張公巡髙陽許公逺義氣懸合訏謨大同誓鳩武旅以遏横潰裂裳而千里来應左袒而一呼皆至柱厲不知而死難狼瞫見黜而奔師忠謀朗然萬夫齊力公以推讓且專奮擊為馬軍兵馬使出戰則羣校同强入守則百雉齊固初據雍丘謂非要害將保江淮之臣庶通南北之奏復拔我義類扼於睢陽前後捕斬要遮凶氣連沮漢兵已絶守疏勒而彌堅虜騎雖强頓盱眙而不進賊徒乃棄疾於我悉衆合圍技雖窮於九攻志益專於三板偪陽懸布之勁汧城鑿穴之竒息意牽牛羞鄭師之大臨甘心易子鄙宋臣之病告諸侯環觀而莫救國命阻絶而無歸以有盡之疲人敵無已之强寇公乃躍馬潰圍馳出萬衆抵賀蘭進明乞師進明乃張樂侑食以好聘待之公曰敝邑父子相食而君辱以燕禮獨何心與乃自噬其指曰噉此足矣遂慟哭而返即死孤城首碎秦庭終懵無衣之賦身離楚野徒傷帶劍之辭至徳二年十月城陷遇害無傅燮之嘆息有周苛之慷慨聞義能徙果其初心烈士抗辭痛臧洪之同日直臣致憤惜蔡恭於累旬塟刻鮑信之形陵圖龎徳之狀納官其子見勾踐之心羽林字孤知孝武之志舉門闗於周典徴印綬於漢儀王猷以光寵錫斯備嗚呼睢陽之事不惟以能死為勇善守為功所以出竒以恥敵立慬以怒寇俾其專力於東南而去備於西北力專則堅城必陷備去則天討可行是故即城陷之辰為尅敵之日世徒知力保於江淮而不知功靖乎醜虜論者或未之思與廟貌斯存碑表攸託洛陽城下思鄉之夢倘来麒麟閣中即圖之辭可繼梯衝外舞缶穴中偵鈐馬非艱析骸猶競謀韜玉帳寄重金壇將星明則英豪用靈旗指則妖祲銷勁草可以受疾風盤根然後見利器璧玉持身嬰兒撫士俱見孫子軍井未達將不言渴軍幕未辨將不言倦軍竈未炊將不言饑三畧軍䜟將軍之心淊淊如春曠曠如夏湫漻如秋慘惻如冬淮南子武功部賀捷唐明皇平戎詩雜㓂忽猖狂無何敢亂常羽書朝繼入烽火夜相望將出凶門勇兵因死地强蒙輪皆突騎按劍盡鷹揚鼓角雄山野龍蛇入戰場流膏潤沙漠濺血染鋒鋩霧廓清𤣥塞雲開靜朔方武功今已立文徳愧前王裴灌奉和御製詩𤣥漠聖恩通由来書軌同忽聞窺月滿相聚寇雲中廟畧占黄氣神兵出綘宫將軍行逐北使者亦知戎一舉轒輼減再麾沙朔空直將威禁暴非用武為雄飲至明軍禮疇勲錫武功干戈還載戢文徳在唐風周庾信賀平鄴都表伏惟陛下握天樞秉地軸駕馭風雲驅馳龍虎沈雄内㫁不勞謀於力牧天䇿勇決無待問於容成是以威風所振烈火之遇鴻毛旗鼔所臨衝風之卷秋葉竊聞伊洛戎夷幽并僭偽抱圖載籍已歸丞相之府銜玉繫綬並詣中軍之營百年逋誅遂窮巢窟三代敵怨俄然掃蕩昔周王鮪水之師尚勞再駕軒轅上谷之戰猶須九伐未有一朝指麾獨決神慮平定㝢内光宅天下二十八宿止餘呉越一星千二百國裁滿麟洲小水若夫咸康之年四方始定建武之代諸侯並朝不得同年而語矣雖復八風並唱未足頌其英聲六樂俱陳無以歌其神武坐鈞臺而誓衆姒啓繼夏禹之功入南郊而問罪姬發成周文之志此無改之道大孝也歟北齊邢邵百官賀平石頭表大江設險實限夷華前魏觀濤而退後魏登山而返聲教不通多歴年代今蒼雉奉職靈鼉自梁折葦為舟憑力可渡始知徳通於物孟門失險道清將順劍閣自開行舉洞庭之樂放畜長洲之苑㑹玉帛於塗山樹銅柱於南極唐吕温代李侍郎賀收成都表當挾纊之時賜戰士悉出内府開食椹之路賞降者曽不踰辰遂使昏迷革心義勇增氣江山自拔雷雨長驅渠魁假息而逃威士衆順風而捨仗市不易肆巷無驚犬人蒙骨肉户解倒懸旌旗導長飬之風金鼓動發生之氣常衮為李採訪賀收西京表及清秋戒節太白方髙爰整軍容順乎殺氣龔行天罰掃彼妖氛千里貔虎之營百里龍蛇之陣沸若雲海聚如雪山壘掲終峯塹逥渭水闞軍聲而丘陵簸蕩煬兵氣而天地晦𡨕蠢兹凶徒猶敢旅拒鼓譟白刄來聚么麽之羣旗靡黄塵旋就鯨鯢之戮渠魁不漏噍類無遺枝梧者面縛中軍顛背者頭懸後殿敗苻融於淝水自可慙功破王邑於昆陽未云快意遂封尸於京觀旋振旅於王城啓闢千門掃除九陌祓氛埃於宫闕洗毒螫於閭閻耆艾歡迎久思周徳衣冠雨泣還睹漢儀謳吟變噢咻之聲氣象逥嚴凝之慘李商隠為滎陽公賀幽州破奚寇表天聲逺疊廟畧遐宣白虜獲於寧臺赤夷俘於燕路臣竊窺舊史逖聽前朝有天子憂邊清宵輟寐將軍出塞白首言歸至乃或勝或奔一彼一此竟困塞郊之柝那停絶漢之烽猶欲叙烈旂常告功祧廟用其蹔勝謂曰難能况幽朔巨都全燕重地荐臻奚寇猾亂華人田讓之䕶鮮卑莫能深入祭彤之軍遼水唯遣相攻近嵗以来為患滋甚是單于偵邏之路懐駒支漏泄之姦張仲武重感國恩習知邊事同三師而肄楚侔五餌以開戎乗其囂惰之時俄得剪除之便燕犀密掛冀馬潜羈超距拔石者動過千羣㦸手科頭者畧踰萬計坎三皷而河流自却聲六校而屋瓦皆飛自使鴞懼喪林兔忙迷穴無舟掬指有地僵屍未驚紫陌之烏前軍已蹙不唳淮山之鶴後隊仍窮遂分袁尚之頭顱仍裂蚩尤之肩髀穹廬落燼同甲揚灰山積雲屯大收其車乗角羸耳濕盡獲其牛羊栁水載澄桑河無事爰施吉語入解皇威此皆陛下功格上𤣥運膺下武授兹成筭於彼當仁震肅九圍歡呼萬國昔艱難云始寇塵首起於盧龍今開泰有期漢將先清於涿鹿人謀允若靈貺昭然固已上慶祖宗下光編䇿籙圖洪範競三古之殊猷玉檢金泥有百神之靈祐臣雖當防遏不介邊陲空増氣於懦夫實叨榮於下將日圍千里天葢九重奉一月之捷書唯知抃蹈獻萬年之壽酒尚隔班行念風水於遐藩寄夢寐於宣室令狐楚賀靈武破吐蕃表兵既落於天上羌乃陷於彀中箝口之馬僨車而縶者千蹄辮髪之人輿屍為俘者萬指遙知水赤坐想風腥杜牧為中書門下請追尊號表北絶梓領西過榆溪壯中夏起塞之雄奪西戎埋弓之地至使强㓂不敢觸鋒山鏁七闗地闢千里歌狸首而息射詠杕杜以勞旋蓄睿算於雲漢之表畫聖謀於造化之先捕虜將軍射聲校尉羽林突陣之騎酒泉校射之兵親自指縱同時受命信星効祉靈旗呈祥壁壘言言而洞開渠魁纍纍而面縛解辮削袵投戈委弓怛攝威靈歡呼冠帶破種徙域空漠淨邊指北海而封燕然中西域而立幕府鄭吉之理烏壘班超之鎮西域大庇生人一寛天下王維賀神兵助收石堡城表天丁力士潜結鸛鵞星劍雲旗暗充貔虎遂殱逆命之㓂果屠難㧞之城栁宗元栁州賀破東平表伏惟陛下威使百神徳消六沴天降寳運時歸太平自克夏擒蕃剪蜀平蔡殊類稽顙羣疑格心惟此兇妖尚聞悖慢庭議既得廟謨必臧旌旗燭耀於洪河金鼓震驚於靈嶽鄆城自潰寧同莒魯之爭齊地悉平無俟耿陳之戰五兵永戢七徳無虧含生比堯舜之仁率土陋成康之俗介丘霧息已望翠華之来沂水風生更起舞雩之詠千嵗之統實在於斯又為裴中丞賀破東平表臣聞負恩干紀者鬼得而誅犯順窮兇者天奪其魄不自妖孽曷彰聖功伏惟陛下先天弗違與神合契掩周宣中興之業陋漢光再造之勛靈旗四臨氛沴皆散凡在臣庶盡覩升平伏以師道席祖父以作威包海岳而專禄恃東秦十二之險誘臨淄三七之兵竊據一方嵗踰五紀朝宗之地曠若外區封祀之山隔成異域累聖垂徳曾未悛心餘孽滔天果聞折首遂使云亭有主知玉牒之將封遼海無虞見石砮之已至此皆陛下神籌獨得廟畧無遺授任推盡力之誠縱捨有感心之化金石可貫龜筮必從克成不戰之功遂洽無為之理臣謬司戎旅逺守方隅愧無横艸之功坐見覆盂之泰抃蹈歡慶萬倍恒情令狐楚賀行營破賊狀今者將從天落兵若山行濟溵水而不濡隔偃城而欲㫁長蛇之首尾如截應接自難狡兔之窟穴已焚死亡無所方當破竹猶繋苞桑剰鋭氣以長驅抗威稜而直指困雖猶鬬亂不能軍既摧衆惡之鋒必喪元兇之膽又狀逆賊呉少誠用己之愚刦人為惡唯日不足謂天可逃羸師之骸罣罥穢草而腥林疲馬之命委離裝壕而咽塹闕前鋒都督平兖青州露布敢行稱亂不戢自焚師克在和雖武騎無所用天助者順聞風鶴皆為兵一戰成淝水之勲三捷取夀陽之境匹馬觭音起輪無反乃滅而亡簞食壺漿以迎曰徯予后謳吟思漢震動附周齊變至魯魯變至道載戢干戈汶達于濟濟達于河底慎財賦遂鼓行于司豫汔盪穢于羌髳時靡爭而心載寜君之訓而臣何力斯皆帝徳廣運聖武布昭歸鄆讙田用儒無敵揚文武烈圖功攸終唐于公異破朱泚露布指麾而貙兕作威感激而風雲動色遂先登進擊深入合攻七擒連發而星馳兩翼旁張而雲合霜刃交光而霍耀鼉鼓騰聲而隠轔賊方土崩我乃霆擊乗其踣藉遂至於上蘭取彼鯨鯢直通於中禁惡鳥將墜尚顧危巢妖狐就擒猶守舊穴讙譟之聲山傾而河泄鼓鼙之氣霆鬬而雷馳屏翳發向敵之風囘禄扇燎原之焰馬逸未止士怒未舒既自北而徂南竟輿尸而折首韋臯破吐蕃露布連連執訊矯矯獻囚不然我薪而自焚有如破竹之立解拂廬魚潰甌脱兔犇谷靜山空行就焉耆之僇區殫域滅汔聞智盛之降明見萬里運竒堂上之兵守在四夷制勝目中之虜勒功須池之柱植表赤嶺之碑一怒安民文之勇也三軍用命克何力焉駱賔王兵部奏姚州道破逆賊楊䖍栁等露布北辰列象六合奉天子之尊南面乗乾一統成聖人之業是知衣裳所會義有輯於殊隣霜露所均誠兼育於異類故塗山萬國誅後至者防風丹浦一戎緩前禽者就日然則陳弧矢以威天下法雷霆而震域中四時行焉天道不能去殺五兵備矣皇業所以勝殘雖事切救焚茍順時而濟物恩深祝網不獲已而用兵伏惟皇帝陛下登翠媯以握圖憲紫微而正象𤣥功不宰混太始以凝神至道無名佇華胥而得夢闡文教以清中夏崇武功以制九夷環海十洲通波太液之水鄧林萬里交影甘泉之樹反踵穿胸之域襲冠帶以来王竒肱儋耳之酋奉正朔而請吏逆賊蒙儉和舍等浮竹遺𦙍沈木餘苗邑殊禮樂之鄉人習貪殘之性日者皇明廣燭帝道遐融頗亦削左袵而被朝衣解椎髻而弁華冕而豺狼有性梟獍難馴遂敢亂我天常率九種而背誕負其地險携七郡以稽誅騷動邊疆寇攘州縣是用三門援律長驅無戰之師五月渡瀘深入不毛之地去月二十一日軍次三朏崐崘鎮前後捕得生口知守捉山𦍑傍山連結十部蠻首徒五萬衆此山即南郡中之巨防也岡巒千里西通大荒之路谿谷萬重南極炎州之境聳喬林而挿月隂兔有假道之標拔崇岩以隠天陽烏無囘翼之地峯危束馬路絶懸車賊據臨岱之形乗建瓴之利徴風召雨蝟起蜂飛驅雜種以挺妖封狐千里肆沈黎而作孽雄虺九頭臣以為制敵以權柔逺者理或存於徳教伐叛以義決勝者不必在於干戈於是廣布朝恩恭宣帝徳申之以安撫曉之以存亡信重蠻陬無負黄龍之約賞隆漢爵不踰白馬之盟地接冉駹詞屢殫於喻蜀俗通盤瓠聲不輟於吠堯臣遣某銜枚逺襲卷甲前驅偃危斾而設潜兵疑從天落乗間道而掩不備似出地中又遣某渉南山之南衝其要害之路陵北山之北絶其飛走之途賊首楊䖍栁等振螳蜋之力拒轍當輪肆蚊蚋之羣彌山滿谷臣某等忠勤克著智畧逺聞識明君之重恩輕生有地提太阿之雄劍視死無時彎弧而兇黨土崩舉刃而妖徒瓦解雖危苕沸鼎未窮梟首之誅救死扶傷猶致析骸之請二十二日臣遣某擁貔豹之雄順天機而左轉驅象犀之卒乗地軸以右逥總投石超距之材蹈中權而拊其背騰躍鐵噴金之騎犯前茅而扼其喉横玉弩以髙臨縱金鉦而直進𤣥雲結陣影密西郊赤堇揮鋒氣衝南斗颺煙塵而匝地白日為之晝昏積氛祲以稽天蒼𡨕為之晦色兵交刃接鳥散魚驚自卯及申追奔逐北斬首千餘級轉戰三十里激流膏而為泉似變萇𢎞之血委亂骸而擠壑若沈鼈靈之屍既而照盡髙舂光昏乙夜賊乃收集餘衆深據重岩臣度彼游魂慮其宵遁使三軍齊進四面合圍二十三日乗魚爛之危啟蛇形之陣揚麾誓衆杖節訓兵一鼓先登賞必懸於芳餌九攻失律罪無赦於嚴誅五都雄材三河俠少或生居燕地尤工即墨之圍或家本秦人早習昆明之戰叱咤則江山搖蕩慷慨則林壑飛騰舉鵬翼以揚威耀犀渠而鼓勇澄氛廓祲囘夏景以潰春氷滅跡掃塵若霜風之卷秋籜戰踰百里時歴三期前後生擒四千餘人斬首五千餘級諾沒弄楊䖍栁等殞死行陣懸首旌門蒙儉和舍等委衆奔馳脱身鋌險雖復刑以止殺丁壯咸伏於誅夷禮不重傷班白必存於寛宥昔魏臣伐蜀徒聞蒟醬之竒漢使開卭纔通竹杖之利豈若膺紫泥而弔伐指丹徼以臨戎一戰而孟獲已擒再舉而哀牢授首斯顯皇威逺暢廟略遐宣奉𤣥徳以配天徒知帝力掩黄輿而闢地豈曰臣功又破賊設蒙儉等露布七緯經天星墟分張翼之野八紘紀地火洲限建木之鄉西距大秦雜金莖而孕氣南通交阯枕銅柱以為隣俗帶白狼人習貪殘之性河淪赤虺川多風雨之妖水積炎氛山涵毒霧竹浮三節肇興外域之源木化九隆頗為中國之患年將千祀代歴百王鄭純之化不追孟獲之風逾扇故三年疲衆徒聞定笮之譏五月出師未息渡瀘之役然則大人拯物上聖乗期法乾坤以握樞體剛柔而建極知仁義不能禁暴設刑網以勝殘知揖讓不可濟時用干戈而靜亂伏惟陛下祥摛載玉出地軸以登皇道契書繩掩天紘而踐帝𤣥靈入户纂靈慶於丹陵蒼籙昇壇荐禎圖於翠渚垂衣裳以朝萬國崇玉帛而禮百神昭儉防奢露臺惜中人之産宣風布政明堂法上帝之宫致羣生於太和登品物於仁夀四神踐雪五老飛星君囿祥麟樂班文於仙卉女牀鳴鳳韻歸昌於帝梧四隩同文五風異色鄧林萬里纔疏苑囿之原層城九重未浚池隍之域合璧照臨之地候月歸琛大鑪覆載之所占風納賮蠢茲蠻貊敢亂天常横赤熛以疏疆背朱提而設險石林萬仞岩邑千重望秦阜以相傾崤陵失四塞之阻對梁山而錯峙劍門成一簣之峰自謂絶壤幽荒中外足以迷聲教憑深負固江河可以逃靈誅殊不知玉弩垂芒汹水無九嬰之沴瑤階舞戚洞庭有三苗之墟臣等謬以散材忝專分閫白招乗候順秋官以揚旌綘節臨邊通夜郎而解辮自營開嶲穴斾轉卭山峻岐折坂之危盡亡衿帶滇池㴜江之固曽莫藩籬唯逆賊設蒙儉等未革狼心仍懐豕突陸梁放命旅拒偷安地接祠雞竟無心於改旦山多神鹿終未息於擇音臣以大帝宣威有征無戰明王仗順先徳後刑𢎞聖澤於中孚緩天誅於大造庶南薰解愠仰雲闕以翔魂東律和音扣轅門而頓顙祝禽疎網徒開三面之恩毒虺挺妖愈肆九頭之暴乃鳩集餘衆蟻結兇徒儋耳椎髻之渠千里霧合鑿齒雕題之孽一呼雲集疊石菌以開營拒巖椒而峻壘崇巒切漢若登珤藏之山絶壑憑霄似瞰封泥之谷以前月十七日連營布陣據險揚兵東西三十餘里馬步二十餘萬聚蚊蚋而合響聲若雷霆縱虵豕以為羣氣稽宇宙臣遣中郎將令狐智通等擁拔山超海之師當其步陣遣銀州刺史李大志等以躍景騰雲之騎乗其馬軍遣嶲州都督府長史行軍司馬梁待壁等領勁卒二千絶其飛走之路遣臨源府果毅馬仁靜等勒精兵九百㫁其潜伏之軍臣率行軍長史韓餘慶等負霜戈而直指掃雲陣以長驅庶令斬馘七擒將士挾雷公之怒伏屍百里蠻夷識天子之尊於是三畧訓兵五申誓衆先登陷敵惟標大樹之功後拒亂行必致曲梁之罰楚人三户蜀郡五丁氣擁𤣥霜精貫白日喑嗚則乾坤搖蕩呼吸則海岳沸騰列旗影以雲舒似長虹之東指横劍鋒而電轉疑大火之西流刃接兵交洞胸達臆自辰踰未魚爛土崩沸殘息於層峰更切守陴之哭積圓顱於重阜殆成京觀之形惟賊帥夸干未悟傾巢之兆敢懐拒轍之心猶率馬軍平川轉鬬驚塵亂起六合為之寢光殺氣相稽四溟為之變色副總管李大志忠惟徇國義則忘軀臨危而貞節愈明制敵而機謀獨逺丹誠自守雖九死其如歸白刃交前豈三軍之可奪投袂則妖徒霧廓搴旗而逆黨兵摧於是乗利追奔因機深入困獸猶鬭似化廩君之魂窮鳥尚飛如驚杜宇之魄斬甲卒七千餘級獲裝馬五千餘匹僵屍蔽地臨赤坂而非遙流血洒途視丹徼而不逺首領和舍等並計窮力屈面縛軍門寛其萬死之誅𢎞以冄生之路唯蒙儉脱身鋌險委命窮山顧巢穴以靡依延晷漏其何幾况妖徒革面荒外非復他人部落離心舟中皆為敵國瞻言梟首指日可期凡所歸䧏隨事招撫與之更始復其故業首丘懐戀疑臨舊國之墟安堵如歸似入新豐之市然後班師薩水振旅禺山建鴻業於武功暢𤣥猷於文教庶荒陬襲中邦之禮邊疆息外寇之虞華人祝堯兆皇基於千嵗夷歌頌漢美王澤於三章宜與夫天帝前星廣賜秦公之冊坤元益地遙開王母之圖古亦有云曾何足紀斯並𤣥謀廣達妙畧遐覃一戰而荒景肅清再鼔而邊隅底定豈臣等提戈擐甲克全百勝之功杖節揚麾能通九變之䇿謁藁街而獻捷大帝成規聞杕杜以勞還小臣何力張説為河南郡王武懿宗平冀州賊契丹等露布陛下震赫斯之怒援決勝之符天地合謀鬼神助伐六狄舉國百蠻整衆運欃槍而掃除縱列缺而焚蕩臣引兵受斧指日揚麾雖謝河間之學竊慕任城之勇誓將首冒鋒刃躬先士卒上假神兵之威下定鬼方之罪其餘部散校分離綱别緒兵車星布巡太行而綴碣石介馬雲羅挾衡漳而聨海浦山川積雨盡銷胡騎之塵艸木長風咸有王師之氣巢穴是空胎卵皆覆蓄鋭淵渟乗機電發援枹作氣則山岳動揺書箭一飛則酋渠相滅兵纔接刃元兇授首舂喉蔽野京觀起於中州積甲成山組練收於外府二載逋誅一朝泯滅數州肆毒俄然清弭舞溢河冀歌達塞垣截風浪以息滄溟廓氛埃而睹白日卻縠何力敢推羣帥之勞叔向有言實在明君之徳臣憑藉睿畧忝當戎政神機密運不待横艸之功天賛冥符恭承破竹之勢梁元帝討侯景檄斬馘凶渠不可勝筭沙同赤岸水若綘河宋袁豹伐蜀檄盛如盧循强如容超陵威南海跨制北岱樓船萬艘掩江葢汜鐡馬千羣充原塞隰然廣固之攻陸無完雉左里之戰水靡全舟或顯戮京畿或傳首萬里故知順逆有勢難以力抗斯又目前殷監深切著明者也後漢班固封燕然山銘惟永元元年秋七月有漢元舅曰車騎將軍竇憲寅亮聖皇登翼王室納於大麓惟清緝熈乃與執金吾耿秉述職巡禦治兵於朔方鷹揚之校螭虎之士爰該六師暨南單于東胡烏桓西戎氐羌侯王君長之羣驍騎十萬元戎輕武長轂四分雷輜蔽路萬有三千餘乗勒以八陣莅以威神𤣥甲耀日朱旗綘天遂陵髙闕下雞鹿經磧鹵絶大漠斬温禺以釁鼓血尸逐以染鍔然後四校横徂星流彗掃蕭條萬里野無遺寇於是域滅區殫反斾而旋考傳騐圖窮覽其山川遂踰涿邪跨安侯乗燕然躡冒頓之區落焚老上之龍庭將上以攄髙文之宿憤光祖宗之𤣥靈下以安固後嗣恢拓境宇振大漢之天聲兹可謂一勞而久逸蹔費而永寧也漢書左右日逐王左右温禺鞮王皆單于子弟次第當為單于者也周庾信上柱國齊王憲神道碑馬陵削樹魏將路窮平隂聽烏齊師其遯馬邑星飛一作逥龍城月動撓留犁之酒經略不前失煙支之山下馬而去留犁出漢書匈奴傳一作蒲桃非唐盧照隣歌東軍遐哉廟略赫以台臣横戈碣石倚劍浮津風兵拂籜日域清塵鳬夷復祀龍伯來賔休兵㝢縣獻馘天闉斾海凱入耀輝震震武功部兵餉唐盧綸寄贈庫部王郎中時充折糴使詩諤諤漢名臣從天令若春叙辭皆詔㫖稱使即星辰草木承風偃雲雷施澤均威懲治粟尉恩洽讓田人泉貨方將散京坻自此陳五營俱益竈千里不停輪未逺金門籍旋清玉塞塵碩儒推慶重良友頌功頻鶴髪逢新鏡龍門躍舊鱗荷君偏有問深感浩難申錢起送劉相公江淮催轉運事詩國用資戎事臣勞為主憂將徴任土貢更發濟川舟擁𫝊星還去過池鳳不留唯髙飲氷節稍淺别家愁落葉籬邊雨孤山海上秋遙知謝公興微月在江樓梁元帝上糓充軍糧啟臣聞金城千仞必資守粟革車千乗其在饋食願武軍綏旌列飛鴻之行陳奉辭受脤揜摯獸於貙虎賈逵渠水雖曰難蹤梁習勸農竊知自勉唐張説河州刺史冉君神道碑地壯伏龍城雄飛烏位居半刺吏總全邊公仍利溝洫懋藨蓘庤茭藁積糗糧均轉輸程力役寛御悦使授方任能人胥忘其久勞兵不怨其長戍雖金方氣候風雨不交之地磧路沙霾艸木不植之所莫不豐滯穗於埛牧猒甘𤓰於戍時武功部邊防唐徐彦伯登長城賦嵗次單閼我行窮髪眇嘿雞田幽隂馬窟土色紫而闗逥川氣黄而塞沒調噪鼓於海風咽愁笳於隴月試危坐以側聽孰不魂銷而㫁骨哉況復日入青波堅氷峩峩危蓬殞蔕森木靜柯羣峰雪滿連峴霜多龍北卧而銜燭雁南飛而渡河載馳載驟彼亭之候惟見𤣥洲無春隂壑罷晝鷙烏爭擊哀猱直透饑鹿夜咆乳虎晨鬭蟄熊䑛掌寒龜縮殻悲壯圖之夭遏憫勞生之艱遘梁蕭子顯燕歌行風光遲暮出青蘋蘭條翠鳥鳴發春洛陽梨花白如雪河邊細草青如茵桐生井底葉交枝今㸔無端雙燕離五重飛樓入河漢九華閣道暗清池遙㸔白馬津上吏傳道黄龍征戍兒明月金花徒照妾浮雲玉葉君不知思君昔去栁依依至今八月避暑歸明珠蠶蠒登杼機鬱金春蘤持香衣洛陽城頭鷄欲曙丞相府中烏未飛夜夢征人縫狐貉私憐織婦裁錦緋呉刀鄭錦絡寒閨夜被薄芳年海上水中鳬日寒暮夜空城雀又周王褒初春麗景鶯欲嬌桃花流水沒河橋薔薇開花百里葉楊栁覆池數千條隴西將軍號都䕶樓蘭校尉稱嫖姚自惜别如春燕分經年一去無相親不復漢地闗山月唯有漠北薊城雲淮南鏡中明月影流黄機上織成文充國行軍屢築營楊史討虜陷平城城下風多能却陣沙中雪淺詎停兵屬國小婦猶年少羽林輕騎數征行遙聞陌上採桑曲猶勝邊地胡笳聲笳聲向暮使人泣還使閨中空竚立桃花落地杏花舒桐生井底寒葉疎試為来看上林雁應有遙寄隴頭書又唐髙適漢家烟塵在東北漢將辭家破殘賊男兒本自重横行天子非常賜顔色摐金伐鼔下榆闗旌旗逶迤碣石間校尉羽書飛瀚海單于獵火照狼山山川蕭條極邊土胡騎憑陵雜風雨戰士軍前半死生美人帳下猶歌舞大漠窮秋塞草衰孤城落日鬭兵稀身當恩遇恒輕敵力盡闗山未解圍鐡衣逺戍辛勤久玉筯應啼别離後少婦城南欲㫁膓行人薊北空逥首邊風飄颻難可越絶域蒼茫無所有殺氣三時作陣雲寒風一夜傳刁斗相看白刃血紛紛死節從来豈顧勲君不見沙場征戰苦至今猶憶李將軍梁簡文帝鴈門太守行隴暮風恒急闗寒霜自濃櫪馬夜方飼邊衣秋未重潜師夜接戰略地曉摧鋒悲笳動胡塞髙旗出漢墉勤勞謝功業青白報迎逢非頒主人賞寧期定逺封單于如未繫終夜慕前蹤唐徐彦伯邉詞十月繁霜下征人逺鑿空雲遥錦旄節海照角端弓暗磧埋沙樹衝飇卷塞蓬方随膜拜入歌舞玉門中李白塞下曲塞虜乗秋下天兵出漢家將軍分虎竹戰士卧龍沙邊月隨弓影胡霜拂劍花玉闗殊未入少婦莫長嗟周王褒出塞詩飛蓬似征客千里自長驅塞禽惟有鴈闗樹但生榆背山看故壘繫馬識餘蒲還因麾下騎来送月支圖隋楊素詩漠南猶未空漢將復臨戎飛狐出塞北碣石指遼東冠軍臨瀚海長平翼大風横虎落陣氣抱龍繞城虹横行萬里外卜運百年窮兵寢星芒落戰解月輪空嚴譙息夜斗騂角罷鳴弓北風嘶朔馬胡霜切塞鴻休明大道暨幽荒日用同方就長安邸来謁建章宫又薛道衡詩邊庭烽火警挿羽夜徴兵少昊騰金氣文昌動將星長驅鞮汗北直指夫人城絶漠三秋暮窮隂萬里生寒夜哀笳曲霜天斷鴈聲連旗下鹿塞疉鼓向龍庭妖雲墜後陣暈月遶中營左賢皆頓顙單于已繫纓絏馬登𤣥闕釣鯤臨北溟當知霍驃騎髙第起西京唐于鵠詩單于驕愛獵放火到軍城乗月調新馬防秋置逺營空山朱㦸影寒磧鐡衣聲逄著降人説沙隂有伏兵鄭愔塞上詩荒壘三軍夕窮郊萬里平海隂凝獨樹月氣下連營戎斾霜凝重邊裘寒更輕將軍猶轉戰都尉不成名折栁悲春曲吹葭㫁夜聲明年漢使返猶築受降城梁王訓度關山詩關山度曉月劍客還從征雲中出逥陣天外落竒兵輪摧偃去節樹倒礙懸旌沙場折坂暗雲磧榆溪明馬倦時銜草人疲屢看城寒隴胡笳澁空林漢鼓鳴還嗟幽咽水併切㫁腸聲又戴暠詩馬肥苜蓿葉劍瑩鸊鵜血初征心未息復值鴈飛入山頭看月髙草上知風急笛揭曲難成笳繁響還澁武帝信承平東伐復南征薊門海作塹榆塞氷為城催令四校出倚望三邊平箭箙朝来動刀環臨陳鳴將軍一百戰都尉五千兵唐司空曙關山月詩蒼茫明月上夜久光如積野幕冷胡霜闗樓宿邊客隴頭秋露暗磧外寒沙白唯有故鄉人霑裳此聞笛梁簡文帝從軍行二首雲中亭障羽檄驚甘泉烽火通夜明貳師將軍新築營嫖姚校尉初出征復有山西將絶世愛雄名三門應遁甲五壘學神兵白雲隨陣色蒼山答鼓聲先平小月陣却滅大宛城善馬還長樂黄金付水衡小婦趙人能鼓瑟侍婢初笄解鄭聲迤邐觀鵞翼參差覩鴈行庭前栁花飛欲合必應紅粧起見迎貳師惜善馬樓蘭貪漢財前年平右地今嵗討輪臺魚雲望旗聚龍沙隨陣開氷城朝浴鐡地道夜銜枚將軍號令密天子璽書催何時反舊里遙見下機来又梁元帝寶劍飾龍淵長虹畫彩旃山虚和鐃管水靜瀉樓船連雞隨火度燧象帶烽然洞庭曉風急瀟湘夜月圓荀令多文藻臨戎賦雅篇又陳張正見雄兵屯薊北漢將起山西故人輕百戰聊欲定三齊風前噴畫角雲上舞飛梯鴈塞秋風逺龍沙雲路迷燕然自可勒函谷詎須泥又唐虞世南塗山烽候警弭節度龍城冀馬樓蘭將燕犀上谷兵劍寒花不落弓曉月逾明凛凛嚴霜節氷壯黄河絶蔽日卷征蓬浮天散飛雪全兵傎月滿精騎乘膠折結髪早驅馳辛苦事旌麾馬凍重闗冷輪摧九折危獨有山西將年年屬數竒又楊烱烽火照西京心中自不平牙璋辭鳳闕鐡騎遶龍城雪暗凋旗畫風多雜鼓聲寧為百夫長勝作一書生又駱賔王平生一顧重意氣溢三軍野日分戈影天星合劍文弓弦抱漢月馬足踐胡塵不求生入塞唯留死報君又賀朝清朔風乗月寇邊城軍書挿羽刺中京天子金壇拜飛將單于玉塞振佳兵騎射先鳴推任俠龍韜決勝佇時英聞有河湟客愔愔理帷帟常山啟霸圖汜水先天䇿銜珠浴鐡向桑乾疊旗膏劍指烏丸鳴鷄已報闗山曉来鴈遙傳沙塞寒直為甘心從苦節隴頭流水長嗚咽邊樹蕭蕭不覺春天山漠漠長飛雪魚麗陣接塞雲平鴈翼營通海月明始看晉幕飛鵞入旋聞齊壘鳴烏聲自從一戍燕支山春光幾度晉陽闗金河未轉青絲騎玉筯應啼紅粉顔鴻歸燕相續池邊芳草緑已見氛清細栁營莫更春歌落梅曲烽沈竈減靜邊亭海晏山空肅已寧行望鳳京旋凱捷重来麟閣畫丹青又李約二首看圖閒教陣畫地靜論邊烏壘天西戌鷹娑塞上川路長唯算月書逺每題年無復生還望翻思未别前栅壕三面鬭箭盡舉烽頻營栁和煙暮闗榆帶雪春邊城多老將磧路少歸人殺盡金河卒年年添塞塵王貞白古悔從軍行憶昔仗孤劍十年從軍威論兵親玉帳逐虜過金微隴水秋先凍闗雲暵不飛辛勤功業在麟閣志猶違駱賔王行路難君不見玉闗寒色闇邊庭銅鞮雜虜寇長城天子按劍征餘虜將軍受脤事横行七徳龍韜開玉帳千里龜壘動金鉦隂山苦霧埋髙壘交河孤月照連營連營去去無窮極擁斾遙遙過絶國陣雲朝結晦天山寒沙夕漲迷疎勒龍鱗水上開魚貫馬首山前振鵬翼長驅萬里讋祁連分麾三令武功宣百發烏號遙碎栁七尺龍文逥照蓮春来秋去移灰琯蘭閨栁市芳塵㫁鴈門迢遞尺書稀鴛被相思雙帶緩行路難誓令氛祲靜臯蘭但使封侯龍額貴詎隨中婦鳳樓寒唐太宗於北平作詩翠野駐戎軒盧龍轉征斾遙山麗如綺長流縈似帶海氣百重樓巖松千丈葢兹焉可遊賞何必襄城外杜審言贈蘇味道詩北地寒應苦南庭戍未歸邊聲亂羌笛朔氣卷戎衣雨雪闗山暗風霜草木稀胡兵戰欲盡漢卒尚重圍雲靜妖星落秋深塞馬肥據鞍雄劍動挿筆羽書飛輿駕還京邑朋遊滿帝畿方期乗獻凱歌舞共春輝張説奉和餞王晙巡邊應制詩六月歌周雅三邊念夏卿欲施攻戰法先作簡稽行禮樂知謀帥春秋識用兵一勞堪定國萬里即長城䇿有和戎利威傳破虜名軍前雨洒道樓上月臨營别藻瑤華降同衣錦襮榮闗山由義近戈甲為恩輕絲竹路傍散風雲馬上生朝廷為吉甫邦國望君平李嶠奉和幸望春宫送朔方軍大總管張亶詩玉塞懲驕子金符命老臣三軍張武斾萬乗餞行輪猛氣陵𤣥朔崇恩降紫宸投醪還約士辭第本忘身露下鷹初擊風髙鴈欲賔方銷塞北祲還靜漠南塵鄭愔塞外詩塞外蕭條望征人此路賒邊聲亂朔馬秋引動胡笳遙障侵歸日長城帶晩霞㫁蓬飛古戍連鴈聚寒沙海暗雲無葉山春雪作花丈夫期報主萬里獨歸家孫逖送趙都䕶赴安西詩外域分都䕶中臺命職方欲傳清廟略為取劇曹郎已佩登壇印猶懐伏奏章百壺開祖餞駟牡結戎裝青海連西夐黄河帶北涼闗山瞻漢月戈劍宿胡霜體國才先著論兵䇿復長果持文武術還繼晉當陽唐明皇送張説巡邊詩端拱復垂裳長懐御逺方股肱申教義戈劔靜要荒命將綏邊服雄圖出廟堂三台入武帳八座起文昌寶胄匡朝主華宗輔漢王茂先慚博物平子謝文章盡節恢時佐輸誠禦寇場三軍臨朔野駟馬即戎行鼓吹威夷狄旌軒溢洛陽雲臺先著美今日更貽芳又張嘉貞奉和詩天賜我宗盟元戎付夏卿多才兼將相必勇獨横行經緯稱人傑文章作代英山川看是陣草木想為兵不待河氷合猶防塞月明有謀當繫醜無戰且綏氓閫外傳三略雲中冀一平感恩同義激悵别屢魂驚直視前旌掣遙聞後騎鳴還期方定日復此出郊迎又宋璟奉和詩帝道薄存兵王師尚有征是闗司馬法爰命總戎行畫閫崇威信分麾盛寵榮聚觀方結轍出祖遂傾城聖酒江河潤天詞象緯明徳風邊草偃勝氣朔雲平宰國推良器為軍挹壯聲至和嘗得體不戰即忘精以智泉寧竭其徐海自清遲還廊廟座贈别故人情又王光庭奉和詩賢相得符充朝推文武雄海波先若鏡闗草預從風鉞助將軍勇威成天子功瓊章九霄發錫宴五衢通玉輾龍盤帶金裝鳳頸騘虎貔分儗儗河洛振熊熊戈劍千霜白旌旃萬火紅示刑夷狄變流惠鬼神同寇息軍容偃塵銷朔野空用師敷禮樂非是為獯戎又張九齡奉和詩宗臣事有征廟算在休兵天與三台座人當萬里城朔南方偃革河右蹔揚旌寵錫從仙禁光華出漢京山川勤逺略原隰軫皇情為動薰琴唱仍題寶劍名聞風六郡勇計日五戎平山甫歸應疾留侯功復成歌鐘旋可望枕席豈難行四牡何時入吾君憶履聲又賀知章奉和詩荒景盡懐忠梯航已自通九攻雖不戰五月尚持戎遣戍徴周牒恢邊重漢功撰車命元宰授律取文雄胄出天弧上謀成帝幄中詔旂分夏物專討錫唐弓帳宿伊川右鉦傳晉苑東饔人籍蕡實樂正理絲桐岐陌涵餘雨離川照晚虹恭聞咏方叔千載舞皇風杜甫奉送郭中丞兼太僕卿充隴右節度使詩詔發山西將秋屯隴右兵凄涼餘部曲燀爀舊家聲鵰鶚乗時去驊騮顧主鳴艱難須上䇿容易即前程斜日當軒葢髙風卷斾旌松悲天水冷沙亂雪山清和虜猶懐惠防邊詎敢驚古来於異域鎮靜示專征燕薊奔封豕周秦觸駭鯨中原何慘黷餘孽尚縱横箭入昭陽殿笳吟細栁營内人紅袖泣王子白衣行宸極妖星動園陵殺氣平空餘金盌出無復繐帷輕毁廟天飛雨焚宫火徹明罘罳朝共落棆桷夜同傾三月師逾整羣胡勢就烹瘡痍親接戰勇決冠垂成妙譽期元宰殊㤙且列卿幾時逥節鉞戮力掃攙搶圭竇三千士雲梯七十城恥非齊説客甘似魯諸生通籍微班忝周行獨坐榮隨肩趨漏刻短髪寄簮纓徑欲依劉表還疑厭禰衡漸衰那此别忍淚獨含情廢邑狐狸語空村虎豹爭人頻墜塗炭公豈忘精誠元帥調新律前軍壓舊京安邊仍扈從莫作後功名又送陵州路使君赴任詩王室比多難髙官皆武臣幽燕通使者岳牧用詞人國待賢良急君當拔擢新佩刀成氣象行葢出風塵戰伐乾坤破瘡痍府庫貧衆寮宜潔白萬役但平均霄漢瞻佳士泥塗任此身秋天正搖落逥首大江濵李益過五原飲馬泉詩緑楊著水宛如煙舊是胡兒飲馬泉幾處吹笳明月夜何時倚劔白雲天從来凍合闗山路今日分流漢使前莫遣行人照容鬂恐驚憔悴入新年郎士元送李將軍赴定州詩雙旌漢飛將萬里獨横戈春色臨闗盡黄雲出塞多鼓鼙悲絶漠烽戍隔長河莫㫁隂山路天驕已請和楊巨源和呂舍人喜張員外自北畨逥至境上寄詩割愛天文動敦和國步安仙姿歸舊好戎意結新歡並命瞻鵷鷺同心揖蕙蘭玉簫臨祖帳金牓引征鞍廣陌雙旌去平沙萬里看海雲侵鬢起邊月向眉殘突兀隂山逈蒼茫朔野寛毳廬同甲帳韋橐比琱盤義著親胡俗儀全識漢官地隣氷鼠淨天映燭龍寒節異蘇卿執絃殊蔡女彈磧分黄𣺌𣺌塞極黑漫漫歡味羶腥列徴聲佅僸攅歸期先鴈候登路劇鵬搏上客離心逺西宫草詔殫麗詞傳錦綺珍價掩琅玕百兩開戎壘千蹄入御欄瑞光麟閣上喜氣鳳城端尚徳曾辭劔柔凶本舞干茫茫斗星北威服古来難又贈史開封詩天低荒草誓師壇鄧艾心知戰地寛鼓角逥臨霜野曙旌旗髙對雪峯寒五營向水紅塵起一劍當風白日看曾從伏波征絶域磧西蕃部怯金鞍張喬書邊事詩萬里沙西寇已平犬羊羣外築空城分營夜火燒雲逺教獵秋鵰掠草輕秦將力隨胡馬竭蕃河流入漢家清羌戎不識干戈老須賀明時聖主明韓宗涼西即事詩秋草河蘭起陣雲凉州唯向管絃聞豺狼毳幕三千帳貔虎金郊十萬軍候騎北来驚有説戍樓西望悔為文昭陽亦待平安火誰握旌旗不見勲張蠙過蕭闗詩出得蕭闗北儒衣不稱身隴狐来試客沙鶻下欺人曉戌殘衙火晴原起獵塵邊戎莫相忌非是霍家親李義甫和邊城秋氣早詩金微凝素節玉律應清葭邊馬秋聲急征鴻曉陣斜闗樹凋涼葉塞草落寒花霧暗長川景雲昏大漠沙溪深路難越川平望超忽極望斷煙飄遙落驚蓬沒霜結龍城吹水照龜林月日色夏猶冷霜華春未歇睿作髙紫宸分明映𤣥闕許渾獻鄜坊丘常侍詩詔選將軍䕶北戎身騎白馬臂彤弓栁營逺識金貂貴榆塞遙知玉帳雄秋檻鼓鼙驚朔雪曉階旗纛起邊風蓬莱每望平安火應奏班超定逺功趙嘏降蕃詩廣武溪頭降宼稀一聲寒角怨金微河湟不在春風地歌舞空裁雪夜衣鐡馬半嘶邊草去狼煙髙映塞鴻飛揚雄尚白相如吃今日何人從獵歸陳陶贈容南韋中丞詩普寧都䕶軍威重九譯梯航壓要津十二銅魚尊畫㦸三千犀甲擁朱輪風雲已靜西山寇閭井全移上國春不獨来蘇發歌詠天涯半是泣珠人又贈江南李階副使詩世禄三朝壓鳳池桂陵公子漢庭知雷封始賀棠溪劍花府尋邀玉樹枝幾日坐談誅叛逆列城歸美見歌詩從軍莫厭千場醉即是金鑾寵命時梁簡文帝七勵夫氛氲構象純雜不同共工折柱雖播英風自古而然曾何足道但吹沙役寇抑自犧年吐霧藏妖聞之堯日至如𤣥蹄外境紫舌頑人悖而無禮不沬皇仁於是騰三泉之窅漫戴五旗之飄揚引玉車於西隴鳴金鼔於北邙拭龍泉之雄劔瑩魏國之寶刀銛踰巨闕利擬豪曹至如牽鈎壯氣斗膽豪心縁腰白玉帶珮黄金酬恩報死尅逺長岑騕褭白鷰耀躍青離五玉察善十相無遺連腰錦帶半足塵飛標威於鴈門之境振旅於龍突之鄉若乃驚沙絶岸苦霧綿長秋河曉碧落蕙山黄紅顔素改𤣥鬂斑霜征夫抵掌而飲膳壯士憤氣而沸腸逥雲鳥之密陣背却月而相望旗才轉而漂杵鋒未至而驂傷前鋒紛其易幟後騎決其沙囊何湯雪之能比豈拾塵之可方於是呼韓頓顙龜兹銜璧羊牽既袒熊山已積九截同文八極齊軌唐杜牧賀平党項表自古處夷狄於中華未有不為患者春秋時長狄攻魯北戎病齊破衛陵燕侵秦撓晉西漢趙充國納先零於内地東朝馬文泉淵致當煎於三輔自後熾大侵亂闗中戰爭十年騷擾四海凌逼京邑發掘園陵段熲不生終不能滅後至曹公因匈奴衰弱分為五部處在汾晉散而居之元海傑出首亂華夏中原喪沒凡數百年國朝貞觀之初突厥破滅太宗惑彦博之利口忽文貞之成算處其降衆置於河南不數十年果殘燕趙比以逥鶻未殄吐蕃正强且須羈縻未可重撅於是邊疆日駭種類嵗繁每至勁弓折膠種馬免乳以魁健之質張忿鷙之兇刼饋穀以焚舟殺軺車而閉道衆虺盤結羣犬呌牙依據深山出沒險逕近在宇下游於彀中艱難以成不能剷削潛運睿算獨決神機箕宿禡牙狼星歛角戊日禱馬太白揚眉按鎖而邊事無遺聚米而兵形盡見披其要地擣以竒兵獸窮搏人鹿急走險囊封赤白雜沓繼来雉走檄書逺近同至蘇辛李蔡傅鄭甘陳十萬齊呼四面同入行軍猶枕席之上敗虜於險阻之中或以利戈舂喉或以長矛挾脅僵屍積疊千山之草木盡腥霆電轟喧萬里之威靈大震元稹進西北邊圖經狀所冀袵席之上欹枕而郡邑可觀游幸之時倚馬而山川盡在宋播芳大全上史丞相啟竊惟國家閒暇之時當思文武長久之術况外夷之雲擾貴内治之日嚴詎云行李之通可緩苞桑之慮國虚難動民困易揺豈特謀國之數公知諱用兵之兩字然能應則乃可謂定故欲翕者未始不張今徒千里而畏人未思四境之不治一氣先竭百為弗開羣材付之乍佞以乍賢正論聽其自鳴而自息耳目之受既狹心腹之委亦偏為赤子為龍蛇未始得敵情之實以皮幣以犬馬但云量自力之宜軍籍既隠於蔽蒙將材又阨於媢嫉舟師未練馬政不修鑿斯池築斯城豈可無九攻之具鍛乃戈厲乃刃孰能遏再鼓之衰仰而思之無非事者上作而下不應朝廷每有是言外呼而内不聞郡國亦為此論惟事事備乃可無患言人人殊何以成功周得上漢得中䇿將安決蠡治内種治外責恐宜分試考先朝立四總管之謀及觀諸儒分三大鎮之説皆欲取之人望從而假以事權一用孔明陸遜之規模力行晁錯充國之論議移江上之屯於淮上實闗表之粟如闗中使權守禦之方漸講招懐之略衆犬方狺則養威持重兩虎既傷則取亂侮亡是為屈羣䇿以共圖奚至無寸功之可論與其待一朝之患始出於兹孰若折千里之衝早為之所若任人而疑疑人而任則聞事不實實事不聞何恠草野之私言動違槐棘之成算日月逝矣風雨萃之無謂天變不足慮人言不足從庶幾君子有所恃小人有所畏用藥莫先於無病止車當在於未奔相亦惟終邦其無斁仰勤大播盍進小忠敢輸肺腑之微誠盡告腹心之元老一毫有補萬死亦甘平津之招賢有三惜難受汲生之戅洛陽之太息者六實欲全周勃之功陳徐陵與周冢宰宇文䕶論邊境事書灌𤓰之美久敇邊吏拾橡之尤想應無忽武功部檄書梁元帝伐侯景檄粤若梁興五十餘載平壹㝢内徳惠悠長仁育羣生義征不服左伊右瀍咸皆仰化濁涇清渭靡不向風建翠鳯之旗則六龍驤首擊靈鼉之鼓則百神警肅風牧方邵之賢衛霍辛趙之將羽林黄頭之士虎賁緹騎之夫叱咤則風雲興起鼔動則嵩華倒拔自桐栢以北孤竹以南碣石之前流沙之後延頸舉踵交臂屈膝胡人不敢牧馬秦士不敢彎弓叶和萬邦平章百姓十堯九舜曷足云也董率臯貔躬擐甲胄霜戈照日則晨離奪暉龍騎蔽野則平原掩色信與江水同流氣與寒風俱憤咸以義旗既建宜須總一共推幕府實用主盟粤以不佞謬董連率逺惟國艱不遑寕處中權後勁恭行天罰提戈蒙險隕越以之天馬千羣長㦸百萬驅賁獲之士資智勇之力大楚踰荆山淺原渡彭蠡舳艫泛水以掎其南輜軿委輸以衝其北華夷百濮贏糧影從雷震風駭直指建業按劍而咤江水為之倒流抽戈而揮皎日為之退舍方駕長驅百道俱入夷山殄谷充原蔽野挾輈曳牛之侣拔距磔石之夫騎則逐日追風弓則吟猿落鴈捧崑崙而壓卵傾渤海而灌熒如駟馬之載鴻毛奔牛之觸魯縞以此衆戰誰能禦之梁簡文帝答穰城永和移文屬彼數及侮亡運逢瓦解石言水鬭實驗地凶飛絮雨粟還符天怪故淪俗駿奔遺黎南請所以皇略北征事同拯溺愍百姓之未安傷一物之失所故餘民負襁掃地来王而向化之黨忽覽今移咸以陶兹禮樂重睹衣冠已變伊川之髪兼削呼韓之袵寜當生入玉闗死歸建業民情若此匪我求蒙行人逺届實亦勞止想近察時機逺詳圖緯早去中原遽還桑梓旋地脈而北移越天渠而南指然後三姓二賢可存十半如其遂固守株不達𤣥象將恐衛將之師復有狼居之戰應侯之討更睹隂山之哭梁任昉答魏初和移文值魏氏紛綸亟離星晷競尋干戈爭以興廢王無卒嵗相不浹辰隻馬泣師月陳庭闕裹糧請救日欵闗扉故屢動雲旗再驅蒼兕同小白之存亡等任好之繼絶匹婦是讐尺土非利然百戰百勝猶苦民情九拒九攻終勞萬姓納隍之念無忘日昃李陵失律蹔摧羽鱗同孟明之返秦似荀罃之歸晉并賚来移聞之委曲知彼當璧得人兆龜有主欲掩兵戈式敦雅好鶴鳴九臯唳天已響出其言善良以欣然輙勒沿邊屯戍各息烽警旌旗晝巻刁斗夜停混雞犬於四隣接桑麻於二境又為汝南王檄魏文董卓稱亂徒藉羣雄之手王莽偷安卒成光武之業故市耀臍膏府傳飲器陳徐陵為䕶軍長史王質移文比金風已勁玉露方漙宜及窮秋幸踰髙塞當使孤旌不返隻騎無還非止湯羅豈知堯徳其比年民墊仍嵗藴隆粒粟貴於隨珠分糜乏於齊鼎且氐羌旅拒已跨伊瀍胡羯馮陵方踰汾潞刺虎之勢時期卞生拾蜯之譏彌騐蘇子但國家體兹明信有同皎日豈惟風雨之旦猶救匹夫宵夢之言無欺幽壤逆豎浮舟同趣夏浦王師􅋈櫂素在中流羣帥争驅應時殱蕩𦍑胡寶馬縱横七澤之中荆楚樓船彌滿三江之上俘禽所獲水陸無遺又移齊文夫天綱之大固無微而不擒文武之師本無征而不克至如戎王傾其部落逆豎導其鄉闗非厥英圖殆難戡戮况復洞庭遐曠兵食殷阜西窮板屋北罄氊廬聲冠姚苻勢兼聰勒庸蜀寶馬彌山不窮巴漢樓船凌波無際我之元戎上將恊力同心承禀朝謩致行明罰為風為火殪彼蒙衝如雷如霆擊其舟艦羌兵楚賊越水沈沙棄甲則兩㟁同奔横屍則千里相枕江川盡滿譬睢水之無流原隰窮胡等隂山之長哭於是黒山叛邑諸城洞開白虜連羣投戈請命長沙鵩鳥靡復為妖湘川石燕自然還儛克剪無算縲擒不貲欲計軍俘終難巧厯所獲龍駒驥子百千其羣更開苜蓿之園方廣騊駼之廏於是衛霍甘陳虬髭瞋目心馳隴路志飲河源乗勝長驅未知所限豈如桓温不武弃彼關中殷浩無能長兹羌賊方且西踰酒郡抵我境而置邊亭東略鹽池為齊朝而反侵地後魏魏收檄梁文强弩衝城長㦸指闕徒探雀鷇無用府藏之虚空請熊踏詎延晷刻之命外崩中潰今實其時鷸蜯相扼我乗其敝方使鍾山渡江青葢入洛荆棘生於建業之宫麋鹿遊於姑蘇之館但恐革車之所轥轢劒騎之所蹂踐椅梓於焉傾折竹箭以此摧殘若呉之王孫蜀之公子順時以動見機而作歸欵軍門委命下吏當使焚櫬而出拂席相俟必以楚材終為晉用也隋盧思道為北齊檄陳文聖主以軒開萬國屬盡九州一隅不庭宜置天討爰詔六軍分閫受鉞西征秦隴之鋭北引燕代之英五校雄兒超乗俱起三河猛氏援距争奮虎夫萬隊豹騎千羣並骨勇肉飛風驤霧合憬彼江黄之衆逖矣彭濮之民巨艦髙艫順流東指江都夀春之域扼喉撫背之兵飛龍赤馬絶水南越漢后昆明未足方其訓旅魏王𤣥武不能比其𨽻師扛鼎蒙輪之卒事均驅兕三禮四義之將俛視韓白上稟廟堂之謀下資素抱之氣使張悌之魂先遊北斗吕嘉之級逺至新鄉漂櫓溺驂孱然已至亂麻積莽可謂寒心唐祖君彦為李密檄洛州文復有蒙輪挾輈之士拔距投石之夫冀馬追風呉戈照月於是熊羆角逐貔虎争先因爾倒戈之心乗我破竹之勢曽未旋踵瓦解氷消坑卒則長平未多積甲則熊耳為少達等助紂為虐嬰城自固梯衝亂舞徒設九拒之謀鼔角齊鳴空凭百樓之險鷰巢衛幕魚游宋池殄滅之期匪朝伊夕栁宗元為裴中烝伐黄賊轉牒黄少卿等歴稔逋誅舉宗肆暴恃狡兔之穴跧伏偷安憑孽狐之丘跳踉見怪以為威弧不射天網可逃侵逼使臣隳犯王略恣其毒虐速我誅鋤敵國盡在於舟中還師已期於席上謂宜投戈頓顙面縛乞身歸郡邑於王官效黎獻於天吏而乃繕兵補卒增壘閉塗正當天討之辰更積鬼誅之罪衆輕鬭蟻勇劣怒蛙纎縞當强弩之初孤豚僨肥牛之下事同拾芥力易摧枯杪忽蜂腰虚見辱於齊斧突梯鼠首濫欲寄於旄頭勦絶有時不索何獲某拱稽致命執鋭忘生車中既備於小戎鯨鯢豈逃於誅戮竊觀上略總制中權戰士義激於身心列校勢成於臂指蹶張之技盡出於山林拔距之材徧征於川洞賞懸香餌令布疾雷莫不鼔舞戎行䖍恭師律投軀不愆於羽檄跂足惟俟於牙璋今月某日奏事官米蘭逥捧受詔命神飛骨勇足蹈心馳懽聲洽於萬夫勝氣横於千里國容不入屨且及於寢門家事勿闗土已填於左闔南則浮海濟師共集堂堂之陣東則横江誓衆用成善善之功以此鼓行坐觀盡敵刑惟勿喜誅有可哀徴側之勇冠一方竟就伏波之僇吕嘉之威行五嶺終摧下瀨之師嗟此陋微自貽擒滅勉成良畫速致殊勛雖荒徼之地固不勞於有征而昇平之年將自此而何事闕諭晉隰慈州檄天保以上采薇以下内撫外從濮鉛於北視粟於南徳洋風普神旌遞列窫窳咸誅堯治時雍猶有青丘之梗舜仁天幬未除丹浦之凶李懐光奮渤海之俘授蒲洋之節始謂狙之作使不虞鷹之易颺犇命醴泉粗展勤王之績請朝行闕輙衷犯上之謀猶念前勲屢縻好爵張萌芽於霜雹悖木水之本原升鸞之諜肆行巢父之使弗返奪二軍而殱良將剽三輔而翦近畿豕心莫悛鴞音不革已復漢京之日月載揚周旅之霆雷風雲助氣草木為兵詔參伐以清氛命招搖而繕怒不竣前茅之遏即成獨栁之誅惟爾三州之士夫夙被累朝之徳澤嶠從處仲適受逆汙遵事隗囂豈為賊守鼎魚假息穴兔阽危犯大義者衆必擕作不善者神弗赦歴數古今所記未聞叛逆獲全惟岳阻兵汔膏齊斧朱泚竊號亦梟藁街矧兹狄孥敢干天罰犬馬猶有主覆載不容鯨鯢取以封脅從罔治聖上禹湯罪已文武行仁凡鳴狐假王之妖首鼠觀釁之將莫不匿瑕宥戾􅀈垢滌郵雖三子猶存蓬艾之間豈太陽不囘葵藿之照尚式王命共惟帝臣勿相依於輔車以俱焚於玉石鄭畋討黄巢檄爛羊頭而拜爵續狗尾以命官鷰巢幕以誇安魚在鼎而猶戲殊不知五侯拗怒期分項羽之屍四塜既成待葬蚩尤之骨武功部勞師唐駱賔王軍中贈先還知已詩蓬轉俱行役𤓰時獨未還魂迷金闕路望㫁玉門關獻凱多慙霍論封幾謝班風塵催白首嵗月損紅顔落雁低秋塞驚鳬起暝灣胡霜如劍鍔漢月似刀鐶别有邊亭樹相思幾度攀令孤楚為人賜行營將士襖子及弓弩狀特班星使猥降天波衣絮八蠶之綿暖如狐腋弓纒九牛之角勁若烏號遙知被服皆不憚於兵鋒緬想操張盡將穿於膚骨又賀破賊兼優䘏將士狀臣伏以雖忠不烈戰士所羞視死如歸武夫之志伏惟陛下𢎞天覆幬為日照臨載激怒肝爰收膚骨漢世徒頒其槥櫝義闕送終周師縱裏其餱糧賞延非嗣以今觀古奮一當千武功部外夷向化後漢班固東都賦目中夏而布徳瞰四裔而抗稜西盪河源東瞻海漘北動幽崖南耀朱垠殊方别區界絶而不鄰自孝武之所不征孝宣之所未臣莫不陸礱水慄奔走而来賔遂綏哀牢開永昌春王三朝㑹同漢京是日也天子受四海之圖籍膺萬國之貢珍内撫諸夏外綏百蠻晉左思魏都賦於是東鯷即序西傾順軌荆南懷憓朔北思韙綿綿迥塗驟山驟水襁負賮䞇重譯貢篚髽首之豪鐻耳之傑服其荒服歛袵魏闕置酒文昌髙張宿設其夜未遽庭燎晰晰有客祁祁載華載裔岌岌冠縰纍纍辮髪清酟如濟濁醪如河凍醴流澌温酎躍波豐肴衍衍行庖皤皤愔愔醧讌酣湑無譁延廣樂奏九成冠韶夏冒六英嘈響起疑震霆天宇駭地廬驚億若大帝之所興作二嬴之所曾聆金石絲竹之恒韻匏土革木之常調干戚羽毛之飾好清謳微吟之要妙世業之所日用耳目之所聞覺雜糅紛錯兼該汜博鞮鞻所掌之音韎昧任禁之曲以娯四夷之君以睦八荒之俗唐裴度漢宣帝冠帶單于賦亦何必貺玉帛之資空成耗國錫金石之樂用表和戎張隨耀徳不觀兵賦素翟南来而越裳重譯白狼西入而荒服来歸李嶠安輯嶺表事平罷歸詩雲端想京縣帝鄉如可見天涯望越臺海路幾悠哉六月飛鵬去三年瑞雉来境遙銅柱出山險石門開自我違瀍洛瞻途屢揮霍朝朝寒露多夜夜征衣薄白簡承朝憲朱方撫夷落既𢎞天覆廣且諭皇恩博皇恩溢外區憬俗詠来蘇聲朔臣天子壇場拜老夫綘宫韜將畧黄石寢兵符返斾收龍虎空營集鳥烏日落澄氛靄憑髙視衿帶東甌抗於越南斗臨呉㑹春色遶邊陲飛花出荒外卉服紛如積長川思遊客風生丹桂晚雲起蒼梧夕去舳艤清江歸軒趨紫陌衣裳㑹百蠻賝賮委重闗不學金刀使空持寶劍還劉禹錫蠻徼歸降寄嚴司空詩蠻水阻朝宗兵符下渚宫前籌得上䇿無戰已成功漢使星飛入夷心草偃同歡謠開竹棧拜舞擲桑弓就日知氷釋投人念鳥窮網羅三靣觧章奏九重通卉服聨操袂雕題盡鞠躬降幡秋練白驛騎晝塵紅火號休傳警機橋罷亘空登山不見虜振斾自生風江逺煙波靜軍逥氣色雄佇看聞喜後金石賜元戎王若嵒越裳獻白翟詩素翟宛昭彰遙遙自越裳氷睛朝映日玉羽夜含霜嵗月三年逺山川九譯長来從碧海路入見白雲鄉作瑞興周后登歌美漢皇天朝資孝理惠化且無疆齊王融䇿秀才文闗洛動南望之懐獯夷遽北歸之念夫危葉畏風驚禽易落無待干戈聊用辭辯片言而求三輔一説而定五州王融三月三日曲水詩序侮食來王左言入侍離身反踵之君髽首貫胸之長屈膝厥角請受纓縻文鉞碧砮之琛竒幹善芳之賦紈牛露犬之玩乗黄兹白之駟盈衍儲邸充牣郊虞匭牘相尋鞮譯無曠一尉候於西東合車書於南北暢轂埋轔轔之轍緌旌卷悠悠之斾四方無拂五戎不距偃革辭軒銷金罷刃梁元帝職貢圖序竊聞職方氏掌天下之圖四夷八蠻七閩九貉其所由来久矣漢氏以来南羌旅距西域慿陵創金城開玉闗絶夜郎討日逐覩犀甲則建朱崖聞蒲萄則通大宛以徳懐逺異乎是哉皇帝君臨天下之四十載垂衣裳而賴兆民坐巖廊而彰萬國梯山航海交臂屈滕占雲望日重譯至焉自塞以西萬八千里路之峽者尺有六寸髙山尋雲深谷絶景雪無冬夏與白雲而共色氷無早晩與素石而俱貞踰空桑而歴昆吾度青丘而跨丹穴炎風弱水不革其心身熱頭痛不改其節故以明珠翠羽之珍細而弗有龍文汗血之驥卻而不乗尼丘乃聖猶有圖人之法晉帝君臨實聞樂賢之象甘泉寫閼氏之形後宫玩單于之圖臣以不佞推轂上游夷歌成章胡人遙集欵關蹶角沿泝荆門瞻其容貌訴其風俗如有来朝京輦不涉漢南别加訪採以廣見聞梁簡文帝南郊頌龍光之地日浴之鄉紫舌黄支頭飛鼻飲自西自南無思不服欵闗質子稱臣内向珠樹素禽越火枝之地銀甕卭杖踰沈羽之涘出赤野而連翩度𤣥洲之泱漭唐王勃乾元殿頌龍闗靜柝鶴塞投弦歌呈豹尾舞進鳶肩銅橈疑月斥鐡輞星懸繩幽架險驛霧馳煙隋許善心神雀頌序月棲日浴熱坂寒門吹鱗沒羽之荒赤虵青馬之裔解辮請𨽻削袵承風豈止呼韓北埸逺頌一作頫勒狼居之岫息慎南境遙表不耐之城梁簡文帝蜀父老問月竁來庭風丘欵塞武功部奉使北齊裴讓之公館讌詶南使徐陵詩嵩山表京邑鍾嶺對江津方域殊風壤分野各星辰出境君圖事尋盟我恤隣有才稱竹箭無用忝絲綸列樂歌鐘響張旃玉帛陳皇華榮受命垂譽本無因韓宣將聘楚申胥欲去秦方當飲河朔翻屬卧漳濵禮酒盈三獻賔筵盛八珍嵗稔鳴銅爵兵戢坐金人雲来朝起葢日落晩推輪異國猶兄弟相知無舊新裴訥之奉使至鄴館詩晉楚敦盟好僑札同心賞禮成罇俎陳樂和金石響朝雲駕馬進曉日乗龍上雙闕表皇居三臺映仙掌當堦篁篠密約岸荷蕖長束帶盡忻娯誰言騖歸兩周庾信將命至鄴詩大國修聘禮親隣自此敦張旃事原隰賔序報成言西過犯風露北指度轘轅交歡值公子展覿遇王孫何以譽嘉樹徒欣賦采蘩四牢盈折俎三獻盡罍樽人臣無境外何由欣此言風俗既殊阻山河不復論無因旅南館空欲祭西門眷然惟此别風期幸共存庾信將命至鄴酬祖正員詩我皇臨九有聲教洎無堤興文盛禮樂偃武息氓黎承乏驅騏驥旌旗事琬珪古碑文字盡荒城年代迷被隴文𤓰熟交塍香穗低投瓊實有慰報李更無蹊唐盧綸逢南中使因寄嶺外故人詩見説南来處蒼梧接桂林過秋天更暖邊海日長隂巴路縁雲出蠻鄉入洞深信逥人自説夢到月應沈碧水通春色青山寄逺心炎方難久客為爾一霑襟錢起送陸珽侍御使新羅詩衣冠周柱史才學我鄉人受命辭雲陛傾城送使臣去和滄海月歸思上林春始覺儒風逺殊方禮樂新錢起重送陸侍御使日本詩萬里三韓國行人滿目愁辭天使星逺臨水簡霜秋雲斾迎仙島虹旌過蜃樓定知懐魏闕逥首海西頭顧况送從兄使新羅詩六氣銅渾轉三光玉律調河宫清奉賮海嶽晏来朝地絶提封入天平賜貢饒揚威輕破虜柔服恥征遼曙色黄金闕寒聲白鷺潮樓船非習戰驄馬是嘉招帝女飛銜石鮫人賣淚綃管寧雖不偶徐福儻相邀獨島縁空翠孤霞上泬寥蟾蜍同漢月螮蝀異秦橋水豹横吹浪花鷹迥拂霄晨裝凌莽𣺌夜泊記招搖幾路通員嶠何山是沃焦颶風晴汨起隂火暝潛燒鬢髪成新髻人參長舊苗扶桑銜日近析木帶津遙夢向愁中積魂當别處銷臨川思結網見彈欲求鴞共散羲和厯誰差甲子朝滄波仗忠信譯語辨謳謠疊鼓鯨鱗隠隂帆鷁首飄南溟垂大翼西海飲文鰩指景尋靈草排雲聽洞簫封侯萬里外未肯後班超李益送歸中丞使新羅册立吊祭詩東望扶桑日何年是到時片帆通雨露積水隔華夷浩𣺌風来逺虚明鳥去遲長波靜雲月孤島宿旌旗别葉傳秋意迴潮動客思滄溟無舊路何處問前期劉禹錫送源中丞充新羅册立使詩相門才子稱華簮持節東行奉徳音身帶霜威辭鳳闕口傳天語到雞林煙開鼇背千尋碧日浴鯨波萬頃金想見扶桑受恩後一時西拜盡傾心馬戴送和北國使詩路始隂山北迢迢雨雪天長城人過少砂磧馬難前日入流沙際隂生瀚海邊刀鐶向月動旌纛冒霜懸逐獸孤圍合交兵一箭傳穹廬移斥候烽火絶祁連漢將行持節胡兒坐控弦明妃應望闕南送使臣旋趙嘏送裴評事詩塞垣從事識兵機只擬平戎不擬歸入夜笳聲含白髪報秋榆葉落征衣城臨戰壘黄雲晚馬渡寒沙夕照微此别不應書㫁絶滿天霜雪有鴻飛梁劉孝儀北使還與永豐侯書足踐寒地身犯朔風暮宿客亭晨炊謁舍飄颻辛苦迄届氊鄉雜種覃化頗慕中國兵傳李緒之法樓擬衛律所治而毳幙難淹酪漿易饜王程有限時及玉闗射鹿胡奴乃共歸國刻龍漢節還持入塞馬銜苜蓿嘶立故墟人獲蒲萄歸種舊里稚子出迎善隣相勞倦握蠏螯亟覆蝦椀未改朱顔略多自醉用此終日亦以自娯陳徐陵與王僧辯書何圖釁咎災極蒼旻號慕煩寃肝腸屠殞酷痛奈何無狀奈何維桑與梓翻作天涯植栢栽松悠然長絶明明日月號呌無聞茫茫宇宙容身何所窮劇奈何自忝膺嘉聘仍屬亂離上下年尊偏嬰此酷昔人迎門請盜恒懐廢寢之憂當輓輿親猶有危途之懼况乎逆寇崩騰京師播越興居動止長隔山河朝夕饘􅓞誰經心眼程糜不繼原粟何資瞻望風雲朝夕嗚咽固乃游魂已謝非復全生餘息空留非為全死同氷魚之不絶似蟄蟲之猶蘇良可哀也良可哀也自東都紹漢南亳興殷修好徴兵彌留星琯韓宣范武方駕連鑣蘇秦張儀朱輪華轂而孤子三危是擯四罪同科聽别馬而長號杖歸旍而永慟王稽返命既無托乗之恩椒舉相逢誰為班荆之位昔人違齊處魯時降徴求亡晉奔秦猶蒙招請問管寜於遼左追王朗於浙東並物譽時賢卿門公族懸須應務深挾情祈斯豈庸賤之儔耶非餘生之敢望也又使東魏值侯景亂與北齊尚書令一作僕射楊遵彦求還書夫一言所感凝暉落於魯陽一志𡨕通飛泉擁於疏勒况復元首康哉股肱良哉隣國相聞風教相期者也天道窮剥鍾亂本朝情計馳惶公私鯁懼而骸骨之請徒淹嵗寒顛沛之折空盈卷軸是所不圖也非所仰望也執事不聞之乎昔分鼇命鳸之世觀河拜洛之年則有日烏流灾風禽騁暴天傾西柱地闕東門盛旱折三洲長波含五岳我大梁膺金圖而有亢纂玉鏡而猶屯何則聖人不能違時斯固窮通之恒理也至若荆州刺史湘東王幾神之本元一作無寄名言陶鑄之餘猶為堯舜雖復六代之舞陳於總章九州之音登於司樂虞䕫拊石晉曠調鐘未足頌此英華無以宣其盛徳者也若使郊禋楚翼寜非祀夏之君龕定京師一作戡定艱難即是匡周之霸豈徒豳王徙雍期月為都姚帝遷河周年成邑方今越裳𣺌𣺌馴雉北飛肅慎茫茫風牛南偃吾君之子含識知歸而答㫖云何所不投身斯所未喻一也又聞晉熈等郡皆入貴朝去我尋陽經途何幾至於鐺鐺曉漏的的宵烽隔溆浦而相聞臨髙臺而可望泉流寶葢一作盌遙憶湓城峰號香爐依然廬岳日者鄱陽嗣王範治兵滙派屯戍瀹波朝夕牋書春秋方物吾無從以躡屐彼有路而齊鑣豈其然乎斯不然矣又近卲陵王綸通和此國郢中上客雲聚魏都鄴下公卿風馳江浦豈盧龍之逕於彼新開銅駝之街於我長閉何彼途甚易非勞於五丁我路為難如登於九折地不私載何其爽歟而答㫖云還路無從斯所未喻二也又晉熈廬江義陽安陸皆云欵附非復危邦計彼中途便當靜晏自斯以北桴鼓不鳴自此以南王靈未缺一作封疆未一如其境外脱殞輕軀幸非邊吏之羞何在匹夫之命又此賔遊通無貨殖忝非韓起聘鄭私買玉環呉札過徐躬要寶劍由来宴錫凡厥囊裝行役淹留皆已虚罄散有限之微財供無期之久客斯可知矣且據圖刎首愚者不為運斧全身流庸所鑒何則生輕一髪自重千鈞不以賈盜明矣骨肉不任充鼎俎皮毛不足入貨財盜有道焉吾無憂也又公家遣使脱有資頒本朝非隆平之時游客豈皇華之勢輕裘獨宿非勞聚橐一作之儀微騎間行寜望輶軒之禮歸人將從私具驢騾縁道亭郵惟希蔬粟若曰留之無煩於執事遣之有費於官司或以顛沛為言或云資裝可懼固非通論皆是外篇斯所未喻三也又若以吾徒應還侯景侯景凶逆殱吾國家天下含靈人懐憤厲既不獲投身社稷衛難乗輿四塜磔蚩尤千臠割王莽安所謂俛眉頓膝歸奉寇讎佩弭腰鞬為其皂𨽻又日者通和方敦曩睦兇人狙詐遂駭狼心頗擬宋萬之誅彌懼荀罃之請所以奔蹄勁角專恣慿陵凡我行人偏鍾讎憾正當葅筋醢骨抽舌探肝於彼兇情猶當未雪海内之所知也君侯之所具焉又聞本朝王公居人士女風行雨散東播西沈城闕丘墟菅蓬蕭瑟偃師還望咸為艸莱霸陵逥首皆霑霜露此又君之所知也彼以何義爭免寇讎我有何勲爭歸委質昔鉅平貴將懸重於陸公叔向名流深知於鬷蔑吾雖不敏常慕前修不圖明庶為懐翻其以此量物昔魏氏將亡羣兇挺爭諸賢戮力想得其朋為葛榮之黨也一作邪為邢果之徒耶如曰不然斯所未喻四也又假使我徒還為兇黨侯景生於趙代家自幽恒任則台司行為連率山川形勢軍國彛章不勞請箸為籌便當屈指能算景以逋逃小醜羊豕同羣身寓江臯家留河朔鄉井鄉邑如鬼如神其不然乎抑又君之所知也且夫宫闈祕事皆若雲霄英俊訏謨寜非帷幄或佯驚以定䇿或焚藁而奏書朝廷之士猶難參預羈旅之人何偕耳目至於禮樂沿革刑政寛猛謳歌已逺萬舞成風不知手之舞之足之蹈之也安在搖其牙齒為間諜者哉若謂復命西朝終奔東虜雖齊梁有隔尉候奚殊豈以河曲之難浮而曰江闗之可濟河橋馬渡寜非宋典之奸闗路雞鳴皆是田文之客何其通蔽乃爾相妨斯所未喻五也又兵交使在雖著前經倘同狥僕之尤追恣韓山之怒一作寒山則凡諸元帥並釋纍囚爰及偏禆同加恩禮一作無剪馘乃至鍾儀見赦朋咲遵途襄老蒙歸虞歌引路吾等張􅎶拭玉修好尋盟渉泗之與浮河郊勞至於贈賄公恩既備賔敬無違今者何諐翻蒙貶責若以此為言斯所未喻六也若曰妖氛永久喪亂悠然哀悼奔波存其形魄固已銘茲厚徳載此𢎞恩譬渤澥而俱深方嵩華而猶重但山梁飲啄非有意於樊籠江海飛浮本無情於鐘鼓况吾等營魂已謝餘息空留悲黙為生何能支久是則雖蒙養䕶更夭天年若以此為言斯所未喻七也若云逆䜿殱夷當聽返命髙軒繼路飛葢相随未解其言何能善謔夫亨屯治亂豈有意於前期謝常侍今年五十有一吾今年四十有四介已知命儐又杖鄉計彼後生肩隨而已豈銀臺之要彼未從師金竈之方我知其訣正恐南陽菊水竟不延齡東海桑田無由佇望若以此為言斯所未喻八也足下清襟勝託書囿文林凡曰洪荒終於幽厲如吾今日寜有其人爰至春秋微宜商略夫宗姬殄墜霸道昏凶或執政之多門或陪臣之涼徳故臧孫有禮翻囚與國之賔周伯無諐空怒天王之使遷箕卿於兩館縶樂一作驥子於三年斯匪貪亂之風耶寧比當今之髙例也至於雙崤且帝四海爭雄或構趙而侵燕或連韓而謀魏自永盟於楚殿躬奪璧於㤗庭輸寶鼎以托齊王慿安車而誘梁客其膏唇販舌分路揚鑣無罪無辜如兄如弟逮乎中陽受命天下同歸巡省諸華無聞幽辱及三方之霸也孫甘言以娬媚曹屈話以覊縻旌軫嵗到於勾呉冠葢年馳於庸蜀則客嘲殊險賔戲已深共盡遊談誰云猜忤若使搜求故實脱有前蹤恐是叔世之姦謀非為邦之勝畧也抑又聞之雲師火帝澆淳乃異其風龍躍麟驚王霸雖殊其道莫不崇君親以詔物敦敬養以治民預有邦家曾無隆替吾奉違温凊仍屬亂罹冦虜猖狂公私播越蕭軒靡御王舫誰持瞻望鄉闗何心天地自非生慿廪竹身一作源出空桑行路含情猶其相愍甞以擇官而事非曰孝家擇事而趨非云忠國況乎欽承有道驂駕前王郎吏明經鴟鳶知禮巡方省化咸問髙年東序西郊皆尊耆耋吾以圭璋玉帛通聘来朝屬世道之屯期鍾生民之否運兼年累載無申元直之祈銜泣吞聲長對公閭之怒情理之訴翻同逆鱗忠孝之言皆應對一作齚舌是所不圖也非所仰望也且天倫之愛何得忘懐妻子之情誰能無累夫以清河公主之貴餘姚書佐之家莫限髙卑皆被驅掠自東南醜虜抄販饑民臺署郎官俱餒牆壁况吾生離死别多歴暄寒孀室嬰兒何可言念如得身還鄉土躬自推求猶冀提携俱免凶虐夫四聰不達華陽君所謂亂臣百姓無寃孫叔敖稱為良相足下髙才重譽參贊經綸非虎非貔聞詩聞禮而中朝大義曽未經綸清禁嘉謨安能相及諤諤非周舍容容類胡廣何其無爭臣哉嵗月如流人生何幾晨看旅雁心赴江淮昏望牽牛情馳揚越朝千悲而下泣夕萬緒以逥腸不自知其為生不自知其為死也足下素挺辭鋒兼長理窟匡丞相解頥之説樂令君清耳之譚向所未疑誰能曉諭若鄙言為繆来㫖必通分請灰釘甘從釡鑊何但規規黙黙齰舌低頭而已哉若一理存焉猶希矜眷何故期令吾等必死齊都足趙魏之黄塵加幽并之片土遂使東平拱樹長懐向漢之悲西洛孤墳恒表思鄉之夢干祈已屢哽慟增深唐王維送晁監還日本國序舜覲羣后有苗不格禹㑹諸侯防風後至動干戚之舞興斧鉞之誅乃貢九牧之金始班五瑞之玉大道之行先天布化乾元廣運涵育無垠若華為東道之標戴勝為西門之候豈甘心於卭杖非徴貢於苞茅亦猶呼韓来朝舍於蒲萄之館昆彌遣使報以蛟龍之錦犧牲玉帛以將厚意服食器用不寶逺物百神受職五老告期况乎戴髪含齒得不稽顙屈膝海東諸國日本為大服聖人之訓有君子之風正朔本乎夏時衣裳同乎漢制歴嵗方達繼舊好於行人滔天無涯貢方物於天子司儀加等位在王侯之先掌次改觀不居蠻夷之邸我無爾詐爾無我虞彼以好来廢闗弛禁上敷文教虛至實歸故人民雜居徃来如市晁司馬結髪遊聖負笈辭親問禮於老耼學詩於子夏魯借車馬孔丘遂適於宗周鄭獻縞衣李札始通於上國名成太學官至客卿必齊之姜不歸娶於髙國在楚猶晉亦何獨於由余宦游三年願以君羮遺母不居一國欲其書錦還鄉莊舄既顯而思歸闗侯報恩而終去於是稽首北闕裹足東轅篋命賜之衣懐敬問之詔金簡玉字傳道經於絶域之人方鼎彛罇致分器於異姓之國琅邪臺上逈望龍門碣石館前夐然鳥逝鯨魚噴浪則萬里倒迴鷁首乗雲則八風却走扶桑若薺鬰島如萍沃白日而簸三山浮蒼天而吞九域黄雀之風動地黑蜃之氣成雲淼不知其所之何相思之可寄嘻去帝鄉之故舊謁本朝之君臣詠七子之詩佩兩國之印恢我王度諭彼蕃臣三寸猶存樂毅辭燕而未老十年在外信陵歸魏而逾尊武功部水戰唐王起昆明池習水戰賦乃命搜舳艫徴卒伍剡檝棹備金鼓得佽飛於荆江獲文身於越土榜人来萃水客斯覩介夫仡仡將牽牛以交映畫鶂呀呀與石鯨而對吐列萬夫之貔豹雜五兩之雪霜躍彼漣漪見魚麗之出游乎洲渚知雁翼之張武功部兵器魏曹植寳刀賦礪以五方之石礛以中黄之壤規圓景以定環攄神功而造像陸斬犀革水㫁龍角輕擊浮截刃不􅊏流踰南越之巨闕超西楚之泰阿實真精之攸御永天禄而是荷唐達奚珣豐城寳劔賦鍛霆電明秋水殺氣森映光輝四起歐冶失律風胡愕視闕秦客相劍賦天氣得中而不易金精順理而無逆翼乎秋水之欲波渙乎春氷之將釋陽㪚隂漫霜鍔雪脊好勇者不能禦其折衝善説者不能離其堅白賈餗太阿如秋水賦原其極良冶之功出洪爐之裏薛燭增駭風胡􅌓視千里萬里之斜漢耿耿方侔八月九月之洞庭沈沈相似深淺難測精光不死磨越砥疑穿石之泉淬葛溪如貫河之水氣晶熒而不息質瑩徹而難比流影耀金精之上涯涘皆空涼飇鳴玉匣之中波濤不起韜暎無慝埃塵不居澄曉峽黯清渠俯視則孤光溢目横窺而一帶澄虚龍泉非偶巨闕難儔蓮影如植龜文若遊星綴明珠孰辨懐珠之浦環分圓月終疑暎月之流陳章斗牛間有紫氣賦謂繞樞之電郁郁彌彰想干吕之雲亭亭自異殊祥可驗直質不渝委照自歸乎有晉藏鋒若避于亡呉對西掲之星望何勞於尹喜臨北走之塞相寜藉於風胡凌夾月之霞徘徊碧落透靄空之露隠暎白榆永夕猶存其光未匿齊効珍之金景鄙如虹之玉色韋肇金劍出匣賦發匣而覩爛然非常環啟蜯以吐月刃披雲而降霜若金隄始開横秋水之漫漫如青天欲倚散陽彩之煌煌裴夷直觀淬龍泉劍詩歐冶將成器風胡幸見逢發硎思剸玉投水化為龍詎肯藏深匣終期用刜鐘蓮華生寶鍔秋日厲霜鋒鍊質纔三尺吹毛過百重磨礲如不倦提握願長從晉張協七命楚之陽劔歐冶所營耶谿之鋌赤山之精銷踰羊頭鐷越鍛成乃鍊乃鑠萬辟千灌豐隆奮椎飛亷扇炭神器化成陽文隂縵既而流綺星連浮彩豔發光如散電質如耀雪霜鍔水凝氷刃露潔形冠豪曹名珍巨闕指鄭則三軍白首麾晉則千里流血豈徒水截蛟鴻陸灑奔駟㫁浮翮以為工絶重甲而稱利云爾而已哉若其靈寶則舒辟無方竒鋒異模形震薛燭光駭風胡價兼三鄉聲貴二都或馳名傾秦或夜飛去呉是以功冠萬載威曜無窮揮之者無前擁之者身雄可以從服九國横制八戎爪牙景附函夏承風梁劉孝儀為晉安王謝賜玉環刀啟苗峰珍鋌利極鉤芒謹當擁以雄身藉而安體不令北海小雍孤擅穿滕之寄廬江佩刀獨表不欺之驗晉張協長鋏銘五材並建金作明威長鋏陸離弭凶防違素刃霜厲溢景横飛又短鋏銘器用多品詭制殊觀亦有短鋏清暉載爛昔在先朝戢兵靜亂惟皇寶之優而弗玩周庾信刀銘風伯吹罏雲師煉冶鐡燄朝流金精夜下價重十城名髙千馬千金穎合百鍊鋒成光連斗氣燄動山精身文水動刃古珠生斗精遙降山靈下從水文千曲蛇鱗百重燕砥歛刃蜀水開鋒氣生分景環成屈龍梁簡文帝馬槊譜序馬槊為用雖非逺法近代相傳稍已成藝鄧蔍榮魏后之廷武而猶質種馬入丹陽之寺雄而未巧聊以餘暇復撰斯法捜採抑揚斟酌煩簡至春亭落景秋臯晩静嚴霜盡降密雲初晴纎驪沃若天馬半漢盼金精而轉態交流汗血愛連乾而自息不畏衣香雕衢與白刃同暉翠眊與紅塵俱動足使武夫憤氣觀者衝冠巴童留玩不待輕舟之楫越女踟蹰無假如臯之箭武功部死事唐張説為魏元忠祭石嶺戰亡兵士文痛茲壯士翦為國殤盍訴上帝降厲鬼方助氣金鼓復怨沙場虜血爾酹虜醢爾嘗封屍死所招魂故鄉程浩相州公宴堂記百戰俠骨委於溪澗九遷殤魂飛在草莽唐太宗貞觀年為戰陣處立寺詔有隋失道九服沸騰朕親總元戎致茲明罰誓牧登陑曽無寜嵗其有桀犬嬰此湯羅銜鬚義憤終乎握節各狥所奉咸有可嘉日徃月来逝川斯逺雖復項籍致命封樹紀於丘墳鮑信捐生丹青著於圖象猶恐九泉之下尚淪鼎鑊八難之間永纒氷炭愀然疚懐用忘興寢所以樹其福田濟其營魄可以建義以来交兵之處為義士兇徒殞身戎陣者各建寺刹招延勝侣望法鼓所振變炎火於青蓮清梵所聞易苦海於甘露古儷府卷十
