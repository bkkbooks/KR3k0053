池塘隨栁密原野雜花疏帝幕看逾暗歌鐘聽自虛興闌歸騎轉還奏弼違書張説奉和恩賜樂遊園宴應制詩漢苑佳遊地軒庭近侍臣共持榮幸日來賞艷陽春饌玉頒王篚摐金下帝鈞池臺草色遍宫觀柳條新花綬光連榻朱顔暢飲醇聖朝多樂事天意每隨人又蘇頲詩侍飲終酺會承恩續聖遊戴天惟慶幸選地即殊尤北面祗雙闕南臨賞一丘曲江新溜緩上苑雜花稠亹亹韶絃屢戔戔賁帛周醉歸填畛陌榮耀接軒裘又張九齡詩寶筵延錫命供帳敘羣公形勝宜春接威儀建禮同晞陽人似露解愠物從風朝慶千齡始年華二月中輝光變草木和氣發絲桐嵗嵗無為化徒知樂九功李嶠奉和幸韋嗣立山莊侍宴應制詩南洛師臣契東巖王佐居幽情遺紱冕神眷屬樵漁制下洞山蹕恩回灞水輿松門駐旌罕薜幄引簪裾石磴平黃陸煙樓半紫虛雲霞仙路近琴酒俗塵疏喬木千齡外懸泉百丈餘崖深經鍊藥穴古舊藏書樹宿搏風鳥池逰縱壑魚寧知天子貴尚憶武侯廬又武平一詩三光回斗極萬騎肅勾陳地若遊汾水畋疑歷渭濱圓塘氷寫鏡遙樹雪成春絃奏魚聽曲機忘鳥狎人築巖思感夢磻石想垂綸落景搖紅碧層隂結翠筠素風紛可尚玄澤藹無垠薄暮清笳動天文煥紫宸又徐彥昭詩鼎臣休浣隙方外結遐心别業清霞徑孤潭碧樹林每持東野䇿遙弄北溪琴帝幸紆時豫台園賞嵗隂移鑾明月沼張俎白雲岑御酒瑤觥落仙壇竹徑深三光懸聖藻五等冠朝簪自愧承恩盛咸言獨在今又崔湜詩丞相登前府尚書啓舊林式閭明主睿榮族聖嬪心川狹旌門抵巖髙蔽帳臨間窗慿柳暗小徑入松深雲卷千峰色泉和萬籟吟蘭迎天女珮竹礙侍臣簪宸翰三光燭朝榮四海欽還嗟絶機叟白首漢川隂又蘇頲詩摐金寒野霽步玉曉山幽帝握期松子臣廬問葛侯百工徵往夢七聖扈來遊斗柄乘時轉台階捧日留樹重巖籟合泉迸水光浮石徑喧朝履璜溪擁釣舟恩如犯星夜歡比濟河秋不學堯年隱空令傲許由沈佺期奉和幸禮部尚書竇希玠宅應制詩北闕垂旒暇南宫聽履回天臨祥鳳轉恩向濯龍開蘭氣承仙帳榴花引御杯水從金穴吐雲是玉山來池影搖歌席林香散舞臺不知行漏晚清蹕尚徘徊又蘇頲詩尚書列侯地外戚近臣家飛棟臨青綺回輿轉翠華日交當户樹泉漾滿池華圓頂圖嵩石方流擁魏沙豫遊今聽履侍從昔鳴笳自有天文降無勞訪海查蘇頲幸新豐及同州敕虞之四朝且遍區宇漢之三輔本同京師善于古者考于今發乎邇者應乎遠若順豫之事缺則紊于王制巡遊之典備則慮于人勞朕受命膺期勵精設教幸乾坤幽贊風雨咸若百物既阜三農已登同穎薦于宗廟雙穗生于郡國我無大桀實欣於嵗取人有小康未果于時邁但左翊之地近入黃圖新豐之邑甫鄰青綺山川宫館咫尺相望欲過灞亭而涉滻經沙阜而臨渭見彼耆耋問其疾苦察長吏之政恤黎氓之寃蓋所以展義陳詩觀風問俗始自畿甸化於天下張説諫則天幸三陽宫表臣聞明王不惡切諫以博覽忠臣不敢隱忠以曲辭陛下屯萬乘幸離宫暑退涼歸未降還旨愚臣固陋恐非長策請為陛下陳其不可三陽宫去洛陽城一百餘里有伊水之隔崿坂之峻遇涉夏秋扈從兵馬日費資給連雨彌旬即難周濟陛下太倉武庫並在都邑積粟利器藴若丘山奈何去宗廟之上都安山谷之僻處是猶倒持劒戟示人鐔柄臣竊為陛下不取夫禍敗之生在人所忽故曰安樂必戒無行所悔此不可止之理一也告成𥚹小萬方輻湊填城溢郭併插無所排斥居人蓬宿草次風雨暴至不知庇託孤惸老疾流轉衢巷陛下作人父母將若之何此不可止之理二也造設竒巧誘掖上心鑿山疏觀竭流漲海俯貫地脈仰出雲路易山川之氣奪農桑之土延木石運斧斤山谷連聲春夏不輟勸陛下作此者豈正人邪詩云民亦勞止汔可小康此不可止之理三也御苑東西僅三十里出入來去雜人甚多外無牆垣扃禁內有榛藂溪谷猛獸所伏暴慝是慿陛下來往輕行警蹕不肅歷蒙密乘險巇卒然有逸獸狂夫驚犯左右豈不殆哉雖萬全無疑然人主之動不宜容易也易曰思患豫防願陛下為萬姓持重此不可止之理四也崔融為皇太子請停幸東都表臣聞乘雲駕羽者非以逸樂其身觀風設教者將以𢎞濟于物故後豫胥怨幾望湯來吾王不遊嘗思禹會林希尚書省謝車駕臨幸表天臺肇建具崇喉舌之司帝車下臨增重陛亷之寄非常之舉視古無倫忽紆清蹕之傳罙聳鴻都之觀且北辰居極外環象斗之宫而黃道所經旁及積星之位瞻威顔于咫尺被法語之丁寧敕以在公退而交警分曹率屬燦然周典之文望輦拜恩陋彼漢郎之歎齊王融三月三日曲水詩序臣聞出豫為象鈞天之樂張焉時乘既位御氣之駕翔焉是以得一奉宸逍遙襄城之域體元則大悵望姑射之阿然窅渺寂寥其獨適者也至如夏后兩龍載驅璿臺之上穆滿八駿如舞瑤水之隂亦有饗云固不與萬民共也後漢班固東巡頌粵若稽古在漢迪哲聿修厥德憲章丕烈翿六龍較五輅齊百僚陶質素命南重以司厯厥中月之六辰備天官之列衛盛輿服而東巡馬融東巡頌允迪在昔紹烈陶唐殷天衷克搖光若時則運瓊衡敷六典經八成肆類乎上帝實柴乎三辰禋祀乎六宗祗燎乎羣神遂發號羣司申戒百工卜筮稱吉蓍龜襲從南征有時馮相告祥清夷道而後行曜四國而揚光展聖義于巡狩喜圻畤而詠八荒指宗嶽以為期固岱神之所望散齋既畢越翼良辰棫槱增構烈火燔燃暉光四煬焱爛薄天蕭香肆升青煙習雲圭璋峩峩犧牲潔純鬱鬯宗彛明水玄樽空桑孤竹咸池雲門六八匝變神祗並存唐王勃九成宫頌姬文考筮容成奏日千旌鳳轉儼鏤象而星陳萬騎龍嘶伐靈鼉而曉胤靜帷宫于緑野肅帳殿于黃街奔欃槍而走陸梁陳浮靈而候明月前驅電竦下列缺于騰鞭後乘雷驚起豐隆于驟轂瓊戈晝指太陽疲轉日之鋒玉劒霄翻懸象睹衝星之氣禮部登極梁王僧辨勸進表以錫圭之功既歸有道當璧之禮允屬聖明而優詔謙沖窅然凝邈飛龍可躋而乾爻在四帝閽云扣而閶闔未開謳歌再馳是用翹首所以越人固執薰丹穴以求君周氏樂推踰岐山而事主漢王不即位無以賞功臣光武不止戈豈謂紹宗廟縱陛下拂袗衣而遊廣城登弇山而去東土羣臣安得仰訴兆庶何所歸仁况郊祀配天罍篚禮曠齋宫清廟匏竹不陳仰望鑾輿匪朝伊夕瞻言法駕載渴且飢豈可久羈衆議有曠彛則舊郊既復函洛已平髙奴櫟陽宫館雖毁濁河清濟佳氣猶存皋門有伉甘泉四敞土圭測景仙人承露斯蓋九州之赤縣六合之樞機博士捧圖書而稍還太常定禮儀而已列豈得不揚清駕而赴名都其玉鑾而遊正寢陳徐陵勸進梁元帝表封唐有聖還居帝嚳之家居代維賢終纂髙皇之祚無為稱于革舄至治表于垂裳而撥亂反正非聞前古至如金行重作源出東莞炎運猶昌枝分南頓豈得掩顯姓於軒轅非才子于顓頊莫不因時多難俱繼神宗者也伏惟陛下出震等于勳華鳴謙同于旦奭握褒秉鉞將在御天玉媵珠衡先彰元后神祗所合非惟太室之祥圖牒斯歸何止堯門之瑞若夫大孝聖人之心中庸君子之德固已作訓生民貽風多士一日二日研覽萬幾允文允武包羅羣藝兹以三大賓是四門歷試諸艱咸熙庶績斯無得而稱也自無妄為象踵禍上京梟獍咸劉宗社蕩墜銅頭鐵額興暴皇年封狶修蛇行災中國靈心所宅下武其興望紫極而行號瞻丹陵而殞慟家寃將報天賜黃鳥之旗國害宜誅神奉玄狐之録尅李軼於河津征陶謙于海岱滕公擁樹雄氣方嚴張繡交兵風神彌勇忠誠貫于日月孝義感于氷霜如雷如霆非貔非虎前驅效命元惡斯殱既挂膽于西州方燃臍于東市蚩尤三冢寧謂嚴誅王莽千剸非云明罰青羌赤狄同界豺狼胡服夷言咸為京觀邦畿濟濟還見隆平宗祀愔愔方承多福自氛氲渾沌之世驪連栗陸之君卦起龍圖文因鳥迹雲師火帝非無戰陳之文禹誓湯征咸用干戈之道星躔東井時破肴潼霆震南陽初平尋邑未有援三靈之已墜救四海之羣飛赫赫明明龔行天罰得如當今之盛者也於是卿雲似蓋晨映姚鄉甘露如珠朝垂原寢芝房感德咸出銅池蓂莢伺辰無勞銀箭重以東漸玄兔西踰白狼髙栁生風扶桑銜日莫不編名屬國歸貢鴻臚荒服來賓遐邇同慶其文昭武穆跗萼也如彼天平地成功業也如此久應旁求典故詢詔天官斟酌繁昌經營髙邑宗王啓霸非勞武德之侯清蹕無虞何事長安之邸揚龍旗以享帝御鳳扆以承天厯數在躬疇咨為讓七月二十四日散騎常侍栁暉等至鄴伏承聖旨謙沖為而不宰咸云洛陽未復函谷無泥旋駕金陵方膺天眷愚謂大庭少昊非有定居漢祖殷宗皆無恆宅登封岱嶽且置明堂巡狩荆州時行司隸何必西瞻虎踞乃建王宫南望牛頭方稱天闕抑又聞之玄圭既錫蒼玉無陳乃棫朴之愆期非包茅之不貢雲和之瑟久廢甘泉孤竹之管無聞方澤豈不懼歟伏願陛下因百姓之心振萬邦之命豈可逡巡固讓方示石户之農髙謝為君徒效箕山之客未知上德之不德惟見聖人之不仁率土翹翹蒼生何望昔蘇秦張儀違鄉負俗尚復招三方以事趙請六國以尊秦况臣等預奉皇華親承朝命圭璋特達通聘河陽貂珥雍容尋盟漳水加牢貶館隨世汚隆瞻望鄉關誠均休戚但輕生不造命與時乖等一介之行人同三危之遠擯承問內殿事絶耿弇之因封奏邊城私等劉琨之哭唐柳宗元賀登極表天地泰而聖人出雷雨解而品物榮是以五行迭用木火更其位千葉重光宗廟輔其德殷宗恭默再開成湯之業漢文聰明克成髙祖之緒梁元帝答王僧辨勸進書孤以不德天降之災枕戈飲膽叩心泣血風樹之酷萬死不追霜露之哀百憂總萃甫聞伯升之禍彌切仲謀之悲若封豕既殱長蛇即戮方欲追延陵之逸軌繼子臧之髙讓豈資秋亭之壇安事繁陽之石侯景項籍也蕭棟殷辛也赤泉未賞劉邦尚曰漢王白旗弗懸周發猶稱太子飛龍之位孰謂可躋附鳳之徒既聞來議羣臣卿士其諭孤之志禮部聖誕唐明皇千秋節宴詩蘭殿千秋節稱名萬嵗觴風傳率土慶日表繼天祥玉宇開花萼宫懸動會昌衣冠白鷺下帟幕翠雲長獻遺成新俗朝儀入舊章月銜花綬鏡露綴綵絲囊處處祠田祖年年宴杖鄉深思一德事小獲萬人康張説奉和千秋節宴應制詩五德生王者千齡啓聖人赤光來照夜黃雲上覆辰海縣銜恩久朝章獻夀新髙居帝坐出夾道衆官陳槊仗洗晴景磬管凝秋旻珠囊含瑞露金鏡抱仙輪何嵗無鄉飲何田不報神薰歌與名節傳代幸羣臣王季友皇帝移晦日為中和節詩皇心不向晦改節號中和淑氣同風景佳名别詠歌湔裙移舊俗賜尺下新科厯象千年正酺醵四海多花隨春令發鳥度嵗陽過天地齊休慶歡聲欲蕩波宋史文昌賀聖節表穹昊儲祥光輔萬億年之祚聖神開世適符五百嵗之期藹佳氣于乾坤溢歡聲于朝野福全洪範符周后之歷年策受泰元通漢家之永世與天齊久如日方升唐吕頌降誕日進光明砂等狀大電繞樞千年感聖神光照室六合歸尊恭唯降誕之辰是啓乾坤之祚普天稱慶率土同歡仰舜日而徘徊望堯雲而抃躍上玄降聖之時皇帝出震之日天垂景麗曜北斗以呈祥人竭歡心願南山以為夀裴次元降誕日進物狀搖光之祥貫月於佳夕繞樞之感降聖於良辰百靈效祉固增夀于南山萬國一心皆貢珍于北闕令狐楚降誕日進鞍馬等狀臣任重戎旃路遙天闕歡呼萬嵗如聞山嶽之聲傾竭一心庶均葵藿之志臣限守邉陲未朝雲闕尚想河清之色如聞里鼓之聲王仲周降誕日進器物狀紫氣充庭黃河變色用符昌運式表誕彌雖聖夀齊天不假封人之祝而獻芹為禮空馳野老之誠禮部天子加元服後漢黃香天子冠頌惟永元之盛代聖皇德之茂純躬蒸蒸之至孝崇敬順以奉天以三載之孟春建寅月之上旬皇帝將加玄冕簡甲子之元辰厥日王于太皥厥時叶于百神皇輿幸夫金根駕玄虯之連蜷建螭龍以為旗鳴節路之和鑾既臻廟而成禮乃回軫而反宫正朝服以享宴撞太蔟之庭鐘祚蕃屏與鼎輔暨夷裔之君王咸進酌于金罍獻萬年之玉觴禮部太學後漢張衡東京賦春日載陽合射辟雍設業設虡宫懸全鏞鼖鼓路鼗樹羽幢幢于是備物物有其容伯夷起而相儀后夔坐而為工張大侯制五正設三乏厞司旌并夾既設儲乎廣庭于是皇輿夙駕𨌅于東階以須消啓明掃朝霞登天光于扶桑天子乃撫玉輅時乘六龍發鯨魚鏗華鐘大丙弭節風后陪乘攝提運衡徐至于射宫禮事展樂物具王夏闋騶虞秦決拾既次雕弓斯彀達餘萌于暮春昭誠心以遠喻進明德而崇業滌叨餮之貪欲仁風衍而外流誼方激而遐騖唐朱休駕幸太學賦屬車連延輾御陌而後入翠華容裔向文囿以前驅臺觀惟新牆垣盡飾宗伯禮賢以蕆事司成執經而奉職端冕旃而綵仗初立始駐六龍發聲教而翠華未旋以行萬國龍顔不遠顧探索之惟勤天步下臨曷斯須之敢惰雲布星攢周回可觀彼儒風之習習資睿思以安安頥指于學海儒林自因澤及目擊乎雄詞麗藻誰謂才難恩下育而冬暖命遐宣而晝寒宣化畢盛禮終繳素志播皇風轉龍旗于祥煙之表返鑾輅于瑞氣之中黎逢貢士謁文宣王賦聖人沒而教在明王興而道宣命上公以陳信展大禮以登賢觴酒豆肉金鏞管懸致克禋以如在當質明而不愆祁祁諸生必恭敬止廓廣庭以容衆峩髙冠以修己臨奠獻之筵肅造秀之士階間儼以成列槐隂布以如市將備禮于先師遂儲精于祝史于以致君恢復王化𢎞闡人文磬音繼于夜杵燭影迎于朝雲見曲暢于和易知具歆于苾芬肅肅階戺隂隂門闕喬木棲于暮煙前軒滿于行月羣士沓而嵗至庶工齊而曉謁上玄酒以清滌間朱絃而踈越齊百王于建號歷千古而未歇蓋以教俟天地而不朽功格宇宙而不伐陳沈不害上髙祖置學書臣聞立人建國莫尚于尊儒成俗化民必崇于教學故東膠西序事隆乎三代環林璧水業成于兩京自淳源既遠澆風以扇物之感人無窮人之逐物無節是知施設訓範啓導心靈譬彼染藍類諸琢玉然後人倫以正髙卑有序忠孝之禮既明君臣之道攸固執禮自塞魯公所以難侮歌樂已細鄭伯于前知亡干戚舞而有苗至泮宫成而淮夷服長想洙泗之風載懷淹稷之盛有國有家莫不尚已成均自斯墜業瞽宗于是不修褒成之祠不陳祼享釋菜之禮無稱俎豆後生敦悅不見函丈之儀晚學鑽仰徒深倚席之歎使擔簦負笈鏘鏘接袵方領矩步濟濟成林如切如磋聞詩聞禮一年可以倍功三冬于是足用故能擢秀雄州揚廷觀國入仕登朝資優學以自輔蒞官從政有經業以治身輜駕列廷青紫拾地唐皮日休移成均博士書俾庠聲序音玲瓏于珩珮鏗訇于金石為諸生之蓍龜作後來之綿蕝又請韓文公配饗太學書唯昌黎文公之文蹴楊墨于不毛之地蹂釋老于無人之境故得孔道爣集本作巍然而自正陳徐陵皇太子臨辟雍頌臣聞天大王大詳于道德之言天文人文顯于爻象之説是以大君革命黔首所以庇焉聖人創制文籍所以生焉咸由此道制為民極莫不對越上靈裁成庶類濟世育德昭被昆蟲皇帝世膺下武體兹上德握天鏡而授河圖執玉衡而運乾象皇太子曜彼重離光兹匕鬯儀天以文化成天下侍中國子祭酒新安王宗室羽儀衣冠凖的惟善為樂造次必儒粵以十一年三月二十一日受詔𢎞宣發論語題攝齊升堂摳衣即席對揚天人開闢大訓清言既吐精義入神副德爰動音闕鋒起問難泉涌辨論綸之異定倫理之疑玉振鏘鏘雲浮雨布介王奉繫聖蹤馳辨秀出信令張禹慙其師法何晏忸其訓詁穆穆焉洋洋焉此實虞朝之盛德生民之壯觀者也臣抑又聞之魯頌聿興史克宣其懿晉雍大啓王廙逞其詞所以述休平之風揚君上之德輕以下材敢為頌曰皇運勃啓膺圖受命紫蓋東臨黃旌南映積仁纍德重明疊聖四海無浪三階已平儲駕戾止和鸞有聲𢎞風講肆崇儒肅成丹書貴道黃金賤籝洙泗興業闕里增榮禮部州郡學梁簡文帝求寧國臨城二公入學表臣聞瞻彼緝狐既次良冶相諸筍玉猶藉他山故沮渙之水可居鄒魯之鄉為貴下帷投斧昔人以為精力棄竿委麥先哲以為美談伏惟陛下𢎞至德之微言闡無為之妙説話郊講道不勞賈生之議就陽啓位無待公玉之圖願得齒年國胄隨肩選造梁元帝請于州立學校表臣聞公宫之南四術四教司樂成均六詩六律韶濩既舞羽籥之道行焉黨孰兹備離經之志辨焉故不升嵩霍豈識乾行之峻不臨溟渤安知地載之厚洎乎秦焚金篆周亡玉鏡羣言爭亂諸子相騰書則夏侯歐陽易則神輸道訓詩乃齊魯毛韓傳稱鄒左張夾禮有曲臺王史之異樂有龍德趙定之殊伏惟陛下撫五辰而建五長播九德而導九州容成為厯興景雲之瑞伶倫吹律應黃鍾之管撥亂反正經武也制禮作樂緯文也若非六經庖厨百家異饌三墳為瑚璉五典為笙簧豈能暴以秋陽紆就望之景濯以江漢播垂天之澤王僧孺為蕭監利求入學啓竊以翹首伺飛不如修弋宛足念遠莫若驅鑣故朴斫成于丹雘篠簜資于栝羽敢因莩末有志庠均為山資于一簣學海漸其微流任昉為劉瓛立館啓昔在魏中爰及晉始書貴虛玄人悅陶縱瑚璉廢泗上之容樽俎恣林下之適春干秋羽委曠而弗陳西序東膠寂寥而誰仰所以金雞忘曉玉羊失馭神器毁于獯戎寶厯遷于於越豈不悲歟劉瓛澡身浴德修行明經賤圭璧于光隂徑松筠於嵗晚貧不隕穫其心窮不二三其操而困無居止浮寓親遊垣棟傾替窐衢墊側有朋自逺無用栖慿皆負笈擔簦櫛風沐露瓛之器學無謝前修輒欲與之周旋開館招屈臣第西偏官有間地北距晉山南望通邑雖曰人境實少浮喧廣輪裁盈數畝布以施立黌孰薄藝桑麻粗創茨宇唐梁肅崑山縣學記昔崔瑗有南陽文學志王粲有荆州文學志皆表儒訓以著不朽蕭定袁州文宣王廟記廊廡庭除罔不畢葺籩豆簠簋罔不畢陳入其室若聞講誦之音升其堂如聆金石之響冀夫袁江之上將𢎞洙泗之風袁山之人能傳鄒魯之學儒行充于比屋中庸化而為俗矣禮部養老後漢張衡東京賦日月會於龍尨恤人事之勞疚因休力以息勤致歡欣于春酒執鑾刀以袒割奉觴豆於國叟降至尊以訓恭送迎拜于三壽敬慎威儀示民不偷我有嘉賓其樂愈愈晉隂淡請索襲為三老書今四表輯寧將行鄉射之禮先生年耆望重道冠一時養老之義實繫儒賢既樹非梧桐而希鸞鳳降翼器謝曹公而冀蓋公枉駕誠非所謂也然夫子至聖有召赴焉孟軻大德無聘不至蓋欲𢎞闡大猷敷明道化故也今之相屈遵道崇教非有爵位意者或可然乎禮部喪葬梁何遜悲行路孤墳詩行路一孤墳路成墳已毁空疑年嵗積不知陵谷徙幾經秋葉飛驟見春流瀰金蠶不可織玉樹何曽蕊陌上驅馳人笑歌自侈靡今日非明日可憐詎憐此陳張正見和楊侯送袁全紫葬詩玄泉開隧道白日照佳城一朝嗟此路千載幾傷情秋氣悲松色凄風咽晚聲歸雲回谷散還栁背山輕唯當三五夜壟月暫時明唐太宗望送魏徵葬詩閶闔總金鞍上林移玉輦野郊愴新别河橋非舊餞慘日映峰沈愁雲隨蓋轉哀笳時斷續悲旌乍舒卷望望情何極浪浪淚空泫無復昔時人芳春共誰遣皇甫冉送魏六侍御葬詩哭葬寒郊外行將何所從盛曹徒列柏新墓已栽松海月同千古江雲復幾重舊書曽諫獵遺草議登封疇昔輕三事常期老一峰門臨商嶺道忩引洛城鐘應積泉中恨無因世上逢招尋偏見厚疏慢亦相容張范唯通夢求羊永絶蹤誰知長卿疾歌賦不還邛李端張丞相挽歌素斾低寒水清笳出曉風鳥來傷賈傅馬立禍滕公松柏青山上城池白日中一朝今古隔唯有月明同張説崔司業挽詞像設存華館威儀下墓田鳳池傷舊草麟史泣遺篇帷蓋墟煙沒干旌壠日懸古來埋玉樹流恨盡山川溫庭筠過北海墓詩撫事如神遇臨風獨涕零墓平春草緑碑折古苔青圭玉埋英氣山河孕炳靈發言驚辨囿揮翰動文星藴策期干世持權欲反經激揚思壯氣流落歎頺齡惡木人皆息貪泉我獨醒輪轅無匠石刀几有庖丁碌碌迷藏器規規守潔瓶憤容陵鼎鑊公議動朝廷故國將辭寵危邦竟緩刑上卿亷白璧凡石礪青萍揭月昭東夏摶風滯北溟後塵遵軌轍前席詠儀型木秀當憂悴絃傷不底寧矜誇遭尺鷃光彩困飛螢草羽留談柄清風襲德馨鸞凰嬰雪刃狼虎犯雲屏蘭蕙荒遺址榛蕪蔽舊坰羡君雖不祿猶得到明庭又過陳琳墓詩曽於青史見遺文今日飄蓬過此墳詞客有靈應識我霸才無主始憐君石麟埋沒藏春草銅雀荒涼對暮雲莫怪臨風倍惆悵欲將弓劒學從軍張祜真娘墓詩佛地葬羅衣孤魂此是歸舞為蝴蝶夢歌謝伯勞飛翠髮朝雲斷青蛾夜月微傷心一花落無復戀春暉羅隱經耒陽杜工部墓詩紫菊馨香覆楚醪奠君江畔雨蕭騷旅魂自是才相纍間骨何妨冢更髙騄驥喪來輕蹇蹶芝蘭衰後遠蓬蒿屈原宋玉憐居處幾駕青螭緩鬱陶宋朝補之代司馬康子植謝應副葬事表致主之心已淪幽壤飾終之錫更躐舊章兆協卜之以時思殞身而莫報伏念臣祖光以德業名世常擢任于宰衡臣父康以詩禮成家亦登延而勸講而侈俗方改哀楊綰之已亡太醫遽臨痛桓榮之未老無祿私室荐罹鞠凶自啓手足之初至掩窀穸之際君命屢至賵賜有加復因屬匠之鳩材俾過家塋而視堋殘喘何力秋毫賴官仁深念功禮不遺舊將博勸于士類豈曲私于臣門克意紹先獨自期于忠孝纒哀待盡兩無報於君親周庾信擬連珠蓋聞穀林長遠蒼梧不從惟桐惟葛無樹無封是以隨珠日月無益驪山之火雀臺絃管空望西陵之松唐李商隱重祭外舅司徒公文簡子將戰之誓唯止桐棺晏嬰送死之文寧思石槨素車朴馬疏巾弊帷成一代之清規揚百古之休聞周庾信婁慈神道碑但以遊魂久客反葬途遠道阻山長妻孤子幼哀聲滿野愁氣連雲况復松檟飄颻方臨武威之戍丘陵回遠直對臨洮之城馬援亡于武溪尸柩返於魏里梁鴻死于會計妻子歸于平陵又鄭偉墓志合葬非古既異三王之前死則同穴還同六載之始雖復銜珠兩鶴同歸紫蓋之松出匣雙龍共沒延平之水梁任孝恭祭雜墳文惟爾冥然往代求圓石而無名邈矣遐年討方磚而不記封樹漂殄誰别羽商之家墳壟傾回終迷庚癸之向不謂綸繩所用遂毁牛亭之基鍬鍤所侵爰傷馬鬛之勢重使翠幕臨風佳城見日昔靈沼枯骨周王蓋以衣冠廣武橫尸漢主加其轊櫝輒勒彼山虞覆頺隍于舊址命兹匠者修反壤于故林還蟻結之文依似坊之勢幸得宜陽大道無變無移京兆長阡勿回勿徙庶幽魂逰止踐昔徑而不疑塗車往還瞻舊轍而猶在陳沈炯祭袁府君文長樂未央已夾樗里之墓公宫魯庫非復少昊之墟成土一棺未知何託解劒絮漿轉增欷歔已上喪葬唐陳子昻為義興公求拜掃表臣禍釁所鍾早日孤露墳塋莫掃松柏凋荒臣之不天實有由咎死罪死罪昔先臣下代遺訓未亡而殃降不圖家禍漸遘兄弟無故並為參商中冓之言所不可道孤臣不孝萬死餘責死罪死罪然臣之負譴實陷無辜吏議不明以投魑魅自泣血去國寄命南荒歷年被病再以生死炎山漲海氣瘴窮天戴白之老俗無聞者孤臣疲苶豈望須臾分謂委骨滄溟餌身魚鱉狼荒之鬼永悲長逝不意慶雲重澤天渙橫流拂拭露霜生見白日踴躍昭泰情何以堪死罪死罪而餘殃未泯凶故仍臻亡兄濟江合家淪溺嫂姪俱沒一不生存尋途未中臣妻又殞重疊亡殁契濶山川至止之日生意盡矣誓將守死陵墓殁齒家園不圖恩幸曲成寵章仍及題輿别駕職是恩州再造生涯天實為德死罪死罪臣自歸日淺塋廟未修荆棘荒蕪祭祀無主今則便祗王命遠職邊夷嵗月方賖拜掃何日瞻言出涕感咽崩摧伏惟陛下仁養羣生孝理天下萬物咸遂各得其宜臣獨向隅有以長戚伏願天慈愷悌憐憫孤窮寬以簡書之刑賜其告歸之請使其駿奔西土長號北陵獲申存殁之悲生謁園塋之樹稽顙松闕謝不睦之辜肉袒山門祈自新之路誓刻肌骨奉以周旋然後退死蠻夷沈骸糞土甘心朽滅庶無遺恨倘昊天鑒照孤誠可哀則臣之鮿生志畢今日不勝崩迫之至李商隱為楊贊善奏請東都灑掃狀竊惟令式合許芟除追遠興情敢希榮于陸􅀈報恩未死寧自誓於羲之祭掃附禮部諡南齊虞羲為袁彖求諡與蕭令王僕射書岱山委岫崑嶽摧峰四海搢紳誰不掩泣明公德冠時宗道髙物表若得橫議聖時斟酌今古採茂實于當年標流芳于千載馳徽諡于山道潤貞氣于泉門豈非體國之至公典謨之盛軌者哉禮部家廟唐顔真卿郭子儀家廟碑友于著睦臠龍虎者十人貽厥有光紆青紫者八九勳庸舉集今古莫儔昔奮號尊榮紅粟才霑于萬石惲家全盛朱輪不出于十人繇吾觀之事不侔焉清廟之典所以仁祖考鴻伐之刻亦以垂子孫爰創制于舊居將永圖而觀德中堂有侐丕構克崇感霜露而怵惕以增敘昭穆而敬恭斯在庶乎觀盥顒若既無斁于永懷入室僾然必有覿乎其位哀榮既極情禮用申仁人之所及遠哉孝子之事親終矣豈惟溫溫孔父遠稱讒鼎之銘穆穆魯侯獨美龍旗之祀牛僧孺代郡開國公王涯家廟碑銘閟宇神庭邃清而嚴上公之儀四室耽耽犧以潔牲粢以大糦交神尚敬合魄尚氣子姓宗工駿奔奉事副笄侈袂儼恪居次孝孫兢兢執爵而升以祼以濯以伏以興水陸具來羶薌畢登列于圜方其氣增增乃初蒸嘗敬而追遠二昭二穆孝以尊本瞻瞻几幄蹜蹜堂閫禮成起慕涕洟玄袞濡露踐霜誰無永懷不如達者哀與榮偕逢時奮庸誰不得位不如仁人以道為貴惟公之達兮名以顯親惟公之仁兮德以澡身六朝之清臣一代之全人宜其世家翼亮振振罔不恭肅祗于廟門古儷府卷七
