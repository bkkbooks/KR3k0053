body:
  text: 古儷府卷七明王志慶編禮部總載梁徐勉上修五禮表臣聞立天之道曰隂與陽立人之道曰仁與義故稱導之以德齊之以禮夫禮所以安上治人𢎞風訓俗經國家利後嗣者也唐虞三代咸必由之在乎有周憲章尤備因殷革夏損益可知雖復經禮三百曲禮三千經文三百威儀三千其大歸有五即宗伯所掌典禮吉為上凶次之賓次之軍次之嘉為下也故祠祭不以禮則不齋不莊喪紀不以禮則背死忘生者衆賓客不以禮則朝覲失其儀軍旅不以禮則致亂于師律冠婚不以禮則男女失其時為國修身于斯為急洎周室大壞王道既衰官守斯文日失其序禮樂征伐出自諸侯小雅盡廢舊章缺矣是以韓宣適魯知周公之德叔侯在晉辨郊勞之儀戰國從橫政教愈泯暴秦滅學掃地無餘漢氏鬱興日不暇給猶命叔孫于外野方知帝王之為貴末葉紛綸遞有興毁或以武功鋭志或好黃老之言禮義之式于焉中止及東京曹褒南宫制述集其散略百有餘篇雖寫以尺簡而終闕平奏其後兵革相尋異端互起章句既淪俎豆斯輟方領矩步之容事滅于旌鼓蘭臺石室之文用盡于末既而中原喪亂罕有所遺江左草創因循而已釐革之風是則未暇伏惟陛下睿明啓運先天改物撥亂惟武經時以文作樂在乎功成制禮𢎞于業定光啓二學皇枝等于貴遊闢兹五館草萊升以好爵爰自受命迄于告成盛德形容備矣天下能事畢矣明明穆穆無德而稱焉至若玄符靈貺之祥浮溟機山之賮固亦日書左史副在司存今可得而略也是以命彼羣才搜甘泉之法延兹碩學闡曲臺之儀淄上淹中之儒連蹤繼軌負笈懷鉛之彥匪旦伊夕諒以化穆三雍人從五典秩宗之教勃焉以興詔旨云禮壞樂缺故國異家殊實宜以時修定以為永準但頃之修撰以情取人不以學進其掌知者以貴總一不以稽古所以歷年不就有名無實此既經國所先外可議其人人定便即撰次于是尚書僕射沈約等參議請五禮各置舊學士一人人各自舉學士二人相助抄撰其中有疑者依前漢石渠後漢白虎隨源以聞請旨斷決復以禮儀深廣記載殘缺宜須博論共盡其致更使鎮軍將軍丹陽尹沈約太常卿張充及臣三人同參厥務臣又奉别敕總知其事末又使中書侍郎周捨庾於陵二人復預參知若有疑義所掌學士當職先立議通咨五禮舊學士及參知各言異同條牒啓聞決之制旨疑事既多嵗時又積制旨裁斷其數不少莫不網羅經誥玉振金聲義貫幽微理入神契前儒所不釋後學所未聞凡諸奏決皆載篇首具列聖旨為不刋之則洪規盛範冠絶百王茂實英聲方垂千載寧孝宣之能擬豈孝章之足云隋潘徽江都集禮序禮之為用至矣大與天地同節明與日月齊照源開三本體合四端巢居穴處之前即萌其理龜文鳥迹以後稍顯其事雖情存易簡意非玉帛而夏造殷因可得知也至於秩宗三禮之職司徒五禮之官邦國以和人神惟敬道德仁義非此莫成進退俯仰去兹安適若璽印塗猶防止水豈直譬彼耕耨均斯粉澤而已哉加以佃漁六學網羅百氏繼稷下之絶軌𢎞泗上之淪風賾無隱而不探事有難而必綜至于采標緑錯華垂丹篆刑名長短儒墨是非書圃翰林之域理窟談叢之內謁者所求之餘侍醫所挍之逸莫不澄涇辨渭拾珠棄蚌以為質文遞改損益不同明堂曲臺之記南宫東觀之説鄭王徐賀之答崔譙何庾之論簡牒雖盈菁華蓋鮮乃以宣條暇日聽訟餘晨娛情窺寶之鄉凝想觀濤之岸總括油素躬披緗縹芟蕪刈楚振領提綱去其繁雜撮其指要勒成一家名曰江都集禮方可韜之頖水副彼名山見刻石之非工嗤懸金之已陋是知沛王通論不獨擅于前修寧朔新書更追慙于往册禮部明堂唐劉允濟明堂賦體神化以成規應靈圖而立矩度七筵以垂憲分四室而通輔合宫之典鬱乎軒丘重屋之儀崇于夏禹因殷成于五帝繼周道於千古答后土之嘉祥藹上雲之殊祉望仙閣之秀出瞻月觀之左峙鏤紅玉以圖芳肅龜壇而荐祀道不言而有洽物無為而自致訪子輿于前迹揆公玉之遺芳順春秋之左右法天地之圓方成八風而統刑德觀四序而候炎涼跨東西而作甸掩二七以疏疆下臨星雨傍控煙霜翔鶤墜於層極宛虹拖于逰梁崑山之玉樓偃蹇曽何髣佛蒼海之銀宫煥爛安足翺翔于是覽時則徵月令觀百王綏萬姓肆類之典攸集郊禋之禮爰盛衣冠肅于虔誠禮樂崇于景令三陽再啓百姓來朝玄纁霧集旌斾雲搖湛恩畢被元氣斯調羅九賓之玉帛舞六代之咸韶澤被翔泳慶溢煙霄穆穆焉煌煌焉粵自開闢未有若斯之壯觀者矣任華明堂賦其宫十二以象辰行水四周而為海堂筵楣徑可以見乾坤之籌策暑往寒來可以知六九之變改室也州之數窗也卦之在髙得黃鍾之實柱懸列星之彩畢千古之能事終一人之不宰至有虞之總章期夏后之太室殷重屋以五周太廟以七伊數君之餘制各殊途而並逸雖信美于當年是無取于今日别有清河絆鳥長沙求贄一作試討論公玉之圖錯綜伯喈之議倘繡桷之有漸庶青雲之可致王諲明堂賦徒觀其藻畫周設雕刻具美綺寮豁達以生風重簷周流以藏晷嶔崟﨑嶬狀崑嶽含霧而插天衢隆崇峍屼若蓬萊駕鼇而涌海水屹乎氤氲孤標紫氛琁題皓飾金鋪洞文拱星辰以端居傍眺白日慿軒檻以直視俯見青雲于沼明堂賦下之象地也以列五位之神上之法天也以配五方之帝稟太乙之威靈順隂陽之開閉左個右個分以寒暑之宜以筵以几度以堂室之際劉允濟萬象明堂賦睿哲惟唐受天之明究皇王之鴻休包宇宙之純精恢天祿以作乂攄元命之振英鼓黔雷以播氣運蒼昊而時成括闓陽與泰階襲三聖以光亨禮樂交通典謨洋溢天以洛視而龜書至地以河觀而龍圖出擁神休尊明號激清流揚茂實將大報于玄天享神祗以稱秩願卑宫而自處惟禋宗而是恤思致美于總章覽娵訾而法營室訪夏后之軌儀云廣四而修一彼宗周之有制聞或九而或七錯綜乎舊典經始乎玉律紹先志以髙興匪矜功而首出乃延公侯卿士藝人表臣而審其議焉咸以為明堂者明乎天道者也所以明有功表有德崇大教發大政登假嚴經欽修宗祀非夫為己者也安可已乎粵正月庚午始創明堂之制焉考經緯之長策應黃鍾之旋宫穆穆四門可納四氣明明八窗均調八風靡金靡玉非磨非礱去隨侯之夜光明素質以為工思承天以接神故峻極乎皇穹颯乎懿濞繣兮豐融雷承乾以震耀雲大壯乎其中非至聖之精誠孰能克勤乎此功宋虞通之明堂頌肅肅明堂惟國之光儀天矩地崇姬潤黃縣殷揚輝服夏擅芳無斁伊典有煥斯章綿綿教樞翳翳化紀聲沈五都風晦千祀我皇蒸哉追孝創軌縟憲垂統光圖麗史宗祀既崇享配惟馨六樂荐和四圭流明殷殷華海鑒盥孚誠慶輝旁燭休光下盈唐崔融代宗奉御賀明堂成表臣聞昭昭上天五座列降神之府赫赫中國几筵開布政之宫自軒皇肇制帝堯嗣作歷虞夏而惟新在殷周而克壯斯在尊祖配帝從時統天節寒暑而吹律順隂陽以班令降及有漢頗採前章雖年惟屢豐而日不暇給過此以往寂寥無聲伏惟陛下興復舊邦光啓新邑萬物睹而聖人作百寶用而神靈滋遠肅邇安功成道洽泥金刻玉紀修中嶽之儀乘鑾駕龍更葺正陽之禮乾策坤策具稟宸聰左個右個親承睿式朴略淹中莫能言其制度﨑嶇汶上疇克效其規模土事不文木事不鏤九柱自立豈藉琅琊之飛二石潛開寧煩穀城之採板築星奔而化造斧斤風動而神助聖有通于上帝産無費于中人由是日抱紅輝雲叢紫靄霜毛下翥電翼羣飛夕見神光似對莊嚴之國晝聞仙響疑過數樂之天匪日而成衝霄特起仰浮圓笠俯鎮方輿金鸑鷟而將飛玉驪龍而若動三辰引曜相望于復道之間六氣氤氲旁魄于重簷之半可以發大教陳盛容會百神朝萬國比二儀而永固齊四序而偕行允所謂穆穆皇皇巍巍蕩蕩者矣又代百官賀明堂成上禮表上帝居髙懸太微之府先王建國闡宗祀之堂不有聖人誰其經始伏惟陛下尊祖揚禰嚴禋之德再光統天順時布政之道尤急親紆睿思躬運玄模故能上合乾象下當坤策柱將扶而已立石未鑿而懸開丹鷟踶甍似鳴岐而逺至蒼虯繞棟疑出河而欲飛神光熠耀于向晚仙樂清泠而方晝月惟孟夏時屬正陽張文物于闕庭震聲名于宇縣聖皇戾止諸侯在列穆穆焉顒顒焉交喜氣于三靈動歡心于萬類者也臣等進窺朝典既逢嘗麥之辰旋顧野誠輕襲獻芹之禮謹上禮若干輿如别項滋踈鶴鼎味劣鮮庖何以延萐莆之涼契芝英之夀盧照鄰歌明堂穆穆聖皇雍雍明堂左平右墄上圓下方調均風雨制度隂陽四窗八達五室九房南通夏火西瞰秋霜天子臨御萬玉鏘鏘禮部郊祀漢揚雄甘泉賦於是欽柴宗祈燎薰皇天招搖太一舉洪頥樹靈旗樵蒸焜上配藜四施東爥滄海西耀流沙北熿幽都南煬丹涯玄瓚觩䚧秬鬯泔淡肸蠁豐融懿懿芬芬炎感黃龍兮熛訛碩麟選巫咸兮呌帝閽開天庭兮延羣神儐暗藹兮降清壇瑞穰穰兮委如山張衡東京賦及將祀天郊報地功祈福乎上玄思所以為虔肅肅之儀盡穆穆之禮殫然後以獻精誠奉禋祀曰允矣天子也乃整法服正冕帶珩紞紘綖玉筓綦會火龍黼黻藻繂鞶厲結飛雲之夾輅樹翠羽之髙蓋建辰旒之太常紛飇悠以容裔六玄虯之奕奕齊騰驤而沛艾龍輈華轙金鋄鏤錫方釳左纛鉤膺玉瓖鑾聲噦噦和鈴鉠鉠重輪二轄疏轂飛軨羽蓋葳蕤葩瑵曲莖順時服而設副咸龍旗而繁纓立戈迤戛農輿輅木屬車九九乘軒並轂􅕈弩重旃朱旄青屋奉引既畢先輅乃發鑾旗皮軒通帛蒨斾雲罕九斿鈒戟轇轕髶髦被繡虎夫戴鶡駙承華之蒲梢飛流蘇之騷殺總輕武於後陳奏嚴鼓之嘈囐戎士介而揚揮戴金鉦而建黃鉞清道按列天行星陳肅肅習習隱隱轔轔殿未出乎城闕斾已反乎郊畛盛夏后之致美爰恭敬乎明神爾乃孤竹之管雲和之瑟雷鼓鼝鼝六變既畢冠華秉翟列舞八佾元祀惟稱羣望咸秩揚槱燎之炎煬致髙煙于太一神歆馨而顧德祚靈主以元吉晉郭璞南郊賦於是時惟青陽日在方旭我后將受命靈壇乃改步而鳴玉升金軒撫太僕揚六鸞齊八騄列五幡于一元兮靡日月乎黃屋矯陵烏以偵候兮整豹尾於後屬武騎仡以清道被練煥以波燭爾乃造曠場戾壇庭百寮山立萬乘雲縈延祝史肆玉牲登圓丘揖太清禮羣望告皇靈天澄其氣日朗其精飛亷鼓舞于八維兮豐隆擊節于九冥祝融穆以肅侍兮陽侯淡以中停于是司烜戒燧火烈具炳宗皇祖而配祀增孝思之惟永郊寰之內區域之外雕題卉服被髮左帶駿奔在壇不期而會峩峩羣辟蚩蚩黎庶翹懷聖猷思我王度事崇其簡服尚其素化無不融萬物自鼓振西北之絶維隆東南之撓柱廓清紫衢電掃神宇風馬桂林抗旌琳圃五嶽不足以題其勳九韶不足以贊其舞饗駭鬼神聲振丘隴倒景望風龍漢企踵爛若列星之環辰咸雲騰而海涌此蓋和氣旁通玄羅潛總自然之感鼓而遂動唐崔立之南至郊壇有司書雲物賦矧器用陶匏藉以包茅光逾泰畤馨邁周郊朱火煬煙逺浮于華蓋玄酒止水近映乎長旓徐彥伯南郊賦左日壑右星圃吹烈火于炎丘覿堅氷于委羽莫不匍匐我聲教駿奔我圭組納大荒之管鑰伏堪輿之扃户肇允神聖浸發葆命芬德馨香崇庸祗敬吟蓼蕭以遊握合枲一作台桑而藴正關石和鈞飛沈翔泳擇明居之全法撰蒼渠之闕令則太階平而玉衡正也庶績洪凝賡歌浩作隂隲于下有孚顒若恢負勝之圖賁昭功之籥是以玄龜逰乎湍瀨丹鳥吟于觀閣芝房菌蠢而玉英景雲璀璨而金萼雙􅀈共抵一作抵之獸躑躅苑山一稃二米之穎紛拏畎壑邦誦中和氓歌小毖嵗合作噩日交長至遘朔旦之明期擇純陽之正地欲陳大旅展時事告紫宙之成功定皇天之寶位蜃鷩司典鳲鳩蕆職崇泰壇考星翼劃八卦以通道錯五行而辨域對越精祗森羅正直木巽火而殷薦豫乘雷以罔極載師清野土訓掃㕓繚垣虹合參途電聨籠組帷以艾景覆皇邸以慶煙宫伯糾其禁內饔烹其鮮周廬攢構以戢孴列纛抗莖而翩綿繩繩都人濟濟多士九牧之守百蠻之子莫不潔一作挈鴈提羔攢驂噎軌紛鴻溶以騰逗叛遹皇而佁擬或駢肩而側足候吾君之戾止若葵藿之傾離光同江河之赴溟水也然後啓端門警仙蹕雙鳳矯首六龍齊膝青斾罥雲紅旌彗日鏘玉鸞之鳴轙按金雞之廣術傳畫角以啾嘈曳朱旗以駢坒蒲必切見吳都賦呵風伯令戒道制玄冥使司律此靈祗所以保綏皇天所以宥密於是闢龍次幸霓幬鶉鳥司表熊羆奉收皇帝乃彰畫黻襲大裘端玉珽肅珠旒翼翼穆穆遂臻乎圜丘躬孝享擁神休設天宗之六席援長發之二球盥以明水薦以香羞陳蒼璧而咸事藉白茅而闡幽潔騂旄之泔淡酌玄瓚之觩䚧盛哉神疑作坤言后亞獻極順天而見邸乳祥開曽沙業荐赫禮數于彤壼布徽音于紫縣率先于金簿之蠶謹覆以瑤筐之燕皇后介禮恭兹亞奠凝億兆之歡心注穹蒼之景盼紫微開兮天香滿神之來兮軒星纂候黃鍾兮雪飛調大吕兮風暖戛雲和之寶瑟吟孤竹之清管石麟夭矯團翠煙而上征蕤鳳曶霍迓鴻釐之無算瑞氣蜿蜒于藪甸祥光熠爚于旄罕三觶終獻萬祗呈醺升羽節導靈羣凝肆夏以青晷揚登歌而咽雲徽鸞鷖之颯沓致戩穀之絪緼杜甫朝獻太清宫賦太一奉引庖犧在右堯步舜趨禹馳湯驟鬱曽一作閟宫之嵂崒拆元氣以經構斷紫雲而竦牆撫流沙而承霤紛隳珠而陷一作隱碧霩波錦而浪繡森青冥而欲雨赩色一作光炯而初晝于是翠蕤俄的藻藉舒就祝融擲火以焚香溪女捧壺而盥潄羣有司之望幸辨名物之難究瓊漿自間于粢盛羽客先來于介胄賈餗至日圓丘祀昊天上帝賦是時星昏東壁日躔南至爰命有司肅將祀事羅幄帟以雲黕駢罍俎以鱗次藉白茅兮取諸潔薦蒼璧兮象其類皇威允穆司儀辨等而以班明德惟馨祝史陳辭而不愧覆玉葉之卿雲昭扶桑之初日齋心滌慮所以感無不通樂遍禮成故能神降之吉杜甫有事于南郊賦蓋主上兆于南郊聿懷多福者舊矣今兹練時日就陽位之美又所以厚祖考通神明而已職在宗伯首崇禋祀先是春官修頌祗之書獻祭天之紀令泰龜而不昧俟萬乘之將履掌次閲氊邸之則封人考壝宫之旨司門轉致乎牲牢之繫小胥專達乎懸位之使二之日朝廟之禮既畢天子蒼然視于無形淡然若有所聽又齋心于宿設將旰食而匪寧旌門坡陀以前騖彀騎反覆以相經頓曽城之軋軋軼萬方之熒熒馳道端而如砥浴日上而如萍掣翠旄于華蓋之角彗黃屋于鈎陳之星神仙戌削以落羽魍魎幽憂以固扃戰岐栗華擺渭掉涇地回回而風淅淅天泱泱而氣青青甲胄乘陵轉迅雷於荆門巫峽玉帛清迥霽夕雨于瀟湘洞庭于是乘輿霈然乃作翳夫鸞鳳將至以沖融寥廓不可乎彌度聲明通乎純粹溟涬為之垠堮駟蒼螭而蜒蜿若無骨以柔弱奔烏獲而黝蟉徒有勢于殺縛朱輪竟野而杳冥金鋄成隂以結絡吹堪輿以軒輊槍寒暑以前却中營密擁乎太陽宸眷眇臨乎長薄熊羆弭耳以相舐虎豹髙跳以虛攫上方將降帷宫之綝縭屏玉軑以蠼略人門行馬以拱乎合沓之場皮辨大裘始進乎穹崇之幕衝牙鏗鏘以將集周衛轇轕而咸若月窟黑而扶桑寒田燭稠而曉星落肅定位以告潔藹嚴上而清超雲菡萏以張蓋春葳蕤以建杓簪裾斐斐樽俎蕭蕭方面曲折周旋寂寥必本於天王宫與夜明相射動而之地山林與川谷俱標于是乎官有御事有職所以敬鬼神所以勤稼穡所以報本反始所以度長立極玄酒明水之上越席疏布之側必取先于稻秫麴糵之勤必取著于紛純文繡之飾雖三牲八簋豐備以相沿而蒼璧黃琮實歸乎正色先王之丕業繼起信可永其昭配羣望之遍祭在斯示有明其翼戴由是播其聲音以陳列從乎節奏以進退韶夏濩武采之于訓謨鍾石陶匏具之于梗槩變方形于動植聽宫徵于砰礚英華發外非因乎簨簴之髙和順積中不在乎雷鼓之大既而臠醟挂罥柴燎窟塊騞砉擘赫葩斜晦潰電纒風升雪颯星碎拂勿侹濙渺溟蓯淬聖慮岑寂玄黃增霈蒼生顒昂毛髮清籟雷公河伯或駓騃以修聳霜女江妃乍紛綸而暗曖執紱秉翟朱干玉戚鼓瑟吹笙金支翠旌神光倐斂祀事虛明於是涾􅀈乎渙汗紆餘乎經營浸朱崖而灑朔漠洶暘谷而濡若英耆艾涕而童子儛叢棘坼而狴犴傾是率土之濱覃酺醵以涵泳非奉郊之縣獨宴慰以縱橫玄澤淡濘乎無極殷薦綢繆乎至精稽古之時屢應符而合契聖人有作不逆寡而雄成爾乃孤卿侯伯羣儒三老儼而絶皮軒趨帳殿稽首曰臣聞燧人氏已往法度難知文質未變太昊氏繼天而王根啓閉于厥初以木傳子攄終始而可見洎虞夏殷周兹煥炳而蔥蒨秦失之于狼貪蠶食漢綴之以蛇斷龍戰中莽茫茫夫何從聖蓄縮曽不下眷伏惟道祖視生靈之磔裂醜害馬之蹄齧呵五精之息肩考正氣之無轍協夫貽孫以降使之造命更挈纍聖昭洗中祚觸蹶氣慘黷乎脂夜之妖勢回薄乎龍蛇之孽伏惟陛下勃然憤激之際天關不敢旅拒鬼神為之嗚咽髙衢騰塵長劒吼血尊卑配宇縣刷插紫極之將頺拾清芬于已缺爐之以仁義鍛之以賢哲聨祖宗之耿光卷夷狄之彯撇蓋九五之後人人自以遭唐虞四十年來家家自以為稷禼王綱近古而不軌天聽貞觀以髙揭蠶爾差僭粲然優劣宜其課密于空積忽微刋定于興廢繼絶而後覩數統從首八音六律而惟新日起算外一字千金而不滅上曰吁昊天有成命惟五聖以受我其夙夜匪遑實用素朴以守于嗟乎麟鳳胡為乎郊藪豈上帝之降鑒及兹玄元之垂裕于後夫聖以百年為鶉鵓道以萬物為芻狗今何以茫茫臨乎八極眇眇託乎羣后端策拂龜于周漢之餘緩步濶視于魏晉之首斯上古成法蓋其人已朽不足道也於是天子默然而徐思終將固之又固之意不在抑殊方之貢亦不必廣無用之祠金馬碧雞非理人之術珊瑚翡翠此一物何疑奉郊廟以為寶增怵惕以孜孜况大庭氏之時六龍飛御而歸權德輿朔旦冬至攝職南郊因書即事詩大明南至應天正朔旦圜丘樂六成文軌盡同堯厯象齋祠忝備漢公卿星辰列位祥光滿金石交音曉奏清更有觀臺稱賀處黃雲捧日瑞升平李吉甫圜丘攝事合于中書後閣宿齋移止于集賢院會門下相公以七言垂寄因敘所懷奉寄詩淮海同三入樞衡過六年廟齋兢永夕書府會羣仙粉壁連霜曙氷池對月圓嵗時憂裏換鐘漏靜中傳蓬髮顔空老松心契獨全贈言因傅説垂訓在三篇武元衡奉酬中書相公至日圜丘攝事宿齋敘懷見寄詩郊廟祗嚴祀齋莊覿上玄别開金虎觀不離紫微天樹古長楊接池深太液連仲山方補職文舉自傷年風澀銅壺漏香凝綺閣煙仍聞白雪唱流詠滿鵾絃又裴度詩翼亮登三命謨猷本一心致齋移祕府祗事見沖襟皓月當延閣祥風自禁林相庭方積玉王度已如金運偶唐虞盛情同丙魏深幽蘭與白雪何處寄庸音鄭谷丞相孟夏禮薦南郊紀獻十韻詩節應清和後郊宫事潔羞至誠聞上帝明德祀圜丘雅用陶匏器馨非黍稷流就陽陳盛禮匡國稱鴻休漸曉蘭凝露微涼麥弄秋夀山橫紫閣瑞靄抱皇州外肅通班序中嚴錫慶優升歌三酒備表敬百神柔池碧將還鳳源清再問牛萬方瞻輔翊共賀贊王猷梁簡文帝上南郊頌表雖周郊南甸宗伯之官徒設漢興北畤夤恪之道未隆而體元含極先後弗違典盛望禋禮通孝敬潔靜之禮載光禘郊之風斯洽昔東平琅琊著藻炎德臨淄中山摛文魏美唐令狐楚為桂府王珙中丞賀南郊表臣聞禘嘗之禮所以仁祖禰也郊祀之儀所以尊天地也五帝之前蕢桴土鼓致其敬敬有餘矣而禮不足三王以降金罍玉斚備其禮禮有餘矣而敬不聞秦之增封也覬望神仙漢之郊丘也禳除災害雖無文而咸秩終有廢而莫舉猶可以編在方册垂其鴻名豈若國家參文質于六經之中陛下酌損益于百代之後既昊天之承疑作成命得黎人之歡心九穀有年四方無事然後因吉土迎長日咸池屢舞太蔟登歌萬靈識周旋之位百神知饗獻之節雲斂而柴燎髙達風清而蕭薌遠聞信大報之無私亦玄鑒之不昧當時集軍州官吏僧道百姓等丁寧宣示訖惟天之意莫遺于細微如日之輝不隔于幽逺頑鈍知感鬼神懷柔何則刑莫大于成獄陛下捨之罪無輕重恩莫深于延賞陛下推之澤及存殁行道求志敢于直言者既許以親覽觸綸罣網屏于遠方者又移之近郊減來嵗之新稅昭其儉也棄七嵗之逋債𢎞諸仁也念勳臣而樹勳者益勸尊有德而不德者知慙賜羸老有粟帛之優禮神祗無牲幣之愛此所謂幽室盡曉枯條遍春雷雨作而蟄蟲昭蘇疾風行而窮鳥飛舞率土臣下不勝大慶况臣蒙被恩澤獲齒生類會守逺郡阻窺盛禮徘徊天外目與心斷王晙賀南郊表燔燎洞合于神光日月共禎于瑞色宋宋祁賀南郊大赦表顧懷時憶瑞應日來亟修上儀若祗舊典戒期百職攽詔九州曳雲鳳之徜徉服翠虯之伴奐殊庭一獻諸祜遍躋遂自陽靈之宫往會天元之旦羽旄四合垓陛參登上璧左琮之華合袪而信祝祖蕝宗題之次更侑而迪嘗拜嘉胙于席垂列欽柴于雲表靈心合答熙典備成臣嚮觀舊史殫見往朝或不愛牲玉為恭殊非明薦或所過租賦為復蓋出重勞語昔罕全訂今絶擬所恨清塵在望自苦周南之留紫槖仍持不與甘泉之從宋王安石賀南郊禮畢肆赦表精意上昭神靈底豫茂恩旁暢夷夏接和中賀臣聞道以饗帝為難禮以配天為至有秩斯祜唯四表之歡心胡臭亶時匪九州之美味自古在昔若聖與仁厥遭昌辰乃覩熙事恭惟皇帝陛下邁種三德敷奏九功率籲奉璋之衆髦肇稱奠璧之新禮廟籩致孝郊血告幽誠既格于穹旻福遂均于品庶振憂矜寡原宥眚災第五玉以褒封善人是富發三錢而慶賜賤者不虛天其居歆人以呼舞曽鞏賀熙寧十年南郊禮畢大赦表其功施于人效見于事則宅仁由義搢紳之徒成材于學校超距踏鞠熊羆之旅養勇于營屯甌窶汚邪之收充于倉廩關石和鈞之利阜于市㕓家有樂豫之聲人無愁怨之色協氣所召休應自殊鈎陳太微星緯咸若崑崙渤澥波濤不驚近則金石之音鳥獸欣躍逺則干羽之舞蠻夷駿奔象齒旅于闕庭龍媒納于間廏是謂六府三事皆可以歌四海九州罔不率俾蓋巍巍而特起非瑣瑣之能窺故寅畏嚴恭積之有素而齋明薰祓進而益虔在于物者不取其煩盡諸已者必求其實是以蕭光之烈奏于宗祊柴燎之蒸焜于郊兆幽隱昭答神靈顧懷無疆惟休方寖昌于萬世不敢專享故敷錫于羣元梁簡文帝南郊頌龍官弱言之后合揆于蒼旻鳥紀垂衣之君昭格于上帝皇帝之御天下也塵清世晏蒼兕無所用其武功運謐時雍鴛鷺咸並修其文德玉門罷候紫塞沈烽畫一之政萬代表于時和三章之律百姓沐於仁夀于是龍光之地日浴之鄉紫舌黃支頭飛鼻飲自西自南無思不服由是嘉祥被衆瑞發金人澤馬丹甑玉雞三角九尾四肩六足參差于郊藪布濩于宫闈乃以恭肅神祗理通孝敬江左以來爽塏未闢爰命將作揆日載營三靈叶響百工咸事宛如神造儼類仙居五達四通廓郊彌澤南瞻重嶽北眺芒嶺東臨霸滻西望舊豐紆餘委蛇丘陵起伏澎湃嶤屼山川異態飛梁邃宇洞爥空懸紫殿仙宫霞鶱鳥翥霧映倒梁日光疏鈑玉桃卷葉銀樹抽芳百果千株三珠八桂朝葉與蜜露共鮮晚花與薰風俱落露禽乍聚望北翼之翺翔歸飛時宿聞同心之夜響故以熊熊灼灼炫兩明而仰七曜紛紛沐沐承五煙而帶三靈圓丘間靜紫壇肅設五精之場千神之位八階𢎞麗四維博敞宛若千仞狀懸流之仙館煥如五彩同瑤山之帝壇石牒神昌之瑞方臻金縷飛光之徵永固是雕是琢鄙茅茨之為倫非珠非玉嗤甘泉之已奢望昔方今獨髙千古沿襲異等質文斯中於是嵗在單閼星次娵訾律中太蔟日惟辛卯特有事于南郊甸師清野封人壝宫朱幕夕峙帷宫宿設曉漢斜隂挈壺升漏天子御玉輅動金根八驥揚衡雙龍翼蓋雲罕徐回鳴鐃韻響風承豹尾日映鶡冠萬騎天行千乘雷動石鎧犀衣之士連七萃而雲屯珠旗日羽之兵亘五營而星列鬱鬱阡阡震震填填充溢乎國都彌漫于鄽邑者也若乃回輿降蹕荐禮帝儀揖太清秩羣望被大裘服山冕恭蒼璧之明祀穆靈壇之禋敬黍稷非馨明德惟馨日曜彤精天澄翠色百僚師師九官濟濟千神叶福萬億均慶六典斯備三禮必該焚柴告成罔不欽若翠煙升緑疑同河濱之瑞雲丹燎燭天若帝鄉之美氣雲門麗舞咸池廣樂已叶九韶之曲復諧六列之奏金匏既動望蜿蟬之遊龍玉磬徐鳴觀參差之舞鳳袿轊駕肩士女填噎接袂為幃連裾猶堵鼓腹擊轅行歌舞抃然後紆玉輦而謝書生登靈臺而望雲物欽明美化跨萬古于兹日廣運愈樂表千載于當今其辭曰肅恭明神逖聽前踵配天道尊迎陽義重玄酒陶匏燔柴雲聳跨舜論韶籠堯稱拱郊宫載靜紫壇新謐肅肅禁闈隂隂仙室六戎列野八鑾昭日架殿星羅重宫霧出康哉德盛美矣時豐三辰增曜七政永崇五方來洎四煥兹通懸繩度笮駕塵追風既敷懋化復覩瑞滋金車出野玉露霑墀紫脫神草華平瑞芝長愈汪濊永固雍熙唐王勃拜南郊賦三門遁甲黃公成不戰之師五壘神兵玄女下先登之策肅牙璋而按律輝旄節而分麾降南宫之元老裂西營之毅卒良將首路偏戎竟野軸轤萬里旌旗四合金緗玉匱司空慿首勝之威鶚視龍趨將軍仗萬全之略負鼇丘而峻壁據黿壑而深溝一鼓而亭塞無塵七縱而江山失險伐罪以明而不以衆懷遠人于絶境均惠化于殊鄰登若木以照臨折紅桃以延佇然後分州列鎮對明月以收營返斾旋戈部玄雲而振旅爰考吉日遂靜行宫有司具典乘輿乃出撫玄虯戴翠鳳鼉鼓按節鯨鐘流響千乘嶽動萬騎林回星陳而天行雷震而霧合是時未登夫太壇也乃齋帷宫宿帳殿華蓋移影鈎陳從蹕千營夕布亘蒼野而煙凝萬幕宵懸背黃闉而霧列既而屏翳清曉飛廉警旦孫叔奉轡王良聳策雲藏星謐宇曠山明旌軒具照簫笳互凝陟名嶽以告成歷神丘而展事國容象物而動朝章視令而肅宸儀有睟虛徐大帝之庭列侍無譁髣佛華胥之國於是襲袞服戒俎豆端瑞班儼華旒樂懸六代禮備三古奠惟蒼璧藉用白茅鳴孤竹之簫管奏空桑之琴瑟感格以誠不以事動植咸歡敬神以道不以華天人合應然後駐聲名於上邑反文物于仙宫因雷雨而作施法雲天而用響風行電舉未寸景而浹九埏野抃途歌不崇朝而晏六合盧照鄰歌南郊虔郊上帝肅事圓丘龍駕四牡鸞旗九斿鐘鼓晚引紫煬髙浮日麗蒼璧雲飛清球皇之慶矣萬壽千秋晉郊祀歌整泰壇禮皇神精氣感百靈賓藴朱火燎芳薪紫煙起冠青雲營泰畤定天衷思心睿謀筮從建表藴設郊宫田燭置雚火通歷元旬集首吉飾階壇坎列室周庾信方澤降神歌辭報功隂澤展禮玄郊平琮鎮瑞方鼎升庖調歌孤竹縮酒江茅聲揚鐘鼓器用陶匏列曜秀華凝芳郁荔川澤茂祉丘陵容裔雲飾山罍蘭浮沈齊日至之禮歆兹大祭闕祠靈星賦於是驗星紀稽帝文覩農祥之晨正彰土膏之脈分奠玉杯于青帝用潔牲于白雲列綴兆于峻舞徵歌頌于絲衣雕豆玉觴自殊器於宗祀青圭紺席乃叶禮於禳祈祭星附禮部社稷唐張餘慶祀后土賦隔嵗梅花氛氲于帳殿迎春楊栁搖曳於離宫戈橫鐵騎旗掣長虹疊靈鼓於流水引繁笳于朔風甸師清野宗伯奉秩端旒垂綖左輔右弼修五禮之大道酌千靈之故實綵幣藻耀層壇崷崒黃琮展前以備陳白茅有藉而間出玄酒式降以尚本瑞圭不瑑音篆而貴質繁纓藻帶燦爛于祭容孤竹雲和鏗鏘于聲律鬱人獻爵司干授器據青野之雕阜肅黃祗之神位鼎氣歊雲神光燭地魏珠映天子之輦汾鴈入大夫之贄薰風偃草以浹洽遲景暄空而明媚河圖所以無隱天寶由其不祕豈比夫魯蠟有乖仲尼聞而發嘆漢祀多僻匡衡陳其用祥唐玄宗后土神祠碑往者漢氏之祠也牲以養牛五嵗繭栗所以貴其誠藉以采席六重藁秸一作秸所以尚其質事與古及一作反義不經見朕因其地而不因其儀取其得而不取其失凡牲幣法物之事歌舞接神之類咨故實于方澤不遂過于元鼎此皆公卿大夫鴻生巨儒獻其方聞匡于不逮朕何有也享於至誠錫以繁祉黃雲蓋于神鼎降光燭于靈壇自昔已然乃今復見豈與夫封禪有牒專在求仙祕祝有辭密于移過而已隋牛𢎞祈社歌厚地開靈方壇崇祀逹以風露樹之松梓句萌既申芟柞伊始恭祈粢盛載膺休祉又祈稷歌粒食興教播厥有先尊神致潔報本惟虔瞻榆秉耒望杏開田方慿戩福佇詠豐年禮部封禪唐李義府在巂州遙敘封禪詩天齊標巨鎮日觀啓崇祠岧嶤臨渤澥隱嶙控河沂建嶽誠為長升功諒在兹帝猷符廣運玄範暢文思飛聲總地絡裁化撫乾維瑞策開珍鳳禎圖薦寶龜創封超昔夏修禪掩前姬東后方肆覲西都尊六師肅駕移星苑揚罕馭風司沸鼓喧平陸凝蹕靜通逵汶陽馳月羽蒙隂警電麾巖花飄曙輦峰葉蕩春旗石閭環藻衛金壇映黼帷仙階溢祕秬靈檢耀祥芝三始貽遐貺萬嵗受重釐菲質陶恩奬趣迹奉軒墀觸網淪幽裔乘繳限明時周南昔已歎卭西今復悲宋之問扈從登封告成頌詩御路回中嶽天宫接下都百靈無後至萬國競前驅文衛嚴清蹕幽仙讀寶符貝花明漢果芝草入堯厨濟濟衣冠會喧喧夷夏俱宗禋仰神理凱樂望仙途撫已貧非病時來本不愚願陪丹鳳輦率舞白雲衢唐許敬宗勸封禪表粵自生民兆興司牧朱襄皓英之日黃軒葛天之世莫不雷鼗振響節萬舞于雲門大路脂輪籍千藁于嬴里使夫空桑孤竹仰鈞天而合奏十碑再纍齊厚地以相終是以員精朗鑒眷欽明之同德方祗效祉祚至仁之比義馳薰風而驛膏露靈心急于置郵驟澤馬而騖山車神物切于推轂帝道浸微淳風不競南茅北秬綿百世而寂寥升中告成歷千祀而湮墜使太山靡紀梁甫曠巡復盛禮于休明企來蘇于肆覲大夫之樹傾柔荑以望塵仙人之閭聳危峰而佇貺駱賓王為齊州父老請陪封禪表臣聞元天列象紫宫通北極之尊天帝凝圖玄猷展東巡之禮是知道隆光宅既輯玉于雲臺績劭禋宗必塗金于日觀河浮五老啓赤文于帝期海薦四神奉丹書于王會瑞開三脊祥洽五靈既而緝總章之舊文捃辟雍之故事非煙翼軫移玉輦于梁隂若月承輪祕金繩于岱巘鄒魯舊邦臨淄遺俗俱穆二周之化咸稱一變之風境接青疇俯瞰獲麟之野山開翠岊斜連辨馬之峯豈可使稷下遺氓頓隔陪封之禮淹中故老獨奏告成之儀是用就日披丹御壁輪之三舍望雲抒素呌天門於九重倘允微誠許陪大禮則夢瓊餘息玩仙閭以相歡就木殘魂遊岱宗而載躍上官儀勸封禪表臣聞乾元惟大播四序而無言坤儀蓋厚寧萬象而得一至于號均三大體覆載以曲成聖表千齡順剛柔以藏用是以可久可大永固皇王之緒貞觀貞明獨照陶鈞之上故可登封泰嶽類帝以尊天降禪肅然禋宗以厚地伏惟陛下膺圖紹籙儀天纂鏡受昭華而光寶位正璣衡而握金符銷伏鼇而綴上玄剪應龍而清下瀆于是靈臺偃伯暢轂埋輪刑政肅清削秋荼之繁廡雅頌光烈激圓海之漪瀾就月幽覃則燭龍開景薰風遠暢則蟠木增華沒羽浮金之章昭載筆于仙室韋韝卉袵之首襲長纓于蘭錡九疇式序七德攸宣發神化之丹青敷禮義之粉澤既而睿德潛通至誠冥召禎圖載啓神物發揮雙觡呈班馴擾于君囿九芝獻彩燭耀于帝池太史標祥鏡流千里卿雲表貺凝華五色江茅鄗黍嵗時鱗萃東鰈西鶼日月波屬鴻符巨慶疇可詳言誠乃岱郊佇遂云坰望蹕某等永言遐載緬鏡前徽王迹之所葳蕤帝圖之所凝遠龍官結繩之后鳥紀垂衣之君治定功成俱肅升中之禮塵清海晏咸申謁欵之誠異世同符干載一揆諒以增髙益厚式酬靈眷陛下德光宙始文煥震初席蘿而因萬物典裒而濟下元鎔範生靈張四維于地絡締構函夏建八柱于玄樞宏視絶迹功無與二駕三五而遙集超八九而騰驤加以瑤厯啓微躔南至于朔旦金鼓問罪削左袵于交河固可恭柴燎之展采穆靈壇之禋敬焉得徇小節於沖挹忘至公之鴻典絶三神之歡拒萬方之志雖復翹心天路未留三舍之感延佇帝閣逾邈九霄之望伏惟陛下紆瑤池之渺轡屈姑射之凝神酌令典于中樽遵時邁于嬴里採公卿之嘉議覽搢紳之讜辭逸記重甄頺章再紐詔雨師以先路命風伯以清塵六飛案軌九旗齊列榮光承幰非煙翼衡輯瑞而嘉肆覲瘞玉而恭儲祉方使日觀增華仙閭改飾神光霄映若流照于春陵雲色盡開似凝暉于豐谷表咸池於翠岊萬嵗叶其殷薦席藁秸于紫壇八神歆其明祀籠千古之偉觀孕七百之丕業某等命與時偕濯景昌運優遊渠閣之內怊悵南風之絃棲息蓬山之阿弋釣先皇之道至于朝獻國紀頗踐奧隅陛下推而不居竊所未喻鬱云梁之典缺懷庭之儀沮神主之欲漏貪天之議伏願杲其日出照其傾陽之心油然作雲降其離畢之澤庶使飛英騰茂祕玉檢而遐傳手舞足蹈扈翠華於喬嶽岑文本勸封禪表伏願順萬國之歡心膺三靈之眷命備天官以周衛盛輿服以巡遊五輅齊列六龍按轡瞻岱郊而啓軔指嬴里為一息詔卿士延禮官設壇場陳玉帛禋六宗而報上帝班五瑞以朝諸侯成天下之壯觀紹帝王之盛節俾夫山稱萬嵗壇燭神光播厚福于無窮揚鴻徽于來裔髙若思勸封禪表伏願褰旒寫照洽羣請于帝俞闢纊垂矜遂微懇於人欲騰兹璽誥激彼天波徵萬玉以警塗詔八神而弭策藉江茅而陳鄗黍飾蒼璧而奠黃琮馳萬嵗以飛聲接九重而嫓美使編珠育貺開麗色于金泥觸石凝禎蕩浮華于石䃭式昭昌祚永播鴻名凡在生靈義深聳踊崔融代宰相賀尊號表于是靈命孔彰玄心㧾集山開祕篆洛出祥圖每纓冕同觀軒墀共謁則有曦車五色對玉匣而如遲雲蓋三層伴瓊緘而不去張説大唐封禪壇頌帝乃揖之曰欽崇天道俯率嘉誥恐德不類敢憚于勤其撰巡狩之儀求封禪之故既而禮官不誡而備軍政不謀而輯天老練日雨師灑道六甲按隊八神警蹕孟冬仲旬乘輿乃出千旗雲列萬戟林行霍濩磷爛飛熖揚精原野為之震動草木為之風生歷郡縣省謠俗問耆年舉百祀興墜典葺闕政攸徂之人室家相慶萬方縱觀千里如堵城邑連歡丘陵聚舞其中垂白之老樂過以泣不圖蒿里之魂復見乾封之事堯雲往舜日還神華靈鬱瀾漫乎穹壤之間纍封壇于髙岡築泰壇于陽址夫其天壇三襲辰陛十二咸秩衆靈列座有次崇牙樹羽管磬鏞鼓宫懸于重壝之內干戚叉殳鈎戟戣戵周衛于四門之外代國重器傳代絶瑞旅之于中庭玉輦金轂翠冒黃屋夾之於端路庶官百辟羌夷蠻貊褒成之後讓王之客敘立于禮神之場髦頭弩牙鐵馬金鏃介胄如雪旗幟如火遠匝于清禁之野於是乎以天正上元法駕徐進屯千乘于平路留羣臣于谷口皇帝御六龍陟萬仞獨與一二元老執事之人出天門臨日觀次沆瀣宿巉巖赤霄可接白雲在下金奏作佾羽舞撞黃鐘歌大吕開閶闔與天語請將信公奉斗布度懋建皇極勤恤蒼生招嘏乎未兆禳災乎未萌上下傳節而禮成樂遍福夀同歸而帝賜神策乃檢玉牒於中頂揚柴燎于髙天庶衷誠而上達若慿熖而駕煙日轡方旋神心餘眷五色雲氣拂馬而隨人萬嵗山呼從天而至地謝偃玉牒真記我聖王之受命也則九服翹心三靈佇眷振乾維以綴象舉地絡以籠人曩者炎運將終九域淪陷于是披丹霄而軒鵬翼駕玄海而截鯨鱗俯拔嵩華仰回星漢納風雲于懷抱鼓雷電於胸臆流雕矢于日谷橫文劒於天外所以八狄乘風九夷請朔固可以包鎮虞夏跨躡殷周今陛下乃欲貶惡百靈拒絶羣議虧厥真紀昧兹懿德使泰山指望梁甫失幸金繩脫檢玉牒收文瑞日潛暉德星晦色此非所以發榮舒德應天順時垂裕百代激流千祀者也伏願陛下上祗天休下順坤德叶羣靈之望從億兆之心清蹕云亭鳴鑾岱嶽肆射牛之禮展大澤之詩垂紺幄而佇羣神謁紫壇而陳衆瑞使白雲朝起靈光夜燭應千齡之期流萬嵗之響則四溟受福天下稱泰明明聖範巍巍至德玄化難名神功靡測上包乾蒙下括坤域五嶽塵銷四溟波息仁風綿浹惠澤下霈船海極琛梯山窮貝九譯同德萬里齊信宿彗收芒朝雲解陳階蓂晦落庭軼晨鮮氤氲和氣蕭索非煙輪重璧合星次珠聨鴻名始茂景祚方延霧闢雲岸霞褰日觀山川效祉人神叶贊靈貺凝祥光華啓旦播美貞石馳芳柔翰德盈彌損道積逾中禮成斯大樂變推功讓為政始益寡謙終千齡展美萬古承風李嶠大周降禪碑正八柱之低昂理三光之盈縮乾坤一作象關鑰于廡下品物爐錘於堂一作掌內春生夏長循環奉亭毒之仁暑往寒來奔走赴財成之節干苞虎皮箭射貍首鞞鼓不作廟堂懸百勝之威尉候無虞征戍罷三邊之役恩澤流通教化洽著龍荒鼠徼覃宇外之雍熙鳳穴麟洲奉寰中之度律遠安邇肅地平天成一作天平地成玉律調年珠囊叶紀棲京坻于隴畝逸馬牛于衢路惸嫠蒙餼班白不提閭閻無犬吠之驚風俗有鶉居之暇原隰驅軺之使採詩聽歌災畬植杖之翁擊壤鼓腹和氣旁薄禎符肸蠁招一角五蹄之仁獸儀九苞六象之仙禽亳蟬出其祥麟昆田化其珍物日烏素毛而丹喙天龜玄甲而青純雲蒸霧涌拜九洛之璿圖電激雷奔受三清之寶册若乃山鶼海鯨石銘巖篆之符候月搖風連葉駢柯之祉神靈之所酬酢廣大之所荐成紛綸葳蕤紹至疊見董狐之窮墨罄簡書而未周夷吾之傾辨畢辭談而不盡包含藝文考練風俗採儒術徵禮官窺五嵗之典章核四朝之制度叔孫掌事容成諏日以天册萬嵗二年臘月乙亥闢丹掖開紫微撫玄虯按黃道叶紀先路靈威並轂五戎促節旗常一作旌旗畫垂象之文六甲分營壁壘曖太隂之氣雷動海運天回星轉踰鼎觀而南下望圭臺而左薄陸離方攘煥炳聿皇以屆夫嵩陽萬乘停鑣百司就列文物隱地遺光滿于竹宫輿徒沸川輕壒埋于石柱山祗護野風伯清塵玉醴潛滋金砂暗涌神鐘驚曙峰巖傳九乳之音寒律移暄草樹動三陽之色藉陳蒩秸器用陶匏髙炎四施耀流沙而燭滄海廣樂六變來象物而降天神感霏煙瑞一作潏露之徵延薰風景星之祉戈矛山立玉帛星陳登澗沼之毛輯江淮之物禹會之殊方異俗俱執豆籩漢祠之偉獸珍禽悉加壇墠撫空桑之琴瑟㪺鬱鬯之樽罍咸秩衆靈遍祀羣望席以黃琮為鎮書以青石為緘元封之謁欵一作欵謁方丘儀因東峙建武之推功太折禮視北郊陽烏珥而仙鶴飛紫雲騰而黃霧起靈之來兮如雨瑞之委兮如山方使炎農抱愧愕睨于梁甫之阿姚舜欽風延佇于崇髙之路盧照鄰歌登封炎圖喪寶黃厯開璿祖武類帝宗文配天玉鑾垂日翠華陵煙東雲干吕南風入絃山稱萬嵗河慶千年金繩永結璧麗長懸禮部祭山川闕衛顗西嶽華山亭碑文巖巖西嶽五顛次宗緒德之尊太華優隆皇帝永思祀典孔明髙神肯宴圭璧贄通赫赫在上以畜萬邦惟嶽降神實生羣公卿士百辟纘業攸蒙帝命不違嵗事報功羣后命卿散齋外亭敬恭明祀以奉皇靈處所逼窄屑窣有聲神樂其靜翛翬無形尊卑有序潔心致誠因繕舊室整頓端平在其板屋孰不加精天人同道萬祚來迎既受帝祉延於後生為龍為光顯乂王庭為公為侯福祿來成刻石紀號永享利貞後漢張昶西嶽華山堂闕銘易曰天地定位山澤通氣然山莫尊於嶽澤莫盛于瀆山嶽有五而華處其一瀆有四而河在其數其靈也至矣聖人廢興必有其應故岱山石立中宗繼統太華授璧秦胡絶緒白魚入舟姬武建業寶圭出水子朝喪位布五方則處其四列三條則居其中若廣袤竒蟲山經有紀矣是以帝王巡狩親五嶽而告至覲方后而考禮故經有望秩之禋典有生殖之祀蓋所以崇山川而報功也四海一統天子秉其禮諸侯力政強國攝其祭奉其邑曰華隂也久矣乃紀于禹貢而分秦晉之境秦鄙晉之西則曰隂晉晉邉秦之東則曰寧秦邑既遷徙禮亦如之二國力爭以奉以祭其城險固基趾猶存故老之言未殞於民也逮至大漢受命克亂不愆不忘舊名是復率禮不越故祀是尊歷葉增修虔恭又備一禱三祝終嵗而四以迄于今而世宗又經集靈之宫于其下想喬松之疇是逰是憩郡國方士自遠而至者充巖塞崖鄉邑巫覡宗祝乎其中者盈谷溢溪咸有浮飄之志愈悅之色必雲霄之路可升而越果繁昌之福可降而致也故殖財之寶黃玉自出令德之珍卿相是育匪惟嵩髙降生申甫此亦有焉天有所興必先廢之故殷宗周宣以衰致盛是時也王業中缺大化陵遲郡縣既毁財匱禮乏庭廟傾壞壇場蕪穢祭祀之禮有缺焉于是鎮逺將軍領北地太守閺鄉亭侯段君諱煨字忠明自武威占此土慿託河華二靈是與故能以昭烈之德享上將之尊銜命持重屯斯寄國討叛柔服威懷是示羣凶既除郡縣集寧家給人足户有樂生之歡朝釋西顧之慮而懷關中之恃雖昔蕭相輔佐之功功冠羣后弗以加也遂解甲休士陳而不戰以逸其力修飾享廟壇場之位荒而復辟禮廢而復興又造祠堂表以參闕建神路之端首觀壯麗乎孔徹然後旅祀祈請既有常處雖雨霑衣而禮不廢於穆堂闕堂闕昭明經之營之不日而成匪奢匪儉惟德是程匪豐匪約惟禮是榮虔恭禋祀黍稷芬馨神具醉止降福穰穰隋薛道衡祭江文引雙流而分九𣲖長四瀆而納百川自晉永嘉乾靈落綱蕞爾吳越僭偽相承陳賊叔寶世濟其凶士庶為其塗炭人神所以怨憤忝司九伐清彼一方分命將士乘流南渡仰慿靈佑咸蒙利涉今申命蒼兕躬總精鋭直趨金陵行登石首庶蛟螭竄于洲渚帷蓋靜于波濤江表克平海內清泰謹申禮薦惟神尚享禮部祀廟闕新修四晧廟記昔申后黜而小辨賦子朝寵而王室亂獻公從筮晉祀如線楚建遇讒芊姓纍棋列于格言垂作殷鑒漢髙皇帝提三尺劔奮布衣夷秦剪項南面而帝及乎踈孝惠私趙王本根一搖海內失望向使安車空駕羽翼不來蹈金寒玦離之蹤成母愛子抱之計四百之祚岌乎殆哉非四公之髙名不能割漢祖肌膚之愛非留侯之竒策不能振大賢金玉之音然而顯晦異宜語默殊用塗山玉帛有櫛風沐雨之勞陋巷簞瓢無被髮纓冠之責兼濟獨善相與背馳唯四先生兩有之矣往者明祠頺壞靡有孑遺太傅兼中書令許國公爰命經營不日而就棟宇甚美神形若生如裁兔鹿之書似指狼羊之喻松涼桂燠雲白霞丹坐視天倪時聞地籟周庾信拓拔儉神道碑桂棟杏梁緑墀青瑣按歌會舞鳳蓋霓裳南浦送而行雲東風飈而零雨是知漢陽郡前非徒武侯之廟臨淄城下豈獨欒公之社唐裴度蜀丞相諸葛亮祠堂碑我未從虎時稱卧龍禮部宗廟唐杜甫朝享太廟賦初髙祖太宗之櫛風沐雨勞身焦思用黃鉞白旄者五年而天下始一歷三朝而戮力今庶績之大備上方采厖俗之謠稽正統之類蓋王者盛事臣聞之於里曰昔武德已前黔黎蕭條無復生意遭鯨鯢之蕩汨荒嵗月而沸渭袞服紛紛朝廷多閏者仍亘乎晉魏臣竊以自赤精之衰歇曠千嵗而無真人及黃圖之經綸息五行而歸厚地則知至數不可以久缺凡材不可以長寄故髙下相形而尊卑各異惟神斷繫之于是本先帝取之以義壬辰既格于道祖乘輿即以是日致齋于九室所以昭達孝之誠所以明繼天之質具禮有素六官咸秩大輅每出或黎元不知豐年則多而筐筥甚實既而太尉參乘司僕扈蹕望重闉以肅恭順法駕之徐疾公卿淳古士卒精一黕宗廟之愈深抵職司之所密宿翠華于外户曙黃屋于通術氣凄凄于前旒光靡靡於嘉栗階有賓阼帳有甲乙升降之際見玉柱生芝擊拊之初覺鈞天合律簨簴仡以碣磍干戚宛而婆娑鞉鼓塤篪為之主鐘磬竽瑟以之和雲門咸池取之至空桑孤竹貴之多八音循通既比乎旭日升而氛埃滅萬舞凌亂又似乎春風壯而江海波鳥不敢飛而玄甲􅝧嵺以嶽峙象不敢去而鳴珮剡爚以星羅已而上乾豆以登歌美休成之既享璧玉儲精以稠疊門闌洞豁而森爽黑帝歸寒而激昂蒼靈戒曉而來往熙事莽而充塞羣心麌以振蕩桐花未吐孫枝之鸞鳳相鮮雲氣何多宫井之蛟龍亂上若夫生𢎞佐命之道死配貴神之列則殷劉房魏之勳是可以中摩伊吕上冠夔卨代天之工為人之傑丹青滿地松竹髙節自唐興已來若此時哲皆朝有數四名垂卓絶向不遇反正撥亂之主君臣父子之别奕葉文武之雄注意生靈之切雖前輩之溫良寬大豪俊果決曾何以措其筋力與韜鈴載其刀筆與喉舌使祭則與食則血若斯之盛而已爾乃直于主索于祊警幽全之物散純道之精蓋我后常用惟時克貞膋以蕭合酌以茅明嘏以慈告祝以孝成故天意張皇不敢殄其瑞神姦妥帖不敢祕其精而撫絶軌享鴻名者矣于以奏永安于以奏王夏福穰穰于絳闕芳霏霏于玉斚沛枯骨而破聾盲施夭胎而逮鰥寡園陵動色躍在藻之泉魚弓劒皆鳴汗鑄金之風馬霜露堪吸禎祥可把曽宫歔欷隂事儼雅薄清輝于鼎湖之上靜餘響于蒼梧之野窅然漠漠惕然兢兢紛益所慕若不自勝瞰牙旗而獨立吟翠駮而未乘五老侍祠而精駭千官逖聽而思凝于是二丞相進曰陛下應道而作惟天與能澆訛散淳朴登尚猶日慎業業孝思蒸蒸恐一物之失所懼先王之咎徵如此之勤恤匪懈是百姓何以報夫元首在臣等何以充其股肱且如周宣之教親不暇孝武之淫祀相仍諸侯敢于迫脅方士奮其威稜一則以微弱內侮一則以輕舉虛馮又非陛下恢廓緒業其瑣細亦曷足稱丞相退上局天蹐地授綏登車伊澒洞槍櫐先出為儲胥本枝根株乎萬代睿想經緯乎六虛甲午方有事于綵壇紺席宿夫行所如初已上宗廟徐彥伯送特進李嶠入都祔廟詩特進三公下台臣百揆先孝圖開寢石祠坐卜牲筵思急青綸賜徂裝紫槖懸綢繆金鼎席宴餞玉橫川北斗分征路東山起贈篇樂池歌緑藻梁苑藉紅荃騎轉商巖日旌搖關塞煙廟堂須鯁議錦節佇來旋唐吕溫代齊賈二相賀遷獻懿二祖表臣聞國有事莫大於嚴祀禮有經莫大于尊祖夏殷得之以繁祉周漢用之以休明爰自魏晉迄于隋氏或以祚短而不及祧正或以時艱而未遑討論紛綸興謝綿曠載祀竟虛盛典允屬昌期陛下道冠前王慶殷纍聖奉無競之烈克廣鴻休瞻有赫之靈思正大典精誠感念旰食疇咨內斷皇明俯裁羣議奉祖宗于常尊之地定昭穆于式序之宜清廟肅雍玄穹保佑奔走夷裔鼓舞生靈煥乎觀一代之光盛矣接千年之統劉禹錫代京兆李尹賀遷獻懿二祖表陛下濬發睿謨旁延正論爰詔多士會于中臺酌三禮之前文參百王之故事講貫斯定詢謀僉同備物展儀考祥視履配貴神于逺祖正尊位于始封廟貌有嚴禘嘗允穆示人以孝得禮之中既觀秩秩之容必降穰穰之福遷祔附禮部陵寢梁何遜經孫氏陵詩山鶯空曙響壠月自秋輝銀海終無浪金鳬永不飛閴閴今如此望望沾人衣唐王維過始皇墓詩古墓成蒼嶺幽宫象紫臺星辰七曜隔河漢九泉開有海人寧渡無春鴈不回更聞松韻切疑是大夫哀杜甫行次昭陵詩舊俗疲庸主羣雄問獨夫讖歸龍鳳質威定虎狼都天屬尊堯典神功協禹謨風雲隨逸足日月繼髙衢文物多師古朝廷半老儒直詞寧戮辱賢路不﨑嶇往者災猶降蒼生喘未蘇指麾安率土蕩滌撫洪爐壯士悲陵邑幽人拜鼎湖玉衣晨自舉石馬汗嘗趨松柏瞻虛殿塵沙立暝途寂寥開國日流恨滿山隅宋傅亮修復漢諸陵教夫信陵之墳守衛無曠展季之壟採樵有刑彼匹夫懷道列國陪隸猶見禮異世取貴鄰邦漢髙撥亂反正大造區宇道拯橫流功髙百代盛德之烈義在不泯唐韓休梁宣帝明帝二陵碑陵谷驟改市朝無處荒墳巋然蔓草蕪沒孟嘗尊貴獨愴雍門之言魏武英威空留士衡之弔有可悲矣禮部朝會唐白居易叔孫通定朝儀賦天地澄爽宫殿清曠風傳警蹕日麗天仗於是右陳列辟左立丞相東西分而則别文武儼以相向簪裾奕奕頌鵷鷺之具寮劒戟森森列熊羆之名將帝容式展皇威克壯莫不上恭已以臨下下竭誠而奉上謝觀周公朝諸侯于明堂賦洞八闥以臨八極闢四門而來萬有所司備班品于庭除執事肅文物于前後及夫諸位散設三公最崇當中階而列位與羣臣而不同諸侯東階之東西面而北上諸伯西階之西東面而相向諸子應門之東而鶚立諸男應門之西而鶴望戎夷金木之户外蠻狄水火而位配九采外屏之右以成列四塞外屏之左而遙對朱干玉戚森聳以相參龍旗豹韜抑揚而相偝肅肅沈沈巒崇壑深煙收而卿士齊列日出而天顔始臨戴冕旒以當軒見八紘稽顙負斧扆而南面知萬國歸心於是鏘金石揚律吕動塤篪搖柷敔儼若思而山立悄不言而鴈序一拜一起嶽抃而齊傾舞之蹈之雷屯而復舉俄而翠華轉仙仗回恩覃率土化溢九垓合蠻貊以畢至盡梯航以爰來彼禹有大室武作靈臺曷與此而同哉梁簡文帝守東華開門詩脂車向馳道揔轡息東華落關猶待漏交戟未通車薄雲初啓雨曙色始成霞塹流鋪紫若城風泛橘花弦誦終無取顧已自懷嗟周王褒入朝守開門詩直城通復道嚴駕早凌晨鐵符行警曙銀棨未開闉塹暗城無影晴新路不塵屯兵引畫劒騎吹動班輪徒知仰睿藻抽辭慙未申陳江總賦得謁帝承明廬詩霧開仁壽殿雲曉承明廬輪停紺幰引馬度紅塵餘香貂拜黻袞花綬拂玄除謁帝升清漢何殊入紫虛唐太宗正日臨朝詩條風開獻節灰律動初陽百蠻奉遐賮萬國朝未央雖無舜禹迹幸欣天地康車軌同八表書文混四方赫奕儼冠蓋紛綸盛服章羽旄飛馳道鐘鼓震巖廊組練暉霞色霜戟照朝光晨宵懷至理終愧撫遐荒又魏徵奉和詩百靈侍軒后萬國會塗山豈如今睿哲邁古獨光前聲教溢四海朝宗引百川鏘洋鳴玉珮灼爍輝金蟬淑景輝雕輦髙旌揚翠煙庭實超王會廣樂盛鈞天既欣東户日復詠南風篇願奉光華慶從斯萬億年又岑文本奉和詩時雍表昌運日正叶靈符德兼三代禮功包四海圖踰沙紛在列執玉儼相趨清蹕喧輦道張樂駭天衢拂霓九旗映儀鳳八音殊佳氣浮仙掌薰風繞帝裾天文光七政皇恩被九區方陪瘞玉禮珥筆岱山隅鄭愔早朝詩瑞闕龍車峻宸庭鳳掖深才良寄天綍趨拜侣朝簪飛舄看來影喧車識駐音重軒輕霧入洞户落花侵聞有題新翰依然想舊林同聲慙卞玉謬此託韋金又沈佺期詩閶闔連雲起巖廊拂霧開玉珂龍影度珠履鴈行來長樂宵鐘盡明光曉奏催一經推舊德五字擢英才儼若神仙去紛從霄漢回千春奉休厯分禁喜趨陪沈佺期和崔正諫登秋日早朝詩雞鳴朝謁滿白露禁門秋爽氣臨旌戟朝光映冕旒河宗來獻寶天子命焚裘獨負池陽議言從建禮遊王維春日直門下省早朝詩騎省直明光雞鳴謁建章遙聞侍中珮暗識令公香玉漏催銅史天書問夕郎旌旗映閶闔歌吹滿昭陽官舍梅初紫宫門栁欲黃願將遲日意同與聖恩長竇叔向春日早朝應制詩紫殿俯千官春松應合歡御爐香熖暖馳道玉聲寒乳燕翻珠綴祥烏集露盤宫花一萬樹不敢舉頭看司空曙和耿拾遺元日觀早朝詩元日爭朝闕奔流若會溟路塵和薄霧騎火接低星門響雙魚鑰車喧百子鈴冕旒當翠殿憧戟滿彤庭積嵗方編瑞乘春即省刑太官陳禹玉司厯貢堯蓂壽酒三聲退簫韶九奏停太陽開物象霈澤及生靈南陌髙山碧東方遠氣青自憐揚子賤歸草太玄經韓愈和庫部盧四兄曹長元日朝回詩天仗宵嚴建羽旄春雲送色曉雞號金爐香動螭頭暗玉珮聲來雉尾髙戎服上趨承北極儒冠列侍映東曹太平時節身難遇郎署何須歎二毛白居易行簡初授拾遺同早朝入門因示十二韻詩夜色尚蒼蒼槐隂夾路長聽鐘出長樂傳鼓到新昌宿雨沙堤潤秋風樺燭香馬驕欺地軟人健得天涼待漏排閶闔停珂擁建章爾隨黃閣老吾次紫微郎並入連稱籍齊趨對折方鬬班花接萼綽立鴈分行近職誠為美微才豈合當綸言難下筆諫紙易盈箱老去何徼幸時來不料量唯求致身地相誓答恩光鄭谷朝謁詩捧日整朝簪千官一片心班趨黃道急殿揖紫宸深威鳳回香扆新鶯囀上林小松含瑞露春翠易成隂魏陳王曹植請赴元正表欣豫百官之美想見朝覲之禮耳存九成目想率舞唐岑文本三元頌攝提改度孟陬順紀歸餘既終獻嵗方始乃詔司存命掌故考憲章修法度三朝之禮畢陳九賓之儀咸具庭燎晃以飇舉明燈燁以星布爾乃月正元日節應勾芒浮祥煙而泛佳氣闢閶闔而敞德陽虞賓光于列位呼韓厠乎班行百寮濟濟萬國皇皇腰金鳴玉執贄奉璋內自畿甸外被要荒輸賝王會納貢職方司儀之職無替臚人之列有章既伸眷于宸極亦矯首于巖廊猶川流之歸海若湛露之晞陽張崇牙設柷敔陳鼎實列樽俎梐枑肅而為衛戈鋋森以齊舉五輅接軫九旗揚斾羽蓋葳蕤雲車暗靄發聲明于文物備威儀于冠帶禮部燕享隋薛道衡宴喜賦于時霜重庭蘭秋深氣寒橫長河之耿耿挂孤月之團團乃有丹墀縹碧柘館椒宫徘徊宛轉掩映玲瓏妖姬淑媛玉貌花叢織女下而星落姮娥來而月空澄粧影于歌扇散衣香于舞風圖雲刻雷之樽漬桂釀花之酒拭珠瀝于羅袂傳金杯于素手李百藥笙賦玉饌厲而不爽金罍湛而將溢梁王僧孺侍宴詩迥鑾避暑宫下輦迎風館渺漫卿煙轉霏微商雲散蔓草亘巖垂髙枝起天半回風稍驚水落花漸斜岸妙舞駐行雲清歌入層漢睟顔暢有懌德音良已粲陳江總宴樂修堂應令詩肅城通甲觀承華啓畫堂北宫降恩賞西園度羽觴殊私奉玉裕終宴在金房庭暉連樹彩簷影接雲光仙如伊水駕樂似洞庭張彈絲命琴瑟吹竹動笙簧庸疏濫應阮衰朽愧連章又秋日侍宴婁湖苑應詔詩翠渚還鸞輅瑤池命羽觴千門響雲蹕四澤動榮光玉軸昆池浪金舟太液張虹旗照島嶼鳳蓋繞林塘野靜重隂閣淮秋水氣涼霧開樓闕近日迥煙波長洛宴諒斯在鎬飲詎能方朽劣叨榮遇簪笏奉同行梁何遜九日侍宴詩皇德無餘讓重規習帝勳垂衣化比屋眷顧慎為君翾飛悅有道草木荷平分宸襟動時豫嵗序屬涼氛城霞朝晃朗槐霧曉氛氲鸞輿和八襲鳳駕起千羣羽觴歡湛露佾舞奏承雲禁林終宴晚華池物色曛疏樹翻髙葉寒流聚細紋日斜迢遞雨風起嵳峩雲運偶參侯服恩洽厠朝聞於焉籍多幸嵗暮仰遊汾晴軒連瑞氣飛惹御香芬又庾肩吾詩轍迹光周頌巡遊盛夏功鈎陳萬騎轉閶闔九門通秋暉逐行漏朔氣繞相風獻壽重陽節回鑾上苑中疏山開輦道間樹出離宫玉醴吹巖菊銀牀落井桐御梨寒更紫仙桃秋轉紅飲羽山西射浮雲冀北驄塵飛金埒滿葉破栁條空騰猿疑矯箭驚鴈避虛弓雕才濫杞梓花綬接鵷鴻愧乏天庭藻徒參文雅雄唐太宗春日玄武門宴羣臣詩韶光開令序淑氣動芳年駐輦華林側髙宴柏梁前紫庭文樹滿丹墀袞紱連九夷簉瑤席五狄列瓊筵娛賓歌湛露廣樂奏鈞天盈樽浮緑醑雅曲韻朱絃粵余君萬國還慙撫八埏庶幾保貞固虛己厲求賢李嶠奉和天樞成宴夷夏羣寮應制詩轍迹銘西弇勳庸紀北燕何如萬方會頌德九門前的的臨黃道迢迢入紫煙仙盤正下露髙柱欲承天山類叢雲起珠疑大火懸聲流塵作劫業固海成田帝澤傾堯酒宸歌掩舜絃欣逢下生日還覩上皇年盧綸奉和麟德殿宴百僚應制詩雲闢御筵張山呼聖壽長玉欄豐瑞草金陛立神羊台鼎資庖膳天星奉酒漿蠻夷陪作位犀象舞成行網已祛三面歌因守四方千秋不可極花發滿宫香張説奉和御製春曉宴兩相及禮官麗正殿學士探得開字詩聖政惟稽古賓門引上才坊因購書立殿為集賢開髦彥星辰下仙章日月回字如龍負出韻是鳳銜來庭栁餘春駐宫櫻早夏催喜承藝閣宴幸捧柏梁杯張説奉和聖製送赴集賢院詩侍帝金華講千齡道固稀位將賢士説書共學徒歸首命深燕隗通經淺漢韋列筵榮賜食送客愧儒衣賀燕窺簷下遷鶯入殿飛欲知朝野慶文教日光輝又賀知章詩西學垂玄鑒東堂發聖謨天光燭武殿時宰集鴻都枯朽霑皇澤翾飛舞碧梧迹同遊汗漫榮是出汙塗三歎承湯鼎千歡接舜壺微軀不可答空欲詠依蒲又劉升詩圖書應明主策府宴嘉賓台曜臨東壁乾光自北辰網羅窮象繫述作究天人聖酒千鍾洽仙厨百品陳成山徒可仰涉海詎知津幸逢文雅盛還覩頌聲新又褚琇詩講習延東觀趨陪盛北宫惟師恢帝則敷教叶天工宣室恩嘗異金華禮更崇洞門清永日華紱接徽風蓮降堯厨翠榴開舜酒紅文思光萬宇髙議待升中虞世南侍宴應詔得前字詩芬芳禁林晚容與桂舟前橫空一鳥度照水百花燃緑野明斜日青山淡晚煙濫得陪終宴握管類窺天杜審言蓬萊三殿侍宴奉敕詠終南山應制詩北斗挂城邊南山倚殿前雲標金闕迥樹杪玉堂懸半嶺通佳氣中峯繞瑞煙小臣持獻壽長此戴髙天趙彥昭立春日侍宴內出剪綵花應制詩剪綵迎初候攀條故寫真花隨紅意發葉就緑情新嫩色驚銜燕輕香誤採人應為薰風拂能令芳樹春又宋之問詩金閣裝仙杏瓊筵弄綺梅人間都未識天上忽先開蝶繞香絲住蜂憐艷粉回今年春色早應為剪刀催又上官昭容詩葉密因裁吐新花逐剪舒攀條雖不謬摘葉詎知虛春至由來發秋還未肯疏借問桃將李相亂欲何如李嶠春日侍宴幸芙蓉園應制詩年光竹裏遍春色杏間遙煙氣籠青閣流文蕩畫橋飛花隨蝶舞艷曲伴鶯嬌今日陪歡豫還疑陟紫霄蘇頲九日侍宴應制詩嘉會宜長日髙遊順動時曉光雲半洗晴色雨餘滋降鶴因韶德吹花入御詞願陪陽數節億萬九秋期沈佺期白蓮花亭侍宴應制詩九日陪天仗三秋幸禁林霜威變緑嶼雲氣落青岑水殿黃花合山亭絳葉深朱旗夾小徑寶馬駐清潯苑吏收寒果饔人膳野禽承歡不覺暝遙響素秋砧張九齡奉和登封禪禮畢洛陽酺宴應制詩大君畢能事端扆樂成功運與千齡合歡將萬國同漢酺歌聖酒韶樂舞薰風河洛榮光遍雲煙喜氣通春花頻覺早天澤倍知崇草木皆霑被猶言不在躬唐玄宗左丞相説右丞相璟太子少傅乾曜同日上官命宴都堂賜詩詩赤帝收三傑黃軒舉二臣由來丞相重分掌國之均我有握中璧雙飛席上珍子房推道要仲子訝風神復輟台衡老將為調護人鴛鸞同拜日車騎擁行塵樂聚南宫宴觴連北斗醇俾豫成百揆垂拱問彛倫又源乾曜奉和御製詩睿作超千古湛恩育萬人遞遷齊荷澤同拜忽為鄰道洽音徽暢芳馳景命新鼓鐘重享禮鴛鷺集朝倫竊位思官謗凋容謝木春慙多無以敘拙實固難陳進級懷三少承光盡百身自當歸第日何幸列宫臣王昌齡夏月花萼樓酺宴應制詩土德三元正堯心一國同汾隂備冬禮長樂應和風賜慶垂天澤流歡舊渚宫樓臺生海上簫鼓出天中霧曉筵初接宵長曲未終雨隨行羃合月影舞羅空玉陛分朝列文章發聖聰愚臣忝書賦歌詠頌絲桐唐宋璟三月三日為百官謝賜宴表萃帟文茵俱來天上嘉肴清酤亦自大官常袞謝賜宴表臣聞禮之制也以飲食親宗族詩之義也以愷樂宴嘉賓以通上下之情以展君臣之義錢翊為宰相謝內宴表我心則悅洞開咫尺之顔不醉無歸畢降獻酬之禮又為兩省官謝內宴表忘憂而飲備六清既飽而羞踰百品戒膳夫之失飪詔酒正以如澠賜者鮮闕行之皆遍飾喜則聲從禹律製曲則音自堯聰樂和而鳳鳥應來舞妙而薰風共轉曲形文字全為生靈承天詔以咸觀兼聞金石泛恩波而已醉不待樽罍柏梁殿惟召詞臣華林園亦非密座共當異寵難並兹辰李嶠為姚疇等上禮食表瞻鳳闈而列鼎抗龜浦而開筵風光滿佳麗之城煙霧上神仙之閣傾罍倒斝盡百辟之歡娛伏檻馮軒延九霄之眺矚五日開十旬之賞千齡逢萬嵗之期又為孔禎等上獻食表和如九沸美異八珍有慙殷鼎之滋豈益堯厨之膳陳子昂為建安郡王獻食表白茅微藉願享于鈞臺潢汙菲誠思奉于瑤水伏知金雞瑞鼎盈上帝之珍羞玉女行厨盡羣仙之品味以兹菲薄有陋蘋蘩多慚在藻之歡竊有獻芹之志李雍謝賜逰曲江宴表順發生之時𢎞在鎬之宴仙厨和鼎浹洽于廣筵舜瑟歌風均調于法曲吕溫代百寮謝許遊宴表令行如春神應若響寒木暉潤嚴風變和始覺飛沈之樂宇宙之寬物自不疑人知所措在宗載考夜飲承湛露之恩求友相鳴時宴奉需雲之慶白居易九日謝賜曲江宴會狀樂感形骸歡容動而成舞榮均草木秋色變以為春徒激丹心豈報玄澤張説先天酺宴序原夫樂生于心非因結風之奏和達于氣無待陽春之節蓋澤之所及者深則情之所感者遠是日六樂振作萬舞苒弱鳥獸徘徊士女踴躍則知衆庶觀聽之所樂旨酒絡繹大庖燔炙芳溢風煙醉流阡陌則知衣冠酣暢之所適也由近而視遠萬國之慶皆然自明而察幽三靈之歡可接張説季春下旬詔宴薛王山池序泉賙御府味給天厨仙倡侑樂中貴督酒太平佳事前史未書申錫逾于百甕慈惠出于三爵炮炙熏林塘醪醴厭丘壑抃急管于無算醉湛恩以取樂禮部藉田晉潘嶽藉田賦乃使甸師清畿野廬掃路封人壝宫掌舍設枑青壇蔚其嶽立翠幕黕以雲布結崇基之靈趾啓四塗之廣阼沃野墳腴膏壤平砥清洛濁渠引流激水遐阡繩直邇陌如矢蔥犗服于縹軛紺轅綴于黛耜儼儲駕于㕓左俟萬乘之躬履百僚先置位以職分自上下下具惟命臣襲春服之萋萋接遊車之轔轔微風生于輕幰纎埃起乎朱輪森奉璋以階列望皇軒而肅震若湛露之晞朝陽似衆星之拱北辰于是前驅魚麗屬車鱗萃閶闔洞啓參塗方駟常伯陪乘太僕秉轡后妃獻穜稑之種司農撰播植之器挈壺掌升降之節宫正設門閭之蹕天子乃御玉輦蔭華蓋衝牙錚鎗綃紈綷䌨表朱玄于離坎飛青縞于震兑中黃曄以發暉方綵紛其繁會震震填填以幸乎藉田蟬冕熲以灼灼碧色肅其芊芊似夜光之剖荆璞若松柏之依山顛于是我皇乃降靈壇撫御耦逰場染屨洪縻在手三推而舍庶人終畝貴賤以班或五或九躡踵側肩掎裳連袂黃塵為之四合陽光為之潛翳動容發音而觀者莫不抃舞乎康衢謳吟乎聖世陳江總勞酒賦在陽春之仲序覽具物之芳菲帥公卿而播百穀親耒耜而命三推開青壇于迥甸列翠幕于清沂乃遵執爵之典爰降食蘋之宴豁朱鳥之髙窗啓黃龍之抗殿奏帝鴻之萬舞動鈞天之九變顧曲私之亭育遞寒暑而徂遷謬陳力而策駘豈酬恩于暮年闕藉田賦祥風發于耒耜瑞雪掩于郊鄽萬姓顒顒若百川之朝海九宫濟濟如衆星之麗天出甲乙之帳命先農之官設庭燎而晰晰陳量幣而戔戔旌旄夾于翠幕簨簴列于青壇然後華鐘撞焚燎舉馨香發乎聖躬煙煴感乎寰宇常伯撰播植之器宗人掌牲帛之數既金石而間陳亦籩豆而靜旅晨光漸朗湛露初晞告九天之事畢將三辰之禮依帝猶懷神農之務穡想伯禹之疆理一之日于是躬耕二之日于是舉趾秉金耦而顒若駕鐡驪而禮矣將致美于粢盛遂盡力于耘耔望農祥之晨正知土膏之脈起所寶惟穀故大飲以勞農所貴惟人故躬耕以悅使祭惟司嗇蠟必田畯即異畝同穎豈獨瑞于往年象耕鳥耘是錫羡于今運陳張正見從藉田應衡陽王教詩帝京惟赤縣宸居映紫微塗山萬國仰滄海百川歸東郊事平秩仲月祀靈威含光開早扇閶闔啓朝扉洛城鐘漏息靈臺雲霧卷森森虎戟前靄靄鸞旗轉屬車逰絳闕風鳥度丹巘帳殿幸金輿旌門擁玉輦玉輦帶飛煙金輿映緑川雨師清遠路風伯靜遙天分渠通沃野激水入公田草發青壇外花飛蒼玉邊蒼玉陳圭璧青壇躬帝籍冒撅乃三推齊衡均百辟蘭場儼芝駕桂圃芳瑤席山禽詠管絃野獸和金石金石既相和江海復無波梁客簪裾盛陳王文雅多修塗參弱駘喬木蔽輕羅幸承溫吹末擊壤自為歌梁簡文帝藉田詩禮經聞往説觀寶著華篇豈如春路動祈穀重民天蒼龍引玉車犬交旗影曲旃皮軒承早日豹尾拂逰煙地廣重畦淨林芳翠幕懸青壇出長畎帷宫繞直阡秉耒光帝則報獻重皇虔度諧金石奏德厚歌頌詮三春潤蓂莢七月待鳴蟬鰩魚顯嘉瑞銅雀應豐年不勞鄭國雨無營鄴令田是知躬稼美兼聞富教先齊王融永明九年策秀才文昔周宣惰千畝之禮虢公納諫漢文缺三推之義賈生直言良以食為民天農為政本金湯非粟而不守水旱有待而無遷朕式照前經寶兹稼穡祥正而青旗肅事土膏而朱紘戒典將使杏花菖葉耕穫不愆清甽泠風述遵無廢而釋耒佩牛相沿莫返兼貧擅富浸以為俗若爰井開制懼驚擾愚民舄鹵可腴恐時無史白宋闕賀耕藉表藉乃借民周雅述載芟之訓冕而從事戴經垂秉耒之詞不惟敦龎純固于是乎誠抑亦醴酪粢盛由此而出故孝武頒詔于東郊章帝親巡于懷縣豈止一時之稱美實為千古之流光千耦其耘佇慶康功之即萬邦無斁永歌嗣嵗之興梁元帝慶東耕啓伏惟陛下敬授民時造幄藉圃漢之元鳳未足捧羈晉之太始非堪扶轂梁元帝祭東耕文三農九穀為政所先萬箱億庾是曰民天繫稱斫耜書美厥田花開杏樹凍解新泉當使黍稷莫莫民翳胥樂甘雨祁祁遂及我私我私之熟表裏禔福禔福中田嵗取十千是藨是蔉登頌有年禮部親蠶魏韋誕皇后親蠶頌于時明庶扇物鳥帑昏正躬耕帝籍邁德班令嘉柔桑之肇敷思郊廟之至敬命皇后以親蠶俾躬桑于外坰考時日于巫咸詔太卜以獻禎御坤德之大輅翳翠葆以揚旌爾乃皇英參乘塗山奉輿總薑任于後乘載樊衛于二車千乘隱其雷動萬騎粲以星敷啓前路于三宫命蚩尤而清衢逰青虯于左角步素螭于右隅登崇壇而正位覿休氣于朝陽步雕輦而下降手柔條于公桑嬪妾肅以涖事職蠶植而承筐供副褘之六服昭孝敬于蒸嘗平土就蠶彰乎曩烈亘山成繭著自前書爰崇黻冕之宜遂展鞠衣之範禮部巡幸漢揚雄幸河東賦伊年暮春將瘞后土禮靈祗謁汾隂于東郊乃撫翠鳳之駕馳先景之乘棹奔星之流旃攫天狼之威弧奮電鞭驂雷輜鳴洪鐘建五旗羲和司日顔倫奉輿樂往昔之遺風喜虞舜之所耕瞰帝唐之嵩髙兮眽隆周之大寧叱風伯于南北呵雨師于西東參天地而獨立廓蕩蕩其無雙周庾信華林園馬射賦玄鳥司厯蒼龍馭行羔獻氷開桐花萍生皇帝幸于華林之園千乘雷動萬騎雲屯落花與芝蓋同飛楊柳共春旗一色乃命羣臣陳大射之禮騶虞九節狸首七章于是選朱汗之馬校黃金之埒紅陽飛鵲紫燕晨風唐成公之驌驦海西侯之千里莫不飲羽銜竿吟猿落鴈鐘鼓振地埃塵漲天綵則錦帳俱移錢則銅山合徙實天下之至樂景福之歡欣者也嵗次昭陽月在大梁其日上已其時少陽春吏司職青祗效祥徵萬騎于平樂開千門于建章皇帝翊四圉于帝間回六龍于天苑華蓋平飛風烏細轉帷宫宿設帳殿開筵傍臨細栁斜界宜年河漘剃草渭口澆泉堋雲五色的暈重員陽管既調春絃實撫玉律調鐘金錞節鼓于是咀銜拉鐵逐日追風並試長秋之埓俱下蘭池之宫鳴鞭則汗赭入埓則塵紅變三驅而畫鹿登百尺而懸熊禮正六耦詩歌九節弓如明月對堋馬似浮雲向埒鴈失羣而行斷猿求林而路絶乃有六郡雄材五陵髙選新回馬邑之兵始罷龍城之戰尚帶流星猶乘奔電始聽鼓而唱籌即移竿而摽箭熊耳刻杯浮雲畫罍水衡之錢山積織室之錦霞開司筵賞至酒正杯來既而日下澤宫筵闌相圃悵徙蹕之流歡眷回鑾之餘武唐闕述聖賦至如雲觀晨開風亭夜敞回長飇于輕翼凝濃露于仙掌沈落月于璧臺挂奔星于珠網羅紈飄而散馥環珮動而流響垂密葉于綺窗散飛花于翠幌復有天池濛沼以嬉以遊鼓輕枻漾仙舟蔭喬木鏡清流魚鳥陵亂蘋藻沈浮控飛梁以架迥列層閣以環洲漬檀欒之修竹映迢遰之危樓風未生而葉動景將昃而光收若夫瑞草竒色祥樹嘉名霏紅曜紫垂緗拖青或玲瓏于玉砌或點綴于金楹交九衢而結影分四照以開榮浥朝露而逾馥帶星風而更輕于是登崇觀以周覽闢層軒而遐矚樹含嶺而共青草帶原而同緑俯八紘而非逺願千里而為局闕望春宫賦鮮飇微扇籠輕靄于髙臺淑氣初臨鎖浮光於緑仗吾君于是縱目前檻馳神逺郊散晴煙于地表拂佳氣于林梢覩青陽之煦然載懷祈榖聽鶬鶊之鳴矣不使覆巢布政有孚宸逰是假察微明于逺嶠睇新緑于平野南山之翠色盈前渭水之素光在下蓋將賦藉田于晉代豈比撰吉月疑作吉日於周雅李程華清宫望幸賦竹花雖吐如含待鳳之誠雲氣才升若睹從龍之狀李子卿駕幸九成宫賦由是叶清秋練吉日乘石洗皇輿出七騶按隊千乘扈蹕戈矛林森士馬櫛比始地嶪而天旋終電馳而飇疾翻然而八駿騫騰霍濩而六龍奔逸雷公轉轂風伯按馭朱旗列而秋野生春金甲照而暮川增曙陋漢帝之逰衍哂秦皇之逸豫祥煙不散近飛槍壘之間瑞草常開併拂車宫之處廣陌鳴鑾異彼逰盤訪百年之疾苦知五稼之艱難成王之搜由是問古公之政有以觀翠華來兮野老喜屬車至兮國人歡詎比夫隴塞回中妄開行幸之路泰郊畤上虛立禮神之壇張仲素穆天子宴瑤池賦絳宫玄囿異故鄉之樓臺鳳舞鸞歌勝至樂之韶濩澄光渺瀰極望瑤池湛水容之漫漭蕩日彩以參差逺近洲沚駢羅羽儀蕩蕩五雲冒芝田而不散翩翩三鳥拂珠樹以相隨金液是嘗玉杯是挹桃杏之花競秀蓬瀛之侣遙集逰仙可戀覺天路之日長惟帝念歸懼人間之景急梁簡文帝幸甘泉宫歌雉歸海水寂裘來重譯通吉行五十里隨處宿離宫鼓聲恆入地塵飛暗上空尚書隨豹尾太史逐相風銅鳴周國旞旗曳楚雲紅幸臣射覆罷從騎新歌終董逃拜金紫賢妻侍禁中不羡神仙侣排煙逐駕鴻劉孝威幸甘泉宫歌漢家迎夏畢避暑甘泉宫機車鳴里鼓駟馬駕相風校尉烏丸騎待制樓煩弓後旌猶五柞前笳度九嵕才人豹尾內御酒屬車中輦回百子閣扇動七輪風鳴鐘休衛士披圖召後宫材官促校獵涼秋戲射熊梁簡文帝侍逰新亭應令詩神襟愍行邁岐路愴徘徊遙瞻十里陌傍望九成臺鳳管流虛谷龍騎籍春荄曉光浮野映朝煙承日回沙文浪中積春隂江上來栁葉帶風轉桃花含雨開聖情藴珠綺札命表英才顧憐碔砆質何以儷瓊瓌陳張正見御幸樂遊苑侍宴詩大君臨四表榮光普八埏區中文化洽海外武功宣鳳書下丹篆龜符著緑編昆明不習戰雲夢豈遊畋軌文通萬國旗節靖三邊髙秋藐姑射睿想屬汾川兩宫明合璧雙闕帶非煙揚鑾出城觀詔蹕