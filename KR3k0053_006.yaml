body:
  text: 古儷府卷六明王志慶編職官部三公宋李綱宰相除三公制臣作朕股肱擢預經綸之政帝賚豫良弼遂膺考爰之求勱相國家敉寧方夏燮諧四氣之序參聽百官之成當軸處中材足以運動樞極贊元經體道足以和同天人禮樂興於百年聲教訖於四海俾豫從欲以治時乃佐王之休疇其勳庸宜有褒寵齊孔稚圭為王敬則讓司空表先帝擢臣以榮華陛下伸臣以富貴遂行北帶五州東跨六郡內亞三鼎外齊四嶽蟬佩之映則左右交暉龜組之華則縱橫吐耀輕輪徐動則劔戟如雲飛蓋暫停則歌鐘成列摐金龍吹鬱其前鳴笳鳯管疊其後鄧禹若不遭漢光則南陽之掾吏微臣若不逢明聖則孤城之戍客豈可加以正台之席登以論道之寄啓黃扉而燮五緯躡青帷而調四序梁劉孝儀為臨川王解司空表臣以庸薄謬竊隆重職班三事任總六條衣衮坐槐既闕論道馳傳憩棠尤慚為政而俯司土地仰燮隂陽棟撓之譏已彰愆伏之咎爰著今水沴乃作旱魃為災山無薈蔚雲成煙火陛下曲私未垂策免臣職是當逃責乞降兹台步協此天人陳沈炯為陳太傅讓表若使幅巾衡巷口絶平吳朝遊赤松暮過濟北出就侯服入褫龍章則四郊有壘誰守社稷如其雄戟在前強弩自衛負孺子之圖飾緣鶴之鼎軍威重於護將國禮貴於寒門則臣道尚卑孰云非逼吳均揚州建安王讓知司徒表臣聞玄黃之馬事絶於銜鑣蠧朽之材飾乖於丹漆何則千里之志已窮萬乘之器無取逺物近身於焉在譬後魏溫子升為司徒髙敖曹謝表委水橫流羣龍交戰徒悲道喪空懷主辱雖復見義援戈臨危奮劔顧慚後衄終謝先鞭事等泣河無救三川之竭有類憂天豈支四極之壞宋李劉賀史丞相除太傅啓竊以傅者傅之德義不惟其官惟其人臣哉臣作股肱罕有是父有是子若西京厚王陵之寵及東都旌卓茂之年雖加衡紞以鞶纓俱匪箕裘之鼎鼐於皇孝廟舊學越倫當淳熙丙午之壽上皇以正月戊子而進亞父今専槐之正位有喬木之世臣父子一家兩兩齊三台之色君臣千載重重聚四紀之間賁然緑綈之新復此青氊之舊風震雨凌而棟梁自若火炎水潤而鼎實各調蓋享天心非要人爵陶侃之指紋貫徹猶三遜以滋髙丁固之松夢留連甘十年之不調上念慈闈之訓日思元老之功無官酬公維師尚父猶堅謙抑力反渙揚姑隆絶席之班式舉戴輿之典虹明帶玉龜顧印金備衮冕之上儀增衣冠之盛事改容而禮論道以經平淮用八千兵更酬謝傅蒼生之志辭齊封三萬户會尋留侯黃石之盟蘇軾賀文太尉啓道本天合德為人師信及二川之豚魚威加兩河之草木身任休戚言為重輕始若留侯弱冠而遇髙祖晚同尚父黃髮而亮武王既奉册書益新民聽方將威懷北敵係頸長纓約束河工軌流故道然後入調伊傅之鼎歸躡松喬之遊輿論所期斯言可必周王褒太傅燕文公于謹碑銘公稟山嶽之上靈含風雲之秀氣雕良玉於亷劌鍊貞金於鍌鋈魏恭帝元年為大司寇正刑糾慝國無害馬之倫翦暴詰姦民無飲羊之俗三刺薦無簡之文兩造陳禁邪之憲世為邊將少習兵書當敵制機臨戎應變增壘減竈之圖題樹繫桑之略軍中罷戰無廢雅歌壯士志驕時觀投石及乎名髙衛霍爵重韓彭錫邑增於鄭僑賜樂同於魏絳丹節比司𨽻之貴緹騎埒金吾之寵座闕倡歌之娛堂無鐘鼓之奏辭功坐樹不伐征西之勳還第角巾無競龍驤之賞王褒太保吳武公尉遲綱碑銘公命世挺生應期間出嵩華峻極降惟嶽之上靈霜露所均體中和之秀氣危松擢本且觀後雕之質貞桂挺生便體冬華之秀是故以辰昴膺慶風雲玄感者焉公柔順內凝英華外發斧藻仁義圭璋令範危徑之節冠四序而喻秀堅貞之操經百鍊而不銷加以逵門射法逺中戟支飬由箭神遙穿懸葉巧極將軍之伎精窮校尉之官後漢蔡雍太尉李咸碑銘天垂三台地應五嶽降生我公應鼎之足奕世載德名昭圖籙既文且武桓桓紹續外則折衝內則大麓梁沈約齊太尉王儉碑銘瞻旦奭而齊軫軼夔龍而長騖百辟翹首譬列星之仰望舒千里結轍若派流之宗江漢及宋道盛運鼎命將改而瞻烏所集未知適歸公髙卧間宇獨吒虛室眷龍顔以託夢詠日角以興言佇傅巖之下懷滋水之上慨深版蕩念在濡足霸君亦慮屬一匡情降三顧卜匪熊羆唯人是與公深覩興廢妙識人英察榮光於河渚攀龍翼於雲漢傾方寸以奉國忘七尺以事君殊文共會異軫同歸堆案盈几充庭滿室隨方引應斷決如流辭不輟響紙無停筆精明外朗神彩傍映矖矚接其光景風雲溢乎帷席後魏溫子升西河王謝太尉表臣聞拂羽決起力謝摩天策蹇載馳功微送日將短翮難以陵髙駑乘無由致逺雖復建旟出郡未追楚趙之風捧壺入侍徒踵金張之迹及天祚明德運啓興王六遂始遷九鼎初定於焉承乏有用當官草靡從風未遑克讓常恐執轡輕輪操刀傷錦宋傅亮司徒劉穆之碑飛雲西泝則水絶鯨鯢乘轅東指則陸殪長蛇陳徐陵司空章昭逹墓志銘周原膴膴佳氣蔥蔥王業攸興帝圖斯盛在昔光武佐命鄰縣者鄧侯髙祖元臣同郡者蕭相公台輔之量便著綺紈瑚璉之姿無待雕琢起家為東宫直前所奉之君則梁簡文皇帝既而黑山巨盜憑陵上國白水強胡虔劉中夏公傾其産業募是驍雄思報皇儲纍殱鯨寇屬幽風有象代邸方降搜荆楚之英才資班輸之妙略百樓忽起登雲霄而俯臨萬弩俱張隨雷霆而並震揚兵於九天之上決勝於千里之中殪彼羣凶皆無旋踵陳寶應至懷反叛客引周迪資其食力更事窺窬公奉詔崇朝飲氷將力前茅後徑步驟奔馳仍向甌閩殄其巢窟若夫鳴蛇之洞深谷隱於蒼天飛猿之嶺喬樹參於雲日宜越艇而登嶠蒙燕犀而涉江威力紛紜震山風海於是咸俘偽師悉據髙墉爰洎滄溟莫不懲乂既而齊人無信將謀郢藩鬭艦戈船窺江淹漢公才聞羽檄遽稟師期馳襲荆鄖應時燒蕩方欲宣威瀧汧大討梁華屬上將之韜光逢中台之掩曜大建三年薨於軍幕爾乃青烏栖墓白鶺標墳林有逃車樹同華蓋前旍熊軾後乘龍轜介士發三河之民哀鐃同駟馬之曲長安傳坐恩禮盛於西京襄陽墮淚悲痛喧於南峴職官部政府唐張九齡酬宋使君見贈詩時來不自意宿昔謬樞衡翼聖負明主妨賢愧友生罷歸猶右職待罪尚南荆政有留棠舊風因繼組成髙軒問疾苦蒸庶荷仁明衰廢時所薄祇言僚故情髙適古樂府飛龍曲留上陳左相詩德以精靈降時膺夢寐求蒼生謝安石天子富民侯樽爼資髙論巖廊揖大猷卿才傳世業相府盛嘉謀豁逹雲開景清明月映秋能為吉甫頌更忝子房籌户牖思攀陟門欄尚阻修髙山不易仰大匠本難投迹向松喬合心緣啓沃留公才山吏部書癖杜荆州幸沐千年聖何辭一尉休折腰知寵辱回首見沈浮天地莊生馬江湖范蠡舟逍遙堪自樂浩蕩信無憂去矣從黃綬歸歟任白頭風塵與霄漢瞻望日悠悠髙適奉贈李右相林甫詩風俗登淳古君臣揖大庭深沈謀九德密勿契千齡獨立調元氣清心豁窅冥本枝連帝系長策冠生靈傅説明殷道蕭何律漢刑鈞衡持國柄柱石總朝經隱軫江山藻氛氲鼎鼐銘興中皆白雪身外盡丹青江海呼窮鳥詩書問聚螢吹噓成羽翼提握動芳馨倚伏悲還笑升沈醉復醒恩榮初就列含育忝宵形有竊丘山惠無時枕席寧壯心瞻落景生事感流萍莫以才難用終期善易聽未為門下客徒謝少微星杜甫投贈韋左相詩鳯厯軒轅紀龍飛四十春八荒開壽域一氣轉鴻鈞霖雨思賢佐丹青憶舊臣應圖求駿馬驚代得麒麟沙汰江湖濁調和鼎鼐新韋賢初相漢范叔已歸秦盛業今如此傳經固絶倫豫章深出地滄海濶無津北斗思喉舌東方領縉紳持衡留藻鑑聽履上星辰獨步才超古餘波德照鄰聰明過管輅尺牘倒陳遵豈是池中物由來席上珍廟堂知至理風俗盡還淳才傑俱登用愚蒙但隱淪長卿多病久子夏索居頻回首驅流俗生涯似衆人巫咸不可問鄒魯莫容身感激時將晚蒼茫興有神為君歌此曲涕淚在衣巾杜甫贈韋左丞丈濟詩左轄頻虛位今年得舊儒相門韋氏在經術漢官須時議歸前列天倫恨莫俱鴒原荒宿草鳯沼接亨衢有客雖安命衰容豈壯夫家人憂几杖甲子混泥塗不謂矜餘力還來謁大巫歲寒仍顧遇日暮且踟蹰老驥思千里飢鷹待一呼君能微感激亦足慰榛蕪劉禹錫奉賀吏部尚書太常李卿二相公䇿免後即事述懷贈答詩文雅關西族衣冠趙北都有聲真漢相無纇勝隨珠當軸龍為友臨池鳯不孤九天開內殿百辟看晨趨誡滿懲欹器成功别大罏餘芳在公論積慶是神扶步武離台席徊翔集帝梧銓材秉秦鏡典樂去齊竽瀟灑風塵外逢迎詩酒徒唯應待華皓更食萬錢厨白居易寄獻北都留守裴令公詩天上中台正人間一品髙休明值堯舜勳業過蕭曹始擅文三捷終兼武六韜動人名赫赫憂國意忉忉伐蔡擒封豕平齊斬巨鼇兩河收土宇四海定波濤寵重移宫籥恩新換閫旄保釐東宅靜守護北門牢晉國封疆濶并州士馬豪胡兵驚赤幟邊雁避烏號令下流如水仁沾澤似膏路喧歌五袴軍醉感單醪將校森貔武賔僚儼雋髦客無煩夜柝吏不犯秋毫神在臺駘助魂亡獫狁逃德星銷彗孛霖雨滅腥臊烽戍髙臨代關河逺控洮汾雲時漠漠朔吹冷颾颾豹尾交牙戟虬髯捧佩刀通天白犀帶照地紫麟袍羌管吹楊柳燕姬酌蒲萄銀含鑿落線金屑琵琶槽遙想從軍樂應忘報國勞紫微留北闕緑野寄東臯忽憶前時會多慙下客叨清宵陪宴話美景從遊遨花月還同賞琴詩雅自操朱絃拂宫徴洪筆振風騷近竹開方丈依林架桔橰春池八九曲畫舫兩三艘徑滑苔粘屐潭深水沒篙緑絲縈岸柳紅粉映樓桃為穆先陳醴招劉共藉糟舞環金翡翠歌頸玉蠐螬盛德終難退明時豈易遭公雖慕張范帝未捨伊臯眷戀心方結踟蹰首已搔鸞凰上寥廓燕雀住蓬蒿欲獻文狂簡徒煩思鬱陶可憐四百字輕重抵鴻毛姚合奉寄東都留守令狐相公詩除書東守洛陽宫恩比藩方任更雄拜表出時傳七刻排班衙日有三公旌旗嚴重臨關外侍府清深接禁中三十六峰詩酒思朝朝間望與誰同項斯獻令狐相公時相公郊壇行事回詩鶚在卿雲氷在壺代天才業本訏謨榮同伊陟傳朱户秀比王商入畫圖昨夜星辰回劒履前年風月滿江湖不知機務時多暇還許詩家屬和無李洞述懷獻覃相公詩帝夢求良弼生身屬聖明青雲縣器業白日貫忠貞靄靄隨春動欣欣共物榮靜宜浮競息坐覺好風生萬國惟應躍千門望盡傾瑞含楊栁色氣變管絃聲百辟尋知度三階正有程魯儒視藴藉周誥美和平碧水遺幽抱朱絲寄逺情風流秦印綬儀表漢公卿忠讜期登用回邪自震驚雲開長劒倚路絶一峯橫九野方無事滄溟本不爭國將身共許心與衆為城早晚中條下煙塵一顧清南潭容伴鶴西笑忽遷鶯折樹恩難報懷仁命甚輕二年猶困辱百口望經營未在英侯選空勞短羽征知音初相國從此免長鳴唐沈詢魏謨拜相制風后登庸軒圖以穆文終佐理漢業遂昌自騰芳詞林振迹諫垣文宗知臣深加寵遇檢校甚峻守道不回未至逹官蔚為國器星霜屢變流落幾途秀木摧風燎原見玉汲黯心存乎廊廟望之志在於本朝昔爾先祖為唐輔臣人鏡之名阿衡比德爾尚纂承藝訓克嗣清風勉思貽厥之謀以闡將明之業玉堂遺範張𢎞靖拜相制實天生德惟嶽降神端方靜深信厚溫密質抱荆山之璞光含魏國之寶錯爾素履穆然清風出備爪牙總近關之紀律入膺喉舌練中臺之法制從容宰輔密勿鼎司又王涯拜相制屬者禁垣揮翰五字日宣選部持衡九流風動洊居肘腋之地歷試股肱之才進嘗伏於青蒲出不泄其溫樹牟融得大臣之節毛玠有古人之風詢廟算以生知論兵鈐而暗合又權德輿拜相制驥騄之質常識於逺途鸞鳯之姿宜巢於阿閣期於致理推之至公又夏侯孜拜相制篙楫克修航艦以之濟海羽翮可勵鵾鵬於是摩天大昴分精維嵩挺秀擅四海之賢俊作中朝之表儀禮樂詩書資其懿範溫恭孝愛輔以多才服道以致身含章而底力經國之用貫百川而不改其清應物之明體萬象而莫窮其照福星時雨既惠巴庸景化元和須歸鼎鉉是用召於驛騎待以天工重開集鳯之池再仰問牛之化又楊收加恩制器茂渾金寶欽大玉瑩清氷於溽暑挺緑桂於嚴霜行過曽顔道兼夷惠詞冠一時而若非遊藝學該千古而似不能言自鴻飛名場鷺振班列憲署每聞其守法曲臺咸著於推公常懷造膝之中俾見沃心之旨謝安體識王儉精能動為僉論所諧居益具瞻之望太平內制源乾曜拜相制貞白可以勵時道義可以宏物虛懷同於抱月懸鏡不疲利器比於成風刜鐘無滯固可充左曹之駮議翊中臺之謀猷用參金鉉之司兼踐玉壺之制裴度拜相制文融菁華行茂枝葉居然廊廟之器出於領袖之門西掖司言南臺執憲常懷逺略屢告嘉猷實宣力以徇公况外身而憂國霜雪無改雷風有恆崇道德之藩籬士有致命資忠信之甲胄兵無容刃人具瞻爾天方賚豫崔嶼崔龜從拜相制漢中大業魏邴克贊其謨謀開元盛時姚宋同匡其治理烈火方熾圭璋更寒飛霜已嚴竹柏猶翠自出入劇職徊翔清途經歷五年恭勤一貫粉署潔賜衣之操掖垣髙白鳯之文吉甫德全於文武彥回望著於台衡既諧具瞻實允元輔於戲惟木從繩載懷藥石之誡惟風偃草兾流霖雨之功與其順美以昭忠不若盡規而輔德與其嚴刑而就理不若齊禮以安人佇聞嘉言共底交泰無令伊傅獨美典墳張説讓右丞相表臣少長儒門懇鑿墳史才非髙俗官不因人徒以命偶龍興位階鴻漸五入西掖七踐南宫中間拙延謫放直招玷缺傷矢之禽聞弦虛墜賜環之客聽歌先泣此則魂為危感氣由懼奪安可重收廢器再辱端揆何以師長禮闈正持憲府當今典章革故風教鼎新野無四隱朝有三傑具瞻之地願擇時髦臣幸沐遺簮墮履之恩好生養老之德朝遊簡牘暮對圖書受賜無涯循榮過分豈更干處士之橫議招胸奴之遙哂艾骨自瘡負乘致寇雖則愚情懷戀靦冒求寵亦望聖慈限約令度餘年願停今授長守舊史元稹為蕭相公讓官表臣猥以凡才謬居重任當陛下維新之始辱陛下爰立之恩有纍樞衡無禆衮職外致胸奴之哂內失蒼生之心推換炎涼因循德澤妨塞賢路塵忝台階自顧疲驂方求息駕豈謂陛下特迂神鑒曲盼凡材再生集作提腹背之毛重委股肱之地大辜人望猶簡帝心雖君父深恩莫知其惡而駑駘力竭何以自安豈敢退而生光實願求其死所伏望再移天眷重選時英特回加膝之恩别求沃心之相錢翊代人謝再入相表中台不耀先慙箕斗之光元首自明何效股肱之力胡曽賀髙相公除荆南啓臂斷華山宜假巨靈之力決平洪水須憑大禹之才既無易於肩堯遂有成於命説杜牧謝周相公啓常切如家之憂每懷撻市之恥羅隱投永寧李相公啓今者風雨得生成之候爐鎚升鼓鑄之司郭令軍前潛抽妓樂崔寧城外暗毁池臺登庸之時序未遙反斾之鎡基已兆李商隱賀相國汝南公啓伏惟閣下昭回降彩沆瀣融精往執靈鉟正星辰之分野今調鏤鼎猶日月之得天昔軒后師臣成王畏相殷奉伊尹則謂之元聖周事吕尚則命為太公此王者之所以尊賢傑而不以為疑也至於姬旦金縢不與燕召同列仲尼麟史不令遊夏措辭甘盤尊舊學之名夷吾居仲父之位此又賢傑之所以自負其道而不以為讓也上下交感人祗叶從是我后夷姦秉哲之辰是閣下宰物匡時之夕清廟係心矣蒼生延首矣允也無間樂哉惟時某早奉輝光嘗蒙咳唾牛心致譽麈尾交談而契濶十年流離萬里扶風歌則劉琨抱膝白頭吟則鮑照撫膺重至門闈空餘皮骨方從初服無補大鈞穿履弊衣正同東郭稿項枯馘乃類曹商未知伏謁之期徒切太平之賀宋劉克莊賀范左相啓恭惟某官稟元化之精粹蹈聖人之中庸貴處廟堂臞如山澤其秉心誠實故君子咸附其蓄德深厚故小人不疑屬者諸公欲手版下新亭之拜時惟元老獨舉扇障武昌之塵然後太阿之柄還然後九鼎之勢重十全無遺慮矣一變猶反手然斯謀斯猷惟君陳之告我朕夢朕卜以汝説而賚豫必能容折檻之人必不罪舉播之士必開密網必革副封必斥絶𢎞羊張湯必追還陽城陸贄魯安得削隱然儒無敵之功吳未可圖良以彼有人之故魏了翁賀鄭丞相啓翰苑受命於禁中掖垣代言於閣下今或先數旬而呈藁斷無楊大年因三讓而求歸或後纍月而草詞亦非劉原父以九制而被遇張守賀趙丞相啓獻納論思夙著排姦之節贊襄輔弼尤髙經逺之謀惟光武能推赤心而綘侯可屬大事會羽書之遽至奉革輅以徂征師律一新坐據江山之險捷書屢上幾成京觀之封致醜類之宵奔本嘉猷之辰告射雕賈勇雖多李廣之無雙指獸收功誰出蕭何之第一宜頒宸綍首冠台躔舍爵之賞既行歸疆之期可待石楙賀張左丞啓妙呼吸百家之學久代王言奮經綸四海之才進陪國論賢者在位君子得輿帝曰往哉汝諧人亦喜而不寐王安石賀韓魏公啓受天秀氣為世元龜誠節表於當時德望冠乎近代典司密總命攬中權毁譽幾至於萬端夷險常持於一意故四海以公之用舍一時為國之安危越執鴻樞遂躋元輔以人才未用為大恥以國本不建為深憂言衆人之所未嘗任大臣之所不敢及臻變故果有成功英宗以哀疾荒迷慈聖以謙沖退託內揆百官之衆外當萬事之微國無危疑人以靜一周勃霍光之於漢能定策而終以致疑姚崇宋璟之於唐善致理而未嘗遭變記在舊史號為元功未有獨運廟堂再安社稷弼亮三世敉寧四方崛然在諸公之先煥乎如今日之懿若夫進退之當於義出處之適其時以彼相方又為特美秦觀賀吕相公啓媧皇補天之際髙宗夢帝之初未就泥金正資陶鑄不調琴瑟方賴更張是謂大有為之時必得非常人之佐恭惟中書僕射相公纍朝元老名世大儒力足以扶持顛危風足以興起貪懦青天白日奴𨽻亦知其明璞玉渾金鑒識莫名其器既天資之篤實加地胄以髙華四世五公勳在王室一門萬石寵冠廷臣宗族謂之小許公夷狄以為真漢相果從人望爰享天心方思左轄之嚴遽踐鸞臺之峻獻可替否而思矯激之過解紛挫鋭而有調和之能必欲成仁之始終非特潔身之去就繇是端人坌集異黨寖微寬大之澤四覃苛刻之風一變名既得功而並立位當與德而俱崇明詔始班吉士交慶太公入國固知天下之父歸伊尹得君益見聖人之任重某猥緣幸會叨被題評昔陪北海之樽有同夢寐今望平津之館如隔雲天但欣衆正之路開始信太平之塞責唐王勃上劉右相書聖人有作羣材畢舉星辰入仕揖讓朱鳥之門風雨稱臣奔走蒼龍之闕方欲停旒金室引成康於己任闢廣瑶林復堯舜於兹日可謂明明穆穆盡天子之容貌矣抑嘗聞之丹山九仞煙峰非數簣之功紫極千門雲臺俟萬楹之力故天下至曠神器不可獨専天道無私玄勳有待而立書曰元首明哉股肱良哉好問則裕自用則小况掌萬國之權受一人之寵動見臧否言知利害君侯足下何時易耶闕策宰相科問夢想傅巖之野佇思磻溪之上遂得乘箕入相就三命而作鹽梅投釣升朝封四履而稱師父欲使隂陽調六律風雨應四時一百姓之心平九州之利餘糧棲畝外户不扄亭障無虞關河罷戍漁者虛湍瀨田者讓肥腴路不拾遺市無二價眷言於此何道以臻晉袁宏丞相桓溫碑銘河洛澄清華梁卷翳孫綽丞相王導碑文柔暢協乎春風溫暖侔於冬日信人倫之水鏡道德之標準也匪躬而身全遺功而勳舉唐李嶠讓知政事表臣才實凡庸志無逺大叨預簮履遂升臺閣踐金門而遊石室掌狐史而參鳯綸被蜉蝣之衣徒竊榮寵接鴛鷺之羽久慚尸曠甘受妨賢之責忽承非次之恩仍使參預機衡獻替帷幄持濟川之舟楫味和羮之醯醢以挈瓶之智陪負鼎之遊將何以祗奉帝難弼亮皇極况丹青所運鼓舞通於四時爐錘所裁綱紀行於萬俗動關政體豈易其人宋陸遊賀周參政啓典謨實列於六經臣主難逢於千載髙文大作或托之不得其人老師宿儒有死而莫見於世維時鴻碩之彥早冠清華之途成功昭於神明大業刻之金石發德音下明詔大哉王言建顯位施尊名震於方外一變猥釀枝駢之體以還雄深灝噩之風縉紳竊誦而得師夷狄傳觀而動色顧於昭代可謂殊勳雖箕潁之志屢陳然莘渭之求焉往恭惟某官任重而宏毅謨明而弼諧以窮深測逺之才坐酬衆務以極髙蟠厚之氣隂折遐衝至於擅世之英辭本皆全德之餘事僅少施於一二已見謂於崇谹豈容卷懷經濟之圖遂欲袖手寬間之地公無困我初誦留行之言上誠知人亟下延登之命然易簡者聖君之眷難居者天下之名方仰對於寵光願益思於抑損茂迪謙尊之吉永為善類之依已上知政事唐賈至授房琯文部尚書同平章事制秉忠義之規靡憚艱險挺松筠之操寧移歲寒宜承題劒之榮式允濟川之望楊巨授陸扆平章事制咸濩抱降神之韻圭璋挺華國之容包倚相之典墳紹平原之辭藻又授孫渥平章事制壁立孤峰渭清一派早以閨門之行聞乎鄉黨之間張融髙文聚為玉海孫綽麗賦擲作金聲頗喧驚座之辭華遂整沖天之羽翼鵬張上國顔淵首冠於諸科弓招小山穆生道優於置醴厥後簮御史筆講博士書從容纍踐於南宫諫諍俄升於左闥蘭香見忌玉冷多猜比騷人湘浦之行繼賈誼長沙之役朕自知直道召歸掖垣每於敷陳必盡肺腑因朱雲折檻之對識張華王佐之才斷自中宸爰立作相彌縫不倦匡益居先操心願革於澆浮進善必先於行實搜決沈滯拔用隱淪致我時風自爾而厚張説當玄宗之代初啓集賢竇參居德宗之朝别分户部一則籠九流之墳籍一則萃四海之賦輿式仗英規遂兹兼領除鄭朗工部尚書同平章事制王室髦彥士林菁英溫華凝圭玉之姿磊落負棟梁之任宋鄧潤甫除文彥博平章軍國重事制惇大而清明方嚴而信厚出則秉乎旄鉞入則總我鈞衡文武兼備其才夷險能致其力畢公之弼四世三紀於兹傅説之總百官萬邦其乂爵隆無富溢之纍名遂有身退之榮神明相其康壽人心想其風采是用還之論道倚以經邦以帝者之師臣謀議廟堂之上以天下之大老制馭夷狄之情庶幾有為底於極治陪敦多井申衍真封於戲吕望惟賢起佐文王之治周公已老留為孺子之師矧我耆英無愧前哲往宣一德用格多盤李沆除吕蒙正中書侍郎兼户部尚書平章事制天道無私日月星辰助其照皇王不宰股肱輔弼代其工所以端拱守成垂衣制理求建丕平之景運遐追三代之令猷其有業茂經綸才推謹厚參大政而已淹星歲秉至公而無捨寅昏宜頒出綍之殊恩俾正持衡之重柄爰擇剛日特降命書推忠佐理功臣朝散大夫給事中參知政事柱國東平郡開國男吕蒙正四氣均和五行鍾秀有濟時之略輔之以溫恭挺命世之才守之以循默爰覩舜旌之進善遂指魏闕以來儀臨軒覩敏贍之能射策見縱橫之略暨兹登用益著謨明公忠推社稷之臣凝重見廟堂之器秉兹大體久鬱具瞻屢宣作礪之功克懋秉鈞之績别錫褒功之美號仍升馭貴之崇階勳籍增榮井田加賦預列侯之峻爵同大利之計書顧優恩之在兹諒名器之無假於戲雲從龍而風從虎今也其時啓朕心而沃朕心必求諸道爾宜周旋庶政佐佑眇躬緩兹宵旰之憂翊我隆平之運同底於道豈不美歟唐李嶠為水潦災異陳情表臣聞明主程才先求於稱職忠臣效用必務於量己然後庶官無廢百度以康若使假鳯登朝真龍不馭將緣鶴之鼎方憂於折足和鸞之駕必誡於傾輈豈徒鐘鼓生妖蠻夷起笑而已臣瓶筲賤器駑蹇輕姿同鼯鼠之五伎不成異飛鴻之六翮兼備遭逢幸會纍叨階級陛下降非常之澤垂不次之恩升之冢司握九流之銓管委以樞近參萬幾之損益傅説作舟之命徒奉針規仲山補衮之談曽微答效致令衡鏡失序紀綱不張官僚日增府庫歲減謬職之謗或譏於畫虎續貂敗官之尤有議於喧盧吠鵲下生朝野之蠧上悖隂陽之和水潦為災慮深於昏墊黎氓失稔憂在於溝壑軫皇情於南面墜國庾於西成虧燮理之則失平分之度推其咎戾實在微臣昔者堯逢阻飢而四嶽咨訪漢遇災異而三公策免舉遺才而求俊乂退不肖而清庶官厥有由來著於古昔臣緝熙莫效尸曠無成以擁腫之凡材抱支離之痼疾久懷致寇之祿猶帶妨官之綬靦目而視不遑自安是用啓處慚惶寢興誡惕思解鵜鶘之服願辭鵷鷺之行庶得保愚公之廬避賢者之路以寧衆口之囂謗以答三靈之譴咎物情朝序誰謂不宜昔干木辭第恆思衛生營平寢瘵不忘憂國當今兵戎未靜費務方多人庶空虛官僚茍且不可不深為防慮妙思政術臣銜恩佩德念咎慚榮雖智效無聞自甘於罷黜而庸短所見猶樂於輸畫劉禹錫代杜司徒謝平章事表臣聞天下安危注意將相處論道具瞻之地當總戎作鎮之權雖叶夢而求無聞秉鉞之寄登壇以拜不兼調鼎之榮授受惟難伊昔猶爾况臣庸瑣何以克堪陛下玄造曲成大明私照俾掌戎律復參廟謨寵光之命在臣已極毫毛之效於國何施謹當罄竭微誠奉遵至教仗天威以懾不順敷聖澤以遂羣生上分旰食之憂下塞素餐之責力誠不足心實念兹已上平章事唐中宗授韋嗣立黃門侍郎制綘衣近侍秩亞貂蟬青瑣崇班職參鴛鷺實神化之有寄信賢才之攸重某忠規奕葉孝緒蟬聨家匡玄燕之朝人輔彤雲之代芝蘭並秀見謝砌之階庭騏驥齊驅有劉山之昆季入光振鷺譽滿三臺出據憑熊聲流十部近者命兹鸞渚已擢雁行才出藝扄奄歸蒿里永言荆樹坐折連枝眷彼恆山空餘一鳥俾遷榮於皂蓋宜襲寵於黃樞陸贄授盧翰劉從一門下中書侍郎平章事制自鸞車載駕薄狩於梁執羈有從我之勤及霤勵匪躬之節交修不逮庶績其凝梁任孝恭為羊侍中讓表摶風扇翮不覺髙升擊水揚鬐遂迷逺大猶願長城巨防射魯仲之書白羽朱旗振武安之几深入五千張空弮以報主橫行十萬勒燕嶺而酬君梁王筠為從兄讓侍中表至如元勳舊儒之胄積德纍仁之基九世七葉之華相韓事漢之資不然則子駿之學洞古今平子之思侔造化仲宣之辨識無滯次重之解經不窮然後可以喻旨公卿問對帷扆陪六尺之輿通四方之意求之微臣此塗頓隔任昉為王思逺讓侍中表行則六尺之內陪接天光語則親璽申命誠信區宇獻可替否出納惟幾敷奏於金華之上進讓於玉堂之下金遷七貴之茂王粲二公之孫雖復仲蔚孤緒元卿末裔未有不階民譽妄承曲私者也唐錢珝代王相公謝加門下侍郎食邑表陛下道惟樂育志在紹聞待河清而先靜化源致俗阜而深探理窟當乙夜縱觀之後啓輔臣夢得之休而遽以平衡授兹弱質頗乖庶政莫逹大經何施作相之才但纍知臣之鑒厭兵而五兵尚在唯恐人殘祈榖而百榖未升仍憂歲旱尋宜待罪己合避賢陛下慎以退人容於竊位兼回睿眷遽正台階進當浴鳯之榮更懼惟鵜之刺李嶠讓鸞臺侍郎表臣志狹量淺業空理踈揆才異言行之科入仕非亷髙之選邀屬時幸纍叨榮級石渠麟閣司典簿之林金門鳯池參廟堂之議以小才而居大任用近智而恢逺略緣鶴之鼎既失於鹽梅濡鵜之衣實慙於紱冕甘待素餐之責忽承非次之恩夫以瑣闥崇嚴玉堂祕近職參持蓋位亞掌壺子雲以善屬文詞始應夕拜李真以妙通經術方陪旦講臣之愚陋實畏友朋豈足以奉帷幄之昌言聨名賢之逸軌且短才不齒未減雙鳬之數豐秩妄加必喪羣龍之績梁元帝黃門侍郎劉孝綽墓志銘蔡墨攸陳有草有茵梁荆世匱或魏或秦積善餘慶時惟俊民孝乎惟孝其德有鄰曰風曰雅文章動神鶴開阮瑀鵬翥楊循身兹惟屈扶搖未申人罔石火山有楸椿佳城無曙寒野方春已上門下省唐韋承慶直中書省詩清切鳯凰池扶踈雞樹枝唯應集鸞鷺何為宿羈雌大造乾坤闢恩深雨露垂昆蚑既含養駑駘亦驅馳木偶翻為用芝泥忽濫窺九思空自勉五字本無施徒喜逢千載何階答二儀螢光向日盡蚊力負山疲禁宇庭除濶間宵鐘箭移暗花臨户發殘月下簾欹白鬢隨身改丹心為主披命將時並泰言與行俱危寄謝登巢客堯年復在斯楊炯和騫右丞省中暮望詩故事間臺閣仙門藹已深舊章窺復道雲幌肅重隂玄律葮灰變青陽斗柄臨年光搖樹色春氣繞蘭心風響髙窗度流痕曲岸侵天明總樞轄人鏡辨衣簮日暮南宫靜瑶華振雅音唐蘇頲授姚崇兼紫微令制聞善若驚欲仁斯至衣冠以為蓍蔡廊廟資其柱石朕之欽者管樂人之傑者蕭張遂能以身許國開物成務邦是用乂朝唯得賢北辰環拱西垣近密俾因題劒之榮式演如絲之命沈詢授裴休中書門下平章事依前判鹽鐵制俾登玉鉉用振金聲早升甲乙首冠賢良諫垣馳讜正之名史氏動直言之筆羽儀著定律吕縉紳仙闈道播於彌綸右掖詞推於潤色爾其允釐庶績俾起訏謨涉大川而示吾津涯馭六馬而遺吾銜策無使阿衡専美於殷家山甫獨稱於周室吳融授王摶中書侍郎同中書門下平章事判户部制朕聞王茂𢎞官在治中已恭佐命謝安石身為相掾常切憂時後果俱秉國鈞克諧人望忠誠懿烈焜耀册書孰謂我朝鍾兹丕運厥有佳士龍興壯圖植徑草於衷腸繫苞桑於宗社特立當代何慙古人將表至公爰申異渥具官王摶霜髙一鶚玉振孤峰孕和煦於情田自華而實道縱橫於義路無往不通藴是淑聲居然上品縶駒場裏早颯清塵振鷺行中難究逸翰踐揚三署橫絶一時實名教之丹青乃縉紳之領袖除韋嗣立鳯閣侍郎平章事制鳯池清切鸞渚便蕃出納兩闈允資一德除唐休璟左庶子同鳯閣鸞臺三品制巨源請老仍參翼贊之榮叔子養德選預國朝之議宜輟五曹之務俾同三令之班宋謝莊讓中書令表伏惟陛下登取震維臨齊璿政澤與風翔恩從雲動臣聞璧門天邃鳯沼神深絲綸王言出納帝命自非望允當時譽宣庠孰未有謬垂曲寵空席兹榮在於平壯猶不可勉况今綿痼百志俱淪唐李嶠為王及善讓內史第二表臣才疏行缺運偶時來榮匪德遷官由恩達法河象嶽升臺歷府行參八命坐陟九霄彤軒皂騶非振鷺之飾青組丹紱是濡鵜之譏施重丘山效微涓滴妨賢自久速謗滋深頃因齒髮之衰得蒙骸骨之賜西河退老非玩經書東海歸間空求藥餌方養支離之疾翻成愷悌之恩曲降絲綸重收簮屨徴榮稿木責熖寒灰將使策蹇磨鉛入總樞祕牽羸引􅉵參典鈞石仰抃恩渥顧探心守桑榆且晏蒲栁先秋方與綘縣老人論其甲子淄川艾耋比其容貌將何以對揚金扆趨奉玉墀當鳯沼之便蕃望龍闈之清切况寅亮皇極經綸帝道功參濟巨義等作霖隆替是因具瞻斯在永言授受豈當容易是用深鑒陳力載懷量己方憂折鼎乞保懸車且今百度惟貞九流式序鵷鴻齊列俊乂在官可使畫虎承羞豐貂竊幸謬中孚之好爵辱大雅之能官伏願深惟至公俯收曲澤矜此疲劣改命才賢則器滿之凶不纍於愚叟棟隆之吉永光於聖代又為王方慶讓鳯閣侍郎表爰回斗極之暉更寵掖垣之授下神畿而入仙禁未變葭灰自鸞渚而遊鳯池僅雕蓂葉荀侯之十旬纍命未可為儔車公之一歲九遷曽無足比又為楊執柔讓同鳯閣鸞臺平章事表夫以衡石萬機鹽梅三鉉參翕闢之玄造輔丹青之景化自非媵莘占渭出昴乘箕安可寅亮帝圖弼諧邦教梁元帝中書令庾肩吾墓志荆山萬重地産卞和之玉隨流千仞水出靈蛇之珠故能胤兹屈景育斯庚朱掌庾命族世濟琳琅遂昌開國蟬聨冠冕父易髙尚其道肥遁貞吉關吏早逢夙表真人之氣少微晚映還彰隱士之星肩吾氣識淹通風神間逸鐘鼓辭林笙簧文苑入為度支尚書任同北斗錫韓稜之劒朝比南宫識鄭崇之履余以其為人也瑚璉之器無慚垂棘杞梓之材有均廊廟故贈散騎常侍蓋旌賢也已上中書省唐任希古和左僕射燕公春日端居述懷詩豐野光三傑媯庭贊五臣綈緗歌美譽絲竹詠芳塵聖厯開環象昌年降甫申髙門非捨築華構豈垂綸鳯邸摶霄翰龍池躍海鱗玉鼎升黃閣金章謁紫宸禮闈通政本文昌總國均調風振薄俗清教敘彛倫星回應緹管日御驚寅賔葉上曽槐變花發小堂春思挂東都冕言訪北山中赫赫容臺上千祀耀平津羅隱投宣武鄭尚書詩漢代簮纓盛梁園雉堞雄物情須重德時論在明公族大踰開魏神髙本降嵩世家唯蹇諤官業即清通翰苑論思外綸闈嘯傲中健毫驚綵鳯髙步出冥鴻履歷雖吾道行藏必聖聰綘霄無繫滯浙水忽西東庾監髙樓月袁郎滿扇風四年將故事兩地有全功去去才須展行行道益隆避權辭憲署仗節出南宫鴈影相承接龍圖共始終自然須作礪不必恨臨戎幕下蓮花盛竿頭㺗佩紅騎兒逢郭伋戰士得文翁人地應無比簞瓢奈屢空因思一枝桂已作斷根蓬往事應歸捷勞歌且責躬殷勤信陵館今日自途窮陳後主授江總尚書令册文夫文昌政本司會化經韋彪謂之樞機李固方之斗極况其五曹斯綜百揆是諧同冢宰之司専臺閣之任惟爾道業栗峻宇量𢎞深勝範清規風流以為凖的儒宗學府衣冠以為領袖故能師長六官具瞻允塞明府八座儀刑載逺其登朝握揆朕所望焉往欽哉懋建爾徽猷亮采我邦國可不慎與唐常衮授李忠臣右僕射制文昌所以法成象端右所以長庶寮秦漢則內掌武事魏晉或外綏戎政備五才之用有百勝之全往者寇孽亂常關洛多故爰奮其旅以先啓行大城名都所麾必克元凶巨猾傳首相望定齊休士有建威之得雋破趙會食亦淮隂之用竒漢東汝南専制千里總三軍之號令兼八使之澄清約己撫人守公遵職訓師以禮載寧於戎閫庀賦從薄繼入於王府四封不聳一紀於兹况忠衛之勳邦家是賴陜郊巡幸憂國存誠能釋位以勤王亦見危而致命疾風逾徑何日忘之申伯于蕃自當褒勸韓侯入覲宜有寵光式是南宫俾崇禮秩又授令狐彰右僕射制有張仲孝友之行有吉甫文武之才秉其直方資以簡厚早擅韜略尤工墨妙艱危致命出入勤王中興之勳羣帥難尚雖驃騎之北至髙闕淮隂之東下井陘積事度長抗衡異代自受任千里強於兩河靖安軍戎肇正封域𢎞布風教宣明憲章優禮意於文吏洽仁化於氓俗息馬論道讓其保塞之勞愛人省刑守我中朝之典蘇頲授劉知柔尚書右丞制蹈典墳之芳潤總詞賦之笙簧慮常密於在公迹自勤於為政萬人登數已聞書版之精六官揆才更俟彈珠之妙齊謝朓為明帝拜録尚書表升降玉階對揚休命六轡在手千里何偕司會天官之統尚書百僚之本𢎞之即庶績惟凝替之則彛倫斯斁修身踐言本慙五美果行育德未階六正妄屬負圖之寄多謝五仁之績操檜楫於龍津荷梓梁於雲構無以輔位明堂遺像麟閣北齊邢子才為文襄皇帝讓尚書令表揚職萬機總任百揆懸衡庶物凖納羣僚何以助日月之光華增天地之髙厚反鑒取照匹此何難倒裳求領方之為易梁沈約拜尚書令到都上表油雲湛露徒降旻昊之德弱縞輕蟬不載丘嶽之重登階望席恍焉失步唐柳宗元為樊左丞讓官表尚書百揆翊亮萬機故天上尊北斗中樞陛下有南宫左轄晉升孔坦諒直當時漢拜楊喬間練故事庶得百僚有禆於會府諸侯取法於京師後漢繁欽尚書針龍作納言帝命惟允山甫翼周實司喉吻赫赫禁臺萬邦所庭無曰我平而慢爾衡無曰我審而怠爾明四嶽阿鯀績用不成虞登八凱五教聿清舉涉其私乃忝服榮正直是與伊道之經先人匪懈永世流聲君子下問敢告侍廷晉摯虞尚書令針明明先王開國承家作制垂憲仰觀列曜俯令百官政用罔僣昔舜納大麓七政以齊內成外平而風雨不迷山甫翼周靡剛靡柔補我衮職闡我王猷王猷允塞而四海咸休雖曰聖明必賴良材無曰我智官不任能發言如絲其出成綸千里之應樞機在身三季道缺天綱縱替既無老成改舊法制法制不循不長厥裔尚在司臺敢告侍衛已上尚書省宋蘇軾賀吕副樞啓近膺告命入總樞機中外聳觀朝廷增重伏惟慶慰竊以古之為國權在用人德厚者輔其才而名益隆望重者無所為而人自服是以淮南叛國先止謀於長孺汾陽元老尚改觀於公權樽爼可以折衝藜藿為之不採哀此風流之莫繼久矣寂寥而無聞李劉賀喬樞密除參政兼知院啓歲大旱而作霖啓沃良資於傅説天未隂而徹土綢繆允賴於周公邦其永孚於休公有無窮之聞又賀薛樞使啓顓席紫樞均茵黃閣仲虺居薛宜登左揆之虛臯陶矢謨還倚右平之重有常立武無競維人合文武以兼資佩安危而注意熙帝載宅百揆民具爾瞻掌邦政統六師君則誰與式端兵本専領使權胸奴欵塞五原固出干羽之舞子房決勝千里正須帷幄之籌帝曰欽哉相尊等耳山有木而工則度姑遜滕侯之先封河如帶而國永存實自薛公之上計又賀俞簽樞啓春秋九世之讐固將必報善人百年之運未有不興今觸蠻交鬬之已深計蚌鷸相持之不久下策莫危於浪戰上兵實貴於伐謀在帝王之萬舉萬全固求耆宿然疆場之一彼一此正欠堅凝幸而及間暇之時亟宜定修攘之計取亂侮亡兼弱也時則易然同寅協恭和衷哉政將焉往鴻鈞既轉於一氣黃麻即似於六經已上樞密院唐李嶠授張昌宗麟臺監制碩學總於丘墳髙才軼於睢渙資淡雅之操無欲無營體撝謙之風不矜不伐每懷五嶽之舉期陟九仙之路雖混濟之量未去朝廷而玄逺之心恆對山水子雲寂寞雅好文詞季長博通堪典經史宜因松柏之性處以蓬萊之山又授王方慶麟臺監修國史制藝閣祕文蓬山奧府是為國重尤切帝難西垣掌誥雖藉謨猷東觀屬詞更資通博宜輟鳯凰之省俾緝麒麟之署常衮授李潓祕書監制傳魯恭之古文稟吳季之知樂寧止於敦族以恩固在於敘賢以位周稱外史晉謂內臺俾領儒官是崇禮秩又除李羣玉校書郎制放懷丘壑吟咏性情孤雲無心浮磬有韻吐妍詞於麗則動清律於風騷冥鴻不歸羽翰自逸霧豹逺迹文彩益竒信不試而逾精能久幽而獨樂念其求志可以言詩用是縶維俾之刋校可守𢎞文館校書郎唐太宗正授顔師古祕書監詔祕府望華史官任重選衆而舉歷代攸難守祕書監顔師古體業淹和器用詳敏學該流略詞兼典麗職司圖書亟經歲序朱紫既辨著述有成宜正名器允兹望實可祕書監晉華嶠謝祕書監表劉向父子世典史籍馬融博通三入東觀非臣庸賤所敢擬迹齊王融拜祕書丞謝表臣聞升離戒晨隂墻不照其景膚雲停夕幽草或漏其津至如明兼就日澤深行雨不有聖德誰或其然所以欽至道而出青臯捨布衣而望朱闕懷祿惟在代耕期榮不謀入用豈悟特擢之例事均延祖置左之恩任光元幹踰溢情涯普燭身表畏翹車而不讓誡濡翼之願辭既聖主謂其可施故愚臣默思自勉梁沈約到著作省表臣藝不博古學謝專家乏懷鉛之志慙夢腸之術聨事乖善握蘭慚良謬勒斷蛇之符預刋氷河之業路遙難騁才弱未勝而神工曲造雕絢彌疊珥筆史觀記言文府趨奉載揚腆懵交顔唐李嶠讓麟臺少監表含香握蘭惟塵於兩鳬之署切問近對匪服於雙鸞之沼西垣載筆五字非工東觀屬詞兩班難嗣惟此挈瓶有同畫餅豈足以比肩良史參領祕文猶陪二子之行尚忝四郎之末網羅帝籍既佇英才出納王言寧容妄處宋真德秀除校書謝丞相啓聖朝重英俊之儲册府萃圖書之富匪特養以資望蓋將充乃見聞使旁搜博覽優遊文史之清庶潛省默觀磨礱器質之美觀作人之有道殆與天之同功故菁莪既盛於一時而豐芑尚遺於數世大者光明魁壘足以翼邦家小者靖重端方可以善風俗深嗟流弊寖異前觀育才之意視以具文庇職其間指為借徑至有深居儒館心别騖於髙華名在書林手弗親於讎校鄙習相仍而莫悟清途沿是以反輕力回此風政在今日念昔脫身於場屋益思鋭意於簡編然家無鄴侯插架之藏徒日發董子下帷之憤今將徜徉東觀凌厲西崑閲河圖寶訓人間希有之珍窺金匱石室歷代不傳之祕刋訂訛謬含咀英華庶幾因文字以窺聖賢之用心夫豈假梯媒以為富貴之張本昔揚雄之居天祿蓋二三世而不徙官而韋述之在集賢亦四十年而後卒業故能發揮大典焜耀方來此前修之所已行而小子之所願學迄成微志有賴洪私何栗賀曾校書啓登天祿之峥嶸遊道山之清切玉杯繁露之異悉考舊聞金馬碧雞之雄盡探竒迹豈惟閲簽軸之祕良以養梁幹之才唐李華著作郎壁記化成天下莫尚乎文文之大司是為國史職在褒貶懲勸區别昏明故駉牧頌於魯侯祈招諷於楚子史官之任有述作焉蓋王者之元符生人之極教也昔沮誦一作諷倉頡為黃帝史臣文字以興其來尚矣若南正北正建於顓頊羲氏和氏命於唐堯更虞夏商代序天地周官宗伯之屬有太史正歲年以序事小史奠系代辨昭穆內史受納訪以詔王聼理外史逹書名於四方前志所載有左史記事或針王之闕或司過於朝所典不同其納君於善一也傳曰天子有日官則史逸史伯疑作史佚史倫是也諸侯有日御則禆竈子韋是也倚相在楚南史在齊董狐在晉邦之司直也其事舉則三靈不慝其政息則百度惟危故先王貴之至於漢庭參用周禮太史公既殁其子遷緘金匱石室之文焉降及東京永平中特詔班固著作東觀繼其事者楊彪蔡雍由是太史但掌天文律厯而已小雅寢周聖人生魯道尊而文武將墜德至而天地不通感於獲麟嘆於與蠟爰制國典丘明傳之因厯象以正時元假鬼神而討有罪善人勸焉淫人懼焉百代之英所由用也向若前代闕能文之史曠記事之官雖舜禹之烈無聞焉有國有家何以直道而行也魏太和年肇以著作名官為中書屬晉元康年改𨽻祕書朝服單衣介幘始親職必選名臣傳歷宋齊梁陳官品第六元魏髙齊周隋秩從五品魏則王沉以侍中兼之衛凱以尚書帶之至於有晉若史材之美陳壽自佐郎遷元舅之尊庾亮以中書領宋則徐爰何承天齊則沈約裴子野梁則陸雲公姚察陳則顧野王張正見後魏則崔光髙允北齊則邢子才魏收周則蘇亮柳蚪隋則虞綽王邵皆一朝名選也唐之建官罔非俊乂若虞永興德函大雅魏侍中才髙王佐鄭吏部絶韻鏘鳴崔司業雄詞飛動皆歷焉名嶽已遷别封天柱舊章不改尚列周官登陟蓬萊之峯循環藏室之奧從容簡貴信君子保明𢎞道之司歟已上祕書省職官部館閣唐白居易授沈傳師左拾遺史館修撰制昔談之書遷能修之彪之史固能終之惟爾先父嘗撰建中實録文質詳略頗得其中爾宜繼前志率前修無忝爾父之官之職薛廷圭授鄭璘盧擇充史館修撰制紀綱専總於丞相筆削分任於名儒非夫望藴司南才膺載筆者不當其選博聞強識繩直氷清四時之和氣襲人一字之褒貶惟正聞見事典周知故實可以著不刋之書論司過之史爾宜詳於注記紀乎言動之非繼彼春秋明乎得失之迹彰善疸惡無忿疾厥心舉直錯枉無上下其手崔嘏授李毗等集賢校理制披書殿讎校之文秉東觀鉛黃之筆必選其雄詞擲地敏學通天者而授之或荆山藴片玉之姿或桂樹擇一枝之秀崔瑶授蕭置充翰林學士制揮翰金門諒屬詞華之妙論思玉署尤資周慎之才文摛錦繡學富縑緗早命中於射宫遂從知於壼奧靜無違心動有餘裕用雖繫於通塞道自保於歲寒崔嘏授裴諗司封郎中依前充職制臺郎望美詞苑地髙粲列宿之輝華參起草之宥密自非風儀玉立器宇川停摛掞天之雄文藴擲地之清韻則不足以膺我妙選為時美談襲慶於門騰芳載席端莊抱吉士之操謹默得賢人之風灼若春華皎如瑞素錢珝授韓偓翰林學士制雖公賞曾光於赤紙而直誠尚記於皂􅌩薛廷圭授李昌逺等充翰林學士制士林擢秀聞爾則百尺無枝筆陳交鋒聞爾則一戰而霸皆伸於知己副我旁求濬柱下之清源無忘啓沃紹雲間之華譽勿鼓喧囂慎繼前修罔言溫樹宋吕祖謙中書舍人除翰林學士誥內外演綸之職獨髙翰苑之清華左右持槖之臣疇若禁林之近密維時盛選屬我洪儒輟從西掖之聨延入北門之直具官某學窮閫奧文冠倫魁增主之明洋洋朝董之對發帝之令渾渾虞夏之書休有德聲最於邇列是用進陟鑾坡之邃深居鈴索之嚴虞侍燕間輔陪遺忘鬯典謨於三代新瞻聼於四方近天子之光允賴謀猷之啓沃見王者之志邇觀詔命之發揮唐權德輿為齊相公讓修國史表伏以褒貶善否裁成義類直辭是繫往哲攸難臣謬踐台司無補皇化每憂覆敗上負聰明豈足以再紆宸慈纍忝榮渥稽前古之彝訓昭聖朝之法誡立言載筆豈易其人量力循涯自知不可又自貞元四年李泌後宰臣遂不兼此職蓋以論著慎重留於聖心自非時謂全才何以逺循故事用此內省以榮為憂况君舉必書時同堯舜之理任人以器顧無遷固之能宋翰苑新書謝除學士表歷考名臣具存故實陸贄於詔書之重每上奏編歐陽雖帖子之微不忘規諫臣何為者心切慕之歐陽修謝宣召入翰林表久叨塵於侍從曽莫著於勞能而自出守外藩近遭家禍茍存餘喘復齒周行風波流落者十年天日再瞻於雙闕進退之際已蕭颯於霜毛慰勞有加賜憐憫於玉色唐王維謝集賢學士表臣抽毫作賦非古詩之流挾策讀書無専經之業伏惟陛下文思超前哲之后書契踰畫卦之君龜圖不能比其詞龍甲不足究其義聞相如在蜀畏不同時徴枚乘於齊惜其已老急賢之旨欲賜追鋒如臣不才豈宜濫吹將何以編次漆簡刋定石經東堂賦詩將招不成之罰北面待詔必無善對之才以榮為憂席寵知懼宋真德秀謝宣召入學士院備顧問表切觀列聖之用人惟待詞臣而加禮蓋於言語文章之外責其論思獻納之忠或雖忤旨而暫間終必棄瑕而復用修除翰苑在環滁出守之餘軾侍禁庭亦赤壁歸來之際加歲月則其文老涉變患則其慮長乃登邃嚴以備顧問如臣者才華弗競戅拙自將掌先皇帝內制者六年每慚越俎逮陛下初元之再命竟許循墻以驅馳州縣之頻且放廢山林之久見聞寖少藝業益荒結茅屋於雲邊已甘終老瞻玉堂於天上若隔前生敢云白首之重來誤辱清衷之親簡蘇軾謝宣召入院狀視草之官自唐為盛雖職親事祕號為北門學士之榮而祿薄地寒至有京兆掾曹之請豈如聖代一振儒風非徒好爵之縻兼享大烹之養玉堂賜篆仰淳化之彌文寶帶重金佩元豐之新渥既厚其禮愈難其人朝論所髙禁林為重非徒翰墨之選乃是將相之儲禮絶同僚嘆裴李於座上功成異域得頗牧於禁中宜有異人來膺此選又謝宣召再入學士院狀使星下燭生蓬蓽之光華天澤旁流失桑榆之枯稿國有用儒之盛士知稽古之榮翰墨之林號稱內相文章之外不取他長至於用人可以觀政文武並用或成頗牧之功邪正雜居至有伾文之患惟貴且近故難其人而况金鑾玉堂親被絲綸之密北扉東閣獨稱年德之髙必有異人以齊衆口而臣本緣衰病出守江湖以一方雕弊之餘當二年水潦之厄戴星而治僅免流離及瓜而還恍如夢寐交親迎勞都邑聚觀驚華髮之半空笑丹心之未折宜投間散以養衰殘豈期過採於虛名復使榮加於舊物王邁賀林直院啓矧當多事屢驚夜響之鈴縧豈比平時卧看日移於磚影慰撫河北則大手筆何慊於德裕調撥關西則凡號令宜付之遜能起詔草若湧泉惟陸相始當於機務發德音於時雨必韋公乃福於生人求如在昔之前修庶可當上之遴選學力與天相融聲名無地可著筆有活法珠走於盤而不出於盤𣲖接古文氷生於水而尤寒於水凡名山大川之偉觀與浮屠老子之靚居皆藻飾以雄詞盡膾炙於衆口帝謂琳琅散落至煩雷霆之取將孰如琬琰編摩要與日星而爭耀乃攽天旨寵畀氷銜吏部二百年之文已歸中禁瀛洲十八士之選皆避一頭夏竦謝直集賢院表竊以承明設待詔之官實漢朝之芳潤麗正啓修書之院乃唐氏之英華濬圖書之淵敞龍鳯之宇自非弓裘繼世章句名家通授羲畀姒之靈篇間書笏珥彤之故事則何以繼成康之美頌考宣武之懿文陪法從於甘泉奉宸遊於屬玉况當聖日允屬簡求如臣者學不傳經文非近史青青子佩雖見刺於勞心翹翹錯薪亦濫期於刈楚遂殺青而奏技果出綍以推恩禁林俾試於雕蟲書殿遽令於抱槧閲上帝之册府目眩星辰登道家之蓬山足踐雲氣奉長者之餘論與先生而並行分直石渠地接嚴更之守縱觀金匱門連著作之廷載惟螻蟻之軀莫報乾坤之賜趙闕賀集賢楊修撰啓平津第一諒博極於天人江夏無雙且恣觀於圖史顧亨途之伊始實輿議之攸歸矧瀛洲列仙之殊庭羣玉上帝之册府昔者金泥石檢嘗草東觀之儀縹帙藝籖重定開元之目今天孫候翠華之幸屋壁藏科斗之書必將講故事於乾封聿修盛禮訪遺編於汲冢大備闕文秦觀謝館職啓文章末技固非道義之尊箕斗虛名祗取謗傷之速亟從引避幾至顛躋褒未就於衮華惡已成於瘡痏三期之內王尊乍佞而乍賢七年之中魯田一與而一奪伏遇某官道欲濟時仁能錫類始憐貧女稍分秦壁之光終念波臣為激越江之水矧兹竒蹇亦與甄收敢不以古人行己之方為國士報君之義千金弊帚聊依翰墨以自娛一割鉛刀或兾事功之可立宋洪邁賀黃左史啓黑白既分丹青自炳聖朝舉無缺事可少緩於針規人主蔑有戲言正欲明於記注進躋左墄密侍前旒移疇昔皂囊剴切之誠示此日青史簡嚴之筆侍玉皇之香案共欽稽古之榮築宰相之沙隄佇究濟時之業翟公巽謝試中館職啓奉對西清凛天顔之咫尺策名東觀近雲漢之昭回顧影自慚無顔以寄惟石渠天祿之府祕金匱玉板之藏翰林墨客之文章河圖洛書之典訓怪如齊諧之所志微至稗官之所收極備至於方言其流及於瑣語煨燼竹簡發羽陵汲冢之編科斗漆書讐魯壁淹中之蠧蓋古人禮求諸野而史官學在四夷僅有典刑誰云古昔仲尼之悼借馬猶及闕文夏禹之尚遺聲以存追蠡自非網羅百氏之學貫穿千載之文約六藝以成章洞九流之領略孰能刪除繁穢放輯舊聞得商頌十二篇考次逸詩之缺取武成二三策緒正古書之遺至於曉幼婦之微文釋四蟲之訓纂討論疑識辨岐周栒鼎之銘義證古文迹東漢顯陵之策唯時遴選益歎才難建章鳯闕望帝極之太微策府玉山應星躔之東壁乃眷蓬山世唯舊物慨流波之未逺創風樹之纒悲再命及躬相望踵武惟先人嘗掌斯事獲繼前修卒父業復總羣書敢期故實永言陟岵之感終廢蓼莪之篇然以碩儒之熟訓詁而誤爾雅之蟛蜞大夫之識具敖而名先君之獻武况乎淺陋無乃滋疑庶幾農馬之専可與蟲魚之注述陶唐至於麟止安所發明頌聖主之得賢臣或能論著播芳大全賀劉內翰啓功既成於授鉞命爰錫於賜環不逺千里而見王果以一言而悟主精神夙契眷注益深北門正內相之除南部領天官之長玉堂揮翰日觀雲漢之昭回金殿掣鈴時近天威之咫尺為命雖資於潤色矢謨實賴於弼諧豈止發為文章號禁中之頗牧要當諫本仁義措天下於唐虞佇聞綸綍之攽即正鈞衡之拜楊萬里賀章侍郎兼侍讀啓衆徯九遷而未快自乞一麾而遽行王尊之乍佞乍賢何有於我子文之無喜無愠一聼之天公論以久而自明德望因退而愈重宋陳耆卿賀真右史啓楓宸渙號柱史升華峻直北扉矯矯麻頭之健筆摛毫右陛英英簡上之清風疊組孔嘉垂紳丕聳切以唐虞雖逺都俞具載於典謨班馬不生筆削允資於記注折旋螭首咫尺龍顔必有襲六為七之功足載登三咸五之治賈生通逹氣少和平仲舒淵源言多迂濶惟我公之謦咳中有國之膏肓以此猷為必能衮鉞發揮神聖有公是公非之權判白姦回無乍賢乍佞之惑直聲九鼎正氣千尋元袁桷謝閻學士啓王言之制曰七史官之長有三風動四方必訓詞之溫雅詔垂萬世在書法之簡嚴維班馬之良不能繼獲麟之筆而燕許之體難以推倚馬之才藝不兩能物無全美筆則筆削則削非曲學之可為見所見聞所聞恐直情而難致古有斗米而作傳近多千金以致詞好惡成一己之私褒貶失當時之實掩長卷以竊歎抱遺經而自娛故魏收以輕薄寡才咸稱穢史王通雖隱淪不仕獨著元經方今偉績無前太平有象大禮略封禪之紀純誠汰郊丘之儀聲教萬邦文質二代追皇猷創業之永傳丕基嗣服之初必屬鴻文以揚駿德彰施作繪極妙巧於羣工雜比成音合天和於衆耳拔犀之選非易聚毛之長亦難唐顧雲謝下第後使人存問啓優遊仙苑泛泳天潢覆錦髙眠八花磚而讓寵含香視草五色筆以慙神薛逢上翰林韋學士啓優遊仙署偃息禁闈筆灑王猷硯涵天澤成霖而雨露非逺吐氣而虹霓坐舒已上翰林學士王建上裴舍人度詩小松窗對鳯池開履迹衣香逼上台天意皆從彩毫出宸心盡向紫煙來非時玉案呈宣旨每日金階賜對回仙侣何因記名姓縣丞頭白走塵埃皇甫曾奉寄中書王舍人詩腰金載筆謁承明至道安禪得此生西掖幾年綸綍貴東山遙夜薜蘿情風傳漏刻星河曙月上梧桐雨露清聖主好文誰為薦閉門空賦子虛成溫庭筠投翰林蕭舍人詩人間鴛鷺杳難從猶恨金扉直幾重萬象曉歸仁壽鏡百花春滿景陽鐘紫微芒動詞初出紅蠟香殘詔未封每過朱門愛庭樹一枝何日許從容蘇頲授崔琳紫微舍人制宜遷振鷺之行用集栖雞之地王丘授裴敦復中書舍人制或學辨文鼠核綜兼於隱賾或詞握靈蛇光輝映於等夷崔嘏授裴諗中書舍人制自擢居內署掌兹制命謹密無曠馨香有聞問對備見其一心敏捷共推其七步况臧孫有後且聞得鳯之音枚乘多才雅蓄雕龍之妙爰因滿歲授以正名劉崇望授翰林學士鄭延昌兼中書舍人制以爾彯纓著稱夢筆為文富以美才披其禁闥典由中之詔成布下之言方謂得人雅當入侍蓋聞羊祜謀議是草皆焚周仁重厚其言不泄親近之地慎密為先爾既不能何爽居外西省亦吾教誥之地戒之可矣李嶠授太子舍人劉如玉等右史制並言芳蘭芷行溫圭璧或譽美銅樓或名髙石室記言之重選衆尤難宜收博辨之才俾居良史之任蘇頲授崔銑起居舍人制識逺心明懷才藴藝缺碑盡記亡篋不遺崔嘏授崔瑶等起居郎制載筆赤墀之下掌禮曲臺之中注記行而鉛槧是資褒貶當而縉紳知懼顧兹所職豈易其人宋蘇軾謝中書舍人表右史記言己塵髙選西垣視草復玷近班皆儒者之至榮豈平生之所望詞命之職古今所難非獨取之於文蓋將試之以事至於機務亦或與聞雖四户擅權非當時之公議而五花判事亦前代之美談及夫三字之除乃是一切之政但謂內朝之法從安知宰相之屬官既任止於訓詞故權移於胥吏恬不知怪習為故常先皇帝道冠百王法垂萬世建六官而修故事闢三省以待異人典章一新名實皆正遂申明於四禁俾分領於六曹逺則追直閣之司近則通檢正之任雖未聞政而聞事蓋須有德而有言如臣之愚無一而可草創潤色既非鄭國之材除書德音又乏唐人之譽忽當此選莫測其由將聖與仁能哲而惠雖在三年不言之際已有十日並照之光而臣日侍邇英親聞訪道仰天威之甚近知聖鑒之難逃謂臣嘗受先帝之知實無左右之助棄瑕往昔責效將來臣敢不益厲素心無忘舊學上體周公煩悉之誥助成漢家忠厚之文茍無曠官其敢言報曾鞏謝除中書舍人表甫上程篇遽塵寵仕載惟遭遇倍集兢慙蓋聖君難諭之情將欲施於號令得當世能言之士然後逹於文辭矧今綱理四方彌綸庶政肇維新之王度備久簡之官儀計謀常越於拘攣注措舉為於希濶豈伊凡庶可測髙深方當覺悟邇遐使遍知於上意訓齊內外用丕變於羣心尤資演暢之才曲盡丁寧之旨布為邦典兹謂人文顧在臣愚豈堪此選敷導訓辭懼空踈之難強追參諷議憂膚淺之易窮於風波流落之餘以蒲栁衰殘之質自循涯分曷副恩榮雖日月之光何加於潤色而天地之德無待於論思然臣素堅好古之誠粗識愛君之義既抗顔以就列敢恕己以懷私謹當尋繹舊聞用闡揚於命令激昂懦志庶補助於謀猷李劉賀鍾侍郎除左兼中書及侍講啓恭惟某官目營四海胸著千年關百姓於寸心不夷不惠而願孔子之學掃千軍以獨筆非韓非孟而成歐陽之文雲雷十載之經綸江漢六年之方泳怒鵬既擊凡馬皆空蛻骨地仙直上蓬萊瀛洲之島彯纓天策偏儀承明金馬之庭堯醲舜醺最宜為誥班香宋豔安敢比材非道不陳於前在庭無出其右日獻月納亦有嘉謀年除嵗遷士無異論四輔既備命史佚以記言五禮有庸咨伯夷而降典露門重席星户鳴珂緝熙有賴於仔肩左右宜咨於汝翼掌六典之二更追裴馬之蹤遂萬物之宜即接夔龍之武已上中書舍人唐崔嘏授裴諗知制誥制生而有文弱不好弄中藴明敏外涵清和藹乎君子之風蔚有賢人之操自擢升翰苑入侍禁闈動必知機靜而適道大玉之韻清越以長小山之姿貞芳自茂是用資其粉澤演我絲綸斧藻方耀於鳯銜揮灑更期於鴻筆常衮授庾凖楊炎知制誥制詔令之重潤色攸難其文流則失正其詞質則不麗固宜酌風雅之變參漢魏之作發揮綸音其在兹乎常衮謝知制誥表五字非工四年待罪禁垣之右朝奉如綸宸扆之前夜參視草以地尤密惟才必精在臣無堪忝迹斯甚食浮之議所責何逃翺翔雲霄沐浴雨露宋歐陽修謝知制誥表伏以王者尊居萬民之上而誠意能與下通奄有四海之大而惠澤得以遍及者豈惟號令誥詔發揮而已哉然其為言也質而不文則不足以行逺而昭聖謀麗而不典則不足以示後而為世法居是職者古難其人乃以愚臣而當此選伏惟皇帝陛下茂仁聖之姿荷祖宗之業日謹一日曾未少懈而自羌戎負固邊鄙用師勤儉率先於聖躬焦勞常見於玉色雖有憂民之志而億姓未蘇雖有欲治之心而羣臣未副故每進一善則未嘗不欲勸天下之能每官一賢則未始不欲盡人材之用雖以爵祿而砥礪尚須訓誡之丁寧尤假能言以諭至意可稱是者不又艱歟伏念臣雖以儒術進身本無辭藝可取徒值向者時文之弊偶能獨守好古之勤志欲去於雕華文反成於朴鄙本懼不適當世之用敢期自結聖主之知陛下奬之特深用之太過此臣所以懇讓三四至於辭窮而天意不回寵命難止尚慮頑然之未諭更加使者以臨門恩出非常理難屢瀆及俯而受命伏讀訓辭則有必能復古之言然後益知所責之重夙夜惶惑未知所措伏以文字之職厠於侍從之班在於周行是為超擢不徒揮翰以為效自當死節以報恩惟所使之期於盡瘁已上知制誥歐陽修謝復龍圖閣直學表再念臣稟生孤拙本乏藝能徒因學古之勤粗識事君之節茍臨危效命尚當不顧以奮身况為善無傷何憚竭忠而報國陸遊賀台州曾直閣啓歷考平生追配古人而奚愧中更俗吏益知儒者之有功比由直館之宴間起奉中臺之委寄翔而後集泛然敢辭子房避三萬户之封曼容至六百石而去當寧為之太息舉朝仰其髙風楊億賀刁祕閣啓羣玉之府圖籍攸歸承明之廬俊賢所聚自非兼該文史洞逹天人擅博物之稱負多聞之益則何以掌蘭臺之祕記辨魯壁之古文克分豕亥之非榮對鬼神之問允資鴻博式副選掄職官部宫僚唐蘇頲授唐休璟太子少師制私第懸車耆年益壯公門軾馬朔見逾聞求舊所期懷賢是切諭於三善况待正人營於百工孰過元老宜紆几杖俾作鹽梅白居易授嚴綬可太子少傅制東朝保傅歷代尊崇漢擇名儒任先疏廣晉求耆德選在山濤實資六傅之賢用𢎞三善之道蘇頲授韋嗣立太子賔客制鑒測毫端詞詮象外昆弟承一經之業登相者代不乏人閨門有萬石之風立言者士是則效疇咨滿於故事潤色敷於令典屬以疾辭用體張良之志資於德舉宜從綺季之遊孫逖授賀知章等太子賔客制衣冠耆舊詞學宗師或恬淡風流獨擅東南之美或清貞介特是稱江漢之英負當朝之令名有錫類之純行頓令教導久侍藩維善利則多寵章宜及方之四老用列賔友之班綜彼三墳俾在圖書之府常衮授嗣吳王祇太子賔客制文昭之慶蔚於公族楚元之後繼有忠賢李嶠授王方慶左庶子制升降銅樓輔弼玉裕必求時望以隆國本體溫恭之性造次不違守亷退之風終始若一實舊德之明允見通人之老成昔張良以三傑之才始傅儲右史丹資八舍之重方護春宫簡賢任能抑有前事宜膺九德之選用光三善之才蘇頲授韋杭太子左庶子制可以發揮夏籥光踐春華宜從綺季之遊益重王商之拜李嶠授于復業太子中允制銅樓俟俊銀榜翹賢漢水觀風且輟彤襜之務瑶山聼樂宜煦黃離之景又授相王男成器太子左贊善大夫制育彩桂山承規椒掖韶容霞舉美志月將望苑翹才瑶山佇俊宜參多士之選俾從正人之列又授吳升太子左贊善大夫制悟理明逹用心微妙博以才藝精於談吐西園月上亟聞飛蓋之篇東陸春歸宜聼鳴笳之響又授竇元泰太子洗馬制觀津之榮纍稱外戚伏波之訓方裕後昆可勸導宗黨儀刑門族俾登洗馬之秩罔忝濯龍之戒又授栁沖兼溫王師制族茂汾鼎價珍垂璧雅負通才備聞遺訓探六經之奧如叩鴻鐘窮百氏之源若披明鏡扶輿切問侍從增榮擁篲崇儒師資佇德薛廷圭授太子賔客王牘等諸王傅制明君臣父子之道知禮樂詩書之源可使髙步承華入參望苑琢磨羽翼朕有兾焉或授正卿或加峻級宜旌優異往傅童蒙邪蒿鮑魚勿俾登爼胄筵講肆為惜分隂使其知東平為善之規喜王褒洞簫之賦承萬代之業固磐石之基斯賴於老成人也元稹授郭皎冀王府咨議制材任爪牙姻連肺腑領轅門之右廣假桂苑之元僚夙著威名嘗頒勇爵元戎啓狀慶澤覃恩宜輟豹韜之雄以資鴈沼之畫蘇頲授崔子源岐王府長史制地緒清茂風襟亮拔有如繩之直懷匪石之心學不為人文能飾吏憲曹白簡秋隼曽飛禮闥青縑晨鳬就列又授王守亷申王府長史制俾玳筵之茂寵參碣館之元寮元稹授薛昌族等王府長史制河山在念肯忘奬勞藩邸求才實思髙選昔阮孚以嘯咏自樂龎秀有忠烈可佳更任王宫咸稱國器今之榮授其在兹乎宋播芳大全吏部侍郎兼太子詹事制太子乃天下之本而賢者為邦家之基思得直諒多聞以為益友庶幾左右前後罔非正人故兹一時端尹之臣率用兩朝髦俊之選齊孔稚圭讓詹事表太子霞鶱青殿日晃春宫駕紫谷之英振洛笙之響自非器上白雲韻同明月何以延芳芝苑插羽瓊條竇嬰戚貴於西京陸曄風素於東國伊人之美方曰可舉臣亦何斯而敢忝冒也陳江總謝宫為製讓詹事表如攀珠樹徒仰照匣之輝若踐玉田不知照廡之價芙蓉之水亟奉北園迷迭之文屬陪南館久降噓枯之旨許賜凌雲之筆清夜宴斯謂言善戲黃金然諾並遂殊寵年齊柏寢豈報恩榮紙罄蘭臺未書悚戴宋汪藻謝除太子賔客表儲闈肇啓當收卓異之才詔綍中頒首玷髙華之秩既預論思之祕仍參調護之榮承命便蕃撫躬局蹐伏以三王之教世子必用正人兩漢之詔宫僚無非碩學矧在賔筵之列尤為儒者之光方朝廷新曠古之儀俾世嫡正前星之位養德兹始求賢實艱尚虛六傅之聯先遴十人之選如臣膚淺非國俊髦司典謨訓誥之文猶孤眷倚豈父子君臣之道能有建明弗獲固辭終慙非據敢不益懋嘉猷誓堅晚節密為羽翼當如園綺之賢徒事文詞敢效應劉之陋又除詹事謝宫啓庇身修德濫迹端形陳蘿故葛攀附不涯解角蛻鱗超踰非次方辭璽會覬收渥澤梁簡文帝庶子王規墓志銘玉挺藍田珠潤隨水價重連城聲同垂棘偶應龍之籥影等威鳯之羽儀名理超於荀王博洽侔於終賈稍遷侍中佩玉璽於文昌珥金貂於武帳文雅與綺縠相宣逸氣並雲霞俱逺副君取敬杜夷時回晉儲之駕追嗟徐幹亦降魏二之書爰發睿辭為銘云爾七略百家三藏九部成誦於心談天其口勝氣無儔髙塵誰偶榮圭掩采靈劔摧鋒宋郊淪鼎洛水沉鐘玄扉不晝幽夜恆冬職官部六官唐白居易授鄭絪吏部尚書制昔魏用崔琰毛玠典吏曹一時之士以亷節自勵國朝宋璟李義掌選部亦能遏絶謁託振張紀綱官無古今得人則理吾言及此欲爾繼之錢珝授劉崇望吏部尚書制來整軒裳再提衡鏡山公密啓更廣規模楚客騷離休勞諷諭蘇頲授盧藏用檢校吏部侍郎制風塵之外獨秀瑶林清白之中常懸氷鏡自四年掌誥九品作程峻而不離重輕咸當簡而能要浮競斯逺刀尺之委銓衡已歸特選周才更符僉望常衮授楊綰吏部侍郎制三揖而進能守謙光一命而僂不忘恭敬當勵濯纓之操不遺刈楚之才孫逖授陸景融吏部侍郎制恬淡之性足以抑退浮華徽明之識足以激揚淹滯類能而使僉議允屬俾澄清於九流期風俗之一變崔嘏授韋博等司勳郎中制頃以邊城命將肇建麾幢當警塵未息之時及烽火向明之日故於粉署妙選星郎欲以贊充國屯田之謀佐武賢備戎之術既而賔筵有耀幕畫已多荐居於沙漠之中茇舍於戎旌之下亦既勞績亟更歲寒念其裹革之誠更復握蘭之美又授馮韜等司封員外郎制分列宿之位應覆被之榮入可以封還詔書出可以分領符竹優遊於粉署之內談笑於錦帳之前茍非清才不在斯選以韜文章炳煥獨步詞科以同靖門胄光華深通聖典荆玉韜含章之美霜鐘蓄待扣之音是用升彼名曹擢於藝閣蘇頲授裴耀卿檢校考功員外郎制士行純密文詞典麗時人許其清秀職事推其綜核惟才是舉方憑止水之明在位斯聞佇考觀光之彥梁沈約為褚炫讓吏部尚書表竊惟玄素未辨必謬朱紫之察規矩或昧理喪方圓之功東西兩漢左雄孤絶於前南北二晉山濤莫嗣於後良由性藏於貌才隱乎心楚越無以况其迥殊山川未足方其險阻雖復拂暗為明勉愚生智亦何以登竒拔異離渭分涇張纘讓吏部尚書表漢革民曹魏仍東掾毛孝先以清公見美盧子加以貞固任職降及晉代希覩其人樂彥輔雍容自守當時恨其寡譽山巨源意存賞拔不免與世浮沈鄧攸牧馬家庭何益止競之操卞壼如含瓦石未聞檢裁之功王筠為第六叔讓重除吏部尚書表臣聞剸犀截鴈必俟昆吾之鋒逐日追風信資伯樂之駿未有驂駕蹇足而方騁遙塗採藝鉛刀而求其斷割伏惟則哲為體事艱歷代明别攸寄義重前王必使玉石薰蕕區别靡雜涇渭玄黃條流不爽自非伯豪之天下稱能仲子之時人歸德孝先之拔真抑偽巨源之黜惡舉善然後可以銓鏡流品平均衡石王僧孺讓吏部郎表臣生輕飛籜品細疏壤寂寞州閭取淪窐竇不自求於善管寧許人以能官從班隨牒自安疏逺豈望翰飛終知迹滯一逢浸漉幾聞昭晉假拙為心變竒成偶寧為天覆地長復與雨露相滋秋成春發必如暄寒無爽自變泥塗多超嵩鄧屢考固其北越在纍誠於可聞方愧朱紫永懵鈞衡固惟許李終非王畢取其清尚罔所經企求之碎密寧可庶幾唐李嶠為李景湛讓天官尚書表鏘金鳴玉坐榮枯朽擊水摶風顧慙腹背自忝司衡鏡亟積一作易星灰雖智力已窮而清通未效朱紫多紊涇渭莫辨宜其抵罪觸網稍清官謗翻乃假寵增服更垂天奬是用荷恩內訟以榮為憂且夫八座位隆五曹望重典南宫之喉舌象北斗之樞機式資藻鑑奚綜賔實自非孝先亮直彥輔公忠山濤之簡靜篤素顧談之心精體密何以對楊天哲厭塞人望獨孤及吏部郎中廳壁記楚金百鍊顔集作旋弓六鈞已上吏部唐中宗授李承嘉户部尚書制門下紫極八座非德勿居丹屏六曹惟賢是擇金紫光祿大夫李承嘉靈襟峻嶷識宇嚴明早聞道德之名夙有大臣之望雄才逐日共騏驥而齊驅迅翼搏風與鵷鴻而並翥柏臺憲府髙膺弄印之榮芝甸神州獨著題輿之任堅同白玉直若朱繩臺閣生風權豪氣懾洪才可重茂秩須崇宜加曳履之班式奬從橋之對蘇頲授畢構户部尚書制器無不綜含清明以見微言有可觀負忠讜以居直百郡仰其成績三臺推其故事頃者任殷河尹聲滿洛師姦豪懼秋霜之威孤老懷冬日之愛故可辨於五物書以萬人誰其釐之俾爾作則孫逖授裴寬户部尚書制蹇諤之用纍鷙鳥而莫當操割之能斷犀革而何有亟登臺閣嘗擁旌旄禮樂為從政之文德刑是戢兵之武雖地卿所掌實佇通才而天憲惟艱尚資兼領李虞中授學士王源中户部侍郎制天籟無器大球不磨範圍可以程縉紳刀尺可以制度量自拔於郎署置諸中禁嘗因進見敷奏以言揖黃憲而鄙吝不生覩汲黯而風神自整元稹授髙允恭户部郎中判度支案制大比生齒之書仍掌圻毫之牘戎車方駕物力未豐剖滯應期斯任不細劉禹錫授闕倉部郎中制周制倉人以辨於邦用廪人以待乎匪頒後代或均輸或平糴皆周官倉廪之職也於戲王者藏於天下吾何私焉收斂以時儲蓄必謹俾夫凶荒無患貧富克均宜詠京坻之詩勿守豆區之限唐李嶠讓地官尚書表臣少無竒志長乏異能短步非疾於驊騮翾飛自同於燕雀逢聖神之再造屬天地之兼容鄭璞齊竽竊混聲價秦冠漢綬叨踐名級步鴛池之清切陟鸞渚之便蕃出入五臺周旋三閣行膺負璽之任遂服専車之寵萬機損益蔽於庸陋之心百揆謨猷滯於膏肓之疾爰發皇揆特留宸眷假優間之秩雖入杏壇參翊亮之謀尚和梅鼎徒延舟楫之舉竟微股肱之效挈瓶之智患在於空虛瞰室之災懼深於盈滿方陳骸骨之情遽荷雲霄之命負乘之責前謗未除忝越之譏後恩仍及還振蜉蝣之羽欲參龍鳯之行赤紱妨賢物知不可素食得位臣亦胡顔况八座樞機五曹要劇上儀七星之象旁理萬邦之教自非元凱之明允忠肅陳韓之敦朴淳深將何以釐正版圖擾安邦國臣之淺狹誠則貪叨朝有典章敢叨非望伏乞回乾坤之曲澤收雨露之殊私廣訪訏謨詳求棫朴更引食場之彥俾臨均土之司則受任得才無愆振鷺之美官方有序不失貫魚之次已上户部鄭處誨授鄭薰禮部侍郎制總百郡之俊造考五禮之異同必求上才以允僉屬髙陽茂族通德盛門秉莊氏之風規藴名卿之器業文諧騷雅鼓吹前言譽洽縉紳領袖時輩操守必修其謙柄進退常踐於德藩疊中詞科亟升清貫持橐列金章之侍揮毫擅紫闥之工二職冬官克揚休問是用俾司貢籍以振儒風朕以化天下者莫尚於人文序多士者以備乎時選育材之本惟善是從搴拔既尚於幽貞聳勸勿遺於曹緒無求冠玉無採雕蟲當思取實之方必有酌中之道劉禹錫授闕主客郎中制漢制尚書郎四人一人主營部成帝又署客曹主外國戎狄事皆今主客之任也其後或東西列職左右分名統彼行人之家綏其外臣之務朝聘則定位宴會則辨儀穆我四門深於九譯用委藁街之政克資粉署之賢薛廷圭授徐彥樞禮部員外郎制淡以立身謙而履道情田萬頃瑶林將玉樹森羅文律九成調露與承雲交奏動必由禮人無間言克承德行之規不染脂膏之態常衮授張謂禮部侍郎制二宗伯之掌禮典諸侯之貢士白居易授韋貫之禮部侍郎制可使典禮以和神人可使考文以第俊秀李嶠為司禮武卿讓官表但禮秩一作宗之職歷選所難茍非得賢於何求化西京置一十二列首貫金吾東漢有三十九人多遷玉鉉妙擇時望將以洽神祗博採列侯所以重宗廟桓榮之經學始展今恩孫通之禮儀方膺此命在臣無取逺謝古人將何以載玄冕之七旒驅素一作赤車之十乘李嶠為定王謙兼知司禮寺事表臣本無操履素乏藝能憑藉葭莩遂叨冕笏畫龍刻鵠非有天才簮犀紐龜但因地勢鑒空虛微眇之質驗庸暗不逮之姿素簡神衷豈勞銓敘幸得攀光日月藉寵侯王祿比萬鍾爵窮五等備梁園之車服司周室之典經朝夕起居出入陪奉在生多幸於臣已足豈可重叨非據更竊隆班上虧國章下速身謗昔漢疇稷嗣將冠九卿虞升伯夷實掌三禮奉蒸嘗祈祀之典有匏土笙鏞之節匪徒移風易俗兼且尊事神祗豈於凡庸所可參議宋陸遊賀禮部鄭侍郎啓恭惟某官好是正直擇乎中庸大册髙文固已寫之琬琰崇言谹議皆可質於鬼神殆將與日月而爭光奚止當雷霆而獨立惟上聖克勤於聰鑑察羣臣各盡於才能謂其代豫言既久煩於鴻碩求能典朕禮宜無易於老成况以南省之要司仍寓西垣之舊直惟時異數實冠清途然而文關國之盛衰官以人而輕重籲俊尊上帝豈止在玉帛鐘鼓之間斂福錫庶民其必有典謨訓誥之盛視古無愧非公而誰所冀復如三代禮樂大備之時抑亦追還兩漢文辭爾雅之體顧雖老矣尚及見之唐張鷟禮部判典朕三禮大舜委於伯夷分敕六卿成王任於彤伯建兹歲首實曰春官敦敘九族之親欽若五常之教祀天郊地之典舉其宏綱朝日夕月之儀撮其機要蘇頲贈禮部尚書褚公神道碑化益淳儒益信則郊廟有典賔軍有容發揮牲玉斟酌犧象必咨焉度焉已上禮部蘇頲授張仁願兵部尚書制有將相之才樹忠公之績入稱三傑帷幄所以運籌出總六師塞垣由其卧鼓懸利器而御物自中於桑林推素心以得士更成於李徑故能居室而應在邦必聞洎養疾歸休辭榮及禮用旌渭濵之兆空想潁陽之問乞言繄賴寵德攸宜佇增題劔之榮更遂揮金之樂錢翊授陸扆兵部尚書制執政雖新犯顔巳急我則有違蹇叔爾詎不如王陵剖竹遂行伏蒲未足還好爵而來惟辨色掩間門而退乃韜光蔣廷圭授劉崇望兵部尚書制云罷鈞軸亟移光隂室既生白舟惟任觸浩然正氣充塞乎天地之間卓爾神光瑩徹乎星辰之表琴樽遂性名教檢身孫逖授張均兵部侍郎制修身自逹擅鴻陸之羽儀涖事無難有龍泉之斷割賈至授趙良弼司庫員外郎制元戎起行師出以律將謀韓厥之職宜選子方之智俾登仙署仍佐中權李嶠為歐陽通讓夏官尚書表臣識量凡淺志業空廢之刀筆之吏能無爼豆之經術徒以積勞為忝久宦成資承日月之末光霑雨露之𢎞貸丈二之組每慙於假竊尺一之制更奬於庸微俯仰慙惶屏營反側夫以天臺峻密帝猷殷曠端揆隆於八座樞衡總於萬機非夫賢才孰能綜理况周官司馬有甲兵之職漢服珥貂兼喉舌之任歷觀前載此選尤難安可以樗櫟散才瓶筲小器比德陳劔差蹤鄭履豈無慚於謬寵實有懼於妨官已上兵部蘇頲授李乂刑部尚書制恆碣之寶衣冠之華業總四科才抱九德為邦理要洞入精微當代詞雄居成凖的忠義得在公之體清修稟行己之用紫泥掌誥雖密王言黃沙定罪是懸人命眷兹欽恤尤賴簡孚孫逖授裴敦復刑部尚書制誠無不通爼豆兼於軍旅行有餘力文學資於政事頃者巡撫江徼肅清姦宄太叔之謀既能止盜穰苴之法亦在安人功實簡心賞宜超等委之刑柄俾踐白雲之司錫以身章更增金印之秩陳子昂為司刑袁卿讓官表臣聞王者敬懼愆在典刑天下取平允兹廷尉茍非其人法不虛行伏見某官某乙弱冠登仕早有能名每以清白洗心不為寒溫變節誠使榮加天寵職察雲司必能利用文明哀矜庶獄弼成五教無謝於堯臣載光三典允諧於周議宋播芳大全除刑部尚書謝表班固志刑法兼存兵甲之繕修臯陶作士師曰惟寇賊之姦宄蓋二者相為表裏而四夷正賴鞭笞乃咨分閫之臣與聞司臬之事繄此責則重矣非其人而謂何唐張鷟判國之二柄在德與刑邦之三典惟清與慎大舜有欽恤之言穆王有哀矜之教爽鳩之為司寇矜在澤人臯陶之作士師明於政理李洞感知上刑部鄭侍郎詩寄掩白雲司蜀都髙卧時鄰僧點寒燭宿鳥動秋池帝誦嘉蓮表人吟寶劍詩石渠流月斷畫角截江吹間出黃金勒前飛白鷺鷥公心外國説重望兩朝持淨蘚斜圭影孤窗響錫枝興幽松雪見心苦硯冰知緣文蟲聲切過門馬足遲漏殘終卷讀日下大名垂平磧容雕上仙山許狖窺數聨金口出死免愧丘為周庾信余綿永神道碑三度有星名天獄八卦有坎象刑書公繁不秋荼嚴無夏日民知約法未肯以獄吏為尊吏職刑名無敢以死灰相懼已上刑部唐中宗授張錫工部尚書制白虹良寶紫電雄鋒家傳鵲印之祥世襲貂冠之緒文遒吐鳯思縟騰蛟質映南金材逾東箭自提綱左轄立帷中臺奏郭奕而無慙射崔洪而不愧紫樞佇俊彤管須賢宜升賜劍之榮式表委珠之潔蘇頲授劉知柔工部尚書制司空之職以平水土常伯之任尤重臺閣文詞有綺繢之工望實有圭璋之譽出膺賢守則郡國循良入位名臣則衣冠凖的可謂朝之明哲代之純懿俾遷榮於北斗宜作範於南宫元稹授羅讓工部員外郎制昔陶𢎞景一代髙人始願四十為尚書而猶不遂國朝選署尤用其良以爾讓敏而好學直而能溫甲乙亟登班資歷踐頃將軍辟士權資孫楚之坐籌今會府掄材復奬馬宫之射䇿無忘辨護以宣程品日省月試用勸百工蘇頲授王琪水部員外郎制奕代儒雅門傳教義風襟育粹詞韻含清雖職尚安卑而才方致逺連枝席寵爰映於棣華起草升榮俾光於蘭握黃疇若賀工部劉尚書啓恩綸拜寵起部升華帝曰疇若垂哉擢典汝工之職漢廷誰如卿者遂升常伯之班朝登偉人士載嘉頌恭惟某官天球不琢王井無波學有淵源倒彭蠡三江之勢事無盤錯倚豐城雙劍之鋒早登名躔休有華問處憲府抨彈之地得勉益尊立延英諫議之班如尊乃勇懋展經綸之業見謂通明之才信湖山之炳靈有槐鼎之相繼爰膺眷命申畀彞章出納居喉舌之司拔巧陋元成之世聖人作百工之事政少藉於研思文昌峻八座之躔行即參於鬷假張鷟判位當玄武之官職在司空之任虞舜之代伯禹統其班周成之朝毛公處其地已上工部職官部列卿唐蘇頲授韋希仲宗正卿制以醖藉之姿中折旋之禮趨事端雅吐詞雄暢束帶立朝既副聲實彯纓在位迭居文武宜輟魚鈐之委敘於麟族之盟右宗正寺又授韋元圭通事舍人制占對間詳風規韶茂燕庖分職已命膏梁之緒鸞墀敷奏佇揚賔客之言又授韋振通事舍人制良玉藴價明珠耀彩宜擢才於金穴俾趨侍於瑶墀已上通政使司梁沈約授蔡法度廷尉制民命所懸繫乎三尺止殺除殘實由乎此是以臯陶作士五刑惟明于張蒞官世無寃獄且漢代律書出乎小杜吳雄以三世法家係為理職郭恭以律學通明仍業司士爰及晉氏此風未泯叔則元凱並各名家自兹厥後斯尚漸薄迄至於今捐棄頓盡衣冠士子耻復用心州郡姦吏恣其取捨舞文弄法非止一塗朕膺天受命為兆民主每一念此忘寢與食尚書刪定左曹郎中蔡法度少好律書明曉法令世之所廢篤志不怠至於章句蹖滯名程乖礙莫不斟酌厥衷允得其門方欲寄以國刑開示後學拔才取士豈有定方自世道澆流浮偽雲起量計多少辨校錐刀若遵往從舊守而勿失豈所以軌儀上世垂風於後宜加褒擢弗繫常階唐蘇頲授陸餘慶大理卿制早回翔於近密久踐歷於中外雍容文雅自然素徴清商蕭散風華莫不瑶林瓊樹必當和而不撓貞則有恆正罰金於後人戒刻木於前吏念兹欽恤深可哀矜宜修白雲之典俾靜黃沙之職已上大理寺常衮授楊綰太常卿制舜以伯夷作秩宗漢以列侯掌郊廟至於圓丘大射之制禮官博士之論莫不綜詳得失而折衷焉故事職尊冠九卿之首恭儉忠信守而彌固一時模表清議所髙固可以處楊震桓榮之位領曲臺司宗之重勉思厥服以稱任賢李虞仲授崔羣右僕射兼太常卿制出作垣翰入標羽儀風雨有不已之鳴雪霜無可變之色秉是全德罔聞異辭乃者輟自夏卿授之戎閫統荆衡之巨鎮嗣羊杜之前聲政推洽平理在徴復禮樂之器豫心所難兾流合雅之音將考依經之制慎簡斯職僉諧乃俞俾回軍旅之謀式暢人祗之職伯夷官業佇乃修明蘇頲授陳貞節太常博士制卞寶輝光楚材翹秀窮禮經之奧博踐詞律之風雅參名列侍每獻昌言掌事奉常宜銓令典梁陸倕為王光祿轉太常讓表昔者楚德方盛孫叔濯衣漢道克隆王陽結綬故受命無辭受爵不讓况宗卿清重歷選所難漢晉以降莫非素範辭爵則桓郁張奮讓封則丁鴻劉愷潘尼之文雅深純華歆之從容退默自昔迄兹風流繼軌以臣况之曾無等級陳沈炯為周𢎞讓太常表臣聞玉舄雕楹不取材於蟠木丹朱繡黼豈襲冕於蘿薜何則適用各有所宜朝野不可一旨叔孫之分定禮儀倍資典實刁協之躬為唱引豈易其儀賔主闕對封禪失儀責以司存云誰之咎况南史執簡轉見違才君舉必書尤難妄冒唐髙郢謝再除太常卿充禮儀使表臣聞秩宗之任典司三禮奉常之選班列九卿前古以來用人為重非有望實不宜謬居臣昔叨此官已積負乘之懼今復再歷倍增濡翼之憂况専職禮儀别蒙委遇明時大禮方奉郊禋末學謏聞何徴損益錢珝代户部孫相公謝授兄太常卿表陛下禮行舟楫念及塤篪慰其友愛之懷進以優崇之秩伏以九卿之位列代所尊舜以三禮命伯夷漢以奉常加稷嗣依古則重得人始光用典之難敢言兄氏方懷慙惕忽荷皇私而階峻銀青寵兼端揆喜溢在原之屬恩加當軸之臣既激弼諧且𢎞名教股肱作輔莫成鎮撫之功手足相須但有胼胝之誓漢揚雄太常針翼翼太常實為宗伯穆穆靈祗寢廟奕奕稱秩元祀班於羣神我祀既祗我粢孔蠲匪愆匪忒公尸攸宜弗祈弗求惟德之報不矯不誣庶無罪悔無曰我材輕身恃筮東鄰之犧牛不如西鄰之麥魚秦殞望夷隱斃鍾巫常臣司宗敢告執書已上太常寺唐蘇頲授房光義光祿卿制雅容端操惟玉有溫擇行踐言復圭無玷頃祗班序尤稱望實蘭猗趨職已伏於誰何柏梁賦詩俾聞於總領劉崇望授李授光祿少卿制勉幹吉蠲之職無忽禋祀之官又為武奉御謝官表臣聞瑶庭任切猶稱六尚之榮玉食禮尊實總八珍之貴臣術慙祿鶴業匪豢龍將何以致美瓊芳式和金鼎已上光祿寺蘇頲授王希雋太僕卿制登於副尹聲滿於字人試乃列卿眷踰於數馬巾車是屬建鼓攸司薛廷圭闕授太僕卿制昔周穆王命伯冏為太僕正曰昔在文武聰明齊聖侍御僕從罔匪正人以承弼厥辟且曰僕臣正厥后克正僕臣諛厥后自聖太僕之為官也重矣朕每讀書允擇其可矧惟前代畢用名臣數馬執綏故實具在為豫禦侮作我前驅審官擇人今以命汝稽諸訓誥得不勉之漢揚雄太僕針肅肅太僕車馬是供鏘鏘和鑾駕彼時龍昔在上帝巡狩四宅王用三驅前禽是失紂作不令武王征殷檀車孔夏四騵孔昕僕夫執鞗載騂載駰我輿云安我馬云間雖馳雖驅匪逸匪愆昔有淫羿馳騁忘歸景公千駟而淫於齊詩好牡馬牧於埛野輦車就牧而詩人興魯廄焚問人仲尼厚醜孟子蓋惡夫廄多肥馬而野有餓殍僕臣司駕敢告執皂唐楊炯後周明威將軍梁公神道碑識髙東野職參西極勵銜策而追風逐日加剪拂則絶電奔星駃騠將駙騄齊衡驥騮共騶駼伏櫪於是龍媒間出麟友挺生伯樂多謝於精微日磾有慙於秣養張九齡太僕卿王君墓志買臣還郡無矜於出綬張既本州是榮於衣繡訓以六騶正於君疑僕日加數馬之慎歲有展軨之勤已上太僕寺常衮授蔣渙鴻臚卿制朕方修文德以撫區外則重譯象胥之事九儀相贊之職正用髦碩俾之典領時屬四夷之敘參授大賔之任韓暨以宿德而拜陳紀以至行而遷求舊任賢正當此選李嶠為崔神基讓授司賔卿表自謬司六尚承乏九賔星琯驟移塵露無紀每懷忌滿之誡實負曠官之責寧可以更奉殊徽重叨非據當象河之顯列處惟月之崇班陛下刻象雕金焚山榜道維駒在詠異人並出無容使芳蕙為蕭康瓠成寶孫逖鴻臚少卿壁記帝唐亮采立政稽古命官柔服逺人綏厥有衆肅慎來賀渠搜即敘示之以干羽通之以冠帶允諧是職豈易其人非夫野王之政理玄成之經術德孺之明識元方之令望則曷由臻兹已上鴻臚寺蘇頲授韋玢司農少卿制盛禮興樂望雖重於執圭八政一農事尤殷於理粟况洛京轉漕淮海通波宜任牟融之能遷改鄭莊之弊晉張華大司農針家有廬井王有廩籍阜茂豐物和鈞關石在周之季不虔政首棄稷弗務不籍千畝匱神乏祀敗於戎醜穡臣司農敢告左右唐楊炯後周青州刺史宇文公神道碑奏稱內史漢曰司農管夷吾陳不涸之名耿壽昌立常平之議時播百榖后稷讓於虞書阜成兆民列卿拜於周典已上司農蘇頲授鄭孝式衛尉少卿制詢事可以樹風聼言可以從政韜戈之任衛戟是司俾移名於白簡宜亞寵於丹棘右衛尉寺蘇頲授李從逺守太府卿制膺河寺之秩寵選方髙致泉府之殷惟才是屬學仞山髙詞場雲鬱闕里之室動不違仁潁川之門居而會理白居易授裴武太府卿制聚九州之賦辨百貨之名按其度程謹其出納孰為主者外府上卿有通敏之識有倚辦之才以兹器用早膺任使小大之務罔不勵精纍有勤績存乎官次爾宜率其官屬欽乃職司會帑藏出入之要修權量平校之法已上太府寺孫逖授牛仙客殿中監制長才為萬里之城沈略乃百夫之禦頃持節鉞嘗鎮河湟兵器惟精邊人咸賴出則靖國方資五利之功入則訓騶宜修六尚之職李嶠為第十舅讓殿中監兼仗內間廏表臣本乏才藝素無操植徒因緒業獲齒簮裾屬兩曜重光三靈再造登山捧日始會於風雲涉海窺天遂攀於星漢位非德進榮以恩升出捧鸞鑣驂玉輿之式道入陪鳯扆預金門之通籍扈清切之嚴衛接綢繆之宴私丘山之恩徒慚冒忝絲髮之效竟知無補加以兼烏竊幸假鳯連棲弟兄分侍於閫闈甥舅齊蹤於樞祕光榮被於九族寵遇傾於百寮是以常誡滿盈亟慚尸素叔寶之遇武子雖願輸忠正禮之對山公唯憂曠職常思髙明之瞰室每懼平路之傾輈豈謂天道不資聖慈逾厚仍降非常之澤重紆加等之命妨賢受位多慚於鴛鷺之羣匪服叨榮實愧於蜉蝣之羽竊惟先王慎擇不進於凡庸明主虛求務延於才俊伏乞傍羅杞梓更詢棫朴必取尤能秀傑方為御府之臣無使五技輕姿謬處七間之任自然六尚增價七騶無忝納於百揆終無廢事之譏賔於四門必有得人之頌宋之問為田歸道讓殿中監表臣聞欲成大厦必寄於瓌材將適逺途理歸於駿足未有闕公輸之巧輒事揮斤無良樂之能謬令市骨再趨武禁誠恪未聞三入文昌涓埃莫效剖符為郡山東無勿剪之謡握節和戎漠北有不賔之域已上殿中監職官部省唐沈佺期自考功員外授給事中詩南省推丹地東曹拜瑣闈惠移雙管筆恩降五時衣出入宜真選遭逢每濫飛器慙公理拙才謝子雲微案牘遺常禮朋僚隔等威上台行揖讓中禁動光暉旭日千門起初春八舍歸贈蘭聞宿昔談樹隱芳菲何幸鹽梅處唯憂對問機省躬知任重寧止冒榮非王維酬郭給事詩洞門髙閣靄餘暉桃李隂隂栁絮飛禁裏踈鐘官舍晚省中啼鳥吏人稀晨搖玉珮趨金殿夕奉天書拜璅闈強欲從君無那老將因卧病解朝衣杜牧李給事詩一章緘拜皂囊中懍懍朝廷有古風元禮去歸緱氏學江充來見犬臺宫紛紜白簡驚千古鐵鎖朱殷幾一空曲突徙薪人不會海邊今作釣魚翁杜牧寄宣州鄭諫議詩大夫官重鎮江東瀟灑名儒振古風文石階前辭聖主碧雲天外作冥鴻五言寧謝顔光祿百歲須齊衛武公再拜宜為丈人行過庭交分有誰同鄭谷賀新除左省韋拾遺詩初升諫署是真仙浪透桃花十五年垂白郎官居坐末著緋人吏立階前百僚班定趨丹陛兩腋風清上碧天從此追飛何處去金鸞殿與玉堂連黃滔寄獻梓桐山侯侍郎詩漢宫行廟略簮笏落人間直道三湘水髙情四皓山賜衣僧脫去表奏主批還地得松蘿塢泉通雨雪灣東門添故事南省缺新班片石秋從露幽窗夜不關夢餘蟾隱映吟罷鳥綿蠻可惜相如作當時事悉間方干茅山贈髙拾遺詩聖代諫臣停諫舌求還故里傲雲霞溪頭講樹遺漁艇篋裏朝衣盡酒家但愛身間辭祿俸那嫌歲計在桑麻我來幸與諸生異問答時容近絳紗又獻王大夫詩髙情不與俗人知恥學諸生取桂枝荀宋五言行世早巢由三詔出溪遲操心已在精微域落筆皆成典誥詞一鶚難成燕雀伍非熊本是帝王師賢臣雖藴經邦術明主終無諫獵時莫道百僚憂禮絶兼聞七郡怕天移直緣材力頭頭贍専彼文星步步隨不信重言通造化須臾便可變榮衰唐元稹授裴向左散騎常侍制縉紳之徒言其閨門之行僅至於衣無常主兒無常父矣推是為政仁何逺乎是以發自王畿至於陜服多歷年所終無尤違每移孝友之風以懲強暴之俗甘棠之下亷讓興焉豫欲用垂璫夾乘之官以代吾盤盂韋弦之戒不亦可乎白居易授歸登右散騎常侍制朴忠沈厚心無適莫介圭不飾止水無波薛廷圭授李澥右散騎常侍制清明照物以忘疲淡泊居貞而有守來司綸誥潤色推工去卧雲山含章見譽增重價誠由於合匱固深根頗異夫揠苗久漏搜羅幾為遺逸升之近署官以豐貂蘇頲授于經野給事中制理必中於繩墨才見推於札翰中臺奉草已承更直之榮左曹顧問宜接雙遊之美又授李懷讓給事中制絲綸所屬常推起草之能駁正是司更接遊蘭之寵崔嘏授崔璹等給事中制玉在涅而不緇金投火而彌徑眷言久次是用遷升我有絲綸期汝論駮我有金石資爾諧和無忝官常自貽公讓李德裕授元誨諫議大夫制往在內庭嘗感先顧奮發忠懇不私形骸伏俯青蒲至於雪涕數共工之罪不蔽堯聰辨垣平之詐益彰文德近因旌别邪正宰弼上言以魯公藏罟莫如置革於左右漢后輯檻孰若列雲於公卿是用命爾登於文陛其副我寵擢不替初心勿沽小名以枉大節崔嘏授李方等右諫議大夫制爾等皆擢秀瑶林飛華桂苑早登俊造共許清貞入憲府而自竦孤標歷文昌而更光列宿分符茂績逺繼於龔黃視草雄詞舊推於賈馬是用擢居右省陟彼首曹爾宜徴五諫之司佐三銓之任蘇頲授梁升卿等拾遺制爰廣獻書之路用開納諌之門不獨美於雕龍頗思齊於市駿陳徐陵讓散騎常侍表臣聞五十知命宗師之格言六百辭滿通賢之髙槩昔墨子諸生褰裳求楚魯連隱士髙論却秦况乎謬蒙知已寧無感激洪私過誤置以通班司憲文昌遂諧常伯今者昆吾小器諦視不見玄黃鈞天並奏靜聼能聞鐘鼓雖神農分藥岐伯提針冥衆因緣難可匡救陛下嗣臨寶厯光闡大猷屬意銓衡留情槱棫燕臺裝玉儻不精真齊客吹竽諒宜澄簡南郊奉乘當求鄭默之才西省文辭應用羅含之學宋張舜民謝諌議大夫表方安謫籍忽對鋒車入瞻八彩之秀毫進與七人之上列竊聞明主臨政而願治先王為官而擇人號曰梓材取其器使若夫諫爭之任政惟待從之人地密而選清秩卑而望重其所以起居言動則與史官相表裏其所以彈訶風察則與臺憲同戚休始則専弼人主之違今乃泛論天下之事乃者藥石不進鳬雁僅存仗馬一鳴茅茹不已豈無大明之東出廓然晛雪之曰消敢望桑榆之晚景獲依日月之末光招魂於楚水之涯拭目於雲臺之表手遮西日口誦離騷齒髮摧頺謾索太倉之米衣裳顛倒驚聞長樂之鐘敢不激昂暮氣緝理空文乘白馬而伏青蒲試圖來效餓西山而蹈東海期免後艱蘇軾賀楊龍圖啓方今朝廷之上號為無諱而太平之美終不能全臺諫之列歲不乏人而衆弊之原猶或未去豈聽之者徒能容而不能用言之者但為名而不為功歷觀古人之效忠皆因當世而用智不務過直期於必行右尹子革因典墳而道祈招之詩左師觸龍語饘粥而及長安之質徒盡拳拳之意不求赫赫之名此仁人及物之休功忠臣愛君之至分方傾耳以聼願續書諫苑之篇若有待而言或能著爭臣之論宋翰苑新書賀鄭正言除司諫啓孤忠上簡於龍光清貴亟躋於鷺序冠峩豸角隂見晛而已消手批龍鱗木從繩而自直劉克莊賀湯司諫啓鄭公所上百奏莫不切心陸生所著一篇必蒙稱善後宫敬憚於質肅貴璫欲避於淳夫乃冠伏蒲之清班以旌折檻之直氣有若仲山甫補衮方嘉賴之欲如种明逸之拂衣胡可得已行陟大坡之峻徑齊兩地之尊王邁賀給事鄭帥啓方鼠穴權門趨者成市而螭坳直筆屹然如山及調更化之絃時方多事獨衛出疆之璧義不辭難入還班行進掌封駁誰不批敕鮮有如何郯之力爭因此結知故每見殷浩而輒喜居中未久丐外即行國事日新比貞觀初年而何若君子一去覺貞元朝士之無多心戀闕以常丹髮憂邊而漸白惟有甘棠之蔽芾逺到海頭最宜叢桂之婆娑久留春腳歡聲無地可著最課為天簡知太史夜占喜長沙之星見行人朝發趨衡嶽之雲開寶閣升大學士之班輕車奉太夫人之養衆皆爭先而稱賀僕知大用之有階蓋當夷夏消長之交未決和戰依違之䇿春秋復讎之義大乃素學之欲行英俊在朝則本強正善類之所屬有以中書何無寇公為問者當以吾國即相司馬而答之初立本竒更好黃花之晚節倘來不計直垂汗竹之芳名蔡襄賀梁給事中啓湊風雲之佳會躡霄漢之清躔鶱騰夕拜之遷傾倒辰猷之告封詞頭而不下舊傳解事舍人之名批敇尾以復歸共觀儒者給事之效惟出令毋嫌於反汗則論議咸歎於回天仁人之利溥哉君子之道長矣可速則速寧論諸公衮衮之升當言必言要為一士諤諤之益日三接而甚寵歲九遷而可量起海濱而擢賢良已兆封侯之業遊都城而取卿相方歆稽古之榮某刺首吏韁託身德宇悵阻光儀之久欣聞寵渥之新鵬兩翼之垂天孰測南溟之運鳳九苞而瑞世但快朝陽之鳴歲律峥嶸禁途密勿願精鼎食亟副巖瞻改補闕拾遺為司諫正言渙寵龍墀地聨八舍升華騎省奏劾千官用銷落膽之姦毁麻儤直競壯啓心之論納牖陳詞鸞禁星沈見皂囊之凝露螭頭日永驚白簡之飛霜寵榮敻異於往時責任愈隆於舊日蓋將令引裾折檻之士得奮發於功名故不愛峩冠珥筆之階以籠致乎豪傑誠英主轉圜之舉而忠臣補牘之秋古儷府卷六
