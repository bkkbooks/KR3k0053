body:
  text: 古儷府卷九明王志慶編文學部經典總太學壁經賦國家誕敷文命建學崇政置六經於屋壁作羣儒之龜鏡剪遺文以辨謬俾雅誥以詳正是以儒業益敷皇風載盛斆學既闡廓宇斯分飾素壁而照月搆丹梁而結雲於是集青衿之侣延鴻都之羣貞八索起三墳採典謨之淪翳次編簡之繽紛稽古至今從百家之正義歸真背偽俾四海之同文於是博考羣臣宣明舊典既蝌斗之互缺亦魚魯之相舛依鳥跡而難從訪蛇形而莫辨定茲金簡規程邈之隸書遵彼古文參史籀之大篆然後命鍾張之藝詔文學之官界四壁以繩直揮五色之毫端粲爾其彩昭然可觀雖一勞之克定乃千載之不刋太學剏置石經賦由是雕鎪之功備矣文質之義昭然鑿寒光而嶄嶄迭映駢古色而字字相宣儼彼貞規韞玉之姿益壯窮諸墨妙崩雲之勢彌堅旁分鳥跡且非精衛之銜來逺映天光有若媧皇之補出許堯佐五經閣賦於是六籍咸萃百代無遺恭儉之敎比事之辭虞夏商周之五典國風雅頌之四詩旣精微之與廣博莫不森羅而在茲文移蝌斗之質字别魯魚之疑軸星攢而花散帶蜺舒而草滋櫺檻風來動芸香之苾苾綺疏日映見鉛槧之纍纍覽彼縑緗請披記𫝊或崇其臺以邀非望之福或邃其榭以逞荒怠之讌未若事惟師古政以化成樸斵之勤每弛怠於儒學黼藻之飾不加賁於檐楹李端送耿拾遺使江南括圖書詩驅𫝊草連天凉風滿樹蟬將過夫子宅亦問孝㢘船漢史收三篋周書採百篇别來將有淚不是怨流年劉勰宗經尚書則覽文如詭而尋理即暢春秋則觀辭立曉而訪義方隱故論説詞序則易統其旨詔䇿章奏則書發其源賦頌歌贊則詩立其本銘誄箴祝則禮總其端紀傳移檄則春秋為根並窮髙以樹表極逺以啟疆所以百家騰躍終入環内者也若禀經以製式酌雅以富言是仰山而鑄銅煑海而為鹽也李令琛書史百家日月經天星辰助其明耀江河紀地畎澮資其廣深俱麗於乾綱同歸於坤一作坎軸況六經旣出百子並騖萬卷五車七畧四部組織仁義琢磨道德雖非全璧之珍亦是連珠之寳當有求書之官逺探禹穴近開汲塜之文具修蠧簡或隂陽不謬朱紫自分仲任叢殘之譏並非通論稚川翡翠之喻實得大方豈重以芟夷加之翦截敢申直筆以塞異端則有百兩之篇張霸所喜七分之術京房獨精陳農訪天下之書荀朂决塜中之䇿識二簡者束皙觀四轍者穆王京兆耆舊之篇創於光武陳留神仙之傳起自阮蒼劉向修孝子之圖梁鴻首逸人之記文學部經梁簡文帝請右將軍朱异奉述制旨易義表疑闗永闢踰𢎞農之洞啟辭河旣吐邁龍門之已鑿宋洪邁謝賜御書周易表法始四營莫辨乎易文兼五典皆聚此書續東魯之韋編發先秦之竹簡意廣大而莫測辭灝噩以難窺其在累朝以為古訓顧宣帝立梁丘之學豈革荄茲之談彼明皇覩洪範之篇徒改陂頗之字未有留神乙夜探賾前經刪妄論於九師掇微言於四代寫之㡘帙示於縉紳體飛動於龍鸞義昭回於日月月將日就彰聖學於祇勤墨妙筆精竦侯籓之瞻戴識際道真行髙世表垂衣裳而致治盖取乾坤廣視聽以御圖一似堯禹故此躬行之至見於心畫之間敎兼備於臣隣賜不殊於中外秘書深刻已參神化之孝經方國咸頒逺陋漢光之手札孔穎達周易正義序夫易者象也爻者效也聖人有以仰觀俯察象天地而育羣品雲行雨施效四時以生萬物若用之以順則兩儀序而百物和若行之以逆則六位傾而五行亂故王者動必則天地之道不使一物失其性行必協隂陽之宜不使一物受其害故能彌綸宇宙酬酢神明宗社所以無窮風聲所以不朽非夫道極𤣥妙孰能與於此乎斯乃乾坤之大造生靈之所益也若夫龍出於河則八卦宣其象麟傷於澤則十翼彰其用業資九聖時歴三古及秦亡金鏡未墜斯文漢理珠囊重興儒雅其傳易者西都則有丁孟京田東都則有荀劉馬鄭大體更相祖述非有絶倫唯魏世王輔嗣之注獨冠古今所以江左諸儒並傳其學河北學者罕能及之已上易孔穎達尚書正義序夫書者人君辭誥之典右史記言之策古之王者事總萬幾發號出令義非一揆或設教以馭下或展禮以事上或宣威以肅震曜或敷和而散風雨得之則百度惟貞失之則千里斯謬樞機之發榮辱之主絲綸之動不可不慎所以辭不茍出君舉必書欲其昭法誡慎言行也其泉源所漸基於出震之君黼藻斯彰郁乎如雲之后勲華揖讓而典謨起湯武革命而誓誥興先君宣父生於周末有至德而無至位修聖道以顯聖人芟煩亂而翦浮辭舉宏綱而撮機要上斷唐虞下終秦魯時經五代書總百篇採翡翠之羽毛㧞犀象之牙角罄荆山之石所得者連城窮漢水之濵所求者照乗巍巍蕩蕩無得而稱郁郁紛紛於斯為盛斯乃前言往行足以垂法將來者也暨乎七雄已戰五精未聚儒雅與深穽同埋經典共積薪俱燎漢氏大濟區宇廣求遺逸採古文於金石得今書於齊魯但古文經雖然早出晚始得行其辭富而備其義𢎞而雅故復而不厭久而愈亮江左學者咸悉祖焉近至隋初始流河朔其為正義者蔡大寳巢猗費甝顧彪劉焯劉炫等焯乃織綜經文穿鑿孔穴詭其新見異彼前儒非險而更為險無義而更生義斯乃鼓怒浪於平流震驚飈於靜樹使教者煩而多惑學者勞而少功過猶不及良為此也炫嫌焯之煩雜就而刪焉雖復微稍省要又好改張前義義更太畧辭又過華雖為文筆之善乃非開奬之路已上書梁簡文帝請尚書左丞賀琛奉述制旨毛詩義表東魯夢周窮茲刪採西河紹魏著彼纘述叶星辰而建詩觀斗儀而命禮以為陳徐雅頌膏肓匪一燕韓篇什痼疾多端北海鄭君徒逢箋釋南郡太守空為異序庶令中和永播碩學知宗大胥負師國子咸紹孝敬之德化洽天下多識之風道行比屋已上詩宋景德二年頒行公羊傳勑國家欽崇儒術啟廸化源眷六籍之垂文實百王之取法著於緗素皎若丹青乃有前修詮其奥義為之疏釋播厥方來頗索隱於微言用撃蒙於後學流傳旣久譌舛遂多爰命校讎俾從刋正歴歲時而盡瘁探簡䇿以惟精載嘉稽古之功允助好文之理宜從雕印以廣頒行春秋第一問孔聖屬詞丘明同恥裁成義類比事繫年居體元之前已有先傳在獲麟之後尚列餘經豈脱簡之難徴復絶筆之云誤子産遺愛也而賂伯石叔向遺直也而戮叔魚吳季札附子臧而吳衰宋宣公捨與夷而宋亂陣為鵝鸛戰豈捷於魚麗詛以犬雞信寜優於牛耳子集有之字所習也為予言之左氏傳第一道問魯史之文先師用明於王道漢武之代左氏不列於學官誠義例之可觀集作徵終誣豔而多失鳳凰啟兆陳氏不得不昌鸜鵒成謡季氏不得不叛旣未然而前定於立教而謂何同恥釋經豈其如是夏五之闕雖繫月而何嫌艮八之占於兼山為何象因生因諡未詳命氏之殊德命類命請數制名之義集作一生旣充賦無辭説經吕溫代國子陸博士進集註春秋表庻因儀鳳之辰永洗獲麟之恨憫世降而托始於東遷悲道窮而絶筆於西狩一十二公之事炳若日星二百餘年之權凜乎衮鉞道名分於一統為斷例於五經操典禮命討之權謹王伯夏夷之辨傳之者失短失俗而失誣擬之者或僭或亂而或散子夏不能措詞元凱猶其成癖齊謝朓謝隋王賜左傳啟昭晰殺靑近發中汗恩勸挾冊慈朂下帷脁未睹山笥早懵河籍業謝專門説非章句庻得旣困而學括羽瑩其䝉心家藏賜書籝金耻其貽厥披覽神勝吟諷知厚晉范甯春秋穀梁傳序昔周道衰陵乾綱絶紐禮壞樂崩彞倫攸斁弑逆簒盜者國有淫縱破義者比肩是以妖災因釁而作民俗染化而遷隂陽為之愆度七曜為之盈縮川岳為之崩竭鬼神為之疵厲故父子之恩缺則小弁之刺作君臣之禮廢則桑扈之諷興夫婦之道絶則谷風之篇奏骨肉之親離則角弓之怨彰君子之路塞則白駒之詩賦幽王以暴虐見禍平王以微弱東遷征伐不由天子之命號令出自權臣之門故兩觀表而臣禮亡朱干設而君權喪下陵上替僭逼理極天下蕩蕩王道盡矣孔子覩滄海之横流於是就太師而正雅頌因魯史而修春秋列黍離於國風齊王德於邦君所以明其不能復雅政化不足以被羣后也該二儀之化育贊人道之幽變舉得失以彰黜陟明成敗以著勸誡拯頽綱以繼三五鼓芳風以扇逰塵一字之褒寵踰華衮之贈片言之貶辱過市朝之撻德之所助雖賤必申義之所抑雖貴必屈故附勢匿非者無所逃其罪潛德獨運者無所隱其名信不易之宏軌百王之通典也春秋之傳有三而為經之旨一臧否不同褒貶殊致盖九流分而微言隱異端作而大義乖左氏以鬻拳兵諫為愛君文公納幣為用禮穀梁以衛輒拒父為尊祖不納子紏為内惡公羊以祭仲廢君為行權妾母稱夫人爲合正以兵諫為愛君是人主可得而脅也以納幣為用禮是居喪可得而婚也以拒父為尊祖是為子可得而叛也以不納子紏為内惡是仇讎可得而容也以廢君為行權是神器可得而闚也以妾母為夫人是嫡庻可得而齊也漢興以來瓌望碩儒各信所習是非紛錯凖裁靡定故有父子異同之論石渠分爭之說廢興由於好惡盛衰繼之辨訥斯盖非通方之至理誠君子之所歎息也左氏豔而富其失也誣穀梁清而婉其失也短公羊辨而裁其失也俗若能富而不誣清而不短裁而不俗則深於其道者也已上春秋并三傳梁簡文帝謝勑賫中庸講疏啟若睹𤣥珪如觀金板洽日九披流光照灼慶雲五色垂彩氤氲周武上聖問五行於箕子宣尼照極訪六儛於萇𢎞未有懸鏡獨曉仰均神鑑方知始畫八卦風羲有慙正名百物軒轅為陋唐歐陽詹大學博士講禮記記没階雲來即席鱗居攢弁如星連襟成帷公先申有禮之本次陳用禮之要正三代損益得失定百家疏義長短鎔乎作者之意注乎學者之耳河傾於懸風落於天淸泠灑蕩幽逺無泥所昧鏡徹於靈臺所疑氷釋於心泉禮記第二問三代之弊或樸或薄六經之失或愚或誣夫以殷周之理道詩書之述作施於風俗豈皆有所未至耶輟祭納書誠為追逺執戈桃茢無乃傷恩何二者之相反耶兩楹坐奠歎有切於宗子九齡魂交數能移於與爾何二者之不一耶山節藻棁豚肩狐裘皆大夫也又何相逺耶檀弓袒免子游衰麻何如直諒而忠告之耶各以經對已上三禮唐明皇孝經序嗟乎夫子没而微言絶異端起而大義乖況冺絶於秦得之者皆煨燼之末濫觴於漢傳之者皆糟粕之餘故魯史春秋學開五傳國風雅頌分為四詩去聖逾逺源流益别近觀孝經舊註蹖駁尤甚至於迹相祖述殆且百家業擅專門猶將十室希升堂者必自開户牖攀逸駕者必騁殊軌轍是以道隱小成言隱浮偽且傳以通經為義義以必當為主至當歸一精義無二安得不翦其繁蕪而撮其樞要也韋昭王肅先儒之領袖虞翻劉邵抑又次焉劉炫明安國之本陸澄譏康成之註在理或當何必求人今故特舉六家之異同㑹五經之旨趣約文敷暢義則昭然分註錯經理亦條貫寫之琬琰庶有補於將來且夫子談經志取垂訓雖五孝之用則别而百行之源不殊是以一章之中凡有數句一句之内意有兼明具載則文繁略之又義闕今存於疏用廣發揮晉郭璞爾雅序夫爾雅者所以通詁訓之指歸敘詩人之興詠總絶代之離詞辨同實而殊號者也誠九流之津涉六藝之鈐鍵學覽者之潭奥摛翰者之華苑也盖興於中古隆於漢氏豹䑕旣辨其業亦顯英儒贍聞之士洪筆麗藻之客靡不欽玩耽味為之義訓璞不揆檮昧少而習焉復綴集異聞㑹萃舊說考方國之語采謡俗之志錯綜樊孫博闗羣言剟其瑕礫搴其蕭稂事有隱滯援據徵之其所易了闕而不論别為音圖用袪未寤輒復擁篲清道企望塵躅者以將來君子為亦有涉乎此也宋孫奭孟子正義序夫總羣聖之道者莫大乎六經紹六經之教者莫尚乎孟子自昔仲尼旣没戰國初興至化陵遲異端並作儀衍肆其詭辨楊墨飾其淫辭遂致王公納其謀以紛亂於上學者循其踵以蔽惑於下猶洚水懷山時盡昏墊繁蕪塞路孰可芟夷惟孟子挺名世之才秉先覺之志㧞邪樹正髙行厲辭𨗳王化之源以救時弊開聖人之道以斷羣疑其言精而贍其旨淵而通致仲尼之敎獨尊於千古非聖賢之倫安能至於此乎已上雜經文學部史裴松之上三國志注表臣聞智周則萬物自賔鑒逺則物無遺照雖盡性窮微深不可識至於緒餘所寄則必接乎粗迹是以體備之量猶曰好察邇言畜德之厚在於多識往行壽書銓序可觀事多審正誠㳺覽之苑囿近世之嘉史然失在於畧時有所脱漏臣奉旨尋詳務在周悉上搜舊聞旁摭遺逸按三國雖歴年不逺而事闗漢晉首尾所涉出入百載注記紛錯每多舛互其壽所不載事宜存録者則罔不畢取以補其缺或同說一事而辭有乖雜或出事本異疑不能判並皆抄内以備異聞若乃紕繆顯然言不附理則隨違矯正以懲其妄其時事當否及夀之小失頗以愚意有所論辨自就撰集已垂期月寫校始訖謹封上呈竊惟繢事以衆色成文蜜蠭以兼采為味故能使絢素有章甘踰本質臣實頑乏顧慙二物雖自罄勵分絶藻繪旣謝淮南食時之敏又微狂簡斐然之作淹留無成祗穢翰墨不足以上酬聖旨少塞愆責愧懼之深若墜淵谷宋曾公亮進新唐書表竊惟唐有天下幾三百年其君臣行事之始終所以治亂興衰之迹與其典章制度之英宜其粲然著在簡册而紀次無法詳畧失中文采不明事實零落盖又百有五十年然後得以發揮幽昧補輯闕亡黜正偽謬克備一家之史以為萬世之傳成之至難理若有待以為商周以來為國長久惟漢與唐而不幸接乎五代衰世之士氣力卑弱言淺意陋不足以起其文而使明君賢臣雋功偉烈與夫昏虐賊亂禍根罪首皆不得暴其善惡以動人耳目誠不可以垂勸戒示久逺甚可歎也乃因邇臣之有言適契上心之所憫於是云云並膺儒學之選悉發秘府之藏俾之討論共加刪定凡十有七年成二百二十五卷其事則增於前其文則損於舊至於名篇著目有革有因立傳紀實或增或損義類凡例皆有依據纎悉綱條具載别録臣公亮典司事領徒費日月誠不足以成大典稱明詔歐陽修宋祁范鎮王疇宋敏求吕夏卿劉義叟司馬光進資治通鑑表伏念臣性識愚魯學術荒踈凡百事為皆出人下獨於前史粗常盡心自幼至老嗜之不厭每患遷固以來文字繁多自布衣之士讀之不徧况於人主日有萬幾何暇周覽臣嘗不自揆欲刪削冗長舉撮機要取闗國家興衰係生民休戚善可為法惡可為戒者為編年一書使先後有倫精粗不雜私家力薄無由可成伏遇英宗皇帝資睿知之性敷文明之治思歴覽古事用恢張大猷爰詔下臣俾之編集臣夙昔所願一朝獲伸踴躍奉承惟懼不稱先帝仍命自選辟官屬於崇文院置局許借龍圖天章閣三館秘閣書籍賜以御府筆墨繒帛及御前錢以供菓餌以内臣為承受眷遇之隆近古莫及不幸書未進御先帝違棄羣臣陛下紹膺大統欽承先志寵以冠序錫之嘉名每開經筵常令進讀臣雖頑愚荷兩朝知待如此其厚隕身喪元未足報塞茍知力所及豈敢有違㑹差知永興軍以衰疾不任治劇乞就冗官陛下俯從所欲曲賜容養差判西京留守御史臺提舉嵩山崇福宫前後六任仍聽以書局自隨給之禄秩不責職業臣既無他事得以研精極慮窮竭所有日力不足繼之以夜徧閱舊史傍採小説簡牘盈積浩如淵海抉擿幽隱較計毫釐上起戰國下終五代凡一千三百六十二年修成二百九十四卷又畧舉事目年經國緯以備檢尋為目錄三十卷又參羣書評其同異俾歸一塗為考異三十卷合三百五十四卷自治平開局迨今始成嵗月淹久其間牴牾不敢自保罪負之重固無所逃重念臣違離闕庭十有五年雖身處於外區區之心朝夕寤寐何嘗不在陛下左右顧以駑蹇無施而可是以專事鉛槧用酬大恩庻竭涓塵少禆海岳臣今筋骸癯瘁目視昏近齒牙無幾神識衰耗目前所為旋踵遺忘臣之精力盡於此書伏望陛下寛其妄作之誅察其願忠之意以清閒之燕時賜省覽監前世之興衰考當今之得失嘉善矜惡取是捨非足以懋稽古之盛德躋無前之至治俾四海羣生咸蒙其福則臣雖委骨九泉志願永畢矣李燾進續通鑑長編表臣竊聞司馬光之作資治通鑑也先使其寮採摭異聞以年月日時為叢目叢目旣成乃修長編唐三百年范祖禹實掌之光謂祖禹長編寜失於繁無失於畧今唐紀取祖禹之六百卷刪為八十卷是也臣今所纂義例悉用光所創立錯綜銓次皆有依憑顧臣此書詎可便謂續資治通鑑姑謂續資治通鑑長編可也旁采異聞補實錄正史之闕畧參求真是破巧説偽辨之紛紜益以昭明祖宗之豐功盛德區區小忠或在可録紀一祖八宗之盛德至善義寜止於百篇聚九朝三世之各見殊聞事必傳於兩説惟折諸聖廼得其真臣網羅收拾垂四十年綴葺穿聨踰一千卷牴牾何敢自保精力幾盡此書非仰托大君之品題懼難逃衆人之指目漢孝宣稱制决疑故事最髙於甘露我神考錫名冠序治鑑莫毁於元符豫席恩言比迹先正臣死且不朽元歐陽𤣥進宋史表臣等編劘分局彚萃為書起自東都迄於南渡紀載餘三百載始終纔一再期考夫建隆淳化之經營景定咸平之潤色慶厯皇祐以忠厚羙風化元豐熙寜以聰明紊憲章馴致紹聖紛紜崇寜荒亂治忽昭陳於方册操存實本於宫庭若乃建炎紹興之圖存乾道淳熙之保乂正直用則人存政舉邪佞進則臣辱主憂光寜之朝僅守宗社理度之世日蹙封疆顧乃拘信使以渝盟納叛臣而侵境由姦權之擅命啟事釁以召兵厥後瀛國歸朝吉王航海齊亡而訪王蠋乃存秉節之臣楚滅而諭魯公堪矜守禮之國載惟貞元之㑹合屬當泰道之熙明衆言殽亂於當時大誼昭宣於今日矧先儒性命之説資聖代表章之功先理致而後文辭崇道德而黜功利書法以之而矜式彞倫賴是而匡扶雖微董狐直筆之可稱庻逃司馬寡識而輕信至若論其有弊亦惟斷以至公大槩聲容盛而武備衰論建多而成効少且辭之煩簡以事而文之今古以時舊史之傳述旣多雜記之蒐羅又廣於是參是非而去取權豐約以損增事嚴敢計於疾徐日積亦虞於玩愒臣等忝司當揆實預提綱周詢在局之言靡不究心乃職第述作之才有限而報効之志無窮倘垂清燕之觀尚助緝熙之益曰若帝堯曰若帝舜惟聖心稽古之功鑒于有夏鑒于有殷乃臣子告君之道栁虬上周太祖書且著述之人宻書其事縱能直筆人莫之知何止物議横生亦自異端互起故班固致受金之名陳壽有求米之論著漢魏者非一氏造晉史者至數家後代紛紜莫知凖的唐羅衮謝監修相公啟固以時屬叡文事當修舉列聖之青編再輯盛朝之鴻藻將鋪是宜對季札以歌唐求孟堅而述漢然後可以昭彰一代舄奕千齡如衮之才非此之任誠欲奉身而退瀝懇以辭無傷棫樸之風自適輪轅之用一家之言莫就空慕馬遷三國之志未聞實慙陳壽乍簪筆於宸軒復和鉛於綸閣中書肄入寜同著作之郎相府依棲乃類司徒之掾分誠已過恩亦太隆既辭讓以難諧但憂兢而㒺寘穀梁清婉休校力於短長王隱混淆預甘心於譏誚劉知幾史通斷限篇若四裔本係種落所興北貊起自淳維南蠻出於槃瓠髙句麗以鼈橋獲濟吐谷渾因馬鬭徙居諸如此説者求之厯代何書不有而作之者曾不知前撰已著而後修宜輟遂乃百世相傳一字無改盖駢指在手不加力於千鈞附贅居身非廣形於七尺為史之體有若於斯茍濫引他事豐其部帙以此稱博異乎吾黨之所聞文學部子梁劉勰諸子至鬻熊知道而文王諮詢餘文遺事錄為鬻子子自肇始莫先於茲及伯陽識禮而仲尼訪問爰序道德以冠百氏然則鬻惟文友李實孔師聖賢並世而經子異流矣逮及七國力政俊乂蠭起孟軻膺儒以罄折莊周述道以翺翔墨翟執儉确之教尹文課名實之符野老治國於地利騶子養政於天文申商刀鋸以制理鬼谷唇吻以䇿勲尸佼兼總於雜術青史曲綴以街譚承流而枝附者不可勝筭並飛辨以馳術饜禄而餘榮矣暨於暴秦烈火勢炎崐岡而煙燎之毒不及諸子逮漢成普思子政讎校於是七略芬菲九流鱗萃殺青所編百有八十餘家矣迄今魏晉作者間出讕言兼存璅語必錄類聚而求亦充箱照軫矣研夫荀孟所述理懿而辭雅管晏屬篇事覈而言練列禦冦之書氣偉而采奇鄒子之説心奢而辭壯墨翟隨巢意顯而語質尸佼尉繚術通而文鈍鶡冠綿綿亟發深言鬼谷渺渺每環奥義情辨以澤文子擅其能辭約而精尹文得其要眘到析宻理之巧韓非著博喻之富呂氏鑒逺而體周淮南泛採而文麗斯則得百氏之華彩而辭氣文之大畧也文學部集盧照隣駙馬都尉喬君集序痛乎王澤旣竭諸侯為麋鹿之塲帝圖伊梗天下作豺狼之國秦人一㓕舊章大愚黔首羣書赴火化崑岳之髙煙儒士投坑變蓬萊之巨壑樂沈於海河間王初睠睠於古篇禮適諸夷齊叔孫乃區區於綿蕝又南陽公集序含毫顧盼漢家之城闕風烟逸韻縱横秦地之林泉魚鳥黄山羽獵幾奏瓊篇汾水樓船參聞寳思南津弔屈去逐蒼梧之雲西路悲昂來挽葱巖之雪江湖廊廟造次不忒其儀沙塞朝廷顛沛必歸於漢是使名流俱至親翰闐門愛客相尋雞談滿席嚶嚶好鳥花欲白兮栁將菲􅀈􅀈逰魚蓮欲紅兮蘋可望緑樽恒湛齊閣臨霞綺札逾新園亭坐月文學部政書唐吕温代百寮進農書表臣聞不愛牲玉祈穀于圜丘可以致誠未足以勸農躬秉耒耜籍田於千畝可以示勸未足以教人必也殷天地之和順隂陽之理利其器用精厥法式行之而不倦動之而不勞四海靡而風行百姓迷其日用𢎞我政本實惟農書伏惟睿聖文武皇帝陛下德茂生成道光慈儉捐金而寳穀菲食而粒人考堯典以授時稽禹貢而任土潔粢盛而大事在祀銷劍㦸而盡力為農豐年屢薦於郊歌嘉瑞繼書於國史而不自滿假惟懷永圖每至獻歲載陽仲春初吉俯察土膏之候仰視晨正之祥經始歲功𨗳揚生德徵有司之舊典奉先后之遺文深居穆淸親覽奥妙匪崇朝而盡更田畞不出户而遍洽人情見捽草坯土之艱知寒耕熱耘之苦宸心感念甽畞昭蘇一歎而時雨先飛三復而春雷自起臣等業慙學稼禄過代耕親承務本之風日奉在勤之訓三時不害觀玉燭於氤氲九扈孔修賀生靈於富庻唐栁宗元進農書表平秩東作虞書立制俶載南畞周雅垂文此皆奉天時以授人盡地力而豐食惟新令節益厲農功旣立典於可傳每陳書而作則耕鑿之利敷帝力於嘉謨稼穡之難動天心而睿覽勤勞率下超邁古先曾鞏謝賜唐六典表繼貞觀之造邦維開元之稱治財成唐典本庻務於尚書則象周官綴舊聞於經禮行之當世垂及方來接五聖之休期振千齡之絶業號令風采卑秦漢而不言綱紀文章體唐虞而特起爰因廣覽俯逮遺編俾加鏤板之傳賜及在廷之士竊典故之緒餘少禆寡陋審官儀之委曲益勵疲駑竇儀進刑統表虞帝聰明始恤刑而御物漢髙豁達先約法以臨人盖此丹書輔於皇極禮之失則刑之得作於涼而弊於貪百王之損益相因四海之凖繩斯在如銜勒之持逸駕猶郛郭之域羣居哀矜在念欽恤為懷網欲自宻而踈文務從微而顯乃詔執事明啟刑書俾自我朝彌隆大典貴體時之寛簡使率土以遵行國有常科吏無敢侮刑統前朝創始羣彦規為貫彼舊章采綴已從於撮要屬茲新造發揮愈合於執中幸偶文明謬參憲法金科奥妙比虧洞達之能丹筆重輕徒竊討論之寄將塵睿覽唯俟嚴誅上官儀為李秘書上祖集表臣聞漢朝中葉陳農求訪於圖書魏厯初基袁渙請收於篇籍遂使容臺增餙丹府載輝雅道照於前古風流被於末裔陛下睿德緯天神功光表截海班朔益地延圖垂衣視典探羣玉之幽賾虚已緣情動兼金之歌咏由是芸香秘室青簡具陳璧水上庠漆書咸集宋陳瓘進四明尊堯集表畎畝愛君精誠雖至芻蕘議政迂濶難行葵向不習而常傾芹陋敢期於得獻獨因睿斷許貢危衷愚公老矣益堅平險之心精衛𦕈然未捨填波之願殁而後已志不可踰望雖隔於戴盆夢不忘於馳闕丹誠上格天語遥詢要觀尊主之恭緩議奸時之罪天大普容日明徧照覽熈豐記動之史倣虞夏採詩之官咨輿議於多方證私書之百毁舜纂堯緒孜孜乎善繼之勤武廣文聲斤斤乎丕承之羙茲所謂一人之慶可以得萬國之歡宣宗當紹獻之時寜容德裕之奮語武帝以述景為事忍事馬遷之短辭父子至情古今一揆不懲謗史之罪則何以謝過於宗廟不毁坐像之悖則何以示順於華夷國是方强勢難遽改大器至重要在深思庻乎苖莠之分始於冠履之辨至羙成於剛健大患生乎因循儒宗數人自是一家之説聖主獨斷乃為我宋之休天心篤愛之甚明人情企想而有待文學部説顧況戴氏廣異記序大鈞播氣不滯一方檮杌為黄熊彭生為大豕萇𢎞為碧舒女為泉牛哀為虎黄母為黿一作鱉君子為猿鶴小人為蟲沙武都婦人化為男成都男子化為女周娥殉墓十載却活嬴諜一作姬暴市六日而蘇蜀帝之魂曰杜鵑炎帝之女曰精衛洪荒窈窕莫可紀極古者靑烏之相冢墓白澤之窮神姦舜之命䕫以和神湯之問革以語怪音聞魯壁形鏤夏鼎玉牒石記五圖九籥説者紛然故漢文帝召賈誼問鬼神之事夜半前席志怪之士劉子政之列仙葛稚川之神仙王子年之拾遺東方朔之神異張茂先之博物郭子潢一作横之洞㝠顔黄門之稽聖侯君素之精一作旌異其中神奥顧君真誥周氏之𡨕通而異苑搜神山海之經幽𡨕之録襄陽之耆舊楚國之先賢風俗所通歲時所記吳興陽羡南越西京注引古今辭標淮海裴松之盛𢎞之陸道瞻等諸家之説蔓延無窮國朝燕梁四公傳唐臨㝠報記王度古鏡記孔慎言神怪志趙自勤定命錄至如李庾成張孝舉之徒互相傳説文學部藏書髙士㢘文思博要序爰自卦起龍圖文成鳥篆墳典開其緒丘索𨗳其流虞夏之書猶旭日之始旦殷商之誥若覆簣之為山及曲阜佐周攝政踐祚而又闕里自衛將聖多能損益禮樂極乎天而蟠乎地祖述堯舜繫星辰而振河海郁郁焉鼓王風於九合誾誾焉闢儒門於百代旣而雅道雖廢學者未衰挾册如林遂偶縱横之運懷經成市俄屬坑焚之灾下土怨咨上天廻睠咸洛基命懸賞而崇儒術曹馬御紀疏爵而啟膠庠人拾青紫家握鉛素求古文於孔壁專門者重闡收竹書於汲冢異説者無遺逮乎有隋失御羣凶競逐辟雍蔓於荆棘延閣殫於煨燼孟堅九流與川瀆而俱竭𢎞一作尹非度四部隨岳敦而分崩淹中稷下博古洽聞之生盡殄散矣蘭臺藏室金簡玉匱之文咸殘逸矣皇帝仰膺靈命俯叶萌心智周乾坤之表道濟宇宙之外操征伐而清天歩横崑海而紐地維櫜弓矢於靈臺執贄者萬國張禮樂於太室受職者百神蒼旻降祥黔黎禔福置成均之職劉董與馬鄭風馳開崇文之館揚班與潘江霧集搢紳先生聚蠧簡於内輶軒使者採遺篆於外刋正分其朱紫繕寫埒於坵山外史所未錄既盈太常之藏中經所不載盛積秘室之府比夫軒皇宛委穆滿羽陵炎漢之廣内有晉之秘閣何異乎牛宫之水爭浮天於谷王蟻垤之林競拂日於若木也帝聽朝之暇屬意斯文精義窮神微言探賾紆樓船於學海獲十城之珍駐羽盖於翰林搴三珠之寳以為觀書貴要則十家並馳觀要貴博則七略殊致自非總質文而分其流混古今而共其轍則萬物雖衆可以同類千里雖遥可以同聲然則魏之皇鑒登巨川之濫觴梁之遍畧標崇山之增構嵗月茲多論次逾廣類苑耕錄齊玉軑而並馳要畧御覽揚金鑣而繼路雖草創之指義在㢘也而編錄之内猶多遺闕並未能絶雲而負蒼天杜罻羅之用激水而縱溟海息鈎餌之心帝乃親縈聖情曲留𤣥覽垂權衡以正其失定凖繩以矯其違頓天網於蓬萊綱目自舉馳雲車於䇿府轍跡可尋述作之義坦然筆削之規大備楊盈川登秘書省閣詩序若夫麒麟鳳凰之署三臺四部之經周王羣玉之山漢帝蓬萊之室觀星文而考南北大象入於機衡披帝冊而質龍神負圖出於河洛司先王之載籍掌制書之典謨劉向沈研揚雄寂寞之士於茲翰墨馬融該博傅毅文章之才此焉㳺處周庾信漢武聚書贊獻書路廣藏書柱開秦儒山谷漢聞吹灰芝泥印上玉匣封來坐觀風俗不出蘭臺文學部好學晉束皙讀書賦耽道先生澹泊閒居藻練精神呼吸清虛抗志雲表戢形陋廬垂帷帳以隱几被紈素而讀書抑揚嘈囋或疾或徐優㳺藴藉亦卷亦舒頌卷耳則忠臣喜詠蓼莪則孝子悲稱碩䑕則貪民去唱白駒而賢士歸是故重華詠詩以終已仲尼讀易於終身原憲潛吟而㤀賤顔囬精勤以輕貧倪寛口誦而芸耨買臣行吟而負薪賢聖其猶孳孳況中才與小人蔣防螢光照字賦士有閱簡䇿尚專精恒俾夜而作晝每聚螢以襲明期照燭於無隱俟沈研而有成縹帙時開玉篆共丹輝並耀銀鈎下映繁星與片月俱生帷幌之際微明舒蔽或熠熠以光吐復離離而珠綴俯而察煥乎呈科斗之文靜而觀烱爾見雕蟲之藝諒依人以明道匪韜光以自衛任昉為蕭揚州薦士表集螢映雪編蒲緝栁先言往行人物雅俗甘泉遺儀南宫故事畫地成圗抵掌可述豈特豹䑕有必對之辨竹書無落簡之謬瑩襟靈於藝圃散耳目於書林下帷覃思穿林嗜古蓬山雲觀之書羣玉懸金之記魯宫藏篆汲冢遺編無不日覽萬言暗藏三箧陸㳺江西到任謝表臣禀資迂愚立身羇藐偶竊犁鉏之餘暇妄窺述作之淵源纍然自力於簡編老之將至過矣見稱於流輩轉而上聞晁補之答賀李祥改宣德啟粤從幼學夙有俊聲下帷未省窺園持竿寜悟流麥其精如此故資之深梁劉孝標答劉之遴借類苑書九冬有隟三餘暇時多逰書圃代樹萱蘇若夫采亹亹於緗紈閱微言於殘竹嗢飫膏液咀嚼英華不知地之為輿天之為葢靡測廻塘莫辨輿馬烏足以言乎是用周流墳索詳觀圖牒搦管聨冊纂茲英奇蛩蛩之謀止於善草周周之計利在銜翼故鳩集斯文盖自綴其漏耳豈冀藏之名山播於士大夫哉梁王僧孺太常敬子任府君傳恥一物之不知惜寸隂之徒靡下帷閉户投斧懸梁雖𤣥晏書淫文勝經溢康成之忽㤀所往公叔之顛墜硎岸無以異也宇文逌庾信集序穿壁未勤映螢逾甚若乃德聖兩禮韓魯四詩九流七畧之文萬卷百家之説名山海上金匱玉版之書魯壁魏墳縹帙緗囊之記莫不窮其枝葉誦其篇簡豈止仲任一見之敏世叔五行之速任昉王文憲序淵角殊祥山庭異表望衢罕窺其術觀海莫際其瀾宏覽載籍博㳺才義若乃金版玉匱之書海上名山之旨沉鬱澹雅之思離堅合異之談莫不總制清衷遞為心極王僧孺伏海府君集序至於神經怪牒緑笥丹筒金版玉箱錦文緹帙並藏諸靈府秘在瑶臺而君莫不徧探𠖇賾具閱局檢常以前賢往學亟與聖違賈馬盧鄭非無紕越荀郭何王彌多蹐謬二義可辨未値髙卿之疑九事非難不逢平叔之問庾信髙鳳讀書不知流麥贊髙鳳好學專心不廽留連經笥對玩書臺石門雲度銅梁雨來麥流雖逺書卷猶開楊烱楊去盈墓誌銘朱穆將學中食忘飱譙周研精欣然獨笑張華四海之内若指諸掌班固百家之言無不窮究文學部講論浩虚舟解議圍賦王子猷之延賔暇時偶切磋於經史遂交戰於言詞出竒而彼力方壯向敵而吾矛莫持阻辨口而不通去來都絶閉赤城之深固中外生疑既而謝婦側聆翠帷潛至察攻討之餘勢知勝敗之有自情甲遂闢縱堂上之竒兵靈府忽開出身中之利器是用自伐期乎不爭因漁獵之近習得籌謀之至精縱吟嘯為鼔鼙之雄倍增其勇察顔色為風雲之候暗識其情俄執訊於折角將犒師於重席驗運輸而經笥不窮察苞裹而智囊猶積是以扞格斯闢書文必同逆無不服滯無不通義櫓罷持倒載於德車之上仁寳悉獲横行於王道之中故得學海長清言讎不起百家咸湊其軌轍六籍各分其疆理文學部文章晉陸機文賦佇中區以𤣥覽頥情志於典墳遵四時以歎逝瞻萬物而思紛悲落葉於勁秋喜柔條於芳春心懍懍以懷霜志眇𦕈而臨雲詠世德之駿烈誦先人之清芬慨投篇而援筆聊宣之乎斯文其始也皆收視反聽耽思傍訊精騖八極心㳺萬仞其致也情曈曨而彌鮮物昭晳而互進傾羣言之瀝液漱六藝之芳潤浮天淵以安流濯下泉而潛浸於是沈辭怫悦若㳺魚銜鈎而出重淵之深浮藻聨翩若翰鳥纓繳而墜曾雲之峻收百世之闕文探千載之遺韻謝朝華於已披啟夕秀於未振觀古今於須㬰撫四海於一瞬然後選義按部考辭就班藏景者咸叩懷響者畢彈或因枝以振葉或縁波而討源或本隱以之顯或求易而得難或虎變而獸擾或龍見而鳥瀾或妥帖而易施或齟齬而不安罄澄心以凝思眇衆慮而為言籠天地於形内挫萬物於筆端伊兹事之可樂固聖賢之所欽課虚無以責有叩寂寞而求音函緜邈於尺素吐滂霈乎寸心言恢之而彌廣思按之而愈深播芳蕤之馥馥發清條之森森粲風飛而猋豎鬱雲起乎翰林故夫夸目者尚奢惬心者貴當言窮者無隘論達者唯曠詩縁情而綺靡賦體物而瀏亮碑披文以相質誄纒綿而悽愴銘博約而温潤箴頓挫而清壯頌優㳺以彬蔚論精微而朗暢奏平徹以閑雅説煒曄而譎誑雖區分之在茲亦禁邪而制放要辭逹而理舉故無取乎冗長其為物也多姿其為體也屢遷其㑹意也尚巧其遣言也貴妍曁音聲之迭代若五色之相宣或仰逼於先條或俯侵於後章或辭害而理比或言順而義妨離之則雙羙合之則兩傷考殿最乎錙銖定去留於毫芒立片言以居要乃一篇之警策雖衆辭之有條必待茲而效績亮功多而累寡故取足而不易或藻思綺合清麗芊眠爛若縟繡悽若繁絃必所擬之不殊乃闇合乎曩篇雖杼軸於予懷怵他人之我先茍傷㢘而愆義亦雖愛而必捐或苕發穎䜿離衆絶致形不可逐響難為係塊孤立而特峙非常音之所緯心牢落而無偶意徘徊而不能揥石韞玉而山輝水懷珠而川媚彼榛楛之勿翦亦蒙榮於集翠綴下里於白雪吾亦濟夫所偉或托言於短韻對窮迹而孤興俯寂寞而無友仰寥廓而莫承譬偏絃之獨張含清唱而靡應或寄辭於瘁音言徒靡而弗華混妍蚩而成體累良質而為瑕象下管之偏疾故雖應而不和或遺理以存異徒尋虚以逐微言寡情而鮮愛辭浮漂而不歸猶絃幺而徽急故雖和而不悲或奔放以諧合務嘈囋而妖冶徒悦目而偶俗固聲髙而曲下寤防露與桑間又雖悲而不雅或清虚以婉約每除煩而去濫闕大羮之遺味同朱絃之清汜雖一唱而三歎固既雅而不豔若夫豐約之裁俯仰之形因宜適變曲有微情或言拙而喻巧或理樸而辭輕或襲故而彌新或沿濁而更清或覽之而必察或研之而後精譬猶舞者赴節以投袂歌者應弦而遣聲是盖輪扁所不得言亦非華説之所能精普辭條與文律良予膺之所服練世情之常尤識前修之所淑雖濬發於巧心或受嗤於拙目彼瓊敷與玉藻若中原之有菽同橐籥之罔窮與天地乎並育若夫應感之㑹通塞之紀來不可遏去不可止藏若影滅行猶響起思風發於胸臆言泉流於唇齒紛葳㽔以馺遝唯豪素之所擬文徽徽以溢目音泠泠而盈耳及其六情底滯志往神留兀若枯木豁若涸流覽營魂以探賾頓精爽而自求理翳翳而愈伏思軋軋其若抽是故或竭情而多悔或率意而寡尤雖兹物之在我非余力之所勠故時撫空懷而自惋吾未識夫開塞之所由伊兹文之為用固衆理之所因配霑潤於雲雨象變化乎鬼神被金石而德廣流管絃而日新杜甫寄李十二白詩昔年有狂客號爾謫仙人筆落驚風雨詩成泣鬼神聲名從此大汨没一朝伸文彩承殊渥流傳必絶倫龍舟移棹晚獸錦奪袍新白日來深殿清雲滿後塵乞歸優詔許遇我夙心親未負幽栖志兼全寵辱身劇談憐野逸嗜酒見天真醉舞梁園夜行歌泗水春才髙心不展道屈善無隣處士禰衡俊諸生原憲貧稻粱求未足薏苡謗何頻五嶺炎蒸地三危放逐臣幾年遭鵩鳥獨泣向麒麟蘇武先還漢黄公豈事秦楚筵辭醴日梁獄上書辰巳用當時法誰將此義陳老吟秋月下病起暮江濵莫怪恩波隔乗槎與問津王建寄上韓愈侍郎詩重登太學領儒流學浪詞鋒壓九州不以雄名殊野賤唯將直氣折王侯詠傷松桂青山痩取盡珠璣碧海愁序述異篇經總核鞭驅險句物先投碑文合遣貞魂謝史筆應令諂骨羞清俸探將還酒債黄金旋得起書樓客來擬設官人禮朝退多逢月下逰見向雲泉求住處若為知薦一生休羅隱感德叙懷寄上羅鄴王詩盛業𫝊家有寳刀况聞餘力更揮亳腰間印佩黄金重卷裏詩裁白雪髙宴罷嘉賔吟鳳藻獵廻諸將問龍韜分茅列土纔三十猶擬囘頭賭錦袍脉散源分歴幾朝縱然官宦只賔僚正憂末𣲖淪滄海忽見髙枝拂絳霄百萬貔貅趨玉帳三千賔客冠金貂良時難得吾宗少應念衰門久寂寥張子容贈司勲蕭郎中詩作相開黄閣為郎奏赤墀君臣道合體父子貴同時國以推賢答家無内舉疑鳳池真水鏡蘭省得華滋未睹風流日先聞所賦詩江山清謝朓花木媚丘遲吏部來何暮王言念在兹丹青無不可霖雨亦相期昔我投荒處孤烟望島夷羣鷗終日狎落葉數年悲漁父留歌詠江妃入興詞今將獻知已相感勿吾欺唐代宗答王縉詔卿之伯氏位歴先朝名髙希代抗行周雅長揖楚辭調六氣於終篇正五音於逸韻泉飛藻思雲散襟情詩家者流時論歸羙誦於人口久鬱文房歌以國風宜登樂府眎朝之後乙夜將觀石室所藏殁而不朽柏梁之㑹今也則亡乃眷棣華克成編録聲猷益茂歎息良深王勃上九成宫頌表臣聞帝機無朕道洽則時邕靈化不言功成則頌顯伏惟陛下體元纂極模神建隧棟梁三氣庭衝六合松軒夜警杳𠖇姑射之心茅殿晨凝寥廓峒山之駕臣霑風太上庇影華胥仰衢室而無階候襄城而有地雖望卑平叔空勤景福之詞而文謝子雲願竭甘泉之思謹憑天造輒貢九成宫頌二十四章攀紫墀而絶望呌丹闕而累息李嶠謝撰德懿太子哀䇿文降勑褒揚表昨奉勑令臣撰懿德太子哀䇿文臣術異懷蛟藝非吞鳥四科函丈多謝於文學士子登筵有慙於詞賦恭聞聖旨輒奏庸音豈足以褒敘重離激揚三善宣睿慈之惻愴述天顧之綢繆曲降絲綸猥垂剪拂諭之以雲間日下方之以陸海潘江飾嫫母之容加其粉澤瑩碔砆之質發其光彩雖宋玉大言見褒於楚國公孫下策蒙賞於漢朝無以比此揄揚方斯恩渥欽戴紫紱伏銘𤣥造仰髙天而發悸顧短札而成羞唐李善進注文選表道光九野縟景緯以照臨德載八埏儼山川以錯峙垂象之文斯著含章之義聿宣協人靈以取則基化成而自逺故羲繩之前飛葛天之浩唱媧簧之後掞叢雲之奥詞步驟分途星躔殊建球鐘愈暢舞詠方滋楚國詞人御蘭芬於絶代漢朝才子綜鞶帨於遥年虚𤣥流正始之音氣質馳建安之體長離北度騰雅詠於圭隂化龍東騖煽風流於江左爰逮有梁宏材彌劭昭明太子業膺守器譽貞問寢居肅成而講藝開博望以招賢搴中葉之詞林酌前修之筆海周廵緜嶠品盈尺之珍楚望長瀾比徑寸之寳故撰斯一集名曰文選後俊英髦咸資凖的伏惟陛下經緯成德文思垂風孰可撮壤崇山𨗳涓宗海臣蓬衡蕞品樗散陋姿汾河委筴夙非成誦崇山墜簡未議澄心握玩斯文載移凉燠有欣永日實昧通津故勉十舎之勞寄三餘之暇弋釣書部願言註輯殺青甫就輕用上聞敝帚自珍緘石知繆敢有塵於廣内庻無遺於小説庾信謝滕王集序啟伏覽制垂賜集序紫微懸映如傳闕里之書青鳥遥飛似送層城之璧若夫甘泉宫裏玉樹一叢𤣥武闕前明珠六寸不得譬此光芒方斯照燭有節有度即是能平八風愈昌愈髙殆欲去天三尺殿下雄才盖代逸氣横雲濟北顔淵闗西孔子譬其毫翰則風雨爭飛論其文采則魚龍百變蒲桃繞館新開碣石之宫修竹夾池始作睢陽之苑琉璃汎酒鸚鵡承杯鳳穴歌聲鸞林舞曲况復行雲逐雨廻雪隨風湖陽之尉既成為喜之因舂陵之侯便是積慶之地某本乏材用無多述作加以建業陽九劣免儒硎江陵百六幾從士隴至如殘編落簡並入塵埃赤軸青箱多從灰燼比年痾恙彌留光隂視息桑榆已逼蒲栁方衰不無秋氣之悲實有窮途之恨是以精采瞀亂頗同宋玉言辭蹇吃更甚揚雄一吟一咏其可知矣好事者不求知音者不用非有班超之志遂已棄筆未見陸機之文久同燒硯至於凋零之後殘缺所餘又已雜用補袍隨時覆醬聖慈憐愍遂垂存録始至揄揚過差君子失辭比擬從横小人迷惑荆玉抵鵲正恐輕用重寳龍淵削玉豈不徒勞神慮匠石廻顧朽材變於彫梁孫陽一言奔蹄成於駿馬故知假人延譽重於連城借人羽毛榮於尺玉溟池九萬里無踰此澤之深華山五千仞終愧斯恩之重即日金門細管未動春灰石壁輕雷尚藏冬蟄伏願聖躬與時納豫南陽寳雉幸足觀瞻酈縣菊泉差能延壽伏遲至鄴可期從梁有日同杞子之盟㑹必欲瞻仰風塵共薛侯而來朝謹當逢迎冠盖魚腹尺素鳳足數行書此謝辭終知不盡唐王勃上武侍極啟某聞𤣥螭掩耀光銷赤堇之芒白鶴摧輝影滅青胡之寳由是紫氛霄耿指牛漢而忘歸丹水神迷道驪泉而罔悔其有龍文已逺輕圗剸兕之功魚目濫持自疑靈虵之色循榮覽分朝聞夕可君侯締華椒閣席寵芝扄粲貂冕於金軒藻龜章於玉署月開鸞鏡懷精鑑以分形霜湛虬鐘蘊希聲而待物吞九溟於筆海若控牛涔抗五岳於詞鋒如臨蟻垤馳魂露谷忻逢紫岫之英驛思霞坵佇接青田之響某北巖曲藝東臯下節攀翰苑而思齊傃文風而立至迹疲千里未陪丹轂之逰葉契三英尚隔黄衣之夢謹憑洪貸輒録舊文輕敢上呈列之如右涓波有託望日谷以馳誠鐘鼓無施伏雷門而假息駱賔王上兖州刺史啟縟綺蕚於詞林綷仙花於筆苑文江翻浪織玉㶑以韜霞學海驚瀾綴珠連於濯錦李商隱為李貽孫上李德裕啟提枹於絶藝之塲班揚掃地鞠旅於無前之敵江鮑輿尸詞窮體物律變登髙文星留伏於筆間綵鳳翺翔於夢裏李商隱為舉人上翰林蕭侍郎啟當時人物何戢唯效於褚公邇日風流杜乂難方於衛玠加以𢎞成與石郭璞𫝊毫渙水儻來皆逢藻繪荆峰若至只有球琳合沓縑緗縱横筆硯三都作序不勞皇甫士安萬乗為僚只有東方曼倩温庭筠上鹽鐵侍郎啟素勵顓䝉常耽比興未逢仁祖誰知風月之情因夢惠連或得池塘之句莫不𠖇搜刻骨黙想勞神未嫌彭澤之車不歎萊蕪之甑其或嚴霜墜葉孤月離雲片席飄然方思獨往空亭悄爾不廢閒吟强將麋鹿之情欲學鴛鴦之性遂使幽蘭九畹傷謡諑之情多丹桂一枝竟攀援之路斷梁簡文與湘東王論文書握瑜懷玉之士瞻鄭邦而知退章甫翠履之人望閩鄉而歎息詩既若此筆又如之徒以煙墨不言受其驅染紙札無情任其揺襞甚矣哉文之横流一至於此徐陵與李那書獲殷公所借陪駕纔南入重陽閤詩及荆州大乗寺宜陽石像碑四首鏗鏘並奏能驚趙鞅之魂輝煥相華時瞬安豐之眼山澤晻靄竹松參差若見三峻之峯依然四皓之廟甘泉鹵簿盡在清文扶風輦路悉陳華簡昔魏武虚帳韓王故臺自古文人皆為詞賦未有登茲舊閣歎兹幽宫標句清新發言哀斷豈止悲聞帝瑟泣望羊碑一詠歌梁之言便掩盈懐之淚至如披文相質意致縱横才壯風雲義深淵海方今二乗斯悟同免化城六道知歸皆踰火宅宜陽縣名之作特㑹幽襟所覩黄絹之詞彌懐白雲之頌但恨賒逺擅特髙峰閒上羅浮康公懸溜不獲銘兹雅頌耀彼幽巖循環諷詠用忘飢渴握之不置恒如趙璧翫之不足同於玉枕京師長者好事才人争造蓬門請觀髙製軒車滿路如看太學之碑街巷相填無異華隂之市但豐城兩劒尚不阻來韓子雙環必皆希見莫不以好龍無别木雁可嗤載望瓊瑶因乏行李金風已勁玉質宜調書不盡言但聞爻繫李那答書僕世傳經術才謝劉歆家有賜書學匪班嗣弱年有志頻愛雕蟲歲月三餘無㤀肄業户牖之間時安筆硯嚬睂難巧學步非工恒經牧孺之譏屢被陳思之誚羞逢仲子類君山之鼓琴屢見子將同本初之車服不謂殷侯虚談成價遂同布鼓輕響雷門燕石空雕終慙比德楚軍雖拂實愧棲桐豈若邯鄲舉袖唯聞變曲協律飛塵必應不顧是以日南寳貝遥望歸秦合浦文犀更希還漢芳春行獻鸎其鳴矣懸豫章之床置長安之驛厚築墻垣思逢鄭僑之聘工歌周頌佇奏延陵之樂書繒有復道意無伸梁簡文帝答張纘謝示集纘好文章於今二十五載矣竊嘗論之日月參辰火龍黼黻尚且著於𤣥象章於人事而況文辭可止詠歌可輟乎不為壯夫揚雄實小言破道非謂君子曹植亦小辨破言論之科刑罪在不赦至如春庭落景轉蕙承風秋雨且晴檐梧初下浮雲生野明月入樓時命親賔乍動嚴駕􅟴璖屢酌鸚鵡驟傾伊昔三邊久留四載胡霧連天征旗拂日時聞塢笛遥聴塞笳或鄉思悽然或雄心噴薄是以沈吟短翰補綴庸音寓目寫心因事而作又答新渝侯和詩書垂示三首風雲吐於行間珠玉生於字裏跨躡曹左含超潘陸雙鬢向光風流已絶九梁插花步揺為古髙樓懐怨結眉表色長門下泣破粉成㾗復有影裏細腰令與真類鏡中好面還將畫等此皆性情卓絶新致英奇故知吹簫入秦方識來鳳之巧鳴瑟向趙始覩駐雲之曲手持口誦喜荷交并也周庾信趙國公集序竊聞平陽擊石山谷為之調大禹吹筠風雲為之動與夫含吐性靈抑揚詞氣曲變陽春光廻白日豈得同年而語哉柱國趙國公發言為論下筆成章逸態横生新情振起風雨争飛魚龍各變方之珪璧塗山之㑹萬重譬似雲霞赤城之巖千丈文參厯象即入天官之書韻涉絲桐咸歸總章之觀論其壯也則鵬起半天語其細也則鷦巢蚊睫豈直熊熊旦上增城抱日月之光燄燄宵飛南斗燭蛟龍之氣昔者屈原宋玉始於哀怨之深蘇武李陵生於别離之世自魏建安之末晉太康以來雕蟲篆刻其體三變人人自謂握靈蛇之珠抱荆山之玉矣公斟酌雅頌諧和律吕若使言乖節目則曲臺不顧聲止操縵則成均無取遂得棟梁文囿冠冕詞林大雅扶輪小山承盖梁劉孝綽昭明太子集序編綈緗於七閣彈竹素於九流於是淹中稷下之生金華石渠之士莫不過衢樽而挹多少見斗極而曉西東屬文之體鮮能周備長卿徒善既累為遲少孺雖疾俳優而已子淵淫靡若女工之蠧子雲侈靡異詩人之則孔璋詞賦曹祖勸其修今伯喈答贈摯虞知其頗古孟堅之頌尚有似贊之譏士衡之碑猶聞類賦之貶深乎文者兼而善之能使典而不野逺而不放麗而不淫約而不儉獨擅衆羙斯文在斯楊烱王勃集序先鳴楚舘孤峙齊宫乗忌側目應劉失步於是鼓舞其心發洩其用八埏馳騁於思緒萬代出沒於毫端契將往而必融防未來而先制動揺文律宫商有奔命之勞沃蕩詞源河海無息肩之地以兹偉鑒取其雄伯壯而不虚剛而能潤雕而不碎按而彌堅大則用之以時小則施之有序徒縱横以取勢非鼔怒以為資長風一振衆萌自偃遂使繁綜淺術無籓籬之固粉繪小才失金湯之險積年綺碎一朝清廓翰苑豁如辭林増峻反諸宏博君之力焉於是窮蓍蔡以象告考爻彖以情言既乗理而得𤣥亦研精而徇道虞仲翔之盡思徒見三爻韓康伯之成功僅踰兩繫君之所注見光前古與夫發天地之秘藏知鬼神之情狀者合其心矣陳羣稟太丘之訓時不逮焉孔伋𫝊司冦之文彼何功矣晉書機雲𫝊論髙詞逈映如朗月之懸光疉意廻舒若重巖之積秀千條析理則電折霜開一緒連文則珠流璧合其詞深而雅其義博而顯故足逺超枚馬髙躡王劉百代文宗一人而已沈約謝靈運傳論周室既衰風流彌著屈平宋玉𨗳清源於前賈誼相如振芳塵於後英辭潤金石髙義薄雲天自兹以降情志愈廣王褒劉向揚班崔蔡之徒異軌同奔遞相師祖雖清辭麗曲時發乎篇而蕪音累氣固亦多矣若夫平子豔發文以情變絶唱髙蹤久無嗣響至於建安曹氏基命三祖陳王咸蓄盛藻甫乃以情緯物以文被質自漢至魏四百餘年辭人才子文體三變相如工為形似之言二班長於情理之説子建仲宣以氣質為體並標能擅羙獨映當時是以一世之士各相慕習原其飈流所始莫不同祖風騷徒以賞好異情故意製相詭降及元康潘陸特秀律異班賈體變曹王縟旨星稠䌓文綺合綴平臺之逸響采南皮之髙韻遺風餘烈事極江右在晉中興𤣥風獨扇為學窮於柱下博物止乎七篇馳騁文辭義殫於此自建武暨於義熈歴載將百雖比響聨辭波屬雲委莫不寄言上德託意𤣥珠遒麗之辭無聞焉耳仲文始革孫許之風叔源大變太元之氣爰逮宋氏顔謝騰聲靈運之興㑹標舉延年之體裁明宻並方軌前秀垂範後昆若夫敷衽論心商榷前藻工拙之數如有可言夫五色相宣八音協暢由乎𤣥黄律吕各適物宜欲使宫羽相變低昂舛節若前有浮聲則後須切響一簡之内音韻盡殊兩句之中輕重悉異妙達此旨始可言文至於先士茂制諷髙歴賞子建函京之作仲宣灞岸之篇子荆零雨之章正長朔風之句並直舉胷情非傍詩史正以音律調韻取髙前式自靈均以來多歴年代雖文體稍精而此秘未覩至於髙言妙句音韻天成皆暗與理合匪由思至張蔡曹王曾無先覺潘陸顔謝去之彌逺世之知音者有以得之此言非謬劉勰文心雕龍原道自鳥跡代繩文字始炳炎皥遺事紀在三墳而年世渺邈聲采靡追唐虞文章則煥乎始盛元首載歌既發吟咏之志益稷陳謨亦垂敷奏之風夏后氏興業峻鴻績九敘惟歌勲德彌縟逮及商周文勝其質雅頌所被英華日新文王憂患繇音宙辭炳曜符采複隱精意艱深重以公旦多材振其徽烈剬音端詩緝頌斧藻羣言至夫子繼聖獨秀前哲鎔鈞六經必金聲而玉振雕琢情性組織辭令木鐸起而千里應席珍流而萬世響寫天地之輝光曉斯民之耳目矣詮賦觀夫荀結隱語事數自環宋發巧譚實始淫麗枚乗兎園舉要以㑹新相如上林繁類以成豔賈誼鵩鳥致辨於情理子淵洞簫窮變於聲貌孟堅兩都明絢以雅贍張衡二京迅發以宏富子雲甘泉構深瑋之風延夀靈光合飛動之勢凡此十家並詞賦之流也及仲宣靡宻發端必遒偉長博通時逢壯采太冲安仁䇿勲於鴻規士衡子安底績於流制景純綺巧縟理有餘彦伯梗槩情韻不匱亦晉魏之賦首也頌讚原夫頌惟典雅辭必精鑠敷寫似賦而不入華侈之區敬慎如銘而異乎規戒之域揄揚以發藻汪洋以樹義容體底煩勲業垂讃鏤影螭文聲理有爛年積逾逺音徽如旦降及品物炫辭作翫祝盟漢之羣祀肅其㫖禮既總碩儒之儀亦參方士之術所以秘祝移過異於成湯之心侲真子毆疫同於越巫之祝誄碑論其人也曖乎若可覿道其哀也悽焉如可傷寫實追虚碑誄以立銘德慕行文采允集觀風似面聽詞如泣石墨鐫華頹影豈忒哀弔必使情性㑹悲文采引泣乃其貴耳諧隱華元棄甲城者發睅目之謳臧紇喪師國人造侏儒之歌並嗤戲形貌内怨為俳也又蠶蠏鄙諺貍首淫哇茍可箴戒載於禮典故知諧詞隱言亦無棄矣昔還社求拯於楚師喻眢井而稱麥麴叔儀乞糧於魯人歌被玉而呼庚癸伍舉刺荆王以大鳥齊客譏薛公以海魚莊姬托辭於龍尾臧文謬書於羊裘詔䇿故兩漢詔誥職在尚書王言之大動入史䇿其出如綍不反若汗是淮南有英才武帝使相如視草隴右多文士光武加意於文書是豈直取羙當時亦敬慎來葉矣夫王言崇秘大觀在上所以百辟其刑萬邦作孚故授官選賢則義炳重離之輝優文封策則氣含風雨之潤敕戒恒誥則筆吐星漢之華治戎爕伐則聲有荐雷之威𤯝灾肆赦則文有春露之滋明罰勑法則辭有秋霜之烈此詔䇿之大畧也檄移夫兵以定亂莫敢自專天子親戎則稱恭行天罰諸侯御師則云肅將王誅故分閫推轂奉詞罰罪非惟致果為毅亦且厲辭為武使聲如衝風所擊氣似欃槍所掃奮其武怒總其罪人懲其惡稔之時顯其貫盈之數揺姦宄之膽訂信慎之心使百尺之衝摧折於咫書萬雉之城顛墜於一檄者也凡檄之大體或述此休明或敘彼苛虐指天時審人事筭强弱角權勢標蓍龜於前騐懸鞶鑑於已然雖本國信實參兵詐譎詭以馳旨煒曄以騰説凡此衆條莫或違之者也封禪茲文為用盖一代之典章也構位之始宜明大體樹骨於訓典之區選言於宏富之路使意古而不晦於深文今而不墜於淺義吐光鋩辭成㢘鍔則為偉矣章表左雄奏議臺閣為式胡廣章奏天下第一奏啟後之彈事迭相斟酌惟新日用而舊凖弗差然函人欲全矢人欲傷術在紏惡勢必深峭詩刺讒人投畀豺虎禮疾無禮方之鸚猩墨翟非儒目以豕彘孟軻譏墨比諸禽獸詩禮儒墨既其如茲奏劾嚴文孰云能免是以世人為文競於詆訶吹毛取瑕次骨為戾復似善罵多失折衷若能濶禮門以懸規標義路以植矩然後踰垣者折肱捷徑者滅趾何必躁言醜句詬病為功哉是以立範運衡宜明體要必使理有典刑辭有風軌總法家之式秉儒家之文不畏强禦氣流墨中無縱詭隨聲動簡外乃絶稱席之雄直方之舉耳議對夫動先擬議明用稽疑所以敬慎羣務弛張治術故其大體所資必樞紐經典採故實於前代觀通變於當今理不謬揺其枝字不妄舒其藻又郊祀必洞於禮戎事必練於兵佃穀先曉於農斷訟務精於律然後標以顯義約以正辭文以辨潔為能不以繁縟為巧事以明覈為羙不以深隱為奇此綱領之大要也若不達政體而舞筆弄文支離構辭穿鑿㑹巧苟空騁其華固為事實所擯設得其理亦為㳺辭所埋昔秦女嫁晉從文衣之媵晉人貴媵而賤女楚珠鬻鄭為薫桂之櫝鄭人買櫝而還珠若文浮於理末勝其本則秦女楚珠復在於兹矣漢飲博士而雉集乎堂晉䇿秀才而麏興於前無他怪也選失之異耳書記詳總書體本在盡言言以散鬱陶託風采故宜條暢以任氣優柔以懌懐文明從容亦心聲之獻酬也意少一字則義闕句長一言則辭妨才冠鴻筆多踈尺牘譬九方歅之識駿足而不知毛色牝牡也言既身文信亦邦瑞翰林之士思理實焉神思全古人云形在江海之上心存魏闕之下神思之謂也文之思也其神逺矣故寂然凝慮思接千載悄焉動容視通萬里吟咏之間吐納珠玉之聲眉睫之前卷舒風雲之色其思理之致乎故思理為妙神與物㳺神居胸臆而志氣統其闗鍵物沿耳目而辭令管其樞機樞機方通則物無隱貌闗鍵將塞則神有遯心是以鈞陶文思貴在虚静䟽瀹五藏澡雪精神積學以儲寳酌理以富才研閱以窮照馴致以懌辭然後使𤣥解之宰尋聲律而定墨獨照之匠闚意象而運斤此盖馭文之首術謀篇之大端夫神思方運萬途競萌規矩虚位刻鏤無形登山則情滿於山觀海則意溢於海我才之多少將與風雲而並驅矣方其搦翰氣倍詞前暨乎篇成半折心始何則意翻空而易奇言徴實而難巧也是以意授於思言授於意宻則無際踈則千里或理在方寸而求之域表或義在咫尺而思隔山河是以秉心養術無務苦慮合章司契不必勞情也人之稟才遲速異分文之制體大小殊功相如含筆而腐毫揚雄輟翰而驚夢桓譚疾感於苦思王充氣竭於思慮張衡研京以十年左思練都以一紀雖有巨文亦思之緩也淮南崇朝而賦騷枚臯應詔而成賦子建援牘如口誦仲宣舉筆似㝛構阮瑀據案而制書禰衡當食而草奏雖有短篇亦思之速也若夫駿發之士心總要術敏在慮前應機立斷覃思之人情饒岐路鑒在疑後研慮方定機敏故造次而成功慮疑故愈久而致績難易雖殊並資博練若學淺而空遲才踈而徒速以斯成器未之前聞是以臨篇綴慮必有二患理鬱者苦貧辭溺者傷亂然則博聞為饋貧之糧貫一為拯亂之藥博而能一亦有助乎心力矣若情數詭襍體變遷貿拙辭或孕於巧義庸事或萌於新意視布於麻雖云未費杼軸獻功煥然乃珍至於思表纎旨文外曲致言所不追筆固知止至精而後闡其妙至變而後通其數伊摯不能言鼎輪扁不能語斤其微矣乎體性是以賈生駿發故文潔而體清長卿傲誕故理侈而辭溢子雲沈寂故志隱而味深子政簡易故趣昭而事博孟堅雅懿故裁宻而思靡平子淹通故慮周而藻宻仲宣躁鋭故頴出而才果公幹氣褊故言壯而情駭嗣宗俶儻故響逸而調逺叔夜儁俠故興髙而采烈安仁輕敏故鋒發而韻流士衡重矜故情繁而辭隱觸類以推表裏必符風骨全詩總六義風貫其首斯乃化感之本原志氣之符契也是以怊悵述情必始乎風沉吟鋪辭莫先於骨故辭之待骨如體之樹骸情之含風猶形之包氣結言端直則文骨成焉意氣駿爽則文風清焉若豐藻充贍風骨不飛則振采失鮮負聲無力是以綴慮裁篇務盈守氣剛健既實輝光乃新其為文用譬征鳥之使翼也故練於骨者析辭必精深乎風者述情必顯捶朶字堅而難移結響凝而不滯此風骨之力也若瘠義肥辭繁雜失統則無骨之徴也思不環周索莫乏氣則無風之騐也昔潘朂錫魏思摹經典羣才韜筆乃其骨髓峻也相如賦仙氣號凌雲蔚為詞宗乃其風力遒也能鑒斯要可以定文茲術或違無務繁采故魏文稱文以氣為主氣之清濁有體不可力强而致故其論孔融則云氣體髙妙論徐幹則云時有齊氣論劉楨則云時有逸氣公幹亦云孔氏卓卓信含異氣筆墨之性殆不可勝並重氣之旨也夫翬輝翟備色翾緩翥百步肌豐而力沉也鷹隼乏彩翰飛戾天骨勁而氣猛也文章力才有似於此若風骨乏采則鷙集翰林采乏風骨則雉竄文囿惟藻耀而髙翔固文筆之鳴鳳也若夫鎔鑄經典之範翔集子史之術洞曉情變曲昭文體然後能孚甲新意雕畫奇辭昭體故意新而不亂曉變故辭奇而不黷若骨采未圓風辭未練而跨畧舊規馳騖新作雖獲巧意危敗亦多豈空結奇字紕繆而成輕矣周書云辭尚體要弗惟好異盖防文濫也然文術多門各適所好明者弗授學者弗師於是習華隨侈流遁㤀反若能確乎正式使文明以健則風清骨峻篇體光華能研諸慮何逺之有哉通變確而論之則黄唐淳而質虞夏質而辨商周麗而雅楚漢侈而豔魏晉淺而綺宋初訛而新從質及訛彌近彌淡何則競今踈古風味氣衰也今才穎之士刻意學文多畧漢篇師範宋集雖古今偹閱然近附而逺踈矣夫青生於藍絳生於蒨雖踰本色不能復化桓君山云予見新進麗文羙而無採及見劉揚言辭常輒有得此其騐也故練青濯錦必歸藍蒨矯訛翻淺還宗經誥斯斟酌乎文質之間而隱括乎雅俗之際可與言變通矣采如宛鴻之奮鬐光若長離之振翼乃穎脱之文矣若乃齷齪於偏解矜激乎一致此庭間之廻驟豈萬里之逸步哉定勢勢者乗利而為制也如機發矢直澗曲湍囬自然之趣也漪水不激槁木無陰情采全聖賢書辭總稱文章非采而何夫水性虚而淪漪結木體實而花蕚振文附質也虎豹無文則鞹同犬羊犀兕有皮而色資丹漆質待文也若乃綜述性靈敷寫氣象鏤心鳥跡之中織辭魚網之上其為彪炳縟采名矣故立文之道其理有三一曰形文五色是也二曰聲文五音是也三曰情文五性是也五色雜而成黼黻五音比而成韶夏五情發而為辭章神理之數也孝經垂典喪言不文故知君子常言未嘗質也老子疾偽故稱羙言不信而五千精妙則非棄羙矣莊周云辨雕萬物謂藻餙也韓非云豔采辨説謂綺麗也綺麗以豔説藻飾以辨雕文辭之變於斯極矣研味孝老則知文質附乎性情詳覽莊韓則見華實過乎淫侈若擇源於涇渭之流按轡於邪正之路亦可以馭文采矣夫鉛黛所以飾容而盼倩生於淑姿文采所以飾言而辨麗本於情性故情者文之經辭者理之緯經正而後緯成理定而後辭暢此立文之本源也昔者詩人什篇為情而造文辭人賦頌為文而造情何以明其然盖風雅之興志思蓄憤而吟咏情性以諷其上此為情而造文也諸子之徒心非鬱陶茍馳夸飾鬻聲釣世此為文而造情也故為情者要約而寫真為文者淫麗而煩濫而後之作者採濫忽真逺棄風雅近師辭賦故體情之製日踈逐文之篇愈盛故有志深軒冕而汎詠臯壤心纒幾務而虚述人外真宰弗存翩其反矣夫桃李不言而成蹊有實存也男子樹蘭而不芳無其情也夫以草木之微依情待實況乎文章述志為本言與志反文豈足徵是以聨詞結采將欲明經采濫詞詭則心理愈翳固知翠綸桂餌反所以失魚言隱榮華殆謂此也是以衣錦褧衣惡文太章賁象窮白貴乎反本夫能設模以位理擬地以置心心定而後結音理正而後摛藻使文不滅質博不溺心正采耀乎朱藍間色屏於紅紫乃可謂雕琢其章彬彬君子矣鎔裁規範本體謂之鎔剪截浮詞謂之裁裁則蕪穢不生鎔則綱領昭暢凡思緒初發辭采苦雜心非權衡勢必輕重是以草剏鴻筆先標三凖履端於始則設情以位體舉正於中則酌事以取類歸餘於終則撮辭以舉要思贍者善敷才覈者善刪善刪者事去而意留善敷者辭殊而意顯昔謝艾王濟西河文士張駿以為艾繁而不可刪濟畧而不可益若二子者可謂鍊鎔裁而曉繁畧矣聲律古之教歌先揆以法使疾呼中宫徐呼中徵夫商徵響髙宫羽聲下抗喉矯舌之差攅唇激齒之異㢘肉相凖皎然可分今操瑟不調必知改張摘文乖張而不識所調響在彼絃乃得克諧聲萌我心更失和律其故何哉良由内聴難為聰也故外聴之易絃以手定内聴之難心與聲紛可以數求難以辭逐凡聲有飛沈響有雙疉雙聲隔字而每舛疉韻雜句而必暌沈則響發而斷飛則聲颺不還並轆轤交往逆鱗相比迂其際㑹則往蹇來連亦文家之吃也章句其控引情理送往際㑹譬舞容廻環而有綴兆之位歌聲靡曼而有抗墜之節也尋詩人擬喻雖斷章取義然章句在篇如繭之抽緒原始要終體必鱗次啟行之辭逆萌中篇之意絶筆之言追勝前句之旨故能外文綺交内義脉注跗蕚相銜首尾一體若辭失其明則羈旅而無友事乖其次則飄寓而不安夸飾是以言峻則嵩髙極天論狹則河不容舠説多則子孫千億稱少則民靡孑遺襄陵舉滔天之目倒戈立漂杵之論辭雖已甚其義無害也且夫鴞音之醜豈有泮林而變好荼味之苦寜以周原而成飴並意深褒讃故義成矯飾大聖所錄以垂憲章孟軻云説詩者不以文害辭不以辭害志也自宋玉景差夸飾始盛相如憑風詭濫愈甚故上林之舘奔星與宛虹入軒從禽之盛飛㢘與鷦鷯俱獲又子雲校獵鞭宓妃以饟屈原張衡羽獵困𤣥冥於朔野孌彼洛神既非魑魅惟此水怪亦非魍魎而虚用濫形不其踈乎事類故魏武稱張子之文為拙然學問膚淺所見不博專拾掇崔杜小文所作不可悉難難便不知所出斯則寡聞之病也夫經典沉深載籍浩瀚實羣言之奥區而才思之神臯也揚班以下莫不取資任力耕耨縱意漁獵操刀能割必列膏腴是以將贍才力務在博見狐腋非一皮能溫雞蹠必數千而飽矣故事得其要雖小成績譬寸轄制輪尺樞運闗也或微言羙事置於閒散是綴金翠於足脛靚粉黛於胸臆也養氣若夫器分有限智用無涯或慚鳬企鶴瀝辭鐫思於是精氣内銷有似尾閭之波神志外傷同乎牛山之木怛惕之盛疾亦可推矣至如仲任置研以綜述叔通懷筆以專業既暄之以嵗序又煎之以日時是以曹公懼為文之傷命陸雲歎用思之困神非虛談也夫學業在勤故有錐股自勵至於文也則申寫鬱滯故宜從容率情優柔適㑹若銷鑠精膽蹙迫和氣秉牘以驅齡灑翰以伐性豈聖賢之素心㑹文之直理哉且夫思有利鈍時有通塞沐則心覆且或反常神之方昏再三愈黷是以吐納文藝務在節宣清和其心調暢其氣煩而即捨勿使壅滯意得則舒懷以命筆理伏則投筆以卷懷逍遥以針勞譚笑以藥倦常弄閒於才鋒賈餘於文勇使刃發如新湊理無滯雖非胎息之邁術斯亦衛氣之一方也附㑹是以四牡異力而六轡如琴馭文之法有似於此去留在心修短在手齊其步驟總轡而已故善附者異㫖如肝膽拙㑹者同音如胡越改章難於造篇易字艱於代句此已然之騐也昔張湯疑奏而再却虞松草表而履譴並理事之不明而辭旨之失調也及倪寛更草鍾㑹易字而漢武歎奇晉景稱善者乃理得而事明心敏而辭富也物色是以詩人感物聨類不窮流連萬象之際沈吟視聴之區寫氣圖貌既隨物以宛轉屬采附聲亦與心而徘徊故灼灼狀桃花之鮮依依盡楊栁之貌杲杲為出日之容瀌瀌擬雨雪之狀喈喈逐黄鳥之聲喓喓學草蟲之韻皎日嘒星一言窮理參差沃若兩字連形並以少總多情貌無遺矣雖復思經千載將何易奪及離騷代興觸類而長物貌難盡故重㳫舒狀於是嵯峨之類聚葳㽔之羣積矣及長卿之徒詭勢瓌聲模山範水字必魚貫所謂詩人麗則而約言辭人淫麗而繁句也山㳫水匝樹雜雲合日既往還心亦吐納春日遲遲秋風颯颯情往似贈興來如答文學部書問劉褘之酬鄭沁州詩麒閣一代良熊軒千里躅緝圖昭國典按部留宸矚匪厭承明廬佇兼司隸局芸書暫輟載行使方臨俗節變風緒髙秋深露華溽寒山歛輕靄霽野澄初旭已覺長年悲誰堪岐路促遥林征馬迅别舘嘶驂跼雅贈響摐金索居暌倚玉悽斷離鴻引勞歌思足曲楊烱和酬虢州李司法詩唇齒標形勝闗河壯邑居寒山抵方伯秋水面鴻臚君子從逰宦忘情任卷舒風霜下刀筆軒盖擁門閭平野芸黄遍長洲鴻雁初菊花宜泛酒蒲葉好裁書昔我芝蘭契悠然雲雨踈非君重千里誰肻惠雙魚李白代佳人寄翁參樞先輩詩等閒經夏復經寒夢裏驚嗟豈暫安南國風光當世少西陵波浪過江難周旋小字挑燈讀重疉遥山隔霧看直是為君飡不得書來莫説更加飡劉長卿奉寄婺州李使君舎人詩建隼罷鳴珂初傳來暮歌漁樵識太古草樹得陽和東道諸生從南依逺客過天清婺女出土厚絳人多永日空相望流年復幾何崖開當夕照葉去逐寒波眼闇經難受身閒劍懶磨似鵩占賈誼上馬識㢘頗窮分安藜藿衰容稱薜蘿只應隨越鳥南翥託髙柯包佶酬于侍郎湖南見寄詩桂嶺千崖斷湘江一派通長沙今賈傅東海舊于公章甫經殊俗離騷繼雅風金閨文作字玉匣氣成虹翰墨時無侣丹青夙在工主恩留左掖人望積南宫巧拙循名異浮沉顧位同九遷歸上畧三已契愚衷責謝庭中吏悲寛塞上翁楚材欣有適燕石愧無功山曉重嵐外林春若霧中雪花翻海鶴波影倒江楓去札頻逢信廽帆早挂空避賢方有日非敢愛微躬周賀投江州張郎中詩要地無閒日仍容冒謁頻借山年涉閏寝郡月踰旬驛徑曾衝雪公泉省滌塵隨行溪路細接話草堂新減藥痊餘癖飛書問苦貧噪蟬離宿殻吟客寄秋身鍊句盈箱箧懸圖視蜀閩静居匡阜近終作社中人崔峒書情寄上蘇州韋使君兼呈吳縣李明府詩數年湖上謝浮名竹杖紗巾遂性情雲外有時逢寺宿日西無事傍江行陶潛縣裏看花發庾亮樓中對月明誰念獻書來萬里君王深在九重城梁簡文帝與劉孝綽書執别灞滻嗣音沮濶合璧不停旋灰屢徙玉霜夜下旅雁晨飛想凉燠得宜時候無爽既官寺務煩簿領殷湊等張釋之條理同于公之明察雕龍之才本博靈虵之譽自髙頗得暇逸於篇章從容於文諷頃擁旄西邁載離寒暑曉河未落拂桂棹而先征夕鳥歸林懸孤帆而未息足使邊心憤薄鄉思邅廻但離濶已久載勞寤寐行聞還驛以慰相思又答湘東王書暮春羙景風雲韶麗蘭葉堪齅沂水可浴苐邵南寡訟時輟甘棠之隂冀州為政暫止褰襜之務唐景薦大言之賦安汰述連環之辯盡逰玩之羙致足樂乎吾春初卧疾極成委弊雖西山白鹿懼不能愈子預赤丸尚憂未振髙卧六安每思扁鵲之問静然四屋念絶修都之香皇上慈被率土甘露聿宣鳴銀鼓於寳坊轉金輪於香地法雷驚夢惠日暉朝道俗輻湊逺近畢集獨以疾障致隔聞道豈止楊僕有闗外之傷周南起留滯之恨又與蕭臨川書零雨送秋輕寒迎節江楓曉落林葉初黄登舟玉河一作已積殊足勞止解維金闗定在何日八區内侍厭直御史之廬九棘外府且息官曹之務應分竹南川剖符千里但黑水初旋未申十千之飲桂宫既啟復乖雙闕之宴文雅縱横即事分阻清夜西園𦕈然未克想征艫而結歎望桂席而霑襟若使𢎞農書疏脱還鄴下河南口占儻歸鄉里必遲青泥之封且觀朱明之詩白雲在天蒼波無極瞻言岐路眷慨良深愛䕶波潮敬朂光彩李嶠與雍州崔錄事司馬錄事書伏惟公等思侔天假道合神契清襟與秋水俱映縟藻共春葩競發風雲感其聲律牆仞深其閫奥羽陵湘簡遥開博綜之門洞庭金石近入鏗鏘之韻固以重規坐右連華史筆深思匠之真筌畢文心之能事嶠學術蕪淺才藝寡薄弓冶遺業獨事斯文而衣冠後進多慙接武頃以三餘暇景四時風月斗酒娛樂嚶鳴感召春還江北時興楚客之謡木落淮南乍動潘生之思有同狂簡無近雅什不意頻降德音猥垂訪逮恭承嘉惠揣摹虚寡鑒淄水而慙容遵壽陵而恧步但以螢燭光耀尚增輝於暘谷畎澮微流且朝宗於水府敢縁斯義上呈如别大夫攄思空擬登髙小子裁章顧羞調下又上廵察覆囚使歴城張明府書伏冀晰鑒蘭苖綴思茅茹俾夫集螢收曜攀若華而翳景射鮒堙流泝扶津而飲液野籟叶編鐘之韻甘黎味和鼎之滋則樹李其緘反抛知執昔鯷濵據地抗嘉言於直指龍門蹈閫邀逺好於司隸兩賔不嫌於黷進二主無忤於歡接並雕芳憲序灼羙清流然則古之望今亦猶今之視昔矣投翰魄沮授簡心馳又上雍州髙長史書河陽春樹開四照於詞林洞庭秋水清九流於心鏡夫引往納來江海所以深廣損上益下乾坤所以光大是故虚已之求有屈位而伸道汎接之愛或開懷而受物若乃崇峻宫垣扄鑰閫奥使屬睇之目隔愈深而照窮仰止之心限彌髙而望絶仰賔以之失位篲客以之亡門將恐慕義之夫思為黄鶴之舉企景之客不作真龍之逰願君侯垂古人之風申國士之分假其白璧之契接以黄金之言不忽當年要之卒歲則重如熊掌府中饒取義之賔輕若鴻毛節下有徇生之士矣王勃上絳州上官司馬書下官者康衢之賤耳嘗聞闕里之言頗挂平輿之目豈不知塵形俗狀㳺水鏡而多慙枹鼓援鼙偶雷門而自失而欲刻鵠飾鳬唐突扄餘者邪徒以登山泛海庻測髙深執炬𫝊螢希增日月君侯極天分構振瓊樹而韜霞帶地疏源握珠胎而冠月鱗軒羽殿瑶臺降卿相之榮鵲印蟬簮金社發公侯之始青臯獨唳望鴻漸而翻霞丹穴髙鳴對鵷池而矯霧嚴助以賢良待詔未厭承明汲黯以方正拾遺終榮卧里藩維克振旣參來暮之歌邦國不空自有康沂之相加以雄材廣度散琬琰於胸懷逸氣遒文運風霜於掌握迫青㝠而構合煙霞之涯涘莫尋振滄渤以流謙江漢之波瀾未測耀靈桂於趙席垂棘知歸辨羣籟於莊軒懸匏自記賔階夕敞清河銷驥贄之虞虚榻晨披心禮得龍驅之地方當翊賛宸極羽儀台屏豈徒偃仰州縣勞事藩庭而已哉借如僕者言不滿於鄉黨聲不出於堂閾東海取樂於簞瓢南山畢志於文史飡花佩葉入蘭室而談𤣥挹露攀霞坐松扄而嘯逸揚子雲之澹泊心竊慕之嵇叔夜之逍遥真其好也未嘗露才揚已飾小智以驚愚假勢憑時託中人而樹迹遍逰天下寒心於將相之門獨守太𤣥側身於名利之境嘗謂奉琴巵於北牖詠詩禮於南陔坐商洛而折雲英臨江湖而採煙液生願畢矣而屬鸞扄停逸頻虚不次之階鶴板徵賢累發非常之詔天下有道吾豈匏𤓰承達人一顧之榮辱公車再辟之禮平津侯之博物終屈奉常賈大夫之才名猶逢絳灌况庸者而可免於此乎君侯要津先據圗海盛於當時下官覆簣方勤為山始於今日雖陵深谷變終非入室之賔而晝詠宵吟敢預升堂之列夫以幽明不測尺標見天下之心巨細相傾寸管合羲舒之度豈非道存斯貴理在必亨霸略近發於輿歌皇圗不隔於芻議故有榮枯絶等奉推轂而欣然年勢不侔受分庭而罔愧風規可接惟君侯體之今古未殊則下官願矣常恨霜松列澗萬尋無罩月之期露草滋山寸莖有梢雲之望斯則聲實困於兼濟才位難於俱立况乎地勢不足以誇俗容貌不足以動人遑遑藪澤安足以奉髙明之咳唾也所冀蠅階賤質附雲足而追飈蚋序輕姿託霜毛而絶海委名勵已蛟鐔申獨斷之能偶跡當仁驪珠鮮闇投之懼天衢可望指鵬程而三休巨壑難遊伏龍門而一息又為人與蜀城父老書韓信之無津也昌亭之一餓夫耳馬卿之失路也臨卭之一食客耳武不足以服衆文不足以動時長劒屈於無知洪筆淪於不用洎乎雄圗躡運至尊納背水之謀麗藻昇朝天子賞凌雲之作威加海岳聲振廟廊彼淮隂之俠少成都之遺老也又焉能知逺近哉是以鑒物於肇不於成賞士於窮不於達是知卞和之得玉也精存於岸谷之間張華之得劒也氣發於星辰之際夫豈琢磨成器然後知其寳剸斷為能然後知其用哉劉仲文之逺識不以乾沒詣梁城閔仲叔之髙風不以口腹累安邑雖其已没生氣猶存方今白藏紹序朱律謝期天髙而林野踈候肅而江山静輕蟬送夏驚晚吹於風園旅雁乗秋動宵吟於露渚蜀都廣鎭岷㠊奥壤山分玉宇水向金陵歸雲止雁流曙響於東津落照開鴻寫晴規於北岸螢踈夕砌蟬促朝林昔者虞公再見懸光白璧之前季布一言猶定黄金之諾況乎交已成於杵臼道已茂於金蘭希照窮途遠流嘉貺若使恩裁口腹空留安邑之賔惠闕始終取恨昌亭之客史祥答隋太子廣書身在邊隅情馳魏闕每至清風夜起朗月孤照想鳴笳之啟路思託駕於後車塞表京華山川悠逺瞻仰浮雲伏增澘結王孝籍上牛𢎞書夫以一介貧人七年直省課税不勉慶賞不沾賣貢禹之田供釋之一作氏之費有弱子之累無强兄之親加以老母在堂光隂遲暮寒暑違侍闗山迢遥齧臂為期前途邈矣倚閭之望朝夕已勤謝相如之病無官可以免發梅福之狂非仙所能避愁疾甚乎厲鬼人生異夫金石營魂且散恐筮予無徵齎恨入冥則虚縁恩顧此乃王稽所以致言應侯為之不樂也駱賔王上吏部裴侍郎書僕誠鄙人也頗覽前事每讀古書見髙堂九仞曾輿有北向之悲積粟萬鍾季路起南逰之歎未嘗不廢書輟卷流涕霑衣何者情蓄自衷事符則感形潛於内迹應斯通又上兖州崔長史啟心波湛漢詠魄曜於黄陂情岳干天韞風雲於稽巘龍津共濟競忻登御之車蕪室欽賢必攬澄清之轡是以佐龜隂而演化務肅萬城翼麟壤以宣風恩覃千里又上兖州張司馬啟言阿激箭浴紫貝以飛湍情岳驚峰蔽丹霄而傑峻文條擢秀馥長坂之幽蘭筆苑揚葩燦小山之丹桂松飈結韻縉紳藉以雌黄巖電流光通賢資其月旦緝諧麟甸下白鶴於仙庭輔弼鳬郊重黄金於帝里所冀分其末照惠以餘波得預觀光全由唾咳儻雲鑣釋絏申其潄玉之音霜匣開輝照以盤蛟之影則隂山之雀敢懷飡蘂之心漢東之虵期致投珠之報又上齊州張司馬啟金波離畢零陵之石自飛瑶光建寅蕭坵之火暫爇又上吏部侍郎帝京篇啟楚翬丹質在荆南以懷慙遼豕白頭望河東而載恧賔王散財易朽蟠木難容雖少好讀書無謝髙鳳而老不曉事有類揚雄徒以易象六爻幽賛通乎政本詩人五際比興存乎國風故體物成章必寓情於小雅登髙能賦豈圗榮於丈夫盖欲樂道遺榮從心所好非敢希聲刻鵠竊譽雕蟲又上司列太常伯啟至若峰秀學山列三墳而仰止瀾清筆海疏四瀆以朝宗登小魯之巖辨練光於曳馬臨大吳之國識寳氣於連牛垂秋實於譚叢絢春華於詞苑辨河飛箭激流翻白馬之津文江散珠圎波潄驪龍之穴是用德茂麟趾削桐葉以分珪道煥鵷池映桃花而曵綬王勃上皇甫常伯啟龍鑣就路駑駿相懸鵲鏡臨春妍媸自逺亦有飛霜匝地蘭蕭銜共盡之悲烈火埋岡玉石抱俱焚之慘然則知音罕嗣流水空存至寳不同荆山有淚君侯飾揚芻議提奬蕪詞白圭成再見之榮黄金定一言之重鵬飈旣接仰雲逕而將趨龍阪可登指星臺而有望循襟佩德撫事知恩山岳有輕河漢無極又上明員外啟金烏聳轡俯圎燧而抽光瑶兎浮輪候方諸而吐液斯則洪纎異數㝠符造化之津髙下相懸精契陶鈞之表故知聲同義合存長幼於三州理隔氣殊置山川於一面神交可託風雲於杵臼之間道不虚行涇渭於簪裾之列榮加從袂上清蘭府之逰寵奪攀輪更掌蓬山之務麟圗緝諡定榮辱於三泉鵷閤裁書考薫蕕於四部既鶴鳴雲路望偃朝端鴻漸星臺俯諧僉議㢘平譽號李宣伯之當官雅操繩時山巨源之稱職情源九派士流欣滿腹之期德宇千門詞人有庇身之望李商隱獻河東公啟有志為文無資就學雖雜賦八首或庶於馬遷而讀書五車逺慙於惠子是以艮背却行求心自處羅含蘭菊仲蔚蓬蒿見芳草則怨王孫之不歸撫髙松則歎大夫之虚位又為張周封上楊相公啟某雖忝伊人亦惟華胄比王謝之子弟誠有重輕在嵇吕之交朋夙嘗連接而獨分光隣女貸潤監河野鶴天麟絶比倫於朝右髯參短簿困擬議於軍前竊聴重言嘗興深歎是以願馳蹇步誓奉光塵儻或厠錯薪之斯翹詠歸荑於自牧少窺上路試睨重霄擊水三千暫隨鵬運澄流十二免使魚勞猶能賛敘爕調謳歌鎔範又為栁珪謝京兆公啟伏思相公直以大人頃居班列獲奉恩私羅照乗於驪淵覬歸昌於鳳穴未見其可處之不疑曾不念木朽石頑雕鐫莫就榆暝豆重性分難移古人所以有以榮為憂受恩如敵斯言之作珪也有焉又上尚書范陽公啟成名踰於一紀旅宦過於十年恩舊凋零路岐悽愴薦禰衡之表空出人間嘲揚子之書僅盈天下去年逺從桂海來返玉亰無文通半頃之田乏元亮數間之屋隘傭蝸舎危託燕巢春畹將逰則蕙蘭絶逕秋庭欲掃則霜露沾衣勉調天官獲昇甸壤歸惟却掃出則卑趨仰燕路以長懷望梁園而結慮又上崔相公啟某荆氏凡材雕陵散質謬𫝊清白實守幽貞矍圃彎弓何能中鵠孔門用賦尋恥雕蟲常患荒蕪殊非挺㧞依劉薦禰素乏梯航慕吕攀嵇全無等級分甘終老莫有良期旣而竊仰洪鈞來窺皎鏡墳壚下土敢望頒形甕盎頑姿寜希鑒貌豈謂不遺孤拙曲假生成㧞於泥滓之中致在煙霄之上又為山南薛從事謝辟啟頃者湮淪孤賤綿隔音塵其後從事梓潼經塗天漢初筵末席披霧睹天自邇以來懷恩莫極鄭𤣥之腰腹若掛丹青崔琰之鬚眉常存夢寐方思捧持杖屨厠列生徒豈望便上仙舟遽塵蓮府又為舉人上翰林蕭侍郎啟重以惠劣禰生專非董氏殊顔囘之易鑄若宰我之難雕徒欲萬卷咸披且乏五行俱下叨從歲賦勉致文編户户醤瓿唯聞見辱人人虀臼不肯留題再困於魚登一慙於雁序然天付直氣家𫝊義方雖在顓蒙不茍述作廣絶交之論抑有旨焉移太常之書非無為也又為舎人絳郡公上李相公啟圍減帶緩髪稀弁傾窅然向風目極心往又為舉人獻韓郎中琮啟不授綵毫未吞瑞鳥馳名江左陸機莫及於才多擅譽鄴中王粲終聞於體弱捧爝火以干日御動已光銷抱布鼓以詣雷門忽然聲寢不謂郎中搜才路廣登客門寛望犬附書冀雞談易特垂題目曲賜丹青以卞和為玉人無不收之瓊玖得蹇修為媒氏無不嫁之娉婷伏惟郎中與先輩賢弟價重兩劉譽髙二陸比李膺則仙舟對棹方馬融則絳帳雙褰若某者雖陋若左思痩同沈約無庾信之腰腹乏崔琰之鬚眉然至於感分識歸銜誠議報將酬楊寳則就雀求環欲答孔愉則從龜覓印推其異類不後他人又為先輩獻集賢相公啟伏惟相公日觀同光天球並價揚鋒露鍔則武庫常開散藻摛華則文星鎮見一言悟主三接承恩季孟伊繇友朋蕭邴漢皇發論十萬常愧於淮隂齊后推誠一二皆歸於仲父百度旣已貞矣九流又復諳焉牆東竈北隱淪者咸欲呈材猿飲鳥言僻陋者皆思入貢莊生獻臂楊子㧞毛三百篇之詩更無諷刺二百年之史永絶譏嫌杜牧謝周相公啟當受震駭神魂飛揚撫已自驚喜過成泣藥肉白骨香返逰魂言於重恩無以過此雖買臣懷紱郡邸蕭育召拜扶風楊僕三組垂腰蘇秦六印在手較於榮忝無以為踰張元晏謝時相啟蒙虎皮於下駟抑以騰驤綷鵠羽於寒鴟教之騫翥又未召試先與奉常啟念及孤沈奬兹顓僻遇孔梨之津潤别借齒牙因姜被之包容俯明肝膈羅衮謝史館裴相公啟發言為褒貶之經廻顧是寒暄之律雖復毛慙腹背角困藩籬何嘗不砥礪公方琢磨文術竟以長沙地窄難呈宛轉之姿南郡鬼逢每受揶揄之恥又謝宰相啟暄臨黍谷方知律吕之聲調境入蓬山孰謂風飈之道阻胡曾劒門寄上路相公啟伏惟相公神資重器天縱偉才邦國金城朝廷玉燭文髙庾月詞峻謝山纔見紫髯便居黄閣陶鈞百辟啟沃一人議平吳皓之時雖云推局報破秦堅之日不廢圍碁故能早執化權久司政柄今則暫辭龍闕求鎮龜城將軍之細栁雖新丞相之鹽梅仍舊不煩壯士自伏雄圖揚麾而氛祲晨銷按節而妖星夜落又謝賜錢啟伏惟相公英風獨振偉量孤標推葛亮之秤心負姜維之斗膽内安宗廟外却蠻夷魚水賢良塤篪骨肉桃李滿於衢路金帛遍於風塵六合之中一人而已栁宗元謝李相公示手札啟全録省錄狂瞽收撫羈縲沐以含𢎞之仁忘其進越之罪感深益懼喜極增悲五情交戰不知所措宗元質性庸塞行能無取著書每成於廢疾進德且乏其馨香常願操篲醫門掬溜蘭室良辰不與夙志多違昨者踴躍殘魂奮揚蓄念激以死灰之氣陳其敝箒之詞致之煙霄分絶流盼今則垂露在手清風入懷華衮濫褒於赭衣龍門俯收於埳井藻鏡洞開而秋毫在照文律傍暢而寒谷生輝化幽鬱之志若覿清眀換兢危之心如承撫薦非常之幸豈獨此生伏以淮海劇九天之遥瀟湘參百越之俗傾心積念長懸星漢之上流形委骨永瀹魑魅之羣何以報恩唯當結草劉禹錫謝中書張相公啟身侔蟬翼何以受恩死輕鴻毛固得其所溫庭筠上令狐相公啟藐是流離自然飄蕩呌非獨鶴欲近商陵嘯類斷猿況隣巴峽光隂詎幾天道如何又上宰相啟儻張禹尊髙猶為戴榮説禮鄭𤣥嚴毅便令服愼聞詩敢歎朝飢誠甘夕死又投憲丞啟古者窮士求知孤臣薦㧞或三嵗未嘗交語或一言便許忘年奇偶之間彼何相逺則運租船上便獲甄才避雨林中俄聞託契此又無由自致不介而親者也又上裴舎人啟今則阮路興悲商歌結恨牛衣夜哭馬柱晨吟一笈徘徊九門深阻敢持幽欵上訴隆私又上學士舎人啟荀鐸揺車邕琴入爨委悴輿人之末殘摧膳宰之前不遇知音信為棄物又上杜舎人啟物乗其勢則嘒紀畫塗王褒傳忽若慧記畫塗英華訛作嘒紀才戾於時則荷戈入棘必由賢達之門乃是坦夷之逕是以陸機行止惟繫張華孔闓文章先投謝朓遂得名髙洛下價重江南羅隱投湖南王大夫啟間者龍門掌貢馬帳搜遺泉客號咷只憂寳盡地靈惆悵不覺山空又謝江都鄭長官啟於半郊半郭之中有一詠一觴之趣為謀甚逸所得何多芳草逺山纔供掇拾晴陽媚景别受指撝登臨則光禄寒山悲歎則雍丘明月將風霜委地之姿值兵革滔天之日正平刺滅屢窘輿臺叔夜燈殘頻逢鬼魅顧雲投顧端公啟儻蒙少借餘波微廽誕説當見長房之竹亦可為龍則知莊叟之魚終能化羽又投户部裴德符郎中啟加以秦吳路阻煙水程遥甘滑多違問安常闕中宵夢到星漢俄沈萬里書廻槐檀遽改又投户部鄭員外啟某聞栁文暢之遇王融初因雅韻劉嗣芳之逢沈約實自片辭或兩句可嘉或一篇堪奬則題於團扇寫在郊居遂使西邸流芳南朝溢羙時名愈大紙價彌髙今也故事具存清風盡在每因投卷竊賀伊人雖有負於斯文幸遭逢其至鑒又投翰林劉學士啟時或嚴霜届節脱葉辭枝曲突無煙幽窗有雪飛文月殿欲擬謝莊染翰蘭臺思齊宋玉又謝下第後使人存問啟收燼枝於烈熖必假良知出埋刃於重泉當資至鑒委訪窮居曲𫝊芳訊側聆尊旨跪聽玉音竊聞俯降咨嗟深垂憫惻初疑夢覺終謂風傳方當退鷁之時忽得攀龍之便又謝徐學士啟某嘗徧閱縑緗亦聞先達時接後來逺則沈隱侯之奬何伯言纔聞發論近則韓文公之知李長吉始議及門未有曲示恩私顯留翰墨才微往彦遇倍昔時仰戴恩榮已增銘篆又投刑部趙郎中啟一别楚山四凋秦葉進惟角觸退則羈棲望化羽之期烏頭詎白困龍門之險魚尾將頳近者輒以荒蕪上干裁鑒實慚小道不副至公或自朋游竊聆風㫖潘江陸海曲借品流繡段金聲仍加緣飾今則將臨筆陣潛逼掄材旣乏先容惟憂㸃額絃哀柱促風勁葉危輒寫丹誠仰塵清鑒儻蒙特分餘潤微假末光朽枿生荑寒灰發熖纔沾慰薦便是輝華羅隱投禮部鄭員外啟道薄而魚腮易曝計踈而鳬脛難加所以甯戚叩歌不惟長夜魏舒對䇿近至中年丹霄無獨上之期雙鬢有相輕之色而員外芝田養秀桂苑摛華口裏雌黄旋成典故座中薤白早避風流敢因誘善之初仰冀嘘枯之便儻一掬華陰之土聊拭蘇文則數升涇水之泥永依清濟鼂補之亳州上李中書啟賦分薄而造物不能厚禀資拙而匠石無由工開籠鵠失而始驚捩手羮空而自笑迷途未反壯日已賒惟激烈之素懐則蕭條而長在每羞王宻謁楊震之意猶鄙谷永謝王鳳之詞使愚無似有宣光不比之稱則賢我公乃獻子可賀之舉然而志闊事迕才踈效遲下若戰國公子之市名當時羣豪之赴義猶可蒯緱彈鋏預三千客而有魚或能左手捧盤招十九人而俱歃此自不果他復何言第依庇姑存逭疵悔念虚死不如立節而止謗莫若自修鶴鳴遠而終聞蘭生幽而亦佩誠足動金石則有不誠無不動信可行蠻貊則有不信無不行奔踶可馴千里要煩於良御鉛刀且弊一割更繄於善操若唐兩生奏記當路至願為燎供席蒸之效祥顧有義焉何至是也文學部詩白居易宣武令狐相公以詩寄贈傳播吳中聊奉短章用申酧謝詩新詩傳詠忽紛紛楚老吳娃耳徧聞盡解呼為好才子不知官是大將軍詞人命薄多無位戰將功髙少有文謝朓篇章韓信鉞一生雙得不如君李羣玉寄長沙許侍御詩二年文㑹許追隨和遍南朝雜體詩未以綵毫還郭璞乞留殘錦與丘遲竹齋琴酒歡成夢水寺煙霞相對誰今日秋風滿湘浦只令搔首詠瓊枝羅隱淮南李僕射借示近詩因有投獻詩朝論國計暮論兵餘力猶隨鳳藻生語繼盤盂抛俗格氣通河岳帶商聲閒尋綺思千花麗靜向髙吟六藝清文柄已持堯典在更堪回首向縁情又贈湖州裴郎中詩貴提金印出咸秦瀟灑江城兩度春一𣲖水清疑見膽數重山翠欲留人望崇早合歸黄閣詩好何妨戀白蘋自是受恩心未足却垂雙翅羡吳均又寄前宣州竇常侍詩往年西謁謝𤣥暉樽酒留歡醉始歸曲檻栁濃鶯未老小園花暖蝶初飛噴香瑞獸金三尺舞雪佳人玉一圍今日亂離尋不得滿簔風雨釣魚磯又贈宣武盧從事詩前年帝里望行塵記得仙家第四人泉煖舊諳龍偃息露寒初見鶴精神歌聴上榻梁園晚夢遶殘鐘汜水春知有箧中編集在只應從此是經綸陳子昂為陳御史進奉和秋景觀競渡詩表天文爰䧏品彚咸亨金簡潜開珍圖斯見臣聞白雲興詠漢逰汾水之詞黄竹申歌周舞瑶池之駕然而志崇逺轍事式勞人故文思之化未光太清之道猶闕伏惟聖母神皇陛下太虹齊聖感月含神𤣥德茂於皇陛文明照於天下用能提玉斗把旋衡百神景從三靈叶賛青雲出洛爰開受命之符赤甲縈河終御興王之寳非窮神之至德者其孰能格於是哉旣而黄屋務閒紫極時暇洞庭張樂思接軫於軒遊媯水披圖想同參於堯輦然而逺而勞物者未若近而安人動而勤已者豈比靜而神泰於是徙金蹕鳴玉鑾清禁林御池殿肅波臣而戒事命舟子為水嬉彩鷁蓮歌乍起吳江之引青龍桂檝時謳越女之風鳥逝虯驚沸珠潭而競逐雪飛電集横玉浦而流光信可以娱樂性靈發揮文物皇歡允洽白日俄光於是奏薫風於管絃詠炎雲於林籞帝歌爰作天藻遐彰黼帳帷宫縟文房之繡綵祥烟瑞景霏翰苑之榮光信探賾於𤣥苞得斯文於紫極太平允矣元首康哉方欲朝明堂之官輯羣后之瑞尊崇顯籙光啟聖圖封玉嵩丘以接千年之統泥金少室攸增萬嵗之規卓哉煌煌聖君之表也微臣曲學蓬尸竊位蘭臺未聞驄馬之謡非有雕龍之思鞠躬霜署謬覩於天章逖聽鈞臺側聞於帝樂天文尊貴不逺於下臣帝寳殊崇曲宣於近貴竊以為君唱臣和固不隔於尊卑宫變商從方允諧於金石輒用齋心扣寂假翰求詞將以攀日月之末光繼螢爝之微照錢珝為史舘王相公進和詩表臣聞在心為志發言為詩志通而若啟源流詩作而自合律吕伏惟陛下道惟恭黙禀在文思永圖欲漸於無為睿覽且明於多暇因臨丹壑遂躡金繩喜象物之澄清假咏歌而放曠聲傳天籟韻合霜鐘篇殊黄竹之名辭掩白雲之羙臣等逢時竊位敢並韋平應詔屬詞文非顔謝徒偶昭融之運舊聞雅正之音傾聽不知愧延陵之季子試吹必濫比南郭之先生但思忝列輔臣安敢首違聖旨輒同擊壤仰和貫珠誠懐鄭衛之慙但感宫商之説星辰自轉難參旭日之光鼙鼔空鳴莫續春雷之響唐李羣玉進詩表以居住沅湘宗師屈宋楓江蘭浦蕩思揺情蕪纇之餘過於諷野天文不到徒窺星漢之髙滄海攸歸豈阻潢汙之陋然爨桐不爆俄成曲突之煙埋劍無光永作幽泉之鐡巴濮下調塵觸天聴螻蟻之微伏待刑戮宋闕進嘉泰頌表見翰苑新書失名自古帝王之功雖卓犖奇偉而不可及必得名世文學之士益鋪張潤色以垂無窮載之簡冊則炳炳如丹播之管絃則洋洋盈耳商之猗那周之清廟固以跨越千古而巍乎漢之燕然唐之磨崖抑欲追倣三代之作者於昭駿命肇啟鴻休閎儀已七於六經懿鑠可三於二典何人筆老再賡慶厯之詩有士管窺借陳嘉泰之頌顧未有鏤白玉以告名山汗青竹以絢華藻缺焉鉅典鬱若輿情臣猥以謏聞親承曠舉倣穆如之作頌輙斐然而成章雖敲金戞玉無容瓦釡之雷鳴然擊壤歌衢共和簫韶之獸舞晏殊進兩制三館牡丹詩歌表昔者虞舜膺期有臯陶之賡載周宣繼業聞吉甫之誦章盖黙相以謨猷不專工於辭翰迨於漢室尤好藝文别館離宫多命從臣之制作倡優鄭衛已無前古之箴規中葉以還其風未冺永平神雀之頌孝明稱羙者五人貞元重九之篇德宗考第於三等並垂編簡式著熙隆洪惟聖運之㑹昌可以繼重華之輝耀然於衆製未復前修思諷諭者隱其誠而靡宣局聲律者豔其言而罕實不足以上禆睿覽下達民情效明良喜起之音續雅頌清微之範姑用登髙而能賦庻幾博奕之猶賢罔協精求豈任多愧臣首當庸濫實玷恩華興寤以思靦惶無極李嶠上髙長史述和詩啟雕文将錦繡同羙惠氣與芝蘭等馥用迴秦肆懸輕吕氏之金持入周京即貴洛陽之紙足使兩都賔主羞談翰墨二陸兄弟恥論詞賦死者可作賈生為入室之徒來者難誣潘子得扶輪之地駱賓王和閨情詩啟竊惟詩之興作兆基邃古唐歌虞詠始載典謨商頌周雅方陳金石其後言志緣情二京斯盛含毫瀝思魏晉彌繁布在縑簡差可商畧李都尉鴛鴦之辭纒綿巧妙班婕妤霜雪之句發越清廽平子桂林理在文外伯喈翠鳥意盡行間河朔詞人王劉為稱首洛陽才子潘左為先覺若乃子建之牢籠羣彦士衡之藉甚一時並文苑之羽儀詩人之龜鏡爰逮江左謡詠不輟非有神骨仙才專事𤣥風道意顔謝特挺戕罰典麗自兹已䧏聲律稍精其間沿改莫能正本李商隱謝河東公和詩啟全錄前因暇日出次西溪旣惜斜陽聊裁短什盖以徘徊勝境顧慕佳辰為芳草以怨王孫借羙人以喻君子思將玳瑁為逸少裝書願把珊瑚與徐陵駕筆斐然而作曾無足觀不知誰何仰達尊重果煩屬和彌復驚惶某曾讀隋書見楊越公地處親賢才兼文武每舒錦繡必播管絃當時與之握手言情披襟得侣者惟薛道衡一人而已及觀其唱和乃數百篇力鈞聲同德隣義比彼若陳葛天氏之舞此必引穆天子之歌彼若言太華三峰此必曰潯陽九派神功古跡皆應物無疲地理人名亦爭承不缺後來酬唱罕繼聲塵嘗以斯風望於哲匠豈知今日屬在所天坐席行衣分為七覆煙花魚鳥置作五衡詎能狎晉之盟實見取鄫之易不以釁鼓惠莫大焉又獻侍郎鉅鹿公啟夫𤣥黄備綵者繡之用清越為樂者玉之奇固以慮合元機運清俗累陟䧏於四始之際優游於六義之中竊計前時承榮内署栢臺侍宴熊舘從畋式以風騷仰陪天籟動沛中之舊老駭汾水之佳人非首義於論思實終篇於潤色光𫝊樂錄道煥詩家況屬詞之工言志為最自魯毛兆軌蘇李揚聲代有遺音時無絶響雖古今異制而律吕同歸我朝已來此道尤盛皆陷於偏巧罕或兼材枕石潄流則尚於枯槁寂寞之句攀龍附翼則先於驕奢艷佚之篇推李杜則怨刺居多效沈宋則綺靡為甚至於秉無私之刀尺立莫測之門牆自非託於䧏神安可定夫衆製昭明太子答湘東王求文集詩苑書或日因陽春具物韶麗樹花發鶯鳴和春泉生暄風至陶嘉月而熙㳺藉芳草而眺矚或朱炎受謝白藏紀時玉露夕流金風時扇悟秋士之心登髙而逺託或夏條可結倦於邑而屬詞冬雪千里覩紛霏而興咏宻親離則手為心使昆弟宴則墨以歡露顧雲唐風集序髙宗朝拾遺陳公作詩出繼杜集作沒二雅馳驟建安削苦澀僻碎略淫靡淺切破豔冶之堅陳擒雕巧之酋帥皆摧撞杜集作幢折角崩潰解散掃蕩詞塲廓清文祲韋莊又𤣥集序謝𤣥暉文集盈編止誦澄江之句曹子建詩名冠古唯吟清夜之篇是知羙稼千箱兩岐奚少繁絃九變大濩殊稀入華林而珠樹非多閱衆籟而紫簫惟一所以擷芳林下拾翠巖邊沙之汰之始辨辟寒之寳載雕載琢方成瑚璉之珍故知頷下採珠難求十斛管中窺豹但取一斑自國朝大手名人以至今之作者或百篇之内時紀一章或全集之中微徵數首但掇其清詞麗句録在西齋莫窮其巨𣲖洪瀾任歸東海總其記得者才子一百五十人誦得者名詩三百首長樂暇日陋巷窮時聊撼膝以書紳匪攅心而就簡盖詩中鼓吹名下笙簧擊鳬氏之鐘霜清日觀淬雷公之劍影動星津雲間分合璧之光海上運摩天之翅奪造化而雷雲湧起役鬼神而風雨奔馳但思其食馬留肝徒云染指豈慮其烹魚去乙或至傷鱗自慙乎鼴腹易盈非嗜其熊蹯獨羙然則律者旣採繁者自除何知黑白之鵝强識淄澠之水左太冲十年三賦未必無瑕劉穆之一日百函焉能盡麗是知班張屈宋亦有蕪辭沈謝應劉猶多累句雖遺妍可惜而備載斯難亦由執斧伐山止求嘉木挈瓶赴海但汲井泉等同於風月煙花各是其樝梨橘柚昔姚合所撰極𤣥集一卷傳於當代已盡精微今更採其𤣥者勒成又𤣥集三卷記方流而目眩閱麗水而神疲魚兎雖存筌蹄是棄所以金盤飲露惟採沆瀣之精花界食珍但享醍醐之味非獨資於短見亦可貽於後昆王勃入蜀紀行詩序出褒斜之隘道扺岷峨之絶徑超𤣥溪歴翠阜迨彌月而臻焉若乃採江山之俊勢觀天地之奇作丹壑爭流青峰雜起陵濤鼔怒以伏注天壁嵯峨而横立亦宇宙之絶者也鍾仲偉詩評序楚臣去境漢妾辭宫或骨横朔野或魂逐飛蓬或負戈外戍或殺氣雄邊塞客衣單霜閨淚盡文士有解珮出朝一去忘返美女有揚蛾入寵再盼傾國凡斯種種感蕩心靈非陳詩何以展其義非長歌何以釋其情臣聞七聲無主律吕綜其和五采無章黼黻交其采故言者志之所之文者物之相雜然則心不可藴故發揮以形容詞不可陋故錯綜以潤色京師紙貴天下家藏調移齊右之音韻改河西之俗劉勰眀詩詩者持也持人性情三百篇之蔽義歸無邪持之為訓有符焉爾自王澤殄竭風人輟采春秋觀志諷誦舊章酬酢以為賓榮吐納而成身文逮楚國諷怨則離騷為刺秦皇滅典亦造仙詩漢初四言韋孟首唱匡諫之義繼軌周文孝武愛文柏梁列韻嚴馬之徒屬詞無方至成帝品錄三百餘篇朝章國采亦云周備而辭人遺翰莫見五言所以李陵班婕妤見疑於後代也按召南行露始肇半章孺子滄浪亦有全曲暇豫優歌逺見春秋邪徑童謠近在成世閱時取證則五言久矣又古詩佳麗或稱枚叔其孤竹一篇則傅毅之詞比采而推兩漢之作乎觀其結體散文直而不野婉轉附物怊悵切情實五言之冠冕也至於張衡怨篇清曲可味仙詩緩歌雅有新聲暨建安初五言騰踴文帝陳思縱轡以騁節王徐應劉望路而爭驅並憐風月狎池苑述恩榮敘酣宴慷慨以任氣磊落以使才造懷指事不求纎宻之巧驅辭逐貌唯取昭晰之能此其所同也乃正始明道詩雜仙心何晏之徒率多浮淺唯嵇旨清峻阮旨遥深故能標焉若乃應璩百一獨立不懼辭譎義貞亦魏之遺直也晉世羣才稍入輕綺張潘左陸比肩詩衢采縟於正始力柔於建安或析文以為妙或流靡以自妍此其大畧也江左篇製溺乎𤣥風嗤笑徇務之志崇盛亡機之譚袁孫已下雖各有雕采而詞趣一揆莫與爭雄所以景純仙篇挺㧞而為俊矣宋初文詠體有因革莊老告退而山水方滋儷采百篇之偶争價一句之竒情必極貌以寫物辭必窮力而追新此近世之所競也又樂府武德興乎髙祖四時廣於孝文雖摹韶夏而頗襲秦舊中和之響閴其不還暨武帝崇禮始立樂府總趙代之音撮齊楚之氣延年以㬅聲協律朱馬以騷體製歌桂華雜曲麗而不經赤雁羣篇靡而非典河間薦雅而罕御故汲黯致譏於天馬也至於魏之三祖氣爽才麗宰割詞調音靡節平觀其北上衆引秋風列篇或述酣宴或傷羈戍志不出於滔蕩辭不離於哀思雖三調之正聲實韶夏之鄭曲也好樂無荒晉風所以稱逺伊其相謔鄭國所以云亡雅詠温恭必欠伸魚睨奇辭切至則撫髀雀躍文學部騷劉勰辨騷故其陳堯舜之耿介稱湯武之祗敬典誥之體也譏桀紂之昌披傷羿澆之顛隕規諷之旨也虬龍以喻君子雲蜺以譬䜛邪比興之義也每一顧而掩涕歎君門之九重忠怨之詞也觀兹四事同於風雅者也至於托雲龍説迂怪豐隆求宓妃鴆鳥媒娀女詭異之詞也康囬傾地夷羿彈日木天九首土伯三目譎怪之譚也依彭咸之遺則從子胥以自適狷狹之志也士女雜坐亂而不分指以為樂娱酒不廢沈湎日夜舉以為歡荒淫之意也摘此四事異乎經典者故論其典誥則如彼語其夸誕則如此觀其骨鯁所樹肌膚所附雖取鎔經意亦自鑄偉詞故離騷九章朗麗以哀志九歌九辨綺靡以傷情逺遊天問瓌詭而惠巧招魂招隱耀豔而深華卜居標放言之志漁父寄獨往之才故能氣往轢古辭來切今驚采絶豔難與並能矣文學部書梁庾肩吾謝東宫古跡啟竊以仙巖遺傳入握成塵孔壁藏文隨開已蠧石書有暗厨畫猶飛豈有跡經四代年踰十紀芝英雲氣之巧未損松鉛鵲反鸞驚之勢不侵蒲竹必使酒肆來人池流色變将損北海之績還代西河之簡梁元帝上東宫古跡啟師宜八分之巧元帝三體之妙史籀李斯之篆梁鴻曹喜之書莫不總萃桂宫盈滿甲館竊以鸞驚之勢旣聞之於索靖鷹時之巧又顯之於蔡邕是以遊霧重雲𫝊敬禮之法鳥頡魚頏表揚泉之賦頗好六文多慙三禮尚方大篆既其牢落柱下方書何曾彷彿空慕河間之聚書竟徵東平之獻表齊攸尺牘顧已缺然北海楷隸終成難擬梁簡文帝答湘東王上王羲之書試筆成文臨池染墨疏宻俱巧真草皆得以望城扉如瞻星石不營雲飛之散何待曲辱之丹方當奉彼筐中置之帳裏乍楷銅鉤時懸欹案戢意之深良不能已唐太宗論書煙霏露結狀若斷而還連鳳翥龍蟠勢如斜而反正巧同懸露妙等崩雲雖秃千兎之翰聚無一毫之筋窮萬穀之皮歛無半分之骨衛恒字勢皇帝之史沮誦倉頡眺彼鳥跡始作書契紀綱萬事垂法立制帝典用宣質文著世爰暨暴秦滔天作戾大道既冺古文亦滅魏文好古世傳丘墳歴代莫發真偽靡分大晉開元𢎞道敷訓天垂其象地耀其文其文乃耀粲矣其章因聲㑹意類物有方日處君而盈其度月執臣而虧其傍雲委虵而上布星離離以舒光禾卉苯䔿以垂頴山嶽嵳峨而連崗蟲跂跂以若動鳥似飛而未揚觀其錯筆綴墨用心精專勢和體均發止無間或守正循檢矩折規旋或方圓靡則因事制權其曲如弓其直如弦矯然特出若龍騰於川森爾下頹若雨墜於天或引筆奮力若鴻鴈髙飛邈邈翩翩或縱肆阿那若流蘇懸羽靡靡緜緜是故逺而望之若翔風厲水清波漪漣就而察之有若自然信黄唐之遺跡為六藝之範先籀篆盖其子孫隸草乃其曾𤣥覩物象以致思非言辭之所宣衛恒隸勢鳥跡之變乃惟佐隸蠲彼繁文崇此簡易厥用既𢎞體象有度煥若星陳鬱若雲布其大徑尋細不容髪隨事從宜靡有常制或穹隆恢廓或櫛比鍼列或砥平繩直或蜿蜒繆戾或長邪角趣或規旋矩折修短相副異體同勢奮筆輕舉離而不絶纎波濃㸃錯落其間若鐘簴設張庭燎飛烟嶄巖嶻嵯髙下屬連似崇臺重宇增雲冠山逺而望之若飛龍在天近而察之心亂目眩奇姿譎詭不可勝原研桑所不能計宰賜所不能言何草篆之足筭而斯文之未宣豈體大之難覩將秘奥之不傳聊俯仰而詳觀舉大較而論旃蔡邕篆勢鳥遺跡皇頡循聖作則制斯文體有六篆為真形要妙巧入神或龜文斜列櫛比龍鱗紆體放尾長短副身頽若黍稷之垂頴藴若蟲蛇之棼蘊揚波振激鷹跱鳥震延頸脅翼勢似凌雲或輕舉内投微本濃末若絶若連似霧緣絲垂凝下端從者如懸衡者如編抄者邪趣不方不圜若行若飛跂跂翾翾逺而望之象鴻鵠羣遊絡繹遷延迫而察之端澄不可得見指撝不可勝原研桑不能數其詰屈離婁不能覩其隙間般倕揖讓而辭巧籀誦拱手而韜翰處篇籍之首目粲粲斌斌其可觀摛華豔於紈素為學藝之範圓嘉文德之𢎞懿舉大體而論旃崔瑗草書勢書契之興始自頡皇寫彼鳥跡以定文章爰暨末葉典籍彌繁時之多僻政之多權官事荒蕪勦其墨翰惟作佐隸舊字是刪草書之法盖又簡略應時諭指用於卒迫兼功并用愛日省力純儉之變豈必古式觀其法象俯仰有儀方不中矩圓不副規抑左揚右望之若崎竦企鳥峙志在飛移狡獸暴駭將奔未馳或􅀈􅚍㸃􅚭狀似連珠絶而不離畜怒怫鬱放逸生奇或凌䆳惴慄或據槁臨危旁㸃邪附似蜩螗挶枝絶筆收勢餘綖糾結若杜伯㨗毒緣巇螣蛇赴穴頭沒尾垂是故逺而望之􅬜焉若沮岑崩崖就而察之一畫不可移機微要妙臨時從宜略率大較髣髴若斯索靖草書狀草書之為狀也婉若銀鉤漂若驚鸞舒翼未發若舉復安蟲蛇虬蟉或往或還類阿那以嬴嬴歘奮興而桓桓及其逸遊盻嚮乍正乍邪騏驥暴怒逼其轡海水窊隆揚其波芝草蒲陶還相繼棠棣融融載其華𤣥熊對距於山嶽飛燕相追而差池舉而察之又似乎和風吹林偃草扇樹枝條順氣轉相比附窈嬈㢘苫隨體散布紛擾擾以猗靡中持疑而猶豫𤣥螭狡獸嬉其間騰猨飛鼺相奔趣陵魚奮尾蛟龍反據投空自竄張設牙距或若登髙望其類或若旣往而中顧或若俶儻而不羣或若自檢於常度劉邵飛白書勢鳥魚龍蛇龜獸仙人蚊脚偃波楷隸八分世施常妙索草鍾真爰有飛白之麗貌豔勢珍若乃敷析毫芒纎手和㑹素幹氷解蘭墨電掣直准箭馳屈擬蠖勢繁節參譚綺靡循殺有若烟雲拂蔚交紛刻繼韓盧接飛宋鵲遊逝文學部畫孫逖奉和李右相中書壁畫山水詩廟堂多暇日山水契中情欲寫髙深趣還因藻繪成九江臨户牖三峽遶檐楹花栁窮年發煙霞逐意生能令萬里近不覺四時行氣染荀香馥光含樂鏡清詠歌齊出處圖畫表冲盈自保千年遇何論八載榮栁宗元觀慶雲圖設色方成象卿雲示國都九天開秘旨百辟賛嘉謨抱日依龍衮非烟近御爐髙標連汗漫廽望接虚無裂素雲光發舒華瑞色敷恒將配堯德垂慶代河圖李翺代李尚書進畫馬屏風狀觀其體閒色浮氣逸神駿練影吳浦指山川而不揺花攅上林若雨露之新洗或屈膝千里或長鳴九霄昔以負圖為寳今願捍蔽成功形影不殊効用何别謹裁成十二扇隨狀奉進若以時從啟閉猶足靖於埃塵倘將用以馳驅庻可効其筋力王維為畫人謝賜表猥以賤伎得備衆工誤㸃屏風乏成蠅之巧偶持團扇無事牸之能徒以職官不敢貳事顧惟時論有慚三絶伏惟皇帝陛下撥亂反正受命中興俯協龜圖傍觀鳥跡卦因於畫畫始生書知微知彰惟聖體聖臣奉詔㫖令寫功臣適遇鳳翔之初無非鷹揚之士燕頷猿臂裂眥奮髯髪衝鶡冠力舉龍鼎骨風猛毅眸子分明皆就筆端别生身外𫝊神寫照雖非巧心審象求形或皆暗識姸蚩無枉敢顧黄金取舎惟精時憑白粉且如日磾下泣知其孝思于禁懷慚媿此忠節乃無聲之箴頌亦何賤於丹青宣父之似臯繇元子之類越石不待或人之説無煩故妓之言此又一奇誠為可尚臣得䑛筆麟閣繼踵虎頭頻蒙奨敎之恩益用精誠自勵勤以補拙雖未仙飛感而遂通實因聖訓况賜衣服累問官資中使相望屢加宣慰微臣戰灼無答恩私之至梁元帝謝上畫蒙勅褒賞啟臣簿領餘暇竊愛丹青雲臺之像終微髣髴宣室之圖更難擬議成蠅罕術畫馬踈文人非世將恩深晉帝之賞跡愧景山寵踰魏皇之詔又謝東宫賚陸探微畫啟工踰畫馬巧邁圖龍試映玉池即看魚動還傍金屏復疑蠅集史遷暫睹懸識留侯之貌漢帝一瞻便見王嬙之像唐張彦逺畫記許詢逸少經年共賞山泉謝傅戴逵終日惟論琴畫萬卷之書盡歸王粲一厨之畫惟寄桓𤣥只如田僧亮楊子華楊契丹鄭法士董伯仁展子䖍孫子尚閻立德立本並祖述顧陸僧繇田則郊野柴荆為勝楊則鞍馬人物為勝契丹則朝廷簮組為勝法士則游宴豪華為勝董則臺閣為勝展則車馬為勝孫則羙人魑魅為勝閻則六法該備萬象不失李嗣真云三休輪奐董氏造其微六轡沃若展生居其駿吳道子畫仲由便帶木劒閻令公畫昭君已著幃㡌殊不知木劒創於晉代幃㡌興於國朝舉此凡例亦畫之一病也且如幅巾𫝊於漢魏羃離起自齊隋幞頭始於北朝巾子創於武德胡服靴衫豈可輒施於古像衣冠組綬不宜長用於今人芒屩非塞北所宜牛車非嶺南所有詳辨古今之物商較土風之宜指事繪形可騐時代姚最評湘東王云時過揮毫造化驚絶足使荀衛閣筆袁陸韜翰古儷府卷九
