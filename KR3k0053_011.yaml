二龍扶風最良不得専稱五馬法水津梁得無砥柱之難香山轍迹非復終南之險唐王勃益州綿竹縣武都山淨惠寺碑燭龍韜景避堯日于幽都雲鵬斂翼候虞風于晏海爰經寶地大啓祥宫撫香象而髙視鳴法螺而再唱龍垣淨土連帝道而重光鶴苑崇基脫皇居而首出况乎山積舊壤下鎮偏隅天帝遺墟上干躔次王舍城之宫闕白玉猶存給孤獨之園林黃金尚在法物由其大備盛德所以相尋株兵奉天藏之圖泉女獻山祗之籍離亭合榭因岸谷之髙低疊觀連房就岡巒之曲直丹崖反照畫栱相臨緑嶂斜煙雕簾間出豐隆曉震次復霤而棲遑列缺晨奔望崇軒而愕眙千香寶樹自起風煙九乳仙鐘獨鳴霜雪銀龕佛影遙承鴈塔之花石壁經文下映龍宫之業虹生北澗即挂新幡鳯下東岑還棲舊剎若乃尋曲􅔍歷崇隈周行數里直上千仞蒼松蓄吹臨絶徑而疏寒黛篠防煙繞回疆而結蔭春巖橘柚影入山堂秋壑芙蓉光浮水殿亦有山童採葛入丹竇而忘歸野老紆花向青溪而不返山神獻果送出菴園天女持花來遊淨國實杳冥之祕訣託幽深之逸境豈直淮南桂樹暫得仙家江左桃源終迷故老而已武都仙鎮靈墟奧域邑動香城山開淨國澗流百道峰雲五色谷暗藤斜山髙樹逼千楣鶴列萬栱星懸分林構趾接磴開㕓臨階竹樹繞棟風煙龕前怪石塔下秋泉緑崖疏徑青岑拒室霧道相縈煙房互出葉濃磎淨花深嶂密鳥度難尋猿驚易失簷分石竇地絡金沙丹丘抗月碧洞棲霞松開野路桂列仙家仙爐柏葉寶座蓮花砌因巖曲橋隨峰返果出天厨香來仙苑玉鑄啓曙金鐺照晚谷思鐘張山悲鐸遠閭閻踐勝銅墨髙情聲飛别邑望動専城懸金道肆刻石山楹千載之後于嗟令名又益州德陽縣善寂寺碑爾其碧雞仙宇分絶障于金堤石遙源控長江于玉峽封畿四會龍坰舍衛之壇里閈三分鹿野經行之地洎蒼鵝上擊銅馬交馳祗園興版蕩之悲沙界積淪胥之痛火炎崑嶽髙臺與鴈塔俱平水浸天街曲岸與猴池共盡于是林衡授矩周官詮揆日之工梓匠揮斤荆客練成風之巧重楹畫栱坐出天霄復樹文閨俯臨電宇雕楣鶴翥泄珠網于星津繡桷蚪伸吐璿璫于月徑緑房丹瑣彩綴晴霞紫閣青疏光含薄霧春風瓊樹香飄席上之蘭秋水銀塘影數軒中之芰晨光轉卉翻寶宇之龍花溽露低枝蕩真文于貝葉由是岷英蜀秀攀講序以雲趨帶燕裙鸞仰齊庭而霧合貪機火阻淨施旁流綺羅分解珮之因軒蓋得捐金之所靈妃翳日捨翠幄于香筵仙客停雲落霓裳于寶地又梓州通泉縣惠普寺碑重欒復棟霧緝霞張繡桷雕楣鸞伸鶴跂珍臺控景羲和紆練轡之因綺榭裁氛屏翳得停鑣之所連甍積翠交玉鎖于星衢洞戶流丹綴金鋪于月竇垂珠網露傍傾漢浦之琛列鐸吟飇上合鈞天之樂清露花徑飛泉葉戶澗緑苔秋山蒼樹古又梓州郪縣兜率寺浮圖碑巖花落沼近拂天衣澗葉低隂斜籠寶座宵汀鶴警乘鼓吹而齊鳴曉峽猿清挾霜鐘而赴節若乃巡碧磴歷崇階瑣窗澄綵瓊鋪洞照神姿滿月疑臨石鏡之峰衆馥揚煙似登香爐之嶽信可下清人境上配天都為勝地之先鳴執名山之右契者也龍蟠萬栱䇿屛翳而髙驤鶴矯千楣冠扶搖而獨運熏詹藹藹雲將反覆于櫺軒洞宇寥寥風伯栖遑于戶牖仙娥去月旅方鏡而忘歸寶婺辭星攀圓璫而未返玄甍湛䨴若鵬飛而戾九天丹楹聯鶱如鳯翔之據千仞每至韶光照野爽靄晴遙列郊墟于四野開雲氣于千里風恬雨霽煙霧藻天地之容野曠川明光景挾江山之助則有雕簾繡軸排淨域而停輪寶騎銀鞍指珍臺而聳轡于是披岫幌抵巖扄攀翠椱而三休步玄梁而十憩廊軒外敞淑氣長延隂室中開鮮飇自激俯環瀛而極野積蘇非逺出雲漢而髙踐靈槎可記真福地之殊觀香城之巨麗者乎張文成滄州弓髙縣實性寺釋迦像碑芟毒樹而建祗園拔邪山而開福地平原控趙渤海臨齊上衡畢昴之星下瞰衡漳之地浦稱駿瀆馬頰太史之遺蹤地號弓髙龍額將軍之舊業爰于此地回構乾堂興八會之香臺闢三休之妙觀龔遂解繩之邑寶線爭長一作將曹丕沈李之郊天花競落螺宫映水枕藕關于黃河魚梵吟風接蜃樓于滄海實栖真之祕宅為育善之神區者哉蓬萊之水三尺孤標碣館之前扶桑之日再中獨立金臺之上俾夫天銷劫石瓊文寫而無窮地入微塵寶字書而不滅李嶠宣州大雲寺碑星榆月桂泛河鼓之天津露柏霜松出巴陵之地道山祗則讓夫荑境海若則輸其珍藏精衛銜石遇神營而中留靈蛇吐珠屬良緣而改獻內則香殿崛起若朱鳥舒翼冠南海之鵬雲前則涌塔化成若皇媧振鱗立東維之鼇柱翕赩璀璨帶璧而垂珠窈窕森沈藏煙而吐霧瓊林幽其妙境珍衛嚴其象設五通羅漢夾奉金山八部龍王分司玉砌窮壯麗于天巧擬威神于帝室故能使外道摧伏異方歸向四倒八謬瞻奈苑而心回五蓋六纒經竹園而纍盡岑勛西京千福寺多寶佛塔感應碑爾其為狀也則嶽聳蓮披雲垂蓋偃下歘崛以踊地上亭盈而媚空中暗暗其靜深旁赫赫以𢎞敞礝磩承陛琅玕綷檻玉瑱居楹銀黃拂戶重簷疊于畫栱反宇環其璧璫坤靈贔屭以負砌天祗儼雅而翔戶肩架鷙鳥肘擐修蛇冠盤巨龍帽抱猛獸勃如戰色有奭其容窮繪事之筆精選朝英之偈贊若乃開扄鐍窺祕奧二尊分座疑對鷲山千佛發題若觀龍藏金碧晃耀環珮葳蕤李雍五臺山清涼寺碑其山也左溟渤右孟津恆嶽揭其前隂山屋其後五峯對聳四望崇崇蓄隂陽之神秀含造化之奇特每至丹霄出日俯拍雲霞清漢無波下看星月可以侔鷲嶺可以闢蓮宫寒暑隔閡于簷楣雷風擊薄于軒牖星樓月殿憑林跨谷香窟花堂枕峯臥嶺尊顔有睟像設無聲觀之者發惠而興敬居之者應如而合道天花覆地積雪交輝梵響乘虛逺山相答珍木靈草仰施而紛榮神鐘異香降祥而聞聽凄風烈烈詎辨冬春奔溜潺潺不知晨暮封演魏州開元寺新建三門樓碑山不吝寶貞松大來炎涼未再水濱如積驚和嶠之千丈恧慶氏之百車陳會彭州九隴縣再建龍興寺碑是知摩騰建寺豈滯有為如來葺門寧妨無著以是因復寺而破性相者以為空寂兩忘方歸真諦性相俱在未入妙塗如是則理乖圓對法閡影從俾迷方者盡不得出于三塗溺川者何緣極于五衍茫茫八表盡從心猿浩浩羣生誰調意馬因知空寂與性相同途性相與空寂易軌非性相無以臻空寂非空寂無以見性相是知性相為空寂之筌蹄空寂因性相而超度如是則寺不得不復道不得不𢎞捨之不可猶四教之在躬為之則無何三乘之别載居處部道觀陳隂鏗遊始興道館詩紫臺髙不極青溪千仞餘壇邊逢藥銚洞裏閲仙書庭舞經乘鶴池遊被控魚稍昏蕙葉斂欲暝槿花疏徒教斧柯爛會自不凌虛周𢎞正和庾肩吾入道士館詩石橋看舊迹虛空儼衆仙菊潭溜餘水丹竈起寒煙桃花經作實海水屢成田逆愁歸里閈追問斧柯年唐王勃秋日仙遊觀贈道士詩石圖分帝宇銀牒洞靈宫回丹縈岫室復翠上巖櫳露濃金竈靜雲暗玉壇空野花常捧露山葉自吹風林泉明月在詩酒故人同待余逄石髓從爾命飛鴻又尋道觀詩芝㕓光分野蓬闕盛規模碧壇清桂閾丹洞肅松樞玉笈三山記金箱五嶽圖蒼虬不可得空望白雲衢楊炯和輔先入昊天觀星瞻詩遁甲爰皇里星瞻太一宫天門開奕奕佳氣鬱蔥蔥碧落三山外黃圖四海中邑居環若水城闕抵新豐玉檻崑崙側金樞地軸東上真朝北斗元始詠南風漢君祠五帝淮王禮八公道書編竹簡靈藥灌梧桐草茂瓊階緑花繁寶樹紅石樓紛似畫地鏡渺如空桑海年應積桃源路不窮黃軒若有問三月住崆洞李白尋雍尊師隱居詩羣峭碧摩天逍遙不記年撥雲尋古道倚樹聽流泉花暖青牛臥松髙白鶴眠語來江色暮獨自下寒煙孟浩然清明日宴梅道士房詩林臥愁春盡開軒覽物華忽逢青鳥使邀我赤松家丹竈初開火仙桃正落花童顔若可駐何惜醉流霞劉長卿過包尊師山院詩賣藥曾相識吹簫此復聞杏花誰是主桂樹獨留君潄玉臨丹井圍碁訪白雲道經今為寫不慮惜鵝羣韓翃同題仙遊觀詩仙臺下見五城樓風景凄凄宿雨收山色遙連秦樹晚砧聲近報漢宫秋疏松影落空壇靜細草香開小洞幽何用別尋方外去人間亦自有丹丘盧綸過李尊師院詩城闕望煙霞常悲仙路賒寧知樵子徑得到葛洪家犬吠松間月人行洞裏花留詩千載鶴送客五雲車訪世山空在觀碁日未斜不知塵俗士誰解種胡麻李益同蕭鍊師宿太一廟詩微月空山曙春初謁少君落花壇上掃流水洞中聞酒引芝童奠香餘桂女焚鶴飛將羽節遙向赤城分李端雲陽觀寄袁稠詩花洞晚沈沈仙壇隔杏林潄泉春谷冷搗藥夜窗深石上開仙酌松間對玉琴戴家溪北住雪後去相尋武元衡遊昊天觀詩瑶圃髙秋會金閨奉詔辰朱輪天上客白石洞中人珮響泉聲雜朝衣羽服親九重青瑣祕三秀紫芝新化藥秦方士餘桃漢侍臣玉笙王子駕遼鶴令威身歎逝頺波逺緘詞麗曲春重將悽恨意苔壁問遺塵賈島過陽道士居詩先生修道處茅屋逺囂氛叩齒坐明月搘頥望白雲精神含藥色衣服帶霞紋每語瀛洲路多年别少君許渾重遊蘇州玉芝觀詩髙梧一葉下秋初迢遞重來寄舊居月過碧窗今夜酒雨淋紅壁舊年書玉池露冷芙蓉淺金井煙分薜荔疏從此扁舟更東去仙翁應笑憶鱸魚趙嘏早出洞仙觀詩露濃如水灑蒼苔洞口煙蘿密不開殘月色低當戶後曉鐘聲迥隔山來春生藥圃芝猶短夜醮齋壇鶴未回愁是獨尋歸路去人間步步是塵埃羅隱聖真觀劉真師院詩簾下嚴君卦窗間少室峯攝生門已盡混迹世猶逢山藪師王烈簪纓友戴顒魚跳介象鱠飯吐葛玄蜂紫飽垂新椹黃輕墮小松塵埃金谷路樓閣上陽鐘野鶴鳶肩寄仙書鳥爪封支牀龜縱老取箭鶴何慵别久曾牽念間來肯壓重尚餘青竹在試為剪成龍梁沈約桐柏山金庭館碑銘故仙學之祕上聖攸尊啓玉笈之幽文貽金壇之妙訣駐景濛谷還光上枝吐吸煙霞變煉丹液出沒無方升降自已下棲洞室上賔羣帝覩靈嶽之驟啓見滄波之屢竭望玄洲而駿驅指蓬山而永騖芝蓋三重駕螭龍之蜿蜒雲車萬乘載旗斾之逶迤此蓋棲靈五嶽未暨夫三清者也若夫上玄奧逺言象斯絶金簡玉字之書玄霜絳雪之寶俗士所不能窺學徒不敢輕慕且禁誓嚴重志業艱劬自非天稟上才未易可擬翹心屬念晚臥晨興餐正陽于停午念孔神于中夜將五芝而延佇飛九丹而宴息九重嶢屼玉山璀璨日為車馬芝成宫觀虹旍拂月龍輈漸漢萬春方華千齡始旦周王褒靈臺館銘雲橋啓館景曜開扉明庭朝禮仙館羽衣燕履霄去鳬舄晨歸鍊石三轉燒丹七飛昆吾陶鑄丹陽鋈銑畫寫龍文圖開雕篆聲隨地氣調均天辨九宫方應萬靈稱善梁簡文帝招真館碑夫東瀛淥水三變成田西嶽靈桃千載未子尚以星起牽牛苛首迢遞律生甲子氣數杳冥况復上遊玉清損之又損髙排金闕玄之又玄豈言象之能筌非時節之所辨髙巖鬱起帶青雲而作峰瀑水懸流雜天河而俱灑雖日門採藥之地楚望懷椒之歌陽反流沙之魂錦識汾陽之鼎無以喻書銘曰玉龜二始金書八會道浹地心功浮天外故帝可小惟貞能大德起同塵善生塞兌保物自然人符交泰掩映緑蘿穹隆紫蓋仙冶之美此焉為最雄柱千步陽臺百丈水均下矚山踰髙掌野寂雲興禽繁山響升虹夕棲豐雷朝上書藏玉柙藥蘊銀筒燒鉛雜鯉折桂和蔥斧柯雖朽碎石無窮梁元帝衡山九貞館碑簫鼓騰空煙霞相接星辰奪采燈燭非明風牖雲梁千門萬戶樓施九柱已同瀨鄉之地山帶五城復類玄洲之所玉版之經猶蘊金丹之處存焉上月臺而遺愛登景雲而忘老欣欣然不知所以而然日暉石瓦東眺靈夀之峰月蔭玉牀西瞻華蓋之嶺竹類黃金既葳蕤而防露木似紅蓮且紛披而拂日杯傳九醞隱淪之車晨至堂開四扇西楹之鐘夜響唐盧照鄰益州至真觀主黎君碑琳堂鬱其峙起星闈忽以環周仰􅌄窱以嶙峋下崢嶸以廣朗隂娥假道窺玉女于南軒陽烏回轡招青禽于北閣李湜唐江州沖陽觀碑瑶林寶蕊髣佛三珠之麗邃宇崇堂依稀七寶之飾真容式備道氣殊髙少華金童捧金疑爐而入侍太清玉女捧真訣而來儀鑿沼營壇宛在風塵之外藥堂經藏蕭然松石之間李觀道士劉宏山院壁記馮山建基鑿石開戶墾磽確以植靈草撥崢嶸以樹修竹苔駮松徑風吟步虛巖收集作生夏雲林散秋色居處部道路梁簡文帝長安道神臯開隴右陸海實西秦推輪抵赤縣復道向宜春落花依度幰垂柳拂行人金張與許史夜夜尚留賔又梁元帝西接長楸道南望小平津飛甍臨綺翼輕軒影畫輪雕鞍承赭汗槐路起紅塵燕姬雜趙女淹留重上春又庾肩吾桂宫延復道黃山開廣路逺聽平陵鐘遙識新豐樹合殿生光彩離宫起煙霧日落歌吹還塵飛車馬度又陳徐陵輦道承雙闕豪雄被五都橫橋象天漢法駕應坤圖韓康賣良藥董偃鬻明珠喧喧擁車騎非但執金吾又梁庾肩吾洛陽道徼道臨河曲層城傍漢川金門才出柳銅井半含泉日起罘罳外車回雙闕前潘生時未返遙心從眷然又陳江總小平臨四逹長楸聽五鐘玉節迎司𨽻錦車歸濯龍絃歌聲不息環珮響相從花障蕩舟笑日映下山逢又唐沈佺期詩九門開洛邑雙闕對河橋白日青春道軒裳半下朝乘羊稚子看拾翠美人嬌行樂歸恆晚香塵撲地遙唐歐陽詹棧道銘序立巨衡而舉追氏縋懸纑以下梓人猿垂絶𡨕鳥傍危岑鑿積翠以全力梁半空於木棚斜根玉壘旁綴青泥截斷岸以虹矯繞翠屏而龍踠堅徑膠固雲橫砥平總庸蜀之通途繞岐雍之康莊都邑之能步山川之無脛若水決防如鴻嚮陽南之北之踵武湯湯躋峨峨以自若臨蒼蒼而不懼陳徐陵丹陽上庸路碑至如月離金虎泥染石牛薈蔚朝興滂沱晚至而清蹕才動纎羅不搖髙閈將臨油雲自闢陽烏馭日寧懼武賁之功飛雨蔽天無待期門之蓋震維舉德非曰尚年若發居酆猶莊在漢濤如白馬既凝廣陵之江山曰金牛用險梅湖之路専州典郡青鳬赤馬之船皇子天孫鳴鳯飛龍之乘莫不欣斯利涉玩此修渠乍擁節而長歌乃摐金而鳴籟斯實曠世之奇功無疆之鴻烈者也居處部關梁唐閻伯璵函谷關賦函谷天險𢎞農邦鎮南據二虢北荒三晉洞開一軌壁立千仞徑薦雙合梯苔孤峻世濁先封道康後順逺秦塞近崤陵幽泉脈脈斷峰稜稜增陴霧杳聚柝煙凝髙卑異級坻崿相承靡屆靡究不騫不崩實隄防之樞轄為造化之緘縢張翌潼關賦柱史老聃擁仙雲而西邁終軍童子建使節而東行文仲不仁廢六關而興誚王元有説封一丸而永清若用備不虞取諸繫象作邦畿之襟帶杜姦宄之來往長墉矗兮雲屯層樓赫以霞敞登臨者有知其地雄踰越者無漏于天網亦有孟嘗奔走長宵未曙何白馬之不談學雞鳴而乃去王啓武關賦縱下客之雞鳴將開莫可任公孫之馬白欲度無由蕭條古壘豈臧文之廢來寂寞空扉似楊僕之遺後杜顔灞橋賦飛梁默以霞起綵柱曄其星舒九陌咸湊三條所如閻伯璵河橋賦却頓鐵牛駭浮川之魍魎旁飛畫鷁驚入浪之黿鼉竹笮其維不虞于奔濤擘赫金鎖斯纜何懼于層氷皚峨豈比夫虹能象之不可以來往鵲能填兮不可以經過既似乎瀑布之界天台又似乎蓬萊之橫海島華柱上征殊馬援之標界石臺中聳若鼇力之負山舟形崎嶬似火龍之飲川梁勢聨綿疑海鵬之點翼獨孤及古函谷關銘序天作崤函俾屏京室崇山回合連岡叢倚長河屈盤萬里來束崖奔嶺蹙谷扼溪鬭崛起重險為秦東門截函夏于閫域鎖天府于戶牖外扼八州之咽喉故百二形焉內擁六合之奧區故霸王出焉當其中原鹿駭戰國蝟起嬴氏建瓴山東擇肉宇內持戟百萬連衡此關是時也開門而九國師遁振䇿而二周鼎入奄有大寶遂吞中國洎江返秦璧天祐漢祚髙皇帝提劒而起以遏亂略斬白帝絏降王舉漢中平咸陽廓金城以建都活萬姓于三章取威定功此焉是保停驂塞門憑覽舊國襟帶如故世道不留秦餘空山漢遺茂草恐復舟失于壑岸化為谷萬載之後昧者不知乃刻頌此石以示來裔皮日休藍田關銘序秀欲染眸危將驚魄張彧趙郡南石橋銘斡地泉開盤根玉甃虹舒電拖虎步雲構力將岸爭勢與空鬭吞齊跨趙警夜防晝月桂虛蟾星羅伏獸謂之鈐鍵撮我宇宙謂之關梁扼我一作延戎寇質含冰碧文輝藻秀花影全芳苔痕半舊喬潭中渭橋記丹柱插於坎陷一作窞朱欄赩而電炫一作烻乃虹引成勢猶鵲填就功濟濟有衆憧憧往來車馬載馳而不危水潦起漲而轉固人思啓者吾其能濟赩赩赫赫轟轟闐闐且周穆之駕黿鼉振千祀也東明之聚魚鱉稱一時也孰若我由之而必達憑之而必安居處部城唐張嵩雲中古城賦于是魏祖發大號鼓洪爐天授宏略神輸祕圖北清獯獫南振荆吳繇是一太隂以建極則廣莫而論都遂徴板幹庀徒卒鏟嶕嶢剞崛屼因方山以列榭按長城以為窟既雲和而星繁亦星連而嶽突月觀霞閣左社右鄽玄沼泓汯湧其後白樓􅏭嶴興其前闕華山為城賦地控強秦路惟分陜有太華之作固若崇墉之生險絶壑中抱重巒外掩倚雲漢而匝野屏開跨金方而當空黛染千尋壁立萬雉雲屯龍盤日月虎視乾坤大河自北而東呀為濬洫窮谷從中而斷豁若重門誠百二之光宅見九五之天尊况乎天地初霽雲霞四披紅塵滅影碧落標奇宿霧市之氣尚疑煙闕聳蓮峰之色不讓文陴顧萬夫之莫向信六國而奚為岌岌神才言言天設連岸抱九州之路壯氣折諸侯之節蕭蕭歸馬想飲窟之初還隱隱輕雷訝鳴鼓之不歇天包地束鳥過雲輕萬仞垂峭千峰入𡨕髣佛虹霓盡識旌旗之色依稀星月皆分弧矢之形疑其發迹混茫孕兹重阻假巨靈拔山之力衛王者登龍之所陳諷新築峨和城賦元侯以制敵之雄略期方隅之永清得奔衝之故地創備守之新城四合分形見岡巒之表裏百堵定制變勝負之虛盈崒雲屯而霞起忽虎踞而龍行倚蒼壁以中絶黏赬壤而外明將伐謀禦力制敵投兵馭亭障于振策摧氐羌于矯衡是知地利攸歸兵家大福我有巨防師無遺鏃神謀洞啓而機張天險載興而板築於以巒披岡削嶺門崖谷此二句一作披岡削嶺門崖塹谷雉堞霜皓麗譙雲矗連山上捧鬭士以之增威峭壁初嚴戎王于焉慟哭矧夫勢雄形固師嚴令肅數萬落于屈指睇連營于寸目何暫費于經營永無虞于敗覆周城朔方漢得赤坂無制勝之明術徒疲人以勤逺徐彥伯登長城賦鑿臨洮之西徼穿負海之東隅猛將虎視焉存綱紀謫戍勃興鈎繩亂起連連塢壁岌岌亭壘飛芻而挽粟者十有二年塹山而堙谷者三千餘里黔首之死亡無日白骨之悲哀不已猶欲張伯翳之絶胤馳棠梨之驕子棠梨疑作撑犁曾不知失全者易傾逆用者無成夢驂徴其敗德斬蛇驗其鴻名板築未艾君臣顛沛六郡沙漠五原旌斾昔者韓信猜叛李陵拘執望極燕臺山橫馬邑戰雲愁聚衝飇晦急莫不陵地脈以扣心望天街以隕泣亦有王昭直送蔡琰未還路盡南國亭臨北蠻貯漢月于衣袖裛胡霜于髻鬟雖寵盈氊幄而魂斷蕭關至若趙王遷逐馬融幽放去家離土踰沙歷障夢蠨蛸之戶側坐蠮螉之塞上桃李夕兮有所思綺羅春兮遙相望登毁垣以劈摽坐頺隅以惆悵是以衛青開幕張遼闢土校尉嫖姚將軍捕虜剃垣鋪障鋤亭伐鼓斬元于鐵防之門流血于金河之浦張虎牙以泄憤虬蝟鬚以蓄怒及夫中郎徇節博望踰邊取劒仆地尋河際天幽海上而萬里竄胡中而幾年銀車薦出玉節仍旋南向國兮樂只北違沙以莞然嗚呼長城之設載踰九百古往今來巋然陳迹窮海戰士孤亭戍客登峻墉陟窮石嗟故里而不見感殊方以殞魄者亦何可勝道哉李嶠奉使築朔方六州城率爾而作詩奉詔受邊服總徒築朔方驅彼旃裘族正此戎夏疆子來多恱豫王事寧怠遑三旬無愆期百雉鬱相望雄視沙漠垂有截北海陽二庭已頓顙五嶺盡來王驅車登崇墉顧盼凌大荒千里何蕭條草木自悲涼憑軾訊古今慨焉感興亡漢障緣河逺秦城入海長顧無廟堂䇿貽此中夏殃道隱前業衰運開今化昌制為百王式舉合千載防馬牛被路隅鋒鏑銷戰場豈不懷殆勞所圖在永康王車何為者稱代陳頌章陳子昻白帝城懷古詩日落滄江晚停橈問土風城臨巴子國臺沒漢王宫荒服仍周甸深山尚禹功巖懸青壁斷地險碧流通古樹生雲際孤帆出霧中川途去無限客思坐何窮許渾登故洛陽城詩禾黍離離半野蒿昔人城此豈知勞水聲東去市朝變山勢北來宫殿髙鴉噪暮雲歸古堞鴈迷寒雨下空壕可憐緱嶺登仙子猶自吹笙醉碧桃符載蘄州新城門頌序度舊址量客土備畚鍤嘯丁壯勃焉而興于是謹刀布以索力拷鼛鼓以蕩氣嚴進退以設令立師伍以程課蒸徒雷呼萬鎚星飛誅惰聳勞間無留時門臺睥睨霞赩雲截如崇山斷岸邈不可嚮吕溫三受降城碑銘有拂雲祠者在河之北地形雄坦控扼樞會虜伏其下以窺域中禱神觀兵然後入寇甲不及擐突如其來鯨一躍而吞舟虎數步而擇肉塞草落而邊氓懼河冰堅而羽檄走爰自受命至于中興國無寧嵗景龍二年默啜強暴瀆鄰構怨掃境西伐漠南空虛朔方大總管韓國公張仁願躡機而謀請築三城奪據其地跨大河以北嚮制胡馬之南牧中宗詔許橫議不撓於是留及瓜之戍斬姦命之卒六旬雷動三城嶽立以拂雲祠為中城東西相去各四百里過朝那而北闢斥候迭望幾二千所損費億計減兵萬人分形以據同力而守東極于海西窮于天納隂山于寸眸拳大漠于一掌驚塵飛而烽火耀孤鴈起而刁斗鳴涉河而南門用晏閉亘漠橫塞揭兹雄壁如三鬭龍躍出大澤並分襟帶各閉風雷俯視隂山仰看昭回一夫登陴萬里洞開日晏秋盡纎塵不來居處部𪠘署唐宋之問和庫部李員外秋夜寓直詩相庭貽慶逺才子拜郎初起草儀仙閣焚香臥直廬更深河欲斷節徑柳偏疏氣耿凌雲筆心搖待漏車叨榮厠儔侣省已恧空虛徒斐陽春和難參麗曲餘蘇頲春晚紫微省直贈內詩直省清華接建章向來無事日猶長花間燕子栖鳷鵲竹下鴛雛繞鳯凰內史通宵承紫詔中人日晚愛紅粧别離不慣無窮憶莫誤卿卿學太常冦坦同張少府知庫狄員外夏晚初霽南省寓直兼充節度判官詩黃綬歸休日仙郎復奏餘宴居當夏晚寓直會晴初露散星文發雲披水鏡居髙才推獨唱嘉會喜連茹月色搖春闥香煙藹暝廬千門傳夜警萬象照階除少孺嘉能賦文強閲賜書兼曹謀未展入幕志方攄為奉靈臺帛恭先待漏車貞標不可仰空此樂樵漁王維和崔員外秋宵寓直詩建禮髙秋夜承明候曉過九門寒漏徹萬井曙鐘多月迥藏珠斗雲開出絳河更慙衰朽質南陌共鳴珂杜甫晚出左掖詩晝刻傳呼淺春旗簇仗齊退朝花底散歸院柳邊迷樓雪融城濕宫雲去殿低避人焚諫草騎馬欲雞棲又春夜宿左省詩花隱掖垣暮啾啾棲鳥過星臨萬戶動月傍九霄多不寢聽金鑰因風想玉珂明朝有封事數問夜如何崔皓奉和許給事夜直簡諸公詩西掖黃樞近東曹紫禁連地因才子拜人用省郎遷夜直千門靜河開萬象懸建章宵漏急閶闔曉鐘傳寵列貂蟬位恩深侍從年九重初起草五夜即成編顧已無官次循涯但自憐逺陪蘭渚作空此仰神仙岑參西省即事詩西掖重雲開曙色北山疏雨點朝衣千門柳色連青瑣三殿花香入紫微平明端笏陪鴛列薄暮垂鞭信馬歸官拙自悲頭白盡不如巖下掩荆扉常衮晚秋集賢院即事寄徐薛二侍郎詩穆穆上清居沈沈中祕書金鋪深內殿石甃淨寒渠花樹臺斜倚空煙閣半虛縹囊披錦翠繡軸卷瓊琚墨潤冰文繭香銷蠧字魚翻黃桐葉老吐白桂花初舊德雙遊處聫芳十載餘北朝榮庾薛西漢盛嚴徐侍講親華扆微吟步綺疏綴簾金翡翠賜硯玉蟾蜍序秩東西逺離憂嵗月餘承明期重入江海意何如司空曙奉和常舍人晚秋集賢院即事寄徐薛二侍郎詩藹藹鳯凰宫蘭臺玉署通夜霜凝樹羽朝日照相風官附三台首儒開百氏宗司言陳禹命侍講發堯聰香卷青編內鉛分緑字中綴籖從太史鏘珮揖羣公池接天泉碧林交御果紅寒龜登故葉秋蝶戀疏叢顔謝徴文並鍾裴直事同離羣驚海鶴屬思怨江楓地逺姑蘇外山長越絶東慙當哲匠後下曲本難工盧綸和常舍人晚秋集賢院即事十二韻寄贈江南徐薛二侍郎詩綸閣九華前森沈綵仗連洞門開旭日清禁肅秋天霜滿朝容備鐘餘曉唱傳瑶璫陪羽扇端辨入爐煙麟筆刪金篆龍綃薦玉編汲書荀朂定漢史蔡雍専御竹潛通筍宫池暗瀉泉亂叢縈弱蕙墜葉灑枯蓮列署齊遊日重江並謫年登封思議草侍講憶同筵滄海風濤廣黝山瘴雨偏唯應緘上寶贈逺一呈妍盧綸酬金部王郎中省中春日詩南宫樹色曉森森雖有春光未有隂鶴侣正宜芳景引玉人那為簿書沈山含瑞氣偏當日鶯逐輕風不在林更有阮郎迷路處萬株紅樹一溪深劉禹錫早秋集賢院即事詩金數已三伏火星西正流樹含清露曉閣倚碧天秋灰琯應新律銅壺添夜籌商飇從朔塞爽氣入神州蕙草香書殿槐花點御樓山明真色見水淨濁煙收早嵗忝華省再來成白頭幸依羣玉府有路向瀛洲溫庭筠休浣日謁西掖所知詩赤墀髙閣自從容玉女窗扉報曙鐘日麗九華青瑣闥雨晴雙闕翠微峰毫端蕙露滋仙草琴上薰風入禁松荀令鳯池春婉娩好將餘潤變魚龍吕讓楚州刺史廳壁記乃築崇基乃創宏規恱使樂成不亟不遲法度既備丹素亦施清氣和風旦暮颸颸氛厲不干笑語是怡大會其中寒暑皆宜駢列鐘鼓間發塤篪劒士伎兒飲食熙熙以寬以容逮于養厮觀及逺邇何物不綏白居易許昌縣令新廳壁記公署吏所命次圖廳事取材于土物取工于子來取時于農隙然後豐約量其力廣狹稱其位儉不至陋壯不至驕庇身無燥濕之憂視事有朝夕之利官由是而立政由是而舉民由是而乂建一物而三事成其孰能不韙之哉劉寬夫邠州節度使院新建食堂記夫為理之本在于得人燕以尊賢是稱衛以多士是美令鰌瑗在列而堂館未嚴非所以重樽俎咨帷幄之意也因是從觀馬之舊亭敞公府之新宇增臺陛所以示尊嚴也卜髙明所以啓顧慮也大不踰制崇不近奢榱桷礎闥無不中度翼張四簷洞開雙扉冬霜不到夏日潛却可以備盤餐之品式可以敘賔主之威儀可以寄琴樽之笑傲可以籌政令之得失柳宗元盩厔縣新食堂記廩庫既修學校既成取其餘材以構斯堂周阿峻嚴列楹齊同其飾之文質階之髙下視邑之大小與吏之品秩不陋不盈髙山在前流水在下可以俯仰可以宴樂舒元輿御史臺新造中書院記梁棟甚宏柱石甚偉椽欒楶梲麗而不華門窗戶牖華而不侈名木修篁新姿如舊若升緑雲若編青簫權德輿開州刺史新宅記慶農功之隙因恱使之衆合於古常得其時制殖殖廣庭渠渠中堂堂下布武席間函丈工徒不勞里旅不煩攸介攸止為仁為義君子綏之邦人宜之其潔而中禮儉以成德與夫臧文之山藻趙武之輪奐異矣又宣州響山新亭新營記乃量日力計徒庸闢于弇內成是夷道華軒峻宇皆據勝勢廣厦疏窗可棲皓氣碧山亘日清流在下跨以虹梁抵兹近郊因兹爽塏乃列營署居處部園囿亭臺漢班固東都賦是以皇城之內宫室光明闕庭神麗奢不可踰儉不能侈外則因原野以作苑填流泉而為沼發蘋藻以潛魚豐圃草以育獸制同乎梁鄒誼合乎靈囿晉張協玄武館賦於是崇墉四匝豐厦詭譎爛若丹霞皎如素雪璀璨皓旰華璫四垂接棟連阿崥嶱參差朱戶青鋪幽闥祕閨於是髙樓特起竦峙岧嶤飛甍四注上槩浮霄直亭亭以孤立迎千里之清飇陽扉南啓隂軒北達春牖左開秋窗右豁仰視雲根俯臨天末左思魏都賦菀以玄武陪以幽林繚垣開囿觀宇相臨碩果灌叢圍木竦尋篁篠懷風蒲桃結隂回淵漼積水深蒹葭贙雚蒻森丹藕凌波而的礫緑芰泛濤而浸潭羽翮頡頑鱗介浮沈棲者擇木雊者擇音若咆渤澥與姑餘常鳴鶴而在隂表清籞勒虞針思國恤忘從禽樵蘇往而無忌即鹿縱而匪禁宋謝靈運山居賦爰初經略杖䇿孤征入澗水涉登嶺山行紆頂不息窮泉不停櫛風沐雨犯露乘星研其淺思罄其短規非龜非筮擇良選奇翦榛開徑尋石覔崖四山周回雙流逶迤陵名山而屢止過巖室而披情雖未階于至道且緬絶于世纓若乃南北兩居水通陸阻觀風瞻雲方知厥所九泉别澗五谷異巘抗北頂以葺館瞰南峰以起軒羅層崖于戶裏鏡清瀾于窗前修竹葳蕤以翳薈灌木森叢以蒙茂蘿蔦蔓延以攀援香花芬薰而媚秀日月投光于柯間風霧披清于崴岫夏涼寒燠隨時取適此焉卜寢玩水弄石及其二川合流異源同口赴隘入險俱會山首瀨排沙以積岸島倚渚以起阜畦町斸藝合蕊藉芳緑葵眷節以懷露白薤感時而負霜梁沈約郊居賦爾乃傍窮野指荒郊編霜菼葺寒茅構棲噪之所集築町疃之所交因犯簷而刋樹由妨基而剪巢織宿楚而成門藉外扉而為戶既取隂于庭樾又因籬以芳杜草則蘋萍芡芰菁藻蒹菰石衣海髮黃荇緑蒲動紅荷于輕浪覆碧葉于澄湖其陸卉則紫􅀢緑葹天薯山韭鴈齒麋舌牛唇彘首若乃園宅殊制田圃異區李衡則橘林千樹石崇則雜果萬株並豪情之所侈非儉志之所娛欲令紛披蓊鬱吐緑攢朱開丹房以四照舒翠葉而九衢其林鳥則翻泊頡頏遺音下上楚雀多名流嚶雜響或斑尾而綺翼或緑襟而絳顙好葉隱而枝藏乍間關而來往其水禽則大鴻小雁天駒澤虞秋鷖寒鷘修鷁短鳬翅抨波而起沫翼鼓浪而成珠其魚則赤鯉青魴纎鯈巨鱯碧鱗朱尾修鱸偃額小則戲渚成文大則噴流揚白惟鍾巖之隱鬱表皇都而作峻蓋望秩之所宗含風雲而吐潤孤嶝橫插洞穴斜經千丈萬仞三襲九成亘繞州邑欵跨郊坰素煙晚帶白露晨縈近循則一巖異色逺望則百嶺俱青時言歸于陋宇聊暇日以翺翔獸依庭而莫駭魚牣沼而不綱晚樹開花初英落蕊異林而分丹素因風而雜紅紫青蓮夜發紅荷曉舒輕風微動芬芳襲余冰懸坎而帶坻雪縈松而蔽野鴨屯飛而不散鴈髙翔而欲下傷余情之頽暮憂與愁其相溢悲異軫而同歸歡殊万而並失時復寄情魚鳥歸間蓬蓽傍闕吳娃前無趙瑟唯以天地之恩莫報書事之官靡述徒重于髙門之地不載於良史之筆長太息以何言羞愧心之非一周庾信小園賦余有數畝敝廬寂寞人外聊以擬伏臘聊以避風霜雖復晏嬰近市不求朝夕之利潘嶽靣城且適間居之樂况乃黃鶴戒露非有意于輪軒爰居避風本無情于鐘鼓陸機則兄弟同居韓康則舅甥不别蝸角蚊睫又足相容者也爾乃窟室徘徊聊同鑿坯桐間露落柳下風來琴號珠柱書名玉杯有棠梨而無館足酸棗而非臺猶得欹側八九尺縱橫數十步榆柳兩三行梨桃百餘樹撥蒙密兮見窗行欹斜兮得路蟬有翳兮不驚雉無羅兮何懼坐帳無鶴支牀有龜鳥多間暇花隨四時落葉半牀狂花滿屋名為野人之家是謂愚公之谷試偃息于茂林乃久羡于抽簪雖有門而長閉實無水而恆沉三春負鋤相識五月披裘見尋問葛洪之藥性訪京房之卜林草無忘憂之意花無長樂之心烏何事而逐酒魚何情而聽琴唐王勃九成宫東臺山池賦驛沖情于月道飛峻賞于煙墟指山楹而思逸懷水鏡而神虛復嶂煙回攢溪霧錯規疊巘于盤龍憲飛泉于挂鶴覆簣而縈巖磴浮芥而環洲崿採拳石于瑶濵搴纎珠于綺薄萍徙楚江之蒂花轉崑墟之萼岫蘊玉而鴻驚浦涵珠而星落嶺分雞秀波連鳯液花鳥縈紅蘋魚漾碧每至景沈西崿月下東濵峰深夜久潭靜秋新荷抽水蓋薜引山茵雪芝獻液露菊傾津嗣南商之逸興有東海之遐賔保林泉而肆賞混簪紱而同塵何濯纓之有地如攀桂之無因宋之問太平公主山池賦圖萬重于積石匿千嶺于天台荆門揭起兮壁峻少室叢生兮劒開削成秀絶蓮華之覆髙掌獨立窈窕神女之戲陽臺向背重復參差反覆翳薈蒙蘢含青吐紅陽崖奪景隂壑生風奇樹抱石新花灌叢楊系通天臺賦赫兮烜兮獨出煙雲之表壯矣麗矣迥標天地之中柏梁不同井幹非匹勢岌嶷以山峙體曈曨而景軼中邃窅窱入之者當晝而居昏上跂崚嶒登之者先曙而觀日偓佺於是乎宴處安期於是乎暇逸月上壁而旁飛雲緣梯而下出拂軒楯之宛轉步簷楹之倒影闕通天臺賦昔漢皇帝幸甘泉宫肆目將逺築臺其中髙居物外若與天通祈列仙之戾止致聖夀之延洪繹繹憑雲蹲蹲捧日干元氣以直上倚長空而迥出危檻岧嶤回途鬱律植承露之盤開肅神之室將以接上元朝太一梁庾肩吾從皇太子出玄圃應令詩春光起麗譙屣步陟山椒閣影臨飛蓋鶯鳴入洞簫水還澄故渚樹長合前橋緑荷生綺葉丹藤上細苗顧循慙良藻何用擬瓊瑶陳張正見春初賦得池應教詩遙天收密雨髙閣映奔曦雪盡青山路冰消緑水池春光落雲葉花影發晴枝琴樽奉終宴風月豈云疲周庾信登州中新閣詩跨虛凌倒景連雲拒少陽璇極龍鱗上雕甍鵬翅張千尋文杏照十里木蘭香開窗對髙掌平坐望河梁歌響開天樂鐘聲徹建章賦用王延夀書須韋仲將龍來隨畫壁鳯起逐吹簧石作芙蓉影池如明鏡光花梁反披葉蓮井倒垂房徒然思燕賀無以預鵾翔又山齋詩寂寥尋靜室蒙密就山齋滴瀝泉澆路穹窿石臥階淺槎全不動盤根唯半埋殘珠墜曉菊細火落空槐直置風雲慘彌憐心事乖陳徐陵山齋詩桃源驚往客鴻嶠斷來賔復有風雲處蕭條無俗人寒山微有雪石路本無塵竹徑朦朧巧茅齋結構新燒香披道記懸鏡壓山神砌水何年溜簷桐幾度春雲霞一已絶寧辨漢將秦齊蕭慤臨髙臺詩崇臺髙百尺迥出望仙宫畫栱浮朝氣飛梁照晚虹小衫飄霧縠艷粉拂輕紅笙吹汶陽篠琴奏嶧山桐舞逐飛龍引花隨少女風臨春今若此極宴豈無窮唐盧藏用奉和立春遊苑詩天遊御輦駐城闉上苑遲光晚更新瑶臺半入黃山路玉檻傍臨玄灞津梅香欲待歌前落蘭氣先過酒上春幸預柏臺稱獻夀願陪千畝及農辰又沈佺期詩東郊暫轉迎春仗上苑初飛行慶杯風射蛟冰千片斷氣衝魚鑰九關開林中覔草才知荔殿裏爭花併是梅歌吹銜恩歸路晚棲烏半下鳯城來盧照鄰相如琴臺詩聞有雍容地千年無四鄰園院風煙古池臺松檟春雲疑作賦客月似聽琴人寂寂啼烏處空傷遊子神宋之問登越王臺詩江上越王臺登髙望幾回南溟天外合北户日邊開地濕煙常起山晴雨半來冬花掃盧橘夏果摘楊梅迹類虞翻枉人非賈誼才歸心不可見白髮重相催又使過襄陽登鳯林寺山閣詩香閣臨清漢丹梯隱翠微林篁天際密人世谷中違苔石銜仙洞蓮舟泊釣磯山雲連棟起江雨入庭飛信美雖南國嚴程限北歸幽情不可再留步惜芳菲沈佺期奉和晦日幸昆明池應制詩法駕乘春轉神池象漢回雙星遺舊石孤月隱殘灰戰鷁逢時去恩魚望幸來岸花緹綺繞堤柳幔城開思逸橫汾唱歡流宴鎬杯微臣雕朽質羞覩豫章材徐彥伯興慶池侍宴應制詩夾道傳呼翊翠虬天回日轉御芳洲清潭曉靄籠仙蹕紅嶼晴花隔綵旒香溢金杯環廣座聲搖妓舸匝中流羣臣相慶嘉魚樂共哂橫汾歌吹秋又蘇頲詩降鶴池前回步輦栖鸞樹杪出行宫山光積翠遙相逼水態含情近若空直視天河垂象外俯窺京室畫圖中皇歡未使恩波極日暮樓船更起風又沈佺期詩碧水澄潭映逺空紫雲香輦御微風漢家宫闕疑天上秦地山川似鏡中向浦回舟萍已緑分林蔽殿槿初紅古來徒羡橫汾賞今日宸遊聖藻雄又韋元旦詩神池泛濫水盈科仙蹕紆餘步輦過縱棹回沿萍溜合開軒眺賞麥風和潭魚在藻欣遊泳谷鳥含櫻入賦歌寄謝乘槎溟海客詎須來此問天河李嶠王屋山第之側雜構小亭暇日與羣公同遊詩桂亭依絶巘蘭榭俯回蹊綺棟魚鱗出雕甍鳯羽棲引泉聊漲沼鑿磴且通溪席上山花落簷前野樹低弋林開曙景釣渚發晴霓狎水驚梁鴈臨風聽楚雞復看題柳葉彌喜蔭桐圭劉長卿題干越亭詩天髙愁望絶亭上柳條新落日獨歸鳥孤舟何處人生涯投嶺徼世業陷邊塵江入千峰暮花連百越春秦臺憐白首楚水怨青蘋草色無征路鶯聲傍逐臣獨醒翻取笑直道不容身得罪風霜苦全生天地仁青山數行淚滄海一窮鱗流落誰相識空將鷗鳥親許堯佐石季倫金谷園詩石氏遺文在凄涼見故園輕風思奏樂衰草憶行軒舞榭荒苔掩歌臺墜葉繁斷雲歸舊壑流水咽清源曲渚殘虹斂叢篁宿鳥喧空餘林上月長似對金尊又李君房詩梓澤風流地凄涼迹尚存殘芳迷妓女衰草憶王孫舞態隨人謝歌聲寄鳥言池平森灌木月落弔空園流水悲難駐浮雲影自翻賔階餘蘚石車馬詎喧喧白居易題周皓大夫新亭詩東道常為主南亭列大賔規模何日創景致一時新廣砌羅紅藥髙窗蔭緑筠鎖開賔閣曉梯上妓樓春置醴寧三爵加籩過八珍茶香浮紫筍膾縷落紅鱗輝赫車輿鬧珍奇鳥獸馴獼猴看櫪馬鸚鵡喚家人錦額簾髙捲銀花盞謾巡勸嘗光祿酒許看洛川神斂翠凝歌黛流香動舞巾裙翻繡鸂鶒梳陷鈿麒麟笛怨音含楚箏嬌語帶秦侍兒催畫燭醉客吐文茵投轄多連曙鳴珂更達晨入朝紆紫綬待漏擁朱輪貴介交三事光榮照四鄰甘濃將奉客穩暖不緣身十載歌鐘地三朝節鉞臣愛才心倜儻敦舊禮殷勤門以招賢盛家因好事貧始知豪傑意富貴為交親梁何遜七召千門始構百常洞啓激洛開渠疏山抗陛延袤水陸曠望東西下臨江海上屬雲霓百丈杳𡨕以飛跨九層鬱律以階梯步三休而更迥塗中宿而方迷雕牆屈曲以交㸦網戶周流以重積既隂涔而影響亦呌嘯而回易沙板金鋪紫柱玉舄煒煌熻赩硱磳摶敞圖雲霧之蔽虧狀神仙之來往璧璫自耀珠綴恆響蜉蝣動而晝喧熠耀飛而夜朗既臨下以寥泬亦憑髙而泱漭聞疾雷于階陛弄奔星于帷幌亘以曲堂周以洞房北負連闥南注長廊綺疏交映鏤檻相望燕飛蓮井日照杏梁陽烏鶱其將動雲鳯矯而欲翔若乃後沼開源延石崇壤擬崑閬之㠨􅔍比滄溟之瀇漾其中則有桂宫柏寢吳臺柘館復道耿介而連雲阿閣穹隆而仰漢望虬欄之映水見丹鶴之出岸艷草奇色臺樹珍名長生靈夀男華女貞河柳垂葉山榴發英玩奇華之春滿摘甘食于夏成此實宫苑之壯麗豈能從我而為榮齊王融三月三日曲水詩序芳林園者福地奧區之湊丹陵若水之舊殷殷均乎姚澤膴膴尚于周原狹豐邑之未宏陋譙居之猶褊求中和而經處暌景緯以裁基飛觀神行虛簷雲構離房乍設層樓間起負朝陽以抗殿跨靈沼而浮榮鏡文虹于綺疏浸蘭泉于玉砌幽幽叢薄秩秩斯干曲拂邅回潺湲往復新蓱泛沚華桐發岫雜夭采于柔荑亂嚶聲于綿羽宋鮑照凌煙樓銘序伏見所製凌煙樓棲置崇回延瞰平寂即秀神臯因基地勢東臨吳甸西眺楚關奔江永瀉鱗嶺相葺重樹窮天通原盡目悲積陳古賞絶舊年誠可以暉曠髙明藻徹逺心矣唐宋之問早秋上陽宫侍宴序徒觀其離宫别殿彌復道而亘南端髙閣重甍瞰崇墉而連北斗滄洲曉氣化為宫闕之形閶闔秋風亂起金銀之樹降雕輿而式宴簪紼凝嚴披鏤檻而升髙山河在目參光有地遊日月于天邊睨逺無窮見城池于掌上四達分九重之路積樹捎雲雙莖當鐵鎖之橋流珠耿漢霞漿玉醴與湛露而俱傾鳯管龍絲雜商飇而共作陳江總永陽王齋後山亭銘叢臺造日淄館連雲錦牆列繢繡地成文吾王卓爾逸趣不羣梅梁蕙閣桂棟蘭枌竹深蓋雨石暗迎曛激流疑疏搆峰似削苔滑危磴藤攀聳崿樹影搖窗池光動幕月澄遙溆風清近壑雪岸難消花園易落髙桐百尺垂楊五株開榮九畹結秀三珠山條紫的水葉紅鬚抽芳繞霤接翠分衢亭歡旅鶴浦噪驚鳬前列牧馬後招郇伯諷誦楚詩精微沛易叢桂留賞散金匪惜不羡睢陽還嗤碣石馳聲終古服義無斁唐歐陽詹二公亭記家有餘糧囿有餘木或掬一抔土焉或剪一枝材焉一心百身蜂還蟻往榛莽可去以自剃瓦甓無脛而奔萃糊白墳以呈素雘頳壤而垂繪通以虹橋綴以綺樹華而非侈儉而不陋煙水交浮嵒巒疊回精舍奉其旁達都城企其遐際容影光彩搖漪入澗指朱軒于潭底閲雲岑于波裏爌熿油油如飛若動權德輿許氏吳興溪亭記青蒼在目潺湲激砌晴煙蔭嵐明晦萬狀鷗飛魚遊不驚不喁時時歸雲來冒茅洞許氏方岸鶡冠支笻竹目送溪鳥口吟招隱則神機自生利欲自薄百骸六藏之內纍無自而入焉有田二頃傅于亭下鎡基之功出于僮指每露蟬一聲秋稼成實倚杖眺逺不覺日暮白居易白蘋洲五亭記每至汀風春溪月秋花繁鳥啼之旦蓮開水香之夕賔友集歌吹作舟棹徐動觴詠半酣飄然恍然遊者相顧咸曰此不知方外也人間也又不知蓬瀛崑閬復何如哉李紳四望亭記春臺視和氣夏日居髙明秋以閲農功冬以觀肅成蓋君子布和求瘼之誠志豈徒縱目于白雪望雲于黃鶴庾樓夕月峴首春風蓋一時之勝爽無四者之臨眺斯亭之佳景固難儔儷哉淮柳初變濠泉始清山凝逺嵐霞散餘綺李德裕易州候臺記澤從雲遊心入水淨俗變于道禮賢存擁篲之風人歌其德聽訟擬坐棠之化幸三年而政教已成雖一日而牆宇必葺以為先王議事理不忘本君子懷德人惟求舊况候臺易之古臺也壯址仍存昭王燕之賢王也盛德不泯欲觀古人之象至止可以肅肅如享太牢之味登之可以熙熙閻伯里黃鶴樓記州城西南隅有黃鶴樓者圖經云費禕登仙嘗駕黃鶴返憩于此遂以名樓事列神仙之傳迹存述異之志觀其聳構巍峩髙標巃嵸上倚河漢下臨江流重簷翼館四闥霞敞坐窺井邑俯拍雲煙亦荆吳形勝之最也何必賴鄉九柱東陽八詠乃可賞觀時物會集靈仙者哉符載五福樓記自下而望之也若鼇山冠雲蜃氣橫天霓裳鶴駕縹眇髣佛及其登也居皓氣之中坐青霞之側惝恍自顧謂生羽翼二江東注萬井如畫耳聞天語目視鳥背雪山嶔岑山與雲齊風從中來肌骨凄凄李德裕懷嵩樓記余盡去危堞敞為虛樓剪榛木而始見前山除密蓧而近對佳樹延清輝于月幌留愛景于寒甍晨憩宵遊皆有殊意周視原野永懷嵩峰肇此嘉名且符夙尚盡庾公不淺之意寫仲宣極望之心鄧衮望雪樓記圍蜀之鄙截如巨砥厥郡維彭北西天屏危碧峭青戛霄磨𡨕鯨跳虬奔限蠻隔畨上排雪峰延疊萬重鶴甃瑶駢月積綃鮮振古不泐四節一色皎皎披飄寒錮隂膠光涵二水冷射千里往哲所嘉名之玉壘公來未期畢完瘵凋乃于崇墉作為麗譙長材羡工不伐不徭趾故規新不僭不驕經之浹辰翬飛迢迢三伏赫曦九野如燒斯焉一登神滌煩銷他日徵黃羊碑召棠下客貢銘永播德芳宋文天祥山中廳屋上梁文主人未了書癡頗有山癖先人之敝廬在茍安風雨之餘慈母以輕軒來亦愛園林之近頃斸蒼苔之地昉營萱草之堂雖牆堵之間粗云具體然闔廬之制未畢全功相協厥居聿來胥宇階戺所以行僎介屛著所以肅賔嘉不日成之以時可矣是用戒良梓筮吉辰茀蚴蟉於水端架蜿蟺於雲表然後翼之以廡承之以門移石而立庭臯通泉而周戶外清湍峻嶺為不斷之藩垣野草幽花作自然之丹雘老之將至汔可小休昔晦翁愛武夷而不能家歐公卜潁水而非吾土余何為者乃幸得之未問君王便比賜鑑湖之宅何須將相方謀歸緑野之堂元張養浩綽然亭上梁文幸今完璧理合回輈王夷甫宦情既無哂清談之多躗錢若水急流而退歎奇節之鮮儔非有心敢擬乎名賢固無技可呈于治世疇昔之捧檄非詘而今之稅駕何疑人謂歐陽公踐言之遲我喜陶𢎞景挂冠之早居處部祠廟梁庾肩吾亂後經夏禹廟詩金簡泥初發龍門鑿始通配天不失舊為魚微此功林堂上偃蹇山殿下穹窿侵雲似天闕照水類河宫神來導赤豹仙去擁飛鴻松龕撤暮爼棗徑落寒叢仙舟還入鏡玉軸更乘空去國嗟行邁離居泣轉蓬月起關山北星臨天漢東申胥獨有志荀息本懷忠待見欃槍滅歸來松柏同陳陽慎從駕祀麓山廟詩聖德憂民暇麾斾謁山靈畫航泛北渚文馬侍東平春浦戈鋋照寒林鐃吹鳴依稀長安驛蕭條都尉城井泉能共動江帆得分行窗幽細網合階淨落花明櫩巢始入燕軒樹已遷鶯菲菲蘭爼馥淡淡桂樽清銀塘日影晝玉坐舞衣輕張正見行經季子廟詩延州髙讓逺傳芳世祀移地絶遺金路松悲懸劒枝野藤侵藻井山雨濕苔碑别有觀風處樂奏無人知周庾信至老子廟應詔詩虛無推馭辨寥廓本乘霓三門臨苦縣九井對靈溪盛丹須竹節量藥用刀圭石似臨卭芋芝如封禪泥氄毛新鵠小盤根古樹低野戍孤煙起春山百鳥啼路有三千别途經七聖迷唯當别關吏直向流沙西周王褒四瀆祠碑靈祠嶽立貝闕雲浮寂寥詭怪髣佛神遊姬嬴分國河渭合流桃花春水靈草孤洲潼鄉河曲汾隂睢壤亂流不度龍門難上河魚送迎江妃來往水開通迹山臨髙掌知以藏往神以知來榮光離合雲氣徘徊水仙遺操津吏餘杯波息川后浪靜淡臺唐楊炯遂州長江縣先聖孔子廟堂碑丹牆數仞吐納雲霞椽屋三間蔽虧風雨琉璃曉闢東宫雀目之窗玳瑁朝懸西漢蛇鱗之桷圖光芒于北斗聖質猶生赫符彩于連珠宏姿可想至于月衡月準山額山庭侃侃星文堂堂日角莫不向之如在疑遊北上之山望之儼然似矚東流之水若夫平南壯烈沈流水于裁碑逐北勳庸集作元勳登燕山而刻頌庾太尉新亭之墓尚有黃金鄭康成通德之門猶存白瓦况乎功苞大象績被蒼生豈使銘典闕如音塵不嗣王勃益州夫子廟碑探周規于舊宅詢漢制于新都一作成都開基于四會之鄽授矩于三農之隙土階無級就擊壤于新歡茅茨不剪易檜巢于故事莊壇文杏即架椽欒夾一作樊谷幽蘭爰疏戶牖儀形莞爾似聞沂水之歌列侍誾如若奉農山之對緇帷曉闢橫組帶于西河絳帳宵懸聚青襟于北海雖秋禮冬詩之化以洽于齊人而宣風觀俗之規實歸于上宰令狐楚白楊神新廟碑戛若木捎扶桑卑大椿于漆園小蟠桃于東方與夫古墓多悲蕪城早落者不同品矣耽耽沈沈顯敞靚深不風而清無雲而隂崔融嵩山啓母廟碑紅葩奪日飛纍榭于山間綺綴衝風架回廊于木末仙人在棟神女臨窗周施玳瑁之椽遍覆琉璃之瓦赤玉為階甃黃金作門闕山如白岸樹似青溪羞蕰藻于前庭籍生芻于後徑蘭香夾水居然洗沐之資竹帚臨風自隔囂塵之境夢臺雲雨宋玉賦而先驚楚璧山川屈原書而幾倦楊炯少室山少姨廟碑于是降天渙命司存因其舊迹葺其新廟詳費務議工徒下隴蜀之名材致荆藍之寶玉易者言乎恱使人忘其勞詩者歌乎子來成之不日東西膠葛南北崢嶸繡栭兮雲楣光照耀兮奪日桂棟兮蘭橑氣氛氳兮襲人皎日登于綺疏奔星下于閨闥珠簾玳匣上髙閣而三休金柱銀檻巡步廊而中宿窮山海之瓌寶盡人神之壯麗豈直河庭貝闕俯鏡馮夷之都洛水瑶壇旁臨虙妃之館爾其巖嶂重復岡巒左右青霞起而照天白露生而匝地餘基隱嶙仍知萬嵗之亭古木摧殘尚變三花之樹明公舊祀棟宇岧嶤仙女層臺風煙爛漫軒轅之訪大隗先求牧馬之童太一之徵少君直下乘龍之使居處部宫室儉約侈秦附唐太宗初春登樓即目觀作述懷詩憑軒俯蘭閣眺矚散靈襟綺峰含翠霧照日蕊紅林鏤丹霞錦岫殘素雪斑岑拂浪堤垂柳嬌花鳥續吟連甍豈一栱衆幹如千尋明非獨材力終藉棟梁深彌懷矜樂志更懼戒盈心愧制勞居逸方規十産金隋薛道衡老氏碑昔軒轅顓頊建國不同太昊少昊邦畿各異舜改堯都夏遷虞邑歷選前辟義存創造惜十家之産愛兆民之力經始帝居不移天府規摹紫極仍據皇圖下宇上棟務存卑儉右平左墄聿尊制度朝夕正殿不别起于鴛鸞升降靈臺豈更營于鳷鵲已上儉約後漢張衡西京賦北闕甲第當道直啓程巧致功期不陀陊木衣綈錦土被朱紫武庫禁兵設在蘭錡匪石匪董疇能居此唐祖君彥為李密檄洛州文上棟下宇著于易爻茅茨采椽陳諸史籍聖人本意唯蔽風雨詎待珠玉之華寧須綈綿之麗故瓊宫崇構商辛以之滅亡阿房崛起秦俗以之傾覆而不遵古典不念前車廣立池臺多為宫觀金鋪玉戶青瑣丹墀蔽虧日月隔閡寒暑窮生人之筋力罄天下之資財使鬼尚難為之勞人固知不可其罪四也魏曹植七啓彤軒紫柱文榱華梁綺井含葩金墀玉箱溫房則冬服絺綌清室則中夏含霜華閣緣雲飛陛凌虛俯瞰流星仰觀八隅升龍攀而不逮渺天際而髙居晉陸機七徴豐屋華殿奇構磊落髙宇雲覆千楹林錯仰綏瑰木俯積堧石敷延袤之廣廡矯凌霄之髙閣秀清暉于雲表騰藻蔭之奕奕珍觀清榭嶽立連行雲階飛陛仰陟穹蒼聳浮柱而虬立施飛簷以龍翔回房璇室綴琳襲玉圖畫神仙延祐承福懸闥髙逹長廊迥屬梁蕭子範七誘冬斬陽木夏伐隂材剞劂之功咸至鉤繩之妙並來擬天文而特建象地戶而髙開麗前修之金屋陋曩日之璜臺若乃緹錦遍室丹青被土白珠之簾水晶之柱綺井鏤而重葩華桷煥而相拒文石之井珊瑚之樹紫復峻而連天青綺髙而干霧侈泰附恩賚部錫録唐權德輿謝追贈父母官表豈謂聖慈曲被孝理是崇當啓匱題主之時有告第漏泉之命感悲霜露禮盛蒸嘗自葉流根實荷非常之澤摩頂至踵難酬不次之恩劉禹錫為杜司徒謝追贈表紫書忽降于重霄蜜印榮加于厚夜星霜增感蒸嘗有輝錢翊代人謝賜官誥表琅函乍啓光凝紫府之煙寶軸潛舒潤帶金盤之露柳宗元為南承嗣上中書門下乞兩河效用狀越敗夫差多會稽納官之子趙摧栗腹即常平死事之孤何者義烈之餘色氣猛厲上將效于國用下欲濟其家聲所以憤激悽愴常思致命者也李嶠攀龍臺碑酬德踰于二錢報恩過于一笥闔門受邑寧惟吳漢之子孫舉宗畢侯豈直蕭何之兄弟恩賚部奬慰唐顔師古為留守郡官謝恩詔表九鼎鳬飛八紘魚爛許敬宗謝敕書表伏開瑶檢等鑿竅而睹虹霓載荷絲言似假翼而騰雲漢精衛銜芻豈究靈鼇之境秋螢繼日安測陽羽之升雕朽為妍比鏗金之響涸鱗沾潤縱陸海之深劉禹錫謝手詔慰撫表每佳馮異推功見稱良史嘗惡樂羊求賞翻謝謗書拳拳血誠天實諒只但以孤根獨立衆口易誣銷骨為虞撫心是懼樹楊恐拔非獨一人採葛畏讒信如三月宋蘇軾徐州謝奬諭表伏念臣學無師法才與世疏經術既已不深吏事又其所短纍忝優寄卒無異稱寬如定逺之言平平無取拙比道州之政下下宜然乃者河決澶淵毒流淮泗百堵皆作蓋僚吏之勤劬三板不沈乃朝廷之威德而臣下掠衆美上貪天工獨竊璽書之榮以為私室之寶此蓋伏遇皇帝陛下天覆四海子養萬民哀無辜之遭罹特遣吏以存問既捐免其賦調又飲食其飢寒所以録臣之微勞蓋將責臣之來效臣敢不躬親畚築益修今嵗之防安集流亡盡復平時之業庶殫朽鈍少補絲毫唐元稹謝御札狀宸翰忽臨天章煥發舞鳯回翔于懷抱飛龍顧盼于縑緗豈獨傳之子孫便合鏤于肌骨恩賚部賜厯梁簡文帝謝賜新厯表璿籥環璣鳯司肇律觀斗辨氣玉琯移春萬福惟新克固天保五司告肇萬夀載光琯叶璧輪慶休寶厯班和布政懸闕徇道式𢎞敬授之典載闡浹辰之教沈約謝賜新厯表竊惟觀斗辨日馭生為本審時分地稼政莫先何則勝殺無舛拘忌之理難忽珠璧有徴禮節之原攸序王僧孺謝厯表竊以龍馭不爽靡見侵薄鳯職是司曾無昃朓璧聯珠璨輪映階平義實明時事惟均政固以先天候其餘始執杓驗其平分九瀛仰化萬宇依朔宋歐陽修謝賜厯日表聖人在上天地節隂陽和一日十二辰五星二十八舍皆安次而行四時八風六律二十四氣各應時而至臣愚幸同萬物俱被長育而得與草木自别使知寒暑之期聰明睿智天縱多能向因萬機之餘親閲上元之律以授百職以同萬方而臣官任轉輸兼司案察乃加正朔于四海頒政教于明堂陛下總其要而舉其大端至于經時節勸農桑候豐凶勤蓄積順時令察姦邪則臣敢不守其職而行其小者庶無失業以答洪恩王安石謝賜厯日表清臺課厯肇明一嵗之宜列郡仰成欽布四時之事躬包厯數政順璣衡齊日月之照臨體乾坤之闔闢考觀新度逺存堯象之明推步大端猶得夏時之正盡俯仰察觀之理概裁成輔相之宜嵗事備存詔文偕下先天誕告間無杪忽之差率土逢占驗若節符之合恭承睿旨順考時行贊聖神化育之功極天人和同之效奏而行政期不戾于隂陽推以治人庶克躋于富夀蘇軾謝賜厯日表迎日推策雖曰百王之常後天奉時惟我二后之德伏讀詔旨灼知聖心中謝伏以嗣歲將興舊章畢舉三朝受海內之圖籍七月陳王業之艱難冬有祁寒知民言之可畏陽居大夏識天地之至仁故于頒朔之初更下布新之詔恭惟太皇太后皇帝陛下視民如子以國為家振廩勸分人自忘于艱嵗消兵去殺天必報之豐年臣敢不省事清心貴農時之不奪思患預備期嵗計之有餘庶竭微誠少裨洪造朝補之齊州謝賜厯日表恭惟陛下修身以道求端于天璧合珠聯煥三辰之順晷雲行雨施肇萬物之革心雖嵗事之宜班本王功之最急璣衡潛運孰知聖治之日新銚耨時修已覺豐年之氣應又於河中府謝厯日表本諸修已雖聰明睿知足以臨用此求端蓋風雨霜露無非教將以撫五辰而熙績和三事以敘功臣職在牧民欣于奉令土牛將磔猶歌二日之鑿冰玉燭可調願頌豐年之多黍梁庾肩吾謝厯日啓凌渠所奏弦望既符鄧平之言錙銖皆合登臺視朔覩雲物之必書拂管移灰識權衡之有度初開卷始暫謂春留末覽篇終便傷冬及徘徊厚渥比日為年恩賚部賜衣唐張玄晏謝春衣表執領襘而抃舞失次被纎柔而顧盼增輝舉體動容既安且吉在身不稱恐招鵜翼之譏居任無功叨受鶴紋之賜宋蘇軾謝對衣金帶馬表被三品之服章君子所以昭令德分六間之駔駿朝廷所以旌有功顧惟何人亦與兹寵拜恩俯僂流汗交並伏念臣人微地寒性迂才短襲布韋而自薦偶忝縉紳駕欵段以言歸終安畎畝豈謂便蕃之錫萃于衰病之軀此蓋伏遇皇帝陛下總覽衆工財成大化至誠樂與有緇衣之好賢俊民用章無白駒于空谷不違寒陋亦被光華攬佩以思遂識斷金之義舉鞭自誓敢忘希驥之心又表慨然攬轡敢有意于澄清束以立朝尚可言于賔客又表漢官三服已分密麗之珍唐監八坊復下權奇之駿拜嘉甚寵省已何功伏念臣受材迂疏賦命寒蹇幼師季路止服縕袍長慕少遊欲乘下澤目眩重金之耀神驚四牡之良俯仰自維周章失次此蓋伏遇皇帝陛下憂勤黎庶寤寐俊賢故損廏庫之儲以廣英雄之彀致兹孱陋亦被寵光臣敢不求稱于衷益鞭其後薄德盛服當戒維鵜之篇強力安邦庶幾有駜之頌又表枯羸之質匪伊垂之而帶有餘斂退之心非敢後也而馬不進又謝賜衣襖表齊官三服已寬卒嵗之憂漢札十行更佩先春之暖恩均吏士聲動華夷伏以禮著始裘詩歌無褐邊陲更戍本為臣子之常朔易早寒特軫聖神之念惟德具物豈曰無衣恭惟皇帝陛下廣運聰明力行恭儉威風傍振方戰栗于天驕溫詔下融遂流澌于河凍既無功而坐食實有愧于解衣敢不推廣朝廷之仁益收凍餒申嚴祖宗之法少肅惰偷庶收汗馬之勞以解濡鵜之誚朝補之謝賜春衣表勾萌畢奮慶賜可行土牛久飭于送寒豳籥未歌于逆暑乃眷造庭之彥爰開在笥之良肆有等差均于覆被宜人布政育物為功卉皮自適于隂陽氄毨同和于天地既陶無外之化亦沾咸若之恩織篚亂流豈惟加五百里之逺女工同燎故復半三十日之收矧是具寮與之同體適及風雩之後大頒帑帛之珍君賜足榮不歎無衣之七王章有分庶逃終褫之三楊億謝賜衣表鳥獸氄毛俯及嚴凝之候衣裳在笥爰推賜豫之恩在渙汗之所霑雖容光而必照如臣者任叨符竹地僻甌吳奉漢昭之六條方深祗畏分齊官之三服忽荷頒宣纂組極于纎華純綿加于麗密璽書下降竊窺雲漢之文驛騎來臨更重皇華之命但曵婁而增惕實被服以難勝矧于戎行亦膺天寵干城雖久皆無汗馬之勞守土何功獨懼濡鵜之刺唐崔行先謝賜春衣狀御府紈素耀晴景于三春天宫蘭麝襲回風于十步令狐楚謝賜春衣牙尺狀推漢后解衣之恩寵錫春服稽有虞審度之典榮頒象尺樂官考正無纍黍之差女御裁縫有奪朱之麗而况端平皎潔無慙七寶輕盈綷䌨不謝六銖此臣所以捧觀而似睹鈞衡拜服而如生羽翼又謝賜冬衣狀司寒肇至命服載新降自九霄來經千里錯鳥章于襟帶奮龍文于素箋兼并縟麗備極瑰奇木石之姿過蒙鮮飾冰霜之氣頓減嚴凝李商隱為滎陽公謝賜冬衣狀臣叨蒙重寄適控遐陬地雖五鎮之衝氣得四時之正每玄𡨕應律顓頊司辰當二日之鑿冰則殊豳野及兩楹之飛雪無異朔山重以賨布少溫蠻綿乏暖方求麗密以御嚴凝豈望司服頒衣貴臣傳詔綾裁飛鵠絮裛仙蠶白分椒壁之光紫奪蘭芽之色已均下將仍逮連營晏子狐裘故弊何彰于國儉王恭鶴氅風流不自于君恩被服有輝負戴無力謹當上宣殊渥下拊多寒均大袑于琅琊變無襦于蜀郡粗令康泰以塞貪叨又為濮陽公涇原謝冬衣狀恩極解衣榮加降繭戴山未重負日非暄臣謬領藩垣適當戎狄唯憑廟算粗展軍威絶塞獵回幸無警急髙烽火過但報平安直以地勢多隂川形稍背三伏常聞于屏箑九秋尋訝于垂繒代馬暫嘶隴山無葉燕鴻未過涇水先冰是以每降王臣仍迂御筆緘封垂露寵錫御冬非玉女裁成即仙人織出徒驚在笥莫匪因針始顧孱微深懼不勝冠帶旋蒙被服便如能執干戈遍逮軍前歷霑麾下達喜氣而陳根復秀動歡聲而蟄戶潛開華楚成行曵婁塞路宋謝莊謝賜貂裘啓匭法衽開玄華有耀靡毫柔毳黯鑑自凝綵越綴翬光踰緝燕嚬笑不妄韓裳勿假續有昭庸楚纊爰逮歡忭自歌而同委衾之澤勤劬未報而叨解裘之寵空荷榮施徒賁微軀承恩必識服以淪生銘恱之情罔知所置齊王融謝敕賜御裘等啓雲衣降授仙裾曲委榮振素里澤駭蓬心昔漢帝解裘不獨前寵曹王禠帶復降今恩又謝竟陵王賜衲裘啓降飾自尊垂榮及賤玄玉不純曾波奪采南陸方永北風日壯無衣無褐發念聖衷而挾纊之問每流解裘之賜偏委梁皇太子謝敕賚魏國所獻錦等啓山羊之毳東燕之席尚傳登髙之文北鄴之錦猶見胡綾織大秦之草戎布紡玄菟之花梁元帝為江夏王安豐謝東宫賚錦啓舒將並石堪來暮雨縈持結纜剩可蕩舟秦川書字妙能八體鄴縣登髙真堪九日宋姬贈馬未足為榮馮暖乘車方兹非寵又謝東宫賚辟邪子錦白褊等啓江波可濯豈藉成都之水登髙為艷取映鳯凰之文至如鮮潔齊紈聲髙趙縠色方藍浦光譬靈山試以照花含銀燭之狀將持比月亂含璧之暉庾肩吾謝武陵王賚絹啓清河之珍丘園慙其束帛關東之妙潛織陋其卷綃遂使鶴露宵凝輕絺立變鴈風朝急冶服成溫又謝武陵王賚白綺綾啓圖雲緝鶴鄴市稀逢寫霧傳花叢臺罕遇雖復馬均騁思比巧猶慙虞卿受金方恩未重此扁舟獨返燕路有心載寶言歸銜珠無日又謝東宫賚內人春衣啓階邊細草猶推綟葉之光戶前桃樹反訝藍花之色遂得裾飛合燕領鬭分鸞試顧採薪皆成留客陳周𢎞正謝東宫賜縠袍啓或儔名麗辭等質輕霧或色華少海用寶叢臺或粲彼三英縫兹五緎品頒嵗襲緑奪春耕蒿席可充縕袍易足梁沈約謝賜軫調絹等啓霜紈雪委霧縠冰鮮昔劉氏歸國未聞漢儲之禮曹植還藩非降魏兩之賜恩愈枉道賁深束帛又謝敇賜絹葛啓素采冰華絺文霜潔變溽暑于閨閣起涼風于襟袖又謝齊竟陵王賚母赫國雲氣黃綾裙襦啓竊以積絲成綵抽繭騰花巧擅易水之間價貴叢臺之下梁簡文帝謝東宫賜裘啓物華雉毳名髙燕羽才慙齊相愧白狐之飾德謝漢蕃均黑貂之賜地卷朔風庭流花雪故以裾生惠氣袖起陽春荷澤知慙瞻恩興戀梁任孝恭謝裙襦啓加以庭闕桑麻室空機杼牀無暖席桁靡懸衣值蓬卷北郊鴈飛南浦雪暗河隂冰生海岸而繩帶屢盡苦風霜之切敝履恆穿踐泥沙之凍自憐袖短雖內手而猶寒每恨衣輕徒斂襟而彌愴劉孝威謝賚錦被啓色艷蒲桃采踰聯璧鄂君慙繡楚侍羞珠雖復帝賜鶴綾客贈鴛綺髙懸麗藻逺謝鮮明漢老恱其怪文魏馬驚其香氣劉孝儀謝晉安王賜銀裝絲帶啓雕鏤新奇織製精潔越中玉女不得關思上方名匠莫能議巧人情駭觀如見買臣之綬望貌移姿似逢子訓之術周庾信謝趙王賚皂羅袍袴啓懸機巧綜變躡奇文鳯不去而恆飛花雖寒而不落披千金之暫暖棄百結之長寒永無黃葛之嗟方見青綾之重對天山之積雪尚得開襟冒廣漠之長風猶當揮汗白龜報主終自無期黃雀謝恩竟知何日又謝明皇帝賜絲布銀錢等啓比年以來恆有闕乏白社之內拂草看冰靈臺之中吹塵視甑懟妻狠妾既嗟且憎瘠子羸孫虛恭實怨王人忽降大賚先臨天帝賜年無踰此樂仙童贈藥未均斯喜張袖而舞玄鶴欲來撫節而歌行雲幾斷所謂舟楫無岸海若為之反風薺麥將枯山靈為之出雨况復全抽素繭雪坂疑傾併落青鳬銀山或動是知青牛道士更延將盡之命白鹿真人能生已枯之骨雖復拔山超海負德未勝垂露懸針書恩不盡蓬萊謝恩之雀白玉四環漢水報德之蛇明珠一寸某之觀此寧無愧心直以物受其生于天不謝謹啓又謝趙王賚絲布啓去冬凝閉今春嚴徑霰似瓊田凌如鹽浦張超之壁未足鄣風袁安之門無人開雪覆鳥毛而不暖燃獸炭而逾寒逺降聖慈曲垂矜賑諭其蠶月殆罄桑車津實秉杼幾空織室遂令新市數錢忽疑販綵平陵月夜驚聞搗衣妾遇新縑自然心伏妻聞裂帛方當含笑莊周車轍實有涸魚信陵鞭前元非窮鳥關尹津梁之織鄴地雙絲扶風彩文之機仙園獨繭恩賚部賜食唐王維敇賜百官櫻桃詩芙蓉闕下會千官紫禁朱櫻出上闌才是寢園春薦後非關御苑鳥銜殘歸鞭競帶青絲籠中使頻傾赤玉盤飽食不須愁內熱大官還有蔗漿寒又崔興宗和詩未央朝謁正逶迤天上櫻桃錫此時朱實初傳九華殿繁花舊雜萬年枝全勝晏子江南橘莫比潘家大谷梨聞道令人好顔色神農本草自應知韓愈和張員外敕賜百官櫻桃詩漢家舊種明光殿炎帝還書本草經豈似滿朝承雨露共看傳賜出青冥香隨翠籠擎初到色照銀盤瀉未停食罷自知無所報空然慙汗仰皇扃劉禹錫代武中丞謝賜新茶表效參藥石芳越椒蘭顧蘭露而慙芳豈蔗漿而齊味柳宗元謝新茶表况兹靈味成自遐方照臨而甲拆維新煦嫗而芬芳可襲調六氣而成美扶萬夀以效珍豈臣賤微膺此殊錫銜恩敢同于嘗酒滌慮方切于飲冰韓翃為田神玉謝茶表榮分紫筍寵降朱宫味足蠲邪助其正直香堪愈病沃以勤勞飲德相歡撫心是荷吳主禮賢方聞置茗晉臣愛客才有分茶豈如澤被三軍仁加千乘宋范仲淹謝賜鳯茶表念犬馬之微志錫龍鳯之上珍香掩靈芝味滋甘醴濯五神之精爽祛百疾之冥煩允彰仁夀之恩特出聖神之眷謹當餅為良藥飲代凝冰思苦口以進言勵清心而守道上酬君父旁質神明唐劉禹錫代武中丞謝新柑表黃苞輝穎雕俎增華芬芳初佐于天庖慶賜忽霑于凡口甘踰萍實剖食既同于楚謡寒比蔗漿析酲何慙于漢史柳宗元為武中丞謝賜櫻桃表含桃之羞時令攸貴况今採因御苑分自天厨使發九霄集繁星而積耀味調六氣承湛露而不晞盈眥而外被恩光適口而中含渥澤顧慙素食彌切自公豈徒君子所先遂厭小人之腹錢翊嘉會節為宰相謝酒食狀嘗珍而食指先驚敢忘盈滿竊位而憂心已醉寧待獻酬常衮重九謝賜糕酒等狀玄月戒時清風應律宜于長久欣聖祚之夀昌復見芳華喜陽數之重合時恩忽降節賜薦加緑芋金茅紫蔗筠節茱萸清酒嘗聞舊俗之傳薏苡稠餳今睹靈珍之味元稹謝賜設狀空懷滿腹之慙未有沃心之鯁既充膚革誓竭肺肝李商隱為滎陽公赴桂州長樂驛謝敕設狀臣階緣薄技塵辱修塗揚執戟之讀書雖無非聖董太中之對䇿何補清時忽委廉車乍離閨籍誠欣列土實耿辭天然猶食指告祥朵頤有慶爰于近驛式降貴臣酒自堯樽饌分禹膳集作殷鼎下沾將校旁耀路岐况臣平生本實孤賤懷書奉役久無黔突之謀入國展儀且懵殽蒸之禮飽期滿腹醉更憂心終虞負乘之災無報雲天之施苑咸為晉公謝賜車螯蛤蜊等狀昔周美康侯特沾蕃庶之錫漢崇張禹亟覃賜饌之榮才不逮于前賢而遇每深于曩眷于邵謝賜柑子啓江潭所出見重于南州苞茅入貢逺歸于北闕陛下念其野次賜及微臣顧萍實以虛言非蔗漿之足擬分甘絶少竊荷于恩私食椹懷音敢忘于報效周庾信謝趙王賚乾魚啓澧水朝浮光凝朱鱉文鰩夜觸翼似青鸞况復洞庭鮮鮒溫湖美鯽波瀾成雨鱗甲防寒不勞獅子之亭即勝雷池之長翻驚河伯獨不愛人足笑任公終年垂釣又謝趙王賚米啓丹烏銜燧既集西周黃雀隨車還飛東市漬而為種不無霜雪之精取以論兵即有山川之勢某陋巷簞瓢櫛風沐雨剝榆皮于秋塞掘蟄燕于寒山仰費國租遂開塵甑非丹竈而流珠異荆臺而炊玉東方朔之捧米既息長飢西門豹之墾田方慙此賚梁劉孝威謝東宫賜聖僧餘饌啓齊桓柏寢之器周穆軒宫之寶乳糜香飯素􅀈糗漿五杏七桃靈瓜仙棗莫不氣馥上天薰流下界石崇芳果金谷僅于萬株陳湯木滋杜陵幾于千樹猶自髙謝珍奇多慙品族又謝東宫賜淨饌啓糜獻牛牧飯出龍宫千品甘露之食百花珍藥之果餅兼髓乳漿苞蔗奈雕盤流其滋旨寶器委其色香足使三世長者羞彼識味一角仙人恥其咒術陳徐陵謝敕賜祀三皇五帝餘饌啓竊以甘泉之殿舊禮羲農長樂之宫本圖堯舜自東京晚世曠代無聞西漢盛儀復覩今曰金壺流十旬之氣玉案備千品之羞昔絳羅為薦既延王母紫蓋為壇允招太一同斯美號理致衆星臣以餘年豫開清祀如陪瑶席遂飲瓊漿梁劉孝威謝東宫賚鹿脯等啓上林絶胡人之搏禁地無張京之犯而猶有班超遊獵李廣馳射逺歸于厨吏入貢于臘人形圖三事之車影入九仙之鏡梁劉孝儀謝東宫賚酒啓異五齊之甘非九醞之法屬車未曾載油囊不得酤試儔仙樹葛玄泥首才比蒲桃孟他銜璧又謝晉安王賜宜城酒啓嵗暮不聊在隂即慘惟斯二理總萃一時少府鬭猴莫能致笑大夫落雉不足解顔忽值瓶瀉椒芳壺開玉液漢樽莫遇殷杯未逢方平醉而遁仙羲和耽而廢職仰憑殊塗便申私飲未矚罍恥已觀幘岸傾耳求音不聞霆擊澄神密眂豈覿山髙愈疾消憂于斯已驗遺榮忽賤即事不欺酩酊之中猶知銘荷庾肩吾謝湘東王賚米啓味重新城香踰滍水連舟入浦似彥伯之南歸積地為山疑馬援之西至不待候沙同新渝之再熟無勞拜石均遼倉之重滿又答湘東王賚粳米啓椓斛瀉珠嘉聞陶量翻庭委玉欣見馬圖又謝東宫賚米啓滍水鳴蟬香聞七里瓊山合穎租歸十縣肩吾人慙振藻徒降雲間之松職濫便繁空撤家丞之俸成珠委地事重逢仙遊玉為糧珍踰入楚雖復激水滄流不待監河之説春風掃地方誚文學之篇齊謝朓謝隨王賜紫梨啓將恐帝臺妙棠安期靈棗不得孤擅玉盤獨甘仙席梁庾肩吾謝賚梨啓睢陽東苑子圍三尺新豐箭谷枝懸六斤未有生因粉水産自銅丘影連鄧橘林交苑柿逺薦中厨爰頒下室事同靈棗有願還年恐似仙桃無因留核又謝蒙賚朱櫻啓成叢殿側猶連製賦之條結實西園非復黏蟬之樹異合浦之歸來疑藏朱實同秦人之逐彈似得金丸恩賚部賜服用唐謝觀清明日恩賜百官新火賦木鐸罷循乃灼燎于榆柳桐花始發賜新火于公卿由是太史奉期司烜不失平明鑽燧以獻入匍匐當軒而奏畢初焰猶短新煙未密觀夫電落天闕紅排內垣乍歷闈瑣初辭渥恩振香爐以朱噴和曉日而焰翻出禁署而螢分九陌入人寰而星落千門暖逐來命風隨逸騎入權門見執熱之象閲有司識燭幽之義耀耀當門煙助松篁之茂熒熒滿目焰如桃李之春然後各爨鼎鑊傳輝膳官爭焚爐炷競爇膏蘭銷冷酒之餘毒却羅衣之曉寒韓濬清明日賜百寮新火詩朱騎傳紅燭天厨賜近臣火隨黃道見煙繞白榆新榮耀分他日恩光拱紫宸更調金鼎味還暖玉堂人灼灼千門曉輝輝萬井春應憐螢聚夜瞻望及東鄰又王濯詩御火傳香殿華光及侍臣星流中使馬燭耀九衢人轉影連金屋分輝麗錦茵焰迎紅蕊發煙染緑條春助律和風早添爐暖氣新誰憐一寒玉猶望照東鄰梁簡文帝讓鼓吹表寬博為善不飾被于聲明緣寵成功未增榮于鐃管豈宜響芳樹于西河鳴朝飛于黑水彼已之譏可懼尸素之誡知慙江淹為齊髙帝讓前部羽葆鼓吹表臣聞國容軍禮旌羽昭其華車騎品第鑾蕤藹其飾世教以之垂采民聽以之流文故勒岫銘海之功鞞革寫其詠戡難夷邦之業管竹凝其聲朱露玄雲既錫上德玉山芳樹以被奇勳陳江總謝勑給鼓吹表略尋近古逖聽前事王文憲匡佐革命沈隱侯經綸始運騎吹之榮猶難忝冒以臣况此實非倫輩豈可更崇文物重假名器髙臺迢遞未朱夏而登臨芳樹華滋非青春而奏曲宋李綱謝賜鞍馬表端一心而觀萬化操八柄以馭羣臣念其驅馳之勞錫以駢蕃之寵壯元戎之十乘解左服之兩驂偉然神駿之姿被以連乾之飾臣敢不仰承睿眷俯罄愚衷誓不與賊以偕存顧雖捐軀而何惜餘齡尚在雖無據鞍矍鑠之姿將命不愆或遂攬轡澄清之志播芳大全代嗣秀王謝賜玉帶表寶玉之展于親允嚴國典鞶厲之昭其數莫重身章緬考青編無如蒼籙麟經紀傳夏璜特畀于魯公馬史垂芳衛寶併貽于康叔雖侈瑰奇之賜未聞佩服之華疇若熙朝誕加殊寵鼎來圭璧之輝賁及碔砆之陋恩光有爛絢寧王玄圃之明屬籍本疏邁衛公于闐之賜諦觀虹璞深靦鵜梁宗英追琢俱粲然其可觀磐石藩維豈垂之而如隊種西崑之羣玉表東平之十圍昌熒盩綬之傳照映翠緌之飾獨羞駑鈍上玷龍光唐吕溫代鄭相公謝賜戟狀吏考三十始秩銀青戰勛十二乃號柱國必資具美方錫殊榮于是有命服以朝加戟于戶將勸勞而責實亦馭貴而崇名禮異其數物盛其榮新其閈閎賜之棨戟衡門燕雀乍相賀于朱楹武庫龍蛇忽追飛于陋巷白居易中和節謝賜尺狀中和戒節慶賜申恩當晝夜平分之時頒度量合門之令况以紅牙為尺白金為寸美而有度煥以相宣逮下明忖度之心為上表裁成之德雖恩光下濟咫尺之顔不違而尸素內慙分寸之功未效又清明謝賜火狀節遇藏煙時當改火助和氣以發滯表皇明而燭幽降實自天非因榆柳之燧仰之如日空傾葵藿之心齊映為趙相公謝馬狀豈徒體合鑄金法相皆備而乃足符歷塊驥德是稱當攬轡之際思六合于如琴執鞭之辰度三代之得䇿李商隱為滎陽公謝借飛龍馬送至府界狀梁懸蜀鐙几覆吳鞍每多曵練之疑不假著鞭之力倐踰秦甸將復周間照地回光瞻天送影長亭欲别未期東道而來雙闕儻嘶願附北風之思又為滎陽公謝端午賜物狀五神定位祝融施長養之功六律均和蕤賔有酢酬之義故節推戴禮日著漢儀彼艾人逺具于嵗時角黍近標于風土乃耆舊傳聞之末亦君親慶賜之原敢希瘴嶠特降乾文輕縞染衣真金備器海綃掩麗渠碗藏珍拜受若驚跪捧如失嘗衣國僑之紵被服多慚久攜顔氏之瓢捧持未慣當晝而不假交扇白日而惟宜飲冰梁簡文帝謝敕賚方諸劒等啓才發紫函雕奇溢目始開泥檢麗飾交陳已匹丹霞之輝乍比青雲之制又謝敕賜玉佩啓昉田麗彩槐水鏤文飾以金闕之珠製以魯班之巧故以裾端照色影外生光恩發內府猥垂霑賜臣方溫謝德比振慚聲梁劉孝儀謝始興王賜花紈簟啓麗兼桃象用洽昏明便覺夏室已寒冬裘可襲雖九日煎沙香粉不棄三旬沸海團扇可捐梁簡文帝答定襄侯餉臥簟書筠篁多品篠簜雜名校色比奇獨此為貴自含蒼紫似久暴于柯亭乍舒黝素若屢沾于湖水三伏餘炎九折成用便可旅食南館髙臥北窗又答南平嗣王餉舞簟書濯龍之木文罽飾壇淮南之臺紫羅為薦未若五離九折出桃枝之翠筍綺爛霞舒制雲母之修竹南湘點淚喻此未奇東宫赤花擬之非妙梁元帝謝東宫賚寶枕啓泰山之藥既使延齡長生之枕能令益夀黃金可化豈直劉向之書陽燧含火方得葛洪之説况復重安玳瑁獨勝瑰材芳松非匹柟榴未擬吳書張紘見柟􅼱猶愛其文而為作賦劉向别録云向有芳松枕齊王融謝竟陵王示扇啓竊以六翮風流五明氣重若此圓綃有兼玩實輕踰雪羽潔並霜文子淑賞其如規班姬儷之明月豈直魏王九華漢臣百綺又謝弓啓摛藻蕙樓暢藝蘭苑敷積玉于風筵疊連珠于月的園掩秀鄴水慚奇揖讓未工濫升下飲之賞操弧反正謬奉招賢之錫文韜鏤景逸幹捎雲玩溢百齡佩流千載梁簡文帝謝賚扇啓文筠析縷香發海檀肅肅清風即令象簟非貴依依散綵便覺夏室含霜飲露清蜩應三伏之修景羣飛黃雀送六月之南風蔽日垂隂薰澤慙采浮涼滌暑蘋末愧吹聖人造物之巧俯萃庸薄王府好玩之恩於兹下被又謝賜善勝刀啓水鍔含采雕琰表飾名均素質神號脫光五寶初成曹丕先荷其一二勝今造愚臣總被其恩賜韓非之書未足為比給博山之筆方此更輕梁元帝謝東宫賚花叉啓茝亂九衢花含四照田文之珥慙于寶葉王粲之詠恧此乘蓮九官之璫豈直黃香之賦三珠之叉敢髙崔瑗之説况以麗玉澄暉逺過玳瑁之飾精金耀首髙踐翡翠之名又謝晉安王賜馬啓繹武愧仲都遂蒙大驪之錫儒謝春卿空頒名馬之賚故以取方驎友自匹龍媒不待景公婉如齊畫無勞馬援翻等漢銅豈有滅沒黑龍連翩白馬錢文見重津名取貴相彼騏驥猶深戀主矧兹伏櫪彌結懷恩周庾信謝滕王賚馬啓柳谷未開翻逢紫燕臨源猶逺忽見桃花流電爭光浮雲連影張敞畫眉之暇直走章臺王濟飲酒之歡長驅金埒王褒謝賚馬啓邉城無草來自東南塞外饒沙經從西北漢時樂府偏愛權奇晉世桑門特憐神駿黃金作勒足渡西河白玉為鐙方傳南國儻逢漢帝仍駕鼓車若值魏王應驚香氣唐溫庭筠謝人賚集賢墨啓竹山奇製上蔡輕煙色掩緇帷香含膝疑作漆簡雅復三臺故物貴重相傳五兩新膠乾輕入用猶怨於潛曠逺建業尫羸韋曜名方即求雞木傅玄佳致别染龜名恩加于蘭署郎官禮備于松櫺介婦汲妻衡弟所未窺觀廣記漢儀何嘗著列况又玄洲上苑青瑣西垣讎字猶新疑籖尚整帳中女史每襲清香架上仙人常持縹帙得于華近辱在庸虛豈知夜鶴頻驚殊慙志業秋蛇屢綰不稱精研唯憂痗物虛投蠟槃空設晉陵雖壤正握銅兵王詔徒深唯磨正硯梁元帝答齊國雙馬書名重桂條形圖柳谷襄陽地穴近求未易滇池水裏逺訪猶難價匹龍媒聲齊驥子河精曜采似伏波之鑄銅震象飛文笑東瀛之刻玉加以控斯銀敕利此金銜鞍揭鏤衢光含兩月纒縈紫縷色麗雙絲方嗤晉后恆乘鄭國之駟更鄙曹君經餉蜀王之馬恩賚部錢貨梁簡文帝謝敕賜解講錢啓無勞磁石之火金貨猥臻非遊玉壘之川銅山可見舒王濟之埒猶覺有餘假劉實之繩穿而不盡慧輪究竟爰降曲私福田滿成仰由慈被榮光獨照自均若木負恩知重竊譬蓬萊陳張正見謝賜錢啓名稱榆莢非投飲馬之橋價重圜泉寧棄呪雞之野暫移周府才經漢鑄始降主門忽光私室青蚨委質笑夷甫之不言赤仄垂緡重河間之能數唐韓翃為田神玉母太夫人謝男神功葬賜錢及神玉領節度表妾隨子東征銜恩北闕纍承雨露載啓山河同顗之親幸及貴登僕射異勤之母不見生拜司徒何荷聖慈寵加存歿共薑年暮俯矜哭子之哀庾翼才微尚使領兄之衆殊悲望外且慰目前况將通逺期特垂渥澤更切撫存之義兼回贈往之資赤仄滿庭紫泥在篋痛而受賜哀以為榮庶神功有知應感安親之道魂其無昧更酬報國之誠載號載悲不勝感絶顗謂周顗勤謂馮勤李商隱為同州張評事謝辟並聘錢啓重非半兩輕異五銖子母相權飢寒頓解細看銅郭徐憶牙籌雖云神有魯褒便恐癖如和嶠又為東川崔從事謝辟並聘錢啓磨文難滅較貫知多陸賈方驗于火花郭况莫矜于金穴恩賚部第宅梁元帝謝勑賜第啓竊以漢賜五倫實云清吏魏寵衛臻用旌庸直未如靈光輪奐睢陽爽塏北連城闕有似甄侯之舍東望市鄽榮深豫章之圃昔狼望未平冠軍辭宅馬池猶隔雍丘讓邸臣慚霍曹逺志但識君命無違再思庸陋九殞非答任孝恭謝賚錢治宅啓繩樞斷續薄雨已傾席戶穿闌微風自卷不悟恩隆問舍降自天造事深更宅乃被庸微脆條可援毁垣再築遂得窗臨上路戶望柬家人恱爽塏里驚輪奐門學于公逆容駟馬巷均王濬豫擬幡旗劉孝儀為武陵王謝賜第啓竊以南望朱鳥北距蒼龍右帶御溝左回青路異晏嬰之湫隘同潘嶽之間居臣幼自宫掖長遊城府雖輪奐之美多門而館第之私未暇今輕舟將反髙門遽錫遂葺家築室百堵皆興雲屋連甍一朝𢎞敞庾肩吾謝東宫賜第啓肩吾居異道南才非巷北流寓建春之外寄息靈臺之下豈望地無湫隘里號乘軒巷轉幡旗門容幰蓋况乃交垂五柳若元亮之居夾石雙槐似安仁之縣却瞻鍾阜前枕洛橋池通西舍之流窗映東鄰之棗來歸髙里翻成待封之門夜坐書臺非復通燈之壁才下應王禮加溫阮官成名立無事非恩劉孝儀為王儀同謝宅啓昔晏嬰湫隘齊景營其爽塏孫歷無家晉武為之築館或功髙千載德重一時故蒙考室之榮以降葺宇之澤並辭而處傳芳前載臣才愧昔人恩同往哲豈宜妄荷重增疵吝但胸奴未滅遽當輪奐之美環堵為室遂得歌哭于斯張纘謝東宫賚園啓常願卜居幽僻屏避喧塵傍山臨流面郊負郭依林結宇憩桃李之夏隂對徑開軒採橘柚之秋實而王畿陸海畝號一金涇渭土膏豪傑所競徙居好畤必待使越之裝别館河陽亦資牧荆之富此園左帶平湖修陂千頃右臨長薄清潭百仞前逼逸陌朝夕爽塏後望鍾阜表裹煙霞每賸春迎夏華卉競發背秋向冬雲物澄霽歸瞰戶牖不異登臨升降階墀已窮歷覽舟楫所屆纍日不能究其源魚鳥之豐山澤不能踰其美唐羅袞謝江陵借宅啓恐馬援之災氛寧逃漏濕念揚雄之風雨須託帡幪特借華居俾安滯迹愛忽異于吾廬誤將同于君室遂得彌寬徯后更盡依劉宛如夫子之牆不在𨽻人之館揣循涯分抃戴恩光館開碣石略為鄒衍之身臺認章華永荷楚王之德恩賚部藥石唐李嶠謝臘日賜面藥口脂表安寧戒序嘉平在節白日臨于陽谷繁霜入于寒露蘅秣始停桂筵豐暇青牛帳裏未輟爐香朱鳥窗前新調鉛粉因三冬之吉慶造六宫之脂澤糅之以辛夷甲煎燃之以桂火蘭蘇氣溢象奩香衝翠幄以光金屋之仙卿以賜瑶房之帝嬪南國容華之人從來未識西京妖冶之妾何時可見臣等叨膺天命謬總留臺雖天動星回暫違于侍從而雲行雨施更延于恩渥猥承郵驛曲賜絲綸分八子之膏腴及三臣之瑣賤竊窺明鏡已覺衣冠之不任旋顧粧奩遂欣箕帚之多幸身輕塵露佩德空深貺等丘山殞身何答張九齡謝賜香藥面脂表捧日月之光寒移雪海沐雲雨之澤春入花門雕奩忽開珠囊暫解蘭薰異氣玉潤凝脂藥自天來不假淮王之術香宜風度如傳荀令之衣古儷府卷十一
