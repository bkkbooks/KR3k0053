body:
  text: 古儷府卷十一明王志慶編居處部宮殿漢揚雄甘泉賦洪臺崛其獨出兮㮹北極之嶟嶟列宿乃施於上榮兮日月才經於柍桭雷鬱律于巖窔兮電倐忽於牆藩鬼魅不能自逮兮半長途而下顛歷倒影而絶飛梁兮浮蠛蠓而撇天班固西都賦其宫室也體象乎天地經緯乎隂陽據坤靈之正位放太紫之圓方樹中天之華闕豐冠山之朱堂因瓌材而究奇抗應龍之虹梁列棼橑以布翼荷棟桴而髙驤雕玉瑱以居楹裁金璧以飾璫發五色之渥彩光爓朗以景彰于是左墄右平重軒三階閨房周通門闥洞開列鐘虡于中庭立金人于端闈仍增崖而衡閾臨峻路而啓扉徇以離宫别寢承以崇臺間館煥若列宿紫宫是環清涼宣溫神仙長年金華玉堂白虎麒麟區宇若兹不可殫論增盤崔嵬登降照爛殊形詭制每各異觀乘茵步輦惟所息宴後宫則有掖庭椒房后妃之室合歡增城安處常寧茝若椒風披香發越蘭林蕙草鴛鸞飛翔之列昭陽特盛隆于孝成屋不呈材牆不露形裛以藻繡絡以綸連隨侯明月錯落其間金釭銜璧是為列錢翡翠火齊流耀含英懸黎垂棘夜光在焉于是玄墀扣砌玉階彤庭碝磩綵緻琳珉青熒珊瑚碧樹周阿而生紅羅颯纚綺組繽紛精曜華燭俯仰如神上反宇以蓋戴激日景而納光神明鬱其特起遂偃蹇而上躋軼雲雨于太半虹霓回帶于棼楣雖輕迅與僄狡猶愕眙而不能階攀井幹而未半目眩轉而意迷捨櫺檻而郤倚若顛墜而復稽魂恍恍以失度巡回途而下低既懲懼于登望降周流以倣徨步甬道以縈紆又杳窱而不見陽排飛闥而上出若遊目于天表似無依而洋洋張衡西京賦惟帝王之神麗懼尊卑之不殊雖斯宇之既坦心猶憑而未攄思比象于紫微恨阿房之不可廬瓜見往昔之遺館獲林光于秦餘處甘泉之爽塏乃隆崇而𢎞敷既新作于迎風增露寒與儲胥託喬基于山岡直墆霓以髙居通天訬以竦峙經百常而莖擢上辬華以交紛下刻峭其若削翔鶤仰而弗逮况青鳥與黃雀伏櫺檻而俯聽聞雷霆之相激神明崛其特起井幹疊而百增峙遊極於浮柱結重欒以相承纍層構而遂隮望北辰而髙興消氛埃于中宸集重陽之清澄瞰宛虹之長鬐察雲師之所憑上飛闥而仰眺正覩瑶光與玉繩將乍往而未半怵悼栗而慫兢非都盧之輕趫孰能超而究升天梁之宫實開髙闈旗不脫扄結駟方蘄櫟輻輕騖容于一扉王延壽魯靈光殿賦排金扉而北入宵藹藹而暗曖旋室㛹娟以窈窕洞房叫窱而幽邃西廂踟蹰以間宴東序重深而奧祕屹􅀈􅀈以勿罔屑黶翳以懿濞魂悚悚其驚斯心􅓥􅓥而發悸于是詳察其棟宇觀其結構規矩應天上憲觜陬倔佹雲起嶔崟離樓三間四表八維九隅萬楹叢倚磊砢相扶浮柱岹嵽以星懸漂嶢􅒈而枝柱飛梁偃蹇以虹指揭蘧蘧而騰湊層櫨􅛡垝以岌峩曲枅要紹而環句芝栭攢羅以戢孴枝牚杈丫而斜據傍夭嶠以橫出互黝糾而搏負下岪蔚以璀錯上崎嶬而重注摙獵鱗集支離分赴縱橫駱驛各有所趣爾乃懸棟結阿天窗綺疏圓淵方井反植荷蕖發秀吐榮菡萏披敷緑房紫菂窋䆛垂珠雲楶藻梲龍桷雕鏤飛禽走獸因木生姿奔虎攫拏以梁倚仡奮亹而軒鬐虬龍騰驤以蜿蟺頷若動而躨跜朱鳥舒翼以峙衡騰蛇蟉虬而繞榱白鹿孑霓于欂櫨蟠螭宛轉而承楣狡跧伏于柎側猿狖攀椽而相追玄熊蚺舕以齗齗却負戴而蹲跠齊首目以瞪眄徒眽眽而狋狋魏何晏景福殿賦爾乃豐層覆之耽耽建髙基之堂堂羅疏柱之汨越肅邸鄂之鏘鏘飛櫩翼以軒翥反宇䡾以髙驤流羽毛之葳蕤垂環玭之琳琅參旗九旒從風飄揚皓皓旰旰丹彩煌煌故其華表則鎬鎬鑠鑠赫奕章灼若日月之麗天也其奧祕則翳蔽曖昧髣佛退概若幽星之纚連也既櫛比而攢集又宏璉以豐敞兼包博落不常一象遠而望之若摛朱霞而耀天文迫而察之若仰崇山而戴垂雲嗟瓌瑋以壯麗紛彧彧其難分此其大較也若乃髙甍崔嵬飛宇承霓綿蠻黮䨴隨雲融泄鳥企山峙若翔若滯峨峨嶫嶫罔識所屆雖離朱之至精猶眩矅而不能昭晰也于是蘭栭積重窶數矩設㰇櫨各落以相承欒栱夭蟜而交結金楹齊列玉舄承跋青瑣銀鋪是為閨闥雙枚既修重桴乃飾㮰梠緣邊周流四極侯衛之班藩服之職溫房承其東序涼室處其西偏開建陽則朱炎艷啓金光則清風臻故冬不凄寒夏無炎燀鈞調中適可以永年魏韋誕景福殿賦瞻大厦之穹崇結層構而髙驤修棟迪以虹指飛甍竦而鳯翔榱桷駢逼以星羅軒檻曼延而悠長伏應龍于反宇乘流蘇以飄揚于是周覽升降流目評觀叢楹負極飛檻承􅟝桁梧綺錯楶梲鱗攢芙蓉側植藻井懸川望舒涼室羲和溫房玄冬則暖炎夏則涼總寒暑于區宇制天地之隂陽又有外城金狄詭貌殊姿列于應門肅有容威若乃離殿別館粲如列星安昌延休清宴永寧美百號之特居嘉休祥之令名步雕輦以逍遙時容與于蘭庭北齊邢子才新宫賦擬二儀而構路寢法三山而起翼室何大厦之耽耽而斯干之秩秩豈西京之足偉故東都之所匹爾其狀也則瓌譎屈奇瀾漫陸離嵳峩崔嵬巉巖參差若密雲之乍舉似鵬翼之中垂布菱華之與蓮蒂咸反植而倒施若承露而將轉似含風而欲披土成黼黻木化蛟螭布紅紫之融泄間朱黃之赫曦獸狂顧而猶動鳥將鶱而中疲木神水怪海若山祗千變萬化殊形異宜隂梁北注陽馬南施百楹列倚千櫨代支或據險而形固或居安而勢危唐梁洽晴望長春宫賦倚萬楹以磊柯洞千門而陸離玲瓏玉樹則偏澄霽色連騫繡檻則却映斜曦樊鑄明光殿粉壁賦守靜含虛上以鄰貞明于千年之主保純不汚下以範恬淡于萬國之臣煥北極而開瓊室激南風而生玉塵月桂低簷失蟾暉于午夜御柳垂砌惹絮色于三春則知粉壁之道齊乎玄造達上下而明明通晝夜之杲杲日仄之後慰天勤而暝遲夙興之時副聖恩而曙早可使楚客具瞻羞持練而稱獻荆人仰止恥懷寶而來朝豈止光動玉戶氣射金屋秋露懷慙冬霜自伏蛾眉夜侍意瑶臺之已升玉顔曉臨若瑞雲之相逐而已哉髙蓋花蕚樓賦然後層軒四敞聖情周顧遙窺函谷之雲近識昆池之樹緑野初霽分渭北之川原青門洞開覽山東之貢賦亦以崇友悌之德勸農桑之務豈止唯臨鄠杜之郊空指邯鄲之路而已哉壯麗難匹光華匪一馮禁掖以孤明隱垂楊而半出王諲花蕚樓賦橫邐迤而十丈上崚嶒而三休仰接天漢俯瞰皇州百鄽之所回合九逵之所夷猶總萬象之多少極二曜之環周為棟宇之殊觀實崇髙之寡仇浮欄鬱律而却偃飛甍參差而前注連磴道而內屬曳軒窗之橫騖龍獸撫柱而相驚虹霓亘薄而齊布塗椒蘭以為馥銜明月而為炷榜題仲將之手頌登文考之賦張甫花蕚樓賦維梓維匠爰謀爰度建彩旗規層閣欒櫨拱翼以攢鬭枝掌杈牙而相搏凌兢雲垂嶪岌星錯風恬氣隱雨霽煙廓中坐平望數香街之往來馮檻下觀盡天京之郊郭厲丹鳯凌白鶴浮網玲瓏流光灼爍隂移翠伏影碧潭之清泠日上金題照錦林之花蕚李濯廣達樓賦材露桐柏階駢碔砆應龍蜿蟺以驤宇猛獸贔屭以乘桴明璫藻耀于懸井朱鳥鶱翻於薄櫨旋題景曜銀榜霞鋪反麗譙而崛起疊井幹以相扶月透榱璧星懸網珠莫不功侔造化妙盡洪纎雉堞相望而暗連宫闕門闈廣達而俯接閭閻德陽傍倚少室前瞻散春光于玉戶擁佳氣于珠簾桂棟連雲巢儀彩鳯蓂枝擢秀影伴初蟾李華含元殿賦命徴般石之匠下荆揚之材操斧執斤者萬人涉磧礫而登崔嵬擇一幹于千木規大壯于喬枚聲坎坎于青雲若神踣而顛摧勢動連崖拉風碎雷倒徑梢于窮谷斬巨柢于昭回時也山祗效靈波神作氣為桴為筏羽疊鱗萃朝沈江漢夕出河渭雲奔山橫井構一作交積于作宫之地星鎚電交于萬堵霜鋸冰解于千尋擁材為山攢杵如林乃占日月之吉以成帝室雄梁徑于中極榱桷戢以礱密析姑繇以為楹隳喬山以為礩飛重簷以切霞炯素壁以留日神標峻樀鬼疊曾楣髙卑迭作尋尺相持木從繩而後正棟操宇而不危陛瑩冰級瓦敷鱗差蕩晶景而升降歘睒眥以交輝聳大厦之奇傑勢將頓而復飛深闈祕殿曼宇疏楹瑞木交蔭玄墀砥平鮮風歷廡凌霰飄英至若時雨膏田九農恞音夷悅也暢雲歸山穴倏以昭曠白日麗于宫隅渾晶光而益壯于是風師斂威纎埃不升穎絶搖芒葉無翻稜自中徂外鏡洗川澄弦直閭閈井畫溝塍靡迆秦山陂陀漢陵知稼穡之艱難見皇王之廢興及乎玄冥戒寒海神飛雪瑶城粉野琪樹森列玉宇璇階雲門露闕天華爽霽朗日朝徹赤旌降庭朱柱艷月仰白帝而金精開披河宫而銀燭發陳張正見重陽殿成金石會竟上詩周王興路寢漢后式甘泉共知崇壯麗迢遞與雲連抗殿疏龍首峻陛激天泉東西跨函谷左右矚伊瀍百常飛觀竦三休復道懸拱烏遙造日攑虬遠架煙雲棟疑飛雨風窗似望仙玉女臨方鏡金璫映彩椽梅梁橫發蘂玉井倒披蓮榮光開御宿佳氣屬祈年霜鴈排空斷寒花映日鮮負扆憑宵極台司列象躔登臺喧大厦御氣響鈞天北斗承三獻南風入五絃鸞歌鳷鵲右獸舞射熊前翔鶤仰不見燕雀徒聯翩江總臨芳殿侍宴詩鍾箭且徘徊皇堂薦羽杯橋平疑水落石迥見山開林前暝色靜花處近香來西嵫傷撫夕北閣濫遊陪唐蘇頲奉和春日幸望春宫詩東望望春春可憐更逢晴日柳含煙宫中下見南山盡城上平臨北斗懸細草偏承回輦處輕花故落捧觴前宸遊對此歡無極鳥弄歌聲入管絃又馬懷素詩綵仗雕輿俯碧潯行春御氣發皇心搖風細柳縈馳道映日輕花出禁林通野園林開帟幕連堤草樹狎衣簪謬參西掖霑堯酒願沐南薰解舜琴又李適詩玉輦金輿天上來花園四望錦屛開輕絲半拂朱門柳細纈全披畫閣梅舞蝶飛行飄御席鶯歌度曲繞仙杯聖詞今日光輝滿漢主秋風莫道才又沈佺期詩芳郊緑野散春晴復道離宫煙草生楊柳千條花欲綻蒲萄百丈蔓初縈林香酒氣元相入鳥囀歌聲各自成定是風光牽宿醉來晨復得幸昆明蘇頲奉和聖製至長春宫登樓觀稼穡詩帝迹奚其遠皇符之所崇敬時堯務作盡力禹稱功赫赫惟元后經營自左馮變蕪粳稻實流惡水泉通國阜猶前豹人疲詎昔熊黃圖巡沃野清次入離宫是閲京坻富仍觀都邑雄憑軒一何綺積溜寫晴空禮節家安外和平俗在中見龍垂渭北辭鴈指河東睿思方居鎬宸遊若飲豐寧夸子雲從秪為獵扶風李憕奉和御製從蓬萊宫向興慶閣道中詩别館春還淑氣催三宫路轉鳯凰臺雲飛北闕輕隂散雨歇南山積翠來御柳遙隨天仗發林花不待曉風開已知聖澤深無限更喜年芳入睿才盧綸蚤秋望華清宫中樹成詠詩可憐雲木叢滿禁碧濛濛色潤虛泉近隂清輦路通玉壇標八桂金井識雙桐交映凝寒露相和起夜風數枝盤石上幾葉落雲中燕拂宜秋霽蟬鳴覺晝空翠屛更隱見珠綴共玲瓏雲雨生成早樵蘇禁令雄野藤髙助緑仙果迥呈紅惆悵繚垣暮兹山聞暗蛩王維敕借岐王九成宫避暑之作應教詩帝子遠辭丹鳯闕天書遙借翠微宫隔窗雲霧生衣上捲幔山泉入鏡中林下水聲喧笑語巖間樹色隱房櫳仙家未必能勝此何事吹笙向碧空又和太常韋主簿五郎溫湯寓目詩漢主離宫接露臺秦川一半夕陽開青山盡是朱旗繞碧澗翻從玉殿來新豐樹裏行人度小苑城邉獵騎回聞道甘泉能獻賦懸知獨有子雲才王建上陽宫詩上陽花木不曾秋洛水穿宫處處流畫閣紅樓宫女笑玉簫金管路人愁幔城入澗橙花發玉輦登山桂葉稠曾讀列仙王母傳九天未勝此中遊司空曙長安晚望寄程補闕詩迢遞山河擁帝京參差宫殿接雲平風吹曉漏經長樂柳帶晴煙出禁城天淨笙歌臨路奏日髙車馬隔塵行獨有淺才甘未達多慙名在魯諸生錢起闕下贈閻舍人詩二月黃鸝飛上林春城紫禁晚隂隂長樂鐘聲花外盡龍池柳色雨中深陽和不散窮途恨霄漢長懸捧日心獻賦十年猶未遇羞將白髮對華簪戴叔倫長安早春贈萬評事詩春風歸戚里曉日上花枝清管新鶯發重門細柳垂經過千騎客調笑五陵兒何事靈臺客狂歌自不知杜牧華清宫詩繡嶺明珠殿層巒下繚牆仰窺雕檻影猶想赭袍光昔帝登封後中原自古強一千年際會三萬里農桑几席延堯舜軒墀立禹湯雷霆驅號令星斗煥文章釣築乘時用芝蘭在處芳北扉間木索南面富循良至道思玄圃平居厭未央鈎陳裹巖谷文陛壓青蒼歌吹千秋節樓臺八月涼神仙髙縹眇環珮碎釘鐺泉暖涵窗鏡雲嬌惹粉囊嫩嵐滋翠葆清渭照紅粧帖泰生靈壽歡娛嵗序長月聞仙曲調霓作舞衣裳雨露偏金穴乾坤入醉鄉玩兵師漢武回首倒干將鯨鬛掀東海胡牙揭上陽喧呼馬嵬血零落羽林槍傾國留無路還魂怨有香蜀峰橫慘淡秦樹遠微茫鼎重山難轉天扶業更昌望賢餘父老花蕚舊池塘往事人難問幽襟淚獨傷碧簷斜送日殷葉半凋霜迸水傾瑶砌疏風罅玉房塵埃羯鼓索片段荔枝筐鳥啄摧寒木蝸涎蠧畫梁孤煙知客恨遙起泰陵傍溫庭筠過華清宫詩憶昔開元日承平事勝遊貴妃専寵幸天子富春秋月白霓裳殿風乾羯鼓樓鬭雞花蔽膝騎馬玉搔頭繡轂千門妓金鞍萬戶侯薄雲欺雀扇輕雪犯貂裘過客聞韶濩居人識冕旒氣和春不覺煙暖霽難收澀浪和瓊甃晴陽上綵斿卷衣輕鬢懶窺鏡淡蛾羞屏掩芙蓉帳簾搴玳瑁鈎重曈分渭曲纎手指神州御案迷萱草天袍妬石榴深巖藏浴鳯鮮隰媚潛虬不料邯鄲蝨俄成即墨牛劒鋒揮太皥旗焰拂蚩尤內嬖陪行在孤臣預坐籌瑤簪遺翡翠霜仗駐驊騮艷笑雙飛斷香魂一哭休早梅悲蜀道髙樹隔昭丘朱閣重霄近蒼崖萬古秋至今湯殿水嗚咽縣前流闕華清宫和杜舍人詩五十年天子離宫仰峻牆登封時正泰御宇日何長上位先名實中興事憲章起戎輕甲胄餘地復河湟道帝玄元祖儒封孔子王因緣百司署聚會一人觴渭水波搖緑秦郊草半黃馬馴金勒細鷹健玉鈴鏘下箭朱弓滿鳴鞭皓腕攘畋思獲吕望諫秪避周昌迹貪前逐梟心不早防幾添鸚鵡酌先賜荔枝嘗月鎖千門靜風吹一笛涼細音搖羽珮輕步宛霓裳韜晦基潛結升平意遽忘衣冠逃大虜鼙鼓動漁陽外戚心殊迫中途事可量血埋妃子艷刃斷祿兒腸近侍煙塵隔前蹤輦路荒益知迷寵佞遺恨喪賢良北闕尊明主南宫遜上皇禁清餘鳯吹池冷睡龍光祝壽山猶在流年水共傷杜鵑魂厭蜀蝴蝶夢悲莊雀卵遺雕栱蟲絲罥畫梁紫苔侵壁潤紅樹閉門芳守吏齊鴛瓦耕民得翠璫登年昔酺樂講武舊兵場暮草深巖翠幽花墜徑香不堪垂白叟行折御溝楊章孝標古行宫詩瓦煙疏冷古行宫寂寞朱門反鎖空殘粉水銀流砌下墮環秋月落泥中鶯傳舊語嬌春日花學嚴粧妬曉風天子時清不巡幸祗應鸞鳯集梧桐李商隱陳後宫詩二首茂苑城如晝閶門瓦欲流還依水光殿更起月華樓侵夜鸞開境迎冬雉獻裘從臣皆半醉天子正無愁漢武開新苑龍舟燕幸頻渚蓮參法駕沙鳥犯勾陳夀獻金莖露歌翻玉樹塵夜來江令醉别詔宿臨春又隋宫詩紫泉宫殿鎖煙霞欲取蕪城作帝家玉璽不緣歸日角錦帆應是到天涯于今腐草無螢火終古垂楊有暮鴉地下若逢陳後主豈宜重問後庭花又楚宫詩復壁交青瑣重簾挂紫繩如何一柱觀不礙九枝燈扇薄常窺月叉斜只鏤冰歌成猶未唱秦火入夷陵晉張協七命蘭宫祕宇雕堂綺櫳雲屏爛汗瓊壁青蔥應門八襲旋臺九重表以百常之闕圜以萬雉之墉爾乃嶢榭迎風秀出中天翠觀岑青雕閣霞連長翼臨雲飛陛陵山望玉繩而結極承倒景而開軒赬素炳煥枌栱嵯峨隂虬負簷陽馬承阿錯以瓊英鏤以金華方疏含秀圓井吐葩重殿疊起交綺對榥幽堂晝密明室夜朗梁沈約為柳兗州世隆上舊宫表舊宫蘊靈千古合祥百代萬祗相祉八神警室事超齊甸義邁譙宫故能屬輦道于天階命帝闕于霄路宜樹闕疏壤寫極上穹克播徽塵永光盛烈王筠上太極殿表繡栭鏤檻延耀光輝虬柱虹梁杳冥煙霧唐王勃九成宫頌序帝機無朕道洽則時雍靈化不言功成則道顯伏惟陛下體元纂極模神建墬棟梁一氣庭階六合松軒夜警杳冥姑射之心茅殿晨凝寥廓洞山之駕臣霑風太上庇影華胥仰衢室而無階候襄城而有地雖望卑平叔空勒景福之詞而文謝子雲願竭甘泉之思謹憑天造輒上九成宫頌二十四章攀紫墀而絶望呌丹闕而纍息又乾元殿頌序鵬霄上廓瓊都開紫帝之庭鼇紀下清珍野闢黃靈之館兼山配極照鸞闕于霞標洊水涵元湛驪宫于霧壑斯則神徴語怪功潛鳥迹之初理涉非經道昧鶉居之始授鳯書而稽碧落仙構罕存按龜籙而質黃圖金模間起粵若風移處暗增巢恢火運之機業拒嚮明上棟括河圖之奧三階布政詠匪日于靈臺百堵陳詩頌斯干于考室亦有黃軒瞰月樵門頺九洛之功璿闥排煙牧野構三河之酷御燕臺而臨北極缺王度于祈招列雲閣而拒南山隕皇謨于軹道然則卑宫喪禮采椽輕四海之尊豐屋延災柏梁非萬乘之有雖因時立事奢儉殊流而𢎞道在人興亡迭運靈光末造不窺九室之榮景福宏規猶擁三方之釁聞風舊史逮曹馬而無譏觀迹故墟歷周隋而未得由是三靈物覩扣蘭禁而棲誠九服子來詠蒿宫而騁力去奢去甚不矜黃屋之隆匪朴匪雕方順丹墀之請宸規相宅考周舊于靈都睿覽思和獲秦餘于正殿羣臣列陛奏蕭相之遺模天子臨軒採荀卿之故事炎州八桂簉仙栱于林衡層一作岱畎五松委靈材于梓匠衢宫記範萬機抗九戶之尊海孽移琛千欒省十家之費飛亷卷藹徹煙極而浮甍屏翳收津劃星墟而置𣙗瑶階百雉光懸寶露之壇瓊壁萬尋影綷崇霞之閣拖虹梁而四注星漢虧于上榮疊雲棟而三休寒暑隔于中霤雕楣鶴企沓勢分規繡桷虬奔殊形别起圓璫布藻罄羽璧于狼泉方鏡披蓮孕明璣于蜃浦芝樓對幄重傳五日之風藝閣列錢彩鍛三旬之霧文疏罩迥隂息肩于綺寮翠幌籠霄陽烏鎩翼于珠網豐隆按節下復橑而司階列缺施鞭低叢楹而假道溫房佇幸煦芳景于佳辰涼室乘間凛徂飇于火序金鋪夕照若帝圃之輝瓊英寶綴晨懸類阿房之聚銀燭煙丘碧桂翊珉陛而披香雨岫赬筠夾璿流而揚影九衢翻翠雜仙卉于中逵四照霏紅間靈葩于右墄神禽率舞光浮肆夏之軒瑞鳥相鳴響叶鈞天之樂鈎陳宿列儼雙碣于丹霄綺繳霞周闢千門于紫露漢王褒甘泉宫頌徑落莫以差錯編玳瑁之文㮰鏤螭龍以造牖採雲氣以為楣神星羅于題鄂虹霓往往而繞榱唐王勃九成宫頌雖南纒統序北室開榮凛徑氣于叢楹起凄風于洞穴踆烏失轡出澗戶而無光金低輪下山扉而變色隂庭徂夏祝融無竊據之因邃屋乘春顓頊定忘歸之策飛廉扣響赴北闕而神寒屛翳收津局南端而股戰蒼蒼八桂白露為霜落落千松玄隂昧景金人列陛來危砌而思裘玉女窺窗伏層巒而請纊陽秋代駕不凋仙圃之華天地為爐未解幽陵之凍陳徐陵太極殿銘法氐象亢王者之位以尊左平右墄天子之堂為貴嵯峨容與若漢水之仙槎搖蕩波濤似新亭之龍剎孤拔靈山允彰天貺植緑芰而動微風舒丹蓮而制流火甘泉遠望觀正殿之崢嶸函谷遙看美皇都之佳麗信可以齊三光而示宇宙會萬國而朝諸侯唐裴素重修漢未央宫記嘗因勝日聖思間遊倦大厦之講習想鮮原之遊衍乃命法駕備宫馭細草迎輦神飇引衣超然肆行造適自得于是命工度材審曲面勢裁成法度以就斯宫攢櫨栱密玉石碧瓦龍錯層軒鳥跂崇墉粉靜璇題月照舒廊四注以雲委隆臺分據而山屹蟠虬蜿蜒鱗動梠桷蹲獸却騁姿雄欄檻宏袤乎豁達跨臨乎涇渭緑竹凝遠繁松藹深奇樹流光丹墀迥繞于是闢戲馬之廣場開遠目之間館天地景新山川勢重回太華之秀氣列終南之翠屛九嵕􅏭􅙙而固護八水分流以縈帶而又揚太液之波繚周帝之垣原隰成文丹素含華翼樓杳以分張雄虹直而中跱神機一發廓若懸宇祥煙瑞彩鬱鬱蔥蔥瞻回途一作逺以下濟撫璇璣而髙視見秦川風物漢原邐迤感前王興廢知稼穡艱難吾君用此鏡是非閲思慮豈獨資耳目縱遊玩也居處部門闕魏繁欽建章鳳闕賦築雙鳯之重闕表大路以遐通上規圜以穹隆下矩折而繩直長楹森以駢停修桷揭以舒翼象玄圃之層樓肖華蓋之麗天當蒸暑之炎赫步北楹而周旋鷦鵬振而不及豈歸雁之能翔抗神鳯以甄甍似虞廷之鏘鏘櫨六翮以撫跱俟髙風之清涼華鐘金獸列在南廷嘉樹蓊薆奇鳥哀鳴臺榭臨池萬種千名周櫩輦道屈繞紆縈梁陸倕石闕銘象闕之制其來已遠春秋設舊章之教經禮垂布憲之文戴記顯遊觀之言周史書樹闕之夢北荒明月西極流精海嶽黃金河庭紫貝蒼龍玄武之制銅爵鐵鳯之工或以聽窮省寃或以布治懸法或以表正王居或以光崇帝里晉氏浸弱宋厯威夷禮經舊典寂寥無記鴻規盛烈湮沒罕稱乃假天闕于牛頭託遠圖于博望有欺耳目無補憲章乃命審曲直之官選明中之士陳圭置臬瞻星揆地興復表門草創華闕于是嵗次天紀月旅太蔟皇帝御天下之七載也構兹盛則興此崇麗方且趨以表敬觀而知法物覩雙碣之容民識百重之典作範垂訓赫矣壯乎爰命下臣式銘磐石其辭曰惟帝建國正位辨方周營洛涘漢啓岐梁居因業盛文以化光爰有象闕是惟舊章青蓋南洎黃旗東指懸法無聞藏書弗紀大人造物龍德休否建此百常興兹雙起偉哉偃蹇壯矣巍巍旁映重疊上連翠微布教方顯浹日初輝懸書有附委篋知歸鬱崫重軒穹隆反宇形聳飛棟勢超浮柱色法上圓制模下矩周望原隰俯臨煙雨前賔四會却背九房北通二轍南湊五方暑來寒往地久天長神哉華觀永配無疆魏溫子升閶闔門上梁祝文大君有命髙門啓扉良辰是簡穆卜無違雕梁乃架綺翼斯飛八龍杳杳九重巍巍居宸納祐就日垂衣一人有慶四海攸歸居處部佛寺陳江總遊棲霞寺言志詩靜心抱冰雪暮齒逼桑榆太息波川迅悲哉人世拘嵗華皆採穫冬晚共嚴枯濯流濟八水開襟入四衢兹山靈妙合當與天地俱石瀨乍深淺煙崖遞有無缺碑橫古隧盤木卧荒塗行行備履歷步步憐威紆髙僧迹共遠勝地心相符樵隱各有得丹青獨不渝遺風佇芳桂比德喻生芻寄言長往客悽然傷鄙夫又明慶寺詩十五詩書日六十軒冕年名山極歷覽勝地殊留連幽崖聳絶壑洞穴瀉飛泉金河知證果石室乃安禪市朝霑草露淮海閲桑田夜梵聞三界朝香徹九天山階步皎月澗户聽涼蟬永言望鍾嶺更復切秦川周庾信同泰寺浮圖詩岧岧陵太清照殿比東京長影臨雙闕髙層出九城拱積浮雲礙幡搖度鳥驚花飛如始落蓮合似初生輪重對月滿鐸韻擬鸞聲畫水流全住圖雲色半輕煙露晚猶滴珠火朝更明雖連博望苑還接銀沙城天香下殿桂仙梵入伊笙庶同八界樂方遣六塵情北齊蕭慤和崔侍中從駕經山寺詩鈎陳夜驚徼河漢曉參橫遊騎騰文馬前驅轉翠旌野禽喧曙色山樹動秋聲雲表金輪見巖端畫栱明塔疑從地涌蓋似積香成泉髙下溜急松古上枝平儀容多壯思麗藻蔚緣情自嗤非照廡何以繼連城唐盧照鄰石鏡寺詩古墓芙蓉塔明神松柏煙鸞沈仙鏡底花沒梵輪前銖衣千古佛寶月兩重圓隱隱香臺夜鐘聲徹九天駱賔王和王記室從趙王春日遊陀山寺詩鳥旟陪訪道鷲嶺洽棲真四禪明靜業三空廣勝因祥河疏疊澗慧日皎重輪葉暗龍舟密花明鹿苑春雕談筌奧旨妙論潄玄津雅曲終難和徒自奏巴人